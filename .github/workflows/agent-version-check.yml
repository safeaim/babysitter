# Agent Version Check — daily scan for new agent CLI releases
#
# Checks all supported agent CLIs for version updates. When a new version is
# detected that isn't in the atlas graph, creates a PR to add the version
# record and opens an issue for full assimilation.

name: Agent Version Check

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect versions but do not create PRs or issues'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-version-check
  cancel-in-progress: false

jobs:
  check-versions:
    name: Check Agent Versions
    runs-on: ubuntu-latest-l
    steps:
      - name: Generate a5c GitHub App token
        id: a5c-token
        continue-on-error: true
        uses: a5c-ai/generate-token-action@main

      - uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ steps.a5c-token.outputs.a5c_token || github.token }}

      - uses: a5c-ai/babysitter/packages/triggers@staging
        with:
          harness: codex
          provider: foundry
          model: gpt-5.5
          interaction-mode: bridged-hooks
          babysitter-plugin: 'true'
          max-turns: '9999'
          babysitter-prompt-prefix: '$babysitter:yolo '
          prompt: |
            You are an agent version tracker. Your job is to detect new releases
            of all supported agent CLIs and update the atlas graph accordingly.
            ${{ inputs.dry_run == 'true' && 'DRY RUN: report findings but do NOT create PRs or issues.' || '' }}

            ## Step 0 — Discover Agents from Atlas Graph

            Build the SDK and query agent-catalog to get all known agents with
            their install methods:

            ```bash
            npm run build --workspace=@a5c-ai/atlas
            npm run build --workspace=@a5c-ai/agent-catalog
            node -e "
              const { listPluginTargetDescriptors } = require('@a5c-ai/agent-catalog');
              const targets = listPluginTargetDescriptors();
              for (const t of targets) {
                console.log(JSON.stringify({
                  id: t.targetId,
                  name: t.displayName,
                  cli: t.cliCommand,
                  externalPackage: t.externalPackageName,
                  capabilities: t.harnessCapabilities,
                }));
              }
            "
            ```

            Also discover install commands from the adapter source code:
            ```bash
            grep -r 'npm install -g\|pip install' packages/agent-mux/adapters/src/ | grep -v test | grep -v node_modules
            ```

            Build a table of all agents with their package names and install methods.

            ## Step 1 — Detect Current Versions

            For each agent discovered in Step 0:
            - If npm package: `npm view <package>@latest version 2>/dev/null`
            - If pip package: search the web for latest version
            - Also try `amux detect <agent> --json` to check if already installed

            Search the web for recent release announcements for major agents
            (codex, claude code, gemini cli, pi, cursor).

            ## Step 2 — Check Atlas Graph

            For each detected version, check existing AgentVersion records:
            ```bash
            find packages/atlas/graph/agent-stack -name "*.yaml" | xargs grep -l "AgentVersion" | head -20
            ```
            Read the relevant files to see what versions are already recorded.

            ## Step 3 — Update Graph for New Versions

            For each version NOT in the graph:

            1. Create or update the AgentVersion YAML at
               `packages/atlas/graph/agent-stack/agent-versions/`
            2. If release notes found, extract key changes (capabilities,
               breaking changes, CLI flags, transport/API changes)
            3. Update the PluginTarget if capabilities changed

            ## Step 4 — Create PR

            If any graph changes were made:
            1. Create branch: `agent-versions/daily-$(date +%Y-%m-%d)`
            2. Rebuild atlas index: `npm run build --workspace=@a5c-ai/atlas`
            3. Commit and create PR against staging

            ## Step 5 — Open Issues for New Versions

            For each NEW agent+version pair not previously in graph:
            1. Check: `gh issue list --label "agent-version-update" --search "<agent> <version>"`
            2. If none, create issue with label `agent-version-update,graph-update`
               titled "Assimilate <agent> v<version> into atlas graph"
               with tasks: review release notes, update AgentVersion, PluginTarget,
               ProviderTranslation, HookMapping, launchBehavior, run live-stack,
               update adapter code.

            ## Step 6 — Report

            Print summary: Agent | Current | Previous | Status | Action
          trigger-query: ''
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ steps.a5c-token.outputs.a5c_token || github.token }}

