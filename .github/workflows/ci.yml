name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, Tests, Package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifact directories
        run: |
          set -euo pipefail
          mkdir -p artifacts/test-logs

      - name: Check command surface sync
        run: |
          set -euo pipefail
          npm run check:plugin-commands 2>&1 | tee artifacts/test-logs/plugin-command-sync.log

      - name: Lint
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/test-logs/lint.log

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/test-logs/metadata.log

      - name: Build
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee artifacts/test-logs/build.log

      - name: Unit tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/test-logs/unit-tests.log

      - name: Build breakpoints-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/test-logs/breakpoints-mux-build.log

      - name: Typecheck breakpoints-mux
        run: |
          set -euo pipefail
          npm run typecheck --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/test-logs/breakpoints-mux-typecheck.log

      - name: breakpoints-mux tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/test-logs/breakpoints-mux-tests.log

      - name: Build hooks-mux
        run: |
          set -euo pipefail
          npm run build:hooks-mux 2>&1 | tee artifacts/test-logs/hooks-mux-build.log

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/test-logs/hooks-mux-tests.log

      - name: Build agent-mux packages
        run: |
          set -euo pipefail
          npm run build:agent-mux 2>&1 | tee artifacts/test-logs/agent-mux-build.log

      - name: Build agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/test-logs/agent-plugins-mux-build.log

      - name: agent-plugins-mux tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/test-logs/agent-plugins-mux-tests.log

      - name: Build babysitter-harness
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/test-logs/agent-core-build.log
          npm run build --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/test-logs/babysitter-harness-build.log

      - name: babysitter-harness tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/test-logs/babysitter-harness-tests.log

      - name: First-class plugin validation
        run: |
          set -euo pipefail
          plugins=(
            plugins/babysitter-codex
            plugins/babysitter-cursor
            plugins/babysitter-gemini
            plugins/babysitter-github
            plugins/babysitter-omp
            plugins/babysitter-opencode
            plugins/babysitter-openclaw
            plugins/babysitter-paperclip
            plugins/babysitter-pi
          )

          for plugin_dir in "${plugins[@]}"; do
            plugin_name="$(basename "$plugin_dir")"
            log_path="artifacts/test-logs/${plugin_name}-validate.log"
            echo "::group::${plugin_name}"
            npm run validate:ci --prefix "$plugin_dir" 2>&1 | tee "$log_path"
            echo "::endgroup::"
          done

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: artifacts/test-logs
          if-no-files-found: error

  packages-sdk:
    name: SDK Matrix (os=${{ matrix.os }}, node=${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        node: [20, 22]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifact directories
        run: |
          set -euo pipefail
          mkdir -p "_ci_artifacts/cli/${{ matrix.os }}/node${{ matrix.node }}"
          mkdir -p "_ci_artifacts/logs/${{ matrix.os }}/node${{ matrix.node }}"

      - name: SDK lint
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee "_ci_artifacts/logs/${{ matrix.os }}/node${{ matrix.node }}/lint.log"

      - name: SDK build
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee "_ci_artifacts/logs/${{ matrix.os }}/node${{ matrix.node }}/build.log"

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee "_ci_artifacts/logs/${{ matrix.os }}/node${{ matrix.node }}/test.log"

      - name: SDK smoke CLI
        run: |
          set -euo pipefail
          npm run smoke:cli --workspace=@a5c-ai/babysitter-sdk -- --runs-dir "_ci_artifacts/cli/${{ matrix.os }}/node${{ matrix.node }}" --keep 2>&1 | tee "_ci_artifacts/logs/${{ matrix.os }}/node${{ matrix.node }}/smoke.log"

      - name: Upload SDK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-artifacts-${{ matrix.os }}-node${{ matrix.node }}
          if-no-files-found: warn
          path: |
            _ci_artifacts/cli/${{ matrix.os }}/node${{ matrix.node }}
            _ci_artifacts/logs/${{ matrix.os }}/node${{ matrix.node }}

  observer-dashboard:
    name: Observer Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifact directories
        run: |
          set -euo pipefail
          mkdir -p artifacts/observer-logs

      - name: Build observer dashboard
        run: |
          set -euo pipefail
          npm run build:observer 2>&1 | tee artifacts/observer-logs/build.log

      - name: Build CLI
        run: |
          set -euo pipefail
          npm run build:cli --workspace=@a5c-ai/babysitter-observer-dashboard 2>&1 | tee artifacts/observer-logs/build-cli.log

      - name: Unit tests
        run: |
          set -euo pipefail
          npm run test:observer 2>&1 | tee artifacts/observer-logs/unit-tests.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observer-logs
          path: artifacts/observer-logs
          if-no-files-found: error

  kanban:
    name: Kanban
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifact directories
        run: |
          set -euo pipefail
          mkdir -p artifacts/kanban-logs

      - name: Build kanban
        run: |
          set -euo pipefail
          npm run build:kanban 2>&1 | tee artifacts/kanban-logs/build.log

      - name: Build CLI
        run: |
          set -euo pipefail
          npm run build:cli --workspace=@a5c-ai/kanban 2>&1 | tee artifacts/kanban-logs/build-cli.log

      - name: Verify release contract
        run: |
          set -euo pipefail
          npm run verify:release --workspace=@a5c-ai/kanban 2>&1 | tee artifacts/kanban-logs/verify-release.log

      - name: Unit tests
        run: |
          set -euo pipefail
          npm run test:kanban 2>&1 | tee artifacts/kanban-logs/unit-tests.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kanban-logs
          path: artifacts/kanban-logs
          if-no-files-found: error
