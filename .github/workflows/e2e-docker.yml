name: E2E Docker Tests

on:
  pull_request:
    paths:
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'docker-compose.yml'
      - 'packages/breakpoints-mux/**'
      - 'packages/sdk/**'
      - 'plugins/babysitter/**'
      - 'plugins/babysitter-codex/**'
      - 'plugins/babysitter-gemini/**'
      - 'plugins/babysitter-pi/**'
      - 'plugins/babysitter-omp/**'
      - 'plugins/babysitter-paperclip/**'
      - 'e2e-tests/**'
      - 'e2e-tests/docker/Dockerfile.gemini-cli'
      - 'e2e-tests/docker/Dockerfile.pi'
      - 'e2e-tests/docker/Dockerfile.oh-my-pi'
      - 'e2e-tests/docker/Dockerfile.paperclip'
      - 'e2e-tests/docker/helpers-gemini-cli.ts'
      - 'e2e-tests/docker/helpers-pi.ts'
      - 'e2e-tests/docker/helpers-oh-my-pi.ts'
      - 'e2e-tests/docker/helpers-paperclip.ts'
      - 'e2e-tests/docker/gemini-cli-structural.test.ts'
      - 'e2e-tests/docker/pi-structural.test.ts'
      - 'e2e-tests/docker/pi-stop-hook.test.ts'
      - 'e2e-tests/docker/oh-my-pi-structural.test.ts'
      - 'e2e-tests/docker/oh-my-pi-stop-hook.test.ts'
      - 'e2e-tests/docker/paperclip-structural.test.ts'
      - '.github/workflows/e2e-docker.yml'
  push:
    branches:
      - staging
      - develop
    paths:
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'docker-compose.yml'
      - 'packages/breakpoints-mux/**'
      - 'packages/sdk/**'
      - 'plugins/babysitter/**'
      - 'plugins/babysitter-codex/**'
      - 'plugins/babysitter-gemini/**'
      - 'plugins/babysitter-pi/**'
      - 'plugins/babysitter-omp/**'
      - 'plugins/babysitter-paperclip/**'
      - 'e2e-tests/**'
      - 'e2e-tests/docker/Dockerfile.gemini-cli'
      - 'e2e-tests/docker/Dockerfile.pi'
      - 'e2e-tests/docker/Dockerfile.oh-my-pi'
      - 'e2e-tests/docker/Dockerfile.paperclip'
      - 'e2e-tests/docker/helpers-gemini-cli.ts'
      - 'e2e-tests/docker/helpers-pi.ts'
      - 'e2e-tests/docker/helpers-oh-my-pi.ts'
      - 'e2e-tests/docker/helpers-paperclip.ts'
      - 'e2e-tests/docker/gemini-cli-structural.test.ts'
      - 'e2e-tests/docker/pi-structural.test.ts'
      - 'e2e-tests/docker/pi-stop-hook.test.ts'
      - 'e2e-tests/docker/oh-my-pi-structural.test.ts'
      - 'e2e-tests/docker/oh-my-pi-stop-hook.test.ts'
      - 'e2e-tests/docker/paperclip-structural.test.ts'
      - '.github/workflows/e2e-docker.yml'
  workflow_dispatch:

concurrency:
  group: e2e-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-e2e-tests:
    name: Docker E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_PROJECT_NAME: ${{ vars.AZURE_OPENAI_PROJECT_NAME }}
      AZURE_OPENAI_DEPLOYMENT: ${{ vars.A5C_SELECTED_MODEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare artifact directories
        run: |
          set -euo pipefail
          mkdir -p e2e-artifacts

      - name: Run structural, SDK & stop-hook tests (no API key)
        run: |
          set -euo pipefail
          npx vitest run --config e2e-tests/docker/vitest.config.ts \
            --reporter=default --reporter=json \
            --outputFile.json=e2e-artifacts/test-results-structural.json \
            e2e-tests/docker/structural.test.ts \
            e2e-tests/docker/stop-hook.test.ts \
            e2e-tests/docker/pi-structural.test.ts \
            e2e-tests/docker/pi-stop-hook.test.ts \
            e2e-tests/docker/oh-my-pi-structural.test.ts \
            e2e-tests/docker/oh-my-pi-stop-hook.test.ts \
            e2e-tests/docker/gemini-cli-structural.test.ts \
            e2e-tests/docker/paperclip-structural.test.ts

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: e2e-artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

  provider-gated-e2e:
    name: Provider-Gated E2E (Azure OpenAI)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # This job depends on a live Azure OpenAI endpoint and an LLM completing a
    # multi-step orchestration.  Failures are often transient (model timeouts,
    # rate limits, non-deterministic output) so we allow failure to keep the
    # overall workflow green.
    continue-on-error: true
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_PROJECT_NAME: ${{ vars.AZURE_OPENAI_PROJECT_NAME }}
      AZURE_OPENAI_DEPLOYMENT: ${{ vars.A5C_SELECTED_MODEL }}

    steps:
      - name: Check provider credentials
        id: creds
        run: |
          if [ -n "${AZURE_OPENAI_API_KEY:-}" ] && [ -n "${AZURE_OPENAI_PROJECT_NAME:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping provider-gated tests — Azure OpenAI credentials not configured"
          fi

      - name: Checkout repository
        if: steps.creds.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Free runner disk space
        if: steps.creds.outputs.available == 'true'
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/.ghcup /opt/ghc /usr/share/swift \
            /usr/local/lib/android /usr/share/miniconda /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

      - name: Setup Node.js
        if: steps.creds.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.creds.outputs.available == 'true'
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set up Docker Buildx
        if: steps.creds.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Prepare artifact directories
        if: steps.creds.outputs.available == 'true'
        run: mkdir -p e2e-artifacts

      - name: Run provider-gated full-run tests with Azure OpenAI
        if: steps.creds.outputs.available == 'true'
        run: |
          set -euo pipefail
          npx vitest run --config e2e-tests/docker/vitest.config.ts \
            --reporter=default --reporter=json \
            --outputFile.json=e2e-artifacts/test-results-provider-full-run.json \
            e2e-tests/docker/session-create-full-run.test.ts

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-gated-e2e-artifacts
          path: e2e-artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

  codex-docker-e2e:
    name: Codex Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      A5C_PROVIDER_NAME: ${{ vars.A5C_PROVIDER_NAME }}
      A5C_SELECTED_CLI_COMMAND: ${{ vars.A5C_SELECTED_CLI_COMMAND }}
      A5C_CLI_TOOL: ${{ vars.A5C_CLI_TOOL }}
      A5C_SELECTED_MODEL: ${{ vars.A5C_SELECTED_MODEL }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_PROJECT_NAME: ${{ vars.AZURE_OPENAI_PROJECT_NAME }}
      AZURE_OPENAI_DEPLOYMENT: ${{ vars.A5C_SELECTED_MODEL }}

    steps:
      - name: Resolve Codex provider availability
        id: codex_provider
        run: |
          set -euo pipefail
          if [ -n "${AZURE_OPENAI_API_KEY:-}" ] && [ -n "${AZURE_OPENAI_PROJECT_NAME:-}" ]; then
            echo "run_codex=true" >> "$GITHUB_OUTPUT"
            echo "provider=azure" >> "$GITHUB_OUTPUT"
          else
            echo "run_codex=false" >> "$GITHUB_OUTPUT"
            echo "provider=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: ${{ steps.codex_provider.outputs.run_codex == 'true' }}
        uses: actions/checkout@v4

      - name: Free runner disk space
        if: ${{ steps.codex_provider.outputs.run_codex == 'true' }}
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Setup Node.js
        if: ${{ steps.codex_provider.outputs.run_codex == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: ${{ steps.codex_provider.outputs.run_codex == 'true' }}
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set up Docker Buildx
        if: ${{ steps.codex_provider.outputs.run_codex == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Prepare artifact directories
        if: ${{ steps.codex_provider.outputs.run_codex == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p e2e-artifacts

      - name: Run Codex Docker full-run E2E
        if: ${{ steps.codex_provider.outputs.run_codex == 'true' }}
        run: |
          set -euo pipefail
          npx vitest run --config e2e-tests/docker/vitest.config.ts \
            --reporter=default --reporter=json \
            --outputFile.json=e2e-artifacts/test-results-codex.json \
            e2e-tests/docker/codex-full-run.test.ts

      - name: Upload Codex test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-e2e-artifacts
          path: e2e-artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
