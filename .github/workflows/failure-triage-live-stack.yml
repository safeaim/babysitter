# Failure Triage — Live Stack
#
# On live-stack failure, checks if a matching issue exists.
# Opens/reopens/comments as needed with failure context.

name: "Triage: Live Stack Failure"

on:
  workflow_run:
    workflows: ["Live Stack"]
    types: [completed]

permissions:
  contents: write
  issues: write

jobs:
  triage:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push' &&
      contains(fromJSON('["main","staging","develop"]'), github.event.workflow_run.head_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Generate a5c GitHub App token
        id: a5c-token
        continue-on-error: true
        uses: a5c-ai/generate-token-action@main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ steps.a5c-token.outputs.a5c_token || github.token }}

      - uses: a5c-ai/babysitter/packages/triggers-mux@staging
        with:
          harness: codex
          provider: foundry
          model: gpt-5.5
          interaction-mode: bridged-hooks
          babysitter-plugin: 'true'
          babysitter-prompt-prefix: '$babysitter:yolo '
          max-turns: '15'
          prompt: |
            A Live Stack CI run has failed. Your job is ONLY to triage — do NOT fix code.

            Failed run: ${{ github.event.workflow_run.html_url }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Commit: ${{ github.event.workflow_run.head_sha }}
            Conclusion: ${{ github.event.workflow_run.conclusion }}
            Run ID: ${{ github.event.workflow_run.id }}

            INSTRUCTIONS:
            1. Use `gh run view ${{ github.event.workflow_run.id }} --json jobs` to find which jobs failed and their error messages.
            2. Search open issues for a matching failure: `gh issue list --label "live-stack-failure" --state open --json number,title,body`
            3. Also search closed issues: `gh issue list --label "live-stack-failure" --state closed --json number,title,body`
            4. If an OPEN issue matches the same failure pattern:
               - Add a comment: "This failure occurred again in run [#${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }}) on branch `${{ github.event.workflow_run.head_branch }}`"
               - When commenting on existing issues, also add the 'automated-triage' label if not already present.
            5. If a CLOSED issue matches:
               - Reopen it with `gh issue reopen <number>`
               - Add a comment: "Regression: this failure recurred in run [#${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }}) on branch `${{ github.event.workflow_run.head_branch }}`"
               - When commenting on existing issues, also add the 'automated-triage' label if not already present.
            6. If NO matching issue exists:
               - Before creating an issue, add the appropriate labels. Use `gh issue create --label 'live-stack-failure,ci,automated-triage' --title "<brief failure description>" --body "<detailed context>"`
               - Include: which jobs failed, error messages, branch, commit, and run link.
               - Do NOT include fix suggestions — just document the failure for triage.
          trigger-query: |
            event: workflow_run
            conclusion: failure
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          GITHUB_TOKEN: ${{ steps.a5c-token.outputs.a5c_token || github.token }}
