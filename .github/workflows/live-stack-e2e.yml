name: Live Stack E2E

on:
  workflow_dispatch:
    inputs:
      run_live:
        description: Run model-backed live scenarios with org secrets and vars
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "23 3 * * 1"

concurrency:
  group: live-stack-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contracts:
    name: Live Stack Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Run deterministic live-stack contracts
        run: |
          set -euo pipefail
          mkdir -p artifacts/live-stack
          npm run test:e2e:live-stack
          npm run coverage:e2e:live-stack

      - name: Upload live-stack contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-stack-contracts
          path: artifacts/live-stack
          if-no-files-found: error

  model-backed:
    name: Model-Backed Live Stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: contracts
    if: ${{ github.event_name == 'schedule' || inputs.run_live == 'true' }}
    env:
      LIVE_STACK_RUN_MODEL_TESTS: "1"
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_PROJECT_NAME: ${{ vars.AZURE_OPENAI_PROJECT_NAME }}
      AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LIVE_STACK_BABYSITTER_BIN: packages/sdk/dist/cli/main.js
      LIVE_STACK_BABYSITTER_AGENT_BIN: packages/babysitter-agent/dist/cli/main.js
      LIVE_STACK_AMUX_BIN: packages/agent-mux/cli/dist/index.js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build live-stack runtime dependencies
        run: |
          set -euo pipefail
          npm run build:runtime

      - name: Run primary model-backed live scenario
        run: |
          set -euo pipefail
          mkdir -p artifacts/live-stack
          npm run test:e2e:live-stack:primary

      - name: Upload live-stack model-backed artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-stack-model-backed
          path: artifacts/live-stack
          if-no-files-found: ignore
