name: Live Stack

run-name: Live Stack for ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  NPM_CONFIG_AUDIT: "true"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"
  NPM_CONFIG_PREFER_OFFLINE: "true"

concurrency:
  group: live-stack-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_all:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip publish]') }}
    name: Build All
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            packages/**/tsconfig.tsbuildinfo
            packages/**/.tsbuildinfo
            packages/agent-mux/webui/node_modules/.vite
            packages/atlas/webui/.next/cache
            packages/krate/web/.next/cache
          key: build-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ github.ref_name }}-
            build-${{ runner.os }}-

      - name: "Build phase 1: shared catalog foundation"
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/atlas
          npm run build --workspace=@a5c-ai/agent-catalog


      - name: "Build phase 2: parallel independents and agent-mux critical path"
        run: |
          set -euo pipefail
          PIDS=()
          run_bg() {
            "$@" &
            PIDS+=("$!")
          }
          wait_all() {
            local fail=0
            for pid in "${PIDS[@]}"; do
              wait "$pid" || fail=1
            done
            PIDS=()
            [ "$fail" -eq 0 ] || exit 1
          }

          run_bg bash -lc '
            set -euo pipefail
            npm run build --workspace=@a5c-ai/hooks-mux-core
            # Adapters are independent (only depend on core) — build in parallel
            for adapter in claude codex gemini copilot cursor pi oh-my-pi opencode openclaw hermes; do
              npm run build --workspace=@a5c-ai/hooks-mux-adapter-$adapter &
            done
            wait
            npm run build --workspace=@a5c-ai/hooks-mux-cli
          '
          run_bg npm run build --workspace=@a5c-ai/agent-plugins-mux
          run_bg npm run build --workspace=@a5c-ai/triggers
          run_bg npm run build:observer
          run_bg npm run build:cloud
          run_bg bash -lc 'cd packages/krate/core && npm run build && cd ../web && npm run build'

          # agent-mux critical path (sequential — each depends on previous)
          npm run build --workspace=@a5c-ai/agent-mux-observability
          npm run build --workspace=@a5c-ai/agent-mux-core

          leaf_pids=()
          npm run build --workspace=@a5c-ai/agent-mux-adapters & leaf_pids+=("$!")
          npm run build --workspace=@a5c-ai/agent-mux-harness-mock & leaf_pids+=("$!")
          npm run build --workspace=@a5c-ai/transport-mux & leaf_pids+=("$!")
          leaf_fail=0
          for pid in "${leaf_pids[@]}"; do
            wait "$pid" || leaf_fail=1
          done
          [ "$leaf_fail" -eq 0 ] || exit 1

          npm run build --workspace=@a5c-ai/agent-mux-gateway
          npm run build --workspace=@a5c-ai/agent-mux-cli
          npm run build --workspace=@a5c-ai/agent-mux
          npm run build:local --workspace=@a5c-ai/agent-mux-tui
          # webui depends on core + ui — must be after agent-mux chain
          npm run build --workspace=@a5c-ai/agent-mux-webui

          # SDK, agent-core, babysitter-agent: prerequisites (atlas, agent-catalog,
          # agent-mux chain) are already built above — call tsc directly to avoid
          # redundant rebuilds through chained npm scripts.
          npm run build --workspace=@a5c-ai/babysitter-sdk
          (cd packages/agent-core && npx tsc --build --force tsconfig.json)
          (cd packages/babysitter-agent && npx tsc --build tsconfig.json)

          wait_all

      - name: Package dist directories
        run: find packages -path '*/dist' -type d | tar czf /tmp/build-all-dist.tar.gz -T -

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-all-dist
          path: /tmp/build-all-dist.tar.gz
          if-no-files-found: error

  live_stack_bp_interactive:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip publish]') }}
    needs: [live_stack_vanilla_ni, live_stack_vanilla_interactive]
    name: Live Stack (babysitter-plugin, ${{ matrix.scenario.id }}, ${{ matrix.interaction_mode.id }}, os=ubuntu-latest)
    runs-on: ubuntu-latest-m
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        interaction_mode:
          - id: interactive
            interactive: 'true'
            bridge_interactive: 'false'
            bridge_hooks: 'false'
        install_mode:
          - id: babysitter-plugin
            required_trace_ids: agentMuxRunId,agentMuxSessionId,transportTraceId
            expected_artifacts: agent-mux-events,plugin-command-transcript,transport-mux-trace,provider-trace-redacted
        scenario:
          - id: live.agent-mux.claude-code.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.claude-code.google.gemini-3.1-pro
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: google
            amux_provider: google
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_API_KEY
          - id: live.agent-mux.codex.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: codex
            amux_agent: codex
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.codex.google.gemini-3.1-pro
            agent_path: agent-mux
            agent: codex
            amux_agent: codex
            integration_type: third-party-plugin
            provider: google
            amux_provider: google
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_API_KEY
            skip: 'true'
          - id: live.agent-mux.pi.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: pi
            amux_agent: pi
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
            skip: 'true'
          - id: live.agent-mux.pi.google.gemini-3.1-pro
            agent_path: agent-mux
            agent: pi
            amux_agent: pi
            integration_type: third-party-plugin
            provider: google
            amux_provider: google
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_API_KEY
            skip: 'true'
          - id: live.agent-mux.hermes.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: hermes
            amux_agent: hermes
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
            skip: 'true'
          - id: live.agent-mux.gemini-cli.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: gemini-cli
            amux_agent: gemini
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
            skip: 'true'
          - id: live.agent-mux.copilot-cli.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: copilot-cli
            amux_agent: copilot
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
            skip: 'true'
          - id: live.agent-mux.cursor-cli.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: cursor-cli
            amux_agent: cursor
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
            skip: 'true'
        exclude:
          - interaction_mode: { id: bridged-hooks }
            scenario: { amux_agent: pi }
    steps:
      - name: Skip marker
        if: ${{ matrix.scenario.skip == 'true' }}
        run: echo "LIVE_STACK_SKIP=1" >> "$GITHUB_ENV"

      - name: Checkout repository
        if: ${{ matrix.scenario.skip != 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ matrix.scenario.skip != 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        if: ${{ matrix.scenario.skip != 'true' }}
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: ${{ matrix.scenario.skip != 'true' && steps.nm-cache.outputs.cache-hit != 'true' }}
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        if: ${{ matrix.scenario.skip != 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        if: ${{ matrix.scenario.skip != 'true' }}
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Install node-pty for TTY-based tool use
        if: ${{ matrix.scenario.skip != 'true' }}
        run: npm install node-pty --no-save

      - name: Link workspace CLIs to PATH
        if: ${{ matrix.scenario.skip != 'true' }}
        run: |
          mkdir -p "$HOME/.local/bin"
          for pair in \
            "amux:packages/agent-mux/cli/dist/index.js" \
            "babysitter-agent:packages/babysitter-agent/dist/cli/main.js" \
            "babysitter:packages/sdk/dist/cli/main.js"
          do
            name="${pair%%:*}"
            script="${pair#*:}"
            printf '#!/bin/sh\nexec node "%s/%s" "$@"\n' "${{ github.workspace }}" "$script" > "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run selected live stack E2E
        if: ${{ matrix.scenario.skip != 'true' }}
        timeout-minutes: 18
        env:
          LIVE_STACK_SCENARIO_ID: ${{ matrix.scenario.id }}
          LIVE_STACK_AGENT_PATH: ${{ matrix.scenario.agent_path }}
          LIVE_STACK_AGENT: ${{ matrix.scenario.agent }}
          LIVE_STACK_AMUX_AGENT: ${{ matrix.scenario.amux_agent }}
          LIVE_STACK_INTEGRATION_TYPE: ${{ matrix.scenario.integration_type }}
          LIVE_STACK_BABYSITTER_HARNESS: ${{ matrix.scenario.babysitter_harness }}
          LIVE_STACK_INSTALL_MODE: ${{ matrix.install_mode.id }}
          LIVE_STACK_INTERACTION_MODE: ${{ matrix.interaction_mode.id }}
          LIVE_STACK_INTERACTIVE: ${{ matrix.interaction_mode.interactive }}
          LIVE_STACK_BRIDGE_INTERACTIVE: ${{ matrix.interaction_mode.bridge_interactive }}
          LIVE_STACK_BRIDGE_HOOKS: ${{ matrix.interaction_mode.bridge_hooks }}
          LIVE_STACK_USE_AMUX_RUN: 'false'
          LIVE_STACK_PROVIDER: ${{ matrix.scenario.provider }}
          LIVE_STACK_AMUX_PROVIDER: ${{ matrix.scenario.amux_provider }}
          LIVE_STACK_MODEL: ${{ matrix.scenario.model }}
          LIVE_STACK_CREDENTIAL_MODE: github-org-secrets-and-vars
          LIVE_STACK_REQUIRED_ENV: ${{ matrix.scenario.required_env }}
          LIVE_STACK_LAYERS: ${{ matrix.install_mode.id }}
          LIVE_STACK_COVERAGE_LAYERS: ${{ matrix.scenario.provider }},${{ matrix.scenario.agent }}
          LIVE_STACK_REQUIRED_TRACE_IDS: ${{ matrix.install_mode.required_trace_ids }}
          LIVE_STACK_EXPECTED_ARTIFACTS: ${{ matrix.install_mode.expected_artifacts }}
          LIVE_STACK_RUN_MODEL_TESTS: '1'
          LIVE_STACK_REQUIRE_EVIDENCE: '1'
          LIVE_STACK_TEST_TIMEOUT_MS: '780000'
          LIVE_STACK_COMMAND_TIMEOUT_MS: '720000'
          LIVE_STACK_BABYSITTER_BIN: ${{ github.workspace }}/packages/sdk/dist/cli/main.js
          LIVE_STACK_AMUX_BIN: ${{ github.workspace }}/packages/agent-mux/cli/dist/index.js
          LIVE_STACK_BABYSITTER_AGENT_BIN: ${{ github.workspace }}/packages/babysitter-agent/dist/cli/main.js
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_LOCATION: global
          GOOGLE_GENAI_USE_VERTEXAI: True
        run: |
          npm run test:e2e:live-stack:pipeline
          npm run coverage:e2e:live-stack

      - name: Upload live stack artifacts
        if: ${{ always() && matrix.scenario.skip != 'true' }}
        timeout-minutes: 1
        uses: actions/upload-artifact@v7
        with:
          name: live-stack-${{ github.run_id }}-${{ matrix.install_mode.id }}-${{ matrix.interaction_mode.id }}-${{ matrix.scenario.id }}
          path: artifacts/live-stack
          if-no-files-found: error

  live_stack_bp_bridged:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip publish]') }}
    needs: [live_stack_vanilla_ni, live_stack_vanilla_interactive]
    name: Live Stack (babysitter-plugin, ${{ matrix.scenario.id }}, ${{ matrix.interaction_mode.id }}, os=ubuntu-latest)
    runs-on: ubuntu-latest-m
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        interaction_mode:
          - id: bridged-hooks
            interactive: 'false'
            bridge_interactive: 'true'
            bridge_hooks: 'true'
        install_mode:
          - id: babysitter-plugin
            required_trace_ids: agentMuxRunId,agentMuxSessionId,transportTraceId
            expected_artifacts: agent-mux-events,plugin-command-transcript,transport-mux-trace,provider-trace-redacted
        scenario:
          - id: live.agent-mux.claude-code.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.claude-code.google.gemini-3.1-pro
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: google
            amux_provider: google
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_API_KEY
          - id: live.agent-mux.codex.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: codex
            amux_agent: codex
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.codex.google.gemini-3.1-pro
            agent_path: agent-mux
            agent: codex
            amux_agent: codex
            integration_type: third-party-plugin
            provider: google
            amux_provider: google
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_API_KEY
            skip: 'true'
          - id: live.agent-mux.pi.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: pi
            amux_agent: pi
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
            skip: 'true'
          - id: live.agent-mux.pi.google.gemini-3.1-pro
            agent_path: agent-mux
            agent: pi
            amux_agent: pi
            integration_type: third-party-plugin
            provider: google
            amux_provider: google
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_API_KEY
            skip: 'true'
        exclude:
          - interaction_mode: { id: bridged-hooks }
            scenario: { amux_agent: pi }
    steps:
      - name: Skip marker
        if: ${{ matrix.scenario.skip == 'true' }}
        run: echo "LIVE_STACK_SKIP=1" >> "$GITHUB_ENV"

      - name: Checkout repository
        if: ${{ matrix.scenario.skip != 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ matrix.scenario.skip != 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        if: ${{ matrix.scenario.skip != 'true' }}
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: ${{ matrix.scenario.skip != 'true' && steps.nm-cache.outputs.cache-hit != 'true' }}
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        if: ${{ matrix.scenario.skip != 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        if: ${{ matrix.scenario.skip != 'true' }}
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Install node-pty for TTY-based tool use
        if: ${{ matrix.scenario.skip != 'true' }}
        run: npm install node-pty --no-save

      - name: Link workspace CLIs to PATH
        if: ${{ matrix.scenario.skip != 'true' }}
        run: |
          mkdir -p "$HOME/.local/bin"
          for pair in \
            "amux:packages/agent-mux/cli/dist/index.js" \
            "babysitter-agent:packages/babysitter-agent/dist/cli/main.js" \
            "babysitter:packages/sdk/dist/cli/main.js"
          do
            name="${pair%%:*}"
            script="${pair#*:}"
            printf '#!/bin/sh\nexec node "%s/%s" "$@"\n' "${{ github.workspace }}" "$script" > "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run selected live stack E2E
        if: ${{ matrix.scenario.skip != 'true' }}
        timeout-minutes: 18
        env:
          LIVE_STACK_SCENARIO_ID: ${{ matrix.scenario.id }}
          LIVE_STACK_AGENT_PATH: ${{ matrix.scenario.agent_path }}
          LIVE_STACK_AGENT: ${{ matrix.scenario.agent }}
          LIVE_STACK_AMUX_AGENT: ${{ matrix.scenario.amux_agent }}
          LIVE_STACK_INTEGRATION_TYPE: ${{ matrix.scenario.integration_type }}
          LIVE_STACK_BABYSITTER_HARNESS: ${{ matrix.scenario.babysitter_harness }}
          LIVE_STACK_INSTALL_MODE: ${{ matrix.install_mode.id }}
          LIVE_STACK_INTERACTION_MODE: ${{ matrix.interaction_mode.id }}
          LIVE_STACK_INTERACTIVE: ${{ matrix.interaction_mode.interactive }}
          LIVE_STACK_BRIDGE_INTERACTIVE: ${{ matrix.interaction_mode.bridge_interactive }}
          LIVE_STACK_BRIDGE_HOOKS: ${{ matrix.interaction_mode.bridge_hooks }}
          LIVE_STACK_USE_AMUX_RUN: 'false'
          LIVE_STACK_PROVIDER: ${{ matrix.scenario.provider }}
          LIVE_STACK_AMUX_PROVIDER: ${{ matrix.scenario.amux_provider }}
          LIVE_STACK_MODEL: ${{ matrix.scenario.model }}
          LIVE_STACK_CREDENTIAL_MODE: github-org-secrets-and-vars
          LIVE_STACK_REQUIRED_ENV: ${{ matrix.scenario.required_env }}
          LIVE_STACK_LAYERS: ${{ matrix.install_mode.id }}
          LIVE_STACK_COVERAGE_LAYERS: ${{ matrix.scenario.provider }},${{ matrix.scenario.agent }}
          LIVE_STACK_REQUIRED_TRACE_IDS: ${{ matrix.install_mode.required_trace_ids }}
          LIVE_STACK_EXPECTED_ARTIFACTS: ${{ matrix.install_mode.expected_artifacts }}
          LIVE_STACK_RUN_MODEL_TESTS: '1'
          LIVE_STACK_REQUIRE_EVIDENCE: '1'
          LIVE_STACK_TEST_TIMEOUT_MS: '780000'
          LIVE_STACK_COMMAND_TIMEOUT_MS: '720000'
          LIVE_STACK_BABYSITTER_BIN: ${{ github.workspace }}/packages/sdk/dist/cli/main.js
          LIVE_STACK_AMUX_BIN: ${{ github.workspace }}/packages/agent-mux/cli/dist/index.js
          LIVE_STACK_BABYSITTER_AGENT_BIN: ${{ github.workspace }}/packages/babysitter-agent/dist/cli/main.js
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_LOCATION: global
          GOOGLE_GENAI_USE_VERTEXAI: True
        run: |
          npm run test:e2e:live-stack:pipeline
          npm run coverage:e2e:live-stack

      - name: Upload live stack artifacts
        if: ${{ always() && matrix.scenario.skip != 'true' }}
        timeout-minutes: 1
        uses: actions/upload-artifact@v7
        with:
          name: live-stack-${{ github.run_id }}-${{ matrix.install_mode.id }}-${{ matrix.interaction_mode.id }}-${{ matrix.scenario.id }}
          path: artifacts/live-stack
          if-no-files-found: error

  live_stack_babysitter_agent:
    if: false
    needs: build_all
    name: Live Stack (babysitter-agent, ${{ matrix.scenario.id }}, ${{ matrix.interaction_mode.id }}, os=ubuntu-latest)
    runs-on: ubuntu-latest-m
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        interaction_mode:
          - id: non-interactive
            interactive: 'false'
        install_mode:
          - id: babysitter-plugin
            required_trace_ids: agentMuxRunId,agentMuxSessionId,transportTraceId
            expected_artifacts: agent-mux-events,plugin-command-transcript,transport-mux-trace,provider-trace-redacted
