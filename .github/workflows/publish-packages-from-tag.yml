name: Publish Packages From Tag

on:
  push:
    tags:
      - 'babysitter/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: package-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_non_plugin_packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare staging prerelease manifests
        if: startsWith(github.ref_name, 'babysitter/staging/')
        run: |
          set -euo pipefail
          STAGING_VERSION="${GITHUB_REF_NAME#babysitter/staging/v}"
          export STAGING_VERSION
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const stagingVersion = process.env.STAGING_VERSION;
          const packageJsonPaths = new Set(['package.json']);
          const localPackageNames = new Set();
          const pluginManifestPaths = [
            'plugins/babysitter-unified/plugin.json',
            'plugins/babysitter/.claude-plugin/plugin.json',
            'plugins/babysitter/plugin.json',
            'plugins/babysitter-gemini/plugin.json',
            'plugins/babysitter-gemini/gemini-extension.json',
            'plugins/babysitter-github/plugin.json',
            'plugins/babysitter-cursor/plugin.json',
            'plugins/babysitter-opencode/plugin.json',
            'plugins/babysitter-openclaw/plugin.json',
            'plugins/babysitter-openclaw/openclaw.plugin.json',
          ];
          const versionsJsonPaths = [
            'plugins/babysitter/versions.json',
            'plugins/babysitter-codex/versions.json',
            'plugins/babysitter-gemini/versions.json',
            'plugins/babysitter-pi/versions.json',
            'plugins/babysitter-omp/versions.json',
            'plugins/babysitter-opencode/versions.json',
            'plugins/babysitter-openclaw/versions.json',
            'plugins/babysitter-github/versions.json',
            'plugins/babysitter-cursor/versions.json',
            'plugins/babysitter-paperclip/versions.json',
          ];
          const fields = ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies'];
          const skipDirs = new Set(['.git', '.a5c', 'node_modules', 'dist', 'build', 'coverage', 'artifacts', 'generated', 'examples']);

          function collectPackageJsons(dir) {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (!skipDirs.has(entry.name)) collectPackageJsons(fullPath);
                continue;
              }
              if (entry.isFile() && entry.name === 'package.json') {
                packageJsonPaths.add(fullPath);
              }
            }
          }

          for (const rootDir of ['packages', 'plugins']) {
            collectPackageJsons(rootDir);
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (String(pkg.name || '').startsWith('@a5c-ai/')) {
              localPackageNames.add(pkg.name);
            }
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            let changed = false;
            if (pkgPath === 'package.json' || localPackageNames.has(pkg.name)) {
              if (pkg.version !== stagingVersion) {
                pkg.version = stagingVersion;
                changed = true;
              }
            }
            for (const field of fields) {
              if (!pkg[field]) continue;
              for (const [depName, currentValue] of Object.entries(pkg[field])) {
                if (!localPackageNames.has(depName)) continue;
                if (currentValue !== stagingVersion) {
                  pkg[field][depName] = stagingVersion;
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
            }
          }

          for (const manifestPath of pluginManifestPaths) {
            if (!fs.existsSync(manifestPath)) continue;
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            manifest.version = stagingVersion;
            fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          }

          for (const versionsPath of versionsJsonPaths) {
            const versions = fs.existsSync(versionsPath) ? JSON.parse(fs.readFileSync(versionsPath, 'utf8')) : {};
            versions.sdkVersion = stagingVersion;
            if (versionsPath === 'plugins/babysitter-gemini/versions.json') {
              versions.extensionVersion = stagingVersion;
            }
            fs.writeFileSync(versionsPath, `${JSON.stringify(versions, null, 2)}\n`);
          }
          NODE

      - name: Publish package from tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-catalog
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/breakpoints-mux
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/cloud
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-observability
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-core
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-core
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-adapters
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-harness-mock
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/transport-mux
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/triggers
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-gateway
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-cli
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-core
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter-sdk
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-plugins-mux
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-claude
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-codex
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-gemini
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-copilot
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-cursor
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-pi
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-oh-my-pi
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-opencode
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-adapter-openclaw
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/hooks-mux-cli
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-ui
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-webui
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-mux-tui
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter-observer-dashboard
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter-agent
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter
