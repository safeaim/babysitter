name: Publish Packages From Tag

on:
  push:
    tags:
      - 'babysitter/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: package-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_non_plugin_packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Publish package from tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-catalog
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter-sdk
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-core
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter-agent
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/agent-plugins-mux
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter-observer-dashboard
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/cloud
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/breakpoints-mux
          node scripts/publish-package-from-tag.mjs --workspace=@a5c-ai/babysitter
