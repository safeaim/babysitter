name: Publish Packages From Tag

on:
  push:
    tags:
      - 'babysitter/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: package-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_non_plugin_packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-catalog
            publish: npm publish --workspace=@a5c-ai/agent-catalog --access public
          - name: agent-core
            publish: npm publish --workspace=@a5c-ai/agent-core --access public
          - name: babysitter-agent
            publish: npm publish --workspace=@a5c-ai/babysitter-agent --access public
          - name: babysitter-sdk
            publish: npm publish --workspace=@a5c-ai/babysitter-sdk --access public
          - name: agent-plugins-mux
            publish: npm publish --workspace=@a5c-ai/agent-plugins-mux --access public
          - name: observer-dashboard
            publish: npm publish --workspace=@a5c-ai/babysitter-observer-dashboard --access public
          - name: cloud
            publish: npm publish --workspace=@a5c-ai/cloud --access public
          - name: breakpoints-mux
            publish: npm publish --workspace=@a5c-ai/breakpoints-mux --access public
          - name: babysitter-metapackage
            publish: npm publish --access public --workspace=@a5c-ai/babysitter
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Publish package from tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}
