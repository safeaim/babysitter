          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build agent-mux TUI workspace
        run: |
          set -euo pipefail
          for workspace in \
            @a5c-ai/atlas \
            @a5c-ai/agent-catalog \
            @a5c-ai/agent-mux-observability \
            @a5c-ai/agent-mux-core \
            @a5c-ai/agent-mux-adapters \
            @a5c-ai/agent-mux-gateway \
            @a5c-ai/transport-mux \
            @a5c-ai/agent-mux-cli \
            @a5c-ai/agent-mux \
            @a5c-ai/agent-mux-tui
          do
            npm run build --workspace="$workspace"
          done

      - name: Publish agent-mux TUI
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=@a5c-ai/agent-mux-tui --access public --tag "$NPM_TAG"

  deploy_docs_site:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') && github.ref_name != 'develop' }}
    name: Deploy Docs Site
    needs:
      - prepare_publish
      - publish_atlas
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_publish.outputs.publish_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Run docs QA
        env:
