name: Publish

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NPM_TAG: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
  PUBLISH_BRANCH: ${{ github.ref_name }}

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build_all:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Build All Packages
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build hooks-mux (all adapters)
        run: |
          set -euo pipefail
          npm run build:hooks-mux

      - name: Build runtime (SDK, agent-mux, agent-core, babysitter-agent)
        run: |
          set -euo pipefail
          npm run build:runtime

      - name: Build remaining mux packages
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-mux-tui
          npm run build --workspace=@a5c-ai/triggers
          npm run build --workspace=@a5c-ai/agent-mux-webui

      - name: Build observer and compiler
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux
          npm run build:observer

      - name: Build cloud
        run: |
          set -euo pipefail
          npm run build:cloud

      - name: Package all dist directories
        run: |
          find packages -path '*/dist' -type d | tar czf /tmp/build-all-dist.tar.gz -T -

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-all-dist
          path: /tmp/build-all-dist.tar.gz
          retention-days: 1

  validate_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Validate Core Runtime
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Download pre-built dist directories
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract dist directories
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/core-logs

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/core-logs/metadata.log

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/core-logs/architecture.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/core-logs/lint.log

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/core-logs/sdk-tests.log

      - name: agent-core tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/core-logs/agent-core-tests.log

      - name: babysitter-harness tests
        if: ${{ false }} # temporarily skipped; keep step for re-enabling
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/core-logs/babysitter-harness-tests.log

      - name: Upload core validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-core-logs
          path: artifacts/core-logs
          if-no-files-found: warn

  validate_mux:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Validate Mux Surfaces
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Download pre-built dist directories
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract dist directories
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/mux-logs

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/mux-logs/hooks-mux-tests.log

      - name: agent-mux package tests
        run: |
          set -euo pipefail
          node scripts/agent-mux-build.cjs test packages/agent-mux/observability 2>&1 | tee artifacts/mux-logs/agent-mux-observability-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/core 2>&1 | tee artifacts/mux-logs/agent-mux-core-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/adapters 2>&1 | tee artifacts/mux-logs/agent-mux-adapters-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/harness-mock 2>&1 | tee artifacts/mux-logs/agent-mux-harness-mock-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/gateway 2>&1 | tee artifacts/mux-logs/agent-mux-gateway-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/cli 2>&1 | tee artifacts/mux-logs/agent-mux-cli-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/sdk 2>&1 | tee artifacts/mux-logs/agent-mux-sdk-tests.log
          npm run test:unit --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-tests.log
          npm run test:e2e --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-e2e.log
          npm run test:coverage --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-coverage.log

      - name: Verify non-realtime agent-mux release artifacts
        run: |
          set -euo pipefail
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-release.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-scorecard.log

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/mux-logs/agent-mux-webui-playwright-install.log

      - name: agent-mux webui browser e2e
        run: |
          set -euo pipefail
          npm run test:e2e --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-browser-e2e.log

      - name: Upload mux Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-mux-playwright-artifacts
          path: |
            packages/agent-mux/webui/.tmp/playwright-report
            packages/agent-mux/webui/.tmp/playwright-test-results
          if-no-files-found: warn

      - name: Upload mux validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-mux-logs
          path: artifacts/mux-logs
          if-no-files-found: warn

  agent_mux_hooks_mux_e2e:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Agent Mux Hooks-Mux (${{ matrix.agent.id }})
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        agent:
          - id: claude-code
            amux_agent: claude
            hooks_adapter: claude
            hook_type: PreToolUse
            native_event: PreToolUse
            expected_phase: tool.before
            payload_json: '{"session_id":"hmx-claude-1","cwd":"/workspace/claude","model":"gpt-5.5","tool_name":"Bash","tool_call_id":"claude-tool-1","tool_input":{"command":"pwd"}}'
          - id: codex
            amux_agent: codex
            hooks_adapter: codex
            hook_type: PreToolUse
            native_event: PreToolUse
            expected_phase: tool.before
            payload_json: '{"session_id":"hmx-codex-1","cwd":"/workspace/codex","model":"gpt-5.5","tool_name":"bash","tool_call_id":"codex-tool-1","tool_input":{"command":"pwd"}}'
          - id: pi
            amux_agent: pi
            hooks_adapter: pi
            hook_type: tool_call
            native_event: tool_call
            expected_phase: tool.before
            payload_json: '{"sessionId":"hmx-pi-1","cwd":"/workspace/pi","model":"gpt-5.5","toolName":"Bash","toolCallId":"pi-tool-1","toolInput":{"command":"pwd"}}'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Download pre-built dist directories
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract dist directories
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Run agent-mux hooks-mux lane
        env:
          AGENT_MUX_HOOKS_MUX_MATRIX: "1"
          AGENT_MUX_HOOKS_MUX_AMUX_AGENT: ${{ matrix.agent.amux_agent }}
          AGENT_MUX_HOOKS_MUX_ADAPTER: ${{ matrix.agent.hooks_adapter }}
          AGENT_MUX_HOOKS_MUX_HOOK_TYPE: ${{ matrix.agent.hook_type }}
          AGENT_MUX_HOOKS_MUX_NATIVE_EVENT: ${{ matrix.agent.native_event }}
          AGENT_MUX_HOOKS_MUX_EXPECTED_PHASE: ${{ matrix.agent.expected_phase }}
          AGENT_MUX_HOOKS_MUX_PAYLOAD_JSON: ${{ matrix.agent.payload_json }}
          AGENT_MUX_HOOKS_MUX_ARTIFACT_DIR: artifacts/agent-mux-hooks-mux
        run: npm run test:e2e:agent-mux-hooks-mux

      - name: Upload agent-mux hooks-mux artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-agent-mux-hooks-mux-${{ matrix.agent.id }}
          path: artifacts/agent-mux-hooks-mux
          if-no-files-found: error

  no_model_mock_matrix:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: No-Model Stack (${{ matrix.runtime.id }}, ${{ matrix.agent.id }}, hooks=${{ matrix.hooks.id }})
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - id: agent-mux-mocks
            description: agent-mux mock harness path with a transport-mux mock model
          - id: real-agent
            description: real harness CLI path installed as local CI shim with a transport-mux mock model
        agent:
          - id: claude
          - id: codex
          - id: pi
          - id: gemini
        hooks:
          - id: none
            description: launch/session plus transport-mux request evidence only
          - id: hooks-mux
            description: launch/session plus hooks-mux normalized hook evidence
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Download pre-built dist directories
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract dist directories
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Run selected no-model stack lane
        env:
          NO_MODEL_STACK_MATRIX: '1'
          NO_MODEL_STACK_AGENT: ${{ matrix.agent.id }}
          NO_MODEL_STACK_RUNTIME: ${{ matrix.runtime.id }}
          NO_MODEL_STACK_HOOKS: ${{ matrix.hooks.id }}
          NO_MODEL_STACK_ARTIFACT_DIR: artifacts/no-model-stack-matrix
        run: npm run test:e2e:agent-mux-no-model-stack

      - name: Upload no-model stack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-no-model-stack-${{ matrix.runtime.id }}-${{ matrix.agent.id }}-${{ matrix.hooks.id }}
          path: artifacts/no-model-stack-matrix
          if-no-files-found: error

  live_stack_e2e:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Live Stack (${{ matrix.install_mode.id }}, ${{ matrix.scenario.id }}, os=${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest-l]
        install_mode:
          - id: babysitter-plugin
            layers: agent-mux install,agent-mux invocation,generated Babysitter plugin package,Babysitter SDK installation,plugin babysitter command dispatch,session persistence,native stop hook,hooks-mux normalization,transport-mux route,provider/model trace
            coverage_layers: agent-mux,plugin,transport-mux,hooks-mux,babysitter-sdk
            required_trace_ids: agentMuxRunId,agentMuxSessionId,transportTraceId
            expected_artifacts: agent-mux-events,plugin-command-transcript,transport-mux-trace,provider-trace-redacted
          - id: vanilla
            layers: agent-mux install,agent-mux invocation,vanilla agent prompt,transport-mux route,provider/model trace
            coverage_layers: agent-mux,transport-mux
            required_trace_ids: agentMuxRunId,agentMuxSessionId,transportTraceId
            expected_artifacts: agent-mux-events,transport-mux-trace,provider-trace-redacted
        exclude:
          - install_mode:
              id: babysitter-plugin
            scenario:
              id: live.agent-mux.babysitter-agent.foundry-openai.gpt-5.5
        scenario:
          - id: live.agent-mux.claude-code.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            credential_mode: github-org-secrets-and-vars
            required_env: AZURE_API_KEY,AMUX_API_BASE
            coverage_layers: foundry-openai,claude-code,transport-mux
          - id: live.agent-mux.babysitter-agent.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: babysitter-agent
            amux_agent: babysitter
            integration_type: third-party-plugin
            babysitter_harness: agent-core
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            credential_mode: github-org-secrets-and-vars
            required_env: AZURE_API_KEY,AMUX_API_BASE
            coverage_layers: foundry-openai,babysitter-agent,agent-core
          - id: live.agent-mux.codex.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: codex
            amux_agent: codex
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            credential_mode: github-org-secrets-and-vars
            required_env: AZURE_API_KEY,AMUX_API_BASE
            coverage_layers: foundry-openai,codex
          - id: live.agent-mux.pi.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: pi
            amux_agent: pi
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            credential_mode: github-org-secrets-and-vars
            required_env: AZURE_API_KEY,AMUX_API_BASE
            coverage_layers: foundry-openai,pi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Download pre-built dist directories
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract dist directories
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Link workspace CLIs to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          for pair in \
            "amux:packages/agent-mux/cli/dist/index.js" \
            "babysitter-agent:packages/babysitter-agent/dist/cli/main.js" \
            "babysitter:packages/sdk/dist/cli/main.js"
          do
            name="${pair%%:*}"
            script="${pair#*:}"
            printf '#!/bin/sh\nexec node "%s/%s" "$@"\n' "${{ github.workspace }}" "$script" > "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run selected live stack E2E
        env:
          LIVE_STACK_SCENARIO_ID: ${{ matrix.scenario.id }}
          LIVE_STACK_AGENT_PATH: ${{ matrix.scenario.agent_path }}
          LIVE_STACK_AGENT: ${{ matrix.scenario.agent }}
          LIVE_STACK_AMUX_AGENT: ${{ matrix.scenario.amux_agent }}
          LIVE_STACK_INTEGRATION_TYPE: ${{ matrix.scenario.integration_type }}
          LIVE_STACK_BABYSITTER_HARNESS: ${{ matrix.scenario.babysitter_harness }}
          LIVE_STACK_INSTALL_MODE: ${{ matrix.install_mode.id }}
          LIVE_STACK_PROVIDER: ${{ matrix.scenario.provider }}
          LIVE_STACK_AMUX_PROVIDER: ${{ matrix.scenario.amux_provider }}
          LIVE_STACK_MODEL: ${{ matrix.scenario.model }}
          LIVE_STACK_CREDENTIAL_MODE: ${{ matrix.scenario.credential_mode }}
          LIVE_STACK_REQUIRED_ENV: ${{ matrix.scenario.required_env }}
          LIVE_STACK_LAYERS: ${{ matrix.install_mode.layers }}
          LIVE_STACK_COVERAGE_LAYERS: ${{ matrix.scenario.coverage_layers }},${{ matrix.install_mode.coverage_layers }}
          LIVE_STACK_REQUIRED_TRACE_IDS: ${{ matrix.install_mode.required_trace_ids }}
          LIVE_STACK_EXPECTED_ARTIFACTS: ${{ matrix.install_mode.expected_artifacts }}
          LIVE_STACK_RUN_MODEL_TESTS: "1"
          LIVE_STACK_REQUIRE_EVIDENCE: "1"
          LIVE_STACK_TEST_TIMEOUT_MS: "1800000"
          LIVE_STACK_COMMAND_TIMEOUT_MS: "1500000"
          LIVE_STACK_BABYSITTER_BIN: ${{ github.workspace }}/packages/sdk/dist/cli/main.js
          LIVE_STACK_AMUX_BIN: ${{ github.workspace }}/packages/agent-mux/cli/dist/index.js
          LIVE_STACK_BABYSITTER_AGENT_BIN: ${{ github.workspace }}/packages/babysitter-agent/dist/cli/main.js
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
        run: |
          npm run test:e2e:live-stack:pipeline
          npm run coverage:e2e:live-stack

      - name: Upload live stack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-live-stack-${{ matrix.install_mode.id }}-${{ matrix.scenario.id }}-${{ matrix.os }}
          path: artifacts/live-stack
          if-no-files-found: error

  validate_cloud:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Validate Cloud Workspace
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Download pre-built dist directories
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract dist directories
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/cloud-logs

      - name: Validate cloud deployment workspace
        run: |
          set -euo pipefail
          npm run test:cloud 2>&1 | tee artifacts/cloud-logs/cloud-tests.log
          npm run coverage:cloud 2>&1 | tee artifacts/cloud-logs/cloud-coverage.log
          npm run verify:cloud-release 2>&1 | tee artifacts/cloud-logs/cloud-release.log

      - name: Upload cloud validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-cloud-logs
          path: artifacts/cloud-logs
          if-no-files-found: warn

  validate_observer_and_compiler:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Validate Observer And Compiler
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Download pre-built dist directories
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract dist directories
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/observer-compiler-logs

      - name: Test agent-plugins-mux
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-tests.log

      - name: Generate unified plugin bundles
        run: |
          set -euo pipefail
          npm run generate:plugins 2>&1 | tee artifacts/observer-compiler-logs/generated-plugin-bundles.log

      - name: Test observer-dashboard
        run: |
          set -euo pipefail
          npm run test:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-tests.log

      - name: Upload observer and compiler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-observer-compiler-logs
          path: artifacts/observer-compiler-logs
          if-no-files-found: warn

  prepare_publish_base:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Prepare Publish Base
    needs:
      - validate_core
      - validate_mux
      - validate_cloud
      - validate_observer_and_compiler
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      publish_version: ${{ steps.version.outputs.publish_version }}
      publish_ref: ${{ steps.publish_ref.outputs.publish_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set publish version
        id: version
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          SHORT_SHA=$(git rev-parse --short HEAD)
          case "${GITHUB_REF_NAME}" in
            main)
              PUBLISH_VERSION=$(node scripts/bump-version.mjs)
              node scripts/release-notes.mjs > release-notes.md
              ;;
            staging|develop)
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              NEXT_PATCH=$((PATCH + 1))
              PUBLISH_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-${GITHUB_REF_NAME}.${SHORT_SHA}"
              node scripts/sync-workspace-versions.mjs --version "$PUBLISH_VERSION"
              ;;
            *)
              echo "Unsupported publish branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac
          npm install --package-lock-only --ignore-scripts --workspaces --include-workspace-root
          echo "publish_version=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "Setting ${GITHUB_REF_NAME} publish version: $PUBLISH_VERSION"

      - name: Commit release metadata to main
        if: ${{ github.ref_name == 'main' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          shopt -s globstar nullglob
          git add \
            package.json \
            package-lock.json \
            CHANGELOG.md \
            plugins/babysitter-unified/plugin.json \
            plugins/babysitter-unified/versions.json \
            .claude-plugin/marketplace.json \
            packages/**/package.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "chore(release): v${{ steps.version.outputs.publish_version }} [skip publish]"
            if git push origin HEAD:"${GITHUB_REF_NAME}" 2>/dev/null; then
              echo "Release metadata committed and pushed."
            elif git pull --rebase --autostash origin "${GITHUB_REF_NAME}" 2>/dev/null && git push origin HEAD:"${GITHUB_REF_NAME}" 2>/dev/null; then
              echo "Release metadata committed after rebase."
            else
              echo "::warning::Could not push release metadata commit (concurrent run conflict). Continuing with local release ref."
              git rebase --abort 2>/dev/null || true
            fi
          fi

      - name: Commit sdkVersion to non-production publish branch
        if: ${{ github.ref_name != 'main' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/babysitter-unified/versions.json
          if git diff --cached --quiet; then
            echo "No sdkVersion changes to commit."
          else
            git commit -m "chore: set sdkVersion to ${{ steps.version.outputs.publish_version }} [skip publish]"
            if git push origin HEAD:"${GITHUB_REF_NAME}" 2>/dev/null; then
              echo "sdkVersion committed and pushed."
            elif git pull --rebase --autostash origin "${GITHUB_REF_NAME}" 2>/dev/null && git push origin HEAD:"${GITHUB_REF_NAME}" 2>/dev/null; then
              echo "sdkVersion committed after rebase."
            else
              echo "::warning::Could not push sdkVersion commit (concurrent run conflict). Skipping - npm publish already succeeded."
              git rebase --abort 2>/dev/null || true
            fi
          fi

      - name: Capture publish ref
        id: publish_ref
        run: echo "publish_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"


      - name: Bundle publish workspace
        run: |
          set -euo pipefail
          mkdir -p artifacts/publish-source
          tar --exclude=.git --exclude=node_modules --exclude=artifacts -czf artifacts/publish-source/publish-source.tgz .

      - name: Upload publish workspace
        uses: actions/upload-artifact@v4
        with:
          name: publish-source
          path: artifacts/publish-source/publish-source.tgz
          if-no-files-found: error

