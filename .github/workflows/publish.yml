          npm run build:sdk
          npm run build --workspace=@a5c-ai/agent-core
          npm run build --workspace=@a5c-ai/babysitter-agent

      - name: Publish babysitter-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=@a5c-ai/babysitter-agent --access public --tag "$NPM_TAG"

  deploy_docs_site:
    if: ${{ github.ref_name != 'develop' }}
    name: Deploy Docs Site
    needs:
      - build_all
    runs-on: ubuntu-latest-l
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Run docs QA
        run: npm run docs:qa

      - name: Build docs
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/build

      - name: Deploy docs
        id: deployment
        uses: actions/deploy-pages@v5

  deploy_atlas_webui:
    name: Deploy Atlas WebUI To AKS
    needs:
      - build_all
    runs-on: ubuntu-latest-l
    environment:
      name: atlas-${{ github.ref_name == 'main' && 'production' || github.ref_name }}
      url: ${{ github.ref_name == 'main' && 'https://atlas.a5c.ai' || github.ref_name == 'staging' && 'https://atlas-staging.a5c.ai' || 'https://atlas-develop.a5c.ai' }}
    env:
      ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      APP_NAME: atlas-webui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check deployment configuration
        id: config
        env:
          KUBE_CONFIG_SECRET: ${{ secrets.KUBE_CONFIG }}
          AZURE_CLIENT_ID_VAR: ${{ vars.AZURE_APPLICATION_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_APPLICATION_CLIENT_SECRET }}
        run: |
          missing=()
          [[ -n "${KUBE_CONFIG_SECRET}" ]] || missing+=("KUBE_CONFIG")
          [[ -n "${AZURE_CLIENT_ID_VAR}" ]] || missing+=("AZURE_APPLICATION_CLIENT_ID")
          [[ -n "${AZURE_CLIENT_SECRET}" ]] || missing+=("AZURE_APPLICATION_CLIENT_SECRET")
          [[ -n "${ACR_NAME}" ]] || missing+=("AZURE_ACR_NAME")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Atlas WebUI deploy missing required configuration: ${missing[*]}"
            exit 1
          fi

      - name: Resolve deployment target
        run: |
          case "${GITHUB_REF_NAME}" in
            main)    NS=atlas;         HOST=atlas.a5c.ai;         RG="${{ vars.A5C_CLOUD_PROD_RESOURCE_GROUP }}" ;;
            staging) NS=atlas-staging; HOST=atlas-staging.a5c.ai; RG="${{ vars.A5C_CLOUD_STAGING_RESOURCE_GROUP }}" ;;
            develop) NS=atlas-develop; HOST=atlas-develop.a5c.ai; RG="${{ vars.A5C_CLOUD_STAGING_RESOURCE_GROUP }}" ;;
            *)       echo "Unsupported branch" >&2; exit 1 ;;
          esac
          echo "KUBE_NAMESPACE=$NS" >> "$GITHUB_ENV"
          echo "APP_HOST=$HOST" >> "$GITHUB_ENV"
          echo "AZURE_RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Azure login for ACR push
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_APPLICATION_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_APPLICATION_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE="${ACR_NAME}.azurecr.io/${APP_NAME}:${IMAGE_TAG}"
          docker buildx build \
            --file packages/atlas/webui/Dockerfile \
            --tag "$IMAGE" \
            --cache-from type=gha,scope=atlas-webui \
            --cache-to type=gha,mode=max,scope=atlas-webui \
            --push .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Create ACR pull secret
        run: |
          kubectl create namespace "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          ACR_TOKEN=$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)
          kubectl -n "$KUBE_NAMESPACE" create secret docker-registry acr-pull \
            --docker-server="${ACR_NAME}.azurecr.io" \
            --docker-username=00000000-0000-0000-0000-000000000000 \
            --docker-password="$ACR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Atlas auth secret
        env:
          ATLAS_GITHUB_CLIENT_ID: ${{ vars.ATLAS_GITHUB_CLIENT_ID }}
          ATLAS_GITHUB_CLIENT_SECRET: ${{ secrets.ATLAS_GITHUB_CLIENT_SECRET }}
        run: |
          if [[ -n "${ATLAS_GITHUB_CLIENT_ID}" && -n "${ATLAS_GITHUB_CLIENT_SECRET}" ]]; then
            kubectl -n "$KUBE_NAMESPACE" create secret generic atlas-auth \
              --from-literal=GITHUB_CLIENT_ID="$ATLAS_GITHUB_CLIENT_ID" \
              --from-literal=GITHUB_CLIENT_SECRET="$ATLAS_GITHUB_CLIENT_SECRET" \
              --from-literal=AUTH_SECRET="$(openssl rand -hex 32)" \
              --dry-run=client -o yaml | kubectl apply -f -
          else
            echo "::notice::Atlas GitHub OAuth not configured"
          fi

      - name: Provision Atlas Postgres
        env:
          ATLAS_POSTGRES_STORAGE_ACCOUNT: ${{ vars.ATLAS_POSTGRES_STORAGE_ACCOUNT }}
          ATLAS_POSTGRES_STORAGE_KEY: ${{ secrets.ATLAS_POSTGRES_STORAGE_KEY }}
        run: |
          POSTGRES_APP=atlas-postgres
          POSTGRES_DB=atlas_webui
          POSTGRES_USER=atlas

          if kubectl -n "$KUBE_NAMESPACE" get secret "$POSTGRES_APP" >/dev/null 2>&1; then
            POSTGRES_PASSWORD=$(kubectl -n "$KUBE_NAMESPACE" get secret "$POSTGRES_APP" -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)
          else
            POSTGRES_PASSWORD=$(openssl rand -hex 32)
          fi

          if [[ -z "$POSTGRES_PASSWORD" ]]; then
            POSTGRES_PASSWORD=$(openssl rand -hex 32)
          fi

          DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_APP}:5432/${POSTGRES_DB}"
          kubectl -n "$KUBE_NAMESPACE" create secret generic "$POSTGRES_APP" \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

          POSTGRES_PVC="data-${POSTGRES_APP}-0"
          POSTGRES_PV="${KUBE_NAMESPACE}-${POSTGRES_APP}"
          POSTGRES_STORAGE_CLASS="atlas-postgres-static"
          POSTGRES_SHARE="${KUBE_NAMESPACE}-${POSTGRES_APP}"
          if [[ -n "${ATLAS_POSTGRES_STORAGE_ACCOUNT:-}" && -n "${ATLAS_POSTGRES_STORAGE_KEY:-}" ]]; then
            STORAGE_ACCOUNT="$ATLAS_POSTGRES_STORAGE_ACCOUNT"
            STORAGE_KEY="$ATLAS_POSTGRES_STORAGE_KEY"
            echo "Using configured Atlas Postgres storage account ${STORAGE_ACCOUNT}"
          else
            if [[ -z "${AZURE_RESOURCE_GROUP:-}" ]]; then
              NODE_PROVIDER_ID=$(kubectl get nodes -o jsonpath='{.items[0].spec.providerID}')
              NODE_RESOURCE_GROUP=$(echo "$NODE_PROVIDER_ID" | sed -E 's#.*resourceGroups/([^/]+)/.*#\1#')
              NODE_RESOURCE_GROUP_LOWER=$(echo "$NODE_RESOURCE_GROUP" | tr '[:upper:]' '[:lower:]')
              if [[ "$NODE_RESOURCE_GROUP_LOWER" == mc_* ]]; then
                AZURE_RESOURCE_GROUP=$(echo "$NODE_RESOURCE_GROUP" | cut -d_ -f2)
                AZURE_LOCATION=$(echo "$NODE_RESOURCE_GROUP" | awk -F_ '{print $NF}')
                echo "Using AKS cluster resource group ${AZURE_RESOURCE_GROUP} for Atlas Postgres storage"
              else
                AZURE_RESOURCE_GROUP="$NODE_RESOURCE_GROUP"
                echo "Using AKS provider resource group ${AZURE_RESOURCE_GROUP} for Atlas Postgres storage"
              fi
            fi
            AZURE_LOCATION="${AZURE_LOCATION:-$(az group show --name "$AZURE_RESOURCE_GROUP" --query location -o tsv)}"
            SUBSCRIPTION_HASH=$(az account show --query id -o tsv | tr -d '-' | cut -c1-8)
            STORAGE_ACCOUNT="a5catlaspg${SUBSCRIPTION_HASH}"

            if ! az storage account show --name "$STORAGE_ACCOUNT" --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
              az storage account create \
                --name "$STORAGE_ACCOUNT" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --location "$AZURE_LOCATION" \
                --sku Standard_LRS \
                --kind StorageV2 \
                --https-only true \
                --allow-blob-public-access false \
                --min-tls-version TLS1_2 >/dev/null
            fi
            STORAGE_KEY=$(az storage account keys list --resource-group "$AZURE_RESOURCE_GROUP" --account-name "$STORAGE_ACCOUNT" --query '[0].value' -o tsv)
          fi
          az storage share create --account-name "$STORAGE_ACCOUNT" --account-key "$STORAGE_KEY" --name "$POSTGRES_SHARE" --quota 8 >/dev/null

          kubectl -n "$KUBE_NAMESPACE" create secret generic atlas-postgres-azure-file \
            --from-literal=azurestorageaccountname="$STORAGE_ACCOUNT" \
            --from-literal=azurestorageaccountkey="$STORAGE_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$KUBE_NAMESPACE" delete statefulset "$POSTGRES_APP" --ignore-not-found --wait=true

          if kubectl -n "$KUBE_NAMESPACE" get pvc "$POSTGRES_PVC" >/dev/null 2>&1; then
            POSTGRES_PVC_PHASE=$(kubectl -n "$KUBE_NAMESPACE" get pvc "$POSTGRES_PVC" -o jsonpath='{.status.phase}')
            if [[ "$POSTGRES_PVC_PHASE" != "Bound" ]]; then
              echo "Deleting non-bound Atlas Postgres PVC ${POSTGRES_PVC} in phase ${POSTGRES_PVC_PHASE:-unknown}"
              kubectl -n "$KUBE_NAMESPACE" delete pod "${POSTGRES_APP}-0" --ignore-not-found --wait=false
              kubectl -n "$KUBE_NAMESPACE" delete pvc "$POSTGRES_PVC" --ignore-not-found
              kubectl delete pv "$POSTGRES_PV" --ignore-not-found
            fi
          fi

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: ${POSTGRES_PV}
            labels:
              app: ${POSTGRES_APP}
          spec:
            capacity:
              storage: 8Gi
            accessModes:
              - ReadWriteMany
            persistentVolumeReclaimPolicy: Retain
            storageClassName: ${POSTGRES_STORAGE_CLASS}
            mountOptions:
              - dir_mode=0700
              - file_mode=0600
              - uid=70
              - gid=70
              - mfsymlinks
              - cache=strict
              - nosharesock
            claimRef:
              namespace: ${KUBE_NAMESPACE}
              name: ${POSTGRES_PVC}
            csi:
              driver: file.csi.azure.com
              readOnly: false
              volumeHandle: ${POSTGRES_PV}-${STORAGE_ACCOUNT}
              volumeAttributes:
                shareName: ${POSTGRES_SHARE}
              nodeStageSecretRef:
                name: atlas-postgres-azure-file
                namespace: ${KUBE_NAMESPACE}
          EOF

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: ${POSTGRES_APP}
            namespace: ${KUBE_NAMESPACE}
          spec:
            selector:
              app: ${POSTGRES_APP}
            ports:
              - name: postgres
                port: 5432
                targetPort: 5432
          ---
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: ${POSTGRES_APP}
            namespace: ${KUBE_NAMESPACE}
          spec:
            serviceName: ${POSTGRES_APP}
            replicas: 1
            selector:
              matchLabels:
                app: ${POSTGRES_APP}
            template:
              metadata:
                labels:
                  app: ${POSTGRES_APP}
              spec:
                containers:
                  - name: postgres
                    image: postgres:16-alpine
                    imagePullPolicy: IfNotPresent
                    ports:
                      - containerPort: 5432
                    envFrom:
                      - secretRef:
                          name: ${POSTGRES_APP}
                    env:
                      - name: PGDATA
                        value: /var/lib/postgresql/data/pgdata
                    readinessProbe:
                      exec:
                        command:
                          - sh
                          - -c
                          - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      failureThreshold: 30
                    volumeMounts:
                      - name: data
                        mountPath: /var/lib/postgresql/data
            volumeClaimTemplates:
              - metadata:
                  name: data
                spec:
                  storageClassName: ${POSTGRES_STORAGE_CLASS}
                  accessModes:
                    - ReadWriteMany
                  resources:
                    requests:
                      storage: 8Gi
          EOF
          if ! kubectl -n "$KUBE_NAMESPACE" rollout status statefulset/"$POSTGRES_APP" --timeout=300s; then
            kubectl -n "$KUBE_NAMESPACE" get pods -l app="$POSTGRES_APP" -o wide || true
            kubectl -n "$KUBE_NAMESPACE" get pvc "$POSTGRES_PVC" -o wide || true
            kubectl get pv "$POSTGRES_PV" -o wide || true
            kubectl get storageclass -o wide || true
            kubectl -n "$KUBE_NAMESPACE" describe pods -l app="$POSTGRES_APP" || true
            kubectl -n "$KUBE_NAMESPACE" describe pvc "$POSTGRES_PVC" || true
            kubectl describe pv "$POSTGRES_PV" || true
            kubectl -n "$KUBE_NAMESPACE" logs statefulset/"$POSTGRES_APP" --tail=100 || true
            exit 1
          fi

      - name: Initialize Atlas database
        run: |
          kubectl -n "$KUBE_NAMESPACE" delete job atlas-webui-db-init --ignore-not-found
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: atlas-webui-db-init
            namespace: ${KUBE_NAMESPACE}
          spec:
            backoffLimit: 2
            template:
              metadata:
                labels:
                  app: atlas-webui-db-init
              spec:
                restartPolicy: Never
                imagePullSecrets:
                  - name: acr-pull
                containers:
                  - name: db-init
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    command:
                      - npm
                      - run
                      - db:init
                      - "-w"
                      - "@a5c-ai/atlas-webui"
                    envFrom:
                      - secretRef:
                          name: atlas-postgres
          EOF
          if ! kubectl -n "$KUBE_NAMESPACE" wait --for=condition=complete job/atlas-webui-db-init --timeout=300s; then
            kubectl -n "$KUBE_NAMESPACE" get job atlas-webui-db-init -o wide || true
            kubectl -n "$KUBE_NAMESPACE" get pods -l app=atlas-webui-db-init -o wide || true
            kubectl -n "$KUBE_NAMESPACE" describe job atlas-webui-db-init || true
            kubectl -n "$KUBE_NAMESPACE" describe pods -l app=atlas-webui-db-init || true
            kubectl -n "$KUBE_NAMESPACE" logs job/atlas-webui-db-init --all-containers --tail=200 --prefix || true
            exit 1
          fi

      - name: Deploy Atlas WebUI
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${KUBE_NAMESPACE}
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
              spec:
                terminationGracePeriodSeconds: 10
                imagePullSecrets:
                  - name: acr-pull
                containers:
                  - name: ${APP_NAME}
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 3000
                    env:
                      - name: NODE_ENV
                        value: production
                      - name: PORT
                        value: "3000"
                      - name: HOSTNAME
                        value: 0.0.0.0
                    envFrom:
                      - secretRef:
                          name: atlas-auth
                          optional: true
                      - secretRef:
                          name: atlas-postgres
                    readinessProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      failureThreshold: 30
                    livenessProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      failureThreshold: 5
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${KUBE_NAMESPACE}
          spec:
            selector:
              app: ${APP_NAME}
            ports:
              - port: 80
                targetPort: 3000
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${APP_NAME}
            namespace: ${KUBE_NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-production
              external-dns.alpha.kubernetes.io/hostname: ${APP_HOST}
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${APP_HOST}
                secretName: ${APP_NAME}-tls
            rules:
              - host: ${APP_HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${APP_NAME}
                          port:
                            number: 80
          EOF
          # Delete pods stuck in Terminating so the rollout can proceed
          # Force-delete pods stuck in Terminating (shown as "Terminating" in STATUS column)
          kubectl -n "$KUBE_NAMESPACE" get pods -l app="$APP_NAME" --no-headers 2>/dev/null \
            | awk '/Terminating/{print $1}' \
            | xargs -r kubectl -n "$KUBE_NAMESPACE" delete --force --grace-period=0 2>/dev/null || true
          kubectl -n "$KUBE_NAMESPACE" rollout restart deployment/"$APP_NAME"
          kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$APP_NAME" --timeout=600s

  deploy_krate:
    name: Deploy Krate To AKS
    needs:
      - validate_krate
    runs-on: ubuntu-latest-l
    environment:
      name: krate-${{ github.ref_name == 'main' && 'production' || github.ref_name }}
      url: ${{ github.ref_name == 'main' && 'https://krate.a5c.ai' || github.ref_name == 'staging' && 'https://krate-staging.a5c.ai' || 'https://krate-develop.a5c.ai' }}
    env:
      ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      APP_NAME: krate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Check deployment configuration
        id: config
        env:
          KUBE_CONFIG_SECRET: ${{ secrets.KUBE_CONFIG }}
          AZURE_CLIENT_ID_VAR: ${{ vars.AZURE_APPLICATION_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_APPLICATION_CLIENT_SECRET }}
          KRATE_GITHUB_CLIENT_ID: ${{ vars.KRATE_GITHUB_CLIENT_ID }}
          KRATE_GITHUB_CLIENT_SECRET: ${{ secrets.KRATE_GITHUB_CLIENT_SECRET }}
        run: |
          missing=()
          [[ -n "${KUBE_CONFIG_SECRET}" ]] || missing+=("KUBE_CONFIG")
          [[ -n "${AZURE_CLIENT_ID_VAR}" ]] || missing+=("AZURE_APPLICATION_CLIENT_ID")
          [[ -n "${AZURE_CLIENT_SECRET}" ]] || missing+=("AZURE_APPLICATION_CLIENT_SECRET")
          [[ -n "${ACR_NAME}" ]] || missing+=("AZURE_ACR_NAME")
          [[ -n "${KRATE_GITHUB_CLIENT_ID}" ]] || echo "::notice::KRATE_GITHUB_CLIENT_ID not set — GitHub OAuth will be disabled"
          [[ -n "${KRATE_GITHUB_CLIENT_SECRET}" ]] || echo "::notice::KRATE_GITHUB_CLIENT_SECRET not set — GitHub OAuth will be disabled"
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Krate deploy missing required configuration: ${missing[*]}"
            exit 1
          fi

      - name: Resolve deployment target
        run: |
          case "${GITHUB_REF_NAME}" in
            main)    NS=krate;         HOST=krate.a5c.ai ;;
            staging) NS=krate-staging; HOST=krate-staging.a5c.ai ;;
            develop) NS=krate-develop; HOST=krate-develop.a5c.ai ;;
            *)       echo "Unsupported branch" >&2; exit 1 ;;
          esac
          echo "KUBE_NAMESPACE=$NS" >> "$GITHUB_ENV"
          echo "APP_HOST=$HOST" >> "$GITHUB_ENV"

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Azure login for ACR push
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_APPLICATION_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_APPLICATION_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push krate-controller image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE="${ACR_NAME}.azurecr.io/krate-controller:${IMAGE_TAG}"
          docker buildx build \
            --file packages/krate/core/Dockerfile \
            --tag "$IMAGE" \
            --cache-from type=gha,scope=krate-controller \
            --cache-to type=gha,mode=max,scope=krate-controller \
            --push .
          echo "KRATE_CONTROLLER_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Build and push krate-web image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/krate-web:${IMAGE_TAG}"
          docker buildx build \
            --file packages/krate/web/Dockerfile \
            --tag "$IMAGE" \
            --cache-from type=gha,scope=krate-web \
            --cache-to type=gha,mode=max,scope=krate-web \
            --push .
          echo "KRATE_WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Create ACR pull secret
        run: |
          kubectl create namespace "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          ACR_TOKEN=$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)
          kubectl -n "$KUBE_NAMESPACE" create secret docker-registry acr-pull \
            --docker-server="${ACR_NAME}.azurecr.io" \
            --docker-username=00000000-0000-0000-0000-000000000000 \
            --docker-password="$ACR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Clean up pre-Helm resources
        run: |
          kubectl -n "$KUBE_NAMESPACE" delete ingress krate --ignore-not-found
          kubectl -n "$KUBE_NAMESPACE" delete service krate --ignore-not-found
          kubectl -n "$KUBE_NAMESPACE" delete deployment krate --ignore-not-found

      - name: Remove standalone KubeVela release (now managed as krate subchart)
        run: helm uninstall kubevela -n vela-system 2>/dev/null || true

      - name: Build Helm chart dependencies
        run: |
          helm dependency update packages/krate/charts 2>&1 || echo "::notice::Helm dependency update completed (some repos may be unavailable)"

      - name: Update Krate CRDs
        run: kubectl apply -f packages/krate/charts/crds/ --server-side --force-conflicts

      - name: Deploy Krate via Helm
        env:
          KRATE_GITHUB_CLIENT_ID: ${{ vars.KRATE_GITHUB_CLIENT_ID }}
          KRATE_GITHUB_CLIENT_SECRET: ${{ secrets.KRATE_GITHUB_CLIENT_SECRET }}
        run: |
          helm upgrade --install krate packages/krate/charts \
            --namespace "$KUBE_NAMESPACE" \
            --create-namespace \
            --set image.controller.repository="${ACR_NAME}.azurecr.io/krate-controller" \
            --set image.controller.tag="${GITHUB_SHA}" \
            --set image.web.repository="${ACR_NAME}.azurecr.io/krate-web" \
            --set image.web.tag="${GITHUB_SHA}" \
            --set image.pullPolicy=Always \
            --set "global.imagePullSecrets[0].name=acr-pull" \
            --set auth.github.clientId="${KRATE_GITHUB_CLIENT_ID}" \
            --set auth.github.clientSecret="${KRATE_GITHUB_CLIENT_SECRET}" \
            --set admin.org=a5c-ai \
            --set admin.username=tmuskal \
            --set ingress.enabled=true \
            --set ingress.className=nginx \
            --set "ingress.hosts[0].host=${APP_HOST}" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set "ingress.tls[0].secretName=krate-tls" \
            --set "ingress.tls[0].hosts[0]=${APP_HOST}" \
            --set "ingress.annotations.cert-manager\\.io/cluster-issuer=letsencrypt-production" \
            --set "ingress.annotations.external-dns\\.alpha\\.kubernetes\\.io/hostname=${APP_HOST}" \
            --set-string "ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/ssl-redirect=true" \
            --set demo.enabled=false \
            --set gitea.enabled=false \
            --set argocd.enabled=false \
            --set kubevela.enabled=true \
            --set "externalDependencies.kyverno.enabled=true" \
            --set "externalDependencies.kyverno.discoverExisting=true" \
            --set networkPolicy.enabled=false \
            --set apiService.enabled=false \
            --timeout 300s \
            --wait
          # Force-delete pods stuck in Terminating
          kubectl -n "$KUBE_NAMESPACE" get pods --no-headers 2>/dev/null \
            | awk '/Terminating/{print $1}' \
            | xargs -r kubectl -n "$KUBE_NAMESPACE" delete --force --grace-period=0 2>/dev/null || true

  deploy_staging_cloud:
    name: Deploy Cloud
    needs:
      - prepare_staging_publish
    runs-on: ubuntu-latest-l
    steps:
      - name: Download publish workspace
        uses: actions/download-artifact@v8
        with:
          name: publish-source
          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build cloud workspace
        if: >-
          (github.ref_name == 'staging' && vars.A5C_CLOUD_STAGING_DEPLOY_ENABLED == 'true') ||
          (github.ref_name == 'main' && vars.A5C_CLOUD_PROD_DEPLOY_ENABLED == 'true')
        run: npm run build:cloud

      - name: Run cloud staging deploy hook
        if: ${{ github.ref_name == 'staging' && vars.A5C_CLOUD_STAGING_DEPLOY_ENABLED == 'true' }}
        env:
          A5C_CLOUD_ENVIRONMENT: staging
          A5C_CLOUD_RELEASE_TAG: ${{ needs.prepare_staging_publish.outputs.staging_version_sdk }}
          A5C_CLOUD_TARGET_TYPE: ${{ vars.A5C_CLOUD_STAGING_TARGET_TYPE }}
          A5C_CLOUD_KUBE_CONTEXT: ${{ vars.A5C_CLOUD_STAGING_KUBE_CONTEXT }}
          A5C_CLOUD_NAMESPACE: ${{ vars.A5C_CLOUD_STAGING_NAMESPACE }}
          A5C_CLOUD_INGRESS_HOSTS: ${{ vars.A5C_CLOUD_STAGING_INGRESS_HOSTS }}
          A5C_CLOUD_IMAGE_REGISTRY: ${{ vars.A5C_CLOUD_IMAGE_REGISTRY }}
          A5C_CLOUD_REGION: ${{ vars.A5C_CLOUD_STAGING_REGION }}
          A5C_CLOUD_CLUSTER_NAME: ${{ vars.A5C_CLOUD_STAGING_CLUSTER_NAME }}
          A5C_CLOUD_PROJECT_ID: ${{ vars.A5C_CLOUD_STAGING_PROJECT_ID }}
          A5C_CLOUD_RESOURCE_GROUP: ${{ vars.A5C_CLOUD_STAGING_RESOURCE_GROUP }}
          A5C_CLOUD_SUBSCRIPTION_ID: ${{ vars.A5C_CLOUD_STAGING_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          npm run deploy:cloud:staging

      - name: Run cloud production deploy hook
        if: ${{ github.ref_name == 'main' && vars.A5C_CLOUD_PROD_DEPLOY_ENABLED == 'true' }}
        env:
          A5C_CLOUD_ENVIRONMENT: prod
          A5C_CLOUD_RELEASE_TAG: ${{ needs.prepare_staging_publish.outputs.staging_version_sdk }}
          A5C_CLOUD_TARGET_TYPE: ${{ vars.A5C_CLOUD_PROD_TARGET_TYPE }}
          A5C_CLOUD_KUBE_CONTEXT: ${{ vars.A5C_CLOUD_PROD_KUBE_CONTEXT }}
          A5C_CLOUD_NAMESPACE: ${{ vars.A5C_CLOUD_PROD_NAMESPACE }}
          A5C_CLOUD_INGRESS_HOSTS: ${{ vars.A5C_CLOUD_PROD_INGRESS_HOSTS }}
          A5C_CLOUD_IMAGE_REGISTRY: ${{ vars.A5C_CLOUD_IMAGE_REGISTRY }}
          A5C_CLOUD_REGION: ${{ vars.A5C_CLOUD_PROD_REGION }}
          A5C_CLOUD_CLUSTER_NAME: ${{ vars.A5C_CLOUD_PROD_CLUSTER_NAME }}
          A5C_CLOUD_PROJECT_ID: ${{ vars.A5C_CLOUD_PROD_PROJECT_ID }}
          A5C_CLOUD_RESOURCE_GROUP: ${{ vars.A5C_CLOUD_PROD_RESOURCE_GROUP }}
          A5C_CLOUD_SUBSCRIPTION_ID: ${{ vars.A5C_CLOUD_PROD_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          npm run deploy:cloud:prod

  publish_staging_metapackage:
    name: Publish Metapackage
    needs:
      - publish_staging_agent_mux_tui
      - publish_staging_hooks_cli
      - publish_staging_babysitter_agent
      - deploy_staging_cloud
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Download publish workspace
        uses: actions/download-artifact@v8
        with:
          name: publish-source
          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org/
          token: ${{ secrets.NPM_TOKEN }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Publish babysitter metapackage to npm ($NPM_TAG tag)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public --tag "$NPM_TAG"
        working-directory: packages/babysitter

  create_release_tag:
    name: Create Release Tag
    needs:
      - publish_staging_metapackage
    uses: ./.github/workflows/release-tags.yml
    secrets: inherit

  sync_external_plugins:
    name: Sync External Plugins
    needs:
      - create_release_tag
    uses: ./.github/workflows/sync-external-plugins.yml
    with:
      branch: ${{ github.ref_name }}
      ref: ${{ github.sha }}
    secrets: inherit
