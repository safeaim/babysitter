  deploy_atlas_webui:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Deploy Atlas WebUI To AKS
    needs:
      - prepare_publish_base
      - publish_atlas
    runs-on: ubuntu-latest
    env:
      ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      APP_NAME: atlas-webui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_publish_base.outputs.publish_ref }}

      - name: Check deployment configuration
        id: config
        env:
          KUBE_CONFIG_SECRET: ${{ secrets.KUBE_CONFIG }}
          AZURE_CLIENT_ID_VAR: ${{ vars.AZURE_APPLICATION_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_APPLICATION_CLIENT_SECRET }}
          ATLAS_GITHUB_CLIENT_ID: ${{ vars.ATLAS_GITHUB_CLIENT_ID }}
          ATLAS_GITHUB_CLIENT_SECRET: ${{ secrets.ATLAS_GITHUB_CLIENT_SECRET }}
          ATLAS_AUTH_SECRET: ${{ secrets.ATLAS_AUTH_SECRET != '' && secrets.ATLAS_AUTH_SECRET || secrets.ATLAS_GITHUB_CLIENT_SECRET }}
        run: |
          missing=()
          [[ -n "${KUBE_CONFIG_SECRET}" ]] || missing+=("KUBE_CONFIG")
          [[ -n "${AZURE_CLIENT_ID_VAR}" ]] || missing+=("AZURE_APPLICATION_CLIENT_ID")
          [[ -n "${AZURE_CLIENT_SECRET}" ]] || missing+=("AZURE_APPLICATION_CLIENT_SECRET")
          [[ -n "${ACR_NAME}" ]] || missing+=("AZURE_ACR_NAME")
          [[ -n "${ATLAS_GITHUB_CLIENT_ID}" ]] || missing+=("ATLAS_GITHUB_CLIENT_ID")
          [[ -n "${ATLAS_GITHUB_CLIENT_SECRET}" ]] || missing+=("ATLAS_GITHUB_CLIENT_SECRET")
          [[ -n "${ATLAS_AUTH_SECRET}" ]] || missing+=("ATLAS_AUTH_SECRET or ATLAS_GITHUB_CLIENT_SECRET")
          if (( ${#missing[@]} == 0 )); then
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Atlas WebUI deploy skipped - missing: ${missing[*]}"
          fi

      - name: Resolve deployment target
        if: steps.config.outputs.deploy_enabled == 'true'
        run: |
          case "${GITHUB_REF_NAME}" in
            main)    NS=atlas;         HOST=atlas.a5c.ai ;;
            staging) NS=atlas-staging; HOST=atlas-staging.a5c.ai ;;
            develop) NS=atlas-develop; HOST=atlas-develop.a5c.ai ;;
            *)       echo "Unsupported branch" >&2; exit 1 ;;
          esac
          echo "KUBE_NAMESPACE=$NS" >> "$GITHUB_ENV"
          echo "APP_HOST=$HOST" >> "$GITHUB_ENV"

      - name: Configure kubectl
        if: steps.config.outputs.deploy_enabled == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Azure login for ACR push
        if: steps.config.outputs.deploy_enabled == 'true'
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_APPLICATION_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_APPLICATION_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Build and push image
        if: steps.config.outputs.deploy_enabled == 'true'
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE="${ACR_NAME}.azurecr.io/${APP_NAME}:${IMAGE_TAG}"
          docker build -f packages/atlas/webui/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Create ACR pull secret
        if: steps.config.outputs.deploy_enabled == 'true'
        run: |
          kubectl create namespace "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          ACR_TOKEN=$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)
          kubectl -n "$KUBE_NAMESPACE" create secret docker-registry acr-pull \
            --docker-server="${ACR_NAME}.azurecr.io" \
            --docker-username=00000000-0000-0000-0000-000000000000 \
            --docker-password="$ACR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Atlas auth secret
        if: steps.config.outputs.deploy_enabled == 'true'
        env:
          ATLAS_GITHUB_CLIENT_ID: ${{ vars.ATLAS_GITHUB_CLIENT_ID }}
          ATLAS_GITHUB_CLIENT_SECRET: ${{ secrets.ATLAS_GITHUB_CLIENT_SECRET }}
          ATLAS_AUTH_SECRET: ${{ secrets.ATLAS_AUTH_SECRET != '' && secrets.ATLAS_AUTH_SECRET || secrets.ATLAS_GITHUB_CLIENT_SECRET }}
        run: |
          kubectl -n "$KUBE_NAMESPACE" create secret generic atlas-webui-auth \
            --from-literal=GITHUB_CLIENT_ID="$ATLAS_GITHUB_CLIENT_ID" \
            --from-literal=GITHUB_CLIENT_SECRET="$ATLAS_GITHUB_CLIENT_SECRET" \
            --from-literal=AUTH_SECRET="$ATLAS_AUTH_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Atlas WebUI
        if: steps.config.outputs.deploy_enabled == 'true'
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${KUBE_NAMESPACE}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
              spec:
                imagePullSecrets:
                  - name: acr-pull
                containers:
                  - name: ${APP_NAME}
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 3000
                    env:
                      - name: NODE_ENV
                        value: production
                      - name: PORT
                        value: "3000"
                      - name: HOSTNAME
                        value: 0.0.0.0
                      - name: GITHUB_CLIENT_ID
                        valueFrom:
                          secretKeyRef:
                            name: atlas-webui-auth
                            key: GITHUB_CLIENT_ID
                      - name: GITHUB_CLIENT_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: atlas-webui-auth
                            key: GITHUB_CLIENT_SECRET
                      - name: AUTH_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: atlas-webui-auth
                            key: AUTH_SECRET
                    startupProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                      failureThreshold: 30
                      periodSeconds: 5
                    readinessProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                      initialDelaySeconds: 5
                      timeoutSeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                      initialDelaySeconds: 10
                      timeoutSeconds: 5
                      periodSeconds: 20
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${KUBE_NAMESPACE}
          spec:
            selector:
              app: ${APP_NAME}
            ports:
              - port: 80
                targetPort: 3000
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${APP_NAME}
            namespace: ${KUBE_NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-production
              external-dns.alpha.kubernetes.io/hostname: ${APP_HOST}
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${APP_HOST}
                secretName: ${APP_NAME}-tls
            rules:
              - host: ${APP_HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${APP_NAME}
                          port:
                            number: 80
          EOF
          kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$APP_NAME" --timeout=300s
  deploy_cloud:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Deploy Cloud
    needs:
      - prepare_publish
      - publish_foundation
    runs-on: ubuntu-latest
    steps:
      - name: Download publish workspace
        uses: actions/download-artifact@v4
        with:
          name: publish-source
          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build cloud workspace
        if: >-
          (github.ref_name == 'staging' && vars.A5C_CLOUD_STAGING_DEPLOY_ENABLED == 'true') ||
          (github.ref_name == 'main' && vars.A5C_CLOUD_PROD_DEPLOY_ENABLED == 'true')
        run: npm run build:cloud

      - name: Run cloud staging deploy hook
        if: ${{ github.ref_name == 'staging' && vars.A5C_CLOUD_STAGING_DEPLOY_ENABLED == 'true' }}
        env:
          A5C_CLOUD_ENVIRONMENT: staging
          A5C_CLOUD_RELEASE_TAG: ${{ needs.prepare_publish.outputs.publish_version }}
          A5C_CLOUD_TARGET_TYPE: ${{ vars.A5C_CLOUD_STAGING_TARGET_TYPE }}
          A5C_CLOUD_KUBE_CONTEXT: ${{ vars.A5C_CLOUD_STAGING_KUBE_CONTEXT }}
          A5C_CLOUD_NAMESPACE: ${{ vars.A5C_CLOUD_STAGING_NAMESPACE }}
          A5C_CLOUD_INGRESS_HOSTS: ${{ vars.A5C_CLOUD_STAGING_INGRESS_HOSTS }}
          A5C_CLOUD_IMAGE_REGISTRY: ${{ vars.A5C_CLOUD_IMAGE_REGISTRY }}
          A5C_CLOUD_REGION: ${{ vars.A5C_CLOUD_STAGING_REGION }}
          A5C_CLOUD_CLUSTER_NAME: ${{ vars.A5C_CLOUD_STAGING_CLUSTER_NAME }}
          A5C_CLOUD_PROJECT_ID: ${{ vars.A5C_CLOUD_STAGING_PROJECT_ID }}
          A5C_CLOUD_RESOURCE_GROUP: ${{ vars.A5C_CLOUD_STAGING_RESOURCE_GROUP }}
          A5C_CLOUD_SUBSCRIPTION_ID: ${{ vars.A5C_CLOUD_STAGING_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          npm run deploy:cloud:staging

      - name: Run cloud production deploy hook
        if: ${{ github.ref_name == 'main' && vars.A5C_CLOUD_PROD_DEPLOY_ENABLED == 'true' }}
        env:
          A5C_CLOUD_ENVIRONMENT: prod
          A5C_CLOUD_RELEASE_TAG: ${{ needs.prepare_publish.outputs.publish_version }}
          A5C_CLOUD_TARGET_TYPE: ${{ vars.A5C_CLOUD_PROD_TARGET_TYPE }}
          A5C_CLOUD_KUBE_CONTEXT: ${{ vars.A5C_CLOUD_PROD_KUBE_CONTEXT }}
          A5C_CLOUD_NAMESPACE: ${{ vars.A5C_CLOUD_PROD_NAMESPACE }}
          A5C_CLOUD_INGRESS_HOSTS: ${{ vars.A5C_CLOUD_PROD_INGRESS_HOSTS }}
          A5C_CLOUD_IMAGE_REGISTRY: ${{ vars.A5C_CLOUD_IMAGE_REGISTRY }}
          A5C_CLOUD_REGION: ${{ vars.A5C_CLOUD_PROD_REGION }}
          A5C_CLOUD_CLUSTER_NAME: ${{ vars.A5C_CLOUD_PROD_CLUSTER_NAME }}
          A5C_CLOUD_PROJECT_ID: ${{ vars.A5C_CLOUD_PROD_PROJECT_ID }}
          A5C_CLOUD_RESOURCE_GROUP: ${{ vars.A5C_CLOUD_PROD_RESOURCE_GROUP }}
          A5C_CLOUD_SUBSCRIPTION_ID: ${{ vars.A5C_CLOUD_PROD_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          npm run deploy:cloud:prod

  publish_metapackage:
