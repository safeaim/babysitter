name: Publish

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NPM_TAG: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
  PUBLISH_BRANCH: ${{ github.ref_name }}

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Validate Core Runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/core-logs

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/core-logs/metadata.log

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/core-logs/architecture.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/atlas 2>&1 | tee artifacts/core-logs/atlas-build-for-lint.log
          npm run build --workspace=@a5c-ai/agent-catalog 2>&1 | tee artifacts/core-logs/agent-catalog-build-for-lint.log
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/core-logs/lint.log

      - name: Build runtime graph
        run: |
          set -euo pipefail
          npm run build:runtime 2>&1 | tee artifacts/core-logs/runtime-build.log

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/core-logs/sdk-tests.log

      - name: agent-core tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/core-logs/agent-core-tests.log

      - name: babysitter-harness tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/core-logs/babysitter-harness-tests.log

      - name: Upload core validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-core-logs
          path: artifacts/core-logs
          if-no-files-found: warn

  validate_mux:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Validate Mux Surfaces
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/mux-logs

      - name: Build SDK prerequisites
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee artifacts/mux-logs/sdk-prereqs-build.log
          for workspace in \
            @a5c-ai/agent-mux-observability \
            @a5c-ai/agent-mux-core \
            @a5c-ai/agent-mux-adapters \
            @a5c-ai/agent-mux-gateway \
            @a5c-ai/transport-mux \
            @a5c-ai/agent-mux-cli \
            @a5c-ai/agent-mux \
            @a5c-ai/triggers
          do
            npm run build --workspace="$workspace"
          done 2>&1 | tee artifacts/mux-logs/agent-mux-test-prereqs-build.log
          npm run build --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-build.log

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/mux-logs/hooks-mux-tests.log

      - name: agent-mux package tests
        run: |
          set -euo pipefail
          node scripts/agent-mux-build.cjs test packages/agent-mux/observability 2>&1 | tee artifacts/mux-logs/agent-mux-observability-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/core 2>&1 | tee artifacts/mux-logs/agent-mux-core-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/adapters 2>&1 | tee artifacts/mux-logs/agent-mux-adapters-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/harness-mock 2>&1 | tee artifacts/mux-logs/agent-mux-harness-mock-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/gateway 2>&1 | tee artifacts/mux-logs/agent-mux-gateway-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/cli 2>&1 | tee artifacts/mux-logs/agent-mux-cli-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/sdk 2>&1 | tee artifacts/mux-logs/agent-mux-sdk-tests.log
          npm run test:unit --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-tests.log
          npm run test:e2e --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-e2e.log
          npm run test:coverage --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-coverage.log

      - name: Build and verify non-realtime agent-mux release artifacts
        run: |
          set -euo pipefail
          for workspace in \
            @a5c-ai/atlas \
            @a5c-ai/agent-catalog \
            @a5c-ai/agent-mux-observability \
            @a5c-ai/agent-mux-core \
            @a5c-ai/agent-mux-adapters \
            @a5c-ai/agent-mux-gateway \
            @a5c-ai/transport-mux \
            @a5c-ai/agent-mux-cli \
            @a5c-ai/agent-mux \
            @a5c-ai/agent-mux-tui \
            @a5c-ai/triggers
          do
            npm run build --workspace="$workspace"
          done 2>&1 | tee artifacts/mux-logs/agent-mux-release-build.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-release.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-build.log
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-scorecard.log

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/mux-logs/agent-mux-webui-playwright-install.log

      - name: agent-mux webui browser e2e
        run: |
          set -euo pipefail
          npm run test:e2e --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-browser-e2e.log

      - name: Upload mux Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-mux-playwright-artifacts
          path: |
            packages/agent-mux/webui/.tmp/playwright-report
            packages/agent-mux/webui/.tmp/playwright-test-results
          if-no-files-found: warn

      - name: Upload mux validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-mux-logs
          path: artifacts/mux-logs
          if-no-files-found: warn

  live_stack_contracts:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Live Stack Contracts (os=${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Run live stack contract matrix
        run: |
          npm run test:e2e:live-stack
          npm run coverage:e2e:live-stack

      - name: Upload live stack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-live-stack-${{ matrix.os }}
          path: artifacts/live-stack
          if-no-files-found: error

  validate_cloud:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Validate Cloud Workspace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/cloud-logs

      - name: Validate cloud deployment workspace
        run: |
          set -euo pipefail
          npm run build:cloud 2>&1 | tee artifacts/cloud-logs/cloud-build.log
          npm run test:cloud 2>&1 | tee artifacts/cloud-logs/cloud-tests.log
          npm run coverage:cloud 2>&1 | tee artifacts/cloud-logs/cloud-coverage.log
          npm run verify:cloud-release 2>&1 | tee artifacts/cloud-logs/cloud-release.log

      - name: Upload cloud validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-cloud-logs
          path: artifacts/cloud-logs
          if-no-files-found: warn

  validate_observer_and_compiler:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Validate Observer And Compiler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/observer-compiler-logs

      - name: Build compiler prerequisites
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/atlas 2>&1 | tee artifacts/observer-compiler-logs/atlas-build.log
          npm run build --workspace=@a5c-ai/agent-catalog 2>&1 | tee artifacts/observer-compiler-logs/agent-catalog-build.log

      - name: Build and test agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-build.log
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-tests.log

      - name: Generate unified plugin bundles
        run: |
          set -euo pipefail
          npm run generate:plugins 2>&1 | tee artifacts/observer-compiler-logs/generated-plugin-bundles.log

      - name: Build and test observer-dashboard
        run: |
          set -euo pipefail
          npm run build:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-build.log
          npm run test:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-tests.log

      - name: Upload observer and compiler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-observer-compiler-logs
          path: artifacts/observer-compiler-logs
          if-no-files-found: warn

  prepare_staging_publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Prepare Publish
    needs:
      - validate_core
      - validate_mux
      - live_stack_contracts
      - validate_cloud
      - validate_observer_and_compiler
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      staging_version_sdk: ${{ steps.version.outputs.staging_version_sdk }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set publish version
        id: version
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          SHORT_SHA=$(git rev-parse --short HEAD)
          case "${GITHUB_REF_NAME}" in
            main)
              PUBLISH_VERSION="$BASE_VERSION"
              ;;
            staging|develop)
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              NEXT_PATCH=$((PATCH + 1))
              PUBLISH_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-${GITHUB_REF_NAME}.${SHORT_SHA}"
              ;;
            *)
              echo "Unsupported publish branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac
          echo "publish_version=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_unified=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_sdk=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_agent_mux=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_codex=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_github=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_cursor=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_gemini=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_pi=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_omp=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_opencode=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_openclaw=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "Setting ${GITHUB_REF_NAME} publish version: $PUBLISH_VERSION"
          node scripts/sync-workspace-versions.mjs --version "$PUBLISH_VERSION"

      - name: Commit sdkVersion to publish branch
        if: ${{ github.ref_name != 'main' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/babysitter-unified/versions.json
          if git diff --cached --quiet; then
            echo "No sdkVersion changes to commit."
          else
            git commit -m "chore: set sdkVersion to ${{ steps.version.outputs.staging_version_sdk }} [skip publish]"
            if git push origin HEAD:"${GITHUB_REF_NAME}" 2>/dev/null; then
              echo "sdkVersion committed and pushed."
            elif git pull --rebase --autostash origin "${GITHUB_REF_NAME}" 2>/dev/null && git push origin HEAD:"${GITHUB_REF_NAME}" 2>/dev/null; then
              echo "sdkVersion committed after rebase."
            else
              echo "::warning::Could not push sdkVersion commit (concurrent run conflict). Skipping — npm publish already succeeded."
              git rebase --abort 2>/dev/null || true
            fi
          fi

      - name: Prepare workspace manifests for publish
        run: |
          set -euo pipefail
          node scripts/sync-workspace-versions.mjs --version "$STAGING_VERSION"
        env:
          STAGING_VERSION: ${{ steps.version.outputs.staging_version_sdk }}

      - name: Refresh publish lockfile
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --workspaces --include-workspace-root

      - name: Bundle publish workspace
        run: |
          set -euo pipefail
          mkdir -p artifacts/publish-source
          tar --exclude=.git --exclude=node_modules --exclude=artifacts -czf artifacts/publish-source/publish-source.tgz .

      - name: Upload publish workspace
        uses: actions/upload-artifact@v4
        with:
          name: publish-source
          path: artifacts/publish-source/publish-source.tgz
          if-no-files-found: error

  publish_staging_foundation:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Publish Foundation - ${{ matrix.name }}
    needs: prepare_staging_publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-catalog
            build: npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
            publish: npm publish --workspace=@a5c-ai/agent-catalog --access public --tag "$NPM_TAG"
          - name: agent-core
            build: npm run build --workspace=@a5c-ai/agent-core
            publish: npm publish --workspace=@a5c-ai/agent-core --access public --tag "$NPM_TAG"
          - name: babysitter-agent
            build: npm run build --workspace=@a5c-ai/babysitter-agent
            publish: npm publish --workspace=@a5c-ai/babysitter-agent --access public --tag "$NPM_TAG"
          - name: babysitter-sdk
            build: npm run build:sdk
            publish: npm publish --workspace=@a5c-ai/babysitter-sdk --access public --tag "$NPM_TAG"
          - name: agent-plugins-mux
            build: npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog && npm run build --workspace=@a5c-ai/agent-plugins-mux
            publish: npm publish --workspace=@a5c-ai/agent-plugins-mux --access public --tag "$NPM_TAG"
          - name: observer-dashboard
            build: npm run build:observer
            publish: npm publish --workspace=@a5c-ai/babysitter-observer-dashboard --access public --tag "$NPM_TAG"
          - name: cloud
            build: npm run build:cloud
            publish: npm publish --workspace=@a5c-ai/cloud --access public --tag "$NPM_TAG"
          - name: hooks-mux-core
            build: npm run build:hooks-mux
            publish: npm publish --workspace=@a5c-ai/hooks-mux-core --access public --tag "$NPM_TAG"
          - name: agent-mux-observability
            build: npm run build --workspace=@a5c-ai/agent-mux-observability
            publish: npm publish --workspace=@a5c-ai/agent-mux-observability --access public --tag "$NPM_TAG"
    steps:
      - name: Download publish workspace
        uses: actions/download-artifact@v4
        with:
          name: publish-source
          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build package workspace
        run: ${{ matrix.build }}

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}

  publish_staging_hooks_and_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Publish Hooks And Core - ${{ matrix.name }}
    needs: publish_staging_foundation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-mux-core
            publish: npm publish --workspace=@a5c-ai/agent-mux-core --access public --tag "$NPM_TAG"
          - name: hooks-mux-cli
            publish: npm publish --workspace=@a5c-ai/hooks-mux-cli --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-claude
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-claude --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-codex
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-codex --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-gemini
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-gemini --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-copilot
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-copilot --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-cursor
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-cursor --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-pi
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-pi --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-oh-my-pi
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-oh-my-pi --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-opencode
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-opencode --access public --tag "$NPM_TAG"
          - name: hooks-mux-adapter-openclaw
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-openclaw --access public --tag "$NPM_TAG"
    steps:
      - name: Download publish workspace
        uses: actions/download-artifact@v4
        with:
          name: publish-source
          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build hooks and agent-mux workspaces
        run: |
          set -euo pipefail
          npm run build:hooks-mux
          npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
          npm run build --workspace=@a5c-ai/agent-mux-observability
          npm run build --workspace=@a5c-ai/agent-mux-core

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}

  publish_staging_agent_mux_leaf:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Publish Agent Mux Leaf - ${{ matrix.name }}
    needs: publish_staging_hooks_and_core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-mux-adapters
            build: |
              set -euo pipefail
              npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
              npm run build --workspace=@a5c-ai/agent-mux-observability
              npm run build --workspace=@a5c-ai/agent-mux-core
              npm run build --workspace=@a5c-ai/agent-mux-adapters
            publish: npm publish --workspace=@a5c-ai/agent-mux-adapters --access public --tag "$NPM_TAG"
          - name: agent-mux-harness-mock
            build: |
              set -euo pipefail
              npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
              npm run build --workspace=@a5c-ai/agent-mux-observability
