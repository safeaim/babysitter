      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
