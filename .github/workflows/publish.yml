name: Publish

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NPM_TAG: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
  PUBLISH_BRANCH: ${{ github.ref_name }}
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"
  NPM_CONFIG_PREFER_OFFLINE: "true"

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build_all:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Build All
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Restore TypeScript build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/**/tsconfig.tsbuildinfo
            packages/**/.tsbuildinfo
            packages/agent-mux/webui/node_modules/.vite
          key: tsbuild-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            tsbuild-${{ runner.os }}-${{ github.ref_name }}-
            tsbuild-${{ runner.os }}-

      - name: "Build phase 1: shared catalog foundation"
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/atlas
          npm run build --workspace=@a5c-ai/agent-catalog


      - name: "Build phase 2: parallel independents and agent-mux critical path"
        run: |
          set -euo pipefail
          PIDS=()
          run_bg() {
            "$@" &
            PIDS+=("$!")
          }
          wait_all() {
            local fail=0
            for pid in "${PIDS[@]}"; do
              wait "$pid" || fail=1
            done
            PIDS=()
            [ "$fail" -eq 0 ] || exit 1
          }

          run_bg bash -lc '
            set -euo pipefail
            npm run build --workspace=@a5c-ai/hooks-mux-core
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-claude
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-codex
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-gemini
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-copilot
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-cursor
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-pi
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-oh-my-pi
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-opencode
            npm run build --workspace=@a5c-ai/hooks-mux-adapter-openclaw
            npm run build --workspace=@a5c-ai/hooks-mux-cli
          '
          run_bg npm run build --workspace=@a5c-ai/agent-plugins-mux
          run_bg npm run build --workspace=@a5c-ai/triggers
          run_bg npm run build:observer
          run_bg npm run build:cloud
          run_bg bash -lc 'cd packages/krate/core && npm run build && cd ../web && npm run build'

          # agent-mux critical path (sequential — each depends on previous)
          npm run build --workspace=@a5c-ai/agent-mux-observability
          npm run build --workspace=@a5c-ai/agent-mux-core

          leaf_pids=()
          npm run build --workspace=@a5c-ai/agent-mux-adapters & leaf_pids+=("$!")
          npm run build --workspace=@a5c-ai/agent-mux-harness-mock & leaf_pids+=("$!")
          npm run build --workspace=@a5c-ai/transport-mux & leaf_pids+=("$!")
          leaf_fail=0
          for pid in "${leaf_pids[@]}"; do
            wait "$pid" || leaf_fail=1
          done
          [ "$leaf_fail" -eq 0 ] || exit 1

          npm run build --workspace=@a5c-ai/agent-mux-gateway
          npm run build --workspace=@a5c-ai/agent-mux-cli
          npm run build --workspace=@a5c-ai/agent-mux
          npm run build:local --workspace=@a5c-ai/agent-mux-tui
          # webui depends on core + ui — must be after agent-mux chain
          npm run build --workspace=@a5c-ai/agent-mux-webui

          npm run build:sdk
          npm run build --workspace=@a5c-ai/agent-core
          (cd packages/babysitter-agent && npx tsc --build tsconfig.json)

          wait_all

      - name: Package dist directories
        run: find packages -path '*/dist' -type d | tar czf /tmp/build-all-dist.tar.gz -T -

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-all-dist
          path: /tmp/build-all-dist.tar.gz
          if-no-files-found: error

  validate_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Validate Core Runtime
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/core-logs

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/core-logs/metadata.log

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/core-logs/architecture.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/core-logs/lint.log

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/core-logs/sdk-tests.log

      - name: agent-core tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/core-logs/agent-core-tests.log

      - name: babysitter-harness tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/core-logs/babysitter-harness-tests.log

      - name: Upload core validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-core-logs
          path: artifacts/core-logs
          if-no-files-found: warn

  validate_mux:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    name: Validate Mux Surfaces
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/mux-logs

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/mux-logs/hooks-mux-tests.log

      - name: agent-mux package tests
        run: |
          set -euo pipefail
          node scripts/agent-mux-build.cjs test packages/agent-mux/observability 2>&1 | tee artifacts/mux-logs/agent-mux-observability-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/core 2>&1 | tee artifacts/mux-logs/agent-mux-core-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/adapters 2>&1 | tee artifacts/mux-logs/agent-mux-adapters-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/harness-mock 2>&1 | tee artifacts/mux-logs/agent-mux-harness-mock-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/gateway 2>&1 | tee artifacts/mux-logs/agent-mux-gateway-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/cli 2>&1 | tee artifacts/mux-logs/agent-mux-cli-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/sdk 2>&1 | tee artifacts/mux-logs/agent-mux-sdk-tests.log
          npm run test:unit --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-tests.log
          npm run test:e2e --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-e2e.log
          npm run test:coverage --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-coverage.log

      - name: Verify non-realtime agent-mux release artifacts
        run: |
          set -euo pipefail
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-release.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-scorecard.log

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/mux-logs/agent-mux-webui-playwright-install.log

      - name: agent-mux webui browser e2e
        run: |
          set -euo pipefail
          npm run test:e2e --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-browser-e2e.log

      - name: Upload mux Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-mux-playwright-artifacts
          path: |
            packages/agent-mux/webui/.tmp/playwright-report
            packages/agent-mux/webui/.tmp/playwright-test-results
          if-no-files-found: warn

      - name: Upload mux validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-mux-logs
          path: artifacts/mux-logs
          if-no-files-found: warn



  live_stack_babysitter_plugin:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    needs: build_all
    continue-on-error: ${{ github.ref_name != 'main' }}
    name: Live Stack (babysitter-plugin, ${{ matrix.scenario.id }}, ${{ matrix.interaction_mode.id }}, os=ubuntu-latest-l)
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        interaction_mode:
          - id: non-interactive
            interactive: 'false'
          - id: interactive
            interactive: 'true'
        install_mode:
          - id: babysitter-plugin
            required_trace_ids: agentMuxRunId,agentMuxSessionId,transportTraceId
            expected_artifacts: agent-mux-events,plugin-command-transcript,transport-mux-trace,provider-trace-redacted
        scenario:
          - id: live.agent-mux.claude-code.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.claude-code.google-vertex.gemini-3.1-pro-preview
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: google-vertex
            amux_provider: vertex
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_CLOUD_PROJECT,GOOGLE_API_KEY,GOOGLE_CLOUD_LOCATION,GOOGLE_GENAI_USE_VERTEXAI
          - id: live.agent-mux.codex.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: codex
            amux_agent: codex
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.pi.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: pi
            amux_agent: pi
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Install node-pty for interactive tests
        if: matrix.interaction_mode.interactive == 'true'
        run: npm install node-pty --no-save

      - name: Link workspace CLIs to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          for pair in \
            "amux:packages/agent-mux/cli/dist/index.js" \
            "babysitter-agent:packages/babysitter-agent/dist/cli/main.js" \
            "babysitter:packages/sdk/dist/cli/main.js"
          do
            name="${pair%%:*}"
            script="${pair#*:}"
            printf '#!/bin/sh\nexec node "%s/%s" "$@"\n' "${{ github.workspace }}" "$script" > "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run selected live stack E2E
        timeout-minutes: 35
        env:
          LIVE_STACK_SCENARIO_ID: ${{ matrix.scenario.id }}
          LIVE_STACK_AGENT_PATH: ${{ matrix.scenario.agent_path }}
          LIVE_STACK_AGENT: ${{ matrix.scenario.agent }}
          LIVE_STACK_AMUX_AGENT: ${{ matrix.scenario.amux_agent }}
          LIVE_STACK_INTEGRATION_TYPE: ${{ matrix.scenario.integration_type }}
          LIVE_STACK_BABYSITTER_HARNESS: ${{ matrix.scenario.babysitter_harness }}
          LIVE_STACK_INSTALL_MODE: ${{ matrix.install_mode.id }}
          LIVE_STACK_INTERACTION_MODE: ${{ matrix.interaction_mode.id }}
          LIVE_STACK_INTERACTIVE: ${{ matrix.interaction_mode.interactive }}
          LIVE_STACK_USE_AMUX_RUN: 'false'
          LIVE_STACK_PROVIDER: ${{ matrix.scenario.provider }}
          LIVE_STACK_AMUX_PROVIDER: ${{ matrix.scenario.amux_provider }}
          LIVE_STACK_MODEL: ${{ matrix.scenario.model }}
          LIVE_STACK_CREDENTIAL_MODE: github-org-secrets-and-vars
          LIVE_STACK_REQUIRED_ENV: ${{ matrix.scenario.required_env }}
          LIVE_STACK_LAYERS: ${{ matrix.install_mode.id }}
          LIVE_STACK_COVERAGE_LAYERS: ${{ matrix.scenario.provider }},${{ matrix.scenario.agent }}
          LIVE_STACK_REQUIRED_TRACE_IDS: ${{ matrix.install_mode.required_trace_ids }}
          LIVE_STACK_EXPECTED_ARTIFACTS: ${{ matrix.install_mode.expected_artifacts }}
          LIVE_STACK_RUN_MODEL_TESTS: '1'
          LIVE_STACK_REQUIRE_EVIDENCE: '1'
          LIVE_STACK_TEST_TIMEOUT_MS: '1800000'
          LIVE_STACK_COMMAND_TIMEOUT_MS: '1500000'
          LIVE_STACK_BABYSITTER_BIN: ${{ github.workspace }}/packages/sdk/dist/cli/main.js
          LIVE_STACK_AMUX_BIN: ${{ github.workspace }}/packages/agent-mux/cli/dist/index.js
          LIVE_STACK_BABYSITTER_AGENT_BIN: ${{ github.workspace }}/packages/babysitter-agent/dist/cli/main.js
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_LOCATION: global
          GOOGLE_GENAI_USE_VERTEXAI: True
        run: |
          npm run test:e2e:live-stack:pipeline
          npm run coverage:e2e:live-stack

      - name: Upload live stack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-live-stack-${{ matrix.install_mode.id }}-${{ matrix.interaction_mode.id }}-${{ matrix.scenario.id }}
          path: artifacts/live-stack
          if-no-files-found: error

  live_stack_babysitter_agent:
