    name: Publish Metapackage
    needs:
      - prepare_publish
      - publish_atlas
      - publish_agent_mux_tui
      - publish_foundation
      - publish_hooks_and_core
      - publish_agent_mux_leaf
      - publish_agent_mux_gateway
      - publish_agent_mux_cli
      - publish_agent_mux_root
      - deploy_cloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download publish workspace
        uses: actions/download-artifact@v4
        with:
          name: publish-source
          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Publish babysitter metapackage to npm ($NPM_TAG tag)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public --tag "$NPM_TAG"
        working-directory: packages/babysitter

  create_release_tag:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Create Release Tag
    needs:
      - prepare_publish
      - publish_metapackage
    uses: ./.github/workflows/release-tags.yml
    with:
      branch: ${{ github.ref_name }}
      ref: ${{ needs.prepare_publish.outputs.publish_ref }}
      version: ${{ needs.prepare_publish.outputs.publish_version }}
    secrets: inherit

  sync_external_plugins:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    name: Sync External Plugins
    needs:
      - prepare_publish
      - create_release_tag
    uses: ./.github/workflows/sync-external-plugins.yml
    with:
      branch: ${{ github.ref_name }}
      ref: ${{ needs.prepare_publish.outputs.publish_ref }}
      version: ${{ needs.prepare_publish.outputs.publish_version }}
    secrets: inherit
