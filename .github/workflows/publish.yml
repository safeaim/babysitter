name: Publish

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NPM_TAG: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
  PUBLISH_BRANCH: ${{ github.ref_name }}
  NPM_CONFIG_AUDIT: "true"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build lint dependencies
        run: |
          npm run build --workspace=@a5c-ai/atlas
          npm run build --workspace=@a5c-ai/agent-catalog

      - name: Lint SDK
        run: npm run lint --workspace=@a5c-ai/babysitter-sdk

      - name: Verify metadata
        run: npm run verify:metadata

  build_all:
    name: Build All
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Restore framework cache
        uses: actions/cache@v5
        with:
          path: |
            packages/agent-mux/webui/node_modules/.vite
            packages/atlas/webui/.next/cache
            packages/krate/web/.next/cache
          key: framework-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            framework-${{ runner.os }}-${{ github.ref_name }}-
            build-${{ runner.os }}-

      - name: "Build phase 1: shared catalog foundation"
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/atlas
          npm run build --workspace=@a5c-ai/agent-catalog


      - name: "Build phase 2: parallel independents and agent-mux critical path"
        run: |
          set -euo pipefail
          PIDS=()
          run_bg() {
            "$@" &
            PIDS+=("$!")
          }
          wait_all() {
            local fail=0
            for pid in "${PIDS[@]}"; do
              wait "$pid" || fail=1
            done
            PIDS=()
            [ "$fail" -eq 0 ] || exit 1
          }

          run_bg bash -lc '
            set -euo pipefail
            npm run build --workspace=@a5c-ai/hooks-mux-core
            # Adapters are independent (only depend on core) — build in parallel
            for adapter in claude codex gemini copilot cursor pi oh-my-pi opencode openclaw hermes; do
              npm run build --workspace=@a5c-ai/hooks-mux-adapter-$adapter &
            done
            wait
            npm run build --workspace=@a5c-ai/hooks-mux-cli
          '
          run_bg npm run build --workspace=@a5c-ai/extension-mux
          run_bg npm run build --workspace=@a5c-ai/triggers
          run_bg npm run build:observer
          run_bg npm run build:cloud
          run_bg bash -lc 'cd packages/krate/core && npm run build && cd ../web && npm run build'

          # agent-mux critical path (sequential — each depends on previous)
          npm run build --workspace=@a5c-ai/agent-mux-observability
          npm run build --workspace=@a5c-ai/agent-mux-core

          leaf_pids=()
          npm run build --workspace=@a5c-ai/agent-mux-adapters & leaf_pids+=("$!")
          npm run build --workspace=@a5c-ai/agent-mux-harness-mock & leaf_pids+=("$!")
          npm run build --workspace=@a5c-ai/transport-mux & leaf_pids+=("$!")
          leaf_fail=0
          for pid in "${leaf_pids[@]}"; do
            wait "$pid" || leaf_fail=1
          done
          [ "$leaf_fail" -eq 0 ] || exit 1

          npm run build --workspace=@a5c-ai/agent-mux-gateway
          npm run build --workspace=@a5c-ai/agent-mux-cli
          npm run build --workspace=@a5c-ai/agent-mux
          npm run build:local --workspace=@a5c-ai/agent-mux-tui
          # webui depends on core + ui — must be after agent-mux chain
          npm run build --workspace=@a5c-ai/agent-mux-webui

          # SDK, agent-core, babysitter-agent: prerequisites (atlas, agent-catalog,
          # agent-mux chain) are already built above — call tsc directly to avoid
          # redundant rebuilds through chained npm scripts.
          npm run build --workspace=@a5c-ai/babysitter-sdk
          (cd packages/agent-core && npx tsc --build --force tsconfig.json)
          (cd packages/babysitter-agent && npx tsc --build tsconfig.json)

          wait_all

      - name: Package dist directories
        run: find packages -path '*/dist' -type d | tar czf /tmp/build-all-dist.tar.gz -T -

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-all-dist
          path: /tmp/build-all-dist.tar.gz
          if-no-files-found: error

  validate_core:
    needs: [build_all, lint]
    name: Validate Core Runtime
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/core-logs

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/core-logs/architecture.log

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/core-logs/sdk-tests.log

      - name: agent-core tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/core-logs/agent-core-tests.log

      - name: babysitter-harness tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/core-logs/babysitter-harness-tests.log

      - name: Upload core validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-core-logs
          path: artifacts/core-logs
          if-no-files-found: warn

  validate_mux:
    needs: build_all
    name: Validate Mux Surfaces
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/mux-logs

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/mux-logs/hooks-mux-tests.log

      - name: agent-mux package tests
        run: |
          set -euo pipefail
          node scripts/agent-mux-build.cjs test packages/agent-mux/observability 2>&1 | tee artifacts/mux-logs/agent-mux-observability-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/core 2>&1 | tee artifacts/mux-logs/agent-mux-core-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/adapters 2>&1 | tee artifacts/mux-logs/agent-mux-adapters-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/harness-mock 2>&1 | tee artifacts/mux-logs/agent-mux-harness-mock-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/gateway 2>&1 | tee artifacts/mux-logs/agent-mux-gateway-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/cli 2>&1 | tee artifacts/mux-logs/agent-mux-cli-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/sdk 2>&1 | tee artifacts/mux-logs/agent-mux-sdk-tests.log
          npm run test:unit --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-tests.log

      - name: Verify non-realtime agent-mux release artifacts
        run: |
          set -euo pipefail
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-release.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-scorecard.log

      - name: Upload mux validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-mux-logs
          path: artifacts/mux-logs
          if-no-files-found: warn

  e2e_integration:
    needs:
      - validate_core
      - validate_mux
      - validate_krate
      - validate_cloud
      - validate_observer_and_compiler
    continue-on-error: ${{ github.ref_name != 'main' }}
    name: E2E Integration Tests
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: mkdir -p artifacts/e2e-logs

      - name: Triggers e2e + coverage
        run: |
          set -euo pipefail
          npm run test:e2e --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/e2e-logs/triggers-e2e.log
          npm run test:coverage --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/e2e-logs/triggers-coverage.log

      - name: Krate e2e + smoke
        run: |
          set -euo pipefail
          cd packages/krate/core
          npm run e2e 2>&1 | tee ../../../artifacts/e2e-logs/krate-e2e.log
          npm run smoke 2>&1 | tee ../../../artifacts/e2e-logs/krate-smoke.log

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: agent-mux webui browser e2e
        run: npm run test:e2e --workspace=@a5c-ai/agent-mux-webui

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-e2e-logs
          path: artifacts/e2e-logs
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-mux-playwright-artifacts
          path: |
            packages/agent-mux/webui/.tmp/playwright-report
            packages/agent-mux/webui/.tmp/playwright-test-results
          if-no-files-found: warn

  validate_cloud:
    needs: build_all
    name: Validate Cloud Workspace
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/cloud-logs

      - name: Validate cloud deployment workspace
        run: |
          set -euo pipefail
          npm run test:cloud 2>&1 | tee artifacts/cloud-logs/cloud-tests.log
          npm run coverage:cloud 2>&1 | tee artifacts/cloud-logs/cloud-coverage.log
          npm run verify:cloud-release 2>&1 | tee artifacts/cloud-logs/cloud-release.log

      - name: Upload cloud validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-cloud-logs
          path: artifacts/cloud-logs
          if-no-files-found: warn

  validate_krate:
    needs: build_all
    name: Validate Krate
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/krate-logs

      - name: Build Helm dependencies
        run: helm dependency build packages/krate/charts 2>&1 | tee artifacts/krate-logs/helm-dep-build.log || true

      - name: Test krate core
        run: |
          set -euo pipefail
          cd packages/krate/core && npm test 2>&1 | tee ../../../artifacts/krate-logs/core-tests.log

      - name: Upload krate validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-krate-logs
          path: artifacts/krate-logs
          if-no-files-found: warn

  validate_observer_and_compiler:
    needs: build_all
    name: Validate Observer And Compiler
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-all-dist
          path: /tmp

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/observer-compiler-logs

      - name: Test extension-mux
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/extension-mux 2>&1 | tee artifacts/observer-compiler-logs/extension-mux-tests.log

      - name: Generate unified plugin bundles
        run: |
          set -euo pipefail
          npm run generate:plugins 2>&1 | tee artifacts/observer-compiler-logs/generated-plugin-bundles.log

      - name: Test observer-dashboard
        run: |
          set -euo pipefail
          npm run test:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-tests.log

      - name: Upload observer and compiler logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-observer-compiler-logs
          path: artifacts/observer-compiler-logs
          if-no-files-found: warn

  prepare_staging_publish:
    if: >-
      !cancelled()
      && needs.lint.result == 'success'
      && needs.build_all.result == 'success'
      && needs.validate_core.result == 'success'
      && needs.validate_mux.result == 'success'
      && needs.e2e_integration.result == 'success'
      && needs.validate_cloud.result == 'success'
      && needs.validate_krate.result == 'success'
      && needs.validate_observer_and_compiler.result == 'success'
    name: Prepare Publish
    needs:
      - lint
      - build_all
      - validate_core
      - validate_mux
      - e2e_integration
      - validate_cloud
      - validate_krate
      - validate_observer_and_compiler
    runs-on: ubuntu-latest-l
    permissions:
      contents: write
    outputs:
      staging_version_sdk: ${{ steps.version.outputs.staging_version_sdk }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org/
          token: ${{ secrets.NPM_TOKEN }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set publish version
        id: version
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          case "${GITHUB_REF_NAME}" in
            main)
              PUBLISH_VERSION="$BASE_VERSION"
              ;;
            staging|develop)
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              NEXT_PATCH=$((PATCH + 1))
              PUBLISH_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-${GITHUB_REF_NAME}.${SHORT_SHA}"
              ;;
            *)
              echo "Unsupported publish branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac
          echo "publish_version=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_unified=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_sdk=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_agent_mux=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_codex=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_github=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_cursor=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_gemini=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_pi=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_omp=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_opencode=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_openclaw=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "Setting ${GITHUB_REF_NAME} publish version: $PUBLISH_VERSION"
          node scripts/sync-workspace-versions.mjs --version "$PUBLISH_VERSION"

      - name: Prepare workspace manifests for publish
        run: |
          set -euo pipefail
          node scripts/sync-workspace-versions.mjs --version "$STAGING_VERSION"
        env:
          STAGING_VERSION: ${{ steps.version.outputs.staging_version_sdk }}

      - name: Refresh publish lockfile
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --workspaces --include-workspace-root

      - name: Bundle publish workspace
        run: |
          set -euo pipefail
          mkdir -p artifacts/publish-source
          tar --exclude=.git --exclude=node_modules --exclude=artifacts -czf artifacts/publish-source/publish-source.tgz .

      - name: Upload publish workspace
        uses: actions/upload-artifact@v7
        with:
          name: publish-source
          path: artifacts/publish-source/publish-source.tgz
          if-no-files-found: error

  publish_staging_atlas:
    name: Publish Foundation - atlas
    needs: prepare_staging_publish
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
    steps:
      - name: Download publish workspace
        uses: actions/download-artifact@v8
        with:
          name: publish-source
          path: artifacts/publish-source

      - name: Extract publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org/
          token: ${{ secrets.NPM_TOKEN }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build atlas
        run: npm run build --workspace=@a5c-ai/atlas

      - name: Publish atlas
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
