# QA Dispatch — trigger live-stack validation from PR comments or manually
#
# Usage:
#   - Comment `/qa` or `/qa <instructions>` on a PR
#   - Or dispatch manually with branch, PR number, and instructions

name: QA Dispatch

on:
  push:
    branches: [main, staging, develop]
    paths: ['.github/workflows/qa-dispatch.yml']
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (e.g. feat/my-feature)'
        required: true
        type: string
      pr_number:
        description: 'PR number to report results to (optional)'
        required: false
        type: string
        default: ''
      instructions:
        description: 'Custom instructions for the QA agent (optional)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write
  actions: write
  issues: write

jobs:
  qa:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.issue.pull_request && startsWith(github.event.comment.body, '/qa'))
    runs-on: ubuntu-latest-l
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.event.repository.default_branch }}
          fetch-depth: 0


      - uses: a5c-ai/babysitter/packages/triggers@staging
        with:
          harness: claude-code
          provider: foundry
          model: gpt-5.5
          interaction-mode: non-interactive
          max-turns: '9999'
          prompt: |
            You are a QA automation agent.
            Trigger: ${{ github.event_name == 'workflow_dispatch' && 'manual dispatch' || format('/qa on PR #{0}', github.event.issue.number) }}
            Branch: ${{ inputs.branch || github.head_ref || github.event.repository.default_branch }}
            PR/Issue: #${{ inputs.pr_number || github.event.issue.number || 'none' }}
            Instructions: ${{ inputs.instructions || github.event.comment.body || 'Run default QA based on changed files' }}

            STEP 0 — READ THE PR/ISSUE FOR CONTEXT:
            Run `gh pr view ${{ inputs.pr_number || github.event.issue.number }} --json files,title,body,comments,labels` to understand what changed and any discussion.
            If it's an issue, run `gh issue view ${{ inputs.pr_number || github.event.issue.number }} --json title,body,labels,comments`.
            This context informs which test scenarios to select.

            STEP 1 — READ THE QA GUIDE:
            Read docs/development/07-live-stack-qa-guide.md thoroughly. It describes:
            - Available test axes (agents, models, modes, install types)
            - How to dispatch the live-stack workflow with a JSON matrix
            - When to test which scenarios

            STEP 2 — ANALYZE THE PR:
            Run `gh pr view ${{ github.event.issue.number }} --json files,title,body` to understand what changed.
            Determine which components are affected:
            - transport-mux changes → test multiple providers/models
            - adapter changes → test the specific harness that changed
            - launch.ts changes → test multiple harnesses across modes
            - atlas/agent-catalog changes → test adapters that read from the graph
            - babysitter SDK/plugin changes → test BP mode (predefined + create)
            - hooks-mux changes → test bridged-hooks mode
            If the `/qa` comment includes specific instructions, follow those instead.

            STEP 3 — DISPATCH THE LIVE-STACK WORKFLOW:
            Use `gh workflow run live-stack.yml --ref ${{ inputs.branch || github.head_ref || 'staging' }} -f matrix='<JSON>'` with the appropriate test matrix.
            The JSON format is: [{"agent":"...","model":"...","mode":"...","install":"...","live":true}]
            Choose a focused set — not the full cross-product, but enough to cover the affected paths.

            STEP 4 — WAIT FOR RESULTS:
            After dispatching, poll with `gh run list --workflow=live-stack.yml --limit=1 --json databaseId,status,conclusion` until the run completes.
            Check every 60 seconds. Timeout after 20 minutes.

            STEP 5 — REPORT RESULTS:
            Get the results: `gh run view <id> --json jobs --jq '.jobs[] | {name, conclusion}'`
            If a PR number is available (${{ inputs.pr_number || github.event.issue.number || '' }}), post results as a PR comment:
            `gh pr comment <number> --body "<markdown>"`
            Otherwise, print results to stdout.
            Use: `gh pr comment ${{ github.event.issue.number }} --body "<markdown>"`
          trigger-query: ''
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
