name: Create Release Tags

on:
  # Called by Publish after all validation and publish jobs succeed
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      ref:
        required: true
        type: string
      version:
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create_release_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a5c GitHub App token
        id: a5c-token
        continue-on-error: true
        uses: a5c-ai/generate-token-action@main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}
          token: ${{ steps.a5c-token.outputs.a5c_token || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create immutable release tag
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          BRANCH="${{ inputs.branch || github.ref_name }}"
          case "$BRANCH" in
            main)
              TAG="v${VERSION}"
              ;;
            staging|develop)
              TAG="babysitter/${BRANCH}/v${VERSION}"
              ;;
            *)
              echo "Unsupported release tag branch: $BRANCH" >&2
              exit 1
              ;;
          esac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Release tag ${TAG} already exists; leaving it unchanged."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
