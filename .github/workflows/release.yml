name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  validate:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/logs/metadata.log

      - name: Build SDK
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee artifacts/logs/build.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/logs/lint.log

      - name: Unit tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/logs/unit-tests.log

      - name: Build breakpoints-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/logs/breakpoints-mux-build.log

      - name: Typecheck breakpoints-mux
        run: |
          set -euo pipefail
          npm run typecheck --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/logs/breakpoints-mux-typecheck.log

      - name: breakpoints-mux tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/logs/breakpoints-mux-tests.log

      - name: Build hooks-mux
        run: |
          set -euo pipefail
          npm run build:hooks-mux 2>&1 | tee artifacts/logs/hooks-mux-build.log

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/logs/hooks-mux-tests.log

      - name: Build agent-mux packages
        run: |
          set -euo pipefail
          npm run build:agent-mux 2>&1 | tee artifacts/logs/agent-mux-build.log

      - name: agent-mux tests
        run: |
          set -euo pipefail
          npm run test:agent-mux 2>&1 | tee artifacts/logs/agent-mux-tests.log

      - name: Build and test agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/logs/agent-plugins-mux-build.log
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/logs/agent-plugins-mux-tests.log

      - name: Build and test babysitter-harness
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/logs/agent-core-build.log
          npm run build --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/logs/babysitter-harness-build.log
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/logs/babysitter-harness-tests.log

      - name: babysitter-codex package tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-codex 2>&1 | tee artifacts/logs/babysitter-codex-tests.log

      - name: babysitter-github plugin validation
        run: |
          set -euo pipefail
          bash plugins/babysitter-github/test/plugin-validate.sh 2>&1 | tee artifacts/logs/babysitter-github-validate.log

      - name: babysitter-cursor plugin validation
        run: |
          set -euo pipefail
          bash plugins/babysitter-cursor/test/plugin-validate.sh 2>&1 | tee artifacts/logs/babysitter-cursor-validate.log

      - name: babysitter-gemini plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-gemini 2>&1 | tee artifacts/logs/babysitter-gemini-tests.log

      - name: babysitter-pi plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-pi 2>&1 | tee artifacts/logs/babysitter-pi-tests.log

      - name: babysitter-omp plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-omp 2>&1 | tee artifacts/logs/babysitter-omp-tests.log

      - name: babysitter-opencode plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-opencode 2>&1 | tee artifacts/logs/babysitter-opencode-tests.log

      - name: babysitter-openclaw plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-openclaw 2>&1 | tee artifacts/logs/babysitter-openclaw-tests.log

      - name: babysitter-paperclip plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-paperclip 2>&1 | tee artifacts/logs/babysitter-paperclip-tests.log

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: artifacts/logs
          if-no-files-found: warn

  version_and_release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          name: build-logs
          path: artifacts/logs

      - name: Prepare release artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/release


      - name: Bump version and changelog
        id: bump
        run: |
          set -euo pipefail
          VERSION=$(node scripts/bump-version.mjs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          set -euo pipefail
          node scripts/release-notes.mjs > release-notes.md

      - name: Commit release metadata
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/sdk/package.json packages/babysitter/package.json packages/babysitter-agent/package.json packages/agent-plugins-mux/package.json packages/kanban/package.json packages/breakpoints-mux/package.json packages/hooks-mux/core/package.json packages/hooks-mux/cli/package.json packages/hooks-mux/adapter-claude/package.json packages/hooks-mux/adapter-codex/package.json packages/hooks-mux/adapter-gemini/package.json packages/hooks-mux/adapter-copilot/package.json packages/hooks-mux/adapter-cursor/package.json packages/hooks-mux/adapter-pi/package.json packages/hooks-mux/adapter-oh-my-pi/package.json packages/hooks-mux/adapter-opencode/package.json packages/hooks-mux/adapter-openclaw/package.json packages/agent-mux/adapters/package.json packages/agent-mux/cli/package.json packages/agent-mux/core/package.json packages/agent-mux/gateway/package.json packages/agent-mux/harness-mock/package.json packages/agent-mux/mobile-android-app/package.json packages/agent-mux/mobile-ios-app/package.json packages/agent-mux/observability/package.json packages/agent-mux/sdk/package.json packages/agent-mux/tui/package.json packages/agent-mux/tv-androidtv-app/package.json packages/agent-mux/tv-appletv-app/package.json packages/agent-mux/ui/package.json packages/agent-mux/watch-watchos-app/package.json packages/agent-mux/watch-wearos-app/package.json packages/agent-mux/webui/package.json package-lock.json CHANGELOG.md plugins/babysitter/.claude-plugin/plugin.json plugins/babysitter/plugin.json plugins/babysitter/versions.json plugins/babysitter-codex/package.json plugins/babysitter-codex/versions.json plugins/babysitter-gemini/package.json plugins/babysitter-gemini/plugin.json plugins/babysitter-gemini/gemini-extension.json plugins/babysitter-gemini/versions.json plugins/babysitter-pi/package.json plugins/babysitter-pi/versions.json plugins/babysitter-omp/package.json plugins/babysitter-omp/versions.json plugins/babysitter-opencode/package.json plugins/babysitter-opencode/plugin.json plugins/babysitter-opencode/versions.json plugins/babysitter-openclaw/package.json plugins/babysitter-openclaw/plugin.json plugins/babysitter-openclaw/openclaw.plugin.json plugins/babysitter-openclaw/versions.json plugins/babysitter-github/plugin.json plugins/babysitter-github/versions.json plugins/babysitter-github/package.json plugins/babysitter-cursor/plugin.json plugins/babysitter-cursor/versions.json plugins/babysitter-cursor/package.json plugins/babysitter-paperclip/package.json plugins/babysitter-paperclip/versions.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No version changes detected."
          else
            TARGET_BRANCH=${BRANCH_NAME:-${GITHUB_REF##*/}}
            git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip release]"
            if git push origin HEAD:$TARGET_BRANCH 2>/dev/null; then
              echo "Release metadata committed and pushed."
            elif git pull --rebase --autostash origin $TARGET_BRANCH 2>/dev/null && git push origin HEAD:$TARGET_BRANCH 2>/dev/null; then
              echo "Release metadata committed after rebase."
            else
              echo "::warning::Could not push release metadata commit (concurrent conflict). Skipping — publish already succeeded."
              git rebase --abort 2>/dev/null || true
            fi
          fi

      - name: Build SDK package
        run: |
          set -euo pipefail
          npm run build:sdk

      - name: Build breakpoints-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/breakpoints-mux

      - name: Build agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux

      - name: Build and test kanban
        run: |
          set -euo pipefail
          npm run build:kanban
          npm run build:cli --workspace=@a5c-ai/kanban
          npm run verify:release --workspace=@a5c-ai/kanban
          npm run test:kanban

      - name: Build hooks-mux
        run: |
          set -euo pipefail
          npm run build:hooks-mux

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux

      - name: Build agent-mux packages
        run: |
          set -euo pipefail
          npm run build:agent-mux

      - name: agent-mux tests
        run: |
          set -euo pipefail
          npm run test:agent-mux

      - name: Pack npm artifacts
        run: |
          set -euo pipefail
          npm pack --workspace=@a5c-ai/babysitter-sdk --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-plugins-mux --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/kanban --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/breakpoints-mux --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-observability --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-core --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-adapters --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-harness-mock --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-ui --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-gateway --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-cli --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-webui --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-tui --pack-destination artifacts/release
          (cd packages/babysitter && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-codex && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-github && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-cursor && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-gemini && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-pi && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-omp && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-opencode && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-openclaw && npm pack --pack-destination ../../artifacts/release)
          (cd plugins/babysitter-paperclip && npm pack --pack-destination ../../artifacts/release)

      - name: Generate artifact checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=( artifacts/release/*.tgz )
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "Release artifacts missing" >&2
            exit 1
          fi
          (cd artifacts/release && sha256sum *.tgz > artifacts.sha256)

      - name: Publish SDK to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --workspace=@a5c-ai/babysitter-sdk --access public

      - name: Publish agent-plugins-mux to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --workspace=@a5c-ai/agent-plugins-mux --access public

      - name: Publish kanban to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --workspace=@a5c-ai/kanban --access public

      - name: Publish breakpoints-mux to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --workspace=@a5c-ai/breakpoints-mux --access public

      - name: Publish agent-mux packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in @a5c-ai/agent-mux-observability @a5c-ai/agent-mux-core @a5c-ai/agent-mux-adapters @a5c-ai/agent-mux-harness-mock @a5c-ai/agent-mux-ui @a5c-ai/agent-mux-gateway @a5c-ai/agent-mux-cli @a5c-ai/agent-mux-webui @a5c-ai/agent-mux @a5c-ai/agent-mux-tui; do
            echo "Publishing $pkg..."
            npm publish --workspace=$pkg --access public
          done

      - name: Inject SDK dependency into codex package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-codex/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-codex package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-codex

      - name: Inject SDK dependency into github package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-github/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-github package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-github

      - name: Inject SDK dependency into cursor package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-cursor/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-cursor package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-cursor

      - name: Inject SDK dependency into gemini package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-gemini/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-gemini package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-gemini

      - name: Inject SDK dependency into pi package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-pi/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-pi package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-pi

      - name: Inject SDK dependency into omp package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-omp/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-omp package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-omp

      - name: Inject SDK dependency into opencode package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-opencode/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-opencode package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-opencode

      - name: Inject SDK dependency into openclaw package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-openclaw/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-openclaw package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-openclaw

      - name: Inject SDK dependency into paperclip package for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkgPath = 'plugins/babysitter-paperclip/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter-paperclip package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm run deploy
        working-directory: plugins/babysitter-paperclip

      - name: Publish hooks-mux packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in @a5c-ai/hooks-mux-core @a5c-ai/hooks-mux-cli @a5c-ai/hooks-mux-adapter-claude @a5c-ai/hooks-mux-adapter-codex @a5c-ai/hooks-mux-adapter-gemini @a5c-ai/hooks-mux-adapter-copilot @a5c-ai/hooks-mux-adapter-cursor @a5c-ai/hooks-mux-adapter-pi @a5c-ai/hooks-mux-adapter-oh-my-pi @a5c-ai/hooks-mux-adapter-opencode @a5c-ai/hooks-mux-adapter-openclaw; do
            echo "Publishing $pkg..."
            npm publish --workspace=$pkg --access public
          done

      - name: Inject SDK dependency into metapackage for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/babysitter/package.json', 'utf8'));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies['@a5c-ai/babysitter-sdk'] = pkg.version;
            fs.writeFileSync('packages/babysitter/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish babysitter metapackage to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public
        working-directory: packages/babysitter

      - name: Tag release
        run: |
          set -euo pipefail
          TAG="v${{ steps.bump.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -d "$TAG"
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.bump.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y
          fi
          ASSETS=(artifacts/release/*)
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "Release artifacts missing" >&2
            exit 1
          fi
          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Babysitter $TAG" \
            --notes-file release-notes.md
