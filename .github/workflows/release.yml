          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Run cloud production deploy hook
        if: ${{ vars.A5C_CLOUD_PROD_DEPLOY_ENABLED == 'true' }}
        env:
          A5C_CLOUD_ENVIRONMENT: prod
          A5C_CLOUD_RELEASE_TAG: ${{ needs.prepare_release.outputs.version }}
          A5C_CLOUD_TARGET_TYPE: ${{ vars.A5C_CLOUD_PROD_TARGET_TYPE }}
          A5C_CLOUD_KUBE_CONTEXT: ${{ vars.A5C_CLOUD_PROD_KUBE_CONTEXT }}
          A5C_CLOUD_NAMESPACE: ${{ vars.A5C_CLOUD_PROD_NAMESPACE }}
          A5C_CLOUD_INGRESS_HOSTS: ${{ vars.A5C_CLOUD_PROD_INGRESS_HOSTS }}
          A5C_CLOUD_IMAGE_REGISTRY: ${{ vars.A5C_CLOUD_IMAGE_REGISTRY }}
          A5C_CLOUD_REGION: ${{ vars.A5C_CLOUD_PROD_REGION }}
          A5C_CLOUD_CLUSTER_NAME: ${{ vars.A5C_CLOUD_PROD_CLUSTER_NAME }}
          A5C_CLOUD_PROJECT_ID: ${{ vars.A5C_CLOUD_PROD_PROJECT_ID }}
          A5C_CLOUD_RESOURCE_GROUP: ${{ vars.A5C_CLOUD_PROD_RESOURCE_GROUP }}
          A5C_CLOUD_SUBSCRIPTION_ID: ${{ vars.A5C_CLOUD_PROD_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          npm run deploy:cloud:prod

  finalize_release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    name: Finalize Release
    needs:
      - prepare_release
      - publish_release_foundation
      - publish_release_hooks_and_core
      - publish_release_agent_mux_leaf
      - publish_release_agent_mux_gateway
      - publish_release_agent_mux_cli
      - publish_release_agent_mux_root
      - publish_release_agent_mux_tui
      - deploy_release_cloud
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare_release.outputs.release_ref }}

      - name: Download release publish workspace
        uses: actions/download-artifact@v4
        with:
          name: release-publish-source
          path: artifacts/publish-source

      - name: Extract release publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/release-publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          name: release-bundles
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Publish babysitter metapackage to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public
        working-directory: packages/babysitter

      - name: Tag release
        run: |
          set -euo pipefail
          TAG="v${{ needs.prepare_release.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -d "$TAG"
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.prepare_release.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y
          fi
          ASSETS=(artifacts/release/*)
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "Release artifacts missing" >&2
            exit 1
          fi
          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Babysitter $TAG" \
            --notes-file release-notes.md
