  deploy_release_cloud:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    name: Deploy Cloud Production
    needs:
      - prepare_release
      - publish_release_foundation
    runs-on: ubuntu-latest
    steps:
      - name: Download release publish workspace
        uses: actions/download-artifact@v4
        with:
          name: release-publish-source
          path: artifacts/publish-source

      - name: Extract release publish workspace
        run: |
          set -euo pipefail
