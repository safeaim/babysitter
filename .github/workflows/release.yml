name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  validate:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/logs/metadata.log

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/logs/architecture.log

      - name: Build runtime graph
        run: |
          set -euo pipefail
          npm run build:runtime 2>&1 | tee artifacts/logs/build.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/logs/lint.log

      - name: Unit tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/logs/unit-tests.log

      - name: Build breakpoints-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/logs/breakpoints-mux-build.log

      - name: Typecheck breakpoints-mux
        run: |
          set -euo pipefail
          npm run typecheck --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/logs/breakpoints-mux-typecheck.log

      - name: breakpoints-mux tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/breakpoints-mux 2>&1 | tee artifacts/logs/breakpoints-mux-tests.log

      - name: Build hooks-mux
        run: |
          set -euo pipefail
          npm run build:hooks-mux 2>&1 | tee artifacts/logs/hooks-mux-build.log

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/logs/hooks-mux-tests.log

      - name: Build agent-mux packages
        run: |
          set -euo pipefail
          npm run build:agent-mux 2>&1 | tee artifacts/logs/agent-mux-build.log

      - name: agent-mux tests
        run: |
          set -euo pipefail
          npm run test:agent-mux 2>&1 | tee artifacts/logs/agent-mux-tests.log

      - name: agent-mux-tui release verification
        run: |
          set -euo pipefail
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/logs/agent-mux-tui-release.log

      - name: agent-mux-core release verification
        run: |
          set -euo pipefail
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/logs/agent-mux-core-release.log

      - name: Build realtime flow surfaces
        run: |
          set -euo pipefail
          npm run build:realtime-flow 2>&1 | tee artifacts/logs/realtime-flow-build.log

      - name: Realtime flow tests
        run: |
          set -euo pipefail
          npm run test:realtime-flow 2>&1 | tee artifacts/logs/realtime-flow-tests.log

      - name: Realtime flow release verification
        run: |
          set -euo pipefail
          npm run verify:realtime-flow-release 2>&1 | tee artifacts/logs/realtime-flow-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/logs/transport-mux-build.log
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/logs/transport-mux-scorecard.log

      - name: Validate cloud deployment workspace
        run: |
          set -euo pipefail
          npm run build:cloud 2>&1 | tee artifacts/logs/cloud-build.log
          npm run test:cloud 2>&1 | tee artifacts/logs/cloud-tests.log
          npm run coverage:cloud 2>&1 | tee artifacts/logs/cloud-coverage.log
          npm run verify:cloud-release 2>&1 | tee artifacts/logs/cloud-release.log

      - name: Build compiler prerequisites
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-catalog 2>&1 | tee artifacts/logs/agent-catalog-build.log

      - name: Build and test agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/logs/agent-plugins-mux-build.log
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/logs/agent-plugins-mux-tests.log

      - name: Validate canonical Claude plugin bundle
        run: |
          set -euo pipefail
          node packages/agent-plugins-mux/dist/cli.js diff --target claude-code --source plugins/babysitter-unified --existing plugins/babysitter 2>&1 | tee artifacts/logs/babysitter-claude-diff.log

      - name: Build and test observer-dashboard
        run: |
          set -euo pipefail
          npm run build:observer 2>&1 | tee artifacts/logs/observer-dashboard-build.log
          npm run test:observer 2>&1 | tee artifacts/logs/observer-dashboard-tests.log

      - name: Build and test babysitter-harness
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/logs/agent-core-build.log
          npm run build --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/logs/babysitter-harness-build.log
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/logs/agent-core-tests.log
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/logs/babysitter-harness-tests.log

      - name: babysitter-codex package tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-codex 2>&1 | tee artifacts/logs/babysitter-codex-tests.log

      - name: babysitter-github plugin validation
        run: |
          set -euo pipefail
          bash plugins/babysitter-github/test/plugin-validate.sh 2>&1 | tee artifacts/logs/babysitter-github-validate.log

      - name: babysitter-cursor plugin validation
        run: |
          set -euo pipefail
          bash plugins/babysitter-cursor/test/plugin-validate.sh 2>&1 | tee artifacts/logs/babysitter-cursor-validate.log

      - name: babysitter-gemini plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-gemini 2>&1 | tee artifacts/logs/babysitter-gemini-tests.log

      - name: babysitter-pi plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-pi 2>&1 | tee artifacts/logs/babysitter-pi-tests.log

      - name: babysitter-omp plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-omp 2>&1 | tee artifacts/logs/babysitter-omp-tests.log

      - name: babysitter-opencode plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-opencode 2>&1 | tee artifacts/logs/babysitter-opencode-tests.log

      - name: babysitter-openclaw plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-openclaw 2>&1 | tee artifacts/logs/babysitter-openclaw-tests.log

      - name: babysitter-paperclip plugin tests
        run: |
          set -euo pipefail
          npm test --prefix plugins/babysitter-paperclip 2>&1 | tee artifacts/logs/babysitter-paperclip-tests.log

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: artifacts/logs
          if-no-files-found: warn

  prepare_release:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      release_ref: ${{ steps.release_ref.outputs.release_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          name: build-logs
          path: artifacts/logs

      - name: Prepare release artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/release


      - name: Bump version and changelog
        id: bump
        run: |
          set -euo pipefail
          VERSION=$(node scripts/bump-version.mjs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          set -euo pipefail
          node scripts/release-notes.mjs > release-notes.md

      - name: Commit release metadata
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/agent-catalog/package.json packages/sdk/package.json packages/babysitter/package.json packages/babysitter-agent/package.json packages/agent-plugins-mux/package.json packages/observer-dashboard/package.json packages/cloud/package.json packages/breakpoints-mux/package.json packages/hooks-mux/core/package.json packages/hooks-mux/cli/package.json packages/hooks-mux/adapter-claude/package.json packages/hooks-mux/adapter-codex/package.json packages/hooks-mux/adapter-gemini/package.json packages/hooks-mux/adapter-copilot/package.json packages/hooks-mux/adapter-cursor/package.json packages/hooks-mux/adapter-pi/package.json packages/hooks-mux/adapter-oh-my-pi/package.json packages/hooks-mux/adapter-opencode/package.json packages/hooks-mux/adapter-openclaw/package.json packages/agent-mux/adapters/package.json packages/agent-mux/cli/package.json packages/agent-mux/core/package.json packages/agent-mux/gateway/package.json packages/agent-mux/harness-mock/package.json packages/agent-mux/mobile-android-app/package.json packages/agent-mux/mobile-ios-app/package.json packages/agent-mux/observability/package.json packages/agent-mux/sdk/package.json packages/agent-mux/tui/package.json packages/agent-mux/tv-androidtv-app/package.json packages/agent-mux/tv-appletv-app/package.json packages/agent-mux/ui/package.json packages/agent-mux/watch-watchos-app/package.json packages/agent-mux/watch-wearos-app/package.json packages/agent-mux/webui/package.json packages/transport-mux/package.json package-lock.json CHANGELOG.md plugins/babysitter/.claude-plugin/plugin.json plugins/babysitter/plugin.json plugins/babysitter/versions.json plugins/babysitter-codex/package.json plugins/babysitter-codex/versions.json plugins/babysitter-gemini/package.json plugins/babysitter-gemini/plugin.json plugins/babysitter-gemini/gemini-extension.json plugins/babysitter-gemini/versions.json plugins/babysitter-pi/package.json plugins/babysitter-pi/versions.json plugins/babysitter-omp/package.json plugins/babysitter-omp/versions.json plugins/babysitter-opencode/package.json plugins/babysitter-opencode/plugin.json plugins/babysitter-opencode/versions.json plugins/babysitter-openclaw/package.json plugins/babysitter-openclaw/plugin.json plugins/babysitter-openclaw/openclaw.plugin.json plugins/babysitter-openclaw/versions.json plugins/babysitter-github/plugin.json plugins/babysitter-github/versions.json plugins/babysitter-github/package.json plugins/babysitter-cursor/plugin.json plugins/babysitter-cursor/versions.json plugins/babysitter-cursor/package.json plugins/babysitter-paperclip/package.json plugins/babysitter-paperclip/versions.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No version changes detected."
          else
            TARGET_BRANCH=${BRANCH_NAME:-${GITHUB_REF##*/}}
            git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip release]"
            if git push origin HEAD:$TARGET_BRANCH 2>/dev/null; then
              echo "Release metadata committed and pushed."
            elif git pull --rebase --autostash origin $TARGET_BRANCH 2>/dev/null && git push origin HEAD:$TARGET_BRANCH 2>/dev/null; then
              echo "Release metadata committed after rebase."
            else
              echo "::warning::Could not push release metadata commit (concurrent conflict). Skipping — publish already succeeded."
              git rebase --abort 2>/dev/null || true
            fi
          fi

      - name: Capture release ref
        id: release_ref
        run: echo "release_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build SDK package
        run: |
          set -euo pipefail
          npm run build:sdk

      - name: Build breakpoints-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/breakpoints-mux

      - name: Build agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux

      - name: Build and test observer-dashboard
        run: |
          set -euo pipefail
          npm run build:observer
          npm run test:observer

      - name: Build hooks-mux
        run: |
          set -euo pipefail
          npm run build:hooks-mux

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux

      - name: Build agent-mux packages
        run: |
          set -euo pipefail
          npm run build:agent-mux

      - name: agent-mux tests
        run: |
          set -euo pipefail
          npm run test:agent-mux

      - name: Verify agent-mux-tui release contract
        run: |
          set -euo pipefail
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui

      - name: Build realtime flow surfaces
        run: |
          set -euo pipefail
          npm run build:realtime-flow

      - name: Realtime flow tests
        run: |
          set -euo pipefail
          npm run test:realtime-flow

      - name: Realtime flow release verification
        run: |
          set -euo pipefail
          npm run verify:realtime-flow-release

      - name: Build transport-mux runtime
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/transport-mux

      - name: Build and verify cloud package
        run: |
          set -euo pipefail
          npm run build:cloud
          npm run test:cloud
          npm run verify:cloud-release

      - name: Prepare metapackage manifest for publish
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const metaPkgPath = 'packages/babysitter/package.json';
            const metaPkg = JSON.parse(fs.readFileSync(metaPkgPath, 'utf8'));
            metaPkg.dependencies = metaPkg.dependencies || {};
            metaPkg.dependencies['@a5c-ai/babysitter-sdk'] = metaPkg.version;
            fs.writeFileSync(metaPkgPath, JSON.stringify(metaPkg, null, 2) + '\n');
          "

      - name: Sync internal workspace dependency versions for release publish
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const agentMuxVersion = JSON.parse(fs.readFileSync('packages/agent-mux/sdk/package.json', 'utf8')).version;

          const dependencyVersions = new Map([
            ['@a5c-ai/agent-catalog', '${{ steps.bump.outputs.version }}'],
            ['@a5c-ai/agent-core', '${{ steps.bump.outputs.version }}'],
            ['@a5c-ai/babysitter-agent', '${{ steps.bump.outputs.version }}'],
            ['@a5c-ai/babysitter-sdk', '${{ steps.bump.outputs.version }}'],
            ['@a5c-ai/hooks-mux-core', '${{ steps.bump.outputs.version }}'],
            ['@a5c-ai/agent-mux', agentMuxVersion],
            ['@a5c-ai/agent-mux-adapters', agentMuxVersion],
            ['@a5c-ai/agent-mux-cli', agentMuxVersion],
            ['@a5c-ai/agent-mux-core', agentMuxVersion],
            ['@a5c-ai/agent-mux-gateway', agentMuxVersion],
            ['@a5c-ai/agent-mux-observability', agentMuxVersion],
            ['@a5c-ai/agent-mux-ui', agentMuxVersion],
            ['@a5c-ai/transport-mux', agentMuxVersion],
          ]);
          const manifestPaths = ['package.json'];
          const depFields = ['dependencies', 'peerDependencies', 'optionalDependencies', 'devDependencies'];

          const rewriteVersion = (current, version) => {
            return version;
          };

          const walk = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (['node_modules', '.git', 'dist', 'dist-types', 'coverage', 'artifacts'].includes(entry.name)) {
                continue;
              }
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
                continue;
              }
              if (entry.isFile() && entry.name === 'package.json') {
                manifestPaths.push(fullPath);
              }
            }
          };

          for (const rootDir of ['packages']) {
            if (fs.existsSync(rootDir)) {
              walk(rootDir);
            }
          }

          for (const manifestPath of manifestPaths) {
            const data = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            let changed = false;
            for (const field of depFields) {
              const deps = data[field];
              if (!deps) continue;
              for (const [name, version] of dependencyVersions) {
                if (!(name in deps)) continue;
                const next = rewriteVersion(deps[name], version);
                if (deps[name] !== next) {
                  deps[name] = next;
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync(manifestPath, `${JSON.stringify(data, null, 2)}\n`);
            }
          }
          NODE

      - name: Refresh release publish lockfile
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts

      - name: Pack npm artifacts
        run: |
          set -euo pipefail
          npm pack --workspace=@a5c-ai/agent-catalog --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-core --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/babysitter-agent --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/babysitter-sdk --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-plugins-mux --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/babysitter-observer-dashboard --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/cloud --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/breakpoints-mux --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-observability --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-core --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-adapters --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-harness-mock --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-ui --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-gateway --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-cli --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-webui --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/agent-mux-tui --pack-destination artifacts/release
          npm pack --workspace=@a5c-ai/transport-mux --pack-destination artifacts/release
          (cd packages/babysitter && npm pack --pack-destination ../../artifacts/release)

      - name: Generate artifact checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=( artifacts/release/*.tgz )
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "Release artifacts missing" >&2
            exit 1
          fi
          (cd artifacts/release && sha256sum *.tgz > artifacts.sha256)

      - name: Bundle release publish workspace
        run: |
          set -euo pipefail
          mkdir -p artifacts/publish-source
          tar --exclude=.git --exclude=node_modules --exclude=artifacts -czf artifacts/publish-source/release-publish-source.tgz .

      - name: Upload release publish workspace
        uses: actions/upload-artifact@v4
        with:
          name: release-publish-source
          path: artifacts/publish-source/release-publish-source.tgz
          if-no-files-found: error

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: release-bundles
          path: |
            artifacts/release
            release-notes.md
          if-no-files-found: error

  publish_release_foundation:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    name: Publish Release Foundation - ${{ matrix.name }}
    needs: prepare_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-catalog
            build: npm run build --workspace=@a5c-ai/agent-catalog
            publish: npm publish --workspace=@a5c-ai/agent-catalog --access public
          - name: agent-core
            build: npm run build --workspace=@a5c-ai/agent-core
            publish: npm publish --workspace=@a5c-ai/agent-core --access public
          - name: babysitter-agent
            build: npm run build --workspace=@a5c-ai/babysitter-agent
            publish: npm publish --workspace=@a5c-ai/babysitter-agent --access public
          - name: babysitter-sdk
            build: npm run build:sdk
            publish: npm publish --workspace=@a5c-ai/babysitter-sdk --access public
          - name: agent-plugins-mux
            build: npm run build --workspace=@a5c-ai/agent-catalog && npm run build --workspace=@a5c-ai/agent-plugins-mux
            publish: npm publish --workspace=@a5c-ai/agent-plugins-mux --access public
          - name: observer-dashboard
            build: npm run build:observer
            publish: npm publish --workspace=@a5c-ai/babysitter-observer-dashboard --access public
          - name: cloud
            build: npm run build:cloud
            publish: npm publish --workspace=@a5c-ai/cloud --access public
          - name: breakpoints-mux
            build: npm run build --workspace=@a5c-ai/breakpoints-mux
            publish: npm publish --workspace=@a5c-ai/breakpoints-mux --access public
          - name: hooks-mux-core
            build: npm run build:hooks-mux
            publish: npm publish --workspace=@a5c-ai/hooks-mux-core --access public
          - name: agent-mux-observability
            build: npm run build:agent-mux
            publish: npm publish --workspace=@a5c-ai/agent-mux-observability --access public
    steps:
      - name: Download release publish workspace
        uses: actions/download-artifact@v4
        with:
          name: release-publish-source
          path: artifacts/publish-source

      - name: Extract release publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/release-publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build package workspace
        run: ${{ matrix.build }}

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}

  publish_release_hooks_and_core:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    name: Publish Release Hooks And Core - ${{ matrix.name }}
    needs: publish_release_foundation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-mux-core
            publish: npm publish --workspace=@a5c-ai/agent-mux-core --access public
          - name: hooks-mux-cli
            publish: npm publish --workspace=@a5c-ai/hooks-mux-cli --access public
          - name: hooks-mux-adapter-claude
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-claude --access public
          - name: hooks-mux-adapter-codex
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-codex --access public
          - name: hooks-mux-adapter-gemini
