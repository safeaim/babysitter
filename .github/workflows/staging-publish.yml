name: Staging Publish

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  id-token: write

concurrency:
  group: staging-publish
  cancel-in-progress: false

jobs:
  validate_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Core Runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/core-logs

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/core-logs/metadata.log

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/core-logs/architecture.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/core-logs/lint.log

      - name: Build runtime graph
        run: |
          set -euo pipefail
          npm run build:runtime 2>&1 | tee artifacts/core-logs/runtime-build.log

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/core-logs/sdk-tests.log

      - name: agent-core tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/core-logs/agent-core-tests.log

      - name: babysitter-harness tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/core-logs/babysitter-harness-tests.log

      - name: Upload core validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-core-logs
          path: artifacts/core-logs
          if-no-files-found: warn

  validate_mux:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Mux Surfaces
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/mux-logs

      - name: Build SDK prerequisites
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee artifacts/mux-logs/sdk-prereqs-build.log
          for workspace in \
            @a5c-ai/agent-mux-observability \
            @a5c-ai/agent-mux-core \
            @a5c-ai/agent-mux-adapters \
            @a5c-ai/agent-mux-gateway \
            @a5c-ai/transport-mux \
            @a5c-ai/agent-mux-cli \
            @a5c-ai/agent-mux \
            @a5c-ai/triggers
          do
            npm run build --workspace="$workspace"
          done 2>&1 | tee artifacts/mux-logs/agent-mux-test-prereqs-build.log
          npm run build --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-build.log

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/mux-logs/hooks-mux-tests.log

      - name: agent-mux package tests
        run: |
          set -euo pipefail
          node scripts/agent-mux-build.cjs test packages/agent-mux/observability 2>&1 | tee artifacts/mux-logs/agent-mux-observability-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/core 2>&1 | tee artifacts/mux-logs/agent-mux-core-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/adapters 2>&1 | tee artifacts/mux-logs/agent-mux-adapters-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/harness-mock 2>&1 | tee artifacts/mux-logs/agent-mux-harness-mock-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/gateway 2>&1 | tee artifacts/mux-logs/agent-mux-gateway-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/cli 2>&1 | tee artifacts/mux-logs/agent-mux-cli-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/sdk 2>&1 | tee artifacts/mux-logs/agent-mux-sdk-tests.log
          npm run test:unit --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-tests.log
          npm run test:e2e --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-e2e.log
          npm run test:coverage --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-coverage.log

      - name: Build and verify non-realtime agent-mux release artifacts
        run: |
          set -euo pipefail
          for workspace in \
            @a5c-ai/agent-catalog \
            @a5c-ai/agent-mux-observability \
            @a5c-ai/agent-mux-core \
            @a5c-ai/agent-mux-adapters \
            @a5c-ai/agent-mux-gateway \
            @a5c-ai/transport-mux \
            @a5c-ai/agent-mux-cli \
            @a5c-ai/agent-mux \
            @a5c-ai/agent-mux-tui \
            @a5c-ai/triggers
          do
            npm run build --workspace="$workspace"
          done 2>&1 | tee artifacts/mux-logs/agent-mux-release-build.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-release.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-build.log
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-scorecard.log

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/mux-logs/agent-mux-webui-playwright-install.log

      - name: agent-mux webui browser e2e
        run: |
          set -euo pipefail
          npm run test:e2e --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-browser-e2e.log

      - name: Upload mux Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-mux-playwright-artifacts
          path: |
            packages/agent-mux/webui/.tmp/playwright-report
            packages/agent-mux/webui/.tmp/playwright-test-results
          if-no-files-found: warn

      - name: Upload mux validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-mux-logs
          path: artifacts/mux-logs
          if-no-files-found: warn

  validate_cloud:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Cloud Workspace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/cloud-logs

      - name: Validate cloud deployment workspace
        run: |
          set -euo pipefail
          npm run build:cloud 2>&1 | tee artifacts/cloud-logs/cloud-build.log
          npm run test:cloud 2>&1 | tee artifacts/cloud-logs/cloud-tests.log
          npm run coverage:cloud 2>&1 | tee artifacts/cloud-logs/cloud-coverage.log
          npm run verify:cloud-release 2>&1 | tee artifacts/cloud-logs/cloud-release.log

      - name: Upload cloud validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-cloud-logs
          path: artifacts/cloud-logs
          if-no-files-found: warn

  validate_observer_and_compiler:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Observer And Compiler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/observer-compiler-logs

      - name: Build compiler prerequisites
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/atlas 2>&1 | tee artifacts/observer-compiler-logs/atlas-build.log
          npm run build --workspace=@a5c-ai/agent-catalog 2>&1 | tee artifacts/observer-compiler-logs/agent-catalog-build.log

      - name: Build and test agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-build.log
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-tests.log

      - name: Generate unified plugin bundles
        run: |
          set -euo pipefail
          npm run generate:plugins 2>&1 | tee artifacts/observer-compiler-logs/generated-plugin-bundles.log

      - name: Build and test observer-dashboard
        run: |
          set -euo pipefail
          npm run build:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-build.log
          npm run test:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-tests.log

      - name: Upload observer and compiler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-observer-compiler-logs
          path: artifacts/observer-compiler-logs
          if-no-files-found: warn

  prepare_staging_publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Prepare Staging Publish
    needs:
      - validate_core
      - validate_mux
      - validate_cloud
      - validate_observer_and_compiler
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      staging_version_sdk: ${{ steps.version.outputs.staging_version_sdk }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set staging prerelease version
        id: version
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          SHORT_SHA=$(git rev-parse --short HEAD)
          STAGING_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-staging.${SHORT_SHA}"
          echo "staging_version_unified=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_sdk=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_agent_mux=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_codex=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_github=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_cursor=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_gemini=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_pi=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_omp=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_opencode=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_openclaw=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "Setting shared staging version: $STAGING_VERSION"
          node scripts/sync-workspace-versions.mjs --version "$STAGING_VERSION"

      - name: Commit sdkVersion to staging branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/babysitter-unified/versions.json
          if git diff --cached --quiet; then
            echo "No sdkVersion changes to commit."
          else
            git commit -m "chore: set sdkVersion to ${{ steps.version.outputs.staging_version_sdk }} [skip staging]"
            if git push origin HEAD:staging 2>/dev/null; then
              echo "sdkVersion committed and pushed."
            elif git pull --rebase --autostash origin staging 2>/dev/null && git push origin HEAD:staging 2>/dev/null; then
              echo "sdkVersion committed after rebase."
            else
              echo "::warning::Could not push sdkVersion commit (concurrent run conflict). Skipping — npm publish already succeeded."
              git rebase --abort 2>/dev/null || true
            fi
          fi

      - name: Prepare workspace manifests for staging publish
        run: |
          set -euo pipefail
          node scripts/sync-workspace-versions.mjs --version "$STAGING_VERSION"
        env:
          STAGING_VERSION: ${{ steps.version.outputs.staging_version_sdk }}

      - name: Refresh staging publish lockfile
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --workspaces --include-workspace-root

      - name: Bundle staging publish workspace
        run: |
          set -euo pipefail
          mkdir -p artifacts/publish-source
          tar --exclude=.git --exclude=node_modules --exclude=artifacts -czf artifacts/publish-source/staging-publish-source.tgz .

      - name: Upload staging publish workspace
        uses: actions/upload-artifact@v4
        with:
          name: staging-publish-source
          path: artifacts/publish-source/staging-publish-source.tgz
          if-no-files-found: error

  publish_staging_foundation:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Publish Staging Foundation - ${{ matrix.name }}
    needs: prepare_staging_publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-catalog
            build: npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
            publish: npm publish --workspace=@a5c-ai/agent-catalog --access public --tag staging
          - name: agent-core
            build: npm run build --workspace=@a5c-ai/agent-core
            publish: npm publish --workspace=@a5c-ai/agent-core --access public --tag staging
          - name: babysitter-agent
            build: npm run build --workspace=@a5c-ai/babysitter-agent
            publish: npm publish --workspace=@a5c-ai/babysitter-agent --access public --tag staging
          - name: babysitter-sdk
            build: npm run build:sdk
            publish: npm publish --workspace=@a5c-ai/babysitter-sdk --access public --tag staging
          - name: agent-plugins-mux
            build: npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog && npm run build --workspace=@a5c-ai/agent-plugins-mux
            publish: npm publish --workspace=@a5c-ai/agent-plugins-mux --access public --tag staging
          - name: observer-dashboard
            build: npm run build:observer
            publish: npm publish --workspace=@a5c-ai/babysitter-observer-dashboard --access public --tag staging
          - name: cloud
            build: npm run build:cloud
            publish: npm publish --workspace=@a5c-ai/cloud --access public --tag staging
          - name: hooks-mux-core
            build: npm run build:hooks-mux
            publish: npm publish --workspace=@a5c-ai/hooks-mux-core --access public --tag staging
          - name: agent-mux-observability
            build: npm run build --workspace=@a5c-ai/agent-mux-observability
            publish: npm publish --workspace=@a5c-ai/agent-mux-observability --access public --tag staging
    steps:
      - name: Download staging publish workspace
        uses: actions/download-artifact@v4
        with:
          name: staging-publish-source
          path: artifacts/publish-source

      - name: Extract staging publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/staging-publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build package workspace
        run: ${{ matrix.build }}

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}

  publish_staging_hooks_and_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Publish Staging Hooks And Core - ${{ matrix.name }}
    needs: publish_staging_foundation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-mux-core
            publish: npm publish --workspace=@a5c-ai/agent-mux-core --access public --tag staging
          - name: hooks-mux-cli
            publish: npm publish --workspace=@a5c-ai/hooks-mux-cli --access public --tag staging
          - name: hooks-mux-adapter-claude
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-claude --access public --tag staging
          - name: hooks-mux-adapter-codex
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-codex --access public --tag staging
          - name: hooks-mux-adapter-gemini
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-gemini --access public --tag staging
          - name: hooks-mux-adapter-copilot
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-copilot --access public --tag staging
          - name: hooks-mux-adapter-cursor
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-cursor --access public --tag staging
          - name: hooks-mux-adapter-pi
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-pi --access public --tag staging
          - name: hooks-mux-adapter-oh-my-pi
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-oh-my-pi --access public --tag staging
          - name: hooks-mux-adapter-opencode
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-opencode --access public --tag staging
          - name: hooks-mux-adapter-openclaw
            publish: npm publish --workspace=@a5c-ai/hooks-mux-adapter-openclaw --access public --tag staging
    steps:
      - name: Download staging publish workspace
        uses: actions/download-artifact@v4
        with:
          name: staging-publish-source
          path: artifacts/publish-source

      - name: Extract staging publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/staging-publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build hooks and agent-mux workspaces
        run: |
          set -euo pipefail
          npm run build:hooks-mux
          npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
          npm run build --workspace=@a5c-ai/agent-mux-observability
          npm run build --workspace=@a5c-ai/agent-mux-core

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}

  publish_staging_agent_mux_leaf:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Publish Staging Agent Mux Leaf - ${{ matrix.name }}
    needs: publish_staging_hooks_and_core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-mux-adapters
            build: |
              set -euo pipefail
              npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
              npm run build --workspace=@a5c-ai/agent-mux-observability
              npm run build --workspace=@a5c-ai/agent-mux-core
              npm run build --workspace=@a5c-ai/agent-mux-adapters
            publish: npm publish --workspace=@a5c-ai/agent-mux-adapters --access public --tag staging
          - name: agent-mux-harness-mock
            build: |
              set -euo pipefail
              npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
              npm run build --workspace=@a5c-ai/agent-mux-observability
              npm run build --workspace=@a5c-ai/agent-mux-core
              npm run build --workspace=@a5c-ai/agent-mux-harness-mock
            publish: npm publish --workspace=@a5c-ai/agent-mux-harness-mock --access public --tag staging
          - name: transport-mux
            build: |
              set -euo pipefail
              npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
              npm run build --workspace=@a5c-ai/agent-mux-observability
              npm run build --workspace=@a5c-ai/agent-mux-core
              npm run build --workspace=@a5c-ai/transport-mux
            publish: npm publish --workspace=@a5c-ai/transport-mux --access public --tag staging
          - name: triggers
            build: |
              set -euo pipefail
              npm run build --workspace=@a5c-ai/triggers
              npm run test:unit --workspace=@a5c-ai/triggers
              npm run test:e2e --workspace=@a5c-ai/triggers
              npm run test:coverage --workspace=@a5c-ai/triggers
            publish: npm publish --workspace=@a5c-ai/triggers --access public --tag staging
    steps:
      - name: Download staging publish workspace
        uses: actions/download-artifact@v4
        with:
          name: staging-publish-source
          path: artifacts/publish-source

      - name: Extract staging publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/staging-publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build package workspace
        run: ${{ matrix.build }}

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}

  publish_staging_agent_mux_gateway:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Publish Staging Agent Mux Gateway - ${{ matrix.name }}
    needs: publish_staging_agent_mux_leaf
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-mux-gateway
            build: |
              set -euo pipefail
              npm run build --workspace=@a5c-ai/atlas && npm run build --workspace=@a5c-ai/agent-catalog
              npm run build --workspace=@a5c-ai/agent-mux-observability
              npm run build --workspace=@a5c-ai/agent-mux-core
              npm run build --workspace=@a5c-ai/agent-mux-adapters
              npm run build --workspace=@a5c-ai/agent-mux-gateway
            publish: npm publish --workspace=@a5c-ai/agent-mux-gateway --access public --tag staging
    steps:
      - name: Download staging publish workspace
        uses: actions/download-artifact@v4
        with:
          name: staging-publish-source
          path: artifacts/publish-source

      - name: Extract staging publish workspace
        run: |
          set -euo pipefail
          tar -xzf artifacts/publish-source/staging-publish-source.tgz -C "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Build package workspace
        run: ${{ matrix.build }}

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ${{ matrix.publish }}

  publish_staging_agent_mux_cli:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Publish Staging Agent Mux CLI
    needs: publish_staging_agent_mux_gateway
