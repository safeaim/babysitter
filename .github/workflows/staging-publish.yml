name: Staging Publish

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  id-token: write

concurrency:
  group: staging-publish
  cancel-in-progress: false

jobs:
  validate_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Core Runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/core-logs

      - name: Check command surface sync
        run: |
          set -euo pipefail
          npm run check:plugin-commands 2>&1 | tee artifacts/core-logs/plugin-command-sync.log

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/core-logs/metadata.log

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/core-logs/architecture.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/core-logs/lint.log

      - name: Build runtime graph
        run: |
          set -euo pipefail
          npm run build:runtime 2>&1 | tee artifacts/core-logs/runtime-build.log

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/core-logs/sdk-tests.log

      - name: agent-core tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/core-logs/agent-core-tests.log

      - name: babysitter-harness tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/core-logs/babysitter-harness-tests.log

      - name: Upload core validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-core-logs
          path: artifacts/core-logs
          if-no-files-found: warn

  validate_mux:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Mux Surfaces
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/mux-logs

      - name: Build SDK prerequisites
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee artifacts/mux-logs/sdk-prereqs-build.log

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/mux-logs/hooks-mux-tests.log

      - name: agent-mux package tests
        run: |
          set -euo pipefail
          node scripts/agent-mux-build.cjs test packages/agent-mux/observability 2>&1 | tee artifacts/mux-logs/agent-mux-observability-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/core 2>&1 | tee artifacts/mux-logs/agent-mux-core-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/adapters 2>&1 | tee artifacts/mux-logs/agent-mux-adapters-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/harness-mock 2>&1 | tee artifacts/mux-logs/agent-mux-harness-mock-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/gateway 2>&1 | tee artifacts/mux-logs/agent-mux-gateway-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/cli 2>&1 | tee artifacts/mux-logs/agent-mux-cli-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/sdk 2>&1 | tee artifacts/mux-logs/agent-mux-sdk-tests.log

      - name: Build and verify agent-mux release artifacts
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-build.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-release.log
          npm run build --workspace=@a5c-ai/agent-mux-ui 2>&1 | tee artifacts/mux-logs/agent-mux-ui-build.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-ui 2>&1 | tee artifacts/mux-logs/agent-mux-ui-release.log
          npm run build --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-build.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-release.log
          npm run build --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-build.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-build.log
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-scorecard.log

      - name: Upload mux validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-mux-logs
          path: artifacts/mux-logs
          if-no-files-found: warn

  validate_cloud:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Cloud Workspace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/cloud-logs

      - name: Validate cloud deployment workspace
        run: |
          set -euo pipefail
          npm run build:cloud 2>&1 | tee artifacts/cloud-logs/cloud-build.log
          npm run test:cloud 2>&1 | tee artifacts/cloud-logs/cloud-tests.log
          npm run coverage:cloud 2>&1 | tee artifacts/cloud-logs/cloud-coverage.log
          npm run verify:cloud-release 2>&1 | tee artifacts/cloud-logs/cloud-release.log

      - name: Upload cloud validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-cloud-logs
          path: artifacts/cloud-logs
          if-no-files-found: warn

  validate_observer_and_compiler:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Observer And Compiler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/observer-compiler-logs

      - name: Build compiler prerequisites
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-catalog 2>&1 | tee artifacts/observer-compiler-logs/agent-catalog-build.log

      - name: Build and test agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-build.log
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-tests.log

      - name: Build and test observer-dashboard
        run: |
          set -euo pipefail
          npm run build:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-build.log
          npm run test:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-tests.log

      - name: Upload observer and compiler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-observer-compiler-logs
          path: artifacts/observer-compiler-logs
          if-no-files-found: warn

  validate_plugins:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Plugin ${{ matrix.slug }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: babysitter-codex
            command: npm test --prefix plugins/babysitter-codex
            log: babysitter-codex-tests.log
            needs_sdk: true
          - slug: babysitter-github
            command: bash plugins/babysitter-github/test/plugin-validate.sh
            log: babysitter-github-validate.log
            needs_sdk: true
          - slug: babysitter-cursor
            command: bash plugins/babysitter-cursor/test/plugin-validate.sh
            log: babysitter-cursor-validate.log
            needs_sdk: true
          - slug: babysitter-gemini
            command: node plugins/babysitter-gemini/test/integration.test.js
            log: babysitter-gemini-integration.log
            needs_sdk: false
          - slug: babysitter-pi
            command: npm test --prefix plugins/babysitter-pi
            log: babysitter-pi-tests.log
            needs_sdk: false
          - slug: babysitter-omp
            command: npm test --prefix plugins/babysitter-omp
            log: babysitter-omp-tests.log
            needs_sdk: false
          - slug: babysitter-opencode
            command: npm test --prefix plugins/babysitter-opencode
            log: babysitter-opencode-tests.log
            needs_sdk: false
          - slug: babysitter-openclaw
            command: npm test --prefix plugins/babysitter-openclaw
            log: babysitter-openclaw-tests.log
            needs_sdk: false
          - slug: babysitter-paperclip
            command: npm test --prefix plugins/babysitter-paperclip
            log: babysitter-paperclip-tests.log
            needs_sdk: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/plugin-logs

      - name: Build local SDK prerequisites
        if: ${{ matrix.needs_sdk }}
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee "artifacts/plugin-logs/${{ matrix.slug }}-sdk-prereqs.log"

      - name: Run plugin validation
        run: |
          set -euo pipefail
          ${{ matrix.command }} 2>&1 | tee "artifacts/plugin-logs/${{ matrix.log }}"

      - name: Upload plugin validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-${{ matrix.slug }}-logs
          path: artifacts/plugin-logs
          if-no-files-found: warn

  generated_plugins:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Generate Plugin Snapshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/generated-plugin-logs

      - name: Generate plugin snapshots
        run: |
          set -euo pipefail
          npm run generate:plugins 2>&1 | tee artifacts/generated-plugin-logs/generated-plugins.log

      - name: Compare generated plugins with manual plugins
        id: compare_plugins
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/generate-plugins.mjs --output generated --compare . --compare-only 2>&1 | tee artifacts/generated-plugin-logs/generated-plugins-compare.log

      - name: Warn on manual plugin drift
        if: steps.compare_plugins.outcome == 'failure'
        run: echo "::warning::Generated plugins differ from the manually maintained plugin directories. Review staging-generated-plugin-logs for the drift report."

      - name: Upload generated plugin artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-generated-plugins
          path: generated
          if-no-files-found: warn

      - name: Upload generated plugin logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-generated-plugin-logs
          path: artifacts/generated-plugin-logs
          if-no-files-found: warn

      - name: Commit generated plugin snapshots
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          if git diff --cached --quiet; then
            echo "No generated plugin snapshot changes to commit."
          else
            git commit -m "chore: refresh generated plugin snapshots [skip staging]"
            if git push origin HEAD:$BRANCH_NAME 2>/dev/null; then
              echo "Generated plugin snapshots committed and pushed."
            elif git pull --rebase --autostash origin "$BRANCH_NAME" 2>/dev/null && git push origin HEAD:$BRANCH_NAME 2>/dev/null; then
              echo "Generated plugin snapshots committed after rebase."
            else
              echo "::warning::Could not push generated plugin snapshots due to a concurrent branch update."
              git rebase --abort 2>/dev/null || true
            fi
          fi

  publish_staging:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Publish Staging Packages
    needs:
      - validate_core
      - validate_mux
      - validate_cloud
      - validate_observer_and_compiler
      - validate_plugins
      - generated_plugins
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set staging prerelease version
        id: version
        run: |
          set -euo pipefail
          BASE_SDK=$(node -e "console.log(require('./packages/sdk/package.json').version)")
          IFS='.' read -r SDK_MAJOR SDK_MINOR SDK_PATCH <<< "$BASE_SDK"
          SDK_NEXT_PATCH=$((SDK_PATCH + 1))
          BASE_CODEX=$(node -e "console.log(require('./plugins/babysitter-codex/package.json').version)")
          IFS='.' read -r CODEX_MAJOR CODEX_MINOR CODEX_PATCH <<< "$BASE_CODEX"
          CODEX_NEXT_PATCH=$((CODEX_PATCH + 1))
          BASE_GITHUB=$(node -e "console.log(require('./plugins/babysitter-github/package.json').version)")
          IFS='.' read -r GITHUB_MAJOR GITHUB_MINOR GITHUB_PATCH <<< "$BASE_GITHUB"
          GITHUB_NEXT_PATCH=$((GITHUB_PATCH + 1))
          BASE_CURSOR=$(node -e "console.log(require('./plugins/babysitter-cursor/package.json').version)")
          IFS='.' read -r CURSOR_MAJOR CURSOR_MINOR CURSOR_PATCH <<< "$BASE_CURSOR"
          CURSOR_NEXT_PATCH=$((CURSOR_PATCH + 1))
          BASE_GEMINI=$(node -e "console.log(require('./plugins/babysitter-gemini/package.json').version)")
          IFS='.' read -r GEMINI_MAJOR GEMINI_MINOR GEMINI_PATCH <<< "$BASE_GEMINI"
          GEMINI_NEXT_PATCH=$((GEMINI_PATCH + 1))
          BASE_PI=$(node -e "console.log(require('./plugins/babysitter-pi/package.json').version)")
          IFS='.' read -r PI_MAJOR PI_MINOR PI_PATCH <<< "$BASE_PI"
          PI_NEXT_PATCH=$((PI_PATCH + 1))
          BASE_OMP=$(node -e "console.log(require('./plugins/babysitter-omp/package.json').version)")
          IFS='.' read -r OMP_MAJOR OMP_MINOR OMP_PATCH <<< "$BASE_OMP"
          OMP_NEXT_PATCH=$((OMP_PATCH + 1))
          BASE_OPENCODE=$(node -e "console.log(require('./plugins/babysitter-opencode/package.json').version)")
          IFS='.' read -r OPENCODE_MAJOR OPENCODE_MINOR OPENCODE_PATCH <<< "$BASE_OPENCODE"
          OPENCODE_NEXT_PATCH=$((OPENCODE_PATCH + 1))
          BASE_OPENCLAW=$(node -e "console.log(require('./plugins/babysitter-openclaw/package.json').version)")
          IFS='.' read -r OPENCLAW_MAJOR OPENCLAW_MINOR OPENCLAW_PATCH <<< "$BASE_OPENCLAW"
          OPENCLAW_NEXT_PATCH=$((OPENCLAW_PATCH + 1))
          BASE_PAPERCLIP=$(node -e "console.log(require('./plugins/babysitter-paperclip/package.json').version)")
          IFS='.' read -r PAPERCLIP_MAJOR PAPERCLIP_MINOR PAPERCLIP_PATCH <<< "$BASE_PAPERCLIP"
          PAPERCLIP_NEXT_PATCH=$((PAPERCLIP_PATCH + 1))
          BASE_UNIFIED=$(node -e "console.log(require('./packages/agent-plugins-mux/package.json').version)")
          IFS='.' read -r UNIFIED_MAJOR UNIFIED_MINOR UNIFIED_PATCH <<< "$BASE_UNIFIED"
          UNIFIED_NEXT_PATCH=$((UNIFIED_PATCH + 1))
          BASE_AGENT_MUX=$(node -e "console.log(require('./packages/agent-mux/sdk/package.json').version)")
          IFS='.' read -r AGENT_MUX_MAJOR AGENT_MUX_MINOR AGENT_MUX_PATCH <<< "$BASE_AGENT_MUX"
          AGENT_MUX_NEXT_PATCH=$((AGENT_MUX_PATCH + 1))
          SHORT_SHA=$(git rev-parse --short HEAD)
          STAGING_VERSION_UNIFIED="${UNIFIED_MAJOR}.${UNIFIED_MINOR}.${UNIFIED_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_SDK="${SDK_MAJOR}.${SDK_MINOR}.${SDK_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_AGENT_MUX="${AGENT_MUX_MAJOR}.${AGENT_MUX_MINOR}.${AGENT_MUX_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_CODEX="${CODEX_MAJOR}.${CODEX_MINOR}.${CODEX_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_GITHUB="${GITHUB_MAJOR}.${GITHUB_MINOR}.${GITHUB_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_CURSOR="${CURSOR_MAJOR}.${CURSOR_MINOR}.${CURSOR_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_GEMINI="${GEMINI_MAJOR}.${GEMINI_MINOR}.${GEMINI_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_PI="${PI_MAJOR}.${PI_MINOR}.${PI_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_OMP="${OMP_MAJOR}.${OMP_MINOR}.${OMP_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_OPENCODE="${OPENCODE_MAJOR}.${OPENCODE_MINOR}.${OPENCODE_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_OPENCLAW="${OPENCLAW_MAJOR}.${OPENCLAW_MINOR}.${OPENCLAW_NEXT_PATCH}-staging.${SHORT_SHA}"
          STAGING_VERSION_PAPERCLIP="${PAPERCLIP_MAJOR}.${PAPERCLIP_MINOR}.${PAPERCLIP_NEXT_PATCH}-staging.${SHORT_SHA}"
          echo "staging_version_unified=$STAGING_VERSION_UNIFIED" >> "$GITHUB_OUTPUT"
          echo "staging_version_sdk=$STAGING_VERSION_SDK" >> "$GITHUB_OUTPUT"
          echo "staging_version_agent_mux=$STAGING_VERSION_AGENT_MUX" >> "$GITHUB_OUTPUT"
          echo "staging_version_codex=$STAGING_VERSION_CODEX" >> "$GITHUB_OUTPUT"
          echo "staging_version_github=$STAGING_VERSION_GITHUB" >> "$GITHUB_OUTPUT"
          echo "staging_version_cursor=$STAGING_VERSION_CURSOR" >> "$GITHUB_OUTPUT"
          echo "staging_version_gemini=$STAGING_VERSION_GEMINI" >> "$GITHUB_OUTPUT"
          echo "staging_version_pi=$STAGING_VERSION_PI" >> "$GITHUB_OUTPUT"
          echo "staging_version_omp=$STAGING_VERSION_OMP" >> "$GITHUB_OUTPUT"
          echo "staging_version_opencode=$STAGING_VERSION_OPENCODE" >> "$GITHUB_OUTPUT"
          echo "staging_version_openclaw=$STAGING_VERSION_OPENCLAW" >> "$GITHUB_OUTPUT"
          echo "staging_version_paperclip=$STAGING_VERSION_PAPERCLIP" >> "$GITHUB_OUTPUT"
          echo "Setting agent-plugins-mux staging version: $STAGING_VERSION_UNIFIED"
          echo "Setting SDK staging version: $STAGING_VERSION_SDK"
          echo "Setting agent-mux staging version: $STAGING_VERSION_AGENT_MUX"
          echo "Setting Codex staging version: $STAGING_VERSION_CODEX"
          echo "Setting GitHub staging version: $STAGING_VERSION_GITHUB"
          echo "Setting Cursor staging version: $STAGING_VERSION_CURSOR"
          echo "Setting Gemini staging version: $STAGING_VERSION_GEMINI"
          echo "Setting Pi staging version: $STAGING_VERSION_PI"
          echo "Setting OMP staging version: $STAGING_VERSION_OMP"
          echo "Setting OpenCode staging version: $STAGING_VERSION_OPENCODE"
          echo "Setting OpenClaw staging version: $STAGING_VERSION_OPENCLAW"
          echo "Setting Paperclip staging version: $STAGING_VERSION_PAPERCLIP"
          # Write prerelease version into package.json files (for npm publish)
          node -e "
            const fs = require('fs');
            const pkgs = [
              'package.json',
              'packages/sdk/package.json',
              'packages/babysitter/package.json',
              'packages/observer-dashboard/package.json',
              'packages/cloud/package.json'
            ];
            for (const p of pkgs) {
              const data = JSON.parse(fs.readFileSync(p, 'utf8'));
              data.version = '${STAGING_VERSION_SDK}';
              fs.writeFileSync(p, JSON.stringify(data, null, 2) + '\n');
            }
            const unifiedPkgPath = 'packages/agent-plugins-mux/package.json';
            const unifiedPkg = JSON.parse(fs.readFileSync(unifiedPkgPath, 'utf8'));
            unifiedPkg.version = '${STAGING_VERSION_UNIFIED}';
            fs.writeFileSync(unifiedPkgPath, JSON.stringify(unifiedPkg, null, 2) + '\n');
            const agentMuxPackagePaths = [
              'packages/agent-mux/adapters/package.json',
              'packages/agent-mux/cli/package.json',
              'packages/agent-mux/core/package.json',
              'packages/agent-mux/gateway/package.json',
              'packages/agent-mux/harness-mock/package.json',
              'packages/agent-mux/mobile-android-app/package.json',
              'packages/agent-mux/mobile-ios-app/package.json',
              'packages/agent-mux/observability/package.json',
              'packages/agent-mux/sdk/package.json',
              'packages/agent-mux/tui/package.json',
              'packages/agent-mux/tv-androidtv-app/package.json',
              'packages/agent-mux/tv-appletv-app/package.json',
              'packages/agent-mux/ui/package.json',
              'packages/agent-mux/watch-watchos-app/package.json',
              'packages/agent-mux/watch-wearos-app/package.json',
              'packages/agent-mux/webui/package.json',
              'packages/transport-mux/package.json'
            ];
            for (const pkgPath of agentMuxPackagePaths) {
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              pkg.version = '${STAGING_VERSION_AGENT_MUX}';
              for (const field of ['dependencies', 'peerDependencies', 'optionalDependencies', 'devDependencies']) {
                if (!pkg[field]) continue;
                for (const depName of ['@a5c-ai/agent-mux', '@a5c-ai/agent-mux-adapters', '@a5c-ai/agent-mux-cli', '@a5c-ai/agent-mux-core', '@a5c-ai/agent-mux-gateway', '@a5c-ai/agent-mux-observability', '@a5c-ai/agent-mux-ui', '@a5c-ai/transport-mux']) {
                  if (pkg[field][depName]) {
                    pkg[field][depName] = pkg[field][depName].startsWith('^')
                      ? '^${STAGING_VERSION_AGENT_MUX}'
                      : pkg[field][depName].startsWith('~')
                        ? '~${STAGING_VERSION_AGENT_MUX}'
                        : '${STAGING_VERSION_AGENT_MUX}';
                  }
                }
              }
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
            }
            const codexPkgPath = 'plugins/babysitter-codex/package.json';
            const codexPkg = JSON.parse(fs.readFileSync(codexPkgPath, 'utf8'));
            codexPkg.version = '${STAGING_VERSION_CODEX}';
            fs.writeFileSync(codexPkgPath, JSON.stringify(codexPkg, null, 2) + '\n');
            const githubPkgPath = 'plugins/babysitter-github/package.json';
            const githubPkg = JSON.parse(fs.readFileSync(githubPkgPath, 'utf8'));
            githubPkg.version = '${STAGING_VERSION_GITHUB}';
            fs.writeFileSync(githubPkgPath, JSON.stringify(githubPkg, null, 2) + '\n');
            const githubPluginPath = 'plugins/babysitter-github/plugin.json';
            const githubPlugin = JSON.parse(fs.readFileSync(githubPluginPath, 'utf8'));
            githubPlugin.version = '${STAGING_VERSION_GITHUB}';
            fs.writeFileSync(githubPluginPath, JSON.stringify(githubPlugin, null, 2) + '\n');
            const cursorPkgPath = 'plugins/babysitter-cursor/package.json';
            const cursorPkg = JSON.parse(fs.readFileSync(cursorPkgPath, 'utf8'));
            cursorPkg.version = '${STAGING_VERSION_CURSOR}';
            fs.writeFileSync(cursorPkgPath, JSON.stringify(cursorPkg, null, 2) + '\n');
            const cursorPluginPath = 'plugins/babysitter-cursor/plugin.json';
            const cursorPlugin = JSON.parse(fs.readFileSync(cursorPluginPath, 'utf8'));
            cursorPlugin.version = '${STAGING_VERSION_CURSOR}';
            fs.writeFileSync(cursorPluginPath, JSON.stringify(cursorPlugin, null, 2) + '\n');
            const geminiPkgPath = 'plugins/babysitter-gemini/package.json';
            const geminiPkg = JSON.parse(fs.readFileSync(geminiPkgPath, 'utf8'));
            geminiPkg.version = '${STAGING_VERSION_GEMINI}';
            fs.writeFileSync(geminiPkgPath, JSON.stringify(geminiPkg, null, 2) + '\n');
            const geminiPluginPath = 'plugins/babysitter-gemini/plugin.json';
            const geminiPlugin = JSON.parse(fs.readFileSync(geminiPluginPath, 'utf8'));
            geminiPlugin.version = '${STAGING_VERSION_GEMINI}';
            fs.writeFileSync(geminiPluginPath, JSON.stringify(geminiPlugin, null, 2) + '\n');
            const geminiExtensionPath = 'plugins/babysitter-gemini/gemini-extension.json';
            const geminiExtension = JSON.parse(fs.readFileSync(geminiExtensionPath, 'utf8'));
            geminiExtension.version = '${STAGING_VERSION_GEMINI}';
            fs.writeFileSync(geminiExtensionPath, JSON.stringify(geminiExtension, null, 2) + '\n');
            const piPkgPath = 'plugins/babysitter-pi/package.json';
            const piPkg = JSON.parse(fs.readFileSync(piPkgPath, 'utf8'));
            piPkg.version = '${STAGING_VERSION_PI}';
            fs.writeFileSync(piPkgPath, JSON.stringify(piPkg, null, 2) + '\n');
            const ompPkgPath = 'plugins/babysitter-omp/package.json';
            const ompPkg = JSON.parse(fs.readFileSync(ompPkgPath, 'utf8'));
            ompPkg.version = '${STAGING_VERSION_OMP}';
            fs.writeFileSync(ompPkgPath, JSON.stringify(ompPkg, null, 2) + '\n');
            const opencodePkgPath = 'plugins/babysitter-opencode/package.json';
            const opencodePkg = JSON.parse(fs.readFileSync(opencodePkgPath, 'utf8'));
            opencodePkg.version = '${STAGING_VERSION_OPENCODE}';
            fs.writeFileSync(opencodePkgPath, JSON.stringify(opencodePkg, null, 2) + '\n');
            const opencodePluginPath = 'plugins/babysitter-opencode/plugin.json';
            const opencodePlugin = JSON.parse(fs.readFileSync(opencodePluginPath, 'utf8'));
            opencodePlugin.version = '${STAGING_VERSION_OPENCODE}';
            fs.writeFileSync(opencodePluginPath, JSON.stringify(opencodePlugin, null, 2) + '\n');
            const openclawPkgPath = 'plugins/babysitter-openclaw/package.json';
            const openclawPkg = JSON.parse(fs.readFileSync(openclawPkgPath, 'utf8'));
            openclawPkg.version = '${STAGING_VERSION_OPENCLAW}';
            fs.writeFileSync(openclawPkgPath, JSON.stringify(openclawPkg, null, 2) + '\n');
            const openclawPluginPath = 'plugins/babysitter-openclaw/plugin.json';
            const openclawPlugin = JSON.parse(fs.readFileSync(openclawPluginPath, 'utf8'));
            openclawPlugin.version = '${STAGING_VERSION_OPENCLAW}';
            fs.writeFileSync(openclawPluginPath, JSON.stringify(openclawPlugin, null, 2) + '\n');
            const openclawManifestPath = 'plugins/babysitter-openclaw/openclaw.plugin.json';
            const openclawManifest = JSON.parse(fs.readFileSync(openclawManifestPath, 'utf8'));
            openclawManifest.version = '${STAGING_VERSION_OPENCLAW}';
            fs.writeFileSync(openclawManifestPath, JSON.stringify(openclawManifest, null, 2) + '\n');
            const paperclipPkgPath = 'plugins/babysitter-paperclip/package.json';
            const paperclipPkg = JSON.parse(fs.readFileSync(paperclipPkgPath, 'utf8'));
            paperclipPkg.version = '${STAGING_VERSION_PAPERCLIP}';
            fs.writeFileSync(paperclipPkgPath, JSON.stringify(paperclipPkg, null, 2) + '\n');
            for (const path of [
              'packages/hooks-mux/core/package.json',
              'packages/hooks-mux/cli/package.json',
              'packages/hooks-mux/adapter-claude/package.json',
              'packages/hooks-mux/adapter-codex/package.json',
              'packages/hooks-mux/adapter-gemini/package.json',
              'packages/hooks-mux/adapter-copilot/package.json',
              'packages/hooks-mux/adapter-cursor/package.json',
              'packages/hooks-mux/adapter-pi/package.json',
              'packages/hooks-mux/adapter-oh-my-pi/package.json',
              'packages/hooks-mux/adapter-opencode/package.json',
              'packages/hooks-mux/adapter-openclaw/package.json'
            ]) {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              data.version = '${STAGING_VERSION_SDK}';
              if (data.dependencies?.['@a5c-ai/hooks-mux-core']) {
                data.dependencies['@a5c-ai/hooks-mux-core'] = '${STAGING_VERSION_SDK}';
              }
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            }
          "
          # Write sdkVersion into versions.json (separate from plugin.json to avoid
          # Claude Code's plugin validator rejecting unrecognized keys)
          node -e "
            const fs = require('fs');
            for (const path of ['plugins/babysitter/versions.json', 'plugins/babysitter-codex/versions.json', 'plugins/babysitter-gemini/versions.json', 'plugins/babysitter-pi/versions.json', 'plugins/babysitter-omp/versions.json', 'plugins/babysitter-opencode/versions.json', 'plugins/babysitter-openclaw/versions.json', 'plugins/babysitter-github/versions.json', 'plugins/babysitter-cursor/versions.json', 'plugins/babysitter-paperclip/versions.json']) {
              const data = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : {};
              data.sdkVersion = '${STAGING_VERSION_SDK}';
              if (path === 'plugins/babysitter-gemini/versions.json') {
                data.extensionVersion = '${STAGING_VERSION_GEMINI}';
              }
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            }
          "

      - name: Commit sdkVersion to staging branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/babysitter/versions.json plugins/babysitter-codex/versions.json plugins/babysitter-gemini/versions.json plugins/babysitter-pi/versions.json plugins/babysitter-omp/versions.json plugins/babysitter-opencode/versions.json plugins/babysitter-openclaw/versions.json plugins/babysitter-github/versions.json plugins/babysitter-cursor/versions.json plugins/babysitter-paperclip/versions.json
          if git diff --cached --quiet; then
            echo "No sdkVersion changes to commit."
          else
            git commit -m "chore: set sdkVersion to ${{ steps.version.outputs.staging_version_sdk }} [skip staging]"
            if git push origin HEAD:staging 2>/dev/null; then
              echo "sdkVersion committed and pushed."
            elif git pull --rebase --autostash origin staging 2>/dev/null && git push origin HEAD:staging 2>/dev/null; then
              echo "sdkVersion committed after rebase."
            else
              echo "::warning::Could not push sdkVersion commit (concurrent run conflict). Skipping — npm publish already succeeded."
              git rebase --abort 2>/dev/null || true
            fi
          fi

