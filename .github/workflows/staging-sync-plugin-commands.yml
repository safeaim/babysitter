name: Staging Sync Command Surfaces

on:
  push:
    branches:
      - staging
    paths:
      - 'plugins/babysitter/commands/**'
      - 'scripts/plugin-command-sync-lib.cjs'
      - 'scripts/sync-sdk-command-templates.cjs'
      - 'scripts/sync-plugin-commands.cjs'
      - 'plugins/babysitter-codex/scripts/sync-command-skills.js'
      - 'plugins/babysitter-github/scripts/sync-command-surfaces.js'
      - 'plugins/babysitter-cursor/scripts/sync-command-surfaces.js'
      - 'plugins/babysitter-omp/scripts/sync-command-docs.cjs'
      - 'plugins/babysitter-opencode/scripts/sync-command-docs.cjs'
      - 'plugins/babysitter-pi/scripts/sync-command-docs.cjs'
      - 'plugins/babysitter-openclaw/scripts/sync-command-docs.cjs'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: staging-sync-command-surfaces
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip command sync]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Sync command surfaces
        run: |
          set -euo pipefail
          npm run sync:plugin-commands

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(commands): sync command surfaces [skip command sync]'
          branch: automation/sync-command-surfaces-staging
          base: staging
          title: 'chore(commands): sync command surfaces'
          body: |
            This PR was generated automatically from the `staging` branch.

            It synchronizes derived command surfaces after changes to:
            - `plugins/babysitter/commands/**`
            - SDK and plugin conversion scripts

            Generated by:
            - `npm run sync:plugin-commands`
          add-paths: |
            packages/sdk/src/prompts/templates/commands/**
            plugins/babysitter-codex/skills/**
            plugins/babysitter-github/commands/**
            plugins/babysitter-github/skills/**
            plugins/babysitter-cursor/commands/**
            plugins/babysitter-cursor/skills/**
            plugins/babysitter-omp/commands/**
            plugins/babysitter-opencode/commands/**
            plugins/babysitter-pi/commands/**
            plugins/babysitter-openclaw/commands/**
          delete-branch: true
