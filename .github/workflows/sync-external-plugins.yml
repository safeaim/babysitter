name: Sync External Plugins

on:
  push:
    branches:
      - develop
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-external-plugins-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync_external_plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a5c GitHub App token
        id: a5c-token
        continue-on-error: true
        uses: a5c-ai/generate-token-action@main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.a5c-token.outputs.a5c_token || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Generate plugin snapshots
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          TARGET_VERSION="$BASE_VERSION"
          if [ "${GITHUB_REF_NAME}" = "staging" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
            NEXT_PATCH=$((PATCH + 1))
            SHORT_SHA=$(git rev-parse --short=12 HEAD)
            TARGET_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-staging.${SHORT_SHA}"
          fi
          export TARGET_VERSION
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const targetVersion = process.env.TARGET_VERSION;
          const packageJsonPaths = new Set(['package.json']);
          const localPackageNames = new Set();
          const pluginManifestPaths = [
            'plugins/babysitter-unified/plugin.json',
            'plugins/babysitter/.claude-plugin/plugin.json',
            'plugins/babysitter/plugin.json',
            'plugins/babysitter-gemini/plugin.json',
            'plugins/babysitter-gemini/gemini-extension.json',
            'plugins/babysitter-github/plugin.json',
            'plugins/babysitter-cursor/plugin.json',
            'plugins/babysitter-opencode/plugin.json',
            'plugins/babysitter-openclaw/plugin.json',
            'plugins/babysitter-openclaw/openclaw.plugin.json',
          ];
          const versionsJsonPaths = [
            'plugins/babysitter/versions.json',
            'plugins/babysitter-codex/versions.json',
            'plugins/babysitter-gemini/versions.json',
            'plugins/babysitter-pi/versions.json',
            'plugins/babysitter-omp/versions.json',
            'plugins/babysitter-opencode/versions.json',
            'plugins/babysitter-openclaw/versions.json',
            'plugins/babysitter-github/versions.json',
            'plugins/babysitter-cursor/versions.json',
            'plugins/babysitter-paperclip/versions.json',
          ];
          const fields = ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies'];
          const skipDirs = new Set(['.git', '.a5c', 'node_modules', 'dist', 'build', 'coverage', 'artifacts', 'generated', 'examples']);

          function collectPackageJsons(dir) {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (!skipDirs.has(entry.name)) collectPackageJsons(fullPath);
                continue;
              }
              if (entry.isFile() && entry.name === 'package.json') {
                packageJsonPaths.add(fullPath);
              }
            }
          }

          for (const rootDir of ['packages', 'plugins']) {
            collectPackageJsons(rootDir);
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (String(pkg.name || '').startsWith('@a5c-ai/')) {
              localPackageNames.add(pkg.name);
            }
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            let changed = false;
            if (pkgPath === 'package.json' || localPackageNames.has(pkg.name)) {
              if (pkg.version !== targetVersion) {
                pkg.version = targetVersion;
                changed = true;
              }
            }
            for (const field of fields) {
              if (!pkg[field]) continue;
              for (const [depName, currentValue] of Object.entries(pkg[field])) {
                if (!localPackageNames.has(depName)) continue;
                if (currentValue !== targetVersion) {
                  pkg[field][depName] = targetVersion;
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
            }
          }

          for (const manifestPath of pluginManifestPaths) {
            if (!fs.existsSync(manifestPath)) continue;
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            manifest.version = targetVersion;
            fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          }

          for (const versionsPath of versionsJsonPaths) {
            const versions = fs.existsSync(versionsPath) ? JSON.parse(fs.readFileSync(versionsPath, 'utf8')) : {};
            versions.sdkVersion = targetVersion;
            if (versionsPath === 'plugins/babysitter-gemini/versions.json') {
              versions.extensionVersion = targetVersion;
            }
            fs.writeFileSync(versionsPath, `${JSON.stringify(versions, null, 2)}\n`);
          }
          NODE
          npm run build --workspace=@a5c-ai/agent-catalog
          npm run build --workspace=@a5c-ai/agent-plugins-mux
          npm run generate:plugins

      - name: Sync generated plugin repositories
        env:
          GH_TOKEN: ${{ steps.a5c-token.outputs.a5c_token || github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          node scripts/sync-external-plugin-repos.mjs --push --branch=${{ github.ref_name }}
