nodeKind: AgentCoreImpl
id: agent-core-impl:babysitter-sdk.core@current
attributes:
  displayName: "babysitter SDK Core (current) — process-function loop"
  agentVersionId: agent-version:babysitter-sdk@current
  packageRef: source-ref:babysitter-github
  loopIteratorPolicy: process-function-driven
  loopIteratorNotes: |
    @a5c-ai/babysitter-sdk exposes `defineTask` / `process` exports.
    Each run executes a user-authored async `process(inputs, ctx)` that
    issues `ctx.task` / `ctx.parallel` / `ctx.breakpoint` effects. The
    SDK replays the journal each iterate.
  contextManagementStrategy: user-managed
  compactionTriggerNotes: |
    Context lives in the user-authored process function; the SDK has no
    global context window or compaction primitive of its own.
  subagentInvokerPolicy: platform-mediated
  subagentInvokerNotes: |
    Subagents are dispatched via `ctx.task(definedTask, args)`; the
    runtime spawns a harness subprocess in its own working directory.
  resultSynthesisPolicy: process-function-defined
  resultSynthesisNotes: |
    Final result is whatever the process function returns.
  stopDetectionStrategy: structured-end-event
  transportClientLibrary: none
  supportedTransportProtocols: []
  parallelToolCallHandling: delegated-to-remote
  streamingFidelity: full
  thinkingChannelHandling: delegated-to-remote
  notes: |
    @a5c-ai/babysitter-sdk is the programmatic surface of babysitter — a
    library imported by host harnesses (and by the agent-platform CLI).
    Layer-3 (model transport) concerns are delegated to whichever harness
    subprocess is spawned for kind: 'agent' tasks.
edges:
  realizes:
    - target: layer:4-agent-core
  composes:
    - target: agent:babysitter-sdk
      role: core
  depends_on:
    - target: source-ref:babysitter-github
  speaks: []
