nodeKind: AgentCoreImpl
id: agent-core-impl:codex-sdk.core@current
attributes:
  displayName: Codex SDK Core (current)
  agentVersionId: agent-version:codex-sdk@current
  packageRef: source-ref:openai-node-npm
  loopIteratorPolicy: process-function-driven
  loopIteratorNotes: |
    Host program calls `openai.chat.completions.create({stream:true})`
    or the Responses API directly. The tool-use loop body is the
    host's code — there is no Codex Rust runtime in this variant.
  contextManagementStrategy: user-managed
  compactionTriggerNotes: |
    No rolling-summary primitive in this variant; the host program is
    responsible for any context management.
  subagentInvokerPolicy: not-applicable
  subagentInvokerNotes: |
    Subagent dispatch is not advertised by the codex-sdk adapter
    (supportsSubagentDispatch is false).
  resultSynthesisPolicy: model-direct
  resultSynthesisNotes: |
    Streaming chunks are delivered via the OpenAI SDK; the host emits
    the final response when the stream closes.
  stopDetectionStrategy: structured-end-event
  transportClientLibrary: openai
  supportedTransportProtocols:
  - model-transport:openai-chat-completions
  - model-transport:openai-responses
  parallelToolCallHandling: native
  streamingFidelity: full
  thinkingChannelHandling: not-supported
edges:
  realizes:
    - target: layer:4-agent-core
  composes:
  - target: agent:codex-sdk
    role: core
  sourced_from:
  - source-ref:openai-node-npm
  - source-ref:openai-node-github
  speaks:
  - target: model-transport:openai-chat-completions
  - target: model-transport:openai-responses
  supports:
  - target: capability:streaming
    versionRange: '*'
    level: full
  - target: capability:supports-tool-use
    versionRange: '*'
    level: full
  emits_message_type:
  - target: protocol-message:openai-response-created
  - target: protocol-message:openai-response-output-item-added
  - target: protocol-message:openai-response-output-text-delta
  - target: protocol-message:openai-response-completed
  - target: protocol-message:openai-response-failed
  supports_effort_level:
  - target: effort-level:minimal
  - target: effort-level:low
  - target: effort-level:medium
  - target: effort-level:high
  output_guard_applied_by:
  - target: output-guard:openai-structured-output-strict
