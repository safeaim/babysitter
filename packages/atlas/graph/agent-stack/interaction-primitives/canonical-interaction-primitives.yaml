nodeKind: InteractionPrimitive
id: interaction-primitive:ask-user-question
attributes:
  displayName: "AskUserQuestion"
  description: |
    Tool the agent emits to ask the user a question with multiple-choice
    options. Used by claude-code (`AskUserQuestion`) and re-exposed by
    other agents over MCP.
  kind: prompt-ui
  surface: prompt-ui
  category: interaction-primitive-category:human-in-loop
  availableInModes: [chat, plan, composer, edit]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
