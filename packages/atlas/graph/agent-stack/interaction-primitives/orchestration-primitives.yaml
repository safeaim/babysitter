nodeKind: OrchestrationPrimitive
id: orch-primitive:telemetry-collection
attributes:
  displayName: Telemetry Collection
  description: |
    Collect structured telemetry from agent sessions and the orchestration
    runtime — turn latencies, tool-call counts, error rates, model response
    times, and queue depths. The primitive emits spans and metrics to
    configured backends (OpenTelemetry, Datadog, Prometheus, or a local
    SQLite store) for real-time dashboards, SLO alerting, and capacity
    planning. Complements audit-trail (which is append-only per-event)
    with aggregated time-series observability.
  orchestrationKind: progress-tracking
  trigger: event-driven
edges:
  realizes:
    - target: layer:13-orchestration
  orch_applies_to:
