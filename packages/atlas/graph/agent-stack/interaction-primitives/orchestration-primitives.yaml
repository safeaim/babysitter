  orch_triggers:
    - target: orch-primitive:audit-trail
---
nodeKind: OrchestrationPrimitive
id: orch-primitive:babysitter-run-create
attributes:
  displayName: Babysitter Run Create
  description: |
    Create and bind a durable Babysitter run from a process definition,
    input file, harness, and workspace. This is an orchestration primitive, not
    merely a slash-command interaction, because it establishes run identity,
    process entrypoint, journal state, and harness/session binding.
  orchestrationKind: workflow-loading
  trigger: manual
