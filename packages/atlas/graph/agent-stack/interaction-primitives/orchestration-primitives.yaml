nodeKind: OrchestrationPrimitive
id: orch-primitive:babysitter-run-iterate
attributes:
  displayName: Babysitter Run Iterate
  description: |
    Replay a Babysitter process function against the run journal, emit the next
    pending effect, and transition run state. Iteration is the durable control
    loop that turns process definitions into executable orchestration steps.
  orchestrationKind: session-lifecycle
  trigger: on-state-change
edges:
  realizes:
    - target: layer:13-orchestration
  orch_triggers:
