nodeKind: OrchestrationPrimitive
id: orch-primitive:babysitter-effect-request
attributes:
  displayName: Babysitter Effect Request
  description: |
    Request a task, breakpoint, sleep, shell, or agent effect with an
    invocation key, input artifact, output schema, and scheduler hint. The
    effect request is the control-plane boundary between the deterministic
    process replay and external execution.
  orchestrationKind: task-lifecycle
  trigger: on-state-change
edges:
  realizes:
