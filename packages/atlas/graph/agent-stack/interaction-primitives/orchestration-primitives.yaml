    stdout/stderr references, timing metadata, and invocation key evidence.
    This primitive controls when the run can replay past an external action.
  orchestrationKind: task-lifecycle
  trigger: event-driven
edges:
  realizes:
    - target: layer:13-orchestration
  orch_triggers:
