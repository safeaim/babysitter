nodeKind: InteractionPrimitive
id: interaction-primitive:voice-dictation
attributes:
  displayName: "/voice (dictation)"
  description: |
    Push-to-talk dictation primitive. Captures microphone audio, transcribes
    it (typically via Whisper or platform speech APIs), and inserts the
    transcribed text at the input caret. Surfaced as `/voice` in Claude
    Code TUI and via the system keybinding in IDE shells.
  kind: voice
  surface: voice
  category: interaction-primitive-category:voice
  availableInModes: [chat, composer]
  requiresPermission: true
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:voice
---
nodeKind: InteractionPrimitive
id: interaction-primitive:status-line
attributes:
  displayName: "Status line"
  description: |
    Persistent footer / status line that surfaces real-time agent state:
    current phase, model, token usage, cost, sandbox mode, queued tasks.
    Implemented by Claude Code, OpenCode, Codex CLI, and most TUI shells
    via a bottom-of-screen render zone.
  kind: telemetry
  surface: status-line
  category: interaction-primitive-category:telemetry
  availableInModes: [chat, plan, composer, edit]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:telemetry
---
nodeKind: InteractionPrimitive
id: interaction-primitive:cost-readout
attributes:
  displayName: "Cost readout"
  description: |
    On-demand cost / token-usage display (Claude Code `/cost`, Codex
    `/usage`, OpenCode footer counters). Presents cumulative input /
    output / cache tokens and dollar estimates for the current session.
  kind: telemetry
  surface: status-line
  category: interaction-primitive-category:telemetry
  availableInModes: [chat, plan, composer, edit]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:telemetry
---
nodeKind: InteractionPrimitive
id: interaction-primitive:drag-drop-files
attributes:
  displayName: "Drag-drop files"
  description: |
    User drags one or more files (or directories) from the host file manager
    onto the agent surface. The surface materializes them as @-mention
    references or attaches them as context. Supported in IDE shells (Cursor,
    JetBrains-AI) and most native desktop hosts; degrades to path-paste in
    pure TUIs.
  kind: multimodal-input
  surface: multimodal-input
  category: interaction-primitive-category:content-input
  availableInModes: [chat, composer, edit]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:content-input
---
nodeKind: InteractionPrimitive
id: interaction-primitive:paste-image
attributes:
  displayName: "Paste image"
  description: |
    Pasting an image from the OS clipboard into the agent input. The surface
    encodes the bytes as a vision-modal content block bound to a multimodal
    `ModelVersion`. Supported in Claude Code, Cursor, and any presentation
    whose `renderingTechnology` exposes clipboard image MIME types.
  kind: multimodal-input
  surface: multimodal-input
  category: interaction-primitive-category:content-input
  availableInModes: [chat, composer]
  requiresPermission: true
  keyboardShortcut: "Cmd+V / Ctrl+V"
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:content-input
  requires_capability:
    - capability:vision-input
---
nodeKind: InteractionPrimitive
id: interaction-primitive:paste-url
attributes:
  displayName: "Paste URL (auto-fetch)"
  description: |
    Pasting a URL into the agent input triggers an opportunistic fetch of
    the URL's content (HTML→text, PDF→text, image→vision block). The
    surface either inlines a preview or queues a WebFetch tool call.
  kind: multimodal-input
  surface: multimodal-input
  category: interaction-primitive-category:multimodal
  availableInModes: [chat, composer]
  requiresPermission: true
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:multimodal
---
nodeKind: InteractionPrimitive
id: interaction-primitive:share-session
attributes:
  displayName: "Share session"
  description: |
    Generate a shareable URL or invite that exposes the live or recorded
    session to another participant (read-only or read-write). Surfaced
    by OpenCode (`opencode share`), Cursor (Cursor Sync), and a subset
    of cloud-hosted agent shells.
  kind: collaborative
  surface: collaborative
  category: interaction-primitive-category:collaborative
  availableInModes: [chat, plan, composer, edit]
  requiresPermission: true
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:collaborative
---
nodeKind: InteractionPrimitive
id: interaction-primitive:follow-agent
attributes:
  displayName: "Follow agent"
  description: |
    Live-tail another participant's agent session — see their turns,
    tool calls, and file edits as they happen. Read-only by default;
    becomes a true collaborative primitive when paired with
    share-session in read-write mode. Distinct from passive replay.
  kind: collaborative
  surface: collaborative
  category: interaction-primitive-category:collaborative
  availableInModes: [chat, plan, composer, edit]
  requiresPermission: true
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:collaborative
