nodeKind: KnowledgeFabricImpl
id: knowledge-fabric-impl:pi.knowledge@current
attributes:
  displayName: "Pi Knowledge Fabric — CLAUDE.md (Claude Code compatible)"
  agentVersionId: agentVersion:pi:ge-0-75-5
  description: |
    Pi uses Claude Code's CLAUDE.md file format as its knowledge fabric,
    providing cross-compatibility with Claude Code's instruction system.
    CLAUDE.md files at project root and nested directories provide persistent
    instructions and context that survive across sessions. Pi reads these
    files at session bootstrap and injects them into the system prompt.
  knowledgeFileFormats:
    - "CLAUDE.md"
  knowledgeScopes:
    - project
  autoExtractionSupport: false
  retrievalStrategy: file-hierarchy
  knowledgePersistence: filesystem
  notes: |
    Pi's adoption of CLAUDE.md as its knowledge format means projects
    configured for Claude Code automatically work with Pi. This cross-agent
    compatibility is a strategic advantage — teams do not need to maintain
    separate instruction files for different agents.
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  composes:
    - target: agentVersion:pi:ge-0-75-5
      role: knowledge-fabric
---
nodeKind: KnowledgeFabricImpl
id: knowledge-fabric-impl:opencode.knowledge@current
attributes:
  displayName: "OpenCode Knowledge Fabric — AGENTS.md"
  agentVersionId: agentVersion:opencode:ge-0-0-0
  description: |
    OpenCode uses AGENTS.md as its primary knowledge fabric file. AGENTS.md
    provides persistent project-level instructions read at session bootstrap.
    OpenCode's HTTP-based architecture means the knowledge context is loaded
    once and shared across the session. There is no auto-memory extraction
    or user-level knowledge scope.
  knowledgeFileFormats:
    - "AGENTS.md"
  knowledgeScopes:
    - project
  autoExtractionSupport: false
  retrievalStrategy: file-hierarchy
  knowledgePersistence: filesystem
  notes: |
    OpenCode follows the AGENTS.md convention used by Codex and Amp. The
    knowledge fabric is minimal and file-hierarchy based. No vector-based
    retrieval or auto-memory extraction has been documented.
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  composes:
    - target: agentVersion:opencode:ge-0-0-0
      role: knowledge-fabric
