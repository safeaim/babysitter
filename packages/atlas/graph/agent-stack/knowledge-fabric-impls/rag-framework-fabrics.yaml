nodeKind: KnowledgeFabricImpl
id: knowledge-fabric-impl:llamaindex-rag-fabric
attributes:
  displayName: "LlamaIndex as RAG Knowledge Fabric"
  description: |
    LlamaIndex as a data-framework knowledge fabric. Provides data connectors
    (LlamaHub) for ingesting from 100+ sources, multiple index types
    (vector, list, tree, keyword, knowledge graph), query engines with
    response synthesis, and composable sub-question decomposition. LlamaIndex
    is purpose-built for connecting LLMs to data — turning unstructured
    documents into queryable knowledge with minimal configuration. The
    index abstraction is its core differentiator from LangChain's chain-based
    approach.
  knowledgeFileFormats:
    - any (via data connectors)
  retrievalStrategy: hybrid
  knowledgePersistence: delegated (via storage backends)
  knowledgeScopes:
    - project
    - organization
    - enterprise
  autoExtractionSupport: false
  notes: |
    LlamaIndex's knowledge graph index is notable — it automatically extracts
    entity-relationship triples from documents and builds a queryable graph.
    This enables relationship-aware retrieval that pure vector search cannot
    provide. The composable index architecture allows building hierarchical
    knowledge fabrics where different index types handle different knowledge
    types (code vs. docs vs. decisions).
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  integrates_with:
    - target: library:llama-index
