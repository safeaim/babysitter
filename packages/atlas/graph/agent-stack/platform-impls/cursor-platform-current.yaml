nodeKind: AgentPlatformImpl
id: agent-platform-impl:cursor.platform@current
attributes:
  displayName: Cursor Platform (current)
  agentVersionId: agentVersion:cursor:ge-0-0-0
  subagentDefinitionFormat: none
  packageRef: source-ref:cursor-binary
  nativeExtensionFormat: none
  nativeExtensionManifestPath: ''
  nativeExtensionsDirectoryPath: []
  skillFormat: none
  skillsDirectoryPath: []
  customSlashCommandsPath: []
  subagentsDirectoryPath: []
  hooksDirectoryOrConfigPath:
  - ~/.cursor/hooks.json
  - .cursor/hooks.json
  - /etc/cursor/hooks.json
  settingsFiles:
  - ~/.cursor/settings.json
  - .cursor/settings.json
  pluginRegistryPath: ''
  capabilityProfileRegistry: true
  launchConfigRegistry: false
  platformIdentityStrategy: oauth-keychain
  updateChannelMechanism: in-app-updater
  supportedChannelKinds:
  - mcp-channel
edges:
  realizes:
    - target: layer:6-agent-platform
  composes:
  - target: agent:cursor
    role: platform
  bundles:
  - target: presentation:cursor-ide
  supports:
  - target: capability:can-resume
    versionRange: '>=0.40.0'
    level: full
    notes: 'Cursor persists JSONL sessions plus a SQLite store of chat/workspace state;

      resume is supported through the IDE.

      '
  - target: capability:supports-plugins
    versionRange: '>=0.40.0'
    level: full
    notes: 'Cursor adopted Claude Code''s hooks.json schema with global, project,
      and

      enterprise scopes (~/.cursor/hooks.json, .cursor/hooks.json, /etc/cursor/hooks.json).

      '
  defines_frontmatter_field:
  - target: frontmatter-field:cursor-rule-description
  - target: frontmatter-field:cursor-rule-globs
  - target: frontmatter-field:cursor-rule-always-apply
