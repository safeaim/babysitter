nodeKind: AgentPlatformImpl
id: agent-platform-impl:gemini-cli.platform@current
attributes:
  displayName: Gemini CLI Platform (current)
  agentVersionId: agentVersion:gemini:ge-0-0-0
  subagentDefinitionFormat: none
  packageRef: source-ref:gemini-cli-github
  nativeExtensionFormat: gemini-extension
  nativeExtensionManifestPath: ~/.gemini/extensions/<name>/gemini-extension.json
  nativeExtensionsDirectoryPath:
  - ~/.gemini/extensions/
  skillFormat: none
  skillsDirectoryPath: []
  customSlashCommandsPath:
  - ~/.gemini/commands/
  subagentsDirectoryPath: []
  hooksDirectoryOrConfigPath:
  - ~/.gemini/extensions/<name>/hooks/
  settingsFiles:
  - ~/.gemini/settings.json
  - ~/.config/gemini/settings.json
  pluginRegistryPath: ''
  capabilityProfileRegistry: false
  launchConfigRegistry: false
  platformIdentityStrategy: oauth-keychain
  updateChannelMechanism: npm
  supportedChannelKinds:
  - mcp-channel
edges:
  realizes:
    - target: layer:6-agent-platform
  composes:
  - target: agent:gemini-cli
    role: platform
  bundles:
  - target: presentation:gemini-cli-tui
  supports:
  - target: capability:can-resume
    versionRange: '>=1.0.0'
    level: full
    notes: 'File-based JSONL sessions; resume supported.

      '
  - target: capability:supports-plugins
    versionRange: '>=1.0.0'
    level: full
    notes: 'Gemini extension format covers prompts, MCP, commands, themes, and hooks.

      '
