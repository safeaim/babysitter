---
nodeKind: Presentation
id: presentation:agent-mux-tui
attributes:
  displayName: "agent-mux TUI"
  kind: tui
  description: |
    Terminal UI for agent-mux sessions. Renders agent runs, slash commands,
    and breakpoint approvals in an ink-based full-screen terminal shell;
    bridges to remote agents (claude-code, codex, etc.) via the agent-mux
    transport.
  renderingTechnology: terminal-emulator
  themeSupport: light-dark
  accessibilitySupport: basic
  offlineMode: partial
  platforms: [darwin, linux, win32]
  bundleSize: "~50 MB"
  updateChannel: auto
edges: {}
---
nodeKind: Presentation
id: presentation:agent-mux-cli
attributes:
  displayName: "agent-mux CLI"
  kind: cli
  description: |
    Non-interactive CLI surface of agent-mux. Scriptable `amux run --json`
    invocation that proxies events from the bridged remote agent and exits
    on session end. Used in CI and headless automation.
  themeSupport: none
  accessibilitySupport: basic
  offlineMode: partial
  platforms: [darwin, linux, win32]
  bundleSize: "~50 MB"
  updateChannel: auto
edges: {}
---
nodeKind: Presentation
id: presentation:agent-mux-webui
attributes:
  displayName: "agent-mux Web UI"
  kind: web
  description: |
    Browser-based control surface for agent-mux sessions. Next.js / React
    web app rendering a session list, run detail panel, kanban board, and
    real-time hook/breakpoint inbox driven by the agent-mux gateway.
  renderingTechnology: next-js
  themeSupport: full-customizable
  accessibilitySupport: wcag-aa
  offlineMode: partial
  platforms: [web]
  bundleSize: "~5 MB"
  updateChannel: auto
edges: {}
