---
nodeKind: Presentation
id: presentation:omni-cli
attributes:
  displayName: "omni CLI"
  kind: cli
  description: |
    CLI entry point for the omni agent. Wraps agent-platform and agent-mux
    surfaces into a single `omni` binary. Supports both interactive and
    headless/CI modes; emits a normalized JSON event stream when invoked
    with `--json`.
  renderingTechnology: vte
  themeSupport: none
  accessibilitySupport: basic
  offlineMode: 'no'
  platforms: [darwin, linux, win32]
  updateChannel: npm
edges:
  bundled_with:
    - agent-platform-impl:omni.platform@current
