id: agent:nanny
attributes:
  displayName: "Nanny"
  vendor: "Community (open-source)"
  homepageUrl: "https://github.com/nannycodes/nanny"
  primarySurface: cli
  supportTier: none
  productKind: agent-orchestrator
  stackScope: full
  description: |
    Dumb task loop for smart agents. Provides minimal orchestration
    structure — task queuing, retry logic, and status tracking — while
    giving maximum autonomy to the agent executing each task. Designed
    for workflows where the agent is intelligent enough to handle task
    execution but needs a simple harness for sequencing, retrying, and
    reporting. Favors simplicity over control.
edges:
  has_version:
    - agent-version:nanny@current
  integrates_with:
    - target: skill-area:ai-agent-development
    - target: skill-area:multi-agent-coordination
    - target: topic:agent-orchestration-products
    - target: orch-primitive:agent-dispatch
    - target: orch-primitive:retry-with-backoff
