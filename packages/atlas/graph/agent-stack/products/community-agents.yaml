id: agent:cyclop-one
attributes:
  displayName: "Cyclop One"
  vendor: "Community (open-source)"
  homepageUrl: "https://github.com/cyclopone/cyclopone"
  primarySurface: desktop
  supportTier: none
  productKind: full-cli-agent
  stackScope: full
  description: |
    Autonomous macOS desktop agent powered by Claude vision. Captures
    the screen, reasons about what it sees, and takes actions via mouse
    and keyboard. Operates at the OS level rather than within a terminal
    or IDE — can interact with any application visible on screen. Uses
    Claude's vision capabilities to understand UI elements, read text,
    and navigate graphical interfaces autonomously.
edges:
  has_version:
    - agent-version:cyclop-one@current
  integrates_with:
    - target: skill-area:ai-agent-development
