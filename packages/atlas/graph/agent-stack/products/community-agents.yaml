nodeKind: AgentProduct
id: agent:claude-sh
attributes:
  displayName: "claude-sh"
  vendor: "Community (open-source)"
  homepageUrl: "https://github.com/anthropics/claude-code"
  primarySurface: cli
  supportTier: none
  productKind: full-cli-agent
  stackScope: full
  description: |
    Claude Code rewritten as a ~1500-line bash script. Zero npm
    dependencies — uses only curl and jq. Implements the full agent
    loop including tool use, file editing, and command execution in
    pure shell. Demonstrates that the core Claude Code interaction
    pattern can be replicated with minimal tooling, making it useful
    for constrained environments where Node.js is unavailable.
edges:
  has_version:
    - agent-version:claude-sh@current
