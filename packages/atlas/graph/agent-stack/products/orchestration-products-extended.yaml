nodeKind: AgentProduct
id: agent:sweep-ai
attributes:
  displayName: "Sweep AI"
  vendor: "Sweep AI, Inc."
  homepageUrl: "https://sweep.dev/"
  primarySurface: web
  supportTier: none
  productKind: web-agent
  stackScope: full
  description: |
    Sweep AI is an AI junior developer that takes GitHub issues and
    autonomously creates pull requests. It polls for new issues, plans
    code changes, creates isolated branches, implements the fix or
    feature, and opens a PR with generated description linking back
    to the originating issue. Designed for low-complexity tickets
    that benefit from automated triage-to-PR workflows.
