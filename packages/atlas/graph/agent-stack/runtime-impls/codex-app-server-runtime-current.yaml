nodeKind: AgentRuntimeImpl
id: agent-runtime-impl:codex-app-server.runtime@current
attributes:
  displayName: Codex App-Server Runtime (current)
  agentVersionId: agent-version:codex-app-server@current
  subagentDispatchMechanism: handoff
  packageRef: source-ref:codex-github
  builtInTools:
  - tool-descriptor:read
  - tool-descriptor:bash
  toolRegistryDiscovery: static-bundled
  hookSockets:
  - hook-surface:codex.on-tool-call
  - hook-surface:codex.on-stop
  internalSessionStateLocation: ~/.codex/sessions/
  sessionFileFormat: jsonl
  sessionFilePathConvention: ~/.codex/sessions/<session-id>.jsonl
  approvalGatingPrimitive: per-call
  subprocessSandboxStrategy: wrapped-shell
  runtimeIdentity: none
  supportedMCPTransports:
  - mcp-transport:stdio
  - mcp-transport:streamable-http
  supportsStreaming: true
  realtimeV1WebsocketCompatible: true
  notes: |
    The app-server reuses the Codex Rust runtime: same built-in tool set,
    same MCP brokering, same wrapped-shell sandbox. Distinct from the CLI
    runtime in that consumers drive sessions via JSON-RPC requests
    instead of through the bundled TUI. Codex CLI 0.133.0 confirms realtime v1
    websocket compatibility and keeps ws:// endpoints available via
    `codex app-server --listen`.
edges:
  realizes:
    - target: layer:5-agent-runtime
  composes:
  - target: agent:codex-app-server
    role: runtime
  exposes:
  - target: hook-surface:codex.on-tool-call
  - target: hook-surface:codex.on-stop
  bundles:
  - target: tool-descriptor:read
  - target: tool-descriptor:bash
  connects:
  - target: mcp-transport:stdio
  - target: mcp-transport:streamable-http
  speaks:
    - target: mcp-transport:stdio
    - target: mcp-transport:streamable-http
