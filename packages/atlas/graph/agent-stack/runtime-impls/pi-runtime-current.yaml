nodeKind: AgentRuntimeImpl
id: agent-runtime-impl:pi.runtime@current
attributes:
  displayName: Pi Runtime (current)
  agentVersionId: agentVersion:pi:ge-0-0-0
  subagentDispatchMechanism: none
  packageRef: source-ref:pi-github
  builtInTools:
  - tool-descriptor:read
  - tool-descriptor:write
  - tool-descriptor:edit
  - tool-descriptor:bash
  toolRegistryDiscovery: static-bundled
  hookSockets: []
  internalSessionStateLocation: ~/.pi/agent/sessions/
  sessionFileFormat: jsonl-tree
  sessionFilePathConvention: ~/.pi/agent/sessions/<session-id>.jsonl
  approvalGatingPrimitive: per-call
  subprocessSandboxStrategy: none
  runtimeIdentity: api-key
  supportedMCPTransports:
  - mcp-transport:stdio
  supportsStreaming: true
edges:
  realizes:
    - target: layer:5-agent-runtime
  composes:
  - target: agent:pi
    role: runtime
  bundles:
  - target: tool-descriptor:read
  - target: tool-descriptor:write
  - target: tool-descriptor:edit
  - target: tool-descriptor:bash
  connects:
  - target: mcp-transport:stdio
  supports:
  - target: capability:supports-mcp
    versionRange: '>=1.0.0'
    level: full
    notes: 'MCP via stdio.

      '
  compaction_policy_applied_by:
  - target: compaction-policy:pi-coding-agent
  output_guard_applied_by:
  - target: output-guard:pi-coding-agent
  speaks:
    - target: mcp-transport:stdio
