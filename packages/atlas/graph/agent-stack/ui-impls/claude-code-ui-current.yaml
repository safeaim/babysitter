nodeKind: AgentUIImpl
id: agent-ui-impl:claude-code.ui@current
attributes:
  displayName: "Claude Code UI (current) — tui-and-cli"
  agentVersionId: agentVersion:claude:ge-0-0-0
  packageRef: source-ref:claude-code-github
  uiKind: tui-and-cli
  presentationsBundled:
    - presentation:claude-code-tui
  themeSupport: light-dark
  accessibilitySupport: basic
  notes: |
    Claude Code ships an interactive TUI (the `claude` command) and a non-interactive
    CLI (scripted prompt-mode flows); the user-facing slash commands, tool-approval
    prompts, and thinking toggle live at this UI layer.
