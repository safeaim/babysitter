  versionRange: ">=5.0.0"
  releasedAt: "2026-01-11"
  cliCommand: "<sdk:babysitter-sdk>"
  installMethods:
    - install:npm
  minSchemaVersion: "6.0.0"
edges:
  version_of:
    - agent:babysitter-sdk
  composed_of:
