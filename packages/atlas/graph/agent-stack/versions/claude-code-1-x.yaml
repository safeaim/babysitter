nodeKind: AgentVersion
id: agentVersion:claude:ge-0-0-0
attributes:
  agentId: "claude"
  aliases:
    - "claude-code"
  runtimeFamily: "cli-harness"
  releaseChannel: "stable"
  displayName: "Claude Code"
  summary: "Anthropic's official CLI agent for coding tasks"
  sourcePackage: "@anthropic-ai/claude-code"
  osSupport:
    - "linux"
    - "macos"
    - "windows"
  agentProductId: agent:claude-code
  versionRange: ">=0.0.0"
  releasedAt: "2025-05-22"
  cliCommand: "claude"
  installMethods:
    - install:npm
    - install:brew
  minSchemaVersion: "6.0.0"
  interactiveSignals:
    turnCompletePattern: "^\\s*❯\\s*$|^\\s*%\\s*$"
    exitOnNonInteractive: true
    nonInteractiveMode: "-p"
    interactiveMode: ""
  adapterMetadata:
    authMethods:
      - type: api_key
        name: "API Key"
        envVars: [ANTHROPIC_API_KEY]
      - type: browser_login
        name: "Browser Login"
    authFiles:
      - "~/.claude.json"
      - "~/.claude/settings.json"
    hostEnvSignals:
      - CLAUDECODE
      - CLAUDE_CODE_SESSION_ID
      - CLAUDE_CODE
      - CLAUDE_PROJECT_DIR
    sessionDir: "~/.claude/projects"
    sessionPersistence: file
    approvalModes:
      - yolo
      - prompt
      - deny
    capabilityFlags:
      canResume: true
      canFork: true
      supportsMultiTurn: true
      sessionPersistence: file
      supportsTextStreaming: true
      supportsToolCallStreaming: true
      supportsThinkingStreaming: true
      supportsNativeTools: true
      supportsMCP: true
      supportsParallelToolCalls: true
      requiresToolApproval: true
      supportsThinking: true
      supportsJsonMode: true
      supportsStructuredOutput: true
      structuredSessionTransport: persistent
      sessionControlPlane: self-managed
      supportsSkills: true
      supportsAgentsMd: true
      skillsFormat: file
      supportsSubagentDispatch: true
      supportsParallelExecution: true
      maxParallelTasks: 10
      supportsInteractiveMode: true
      supportsStdinInjection: true
      supportsImageInput: true
      supportsImageOutput: false
      supportsFileAttachments: true
      supportsPlugins: true
      pluginFormats: [mcp-server]
      pluginRegistries:
        - name: mcp
          url: https://modelcontextprotocol.io
          searchable: false
      supportedPlatforms: [darwin, linux, win32]
      thinkingEffortLevels: [low, medium, high, max]
      requiresGitRepo: false
      requiresPty: false
    runtimeHooks:
      preToolUse: blocking
      postToolUse: nonblocking
      sessionStart: nonblocking
      sessionEnd: nonblocking
      stop: nonblocking
      userPromptSubmit: blocking
    configSchema:
      configFormat: json
      configFilePaths:
        - "~/.claude/settings.json"
      projectConfigFilePaths:
        - ".claude/settings.json"
    displayName: "Claude Code"
    defaultModelId: "claude-sonnet-4-20250514"
  hookSupport:
    interactive:
      sessionStart: native
      stop: native
      userPromptSubmit: native
      preToolUse: native
      sessionEnd: native
    nonInteractive:
      sessionStart: emulated
      stop: unsupported
      userPromptSubmit: unsupported
      preToolUse: unsupported
      sessionEnd: unsupported
  bridgeCapabilities:
    interactiveBridge: true
    hookBridge: true
    sessionResume: true
    positionalPrompt: true
    nonInteractiveUsesPromptFlag: true
edges:
  version_of:
    - agent:claude-code
  composed_of:
    - target: agent-core-impl:claude-code.core@1.x
      role: core
    - target: agent-runtime-impl:claude-code.runtime@1.x
      role: runtime
    - target: agent-platform-impl:claude-code.platform@1.x
      role: platform
    - target: agent-ui-impl:claude-code.ui@current
      role: ui
    - target: knowledge-fabric-impl:claude-code.knowledge@current
      role: knowledge-fabric
  uses_memory_system:
    - target: memory-system:claude-code-auto-memory
  uses_vector_store:
    - target: vector-store:weaviate
    - target: vector-store:chroma
    - target: vector-store:pgvector
    - target: vector-store:qdrant
  has_memory:
    - target: memory-store:symphony-vector-pinecone
    - target: memory-store:symphony-conversation-buffer
    - target: memory-store:symphony-summarized-history
    - target: memory-store:symphony-prompt-cache
    - target: memory-store:symphony-knowledge-graph
  has_device_pair:
    - target: device-pair:agent-mux-mobile-ios
    - target: device-pair:agent-mux-mobile-android
    - target: device-pair:agent-mux-web-desktop
  governs_template:
    - target: prompt-template:few-shot-classification
  versioned_via:
    - target: vcs-host:bitbucket-cloud
    - target: vcs-host:gitea
    - target: vcs-host:azure-devops
  installed_via:
    - target: install:npm
    - target: install:brew
  complies_with:
    - target: compliance:soc-2
    - target: compliance:owasp-llm-top-10
  applies_policy:
    - target: content-policy:default-acceptable-use
    - target: content-policy:enterprise-pii
  sourced_from: []
  supports:
    - target: capability:skills
      versionRange: ">=0.0.0"
      level: full
      notes: Claude Code documents skills and slash commands directly, while the local target mapping anchors how plugin surfaces map into the ontology.
    - target: capability:supports-thinking
      versionRange: ">=0.0.0"
      level: full
      notes: Claude Code is documented as an interactive agentic coding surface that reasons over the codebase and executes tool-assisted work.
    - target: capability:supports-mcp
      versionRange: ">=0.0.0"
      level: full
      notes: MCP support points to official Claude Code documentation instead of inheriting only generic Claude product pages.
    - target: capability:tool-approval
      versionRange: ">=0.0.0"
      level: full
      notes: Permission modes and auto mode document Claude Code's native approval boundary model for tools and edits.
    - target: capability:interactive-mode
      versionRange: ">=0.0.0"
      level: full
      notes: Interactive CLI usage is directly documented rather than inferred from generic product marketing.
    - target: capability:stdin-injection
      versionRange: ">=0.0.0"
      level: full
      notes: Scripted prompt-mode CLI flows and continue flags provide the strongest official basis for non-interactive input semantics.
    - target: capability:vision-input
      versionRange: ">=0.0.0"
      level: full
      notes: Image input is backed by official Claude multimodal documentation, with lower confidence than the Claude Code-specific docs used elsewhere.
    - target: capability:runtime-hooks
      versionRange: ">=0.0.0"
      level: full
      notes: Runtime hooks tied to the official hook reference and guide plus the local plugin target shape.
    - target: capability:stop-hook
      versionRange: ">=0.0.0"
      level: full
      notes: Stop-hook support is modeled separately so the stop lifecycle claim is not diluted into the generic hook bundle.
    - target: capability:supports-subagent-dispatch
      versionRange: ">=0.0.0"
      level: full
      notes: Subagent dispatch is backed by the official custom-subagents documentation.
    - target: capability:parallel-tool-calls
      versionRange: ">=0.0.0"
      level: full
      notes: Parallel execution is tied to official subagent and agent-team references.
    - target: capability:can-resume
      versionRange: ">=0.0.0"
      level: full
      notes: Session resume is tied to checkpointing and continue flows.
    - target: capability:supports-agents-md
      versionRange: ">=1.0.0 <2.0.0"
      level: full
      notes: Claude Code reads CLAUDE.md (and AGENTS.md as alternate name) at session bootstrap; /memory edits this file.
    - target: capability:supports-parallel-execution
      versionRange: ">=1.0.0 <2.0.0"
      level: full
      notes: Subagents dispatched via the Task tool can run concurrently within one session.
    - target: capability:requires-git-repo
      versionRange: ">=1.0.0 <2.0.0"
      level: partial
      notes: Claude Code starts outside git repos but git-aware features (diffs, branch awareness) are degraded.
    - target: capability:requires-pty
      versionRange: ">=1.0.0 <2.0.0"
      level: partial
      notes: Interactive mode requires PTY; --print mode works without one.
    - target: capability:supports-file-attachments
      versionRange: ">=1.0.0 <2.0.0"
      level: full
      notes: Drag-drop / paste of files (images, docs, code) into the TUI is supported.
    - target: capability:supports-image-output
      versionRange: ">=1.0.0 <2.0.0"
      level: partial
      notes: Image output is provider-bound (Anthropic Messages API does not currently emit image blocks; some hosted models do).
    - target: capability:supports-local-models
      versionRange: ">=1.0.0 <2.0.0"
      level: partial
      notes: Claude Code routes inference through Anthropic / Bedrock / Vertex by default; local-model routing is via transport-mux + a Local Model Source provider configured in settings.
    - target: capability:supports-agent-teams
      versionRange: ">=2.1.32 <3.0.0"
      level: full
      notes: Experimental — gated by CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1. Source — https://docs.claude.com/en/docs/claude-code/agent-teams.
    - target: capability:supports-plugin-marketplaces
      versionRange: ">=1.0.0 <2.0.0"
      level: full
      notes: '/plugin marketplace add|list|update|remove + /plugin install|disable|enable|uninstall. Source — https://docs.claude.com/en/docs/claude-code/discover-plugins.'
    - target: capability:supports-deep-links
      versionRange: ">=2.1.91 <3.0.0"
      level: full
      notes: claude-cli://open + vscode://anthropic.claude-code/open. Source — https://docs.claude.com/en/docs/claude-code/deep-links.
    - target: capability:supports-skill-dynamic-context-injection
      versionRange: ">=1.0.0 <2.0.0"
      level: full
      notes: 'Inline !`cmd` and ```! blocks plus $ARGUMENTS / $N / ${CLAUDE_SESSION_ID} / ${CLAUDE_EFFORT} / ${CLAUDE_SKILL_DIR} substitutions. Source — https://docs.claude.com/en/docs/claude-code/skills.'
    - target: capability:supports-skill-shell-execution-policy
      versionRange: ">=1.0.0 <2.0.0"
      level: full
      notes: disableSkillShellExecution setting + per-skill shell (bash|powershell) frontmatter. Source — Anthropic skills doc.
    - target: capability:supports-result-message-typing
      versionRange: ">=1.0.0 <2.0.0"
      level: full
      notes: 'Agent SDK ResultMessage subtypes — success, error_max_turns, error_max_budget_usd, error_during_execution, error_max_structured_output_retries. Source — https://docs.claude.com/en/api/agent-sdk/agent-loop.'
    - target: capability:supports-skill-frontmatter-paths-glob
      versionRange: ">=1.0.0 <2.0.0"
      level: full
    - target: capability:supports-skill-positional-arguments
      versionRange: ">=1.0.0 <2.0.0"
      level: full
    - target: capability:supports-subagent-tool-allowlist
      versionRange: ">=1.0.0 <2.0.0"
      level: full
    - target: capability:supports-claude-cli-url-scheme
      versionRange: ">=2.1.91 <3.0.0"
      level: full
    - target: capability:supports-deep-link-vscode-handler
      versionRange: ">=2.1.91 <3.0.0"
      level: full
    - target: capability:supports-agent-loop-budget-limit
      versionRange: ">=1.0.0 <2.0.0"
      level: full
    - target: capability:supports-agent-loop-turn-limit
      versionRange: ">=1.0.0 <2.0.0"
      level: full
    - target: capability:supports-env-var-feature-gating
      versionRange: ">=1.0.0 <2.0.0"
      level: full
  has_output_style:
    - target: output-style:claude-code-learning
    - target: output-style:claude-code-bare-user
  uses_memory_hierarchy:
    - target: memory-hierarchy:claude-code-default
    - target: memory-hierarchy:claude-code-remote-ccr
  exposes_proactive_surface:
    - target: proactive-surface:claude-code-prompt-suggestion
    - target: proactive-surface:claude-code-magic-docs
  operates_in_permission_mode:
    - target: permission-mode:claude-code-default
    - target: permission-mode:claude-code-plan
    - target: permission-mode:claude-code-bypass-permissions
