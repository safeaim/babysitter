nodeKind: AgentVersion
id: agent-version:codex-app-server@current
attributes:
  agentProductId: agent:codex-app-server
  versionRange: ">=0.119.0"
  currentVersion: "0.133.0"
  releasedAt: "2025-09-01"
  upstreamReleaseTag: "rust-v0.133.0"
  releaseNotesUrl: "https://github.com/openai/codex/releases/tag/rust-v0.133.0"
  cliCommand: "codex app-server"
  installMethods:
    - install:npm
  minSchemaVersion: "6.0.0"
  appServer:
    realtimeV1WebsocketCompatible: true
    smokeTestedCommand: "npx -y @openai/codex@0.133.0 app-server --help"
edges:
