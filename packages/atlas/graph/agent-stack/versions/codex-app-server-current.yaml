      role: core
    - target: agent-runtime-impl:codex-app-server.runtime@current
      role: runtime
    - target: agent-platform-impl:codex-app-server.platform@current
      role: platform
  sourced_from: []
  supports:
    - target: capability:can-multi-turn
      versionRange: '>=0.119.0'
      level: full
      notes: Codex app-server hosts multi-turn agent sessions.
    - target: capability:supports-text-streaming
      versionRange: '>=0.119.0'
      level: full
      notes: Codex app-server streams output via WebSocket; 0.133.0 keeps ws:// --listen support and fixes realtime v1 websocket compatibility.
    - target: capability:supports-tool-use
      versionRange: '>=0.119.0'
      level: full
      notes: Codex app-server dispatches sandboxed tool calls.
