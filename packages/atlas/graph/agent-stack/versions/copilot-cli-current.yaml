nodeKind: AgentVersion
id: agentVersion:copilot:ge-1-0-55-3
attributes:
  agentId: "copilot"
  aliases:
    - "github-copilot"
    - "copilot-cli"
  runtimeFamily: "cli-harness"
  releaseChannel: "stable"
  displayName: "GitHub Copilot CLI"
  summary: "GitHub's CLI coding agent"
  sourcePackage: "@github/copilot"
  osSupport:
    - "linux"
    - "macos"
    - "windows"
  agentProductId: agent:copilot-cli
  versionRange: ">=1.0.55-3"
  currentVersion: "1.0.55-7"
  releasedAt: "2026-05-27"
  upstreamReleaseTag: "v1.0.55-7"
  releaseNotesUrl: "https://github.com/github/copilot-cli/releases/tag/v1.0.55-7"
  cliCommand: "gh copilot"
  installMethods:
    - install:gh-extension
  minSchemaVersion: "6.0.0"
  notes: |
    Assimilated through GitHub Copilot CLI 1.0.55-7. The release keeps the
    install surface unchanged (`gh extension install github/gh-copilot` /
    `@github/copilot`) while carrying forward the 1.0.55-3 plugin/session
    additions. 1.0.55-5 gives MCP configuration a dedicated screen with
    scrollable server and tool lists. 1.0.55-6 adds `/autopilot <objective>`
    (`/goal` alias), enables the cell-based terminal renderer for everyone,
    surfaces per-extension logs, discovers project extensions in non-git
    folder-backed workspaces, and allows `/statusline` and `/theme` while the
    agent is executing. 1.0.55-7 restricts exit_plan_mode to plan mode and
    falls back to JavaScript when the native binary crashes.
  adapterMetadata:
    installCommands:
      - type: gh-extension
        command: "gh extension install github/gh-copilot"
    authMethods:
      - type: github_token
        name: "GitHub Token"
        envVars: [GITHUB_TOKEN]
      - type: oauth_device
        name: "OAuth Device Flow"
    authFiles:
      - "~/.config/github-copilot/settings.json"
    hostEnvSignals:
      - COPILOT_CLI_SESSION
      - GH_COPILOT_SESSION
    sessionDir: "~/.config/github-copilot/sessions"
    sessionPersistence: file
    approvalModes:
      - prompt
    capabilityFlags:
      canResume: true
      canFork: false
      supportsMultiTurn: true
      sessionPersistence: file
      supportsTextStreaming: true
      supportsToolCallStreaming: false
      supportsThinkingStreaming: false
      supportsNativeTools: false
      supportsMCP: true
      supportsParallelToolCalls: false
      requiresToolApproval: false
      supportsThinking: false
      supportsJsonMode: false
      supportsStructuredOutput: false
      structuredSessionTransport: none
      sessionControlPlane: self-managed
      supportsSkills: false
      supportsAgentsMd: false
      skillsFormat: none
      supportsSubagentDispatch: false
      supportsParallelExecution: false
      maxParallelTasks: 1
      supportsInteractiveMode: true
      supportsStdinInjection: false
      supportsImageInput: false
      supportsImageOutput: false
      supportsFileAttachments: false
      supportsPlugins: true
      supportedPlatforms: [darwin, linux, win32]
      requiresGitRepo: false
      requiresPty: false
    runtimeHooks:
      preToolUse: nonblocking
      postToolUse: nonblocking
      sessionStart: nonblocking
      sessionEnd: nonblocking
      stop: nonblocking
      userPromptSubmit: nonblocking
    configSchema:
      configFormat: json
      configFilePaths:
        - "~/.config/github-copilot/settings.json"
      migrations:
        - from: "oauth.clientId"
          to: "oauthClientId"
          versionRange: ">=1.0.52"
        - from: "oauth.callbackPort"
          to: "auth.redirectPort"
          versionRange: ">=1.0.52"
      oauthRedirectPortKey: "auth.redirectPort"
    displayName: "GitHub Copilot"
    defaultModelId: "gpt-4o"
  hookSupport:
    interactive:
      sessionStart: unsupported
      stop: unsupported
      userPromptSubmit: unsupported
      preToolUse: unsupported
      sessionEnd: unsupported
    nonInteractive: {}
  bridgeCapabilities:
    interactiveBridge: true
    sessionResume: false
    positionalPrompt: false
edges:
  version_of:
    - agent:copilot-cli
  composed_of:
    - target: agent-core-impl:copilot-cli.core@current
      role: core
    - target: agent-runtime-impl:copilot-cli.runtime@current
      role: runtime
    - target: agent-platform-impl:copilot-cli.platform@current
      role: platform
    - target: agent-ui-impl:copilot-cli.ui@current
      role: ui
  sourced_from:
    - source-ref:gh-copilot-github
    - evidence:copilot-cli-1-0-55-3-release
    - evidence:copilot-cli-1-0-55-5-release
    - evidence:copilot-cli-1-0-55-6-release
    - evidence:copilot-cli-1-0-55-7-release
  supports:
    - target: capability:skills
      versionRange: ">=1.0.55-3"
      level: full
      notes: Copilot CLI plugins explicitly bundle reusable agents, skills, hooks, and integrations.
    - target: capability:supports-thinking
      versionRange: ">=1.0.55-3"
      level: full
      notes: GitHub documents Copilot CLI and Copilot coding-agent workflows as interactive agentic coding surfaces.
    - target: capability:interactive-mode
      versionRange: ">=1.0.55-3"
      level: full
      notes: Interactive Copilot CLI usage is documented directly.
    - target: capability:stdin-injection
      versionRange: ">=1.0.55-3"
      level: full
      notes: Public Copilot CLI docs cover command-line prompting flows.
    - target: capability:vision-input
      versionRange: ">=1.0.55-3"
      level: full
      notes: Public image-input evidence is strongest in the Copilot SDK rather than CLI docs.
    - target: capability:runtime-hooks
      versionRange: ">=1.0.55-3"
      level: full
      notes: Copilot CLI exposes hooks directly; the local target profile refines canonical hook-name mapping.
    - target: capability:stop-hook
      versionRange: ">=1.0.55-3"
      level: full
      notes: Normalized stop-hook capability derived from documented lifecycle hooks + local hook-name mapping.
    - target: capability:supports-mcp
      versionRange: ">=1.0.55-3"
      level: full
      notes: GitHub documents MCP for Copilot CLI and the Copilot cloud agent.
    - target: capability:can-resume
      versionRange: ">=1.0.55-3"
      level: full
      notes: Public session persistence evidence comes from Copilot CLI config-directory documentation.
  uses_memory_system:
    - target: memory-system:instruction-file-hierarchy
