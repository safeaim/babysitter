nodeKind: AgentVersion
id: agent-version:openai-agents-sdk@current
attributes:
  agentProductId: agent:openai-agents-sdk
  versionRange: '>=0.1.0'
  releasedAt: '2025-03-11'
  cliCommand: '<sdk:openai-agents>'
  installMethods:
    - install:pip
  minSchemaVersion: 6.0.0
edges:
  version_of:
    - agent:openai-agents-sdk
  composed_of:
    - target: agent-core-impl:openai-agents-sdk.core@current
      role: core
    - target: agent-runtime-impl:openai-agents-sdk.runtime@current
      role: runtime
  sourced_from: []
  supports:
    - target: capability:streaming
      versionRange: '>=0.1.0'
      level: full
      notes: Runner.run_streamed() yields a typed event stream.
    - target: capability:supports-tool-use
      versionRange: '>=0.1.0'
      level: full
      notes: Function tools and OpenAI hosted tools dispatched per turn.
    - target: capability:supports-subagent-dispatch
      versionRange: '>=0.1.0'
      level: full
      notes: Handoffs invoke nested agent runs.
    - target: capability:can-multi-turn
      versionRange: '>=0.1.0'
      level: full
    - target: capability:supports-guardrails
      versionRange: '>=0.1.0'
      level: full
      notes: |
        Input and output guardrails run in parallel with agent execution.
        InputGuardrail validates user input; OutputGuardrail validates
        agent responses. Guardrails can tripwire to halt execution.
    - target: capability:supports-handoffs
      versionRange: '>=0.1.0'
      level: full
      notes: |
        Structured agent-to-agent handoffs modeled as tool calls. Handoff
        transfers conversation ownership to another Agent instance with
        defined input filters and output types.
    - target: capability:supports-tracing
      versionRange: '>=0.1.0'
      level: full
      notes: |
        Built-in tracing captures the full execution flow — LLM calls,
        tool invocations, handoffs, and guardrail checks. Traces are
        exportable to external backends for debugging and observability.
  uses_memory_system:
    - target: memory-system:vector-backed-recall-pattern
