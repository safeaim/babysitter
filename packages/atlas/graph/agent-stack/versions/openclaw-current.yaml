nodeKind: AgentVersion
id: agentVersion:openclaw:ge-2026-5-26
attributes:
  agentId: "openclaw"
  aliases: []
  runtimeFamily: "cli-harness"
  releaseChannel: "stable"
  displayName: "OpenClaw"
  summary: "OpenClaw CLI coding agent"
  sourcePackage: "openclaw"
  osSupport:
    - "linux"
    - "macos"
    - "windows"
  agentProductId: agent:openclaw
  versionRange: ">=2026.5.26"
  releasedAt: "2026-05-27"
  releaseNotesUrl: "https://github.com/openclaw/openclaw/releases/tag/v2026.5.26-beta.2"
  cliCommand: "openclaw"
  installMethods:
    - install:npm
  minSchemaVersion: "6.0.0"
  adapterMetadata:
    releaseNotes:
      version: "2026.5.26"
      highlights:
        - "Gateway and reply paths avoid repeated plugin, channel, session, usage-cost, warning, scheduled-service, and filesystem scans."
        - "Transcript-backed meeting summaries, source-provider chunks, cleaned user turns, media provenance, Codex mirrors, WebChat replies, and CLI/TUI replay converge on one transcript path."
        - "Telegram, iMessage, WhatsApp, Discord, Signal, and mobile approval flows gained channel-specific reliability and reaction approval improvements."
        - "Talk and realtime voice runs can be inspected, steered, cancelled, or followed up from Web UI and Discord voice."
        - "Browser snapshot reads honor SSRF policy, fetched file text is wrapped as external content, and serialized tool-call text is scrubbed from replies."
        - "Codex app-server resume, timeout, usage-limit recovery, dynamic tool-schema guards, xAI usage-limit surfacing, and local approval resolution improve provider-specific recovery."
      gatewayStartup: >
        Gateway ready signals no longer wait on unused handler trees or ACPX
        probes. Startup hot paths reuse channel catalog reads, immutable plugin
        metadata snapshots, plugin SDK alias maps, and skip irrelevant
        filesystem probes.
      replyPathCacheCoverage:
        - plugin
        - channel
        - session
        - usage-cost
        - warning
        - scheduled-service
        - filesystem
      transcriptBackedSurfaces:
        - meeting summaries
        - source-provider chunks
        - cleaned user turns
        - media provenance
        - Codex mirrors
        - WebChat replies
        - CLI/TUI replay
      channelApprovals:
        reactionApprovalChannels:
          - Signal
          - iMessage
          - WhatsApp
        talkControls: "Realtime Talk runs can be inspected, steered, cancelled, or followed up from Web UI and Discord voice."
      browserSecurity:
        browserSnapshots: "SSRF policy enforcement"
        fetchedFiles: "wrapped as external content"
        replyScrubbing: "serialized tool-call text is scrubbed from replies"
      providerRecovery:
        namedAuthProfiles: true
        openaiSamplingParams: true
        codexAppServerRecovery:
          - resume
          - timeout
          - usage-limit
        dynamicToolSchemaGuards: true
        xaiUsageLimitSurfacing: true
        ollamaTopPNormalization: true
      pluginSdk:
        - "Generic channel-message poll sender for channel plugins."
        - "Row-level session workflow helpers; loadSessionStore deprecated."
        - "Embedding provider capability contract and registration API."
      meetingNotes:
        sourceProviderContract: true
        cliAccess: "read-only openclaw meeting-notes"
        importModes:
          - manual-transcript
        autoStartCaptureConfig: true
        liveSources:
          - discord-voice
      providerAuth:
        xaiGrokWebSearch: >
          Grok web_search reuses xAI OAuth auth profiles and threads the active
          agent auth profile through web search.
        mediaProviderTimeouts: true
    authMethods:
      - type: api_key
        name: "Provider API Key"
        envVars: [ANTHROPIC_API_KEY, OPENAI_API_KEY, XAI_API_KEY]
    authFiles:
      - "~/.openclaw/config.json"
    hostEnvSignals:
      - OPENCLAW_SESSION
      - OPENCLAW_RUN_ID
    sessionDir: "~/.openclaw/sessions"
    sessionPersistence: file
    approvalModes:
      - yolo
      - prompt
    capabilityFlags:
      canResume: false
      canFork: false
      supportsMultiTurn: true
      sessionPersistence: file
      supportsTextStreaming: true
      supportsToolCallStreaming: true
      supportsThinkingStreaming: false
      supportsNativeTools: true
      supportsMCP: true
      supportsParallelToolCalls: true
      requiresToolApproval: true
      supportsThinking: false
      supportsJsonMode: false
      supportsStructuredOutput: false
      structuredSessionTransport: none
      sessionControlPlane: self-managed
      supportsSkills: false
      supportsAgentsMd: false
      skillsFormat: none
      supportsSubagentDispatch: false
      supportsParallelExecution: false
      maxParallelTasks: 1
      supportsInteractiveMode: true
      supportsStdinInjection: true
      supportsImageInput: false
      supportsImageOutput: false
      supportsFileAttachments: false
      supportsPlugins: true
      pluginFormats: [mcp-server]
      supportedPlatforms: [darwin, linux, win32]
      requiresGitRepo: false
      requiresPty: false
      supportsChannelMessagePollSender: true
      supportsMeetingNotesSourceProviders: true
    runtimeHooks:
      preToolUse: nonblocking
      postToolUse: nonblocking
      sessionStart: nonblocking
      sessionEnd: nonblocking
      stop: nonblocking
      userPromptSubmit: nonblocking
    configSchema:
      configFormat: json
      configFilePaths:
        - "~/.openclaw/config.json"
      bareCliBehavior: "classic onboarding before authored config exists"
    displayName: "OpenClaw"
    defaultModelId: "default"
  hookSupport:
    interactive:
      sessionStart: unsupported
      stop: unsupported
      userPromptSubmit: unsupported
      preToolUse: unsupported
      sessionEnd: unsupported
    nonInteractive:
      sessionStart: unsupported
      stop: unsupported
      userPromptSubmit: unsupported
      preToolUse: unsupported
      sessionEnd: unsupported
  bridgeCapabilities:
    interactiveBridge: false
    sessionResume: true
    positionalPrompt: false
edges:
  version_of:
    - agent:openclaw
  composed_of:
    - target: agent-core-impl:openclaw.core@current
      role: core
    - target: agent-runtime-impl:openclaw.runtime@current
      role: runtime
    - target: agent-platform-impl:openclaw.platform@current
      role: platform
    - target: agent-ui-impl:openclaw.ui@current
      role: ui
    - target: knowledge-fabric-impl:openclaw.knowledge@current
      role: knowledge-fabric
  uses_memory_system:
    - target: memory-system:openclaw-soul-memory
  sourced_from: []
  supports:
    - target: capability:skills
      versionRange: ">=2026.5.26"
      level: full
      notes: OpenClaw fallback metadata; runtime hooks and stop hooks remain unsupported in current shared metadata.
    - target: capability:supports-thinking
      versionRange: ">=2026.5.26"
      level: full
      notes: OpenClaw fallback metadata.
    - target: capability:interactive-mode
      versionRange: ">=2026.5.26"
      level: full
      notes: OpenClaw fallback metadata.
    - target: capability:stdin-injection
      versionRange: ">=2026.5.26"
      level: full
      notes: OpenClaw fallback metadata.
    - target: capability:vision-input
      versionRange: ">=2026.5.26"
      level: full
      notes: OpenClaw fallback metadata.
    - target: capability:can-resume
      versionRange: ">=2026.5.26"
      level: full
      notes: OpenClaw fallback metadata.
