nodeKind: AgentVersion
id: agent-version:opencode-http@current
attributes:
  agentProductId: agent:opencode
  versionRange: ">=1.15.12"
  currentVersion: "1.15.12"
  releasedAt: "2026-05-28"
  releaseNotesUrl: "https://github.com/anomalyco/opencode/releases/tag/v1.15.12"
  cliCommand: "opencode serve"
  installMethods:
    - install:npm
    - install:brew
    - install:curl
  minSchemaVersion: "6.0.0"
edges:
  version_of:
    - agent:opencode
  composed_of:
    - target: agent-core-impl:opencode-http.core@current
      role: core
    - target: agent-runtime-impl:opencode.runtime@1.x
      role: runtime
    - target: agent-platform-impl:opencode.platform@1.x
      role: platform
  sourced_from:
    - evidence:opencode-1-15-12-release
  supports:
    - target: capability:can-multi-turn
      versionRange: '>=1.15.12'
      level: full
      notes: OpenCode HTTP server hosts multi-turn sessions.
    - target: capability:supports-text-streaming
      versionRange: '>=1.15.12'
      level: full
      notes: OpenCode streams model output via HTTP; 1.15.12 also documents experimental OpenAI Responses WebSocket support behind OPENCODE_EXPERIMENTAL_WEBSOCKETS.
    - target: capability:supports-tool-use
      versionRange: '>=1.15.12'
      level: full
      notes: OpenCode dispatches tool calls in sandboxed sessions.
    - target: capability:supports-mcp
      versionRange: '>=1.15.12'
      level: full
      notes: OpenCode supports MCP server integration.
  uses_memory_system:
    - target: memory-system:file-based-markdown-pattern
