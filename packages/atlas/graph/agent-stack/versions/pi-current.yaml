nodeKind: AgentVersion
id: agentVersion:pi:ge-0-75-5
attributes:
  agentId: "pi"
  aliases: []
  runtimeFamily: "cli-harness"
  releaseChannel: "stable"
  displayName: "Pi"
  summary: "Pi CLI coding agent — harness with skills, compaction, prompt templates, and session management"
  sourcePackage: "@earendil-works/pi-coding-agent"
  osSupport:
    - "linux"
    - "macos"
    - "windows"
  agentProductId: agent:pi
  versionRange: ">=0.75.5"
  releasedAt: "2026-05-23"
  cliCommand: "pi"
  releaseHighlights:
    - "Collapsed read tool cards show only the read line until Ctrl+O expansion."
    - "Edit tool result details include a standard unified patch for SDK consumers."
    - "pi update and git package installs reconcile pinned refs while preserving settings."
    - "Custom Anthropic-compatible models can set compat.forceAdaptiveThinking."
  installMethods:
    - install:npm
  minSchemaVersion: "6.0.0"
  adapterMetadata:
    authMethods:
      - type: api_key
        name: "Provider API Key"
        envVars: [ANTHROPIC_API_KEY, OPENAI_API_KEY]
    authFiles:
      - "~/.pi/agent/settings.json"
    hostEnvSignals:
      - PI_RUN_ID
      - PI_SESSION_ID
    sessionDir: "~/.pi/agent/sessions"
    sessionPersistence: file
    approvalModes:
      - yolo
      - prompt
    capabilityFlags:
      canResume: true
      canFork: false
      supportsMultiTurn: true
      sessionPersistence: file
      supportsTextStreaming: true
      supportsToolCallStreaming: true
      supportsThinkingStreaming: false
      supportsNativeTools: true
      supportsMCP: false
      supportsParallelToolCalls: false
      requiresToolApproval: true
      supportsThinking: false
      supportsJsonMode: false
      supportsStructuredOutput: false
      structuredSessionTransport: none
      sessionControlPlane: self-managed
      supportsSkills: false
      supportsAgentsMd: false
      skillsFormat: none
      supportsSubagentDispatch: false
      supportsParallelExecution: false
      maxParallelTasks: 1
      supportsInteractiveMode: true
      supportsStdinInjection: true
      supportsImageInput: false
      supportsImageOutput: false
      supportsFileAttachments: false
      supportsPlugins: false
      supportedPlatforms: [darwin, linux, win32]
      requiresGitRepo: false
      requiresPty: false
    runtimeHooks:
      preToolUse: nonblocking
      postToolUse: nonblocking
      sessionStart: nonblocking
      sessionEnd: nonblocking
      stop: nonblocking
      userPromptSubmit: nonblocking
    configSchema:
      configFormat: json
      configFilePaths:
        - "~/.pi/agent/settings.json"
      compatFields:
        forceAdaptiveThinking:
          type: boolean
          introducedIn: "0.75.5"
          scope: custom-anthropic-compatible-model
    displayName: "Pi"
    defaultModelId: "default"
  interactiveSignals:
    turnCompletePattern: "^>"
    exitOnNonInteractive: false
    nonInteractiveMode: ""
    interactiveMode: ""
  hookSupport:
    interactive:
      sessionStart: unsupported
      stop: unsupported
      userPromptSubmit: unsupported
      preToolUse: unsupported
      sessionEnd: unsupported
    nonInteractive: {}
  bridgeCapabilities:
    interactiveBridge: true
    sessionResume: true
    positionalPrompt: false
edges:
  version_of:
    - agent:pi
  composed_of:
    - target: agent-core-impl:pi.core@current
      role: core
    - target: agent-runtime-impl:pi.runtime@current
      role: runtime
    - target: agent-platform-impl:pi.platform@current
      role: platform
    - target: agent-ui-impl:pi.ui@current
      role: ui
    - target: knowledge-fabric-impl:pi.knowledge@current
      role: knowledge-fabric
  uses_memory_system:
    - target: memory-system:pi-memory
  sourced_from: []
  supports:
    - target: capability:skills
      versionRange: ">=0.75.5"
      level: full
      notes: |
        Pi harness supports skill invocation via formatSkillInvocation.
        Skills are dispatched as structured interactions within the agent loop.
    - target: capability:supports-thinking
      versionRange: ">=0.75.5"
      level: full
      notes: Pi fallback harness with interactive sessions.
    - target: capability:interactive-mode
      versionRange: ">=0.75.5"
      level: full
      notes: Pi fallback harness with interactive sessions.
    - target: capability:stdin-injection
      versionRange: ">=0.75.5"
      level: full
      notes: Pi fallback harness.
    - target: capability:vision-input
      versionRange: ">=0.75.5"
      level: full
      notes: Pi fallback harness.
    - target: capability:can-resume
      versionRange: ">=0.75.5"
      level: full
      notes: |
        Multi-turn JSONL-tree sessions with resume, fork, and branch operations.
    - target: capability:supports-compaction
      versionRange: ">=0.75.5"
      level: full
      notes: |
        Client-side branch-summarization compaction via AgentHarness.
        Configurable threshold and summarization strategy.
    - target: capability:supports-prompt-templates
      versionRange: ">=0.75.5"
      level: full
      notes: |
        Parameterized prompt-template system for system prompts,
        tool descriptions, and context injection.
    - target: capability:supports-session-management
      versionRange: ">=0.75.5"
      level: full
      notes: |
        Harness-managed session lifecycle with JSONL-tree persistence,
        session resume, fork, and execution-env abstraction.
