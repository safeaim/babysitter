nodeKind: AgentVersion
id: agent-version:qwen@current
attributes:
  agentProductId: agent:qwen
  sourcePackage: "@qwen-code/qwen-code"
  versionRange: ">=0.16.2"
  releasedAt: "2026-05-27"
  releaseNotesUrl: https://github.com/QwenLM/qwen-code/releases/tag/v0.16.2
  cliCommand: "qwen"
  installMethods:
    - install:npm
  assimilationNotes: |
    Qwen Code 0.16.2 keeps the npm package/install surface unchanged.
    The release adds .qwen/QWEN.local.md project-local memory, a
    memory-leak-debug skill, background-agent concurrency limits, Token Plan
    cache control, a three-tier auto-compaction threshold redesign, headless
    runaway-protection guardrails, a startup --worktree flag with symlink
    directory and PR-ref support, and SDK fixes for canUseTool timeouts and CLI
    chunks in the SDK package.
    The release closes the upstream tool_use/tool_result invariant across
    failure paths, adds TTFT capture plus GenAI semantic-convention dual
    telemetry emission, preserves tab-indented notebook formatting, updates
    internal Express server dependencies to 5.2.1, normalizes the standalone
    Windows install BAT CRLF storage, and gates mintty OSC 8 detection on
    TERM_PROGRAM_VERSION >= 3.3.
  minSchemaVersion: "6.0.0"
edges:
  version_of:
    - agent:qwen
  composed_of:
    - target: agent-core-impl:qwen.core@current
      role: core
    - target: agent-runtime-impl:qwen.runtime@current
      role: runtime
    - target: agent-platform-impl:qwen.platform@current
      role: platform
    - target: agent-ui-impl:qwen.ui@current
      role: ui
  sourced_from:
    - source-ref:qwen-code-github
    - evidence:qwen-code-release-v0-16-2
  supports:
    - target: capability:can-multi-turn
      versionRange: '>=0.16.2'
      level: full
      notes: Qwen agent runs multi-turn coding sessions.
    - target: capability:supports-text-streaming
      versionRange: '>=0.16.2'
      level: full
      notes: Qwen agent streams model output in the terminal.
    - target: capability:supports-tool-use
      versionRange: '>=0.16.2'
      level: full
      notes: Qwen agent drives file edits and commands via tool-use. Version 0.16.2 keeps that invariant while adding headless runaway-protection guardrails and SDK canUseTool timeout handling.
    - target: capability:supports-mcp
      versionRange: '>=0.16.2'
      level: full
      notes: Qwen agent supports MCP server integration.
  uses_memory_system:
    - target: memory-system:qwen-code-memory
      notes: Qwen Code 0.16.2 adds `.qwen/QWEN.local.md` as project-local context.
    - target: memory-system:file-based-markdown-pattern
