nodeKind: Benchmark
id: benchmark:re-bench
attributes:
  displayName: "RE-Bench"
  homepageUrl: https://metr.org/AI_R_D_Evaluation_Report.pdf
  kind: research-engineering
  targetsKind: AgentVersion
  description: |
    METR's autonomous-research-engineering benchmark: time-bounded ML
    R&D tasks scored against expert human baselines to measure
    frontier-agent ability to do self-directed research engineering.
edges:
  covers:
    - target: skill-area:autonomous-research-engineering
      attributes:
        coverage: full
        weight: 0.8
    - target: skill-area:ml-fine-tuning
      attributes:
        coverage: tangential
        weight: 0.2
  applies_to:
    - target: domain:machine-learning
    - target: domain:scientific-discovery
