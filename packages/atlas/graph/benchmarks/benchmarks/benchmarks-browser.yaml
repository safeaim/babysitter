nodeKind: Benchmark
id: benchmark:browse-comp
attributes:
  displayName: "BrowseComp"
  homepageUrl: https://openai.com/index/browsecomp/
  kind: web-agent
  targetsKind: AgentVersion
  description: |
    OpenAI benchmark for browsing agents on hard, hard-to-find web
    research tasks designed to require deep, persistent search rather
    than surface lookup.
edges:
  covers:
    - target: skill-area:deep-web-research
      attributes:
        coverage: full
        weight: 0.7
    - target: skill-area:browser-automation
      attributes:
        coverage: tangential
        weight: 0.1
  applies_to:
    - target: domain:web-development
---
