nodeKind: Benchmark
id: benchmark:swe-lancer
attributes:
  displayName: "SWE-Lancer"
  homepageUrl: https://github.com/openai/SWELancer-Benchmark
  kind: full-stack
  targetsKind: AgentVersion
  description: |
    OpenAI benchmark of >1,400 paid freelance software-engineering tasks
    scraped from Upwork, with associated bounties. Measures end-to-end
    agent ability to deliver shippable freelance work.
edges:
  covers:
    - target: skill-area:autonomous-coding-engagement
      attributes:
        coverage: full
        weight: 0.7
    - target: skill-area:bug-fixing-from-issues
      attributes:
        coverage: partial
        weight: 0.2
  applies_to:
    - target: domain:software-engineering
---
