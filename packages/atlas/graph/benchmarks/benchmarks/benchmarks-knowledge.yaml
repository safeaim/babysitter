nodeKind: Benchmark
id: benchmark:bias-bench
attributes:
  displayName: "BBQ (Bias Benchmark for QA)"
  homepageUrl: https://github.com/nyu-mll/BBQ
  kind: model-only
  targetsKind: ModelVersion
  description: |
    BBQ (Parrish et al., NYU 2022) is a bias benchmark for question
    answering covering nine social dimensions (age, disability, gender,
    nationality, physical appearance, race/ethnicity, religion,
    socioeconomic status, sexual orientation), measuring stereotype
    bias under both ambiguous and disambiguated contexts.
edges:
  covers:
    - target: skill-area:safety-redteaming
  applies_to:
    - target: domain:social-sciences
---
nodeKind: Benchmark
id: benchmark:truthful-qa
attributes:
  displayName: "TruthfulQA"
  homepageUrl: https://github.com/sylinrl/TruthfulQA
  kind: model-only
  targetsKind: ModelVersion
  description: |
    TruthfulQA (Lin et al., 2021) is an 817-question benchmark
    measuring whether a language model produces truthful answers
    when humans tend to hold false beliefs (misconceptions, urban
    legends). Reports both truthfulness and informativeness scores.
edges: {}
