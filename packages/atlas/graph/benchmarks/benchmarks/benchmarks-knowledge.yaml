nodeKind: Benchmark
id: benchmark:olympiad-bench
attributes:
  displayName: "OlympiadBench"
  homepageUrl: https://github.com/OpenBMB/OlympiadBench
  kind: model-only
  targetsKind: ModelVersion
  description: |
    OlympiadBench (OpenBMB) is a bilingual (English/Chinese) multimodal
    benchmark of 8,476 olympiad-level math and physics problems, with
    expert-annotated step-by-step solutions, used to probe the limits
    of frontier-model reasoning.
edges:
  covers:
    - target: skill-area:mathematical-reasoning
  applies_to:
    - target: domain:mathematics
    - target: domain:physics
