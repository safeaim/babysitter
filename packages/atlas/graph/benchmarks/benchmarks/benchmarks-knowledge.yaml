nodeKind: Benchmark
id: benchmark:arc-challenge
attributes:
  displayName: "ARC-Challenge"
  homepageUrl: https://allenai.org/data/arc
  kind: model-only
  targetsKind: ModelVersion
  description: |
    The AI2 Reasoning Challenge (ARC) — Challenge set — is a collection
    of 2,590 grade-school-level multiple-choice science questions
    selected to be unanswerable by simple retrieval or word-correlation
    baselines, introduced by Clark et al. (Allen AI, 2018).
