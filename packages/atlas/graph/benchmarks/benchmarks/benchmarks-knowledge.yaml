id: benchmark:promptbench
attributes:
  displayName: "PromptBench"
  homepageUrl: https://github.com/microsoft/promptbench
  kind: model-only
  targetsKind: ModelVersion
  description: |
    PromptBench (Microsoft) measures the robustness of LLMs to prompt-
