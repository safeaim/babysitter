nodeKind: Benchmark
id: benchmark:arc-agi-3
attributes:
  displayName: "ARC-AGI 3"
  homepageUrl: https://arcprize.org/arc-agi/3
  kind: interactive-reasoning
  targetsKind: AgentVersion
  description: |
    Interactive visual-reasoning benchmark from François Chollet /
    ARC Prize Foundation (2025). Agents play short novel grid-based
    games to test fluid intelligence and pattern induction over
    interactive environments rather than static IQ-style puzzles.
edges:
  covers:
    - target: skill-area:visual-pattern-induction
      attributes:
        coverage: full
        weight: 0.6
    - target: skill-area:agentic-loops
      attributes:
        coverage: tangential
        weight: 0.2
  applies_to:
    - target: domain:computer-science
    - target: domain:ml-ai
