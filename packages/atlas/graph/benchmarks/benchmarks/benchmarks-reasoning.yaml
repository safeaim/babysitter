nodeKind: Benchmark
id: benchmark:hle
attributes:
  displayName: "Humanity's Last Exam (HLE)"
  homepageUrl: https://lastexam.ai/
  kind: knowledge
  targetsKind: ModelVersion
  description: |
    Closed-book frontier-knowledge benchmark of expert-authored
    questions across math, sciences, and humanities, designed to
    remain unsaturated by current frontier models.
edges:
  covers:
    - target: skill-area:closed-book-frontier-reasoning
      attributes:
        coverage: full
        weight: 0.7
    - target: skill-area:general-knowledge-reasoning
      attributes:
        coverage: partial
        weight: 0.2
  applies_to:
    - target: domain:computer-science
    - target: domain:mathematics
---
