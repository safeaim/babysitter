nodeKind: Capability
id: capability:supports-github-trigger
attributes:
  displayName: "Supports GitHub trigger backend"
  description: |
    Normalizes GitHub webhook / Actions payloads (issues, pull_request,
    issue_comment, push) into NormalizedTriggerEvent and enriches
    changed files via REST + local git fallback.
    Source: packages/triggers-mux/src/backends/github.ts:4
    (normalizeGithub); packages/triggers-mux/src/enrich.ts:61
    (enrichGithubFromApi).
  appliesToNodeKinds: ["OperationalTrigger", "AgentPlatformImpl"]
  category: extension
edges:
  supported_by:
    - package:a5c-ai-triggers
---
nodeKind: Capability
id: capability:supports-gitlab-trigger
attributes:
  displayName: "Supports GitLab trigger backend"
  description: |
    Normalizes GitLab webhook payloads via object_kind /
    object_attributes shape; merge_request, push, note, issue.
    Source: packages/triggers-mux/src/backends/gitlab.ts:4
    (normalizeGitlab).
  appliesToNodeKinds: ["OperationalTrigger", "AgentPlatformImpl"]
  category: extension
edges:
  supported_by:
    - package:a5c-ai-triggers
