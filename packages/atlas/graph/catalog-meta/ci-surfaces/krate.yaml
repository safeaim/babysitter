  packageId: package:a5c-ai-krate
  scripts:
    - build
    - test
    - validate:docs
    - package:check
    - smoke
    - check
  publishStrategy: npm-public
  releaseChannels:
    - staging
    - npm
  validationCommands:
    - "npm run check --workspace=@a5c-ai/krate"
    - "npm run package:check --workspace=@a5c-ai/krate"
