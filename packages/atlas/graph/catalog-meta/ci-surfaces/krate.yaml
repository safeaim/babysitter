    - "packages/krate/core/dist/**"
    - "packages/krate/core/bin/krate-demo.mjs"
    - "packages/krate/core/bin/krate-server.mjs"
  triggerEvents:
    - push
    - pr
    - tag
edges:
  validates_package:
    - target: package:a5c-ai-krate
