nodeKind: Claim
id: claim:codex-research-cli-convenience-launch-flags
attributes:
  subjectId: launch-config:codex.full-auto
  subjectKind: LaunchConfig
  attribute: commArgs
  value: --full-auto and --dangerously-bypass-approvals-and-sandbox
  statement: |-
    Codex CLI 0.120.0 documents `--full-auto` as a convenience alias for low-friction sandboxed automatic execution equivalent to `-a on-request --sandbox workspace-write`, and documents `--dangerously-bypass-approvals-and-sandbox` as an extremely dangerous flag that skips confirmations and sandboxing for externally sandboxed environments.
  evidenceSourceIds:
    - evidence:codex-research-cli-help-0-120-0
  confidence: high
  provenanceKind: observation
  evidenceStrength: strong
  status: accepted
  claimedAt: '2026-05-05T00:00:00Z'
  claimedBy: a5c-ai-catalog
  claimKind: provenance
  note: Supports Codex LaunchConfig nodes for CLI convenience and bypass flags.
edges:
  about_subject:
    - launch-config:codex.full-auto
    - launch-config:codex.dangerously-bypass-approvals-and-sandbox
  backed_by_evidence:
    - evidence:codex-research-cli-help-0-120-0
