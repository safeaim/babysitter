nodeKind: Claim
id: claim:mcp-transport-http-sse-mcp-transport-http-sse-connectionlifecycle
attributes:
  subjectId: mcp-transport:http-sse
  attribute: connectionLifecycle
  value: "Two-endpoint design (legacy):\n  1. Client opens GET on the SSE endpoint;\
    \ server responds with an\n     `endpoint` SSE event whose `data:` is the URL\
    \ the client must\n     POST JSON-RPC requests to (typically a per-session URL).\n\
    \  2. Client POSTs `initialize` to the announced endpoint; response\n     is delivered\
    \ asynchronously as an SSE `message` event on the\n     open GET stream.\n  3.\
    \ Client POSTs `notifications/initialized`. Session is ready.\n  4. Shutdown is\
    \ by closing the SSE GET; no explicit DELETE.\n"
  subjectKind: MCPTransport
  statement: "mcp-transport:http-sse connectionLifecycle is Two-endpoint design (legacy):\n\
    \  1. Client opens GET on the SSE endpoint; server responds with an\n     `endpoint`\
    \ SSE event whose `data:` is the URL the client must\n     POST JSON-RPC requests\
    \ to (typically a per-session URL).\n  2. Client POSTs `initialize` to the announced\
    \ endpoint; response\n     is delivered asynchronously as an SSE `message` event\
    \ on the\n     open GET stream.\n  3. Client POSTs `notifications/initialized`.\
    \ Session is ready.\n  4. Shutdown is by closing the SSE GET; no explicit DELETE.\n\
    ."
  confidence: medium
  provenanceKind: observation
  evidenceStrength: moderate
  status: accepted
  evidenceSourceIds:
  - evidence:mcp-transport-http-sse-catalog-source-2026-05
  claimedAt: '2026-05-04T00:00:00Z'
