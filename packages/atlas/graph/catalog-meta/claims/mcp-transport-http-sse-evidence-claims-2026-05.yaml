id: claim:mcp-transport-http-sse-mcp-transport-http-sse-reconnectpolicy
attributes:
  subjectId: mcp-transport:http-sse
  attribute: reconnectPolicy
  value: 'No formal session-resumption mechanism in the spec. On stream loss

    the client is expected to reopen the SSE GET and run `initialize`

    again; the server will issue a fresh per-session POST endpoint.

    This lack of resumption is one of the reasons the 2025-03-26

    revision deprecated this transport in favour of Streamable HTTP.

    '
  subjectKind: MCPTransport
  statement: 'mcp-transport:http-sse reconnectPolicy is No formal session-resumption
    mechanism in the spec. On stream loss

    the client is expected to reopen the SSE GET and run `initialize`

    again; the server will issue a fresh per-session POST endpoint.

    This lack of resumption is one of the reasons the 2025-03-26

    revision deprecated this transport in favour of Streamable HTTP.

    .'
