nodeKind: DeploymentTarget
id: deployment-target:minikube-local
attributes:
  displayName: "Local minikube dev cluster"
  targetType: minikube
  environment: minikube
  namespace: babysitter
  minikubeProfile: babysitter-dev
  ingressHostnames:
    - babysitter.local
  ingressTls: false
  authMode: local-dev
  autoApplyTerraform: false
  autoApplyKubernetes: true
  description: |
    Single-node minikube profile used for local development of the
    babysitter cloud bundle (kanban + gateway + agent-platform).
    `authMode = local-dev` means the bootstrap admin password is read
    from a local-dev secret rather than a managed secret reference.
