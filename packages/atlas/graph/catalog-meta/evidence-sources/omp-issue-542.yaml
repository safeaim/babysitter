id: claim:omp-issue-542-adaptive-effort-mapping
attributes:
  claimId: omp-issue-542-adaptive-effort-mapping
  subjectId: agentVersion:omp:ge-15-5-9
  subjectKind: AgentVersion
  attribute: adapterMetadata.anthropicAdaptiveThinkingEffortMapping
  value:
    appliesTo: "Anthropic Messages API Opus 4.7+"
    mapping:
      minimal: low
      low: medium
      medium: high
      high: xhigh
      xhigh: max
    legacyExceptions:
      - "Opus 4.6"
      - "Bedrock Converse"
  statement: |
    OMP 15.5.11 changes Anthropic adaptive-thinking effort mapping for Opus
    4.7+ on the Messages API to use a five-tier scale, shifting user-facing
    effort up one notch so xhigh reaches max while Opus 4.6 and Bedrock
    Converse retain the legacy four-tier mapping.
  evidenceSourceIds:
