nodeKind: MetaEnum
id: meta-enum:origin
attributes:
  displayName: origin (NodeKind / EdgeKind classifier)
  name: origin
  values:
  - value: universal
    description: Applies to the agentic stack at large (incl. a5c framing of universal concepts).
  - value: standardized
    description: Names a published external spec we adopt (e.g. MCP, OAuth).
  - value: convergent
    description: Emerging consensus across multiple vendors not yet ratified into a formal standard.
