nodeKind: MetaNodeKind
id: meta-node-kind:agent-ui-impl
attributes:
  displayName: AgentUIImpl (meta)
  name: AgentUIImpl
  cluster: 3-agent-stack
  prefix: agent-ui-impl
  origin: derived
  purpose: |
    User-facing UI layer of an agent product (TUI, CLI, web shell, IDE extension).
    Owns presentations bundled with the product and the interaction primitives
    the user has access to. Distinct from AgentPlatformImpl (extensibility surfaces)
    and AgentRuntimeImpl (runtime environment). Added in catalog update to refine the
    agent stack to a 4-layer model.
  exampleCount: 0
  invariants:
  - 'id starts with agent-ui-impl:'
  - if uiKind != headless then presentationsBundled non-empty
edges:
  in_cluster:
  - target: meta-cluster:agent-stack
  contains_meta_attribute:
  - target: meta-attribute:agent-ui-impl--id
  - target: meta-attribute:agent-ui-impl--display-name
  - target: meta-attribute:agent-ui-impl--ui-kind
  - target: meta-attribute:agent-ui-impl--presentations-bundled
