  cluster: 3-agent-stack
  prefix: agent-version
  origin: universal
  purpose: a version of an AgentProduct
  exampleCount: 0
  invariants:
  - agentProductId resolves
  - eolAt >= releasedAt (when present)
  - installMethods non-empty
edges:
  in_cluster:
  - target: meta-cluster:agent-stack
  has_example:
  - target: meta-node-kind:agent-product
  contains_meta_attribute:
  - target: meta-attribute:agent-version--id
  - target: meta-attribute:agent-version--agent-product-id
  - target: meta-attribute:agent-version--version-range
