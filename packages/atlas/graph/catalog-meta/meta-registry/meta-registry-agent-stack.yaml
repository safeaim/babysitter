  name: Plugin
  cluster: 7-extensions
  prefix: plugin
  origin: universal
  purpose: universal plugin (union of skills/MCP/hooks/lsp/monitors/bin)
  exampleCount: 0
  invariants:
  - every installs_into edge declares installMethod (V-11.1)
  - portability=native or hybrid implies nativeFormat is set
edges:
  in_cluster:
  - target: meta-cluster:agent-stack
  contains_meta_attribute:
  - target: meta-attribute:plugin--id
  - target: meta-attribute:plugin--display-name
