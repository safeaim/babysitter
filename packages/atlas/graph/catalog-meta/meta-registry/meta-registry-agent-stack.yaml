---
nodeKind: MetaCluster
id: meta-cluster:agent-stack
attributes:
  displayName: Agent stack (meta)
  clusterNumber: 3
  scope: 'Conceptual aggregation of NodeKinds that together describe the agentic compute stack: AgentProduct/Version/CoreImpl/RuntimeImpl/PlatformImpl, MCP transport surfaces, tool/skill/plugin extensions, and the lifecycle primitives (RunAttempt, LiveSession, OrchestratorState, ...) that drive an agent invocation. Members may live in several editorial clusters in ontology-schema.yaml (3-agent-stack, 2-compute-path, 7-extensions, 6-lifecycle); the per-MetaNodeKind `cluster` attribute records the truthful editorial slug.'
  parentClusterId: null
edges:
  contains_meta_edge_kind:
  - target: meta-edge-kind:composed-of
  - target: meta-edge-kind:version-of
  - target: meta-edge-kind:has-version
  contains_meta_node_kind:
  - target: meta-node-kind:agent-product
  - target: meta-node-kind:agent-version
  - target: meta-node-kind:agent-core-impl
  - target: meta-node-kind:agent-runtime-impl
  - target: meta-node-kind:agent-platform-impl
  - target: meta-node-kind:agent-ui-impl
  - target: meta-node-kind:agent-host-transport
  - target: meta-node-kind:tool-descriptor
  - target: meta-node-kind:tool-server
  - target: meta-node-kind:subagent
  - target: meta-node-kind:skill
  - target: meta-node-kind:plugin
  - target: meta-node-kind:mcp-transport
  - target: meta-node-kind:mcp-resource
  - target: meta-node-kind:mcp-prompt
  - target: meta-node-kind:mcp-sampling
  - target: meta-node-kind:mcp-root
  - target: meta-node-kind:async-job
  - target: meta-node-kind:human-checkpoint
  - target: meta-node-kind:resume-token
  - target: meta-node-kind:launch-contract
  - target: meta-node-kind:run-attempt
  - target: meta-node-kind:live-session
  - target: meta-node-kind:orchestrator-state
  - target: meta-node-kind:dispatch-preflight
  - target: meta-node-kind:reconciliation
  - target: meta-node-kind:workflow-definition
---
nodeKind: MetaNodeKind
id: meta-node-kind:agent-product
attributes:
  displayName: AgentProduct (meta)
  name: AgentProduct
  cluster: 3-agent-stack
  prefix: agent
  origin: derived
  purpose: productized agent (Claude Code, Codex, ...) — the umbrella
  exampleCount: 0
  invariants:
  - 'id starts with agent:'
  - has_version count >= 1
  - composed_of must include at least one core, runtime, platform role
edges:
  in_cluster:
  - target: meta-cluster:agent-stack
  contains_meta_attribute:
  - target: meta-attribute:agent-product--id
  - target: meta-attribute:agent-product--display-name
  - target: meta-attribute:agent-product--vendor
  - target: meta-attribute:agent-product--homepage-url
---
nodeKind: MetaNodeKind
