nodeKind: MetaCluster
id: meta-cluster:capabilities-policy
attributes:
  displayName: Capabilities & Policy (meta)
  clusterNumber: 8
  scope: 'Conceptual aggregation of NodeKinds describing the capability surface: Capability (a named, discriminated capability that versioned entities can support and extensions can require) and InstallMethod (a canonical install method — npm, brew, gh-extension, curl, … — referenced by AgentVersion.installMethods, Plugin install records, and Blueprint setup). The catalog update remodel removed CapabilitySupport as a NodeKind and moved its (entity, capability, version-range, level, evidence) tuple onto edge attributes of supports. Members live in editorial cluster 8-capabilities in ontology-schema.yaml.'
  parentClusterId: null
edges:
  contains_meta_node_kind:
  - target: meta-node-kind:capability
  - target: meta-node-kind:install-method
