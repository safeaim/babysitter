---
nodeKind: MetaEnum
id: meta-enum:capability-category
attributes:
  displayName: Capability category
  name: category
  values:
  - value: model
    description: Model-side capability (e.g. tool-use, vision, reasoning).
  - value: agent
    description: Agent-program capability (e.g. autonomous-loop, plan-execute).
  - value: runtime
    description: Agent runtime capability (e.g. session-resume, parallel-tool-calls).
  - value: platform
    description: Hosting platform capability (e.g. background-jobs, persistent-storage).
  - value: tool
    description: Tool-side capability (e.g. file-edit, shell-exec).
  - value: session
    description: Session-shape capability (e.g. interactive-tty, batch).
  - value: hook
    description: Hook surface capability (e.g. pre-tool-use, stop).
  - value: extension
    description: Extension-shape capability (e.g. plugin-marketplace, custom-skill).
  - value: reasoning
    description: Reasoning-mode capability (e.g. extended-thinking, scratchpad).
  - value: provider-feature
    description: Provider-side capability surfaced by a model API (e.g. prompt-caching, batch-api).
  usedOnAttributes:
  - meta-attribute:capability--category
edges:
  used_on_attribute:
  - target: meta-attribute:capability--category
---
nodeKind: MetaEnum
id: meta-enum:install-method-kind
attributes:
  displayName: InstallMethod kind
  name: kind
  values:
  - value: npm
    description: Node package manager.
  - value: brew
    description: Homebrew on macOS / Linux.
  - value: gh-extension
    description: GitHub CLI extension.
  - value: curl
    description: curl-piped install script.
  - value: winget
    description: Windows Package Manager.
  - value: scoop
    description: Scoop package manager (Windows).
  - value: manual
    description: Hand-rolled install with documented steps.
  - value: pip
    description: Python package installer.
  - value: nix
    description: Nix package manager.
  - value: cargo
    description: Rust cargo install.
  - value: go-install
    description: Go module install.
  usedOnAttributes:
  - meta-attribute:install-method--kind
edges:
  used_on_attribute:
  - target: meta-attribute:install-method--kind
