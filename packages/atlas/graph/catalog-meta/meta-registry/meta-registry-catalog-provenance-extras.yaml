nodeKind: MetaNodeKind
id: meta-node-kind:term
attributes:
  displayName: Term (meta)
  name: Term
  cluster: 14-terminology
  prefix: term
  origin: universal
  purpose: a named term in the ontology
  exampleCount: 0
  invariants:
  - has at least one Definition (V-6.1)
  - canonicalDefinitionId resolves (V-6.2)
  - references resolve in current schema version (V-6.4)
edges:
  in_cluster:
  - target: meta-cluster:catalog-provenance
  contains_meta_attribute:
  - target: meta-attribute:term--id
  - target: meta-attribute:term--display-name
---
nodeKind: MetaNodeKind
id: meta-node-kind:definition
attributes:
  displayName: Definition (meta)
  name: Definition
  cluster: 14-terminology
  prefix: definition
  origin: universal
  purpose: a definition of a term
  exampleCount: 0
  invariants:
  - termId resolves
  - no two Definitions for same termId share inContext
edges:
  in_cluster:
  - target: meta-cluster:catalog-provenance
  contains_meta_attribute:
  - target: meta-attribute:definition--id
  - target: meta-attribute:definition--term-id
