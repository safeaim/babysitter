nodeKind: MetaCluster
id: meta-cluster:catalog-provenance
attributes:
  displayName: Catalog Provenance
  clusterNumber: 15
  scope: Current catalog provenance and meta-shape records for ontology, gaps, shared context, terms, definitions, and meta-registry entities.
---
nodeKind: MetaNodeKind
id: meta-node-kind:ontology-schema
attributes:
  displayName: OntologySchema (meta)
  name: OntologySchema
  cluster: 15-catalog-provenance
  prefix: ontology
  origin: universal
  purpose: 'The catalog ontology itself (this `ontology-schema.yaml` plus the

    `../../../schema/node-kinds/` and `../../../schema/edge-kinds.md` it mirrors) modeled as a

    first-class entity so it can be claimed about, versioned via

    `current catalog snapshot`, and pointed at by `Term term:ontology`.

    Now references MetaClusters: the meta-shape of the catalog (the

    MetaCluster / MetaNodeKind / MetaEdgeKind / MetaAttribute / MetaEnum

    registry) makes the ontology self-describing so generators and the

    wiki can enumerate the schema without re-parsing this file.'
  exampleCount: 0
  invariants:
  - Companion of current catalog snapshot; the meta-shape registry (MetaCluster + MetaNodeKind + MetaEdgeKind + MetaAttribute + MetaEnum) is referenced via `metaClusters` and the `defines_meta_cluster` edge.
edges:
  in_cluster:
  - target: meta-cluster:catalog-provenance
  contains_meta_attribute:
  - target: meta-attribute:ontology-schema--id
  - target: meta-attribute:ontology-schema--display-name
  - target: meta-attribute:ontology-schema--catalog-version-id
  - target: meta-attribute:ontology-schema--meta-clusters
---
nodeKind: MetaNodeKind
id: meta-node-kind:gap
attributes:
  displayName: Gap (meta)
  name: Gap
  cluster: 13-catalog-meta
  prefix: gap
  origin: a5c
  purpose: tracked debt-loop finding (level 1-7); first-class graph entity so gap state is queryable
  exampleCount: 0
  invariants:
  - level in 1..7
  - status = closed implies closedAt is set
  - status = closed implies every applicable propagationStatus entry is done or not-applicable
  - markdownRef points at wiki/process/gaps/GAP-<level>-<priority>-<slug>.md
edges:
  in_cluster:
  - target: meta-cluster:catalog-provenance
  contains_meta_attribute:
  - target: meta-attribute:gap--id
  - target: meta-attribute:gap--title
---
nodeKind: MetaNodeKind
id: meta-node-kind:shared-context-spec
attributes:
  displayName: SharedContextSpec (meta)
  name: SharedContextSpec
  cluster: 13-catalog-meta
  prefix: shared-context-spec
  origin: a5c
  purpose: 'Stub. The shape of an a5c shared-context fabric record, attached as a

    structured `Claim` on the reliability-interface. Recorded as a

    NodeKind so the schema mapping referenced from coverage-checklist row

    "Shared Context fabric" resolves.'
  exampleCount: 0
  invariants:
  - 'STUB: deferred to Phase 2 (extension-interfaces track).'
edges:
  in_cluster:
  - target: meta-cluster:catalog-provenance
  contains_meta_attribute:
  - target: meta-attribute:shared-context-spec--id
  - target: meta-attribute:shared-context-spec--context-kind
---
nodeKind: MetaNodeKind
id: meta-node-kind:meta-node-kind
attributes:
  displayName: MetaNodeKind (meta)
  name: MetaNodeKind
  cluster: 15-catalog-provenance
  prefix: meta-node-kind
  origin: universal
  purpose: 'A first-class record describing one NodeKind in the catalog ontology.

    Lets the catalog enumerate, query, and version its own meta-shape

    without re-parsing `schema/ontology-schema.yaml`. Mirrors the

    NodeKind declaration fields from `../../../schema/meta-schema.md`.'
  exampleCount: 1
  invariants:
  - 'id starts with meta-node-kind:'
  - name MUST match a NodeKind defined in this ontology snapshot.
edges:
  in_cluster:
  - target: meta-cluster:catalog-provenance
  contains_meta_attribute:
  - target: meta-attribute:meta-node-kind--id
  - target: meta-attribute:meta-node-kind--display-name
  - target: meta-attribute:meta-node-kind--name
  - target: meta-attribute:meta-node-kind--cluster
  - target: meta-attribute:meta-node-kind--prefix
  - target: meta-attribute:meta-node-kind--origin
---
