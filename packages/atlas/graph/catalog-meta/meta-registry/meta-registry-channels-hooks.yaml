  name: MergePolicy
  cluster: 5-communication
  prefix: merge-policy
  origin: a5c
  purpose: named conflict-resolution policy applied by hooks-mux when fanning a single hook event across multiple registered handlers
  exampleCount: 0
  invariants:
  - 'id starts with merge-policy:'
  - envMergeRule = protected-prefixes implies protectedPrefixes is non-empty
  - envMergeRule = namespace-required implies namespaceRequired = true
edges:
  in_cluster:
  - target: meta-cluster:channels-hooks
  contains_meta_attribute:
  - target: meta-attribute:merge-policy--id
  - target: meta-attribute:merge-policy--decision-rule
  - target: meta-attribute:merge-policy--env-merge-rule
  - target: meta-attribute:merge-policy--system-message-strategy
