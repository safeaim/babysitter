  displayName: Channel (meta)
  name: Channel
  cluster: 5-communication
  prefix: channel
  origin: universal
  purpose: brokered communication surface (mcp-channel, a2a-channel, chat-channel, mailbox-channel, http-sse-channel, plus notification kinds — webhook / email / sms / push / slack / desktop-notification / system-tray)
  exampleCount: 0
  invariants:
  - kind value within enum (V-7.1)
edges:
  in_cluster:
  - target: meta-cluster:channels-hooks
  contains_meta_attribute:
  - target: meta-attribute:channel--id
  - target: meta-attribute:channel--kind
  - target: meta-attribute:channel--persistent
  - target: meta-attribute:channel--endpoint
