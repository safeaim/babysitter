---
nodeKind: MetaEnum
id: meta-enum:channel-kind
attributes:
  displayName: Channel kind
  name: kind
  values:
  - value: mcp-channel
    description: Channel carrying MCP traffic.
  - value: a2a-channel
    description: Agent-to-agent channel.
  - value: chat-channel
    description: Chat-style channel (user-facing conversation).
  - value: mailbox-channel
    description: Asynchronous mailbox / inbox channel.
  - value: http-sse-channel
    description: HTTP Server-Sent-Events channel.
  - value: webhook
    description: Outbound webhook delivery.
  - value: email
    description: Email notification channel.
  - value: sms
    description: SMS notification channel.
  - value: push
    description: Mobile push notification channel.
  - value: slack
    description: Slack notification channel.
  - value: desktop-notification
    description: Native desktop notification channel.
  - value: system-tray
    description: System-tray / menu-bar notification channel.
  usedOnAttributes:
  - meta-attribute:channel--kind
edges:
  used_on_attribute:
  - target: meta-attribute:channel--kind
---
nodeKind: MetaEnum
id: meta-enum:hook-family
attributes:
  displayName: Hook family
  name: family
  values:
  - value: shell-hook
    description: Shell-invoked hook (handler runs in a subprocess).
  - value: in-process
    description: In-process hook (handler runs in the agent's process).
  - value: observer
    description: Observer-only hook (read-only, non-blocking).
  usedOnAttributes:
  - meta-attribute:hook-surface--family
  - meta-attribute:hook-mapping--delivery
edges:
  used_on_attribute:
  - target: meta-attribute:hook-surface--family
---
nodeKind: MetaEnum
id: meta-enum:decision-verb-value
attributes:
  displayName: Decision verb value
  name: verb
  values:
  - value: deny
    description: Block the action; lowest rank (most restrictive).
  - value: ask
    description: Prompt the user for explicit approval.
  - value: allow
    description: Permit the action.
  - value: continue
    description: Continue without modifying the decision.
  - value: noop
    description: No-op; highest rank (least restrictive).
  usedOnAttributes:
  - meta-attribute:decision-verb--verb
edges:
  used_on_attribute:
  - target: meta-attribute:decision-verb--verb
