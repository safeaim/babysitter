  - value: weaviate
    description: Weaviate vector DB.
  - value: qdrant
    description: Qdrant vector DB.
  - value: pgvector
    description: pgvector extension for PostgreSQL.
  - value: faiss
    description: In-process FAISS index.
  - value: chroma
    description: Chroma vector DB.
  - value: milvus
    description: Milvus vector DB.
  - value: redis
    description: Redis with vector search.
  - value: other
