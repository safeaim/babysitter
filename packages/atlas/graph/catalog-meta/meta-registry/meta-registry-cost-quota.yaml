---
nodeKind: MetaEnum
id: meta-enum:cost-kind
attributes:
  displayName: CostModel kind
  name: costKind
  values:
  - value: per-token
    description: Pricing per input/output token (typical LLM cost model).
  - value: per-call
    description: Flat fee per API call.
  - value: per-second
    description: Time-based pricing (compute-second / GPU-second).
  - value: tiered
    description: Tiered pricing (volume thresholds change rate).
  - value: hybrid
    description: Combination (e.g. per-token plus per-call surcharge).
  usedOnAttributes:
  - meta-attribute:cost-model--cost-kind
edges:
  used_on_attribute:
  - target: meta-attribute:cost-model--cost-kind
---
nodeKind: MetaEnum
id: meta-enum:quota-kind
attributes:
  displayName: Quota kind
  name: quotaKind
  values:
  - value: rpm
    description: Requests per minute.
  - value: tpm
    description: Tokens per minute.
  - value: rpd
    description: Requests per day.
  - value: tpd
    description: Tokens per day.
  - value: concurrent
    description: Concurrent in-flight requests.
  - value: storage
    description: Storage capacity (bytes).
  - value: bandwidth
    description: Network bandwidth (bytes/sec).
  usedOnAttributes:
  - meta-attribute:quota--quota-kind
edges:
  used_on_attribute:
  - target: meta-attribute:quota--quota-kind
---
nodeKind: MetaEnum
id: meta-enum:quota-scope
attributes:
  displayName: Quota scope
  name: scope
  values:
  - value: global
    description: Provider-wide quota.
  - value: tenant
    description: Per-tenant quota.
  - value: role
    description: Per-role quota.
  - value: api-key
    description: Per-API-key quota.
  - value: model
    description: Per-model quota.
  usedOnAttributes:
  - meta-attribute:quota--scope
edges:
  used_on_attribute:
  - target: meta-attribute:quota--scope
