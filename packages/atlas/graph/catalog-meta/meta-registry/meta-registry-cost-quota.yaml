---
nodeKind: MetaCluster
id: meta-cluster:cost-quota
attributes:
  displayName: Cost & quota (meta)
  clusterNumber: 16
  scope: 'Conceptual aggregation of NodeKinds describing the cost / quota / usage / budget control plane: CostModel (per-token / per-call / tiered pricing), Quota (RPM/TPM/concurrent constraints), UsageRecord (per-call billing events), and BudgetPolicy (period budget envelopes). Members live in editorial cluster cost-quota in ontology-schema.yaml.'
  parentClusterId: null
edges:
  contains_meta_node_kind:
  - target: meta-node-kind:cost-model
  - target: meta-node-kind:quota
  - target: meta-node-kind:usage-record
  - target: meta-node-kind:budget-policy
---
nodeKind: MetaNodeKind
id: meta-node-kind:cost-model
attributes:
  displayName: CostModel (meta)
  name: CostModel
  cluster: cost-quota
  prefix: cost-model
  origin: standard
  purpose: a structured cost specification (per-token / per-call / tiered) for a Provider or ModelVersion
  exampleCount: 0
  invariants:
  - 'id starts with cost-model:'
edges:
  in_cluster:
  - target: meta-cluster:cost-quota
  contains_meta_attribute:
  - target: meta-attribute:cost-model--id
  - target: meta-attribute:cost-model--display-name
  - target: meta-attribute:cost-model--cost-kind
  - target: meta-attribute:cost-model--currency
---
nodeKind: MetaNodeKind
id: meta-node-kind:quota
attributes:
  displayName: Quota (meta)
  name: Quota
  cluster: cost-quota
  prefix: quota
  origin: standard
  purpose: a quota constraint (RPM/TPM/requests/concurrent) bound to a tenant, role, or capability scope
  exampleCount: 0
  invariants:
  - 'id starts with quota:'
edges:
  in_cluster:
  - target: meta-cluster:cost-quota
  contains_meta_attribute:
  - target: meta-attribute:quota--id
  - target: meta-attribute:quota--quota-kind
  - target: meta-attribute:quota--scope
  - target: meta-attribute:quota--window
---
nodeKind: MetaNodeKind
id: meta-node-kind:usage-record
attributes:
  displayName: UsageRecord (meta)
  name: UsageRecord
  cluster: cost-quota
  prefix: usage-record
  origin: standard
  purpose: a recorded unit of resource consumption against a Quota / CostModel (per-call billing event)
  exampleCount: 0
  invariants:
  - 'id starts with usage-record:'
edges:
  in_cluster:
  - target: meta-cluster:cost-quota
  contains_meta_attribute:
  - target: meta-attribute:usage-record--id
  - target: meta-attribute:usage-record--occurred-at
  - target: meta-attribute:usage-record--input-tokens
  - target: meta-attribute:usage-record--total-cost
---
nodeKind: MetaNodeKind
id: meta-node-kind:budget-policy
attributes:
  displayName: BudgetPolicy (meta)
  name: BudgetPolicy
  cluster: cost-quota
  prefix: budget-policy
  origin: standard
  purpose: a budget envelope and enforcement policy for a tenant or org-unit
  exampleCount: 0
  invariants:
  - 'id starts with budget-policy:'
edges:
  in_cluster:
  - target: meta-cluster:cost-quota
  contains_meta_attribute:
  - target: meta-attribute:budget-policy--id
  - target: meta-attribute:budget-policy--display-name
  - target: meta-attribute:budget-policy--total-budget
  - target: meta-attribute:budget-policy--period
