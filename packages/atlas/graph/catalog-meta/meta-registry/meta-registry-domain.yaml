---
nodeKind: MetaCluster
id: meta-cluster:domain
attributes:
  displayName: Domain (meta)
  clusterNumber: 9
  scope: 'Conceptual aggregation of NodeKinds describing the domain ontology and adjacent failure / tracker taxonomies. Members live primarily in editorial cluster 9-domain (Domain, Specialization, Topic, Language, Framework, Library, Tool, StackPart, Platform, PlatformService) with later additions for failure-recovery (ErrorCategory, FailureClass, RecoveryStrategy, PartialStateRecovery in 6-lifecycle) and the issue-tracker triple (IssueTracker, IssueTrackerProtocol, Issue in 7-extensions). Each MetaNodeKind records the truthful editorial slug.'
  parentClusterId: null
edges:
  contains_meta_node_kind:
  - target: meta-node-kind:domain
  - target: meta-node-kind:specialization
  - target: meta-node-kind:topic
  - target: meta-node-kind:language
  - target: meta-node-kind:framework
  - target: meta-node-kind:library
  - target: meta-node-kind:tool
  - target: meta-node-kind:stack-part
  - target: meta-node-kind:platform
  - target: meta-node-kind:platform-service
  - target: meta-node-kind:issue-tracker
  - target: meta-node-kind:issue-tracker-protocol
  - target: meta-node-kind:issue
  - target: meta-node-kind:error-category
  - target: meta-node-kind:failure-class
  - target: meta-node-kind:recovery-strategy
  - target: meta-node-kind:partial-state-recovery
---
nodeKind: MetaNodeKind
id: meta-node-kind:domain
attributes:
  displayName: Domain (meta)
  name: Domain
  cluster: 9-domain
  prefix: domain
  origin: universal
  purpose: broad area (web-development, devops, ...)
  exampleCount: 0
  invariants:
  - contains hierarchy is acyclic (V-4.1)
edges:
  in_cluster:
  - target: meta-cluster:domain
  contains_meta_attribute:
  - target: meta-attribute:domain--id
  - target: meta-attribute:domain--display-name
