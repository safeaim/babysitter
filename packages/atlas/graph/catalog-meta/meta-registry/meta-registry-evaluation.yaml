---
nodeKind: MetaEnum
id: meta-enum:eval-kind
attributes:
  displayName: EvalRun kind
  name: evalKind
  values:
  - value: capability
    description: Pure capability evaluation (does the model do X correctly).
  - value: safety
    description: Safety evaluation (refusals, harmful-content, jailbreak resistance).
  - value: robustness
    description: Robustness eval (perturbed inputs, distribution shift).
  - value: alignment
    description: Alignment eval (instruction-following, honesty, helpfulness).
  - value: regression
    description: Regression eval (catch performance regressions across versions).
  usedOnAttributes:
  - meta-attribute:eval-run--eval-kind
edges:
  used_on_attribute:
  - target: meta-attribute:eval-run--eval-kind
---
nodeKind: MetaEnum
id: meta-enum:harness-kind
attributes:
  displayName: EvalHarness kind
  name: harnessKind
  values:
  - value: lm-eval-harness
    description: EleutherAI lm-evaluation-harness.
  - value: helm
    description: Stanford HELM.
  - value: inspect-ai
    description: Anthropic / UK-AISI Inspect AI.
  - value: openai-evals
    description: OpenAI evals.
  - value: bigcode-bench
    description: BigCode benchmark harness.
  - value: custom
    description: Custom / in-house harness.
  usedOnAttributes:
  - meta-attribute:eval-harness--harness-kind
edges:
  used_on_attribute:
  - target: meta-attribute:eval-harness--harness-kind
