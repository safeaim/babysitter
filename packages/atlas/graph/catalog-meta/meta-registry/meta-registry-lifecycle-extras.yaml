nodeKind: MetaEnum
id: meta-enum:run-status
attributes:
  displayName: Run lifecycle status
  name: status
  values:
  - value: running
    description: Run is currently executing.
  - value: completed
    description: Run reached a successful terminal state.
  - value: failed
    description: Run reached a failed terminal state.
  - value: aborted
    description: Run was deliberately aborted before completion.
  usedOnAttributes:
  - meta-attribute:run--status
  - meta-attribute:invocation--status
edges:
  used_on_attribute:
  - target: meta-attribute:run--status
  - target: meta-attribute:invocation--status
---
nodeKind: MetaEnum
id: meta-enum:run-journal-event-category
attributes:
  displayName: RunJournalEvent category
  name: category
  values:
  - value: run-lifecycle
    description: Run-level lifecycle events (created, completed, failed, aborted).
  - value: effect-lifecycle
    description: Effect lifecycle events (requested, resolved, failed).
  - value: iteration
    description: Iteration markers (turn boundaries, phase transitions emitted as iterations).
  - value: hook
    description: Hook invocation / merge / decision events.
  - value: cost
    description: Token / cost accounting events.
  - value: custom
    description: Custom event names emitted by user processes.
  usedOnAttributes:
  - meta-attribute:run-journal-event--category
edges:
  used_on_attribute:
  - target: meta-attribute:run-journal-event--category
---
nodeKind: MetaEnum
id: meta-enum:workspace-materialization
attributes:
  displayName: Workspace materialization
  name: materialization
  values:
  - value: worktree
    description: git-worktree (default for git repos).
  - value: symlink
    description: Path alias / symlink onto another workspace.
  - value: clone
    description: Independent full git clone.
  - value: copy
    description: Non-git filesystem snapshot.
  - value: virtual
    description: Overlay / FUSE / in-memory projection.
  usedOnAttributes:
  - meta-attribute:workspace--materialization
edges:
  used_on_attribute:
  - target: meta-attribute:workspace--materialization
