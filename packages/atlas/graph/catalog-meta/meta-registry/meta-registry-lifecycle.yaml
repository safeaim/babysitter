nodeKind: MetaCluster
id: meta-cluster:lifecycle
attributes:
  displayName: Lifecycle
  clusterNumber: 6
  scope: Current lifecycle records for runs, sessions, invocations, states, phases, and runtime journal taxonomy.
---
nodeKind: MetaNodeKind
id: meta-node-kind:run
attributes:
  displayName: Run (meta)
  name: Run
  cluster: 6-lifecycle
  prefix: run
  origin: universal
  purpose: bounded orchestration unit (event-sourced; journaled)
  exampleCount: 0
  invariants: []
edges:
  in_cluster:
  - target: meta-cluster:lifecycle
  contains_meta_attribute:
  - target: meta-attribute:run--id
  - target: meta-attribute:run--display-name
  - target: meta-attribute:run--status
  - target: meta-attribute:run--started-at
---
nodeKind: MetaNodeKind
id: meta-node-kind:run-journal-event
attributes:
  displayName: RunJournalEvent (meta)
  name: RunJournalEvent
  cluster: 13-catalog-meta
  prefix: run-journal-event
  origin: a5c
  purpose: enum of run journal event names emitted by the babysitter runtime and persisted to the per-run journal directory
  exampleCount: 0
  invariants:
  - 'id starts with run-journal-event:'
  - category MUST match observed emission site
edges:
  in_cluster:
  - target: meta-cluster:lifecycle
  contains_meta_attribute:
  - target: meta-attribute:run-journal-event--id
  - target: meta-attribute:run-journal-event--event-name
  - target: meta-attribute:run-journal-event--category
  - target: meta-attribute:run-journal-event--terminal
