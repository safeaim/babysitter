nodeKind: MetaNodeKind
id: meta-node-kind:phase-machine
attributes:
  displayName: PhaseMachine (meta)
  name: PhaseMachine
  cluster: 6-lifecycle
  prefix: phase-machine
  origin: a5c
  purpose: a finite-state machine over Phase nodes declared by a reliability-interface impl
  exampleCount: 1
  invariants:
  - phases list MUST contain >= 2 entries
  - terminalPhases MUST contain >= 1 entry and every entry MUST appear in phases
  - initialPhase MUST appear in phases
edges:
  in_cluster:
  - target: meta-cluster:lifecycle
  contains_meta_attribute:
  - target: meta-attribute:phase-machine--id
  - target: meta-attribute:phase-machine--display-name
  - target: meta-attribute:phase-machine--initial-phase
  - target: meta-attribute:phase-machine--arbitration-policy
