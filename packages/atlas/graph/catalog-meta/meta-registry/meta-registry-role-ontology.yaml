---
nodeKind: MetaCluster
id: meta-cluster:roles
attributes:
  displayName: Roles & responsibilities (meta)
  clusterNumber: 10
  scope: Cluster 10 — role ontology. Defines who does what in agentic systems (humans, agents, org-units, tenants, customers, vendors) and the holds_responsibility / belongs_to / accountable_to relationships between them.
  parentClusterId: null
edges:
  contains_meta_node_kind:
  - target: meta-node-kind:role
  - target: meta-node-kind:responsibility
  - target: meta-node-kind:org-unit
  - target: meta-node-kind:tenant
  - target: meta-node-kind:customer
  - target: meta-node-kind:end-user
  - target: meta-node-kind:vendor-relationship
---
nodeKind: MetaNodeKind
id: meta-node-kind:role
attributes:
  displayName: Role (meta)
  name: Role
  cluster: 10-roles
  prefix: role
  origin: universal
  purpose: human or agentic role
  exampleCount: 0
  invariants:
  - isAgentic required (V-5.1)
  - delegates_to acyclic (V-5.2)
  - at least one holds_responsibility (V-5.3)
edges:
  in_cluster:
  - target: meta-cluster:roles
  contains_meta_attribute:
  - target: meta-attribute:role--id
  - target: meta-attribute:role--display-name
  - target: meta-attribute:role--seniority
