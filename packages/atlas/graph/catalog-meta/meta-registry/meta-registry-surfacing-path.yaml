---
nodeKind: MetaEnum
id: meta-enum:execution-kind
attributes:
  displayName: Execution kind
  name: kind
  values:
  - value: local
    description: Runs as a local process on the host.
  - value: docker
    description: Runs in a docker / OCI container on the host.
  - value: ssh
    description: Runs over an SSH connection on a remote host.
  - value: kubernetes
    description: Runs as a pod in a Kubernetes cluster.
  - value: cloud
    description: Runs in a managed cloud execution service.
  - value: direct
    description: Direct in-process invocation, no separate execution boundary.
  usedOnAttributes:
  - meta-attribute:execution--kind
edges:
  used_on_attribute:
  - target: meta-attribute:execution--kind
---
nodeKind: MetaEnum
id: meta-enum:presentation-kind
attributes:
  displayName: Presentation kind
  name: kind
  values:
  - value: tui
    description: Text-mode terminal UI.
  - value: ide-extension
    description: Extension hosted by an IDE (VS Code, JetBrains, ...).
  - value: web
    description: Browser-rendered web UI.
  - value: mobile
    description: Native mobile app (iOS / Android).
  - value: ci
    description: Continuous-integration runner (no interactive shell).
  - value: desktop
    description: Native desktop app shell (Electron, Cocoa, win32, ...).
  usedOnAttributes:
