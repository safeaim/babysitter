nodeKind: PackageSurface
id: package:a5c-ai-agent-platform
attributes:
  packageId: "@a5c-ai/agent-platform"
  packageName: "@a5c-ai/agent-platform"
  workspacePath: packages/agent-platform
  moduleType: typescript
  surfaceKinds:
    - agent-runtime
    - bin-entrypoint
    - cli
  sourceOfTruthRole: application
  publishedTo: npm
  versionPolicy: semver
  # Source: packages/agent-platform/package.json (subpath exports for
  # ./anycli, ./api, ./cli, ./cost, ./daemon, ./governance, ./harness,
  # ./interaction, ./observability, ./runtime). Bin: babysitter-harness.
edges:
  references_path:
    - target: path:a5c-runs-dir
# `babysitter-harness` runtime command set
  # (HARNESS_RUNTIME_COMMANDS in sdk program.ts) is shared between the
  # sdk and agent packages; the harness bin lives in agent-platform.
  exposes_subcommand:
    - target: interaction-primitive:babysitter-sdk-cli-harness-runtime
