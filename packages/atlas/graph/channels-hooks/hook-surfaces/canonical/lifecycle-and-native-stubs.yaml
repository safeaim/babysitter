nodeKind: HookSurface
id: hook-surface:opencode.session-idle
attributes:
  eventName: "OpenCode session-idle (native)"
  displayName: "OpenCode session-idle (native)"
  kind: native
  originVendor: SST
  direction: event
  blocking: false
  family: shell-hook
  payloadSchema:
    type: object
    required: [session_id]
    properties:
      session_id: { type: string }
      idle_seconds: { type: number, description: "Seconds since last activity." }
  description: "OpenCode's session-idle hook."
edges:
