nodeKind: HookSurface
id: hook-surface:opencode.shell-env
attributes:
  eventName: "OpenCode shell-env (native)"
  displayName: "OpenCode shell-env (native)"
  kind: native
  originVendor: SST
  direction: event
  blocking: false
  family: shell-hook
  payloadSchema:
    type: object
    properties:
      session_id: { type: string }
      env: { type: object, description: "Map of env vars exposed to shell tools." }
  description: "OpenCode's shell-env hook."
edges:
