nodeKind: HookSurface
id: hook-surface:claude.pre-tool-use
attributes:
  eventName: "PreToolUse (Claude)"
  displayName: "PreToolUse (Claude)"
  kind: native
  originVendor: Anthropic
  direction: pre
  blocking: true
  family: shell-hook
  payloadSchema:
    type: object
    required: [tool_name, tool_input, session_id, transcript_path]
    properties:
      tool_name: { type: string }
      tool_input: { type: object }
      session_id: { type: string }
      transcript_path: { type: string }
  description: |
    Claude Code's pre-tool-use hook. Fired before every tool
    invocation. A non-zero exit code from the configured handler
    aborts the tool call.
edges:
  canonicalized_to:
    - target: hook-surface:pre-tool-use
  emits_hook:
    - target: agentVersion:claude:ge-0-0-0
      attrs: { since: "1.0.0" }
