nodeKind: ModelTransportProtocol
id: model-transport:cohere-embed
attributes:
  displayName: "Cohere Embed API"
  vendor: "Cohere"
  specUrl: "https://docs.cohere.com/reference/embed"
  thinkingChannel: none
  cacheControl: none
  firstSpecVersion: "2024-09"
  currentSpecVersion: "v2"
  status: standard
  requestBodyShape: |
    POST /v2/embed
    Headers:
      - `Authorization: Bearer <api-key>`
      - `Content-Type: application/json`
    Body includes `model`, input texts/images or mixed inputs depending
    on model support, input type, and optional embedding output controls.
  responseBodyShape: |
    Embedding responses return embeddings in the requested representation
    along with response metadata.
  streamingEventTypes: []
  streamEventKinds: []
  toolCallWireFormat: |
    Not applicable. Embedding requests do not emit tool calls.
  toolResultWireFormat: |
    Not applicable. Embedding requests do not consume tool results.
  errorEnvelope: |
    Cohere API errors return JSON with an error message and HTTP status.
    Rate limits use HTTP 429.
  authHeaderFormat: |
    `Authorization: Bearer <api-key>`
  versioningHeader: |
    API version is path-versioned through `/v2/embed`.
edges:
  realizes:
    - target: layer:3-transport
  served_by:
    - provider:cohere
  spoken_by:
    - model:cohere-embed-v4-0@current
    - model:cohere-embed-english-v3@current
