nodeKind: Provider
id: provider:alibaba-cloud
attributes:
  versionRange: ">=2025-07-23"
  displayName: "Alibaba Cloud Model Studio"
  vendor: "Alibaba Cloud"
  authMethods:
    - api-key
  authMethodNotes: |
    Alibaba Cloud Model Studio/DashScope uses API keys. OpenAI-compatible
    examples read `DASHSCOPE_API_KEY` and send `Authorization: Bearer <key>`
    to the compatible Chat Completions endpoint; DashScope SDK examples pass
    the same key to Generation calls.
  endpoints:
    openai_compatible_base: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    openai_compatible_chat_completions: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions"
    dashscope_generation: "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation"
  pricing: |
    See Alibaba Cloud Model Studio model list and pricing pages for
    region-specific Qwen-Coder pricing.
  pricingTiers:
    - name: pay-as-you-go
      rateLimit: "Model Studio account and model rate limits; see Alibaba Cloud Model Studio rate-limit docs"
      priceMultiplier: 1.0
      description: "Default Model Studio token billing."
  rateLimitSignalingProtocol: |
    OpenAI-compatible requests use standard HTTP error responses; DashScope
    SDK calls surface DashScope request identifiers and service errors.
  dataResidencyOptions:
    - global
  vendorFeatures:
    - capability:supports-tool-use
  slaTier: "alibaba-cloud-model-studio-public"
  regions:
    - global
edges:
  realizes:
    - target: layer:2-provider
  serves:
    - model:qwen3-coder-next@current
  supports:
    - target: capability:supports-tool-use
      versionRange: '>=2025-07-23'
