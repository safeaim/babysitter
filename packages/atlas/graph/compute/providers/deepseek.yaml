nodeKind: Provider
id: provider:deepseek
attributes:
  displayName: "DeepSeek"
  vendor: "DeepSeek"
  versionRange: ">=2024-01-01"
  authMethods:
    - api-key
  authMethodNotes: |
    OpenAI-compatible requests use `Authorization: Bearer <api-key>`.
    Anthropic-format requests use the Anthropic SDK/API-key header shape
    against the DeepSeek Anthropic-compatible base URL.
  endpoints:
    base: "https://api.deepseek.com"
    chat_completions: "https://api.deepseek.com/chat/completions"
    anthropic_base: "https://api.deepseek.com/anthropic"
  pricing: |
    See https://platform.deepseek.com/api-docs/pricing for current per-model rates.
  rateLimitSignalingProtocol: |
    HTTP 429 with `Retry-After`. OpenAI-shaped error envelope.
  dataResidencyOptions:
    - cn
  vendorFeatures:
    - capability:supports-prompt-caching
    - capability:supports-json-mode
    - capability:supports-tool-use
  slaTier: "deepseek-standard"
  regions:
    - global
    - cn
edges:
  realizes:
    - target: layer:2-provider
  supports:
    - target: capability:supports-prompt-caching
      versionRange: '>=2026-04-24'
      level: full
    - target: capability:supports-json-mode
      versionRange: '>=2026-04-24'
      level: full
    - target: capability:supports-tool-use
      versionRange: '>=2026-04-24'
      level: full
  serves:
    - model:deepseek-v3@current
    - model:deepseek-v4-pro@current
    - model:deepseek-v4-flash@current
    - model:deepseek-r1@current
    - model:deepseek-r1-distill-qwen-32b@current
