nodeKind: Provider
id: provider:fireworks-ai
attributes:
  versionRange: ">=2024-01-01"
  displayName: "Fireworks AI"
  vendor: "Fireworks AI"
  authMethods:
    - api-key
  authMethodNotes: |
    Standard `Authorization: Bearer <api-key>`. OpenAI-compatible surface.
    Account-scoped keys; per-deployment keys also supported.
  endpoints:
    base: "https://api.fireworks.ai/inference/v1"
    chat_completions: "https://api.fireworks.ai/inference/v1/chat/completions"
    completions: "https://api.fireworks.ai/inference/v1/completions"
    models: "https://api.fireworks.ai/inference/v1/models"
  pricing: |
    See https://fireworks.ai/pricing — pricing varies per open-weights
    model and tier.
  pricingTiers:
    - name: serverless
      rateLimit: "Per-account RPM caps; fair-use throttling"
      priceMultiplier: 1.0
      description: "Pay-per-token serverless inference (default)."
    - name: on-demand-deployment
      rateLimit: "GPU-hour billed; throughput limited only by deployed GPU count"
      priceMultiplier: 1.0
      description: "Dedicated on-demand GPU deployments — billed per GPU-hour."
    - name: enterprise-reserved
      rateLimit: "By contract"
      priceMultiplier: 1.0
      description: "Reserved enterprise capacity."
  rateLimitSignalingProtocol: |
    OpenAI-compatible. 429 with `retry-after`; standard `x-ratelimit-*`
    headers when present. Errors envelope mirrors OpenAI.
  dataResidencyOptions:
    - us
  vendorFeatures:
    - capability:supports-tool-use
    - capability:streaming
    - capability:supports-batch-api
  slaTier: "fireworks-no-public-sla"
  regions:
    - global
edges:
  realizes:
    - target: layer:2-provider
  serves:
    - model:deepseek-v4-pro@current
    - model:deepseek-v4-flash@current
    - model:qwen3-coder-480b-a35b-instruct@current
    - model:llama-4-maverick@current
    - model:llama-4-scout@current
  has_version:
    - providerVersion:fireworks-ai:serverless-2026-05
