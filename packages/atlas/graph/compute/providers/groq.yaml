nodeKind: Provider
id: provider:groq
attributes:
  versionRange: ">=2024-01-01"
  displayName: "Groq"
  vendor: "Groq Inc."
  authMethods:
    - api-key
  authMethodNotes: |
    Standard `Authorization: Bearer <api-key>`. OpenAI-compatible surface.
  endpoints:
    base: "https://api.groq.com/openai/v1"
    chat_completions: "https://api.groq.com/openai/v1/chat/completions"
    models: "https://api.groq.com/openai/v1/models"
  pricing: |
    See https://groq.com/pricing — pricing varies per open-weights model.
  pricingTiers:
    - name: free
      rateLimit: "Low daily token + RPM caps per model"
      priceMultiplier: 0.0
      description: "Free developer tier."
    - name: dev
      rateLimit: "Higher per-key RPM/TPM"
      priceMultiplier: 1.0
      description: "Standard paid tier."
    - name: enterprise
      rateLimit: "By contract (dedicated capacity)"
      priceMultiplier: 1.0
      description: "Enterprise plan with dedicated LPU capacity."
  rateLimitSignalingProtocol: |
    OpenAI-compatible. 429 responses include `retry-after` and the same
    `x-ratelimit-*` header set as OpenAI. Errors envelope mirrors OpenAI's.
  dataResidencyOptions:
    - us
  vendorFeatures:
    - capability:streaming
    - capability:supports-tool-use
  slaTier: "groq-no-public-sla"
  regions:
    - global
edges:
  realizes:
    - target: layer:2-provider
  serves:
    - model:llama-4-maverick@current
    - model:llama-4-scout@current
  has_version:
    - providerVersion:groq:openai-compatible-2026-05
