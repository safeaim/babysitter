nodeKind: Provider
id: provider:meta-direct
attributes:
  versionRange: ">=2024-09-01"
  displayName: "Meta (Llama API)"
  vendor: "Meta"
  authMethods:
    - api-key
  authMethodNotes: |
    Meta's first-party Llama API surface. Standard
    `Authorization: Bearer <api-key>`; OpenAI-compatible chat surface.
  endpoints:
    base: "https://api.llama.com/v1"
  pricing: |
    See Meta's Llama API pricing page — pay-per-token across Llama models.
  pricingTiers:
    - name: serverless
      rateLimit: "Per-account RPM caps"
      priceMultiplier: 1.0
      description: "Pay-per-token serverless inference, served by Meta."
  rateLimitSignalingProtocol: |
    OpenAI-compatible. 429 with `retry-after`.
  dataResidencyOptions:
    - us
  vendorFeatures:
    - capability:streaming
  slaTier: "meta-no-public-sla"
  regions:
    - global
edges:
  realizes:
    - target: layer:2-provider
  serves:
    - model:llama-3-1-405b-instruct@current
    - model:llama-3-1-70b-instruct@current
    - model:llama-3-3-70b-instruct@current
    - model:llama-4-maverick@current
    - model:llama-4-scout@current
