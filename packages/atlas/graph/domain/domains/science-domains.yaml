nodeKind: Domain
id: domain:scientific-discovery
attributes:
  displayName: "Scientific Discovery"
  description: |
    Cross-disciplinary research methodology focused on the scientific method,
    hypothesis generation, experimental design, and reproducibility. Covers
    systematic innovation frameworks (TRIZ, design of experiments), literature
    synthesis, open science practices, and AI-assisted discovery workflows.
    Acts as a meta-domain enabling rigor and creativity across all scientific
    and engineering fields.
edges:
  contains:
    - specialization:scientific-research-methods
