nodeKind: Domain
id: domain:mathematics
attributes:
  displayName: "Mathematics"
  description: |
    Pure and applied mathematics spanning algebra, analysis, topology, number
    theory, combinatorics, probability, statistics, and numerical methods.
    Includes optimization, operations research, and mathematical logic. Provides
    the foundational language for physics, computer science, economics, and
    machine learning — and is increasingly relevant to formal verification and
    AI reasoning research.
edges:
  contains:
    - specialization:computational-mathematics
    - specialization:statistical-methods
