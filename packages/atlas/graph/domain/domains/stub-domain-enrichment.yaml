# Enrichment edges for stub domains (F17).
# Adds 3-5 edges each to the top 10 most important stub domains.
# The indexer merges edges from duplicate node IDs, so we re-declare
# each domain here solely to attach new edges. Record attributes are
# ignored (the original definition wins).

# ── domain:gaming-industry ───────────────────────────────────────────
---
nodeKind: Domain
id: domain:gaming-industry
edges:
  employs_role:
    - role:game-developer
    - role:game-designer
  uses_workflow:
    - workflow:game-prototype-iteration
    - workflow:game-asset-pipeline
    - workflow:game-build-pipeline

