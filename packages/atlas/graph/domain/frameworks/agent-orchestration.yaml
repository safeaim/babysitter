nodeKind: Framework
id: framework:autogen
attributes:
  displayName: "AutoGen"
  belongsToLanguageId: language:python
  category: agent-orchestration
  description: |
    Microsoft's multi-agent conversation framework that enables multiple
    AI agents to communicate with each other and with humans to solve
    tasks. Agents can be configured with different LLMs, tools, and human
    input modes. Supports group chat, nested conversations, and teachable
    agents. AutoGen Studio provides a visual interface for building and
    debugging multi-agent workflows.
edges:
  belongs_to_language:
    - language:python
  used_by_skill_area:
    - target: skill-area:ai-agent-development
    - target: skill-area:multi-agent-coordination
