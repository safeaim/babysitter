nodeKind: Framework
id: framework:vercel-ai-sdk
attributes:
  displayName: "Vercel AI SDK"
  homepageUrl: "https://sdk.vercel.ai"
  belongsToLanguageId: language:typescript
  category: agent-orchestration
  description: |
    Vercel's TypeScript SDK for building AI-powered web applications with
    streaming UI, tool calling, structured outputs, and multi-step agent
    workflows. Provides React hooks (useChat, useCompletion) and server
    actions for seamless frontend-backend AI integration. Supports
    multiple providers via a unified API (OpenAI, Anthropic, Google,
    Mistral, Cohere, and community providers). Features include:
    generateText/streamText for server-side LLM calls, generateObject
    for structured outputs with Zod schemas, multi-step tool use with
    maxSteps, middleware for guardrails and logging, and an experimental
    agent framework (experimental_createMCPClient) for MCP tool server
    integration. The standard choice for adding AI features to Next.js
    applications. Pairs with Vercel AI Elements (presentation:ai-elements)
    for pre-built UI components.
edges:
  belongs_to_language:
