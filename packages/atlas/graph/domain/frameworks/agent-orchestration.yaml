nodeKind: Framework
id: framework:crewai
attributes:
  displayName: "CrewAI"
  belongsToLanguageId: language:python
  category: agent-orchestration
  description: |
    Multi-agent role-playing framework where you define agents with
    specific roles, goals, and backstories, then compose them into crews
    that collaborate on tasks. Supports sequential and hierarchical
    process flows, tool delegation between agents, and memory. Designed
    for workflows where distinct personas (researcher, writer, reviewer)
    need to collaborate toward a shared objective.
edges:
  belongs_to_language:
    - language:python
  used_by_skill_area:
    - target: skill-area:ai-agent-development
    - target: skill-area:multi-agent-coordination
