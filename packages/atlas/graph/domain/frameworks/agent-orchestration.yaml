attributes:
  displayName: "Semantic Kernel"
  belongsToLanguageId: language:csharp
  category: agent-orchestration
  description: |
    Microsoft's AI orchestration SDK for integrating LLMs into enterprise
    applications. Provides a plugin model for exposing native functions
    and API endpoints as tools, planners for automatic multi-step task
    decomposition, and memory connectors for vector stores. Available in
    C#, Python, and Java. Targets the .NET ecosystem and Azure OpenAI
    Service deployments.
edges:
  belongs_to_language:
