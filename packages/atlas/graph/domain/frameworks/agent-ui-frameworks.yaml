  displayName: "Bubble Tea"
  homepageUrl: "https://github.com/charmbracelet/bubbletea"
  belongsToLanguageId: language:go
  category: agent-ui
  description: |
    Go TUI framework based on the Elm architecture (Model-Update-View)
    for building rich, interactive terminal applications. Part of the
    Charm ecosystem alongside Lip Gloss (styling), Bubbles (components),
    and Wish (SSH apps). Bubble Tea's functional architecture and
    composable commands make it straightforward to build complex terminal
    UIs with clean state management.
