nodeKind: Framework
id: framework:rich
attributes:
  displayName: "Rich"
  homepageUrl: "https://rich.readthedocs.io"
  belongsToLanguageId: language:python
  category: agent-ui
  description: |
    Python library for rich text and beautiful formatting in the terminal.
    Provides tables, syntax highlighting, progress bars, markdown
    rendering, tracebacks, and a logging handler out of the box. Rich is
    the rendering layer beneath Textual and is widely adopted in CLI tools
    like pip, pytest, and httpie for producing human-friendly terminal
    output.
