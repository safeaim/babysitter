  homepageUrl: "https://textual.textualize.io"
  belongsToLanguageId: language:python
  category: agent-ui
  description: |
    Python TUI framework built on Rich that enables rapid development of
    sophisticated terminal applications with CSS-like styling, widgets,
    reactive attributes, and async event handling. Textual applications
    can also be served in a web browser via Textual Web. Commonly used
    for developer tools, data dashboards, and AI chat interfaces that
    need to run in a terminal.
