---
nodeKind: KnowledgeSource
id: knowledge-source:code-repository
attributes:
  displayName: "Code Repository"
  description: |
    Source code repositories as a knowledge source — captures architecture
    decisions embedded in code, naming conventions, dependency choices,
    test patterns, and implicit team knowledge expressed through
    implementation. Indexed via AST parsing, symbol extraction, and
    embedding-based code search.
  sourceKind: code-repository
  updateFrequency: real-time
  indexingMethod: hybrid
edges:
  feeds_knowledge:
    - knowledge-domain:engineering-knowledge
---
nodeKind: KnowledgeSource
id: knowledge-source:documentation-wiki
attributes:
  displayName: "Documentation Wiki"
  description: |
    Internal wikis and documentation systems (Confluence, Notion, GitBook,
    internal docs sites) as a knowledge source. Contains process documentation,
    onboarding guides, architectural decision records, team runbooks, and
    product specifications. Typically full-text indexed with periodic refresh.
  sourceKind: wiki
  updateFrequency: daily
  indexingMethod: full-text
edges:
  feeds_knowledge:
    - knowledge-domain:engineering-knowledge
    - knowledge-domain:product-knowledge
    - knowledge-domain:organizational-knowledge
