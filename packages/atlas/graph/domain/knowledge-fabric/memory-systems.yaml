nodeKind: MemorySystem
id: memory-system:mempalace-service
attributes:
  displayName: "MemPalace Memory Service"
  description: |
    Benchmarked agent memory system with quality scoring and retrieval ranking.
    Memories are stored with relevance scores that decay or strengthen over
    time based on usage patterns. The benchmarking focus means MemPalace
    prioritizes measurable retrieval accuracy (92.2% fact recall reported)
    over feature breadth. Scored retrieval ranks memories by relevance,
    recency, and usage frequency, returning the most contextually appropriate
    memories for the current conversation.
  memoryKind: api-service
  persistence: cross-agent
  autoExtraction: true
  consolidation: periodic
  storageFormat: custom
  privacyFilter: false
  deduplication: semantic
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  memory_system_integrates:
    - target: tool:mempalace
---
nodeKind: MemorySystem
id: memory-system:agentmemory-service
attributes:
  displayName: "agentmemory Cross-Agent Memory"
  description: |
    Cross-agent persistent memory system with SHA-256 content-addressable
    deduplication and privacy filtering. The memory processing pipeline
    runs: SHA-256 dedup (reject exact duplicates) -> privacy filter (strip
    secrets, credentials, PII) -> store raw observation -> LLM compress
    (extract structured facts, concepts, narrative) -> vector embedding ->
    dual index (BM25 for keyword, vector for semantic). Supports cross-agent
    memory sharing where memories extracted by one agent are retrievable by
    another. Designed for accuracy-critical deployments where memory integrity
    and privacy are non-negotiable.
  memoryKind: hybrid
  persistence: cross-agent
  autoExtraction: true
  consolidation: on-write
  storageFormat: vector-db
  privacyFilter: true
  deduplication: sha256
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  memory_system_integrates:
    - target: tool:agentmemory
