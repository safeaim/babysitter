# Abstract memory patterns
---
nodeKind: MemorySystem
id: memory-system:file-based-markdown-pattern
attributes:
  displayName: "File-Based Markdown Memory Pattern"
  description: |
    The canonical agent memory pattern: markdown files in a project or user
    directory, loaded at session start and optionally updated at session end.
    Used by Claude Code (MEMORY.md), Cline (.cline/memory/), Roo Code
    (.roo/memory/), and OpenClaw (SOUL.md + MEMORY.md). The pattern is
    portable (any agent that reads files can use it), version-controllable
    (git tracks changes), inspectable (humans can read and edit), and
    composable (multiple files can be combined). The primary limitation is
    retrieval — file-hierarchy traversal does not scale to large memory
    corpora, and there is no semantic search without additional tooling.
  memoryKind: file-based
  persistence: project-scoped
  autoExtraction: false
  consolidation: manual
  storageFormat: markdown
  privacyFilter: false
  deduplication: none
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:vector-backed-recall-pattern
attributes:
  displayName: "Vector-Backed Recall Pattern"
  description: |
    Memory system pattern where past interactions are embedded as vectors for
    semantic retrieval. Each memory entry (fact, observation, decision) is
    embedded using a text embedding model and stored in a vector database.
    At retrieval time, the current conversation context is embedded and used
    as a query to find semantically relevant memories via approximate nearest
    neighbor search. Used by Mem0, Zep, and agentmemory. The pattern excels
    at semantic matching (finding memories about similar topics regardless of
    exact wording) but requires embedding infrastructure and can miss
    memories that are relevant for structural rather than semantic reasons.
  memoryKind: vector-backed
  persistence: cross-agent
  autoExtraction: true
  consolidation: none
  storageFormat: vector-db
  privacyFilter: false
  deduplication: semantic
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:auto-dream-consolidation-pattern
attributes:
  displayName: "Auto-Dream Consolidation Pattern"
  description: |
    Memory consolidation pattern where a background subagent periodically
    reviews accumulated memories and rewrites them into a coherent, pruned
    form. The process reads all existing memory files, identifies contradicted
    facts (deletes them), duplicate entries (merges them), stale observations
    (prunes them), and valid facts (keeps them), then rewrites the memory
    directory with a clean, organized structure. Claude Code implements this
    as the auto-dream cycle — a forked subagent with restricted tool surface
    (read-only Bash, scoped Write) that fires after a configurable number of
    sessions. The consolidation lock prevents concurrent dream processes from
    corrupting memory files.
  memoryKind: file-based
  persistence: user-scoped
  autoExtraction: false
  consolidation: auto-dream
  storageFormat: markdown
  privacyFilter: false
  deduplication: semantic
edges:
  realizes:
    - target: layer:12-knowledge-fabric
