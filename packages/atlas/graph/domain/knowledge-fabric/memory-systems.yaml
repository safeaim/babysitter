# External memory services
---
nodeKind: MemorySystem
id: memory-system:mem0-service
attributes:
  displayName: "Mem0 Memory Service"
  description: |
    API-based memory service that automatically extracts, stores, and retrieves
    relevant memories from conversations. Provides user-level, session-level,
    agent-level, and organization-level memory scopes through a simple
    add/search API. Uses an LLM to identify facts, preferences, and decisions
    from conversations and persists them without manual curation. Supports
    multiple vector store backends (Chroma, Qdrant, Pinecone) for semantic
    retrieval. The closest third-party analog to Claude Code's auto-memory
    system, with the key trade-off being accuracy of automated extraction.
  memoryKind: api-service
  persistence: cross-agent
  autoExtraction: true
  consolidation: on-write
  storageFormat: vector-db
  privacyFilter: false
  deduplication: semantic
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  memory_system_integrates:
    - target: tool:mem0
---
nodeKind: MemorySystem
id: memory-system:zep-service
attributes:
  displayName: "Zep Memory Service"
  description: |
    Long-term memory server for AI assistants that persists, summarizes, and
    retrieves conversation history with entity extraction and temporal
    awareness. Enriches memories with structured entity graphs — tracking
    people, organizations, and concepts mentioned across conversations.
    Fact retrieval is time-weighted, so recent knowledge is prioritized.
    REST API and SDKs for Python and TypeScript. Particularly suited for
    long-running agent relationships where context evolution matters.
  memoryKind: api-service
  persistence: cross-agent
  autoExtraction: true
  consolidation: periodic
  storageFormat: vector-db
  privacyFilter: false
  deduplication: semantic
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  memory_system_integrates:
    - target: tool:zep
