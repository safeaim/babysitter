# MemorySystem instances — concrete memory persistence/retrieval systems.
# Agent-native memory systems, external memory services, and abstract patterns.
---
nodeKind: MemorySystem
id: memory-system:claude-code-auto-memory
attributes:
  displayName: "Claude Code Auto-Memory"
  description: |
    Claude Code's file-based auto-memory system. Automatically extracts salient
    facts, preferences, and project-specific knowledge from conversations and
    persists them to MEMORY.md files under ~/.claude/projects/<hash>/memory/.
    The MEMORY.md index file links to per-topic memory files. Background
    consolidation (auto-dream) runs post-session to merge, deduplicate, and
    reorganize extracted memories. Memory is scoped at both project and user
    levels, with project-level CLAUDE.md providing instruction memory and
    user-level MEMORY.md providing learned-context memory. Security validation
    rejects path traversal, null bytes, UNC paths, and drive-root writes.
  memoryKind: file-based
  persistence: user-scoped
  autoExtraction: true
  consolidation: auto-dream
  storageFormat: markdown
  privacyFilter: false
  deduplication: semantic
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:cline-memory-bank
attributes:
  displayName: "Cline Memory Bank"
  description: |
    Cline's structured memory bank stored in .cline/memory/ with categorical
    markdown files. Categories include activeContext.md (current session state),
    productContext.md (what the product does), progress.md (development
    progress), systemPatterns.md (recurring code patterns), and techContext.md
    (technology decisions). Files are read at session start and optionally
    updated at session end. The structured-category approach trades flexibility
    for consistency — every project gets the same memory organization, making
    cross-project knowledge navigation predictable.
  memoryKind: file-based
  persistence: project-scoped
  autoExtraction: true
  consolidation: on-write
  storageFormat: markdown
  privacyFilter: false
  deduplication: none
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:windsurf-memories
attributes:
  displayName: "Windsurf Memories"
  description: |
    Windsurf's proprietary codebase pattern learning system. Windsurf Memories
    learns from how developers interact with a codebase — coding patterns,
    naming conventions, architecture preferences — and applies that learned
    context in future sessions. The system is proprietary and integrated into
    the Cascade agent, with no user-visible memory files. Persistence is
    managed server-side through Windsurf's cloud infrastructure. Unlike
    file-based memory systems, Windsurf Memories operates as an opaque
    learned-context layer that cannot be manually inspected or edited.
  memoryKind: proprietary
  persistence: user-scoped
  autoExtraction: true
  consolidation: periodic
  storageFormat: custom
  privacyFilter: false
  deduplication: semantic
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:cursor-notepads
attributes:
  displayName: "Cursor Notepads"
  description: |
    Cursor's manual knowledge capture system. Notepads are user-created
    scratchpads that persist context, decisions, and notes across sessions.
    Unlike auto-memory systems, Notepads require explicit user action to
    create and maintain. They complement Cursor's .cursorrules instruction
    files by providing a free-form space for knowledge that does not fit
    into rule format. Cursor also supports .cursor/rules/*.mdc files for
    structured rule-based memory with glob-scoped applicability.
  memoryKind: file-based
  persistence: project-scoped
  autoExtraction: false
  consolidation: manual
  storageFormat: markdown
  privacyFilter: false
  deduplication: none
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:roo-code-memory
attributes:
  displayName: "Roo Code Memory"
  description: |
    Roo Code's file-based memory system in .roo/memory/. As a Cline fork,
    Roo Code inherits the structured memory bank pattern with categorical
    markdown files. Roo Code extends this with per-mode memory — each
    custom mode (code, architect, review, etc.) can maintain its own memory
    context, so architectural decisions stay in architect mode memory while
    implementation details stay in code mode memory. Memory is read at
    session start and updated during/after sessions.
  memoryKind: file-based
  persistence: project-scoped
  autoExtraction: true
  consolidation: on-write
  storageFormat: markdown
  privacyFilter: false
  deduplication: none
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:openclaw-soul-memory
attributes:
  displayName: "OpenClaw SOUL + Memory"
  description: |
    OpenClaw's dual-file memory pattern using SOUL.md for agent identity and
    MEMORY.md for learned context. SOUL.md defines the agent's personality,
    communication style, and core behaviors — it is the persistent "who am I"
    file. MEMORY.md captures learned facts, project context, and session
    observations — the "what have I learned" file. The separation of identity
    from knowledge allows the same agent persona to be reused across projects
    while project-specific memories remain local.
  memoryKind: file-based
  persistence: project-scoped
  autoExtraction: false
  consolidation: manual
  storageFormat: markdown
  privacyFilter: false
  deduplication: none
edges:
  realizes:
    - target: layer:12-knowledge-fabric
---
nodeKind: MemorySystem
id: memory-system:codex-agents-md
attributes:
  displayName: "Codex AGENTS.md"
  description: |
    Codex CLI's instruction-file memory system. AGENTS.md is the sole
    persistent knowledge file, read at session bootstrap and injected into
    the system prompt. There is no auto-memory extraction, no background
    consolidation, and no user-level memory scope. Knowledge must be
    manually authored and maintained. The simplicity is intentional — Codex
    runs in a sandboxed environment where filesystem writes outside the
    sandbox boundary are prohibited, making auto-memory extraction
    architecturally difficult.
  memoryKind: file-based
  persistence: project-scoped
  autoExtraction: false
  consolidation: none
  storageFormat: markdown
  privacyFilter: false
  deduplication: none
edges:
  realizes:
    - target: layer:12-knowledge-fabric
