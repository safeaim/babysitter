# Abstract memory patterns — additional
---
nodeKind: MemorySystem
id: memory-system:instruction-file-hierarchy
attributes:
  displayName: "Instruction File Hierarchy Pattern"
  description: |
    The canonical instruction-file memory pattern used across coding agents:
    a filesystem hierarchy of instruction files where project root → nested
    directories → user home forms a layered scope. Each level can provide,
    extend, or override instructions from outer scopes. Implementations
    include CLAUDE.md (Claude Code, Pi), AGENTS.md (Codex, Amp, Gemini CLI,
    Goose, OpenCode), .cursorrules and .cursor/rules/*.mdc (Cursor),
    .clinerules (Cline), .windsurfrules (Windsurf), and .roorules (Roo Code).
    The pattern is version-controllable, diff-readable, and requires no
    runtime infrastructure. Cross-agent convergence is visible: Cursor added
    AGENTS.md support, Pi adopted CLAUDE.md. The hierarchy depth and merge
    semantics (override vs append) vary by agent but the core pattern —
    scoped instruction files loaded at session start — is universal.
  memoryKind: file-based
  persistence: project-scoped
  autoExtraction: false
  consolidation: manual
  storageFormat: markdown
  privacyFilter: false
  deduplication: none
edges:
  realizes:
    - target: layer:12-knowledge-fabric
