nodeKind: Methodology
id: methodology:cleanroom
attributes:
  displayName: "Cleanroom Software Engineering"
  description: |
    A formal methods process intended to produce software with certifiable reliability.
    Combines mathematically-based methods of software specification, design, and
    correctness verification with statistical usage testing. Developers verify code
    formally through inspection rather than unit testing. An independent test team
    performs statistical usage-based testing from operational profiles with MTTF
    calculations for reliability certification.
  methodologyKind: hybrid
  origin: "Harlan Mills, IBM"
  yearIntroduced: "1980s"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:cog-second-brain
attributes:
  displayName: "COG Second Brain"
  description: |
    A self-evolving second brain system combining AI agents with markdown files and
    Git version control (COG = Cognition + Obsidian + Git). Privacy-first, local-first
    knowledge management using pure markdown with structured evolution cycles from
    daily capture through monthly knowledge consolidation, personalized through
    role packs for different professional contexts.
  methodologyKind: research
  origin: "Huy Tieu"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:domain-driven-design
attributes:
  displayName: "Domain-Driven Design (DDD)"
  description: |
    An approach for building complex software systems that places the business domain
    at the center of development. Provides strategic patterns (Ubiquitous Language,
    Bounded Contexts, Context Mapping, Subdomains) for organizing large systems and
    tactical patterns (Entities, Value Objects, Aggregates, Repositories) for modeling
    domain logic. Bridges the gap between business experts and developers.
  methodologyKind: design-thinking
  origin: "Eric Evans"
  yearIntroduced: "2003"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:double-diamond
attributes:
  displayName: "Double Diamond"
  description: |
    A design thinking framework visualizing the design process through four phases:
    Discover, Define, Develop, and Deliver. Two diamonds represent problem space
    (Discover to Define) and solution space (Develop to Deliver). Each diamond
    encompasses divergent thinking (exploring broadly without judgment) followed by
    convergent thinking (taking focused action toward a clear outcome).
  methodologyKind: design-thinking
  origin: "British Design Council"
  yearIntroduced: "2005"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:event-storming
attributes:
  displayName: "Event Storming"
  description: |
    A workshop-based method for rapidly exploring complex business domains using
    sticky notes and a timeline. Collaboratively models domain events, commands,
    aggregates, and bounded contexts, bringing domain experts and developers together
    to build shared understanding. Starts chaotic with Big Picture Storming, then
    organizes incrementally through Process Modeling and Design-Level modeling.
  methodologyKind: design-thinking
  origin: "Alberto Brandolini"
  yearIntroduced: "2013"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:everything-claude-code
attributes:
  displayName: "Everything Claude Code"
  description: |
    Performance optimization system for AI agent harnesses integrating specialized
    subagents, continuous learning, and research-first development workflows. Features
    research-first development, mandatory TDD with 80% coverage, 4-axis code review
    with confidence gating, AgentShield security scanning with 102 static analysis
    rules, auto-extraction of patterns into reusable skills, and dynamic context
    injection with strategic compaction.
  methodologyKind: ai-assisted
  origin: "affaan-m"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:example-mapping
attributes:
  displayName: "Example Mapping"
  description: |
    A simple, collaborative workshop technique for exploring and understanding
    requirements before development. Uses four colored cards (Blue for Story, Yellow
    for Rules, Green for Examples, Red for Questions) to break down user stories into
    testable examples. Bridges the gap between high-level user stories and detailed
    acceptance criteria, making stories ready for test-driven development and BDD.
  methodologyKind: design-thinking
  origin: "Matt Wynne, Cucumber Ltd"
  yearIntroduced: "2015"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:extreme-programming
attributes:
  displayName: "Extreme Programming (XP)"
  description: |
    An agile software development methodology advocating frequent releases in short
    development cycles with 12 core practices taken to extreme levels. Emphasizes
    Pair Programming, TDD, Continuous Integration, Refactoring, Small Releases,
    Collective Code Ownership, Simple Design, and Planning Game. Engineering practices
    are grouped into fine-scale feedback, continuous process, shared understanding,
    and programmer welfare.
  methodologyKind: agile
  origin: "Kent Beck, Ward Cunningham, Ron Jeffries"
  yearIntroduced: "1996"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:feature-driven-development
attributes:
  displayName: "Feature-Driven Development (FDD)"
  description: |
    An agile methodology organizing software development around building small,
    client-valued features in short, predictable cycles. Five-step process: Develop
    Overall Model, Build Features List, Plan by Feature, Design by Feature, Build by
    Feature. Particularly suited for large teams (15-500+ developers) and enterprise
    projects requiring rigorous tracking with high visibility of progress.
  methodologyKind: agile
  origin: "Jeff De Luca, Peter Coad"
  yearIntroduced: "1997"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:gastown
attributes:
  displayName: "Gas Town"
  description: |
    A multi-agent orchestration framework for AI-driven software development providing
    infrastructure roles (Mayor, Deacon, Witness, Refinery), worker roles (Crew,
    Polecats, Dogs), and a git-backed work unit system (Beads, Convoys, Molecules).
    Governed by GUPP (Gas Town Universal Propulsion Principle), MEOW (Molecular
    Expression of Work), and NDI (Nondeterministic Idempotence) for coordinating
    parallel agent execution with persistent attribution.
  methodologyKind: orchestration
  origin: "Steve Yegge"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:gsd
attributes:
  displayName: "GSD (Get Shit Done)"
  description: |
    Systematic planning, research, execution, and verification workflows adapted for
    AI-assisted development. Core workflows include New Project Initialization with
    parallel domain research, Phase Discussion for capturing implementation
    preferences, Phase Planning with agent-based research and quality gates, and
    Phase Execution with parallel task execution, atomic git commits, and
    verification loops.
  methodologyKind: ai-assisted
  origin: "glittercowboy"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:hypothesis-driven-development
attributes:
  displayName: "Hypothesis-Driven Development"
  description: |
    A Lean Startup methodology treating product features as scientific experiments.
    Teams formulate testable hypotheses about outcomes and measure whether features
    achieve them through rigorous A/B testing and data analysis. Philosophy: build
    to learn, not to launch. Every feature is an experiment with measurable success
    criteria; every experiment is a learning opportunity to validate or invalidate
    assumptions.
  methodologyKind: research
  origin: "Eric Ries (The Lean Startup)"
  yearIntroduced: "2011"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:impact-mapping
attributes:
  displayName: "Impact Mapping"
  description: |
    A strategic planning technique connecting business goals to deliverable features
    through a four-level hierarchy: Goal (Why), Actor (Who), Impact (How), and
    Deliverable (What). Prevents scope creep by ensuring every feature decision
    traces back to a business objective and the behavioral changes needed to achieve
    it. Enables better prioritization by focusing teams on outcomes rather than
    outputs.
  methodologyKind: design-thinking
  origin: "Gojko Adzic"
  yearIntroduced: "2012"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:jobs-to-be-done
attributes:
  displayName: "Jobs to Be Done (JTBD)"
  description: |
    A framework focusing on understanding the progress customers are trying to make
    rather than on products, features, or personas. Central insight: people hire
    products to make progress on jobs. Analyzes switching behavior through four
    forces: Push (current problems), Pull (new solution appeal), Anxiety (concerns
    about switching), and Inertia (habit of current solution). Job stories replace
    traditional user stories.
  methodologyKind: design-thinking
  origin: "Clayton Christensen, Alan Klement, Intercom"
  yearIntroduced: "2016"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:kanban
attributes:
  displayName: "Kanban"
  description: |
    A visual workflow management method emphasizing continuous flow rather than
    fixed iterations. Six core practices: visualize workflow, limit work in progress
    (WIP), manage flow, make process policies explicit, implement feedback loops,
    and improve collaboratively. Particularly suited for continuous delivery teams,
    support/maintenance work with unpredictable demand, and operations teams managing
    incidents and requests.
  methodologyKind: agile
  origin: "David J. Anderson (adapted from Toyota Production System)"
  yearIntroduced: "2007"
edges:
  applies_to:
    - domain:software-engineering
    - topic:agent-orchestration-products
---
nodeKind: Methodology
id: methodology:maestro
attributes:
  displayName: "Maestro App Factory"
  description: |
    Multi-agent orchestration mimicking high-performing human dev teams for
    production-ready applications. Three core agent roles (Product Manager, Architect,
    Coders) with strict separation of concerns: architects never write code, coders
    never self-review. Features operating modes (Bootstrap, Development, Hotfix,
    Maintenance), a knowledge graph for institutional memory, quality gates with
    DRY/YAGNI enforcement, and parallel coder dispatch.
  methodologyKind: orchestration
  origin: "SnapdragonPartners"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:metaswarm
attributes:
  displayName: "Metaswarm"
  description: |
    Autonomous multi-agent orchestration managing the complete lifecycle from GitHub
    issue to merged pull request. Coordinates 12 specialized agents through a 7-phase
    workflow with quality gates as blocking state transitions, adversarial reviews
    with fresh reviewers (preventing anchoring bias), mandatory TDD with 100%
    coverage targets, human checkpoints at critical boundaries, and knowledge
    persistence across sessions.
  methodologyKind: research
  origin: "David Sifry"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:ontology-driven-development
attributes:
  displayName: "Ontology-Driven Development (ODD)"
  description: |
    An enhanced enterprise ontology engineering methodology addressing the practical
    challenges causing 70-80% of ontology projects to fail. Incorporates modular
    complexity management, multi-stakeholder alignment framework, enterprise tool
    integration patterns, advanced quality convergence with business value measurement,
    and domain-specific adaptation for regulated industries and complex domains.
  methodologyKind: design-thinking
  origin: "Enterprise ontology engineering research"
  yearIntroduced: "2026"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:pilot-shell
attributes:
  displayName: "Pilot Shell"
  description: |
    A spec-driven development framework with strict TDD, quality hooks, and persistent
    memory. Enforces spec-driven planning, strict Red-Green-Refactor cycles, automated
    quality pipelines (lint/format/typecheck), and cross-session persistent memory.
    Supports feature mode (semantic search to spec to TDD), bugfix mode (analysis to
    behavior contract to test-before-fix), and codebase sync mode for convention
    discovery.
  methodologyKind: ai-assisted
  origin: "Max Ritter"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:planning-with-files
attributes:
  displayName: "Planning with Files"
  description: |
    A persistent markdown-based planning methodology inspired by Manus AI's context
    engineering patterns. Treats the filesystem as extended memory for volatile agent
    workflows using a three-file pattern (task_plan.md, findings.md, progress.md).
    Implements 5 Manus Principles: Filesystem as Memory, Attention Manipulation,
    Error Persistence, Goal Tracking, and Completion Verification, with a 2-action
    rule for systematic findings capture.
  methodologyKind: ai-assisted
  origin: "OthmanAdi"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:process-hardening
attributes:
  displayName: "Process Hardening Patterns"
  description: |
    Reusable patterns for hardening babysitter processes extracted from process
    retrospectives. Three composable patterns: safeTask for error recovery with
    deviation tracking, circuit breaker for runaway implementation loops, and
    verification-blocks-delivery gate for downstream phase protection. These patterns
    compose naturally and can be imported into any babysitter process to improve
    robustness. Demonstrated score improvement from 68.5 to 84.3/100.
  methodologyKind: hybrid
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:rpikit
attributes:
  displayName: "RPIKit (Research-Plan-Implement)"
  description: |
    Implements the Research-Plan-Implement framework for disciplined AI-assisted
    software development. Enforces the Iron Law: do NOT explore the codebase until
    the problem is understood. Features stakes-based rigor scaling (low/medium/high),
    test-first enforcement, verification-before-completion, human approval gates
    between major phases, and soft-gating reviews that preserve user autonomy.
  methodologyKind: ai-assisted
  origin: "Matthew Boston"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:ruflo
attributes:
  displayName: "Ruflo"
  description: |
    A multi-agent orchestration platform deploying 60+ specialized agents in
    coordinated swarms with self-learning and self-optimizing architecture. Features
    Q-Learning-based smart routing (Booster/Medium/Complex paths), hierarchical
    agent topologies (Queen/Worker), multiple consensus protocols (Raft/Byzantine/
    Gossip/CRDT), the RuVector intelligence layer for continuous self-improvement,
    and Agent Booster WASM fast-path for simple transforms at 352x speed.
  methodologyKind: orchestration
  origin: "ruvnet"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:rup
attributes:
  displayName: "Rational Unified Process (RUP)"
  description: |
    A comprehensive iterative software development framework with four phases
    (Inception, Elaboration, Construction, Transition) and six core workflows
    (Business Modeling, Requirements, Analysis & Design, Implementation, Testing,
    Deployment). Emphasizes use-case driven development, architecture-centric design,
    risk-driven iteration planning, and formal milestones (LCO, LCA, IOC, GA) for
    phase gate decisions.
  methodologyKind: plan-driven
  origin: "Rational Software (Grady Booch, Ivar Jacobson, James Rumbaugh)"
  yearIntroduced: "1990s"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:scrum
attributes:
  displayName: "Scrum"
  description: |
    A lightweight agile framework for developing, delivering, and sustaining complex
    products through iterative progress via sprints. Founded on empirical process
    control with three pillars: Transparency, Inspection, and Adaptation. Three roles
    (Product Owner, Scrum Master, Development Team), five events (Sprint, Sprint
    Planning, Daily Scrum, Sprint Review, Sprint Retrospective), and three artifacts
    (Product Backlog, Sprint Backlog, Increment).
  methodologyKind: agile
  origin: "Ken Schwaber, Jeff Sutherland"
  yearIntroduced: "1995"
edges:
  applies_to:
    - domain:software-engineering
    - topic:agent-orchestration-products
---
nodeKind: Methodology
id: methodology:shape-up
attributes:
  displayName: "Shape Up"
  description: |
    Basecamp's methodology for building products through fixed-time, variable-scope
    cycles. Emphasizes appetite-driven development (how much time to spend, not how
    long it will take), thoughtful upfront shaping, strategic betting by senior team,
    autonomous team execution, and hill charts for visual progress tracking. Features
    6-week cycles with circuit breaker (no automatic extensions) and no backlogs.
  methodologyKind: agile
  origin: "Ryan Singer, Basecamp"
  yearIntroduced: "2019"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:spec-kit
attributes:
  displayName: "Spec Kit"
  description: |
    GitHub's spec-driven development methodology where specifications define what
    before how, with multi-step progressive refinement. Pipeline: constitution
    (governance) to specification (requirements) to plan (architecture) to tasks
    (actionable steps) to implementation (code). Supports greenfield, brownfield,
    and creative exploration modes with quality-gated convergence and human approval
    gates between phases.
  methodologyKind: quality-focused
  origin: "GitHub"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:spiral-model
attributes:
  displayName: "Spiral Model"
  description: |
    A risk-driven software development process combining iterative development with
    systematic aspects of waterfall. Development progresses through multiple spirals,
    each containing four phases: Planning (objectives, alternatives, constraints),
    Risk Analysis (identify and resolve risks through prototyping), Engineering
    (develop and verify), and Evaluation (review and plan next spiral). Radial
    dimension represents cumulative cost, angular dimension represents phase progress.
  methodologyKind: plan-driven
  origin: "Barry Boehm"
  yearIntroduced: "1986"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:superpowers
attributes:
  displayName: "Superpowers Extended"
  description: |
    A complete agentic software development lifecycle with structured skills,
    subagent-driven execution, and quality gates at every stage. Enforces disciplined
    workflows: brainstorm before coding, test before implementing, verify before
    claiming completion. Includes Socratic brainstorming, bite-sized TDD task
    planning, batch execution with checkpoints, fresh agent per task with two-stage
    review, and systematic 4-phase debugging.
  methodologyKind: ai-assisted
  origin: "pcvelz (community fork of obra/superpowers)"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:v-model
attributes:
  displayName: "V-Model"
  description: |
    An SDLC model where execution happens in a sequential V-shape (Verification and
    Validation model). The left side represents decomposition of requirements and
    system specifications, while the right side represents integration and validation.
    Each development phase has a corresponding testing phase: Requirements Analysis
    maps to Acceptance Testing, System Design to System Testing, Architectural Design
    to Integration Testing, and Module Design to Unit Testing.
  methodologyKind: plan-driven
  origin: "Evolved from waterfall"
  yearIntroduced: "1980s"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:waterfall
attributes:
  displayName: "Waterfall"
  description: |
    The linear and sequential approach to software development where progress flows
    through distinct phases: Requirements, Design, Implementation, Testing, Deployment,
    and Maintenance. Each phase must be completed and formally approved before the
    next begins. Document-driven with heavy documentation requirements, phase gates
    requiring formal approval, and requirements fixed early. Well-suited for stable
    requirements, regulatory environments, and fixed-price contracts.
  methodologyKind: plan-driven
  origin: "Winston W. Royce"
  yearIntroduced: "1970"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:adversarial-spec-debates
attributes:
  displayName: "Adversarial Specification Debates"
  description: |
    A quality-focused methodology where two or more agents debate specifications and
    approaches through structured adversarial collaboration. A proposer agent creates
    an initial specification, opponent agents challenge assumptions and find flaws,
    the proposer defends or adapts, and multiple rounds of debate refine the spec.
    A judge agent evaluates arguments and determines the strongest specification
    through iterative adversarial refinement.
  methodologyKind: quality-focused
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:agile
attributes:
  displayName: "Agile (Generic)"
  description: |
    A generic agile development loop implementing sprints, iteration cycles, and
    continuous delivery. Implements agile/scrum methodology with product backlog
    management, sprint planning (select stories, estimate, commit), sprint execution
    (develop, test, integrate), sprint review (demo, validate acceptance criteria),
    sprint retrospective (reflect, improve), incremental releases, and velocity
    tracking with continuous improvement.
  methodologyKind: hybrid
  origin: "Agile Manifesto authors"
  yearIntroduced: "2001"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:base44
attributes:
  displayName: "Base44"
  description: |
    Base44-inspired conversational development using natural language prompts to build
    apps with AI agents. Implements a vibe coding approach where users describe app
    ideas in natural language, AI agents generate complete applications (frontend and
    backend), users review and provide conversational feedback, and AI refines through
    iterative conversational rounds until deployment. Emphasizes zero-friction
    development from idea to deployed app.
  methodologyKind: ai-assisted
  origin: "Base44"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:bottom-up
attributes:
  displayName: "Bottom-Up Development"
  description: |
    A development approach that builds foundational components first, then composes
    them upward. Identifies primitive/foundational components, implements and
    thoroughly tests base components, builds a reusable component library, composes
    base components into higher-level components, tests composed components, and
    continues composing upward until the system is complete with final integration.
  methodologyKind: orchestration
  origin: "Classic software engineering"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:build-realtime-remediation
attributes:
  displayName: "Build Realtime Remediation"
  description: |
    A continuous build monitoring and automated remediation methodology. Monitors
    CI/build state in real-time, detects build/test failures, analyzes failure logs
    and error messages, determines root causes, applies automated fixes, and re-runs
    builds to verify fixes. Iterates until build succeeds or maximum remediation
    attempts are reached, providing autonomous CI failure resolution.
  methodologyKind: ai-assisted
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:consensus-and-voting-mechanisms
attributes:
  displayName: "Consensus and Voting Mechanisms"
  description: |
    A multi-agent democratic decision-making methodology where multiple agents
    independently solve the same task, each proposes a solution, all agents review
    and vote on all proposals, and consensus is reached through configurable voting
    mechanisms (majority, supermajority, ranked choice). If no consensus is reached,
    the process iterates with refinements until agreement emerges from the collective
    intelligence of the agent group.
  methodologyKind: orchestration
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
