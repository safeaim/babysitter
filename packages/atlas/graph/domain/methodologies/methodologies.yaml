nodeKind: Methodology
id: methodology:deep-research
attributes:
  displayName: "Deep Research"
  description: |
    A multi-stage investigation methodology with divergent exploration, convergent
    synthesis, and source verification. Seven stages: Frame (clarify and decompose
    question), Diverge (enumerate candidate sources), Gather (fetch and summarize
    evidence), Verify (cross-check claims, flag unsourced assertions), Converge
    (synthesize findings), Critique (adversarial review for gaps and bias), and
    Finalize (produce report with inline citations).
  methodologyKind: research
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:devin
attributes:
  displayName: "Devin-Style Workflow"
  description: |
    Inspired by Devin AI, an autonomous software engineering workflow with four
    phases: Planning (analyze requirements, design architecture), Coding (implement
    solution), Debugging (iterative fix cycles with quality threshold), and Deployment
    (ship verified code). Features iterative refinement with configurable quality
    targets and maximum debug iterations before declaring convergence or failure.
  methodologyKind: ai-assisted
  origin: "Cognition AI (Devin)"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:evolutionary
attributes:
  displayName: "Evolutionary Algorithm"
  description: |
    Applies genetic/evolutionary algorithms to solution search. Initializes a
    population of candidate solutions, evaluates fitness of each, selects fittest
    candidates as parents, creates offspring through crossover (combining parent
    traits), applies random mutations to introduce variation, replaces least fit
    with offspring, and repeats until convergence or maximum generations. Suited
    for exploring large solution spaces with multiple competing approaches.
  methodologyKind: research
  origin: "Classic evolutionary computing"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:graph-of-thoughts
attributes:
  displayName: "Graph of Thoughts"
  description: |
    Explores the solution space as a directed graph with branching, merging, and
    backtracking. Builds a graph of thought nodes, branches at decision points to
    generate alternative approaches, evaluates each branch independently, prunes
    low-scoring branches, allows merging when branches converge to similar solutions,
    supports backtracking to explore alternative paths, and navigates the graph to
    find the optimal solution path. Extends tree-of-thoughts with merge operations.
  methodologyKind: orchestration
  origin: "ETH Zurich research"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:plan-and-execute
attributes:
  displayName: "Plan-and-Execute"
  description: |
    A structured agent methodology that generates a detailed plan first, then executes
    each step with optional approval gates between steps. The planning phase produces
    a comprehensive task breakdown, the execution phase works through steps
    sequentially with validation, and approval gates provide human oversight at
    configurable granularity. Simple yet effective for decomposing complex tasks
    into manageable, verifiable steps.
  methodologyKind: orchestration
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:quality-gated-six-phase
attributes:
  displayName: "Quality-Gated Six-Phase"
  description: |
    A six-phase quality-gated development methodology: design, planning,
    implementation (subagent-TDD), verification, debugging, and finishing. Every
    phase task is fronted by a breakpoint gate with a canonical breakpointId so
    users can auto-approve via rules. Reviewer/fixer loops inside implementation
    use robust-rejection escalation via nStrikesEscalation. Distilled from
    joe-habu/superbabysitter with composable individual phases.
  methodologyKind: quality-focused
  origin: "joe-habu/superbabysitter"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:ralph
attributes:
  displayName: "Ralph Wiggum Loop"
  description: |
    A simple, persistent iterative execution loop that keeps trying until it succeeds
    or reaches maximum iterations. Named after Ralph Wiggum from The Simpsons for its
    cheerful persistence. Methodology: execute task, check if done, if not iterate
    again. Provides a minimal orchestration pattern for tasks that benefit from
    repeated attempts with accumulated context from previous iterations.
  methodologyKind: ai-assisted
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:self-assessment
attributes:
  displayName: "Self-Assessment Loop"
  description: |
    A self-critical iterative improvement methodology where an agent executes a task,
    critically evaluates its own work against defined criteria, identifies weaknesses
    and improvement opportunities, and iteratively refines until a quality threshold
    is met. Configurable assessment criteria and quality thresholds allow tailoring
    the self-evaluation rigor to the task at hand, enabling autonomous quality
    convergence.
  methodologyKind: research
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:spec-driven-development
attributes:
  displayName: "Spec-Driven Development"
  description: |
    A GitHub Spec-Kit inspired workflow where executable specifications drive
    implementation through a five-step development cycle: Constitution (establish
    governance principles), Specification (define requirements and user stories),
    Technical Plan (document stack and architecture), Task Breakdown (generate
    actionable steps), and Implementation (execute according to plan). Supports
    greenfield, brownfield, and creative exploration modes.
  methodologyKind: quality-focused
  origin: "GitHub (Spec-Kit)"
edges:
  applies_to:
    - domain:software-engineering
    - topic:agent-process-library
---
nodeKind: Methodology
id: methodology:state-machine-orchestration
attributes:
  displayName: "State Machine Orchestration"
  description: |
    Explicit state management with formal state machine semantics for workflow
    orchestration. Defines explicit states (INIT, PLANNING, EXECUTING, VALIDATING,
    COMPLETE, FAILED), conditional transitions with guards, entry/exit actions for
    each state, state history tracking, and transition validation. Provides
    deterministic, predictable workflows with clear state transitions and validation
    at each step for complex multi-phase processes.
  methodologyKind: orchestration
  origin: "Babysitter community"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:tdd
attributes:
  displayName: "Test-Driven Development (TDD)"
  description: |
    The classic Red/Green/Refactor loop per feature unit. For each unit of work:
    Red (write a failing test expressing the next small requirement), Green (write
    the minimum code to make it pass), Refactor (clean up with tests still green).
    An outer loop drives the full feature by sequencing units. Stops early if a unit
    cannot reach green within maxIterations as a signal to reconsider the design
    rather than pile on more code.
  methodologyKind: quality-focused
  origin: "Kent Beck"
  yearIntroduced: "1999"
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Methodology
id: methodology:top-down
attributes:
  displayName: "Top-Down Development"
  description: |
    A development approach starting with high-level design and decomposing into
    implementation details. Begins with overall system architecture and requirements,
    designs high-level components and interfaces, decomposes each into subcomponents,
    continues until reaching implementable units, implements from top to bottom using
    stubs/mocks for lower levels, progressively refines stubs with real implementations,
    and integrates from top to bottom.
  methodologyKind: orchestration
  origin: "Classic software engineering"
edges:
  applies_to:
    - domain:software-engineering
