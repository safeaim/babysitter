nodeKind: Methodology
id: methodology:claudekit
attributes:
  displayName: "ClaudeKit"
  description: |
    A coding safety net with real-time error prevention, checkpoint management, and
    specialized AI subagent orchestration. Features an event-driven hook system for
    PreToolUse/PostToolUse/UserPromptSubmit/Stop events, File Guard with 195+
    patterns across 12 categories, 6-agent parallel code review, spec-driven
    development lifecycle, and git-backed checkpoint management for safe rollback.
  methodologyKind: ai-assisted
  origin: "Carl Rannaberg"
edges:
  applies_to:
    - domain:software-engineering
