nodeKind: TestableClaim
id: claim-test:krate-crd-kind-count-75
attributes:
  displayName: "Krate CRD inventory count is 75"
  description: |
    Verifies the packages/krate/charts/crds source files define exactly 75
    CustomResourceDefinition documents. This claim prevents stale Atlas prose
    from drifting behind the package resource model.
  testStatus: untested
  testType: unit
  testCommand: "node -e \"const fs=require('fs'),yaml=require('yaml'),p='packages/krate/charts/crds';let n=0;for(const f of fs.readdirSync(p).filter(x=>x.endsWith('.yaml'))){for(const d of yaml.parseAllDocuments(fs.readFileSync(p+'/'+f,'utf8'))){if(d.toJSON()?.kind==='CustomResourceDefinition')n++;}}process.exit(n===75?0:1)\""
  category: graph-integrity
  priority: high
edges:
  asserts_about:
    - platform:krate
    - topic:krate-crd-inventory
