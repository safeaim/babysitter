nodeKind: ToolServer
id: tool-server:krate-api
attributes:
  displayName: "Krate API Server"
  description: |
    The primary HTTP API server for Krate, serving both the Kubernetes
    aggregated API (for data-plane resources like repositories, pull
    requests, issues, pipelines) and a REST convenience layer for the
    web UI. Listens on port 3080 by default. Handles authentication
    via Kubernetes service accounts and bearer tokens, org-scoped
    authorization, webhook dispatch, and SSE streaming for real-time
    updates. The aggregated API registers with kube-apiserver so that
    kubectl and client-go can interact with Krate resources natively.
  protocol: rest
  category: platform-api
  repoUrl: https://github.com/a5c-ai/babysitter/tree/staging/packages/krate/core
  installCommand: npm install && npm run build --workspace=@a5c-ai/krate
  npmPackage: '@a5c-ai/krate'
