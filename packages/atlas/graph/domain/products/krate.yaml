---
nodeKind: Definition
id: definition:krate-config-kinds
attributes:
  displayName: "Krate Configuration Resource Kinds (etcd CRDs)"
  authoredAt: "2026-05-10T00:00:00Z"
  text: |
    The 75 Krate CustomResourceDefinition documents that form Krate's
    control plane. These are low-volume, high-importance configuration
    resources stored in etcd alongside native Kubernetes objects:

    Organization management: Organization, OrganizationSettings,
      OrganizationQuota, OrganizationWebhook.
    Identity: User, ServiceAccount, Team, TeamMembership, TeamSync.
    RBAC: Role, RoleBinding, OrgRole, OrgRoleBinding, GlobalRole.
    Policy: PolicyProfile, PolicyTemplate, PolicyBinding,
      PolicyException, AdmissionPolicy.
    Agent configuration: AgentStack, AgentStackVersion,
      AgentPermissionSet, AgentQuotaProfile, AgentSchedule.
    Platform: HelmRelease, GitOpsApplication, SecretStore,
      ExternalSecret, CertificateRequest.
    UI state: View, Selector, DashboardLayout, NotificationRule.
    Webhooks: WebhookEndpoint, WebhookDeliveryPolicy.
    Integration: ExternalAuthProvider, OIDCClient, SCIMProvider.
    Audit: AuditPolicy, AuditSink, ComplianceReport.
  status: canonical
edges:
  applies_to:
    - domain:platform-engineering
    - domain:devops
  supports:
    - tool:kubernetes
    - skill-area:platform-engineering
    - skill-area:policy-as-code
---
nodeKind: Definition
id: definition:krate-aggregated-kinds
attributes:
  displayName: "Krate Aggregated API Kinds (Postgres-backed)"
  authoredAt: "2026-05-10T00:00:00Z"
  text: |
    The 23 Postgres-backed aggregated API resource kinds that form
    Krate's data plane. These are high-volume mutable resources served
    by Krate's aggregated API server and stored in PostgreSQL:

    Forge resources: Repository, RepositoryBranch, BranchProtection,
      PullRequest, PullRequestReview, PullRequestComment, Issue,
      IssueComment, Label, Milestone, Release, ReleaseAsset.
    Pipeline resources: Pipeline, PipelineRun, PipelineStage,
      PipelineStep, PipelineLog, PipelineArtifact.
    Agent data: AgentDispatchRun, AgentSession, AgentSessionEvent.
    Memory: AgentMemorySnapshot, AgentMemoryQuery.

    All 23 kinds are accessible via kubectl and standard Kubernetes
    client libraries. They support watch semantics for real-time
    updates, label selectors for filtering, and field selectors for
    efficient queries. The aggregated API server handles pagination,
    optimistic concurrency (resourceVersion), and org-scoped
    list/watch.
  status: canonical
edges:
  applies_to:
    - domain:platform-engineering
    - domain:software-engineering
  supports:
    - tool:kubernetes
    - skill-area:platform-engineering
    - skill-area:api-design
---
nodeKind: Definition
id: definition:krate-identity-model
attributes:
  displayName: "Krate Identity Model"
  authoredAt: "2026-05-10T00:00:00Z"
  text: |
    Krate's identity and access control model built on Kubernetes RBAC
    primitives extended with org-scoped semantics:

    Organization: Top-level tenant boundary. Cluster-scoped CRD that
      owns namespaces and all org-scoped resources.
    User: Maps to a Kubernetes user identity (x509 cert or OIDC subject).
      Can belong to multiple organizations with different roles in each.
    Team: Named group within an org. Supports nested teams, LDAP/SCIM
      sync, and team-scoped repository permissions.
    ServiceAccount: Bot identities for automation, CI, and agent dispatch.
    RBAC: Four-level role hierarchy — GlobalRole (cluster-wide),
      OrgRole (org-wide), Role (namespace/repo-scoped), and
      RoleBinding at each level. Predefined roles include org-owner,
      org-admin, repo-admin, repo-writer, repo-reader, agent-dispatcher.

    Authentication flows support OIDC, x509 client certificates,
    personal access tokens, and SSH keys. Authorization is evaluated
    by the Kubernetes API server using Krate's custom authorizer
    webhook, which resolves org membership and team permissions.
  status: canonical
edges:
  applies_to:
    - domain:platform-engineering
    - domain:security
  supports:
    - tool:kubernetes
    - skill-area:platform-engineering
    - skill-area:k8s-rbac
---
nodeKind: Definition
id: definition:krate-forge-model
attributes:
  displayName: "Krate Forge Resource Model"
  authoredAt: "2026-05-10T00:00:00Z"
  text: |
    The Git forge resource model in Krate — the aggregated API kinds
    that implement repository collaboration workflows:

    Repository: Org-scoped resource representing a Git repository.
      Backed by a Gitea repository for storage. Supports visibility
      (public/internal/private), default branch, description, topics,
      and fork relationships.
    PullRequest: Represents a proposed change with source/target branch,
      status (open/merged/closed), reviewers, labels, and milestone.
      Status conditions track CI checks, review approvals, and merge
      readiness.
    Issue: Lightweight work tracking with assignees, labels, milestone,
      and cross-references to PRs.
    Review: Pull request review with verdict (approve/request-changes/
      comment) and inline comments anchored to diff hunks.
    Pipeline: CI/CD pipeline definition with stages, steps, triggers,
      and resource requirements. Pipelines execute as Kubernetes Jobs.
    BranchProtection: Rules governing who can push to a branch,
      required status checks, required reviewers, and merge strategies
      (merge/squash/rebase).
    Release: Tagged version with release notes, changelog generation,
      and attached binary artifacts.
  status: canonical
edges:
  applies_to:
    - domain:software-engineering
    - domain:devops
  supports:
    - tool:kubernetes
    - skill-area:ci-cd
    - skill-area:platform-engineering
---
nodeKind: Definition
id: definition:krate-agent-model
attributes:
  displayName: "Krate Agent Resource Model"
  authoredAt: "2026-05-10T00:00:00Z"
  text: |
    The resource kinds governing AI agent dispatch and execution
    within Krate:

    AgentStack: Defines a reusable agent configuration — which coding
      agent to use (Claude Code, Codex, etc.), container image, resource
      limits (CPU, memory, GPU), timeout, and default tool permissions.
    AgentStackVersion: Immutable snapshot of an AgentStack for
      reproducibility. Dispatch runs reference a specific version.
    AgentDispatchRun: A single agent execution. Created by a user,
      PR trigger, or schedule. Specifies the target repository,
      branch, prompt, AgentStack version, and permission scope.
      Lifecycle: Pending → PermissionReview → ContextBundle →
      Running → Completed/Failed/Cancelled.
    AgentSession: The active session within a dispatch run. Tracks
      token usage, tool calls, files modified, and conversation history.
    AgentSessionEvent: Individual events within a session — tool
      invocations, file edits, terminal commands, model responses.
    AgentPermissionSet: Org-scoped allow/deny rules for what tools
      and commands an agent can use during a dispatch run.
    AgentQuotaProfile: Org-level resource and cost quotas for agent
      dispatch — max concurrent runs, token budget, compute hours.
    AgentSchedule: CronJob-like schedule for recurring agent dispatch
      (e.g., nightly code review, weekly dependency updates).
  status: canonical
edges:
  applies_to:
    - domain:platform-engineering
    - domain:software-engineering
  supports:
    - tool:kubernetes
    - skill-area:platform-engineering
---
nodeKind: Definition
id: definition:krate-memory-model
attributes:
  displayName: "Krate Agent Memory Model (Company Brain)"
  authoredAt: "2026-05-10T00:00:00Z"
  text: |
    The resource kinds implementing Krate's company brain — cross-run
    knowledge persistence for AI agents:

    AgentMemoryRepository: Org-scoped resource that represents a
      knowledge store. Configures the vector index backend, retention
      policy, and access control. Each org can have multiple memory
      repositories (e.g., per-team, per-project, or org-wide).
    AgentMemorySnapshot: An individual knowledge artifact produced
      by an agent session. Contains structured metadata (source repo,
      PR, session ID, timestamp), a natural-language summary, code
      patterns discovered, architectural decisions made, and embedding
      vectors for similarity search.
    AgentMemoryQuery: A read-only resource used to query the memory
      repository. Specifies search terms, filters (time range, repo,
      author), similarity threshold, and max results. The aggregated
      API server resolves the query against the vector index and
      returns matching snapshots.

    The memory model enables agents to build cumulative organizational
    knowledge: coding patterns, architecture decisions, common error
    resolutions, and team conventions persist across independent
    agent dispatch runs.
  status: canonical
edges:
  applies_to:
    - domain:platform-engineering
    - domain:software-engineering
  supports:
    - tool:kubernetes
    - skill-area:platform-engineering
---
nodeKind: Definition
id: definition:krate-policy-model
attributes:
  displayName: "Krate Policy Resource Model"
  authoredAt: "2026-05-10T00:00:00Z"
  text: |
    The resource kinds governing policy enforcement within Krate,
    implemented via Kyverno and custom admission webhooks:

    PolicyProfile: Org-scoped bundle of policies applied to all
      resources within an organization. Profiles compose multiple
      PolicyTemplates with org-specific parameter values.
    PolicyTemplate: Reusable, parameterized policy definition.
      Templates are cluster-scoped and can be shared across orgs.
      Examples: allowed-container-registries, required-labels,
      resource-quota-limits, agent-tool-allowlist.
    PolicyBinding: Associates a PolicyTemplate with a target scope
      (org, team, repo, or agent stack) and supplies parameter values.
    PolicyException: Temporary or permanent exemption from a specific
      policy for a specific resource. Requires org-admin approval and
      has an optional expiry.
    AdmissionPolicy: Low-level Kyverno ClusterPolicy wrapper that
      Krate generates from PolicyProfile/PolicyTemplate combinations.
      Not typically created directly by users.

    Policies are enforced at admission time (blocking non-compliant
    resource creation) and via background scanning (reporting existing
    resources that violate newly applied policies).
  status: canonical
edges:
  applies_to:
    - domain:platform-engineering
    - domain:security
  supports:
    - tool:kubernetes
    - tool:kyverno
    - skill-area:policy-as-code
    - skill-area:platform-engineering

