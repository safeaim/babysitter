---
nodeKind: Platform
id: platform:krate
attributes:
  displayName: "Krate"
  homepageUrl: "https://github.com/a5c-ai/babysitter"
  description: |
    Krate is a Kubernetes-native Git forge runtime — a complete Git
    collaboration platform (comparable to GitHub or GitLab) that extends
    Kubernetes' own API server and identity model rather than running as
    an opaque application on top of it. Krate is NOT an agent — it is
    the infrastructure platform that hosts repositories, CI pipelines,
    and dispatches coding agents to work on them.

    Architecture follows a three-plane design:
      - Control plane: 75 Krate CRD kinds for configuration,
        identity, policy, and org structure.
      - Data plane: 23 Postgres-backed aggregated API kinds for
        high-volume mutable state (repositories, pull requests, issues,
        reviews, pipelines, agent sessions, memory snapshots).
      - Integration plane: webhooks, Gitea sync, Zoekt code search,
        Kyverno policy engine, ArgoCD GitOps, and agent-mux dispatch.

    Key properties:
      - Org-scoped tenancy: every resource belongs to an Organization.
      - 75 total Krate CRD kinds across agent, aggregated, external backend, policy, and repository resource families.
      - GitOps transparency: every UI action has a kubectl equivalent.
      - Agent dispatch as CI: coding agents run as K8s Jobs through
        the same pipeline infrastructure as CI.
      - Company brain memory: cross-run knowledge persistence via
        AgentMemoryRepository, snapshots, and vector-backed queries.
edges:
  integrates_with:
    - target: platform:kubernetes
      notes: "Core runtime — all resources are K8s API objects"
    - target: agent:agent-mux
      notes: "Agent dispatch uses agent-mux transport for coding agent sessions"
