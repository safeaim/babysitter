# ---------------------------------------------------------------------------
# 8. Workflows
# ---------------------------------------------------------------------------
---
nodeKind: Workflow
id: workflow:krate-dispatch-agent
attributes:
  displayName: "Krate Agent Dispatch"
  description: |
    End-to-end workflow for dispatching an AI coding agent within Krate.
    Triggered by a user command (UI button, kubectl create, PR comment
    /agent), a schedule (AgentSchedule), or a pipeline step.

    Steps:
    1. Dispatch request: An AgentDispatchRun resource is created with
       the target repository, branch, prompt, and AgentStack reference.
    2. Permission review: The platform evaluates the dispatch against
       org-level AgentPermissionSets and PolicyProfiles. If the requested
       tools or resource limits exceed policy, the run is rejected or
       escalated for org-admin approval.
    3. Context bundle assembly: Krate checks out the repository at the
       specified branch, injects CLAUDE.md and relevant memory snapshots
       from the company brain, and prepares the agent workspace container.
    4. Agent-mux launch: The dispatch controller creates a Kubernetes Job
       running the agent-mux container with the selected coding agent
       (Claude Code, Codex, etc.). The session streams output back via SSE.
    5. Completion: On agent completion, results are collected — files
       modified, PR created/updated, tests run. A memory snapshot is
       generated and stored. The AgentDispatchRun status is updated to
       Completed or Failed.
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "on-demand"
  complexity: complex
edges:
  involves_role:
    - role:platform-engineer
    - role:backend-engineer
    - role:devops-engineer
  applies_to_domain:
    - domain:platform-engineering
    - domain:software-engineering
---
nodeKind: Workflow
id: workflow:krate-pr-lifecycle
attributes:
  displayName: "Krate Pull Request Lifecycle"
  description: |
    The full lifecycle of a pull request within Krate's Kubernetes-native
    forge, from creation through merge.

    Steps:
    1. PR creation: A PullRequest aggregated API resource is created
       (via UI, kubectl, or git push with a create-pr flag). Krate
       syncs the underlying Git branches with Gitea.
    2. CI pipeline trigger: BranchProtection rules on the target branch
       trigger a Pipeline resource. PipelineRuns execute as Kubernetes
       Jobs — lint, test, build, security scan.
    3. Review assignment: Reviewers are assigned based on CODEOWNERS
       patterns or team routing rules. Reviewers submit PullRequestReview
       resources with approve/request-changes verdicts.
    4. Status conditions: The PR aggregates status from CI checks,
       review approvals, and policy evaluations into Kubernetes-style
       status conditions. The merge button is unlocked when all required
       conditions are True.
    5. Agent dispatch (optional): Reviewers or authors can dispatch an
       agent via /agent comment to address review feedback automatically.
    6. Merge: Merge strategy (merge/squash/rebase) is applied per
       BranchProtection. Post-merge hooks trigger downstream pipelines,
       release creation, and issue auto-close.
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-pull-request"
  complexity: moderate
edges:
  involves_role:
    - role:backend-engineer
    - role:fullstack-engineer
    - role:tech-lead
    - role:qa-engineer
  applies_to_domain:
    - domain:software-engineering
    - domain:devops
---
nodeKind: Workflow
id: workflow:krate-memory-query
attributes:
  displayName: "Krate Company Brain Memory Query"
  description: |
    Workflow for querying and updating the company brain knowledge base
    within Krate.

    Query flow:
    1. An agent session (or human user via kubectl) creates an
       AgentMemoryQuery resource specifying search terms, filters
       (time range, source repository, author), and similarity threshold.
    2. The aggregated API server resolves the query against the vector
       index in the AgentMemoryRepository, performing semantic similarity
       search combined with metadata filtering.
    3. Matching AgentMemorySnapshot resources are returned, ranked by
       relevance. Each snapshot contains structured knowledge — code
       patterns, architecture decisions, error resolutions.
    4. The agent incorporates relevant snapshots into its context
       before proceeding with its task.

    Update flow:
    1. On agent session completion, the dispatch controller generates
       a new AgentMemorySnapshot summarizing decisions made, patterns
       discovered, and lessons learned.
    2. The snapshot is embedded (vector encoding) and stored in the
       AgentMemoryRepository.
    3. Org-admins can review, curate, or delete snapshots via the
       memory management UI or kubectl.
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-agent-session"
  complexity: moderate
edges:
  involves_role:
    - role:platform-engineer
    - role:backend-engineer
  applies_to_domain:
    - domain:platform-engineering
    - domain:software-engineering

