# ---------------------------------------------------------------------------
# 2. Key Domain Concepts as Topics
# ---------------------------------------------------------------------------
---
nodeKind: Topic
id: topic:kubernetes-native-forge
attributes:
  displayName: "Kubernetes-Native Git Forge"
  description: |
    The architectural thesis that a Git collaboration platform (forge) should
    be built as a native extension of the Kubernetes API rather than as a
    standalone application deployed on Kubernetes. All forge concepts —
    repositories, pull requests, issues, pipelines, users, teams, RBAC — are
    modeled as Kubernetes custom resources or aggregated API objects. This
    means kubectl, client-go, and any Kubernetes-native tooling can interact
    with the forge directly. The platform inherits Kubernetes' authn/authz,
    admission control, and controller reconciliation patterns, eliminating
    the need for a parallel identity and permission system.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:devops
    - domain:software-engineering
  related_to:
    - topic:gitops-principles
---
nodeKind: Topic
id: topic:aggregated-api-server
attributes:
  displayName: "Aggregated API Server Pattern"
  description: |
    A Kubernetes extension mechanism where a custom API server registers
    itself with the main kube-apiserver via an APIService resource. Requests
    to the custom API group are proxied to the aggregated server, which can
    use any backing store (Postgres, Redis, etc.) instead of etcd. This
    enables high-volume mutable state (e.g., pull request comments, pipeline
    logs) to live in a relational database while still being accessible
    through the standard Kubernetes API surface — kubectl, RBAC, admission
    webhooks, and watch semantics all work transparently. Krate uses this
    pattern for its 23 data-plane resource kinds.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:software-engineering
---
nodeKind: Topic
id: topic:org-scoped-tenancy
attributes:
  displayName: "Org-Scoped Multi-Tenancy"
  description: |
    A tenancy model where the Organization is the top-level isolation
    boundary. Every resource — repositories, teams, users, policies,
    pipelines, agent stacks — belongs to exactly one organization.
    Cross-org access is explicitly denied unless federation is configured.
    This differs from namespace-scoped tenancy (where a namespace is the
    boundary) and cluster-scoped tenancy (where a single tenant owns the
    cluster). In Krate, Organizations are cluster-scoped CRDs that own
    namespaces, and all org-scoped resources carry an orgRef field linking
    back to the owning Organization.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:security
    - domain:software-engineering
---
nodeKind: Topic
id: topic:agent-dispatch-as-ci
attributes:
  displayName: "Agent Dispatch as CI"
  description: |
    The design pattern of running AI coding agents through the same
    infrastructure used for CI/CD pipelines. Agent dispatch runs are
    modeled as pipeline jobs — they have triggers (PR comment, manual
    dispatch, schedule), resource limits, timeout policies, and
    permission scopes. The agent's workspace is a container with the
    repository checked out, and the agent session streams output back
    through the same log aggregation used for build pipelines. This
    unifies the operational model: monitoring, cost tracking, RBAC,
    and audit logging work identically for human CI and agent CI.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:devops
    - domain:software-engineering
---
nodeKind: Topic
id: topic:company-brain-memory
attributes:
  displayName: "Company Brain Memory"
  description: |
    A cross-run knowledge persistence layer for AI agents operating
    within an organization. Agent sessions produce memory snapshots —
    structured summaries of decisions, code patterns, architecture
    context, and lessons learned — that are stored in an
    AgentMemoryRepository. Subsequent agent sessions can query this
    repository to retrieve relevant organizational knowledge before
    starting work, reducing ramp-up time and improving consistency
    across independent agent runs. The memory layer supports vector
    similarity search, temporal filtering, and org-scoped access
    control.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:software-engineering
---
nodeKind: Topic
id: topic:gitops-transparency
attributes:
  displayName: "GitOps Transparency"
  description: |
    The principle that every action performed through a graphical UI
    must have an equivalent kubectl (or API) command, and every state
    mutation must be expressible as a declarative YAML manifest that
    can be version-controlled in Git. This ensures that platform state
    is auditable, reproducible, and automatable. In Krate, creating a
    repository via the web UI produces the same Repository CR that
    could be applied via kubectl; reviewing a pull request sets the
    same status conditions. The platform eats its own dog food — Krate
    itself is deployed and configured via its own GitOps pipeline.
edges:
  applies_to:
    - domain:devops
    - domain:platform-engineering
  related_to:
    - topic:gitops-principles
---
nodeKind: Topic
id: topic:declarative-ui-state
attributes:
  displayName: "Declarative UI State as K8s Resources"
  description: |
    Modeling frontend UI personalization (saved views, column layouts,
    filter presets, dashboard arrangements) as Kubernetes custom
    resources rather than as opaque rows in an application database.
    Views and Selectors are CRDs that users create, update, and share
    via the API. This means UI state is portable, version-controllable,
    and subject to the same RBAC and audit logging as any other
    platform resource. Teams can share curated views via GitOps, and
    administrators can set default views at the org level.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:software-engineering

# ---------------------------------------------------------------------------
# 3. Stack Profile for Krate
# ---------------------------------------------------------------------------
---
nodeKind: StackProfile
id: stack-profile:krate-platform
attributes:
  displayName: "Krate Platform Stack (K8s, Go, TypeScript, Postgres, Helm, ArgoCD)"
  description: |
    The technology stack underpinning the Krate Kubernetes-native Git forge
    runtime. The control plane and aggregated API server are written in Go,
    leveraging controller-runtime and apiserver libraries. The web UI is a
    Next.js (TypeScript/React) application served from within the cluster.
    PostgreSQL backs the aggregated API server for high-volume data-plane
    resources. Helm charts package the deployment, and ArgoCD manages
    GitOps-driven rollouts. Docker containers run all components including
    dispatched agent jobs. Kubernetes itself is both the runtime platform
    and the API surface that Krate extends.
  composes:
    - language:go
    - language:typescript
    - language:javascript
    - tool:kubernetes
    - tool:docker
    - tool:helm
    - tool:argocd
    - framework:nextjs
    - framework:react
    - stack-part:managed-postgres
    - stack-part:kubernetes-cluster
    - stack-part:container-registry
    - tool:gitea
    - tool:zoekt
    - tool:kyverno
edges:
  composed_of:
    - language:go
    - language:typescript
    - language:javascript
    - tool:kubernetes
    - tool:docker
    - tool:helm
    - tool:argocd
    - framework:nextjs
    - framework:react
    - stack-part:managed-postgres
    - stack-part:kubernetes-cluster
    - stack-part:container-registry
    - tool:gitea
    - tool:zoekt
    - tool:kyverno
  used_by_role:
    - role:platform-engineer
    - role:site-reliability-engineer
    - role:devops-engineer
    - role:backend-engineer

# ---------------------------------------------------------------------------
# 4. Tool nodes for Krate components (new tools only)
# ---------------------------------------------------------------------------
---
nodeKind: Tool
id: tool:gitea
attributes:
  displayName: "Gitea"
  homepageUrl: "https://gitea.com/"
  kind: git-server
  description: |
    Lightweight, self-hosted Git service written in Go. Provides
    repository hosting, pull requests, issue tracking, and a web UI
    with minimal resource footprint. Gitea is often embedded as the
    Git backend in larger platforms — in Krate, it handles the Git
    protocol layer (clone, push, fetch) and repository storage while
    Krate's own API server manages the higher-level forge abstractions
    (PR workflows, RBAC, pipelines). Supports SSH and HTTP transport,
    LFS, webhooks, and OAuth2 authentication.
edges:
  belongs_to_language:
    - language:go
  tool_used_by:
    - target: skill-area:platform-engineering
    - target: skill-area:ci-cd
  alternative_to:
    - target: tool:gitlab-ci
      comparison: "Self-hosted Git forges — Gitea is minimal; GitLab is full-featured"
---
nodeKind: Tool
id: tool:zoekt
attributes:
  displayName: "Zoekt"
  homepageUrl: "https://github.com/sourcegraph/zoekt"
  kind: search-engine
  description: |
    Trigram-based code search engine originally built at Google and
    maintained by Sourcegraph. Indexes Git repositories and serves
    sub-second regex and literal searches across large codebases.
    Zoekt builds compact trigram indices that enable fast intersection
    queries without full-text scanning. In Krate, Zoekt indexes all
    org-scoped repositories and powers the platform's code search UI
    and API. Supports branch-aware indexing, file filtering, and
    ranked results.
edges:
  belongs_to_language:
    - language:go
  tool_used_by:
    - target: skill-area:platform-engineering
---
nodeKind: Tool
id: tool:kyverno
attributes:
  displayName: "Kyverno"
  homepageUrl: "https://kyverno.io/"
  kind: policy-engine
  description: |
    Kubernetes-native policy engine that uses admission webhooks to
    validate, mutate, and generate resources based on declarative
    policies written as Kubernetes CRDs. Unlike OPA/Gatekeeper which
    requires learning Rego, Kyverno policies are expressed as familiar
    YAML with pattern matching and overlay semantics. In Krate,
    Kyverno enforces org-level PolicyProfiles — controlling which
    container images agents can use, what RBAC bindings are permitted,
    resource quota enforcement, and security baseline compliance.
    Supports policy reports, background scanning, and exception
    management.
edges:
  belongs_to_language:
    - language:go
  tool_used_by:
    - target: skill-area:policy-as-code
    - target: skill-area:platform-engineering
    - target: skill-area:container-security
  alternative_to:
    - target: tool:grafana
      comparison: "Not alternatives — Kyverno is policy enforcement; Grafana is observability"

