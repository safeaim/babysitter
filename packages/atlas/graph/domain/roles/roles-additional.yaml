nodeKind: Role
id: role:observability-engineer
attributes:
  displayName: "Observability Engineer"
  isAgentic: false
  description: |
    Designs and operates the observability platform — telemetry collection,
    storage, querying, and visualization — that gives engineering teams
    insight into system behavior. Owns OpenTelemetry instrumentation
    standards, alert policies, dashboard templates, and cost optimization
    of high-volume telemetry pipelines. Bridges SRE and platform engineering
    by making production systems debuggable and measurable.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:on-call
    - responsibility:capacity-planning
    - responsibility:documentation
    - responsibility:knowledge-sharing
  requires_skill:
    - target: specialization:observability
      level: expert
    - target: domain:observability
      level: expert
    - target: specialization:devops-sre-platform
      level: intermediate
