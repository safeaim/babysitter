nodeKind: Role
id: role:media-engineer
attributes:
  displayName: "Media Engineer"
  isAgentic: false
  description: |
    Builds and optimizes media processing pipelines — video transcoding,
    adaptive streaming, image processing, and real-time media delivery.
    Works with codecs, CDNs, and DRM systems to deliver high-quality media
    at scale while managing encoding cost and latency tradeoffs.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:performance-optimization
    - responsibility:code-review
    - responsibility:documentation
  requires_skill:
    - target: specialization:media
      level: expert
    - target: domain:media-entertainment
      level: expert
    - target: domain:software-engineering
      level: intermediate
