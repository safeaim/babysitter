attributes:
  displayName: "Desktop Application Developer"
  isAgentic: false
  automatability: 0.7
  description: |
    Builds native and cross-platform desktop applications — handling window
    management, native OS integration, file-system access, offline
    functionality, and platform-specific distribution. Works with frameworks
    like Electron, Tauri, Qt, or native platform SDKs to deliver performant,
    polished desktop experiences that feel at home on each operating system.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:performance-optimization
    - responsibility:deployment-management
  requires_skill:
