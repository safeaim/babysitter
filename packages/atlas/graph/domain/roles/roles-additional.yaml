attributes:
  displayName: "Documentation Engineer"
  isAgentic: false
  automatability: 0.7
  description: |
    Owns the developer documentation platform and information architecture
    for engineering-facing content. Goes beyond traditional technical writing
    by building docs-as-code pipelines, automated API reference generation,
    content linting, and search optimization. Partners with engineering teams
    to ensure documentation stays accurate, discoverable, and integrated into
    development workflows through CI-driven freshness checks and review gates.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:documentation
    - responsibility:knowledge-sharing
  requires_skill:
