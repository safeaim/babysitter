---
nodeKind: Role
id: role:game-developer
attributes:
  displayName: "Game Developer"
  isAgentic: false
  description: |
    Designs and implements interactive game experiences — from gameplay
    mechanics and AI systems to rendering pipelines and tooling. Works
    within game engines (Unity, Unreal, Godot, custom) to bring creative
    visions to life under strict performance constraints. Collaborates
    with artists, designers, and audio engineers to deliver polished
    player-facing experiences across console, PC, and mobile platforms.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:performance-optimization
    - responsibility:documentation
  requires_skill:
    - target: specialization:game-development
      level: expert
    - target: domain:gaming
      level: expert
    - target: domain:software-engineering
      level: intermediate
---
nodeKind: Role
id: role:documentation-engineer
attributes:
  displayName: "Documentation Engineer"
  isAgentic: false
  description: |
    Owns the developer documentation platform and information architecture
    for engineering-facing content. Goes beyond traditional technical writing
    by building docs-as-code pipelines, automated API reference generation,
    content linting, and search optimization. Partners with engineering teams
    to ensure documentation stays accurate, discoverable, and integrated into
    development workflows through CI-driven freshness checks and review gates.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:documentation
    - responsibility:knowledge-sharing
  requires_skill:
    - target: specialization:technical-documentation
      level: expert
    - target: domain:software-engineering
      level: intermediate
---
nodeKind: Role
id: role:desktop-developer
attributes:
  displayName: "Desktop Application Developer"
  isAgentic: false
  description: |
    Builds native and cross-platform desktop applications — handling window
    management, native OS integration, file-system access, offline
    functionality, and platform-specific distribution. Works with frameworks
    like Electron, Tauri, Qt, or native platform SDKs to deliver performant,
    polished desktop experiences that feel at home on each operating system.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:performance-optimization
    - responsibility:deployment-management
  requires_skill:
    - target: specialization:desktop-development
      level: expert
    - target: domain:software-engineering
      level: expert
