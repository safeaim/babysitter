nodeKind: Role
id: role:compliance-engineer
attributes:
  displayName: "Compliance Engineer"
  isAgentic: false
  description: |
    Automates and maintains compliance controls across engineering systems —
    implementing policy-as-code, continuous compliance monitoring, audit
    evidence collection, and regulatory reporting automation. Bridges the
    gap between legal/compliance requirements and engineering implementation
    for frameworks like SOC 2, ISO 27001, HIPAA, and GDPR.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:compliance-monitoring
    - responsibility:security-audit
    - responsibility:documentation
    - responsibility:risk-assessment
  requires_skill:
    - target: specialization:security-compliance
      level: expert
    - target: domain:cybersecurity
      level: intermediate
    - target: domain:software-engineering
      level: intermediate
