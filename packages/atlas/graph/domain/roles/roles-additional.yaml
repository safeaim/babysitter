nodeKind: Role
id: role:game-developer
attributes:
  displayName: "Game Developer"
  isAgentic: false
  automatability: 0.7
  description: |
    Designs and implements interactive game experiences — from gameplay
    mechanics and AI systems to rendering pipelines and tooling. Works
    within game engines (Unity, Unreal, Godot, custom) to bring creative
    visions to life under strict performance constraints. Collaborates
    with artists, designers, and audio engineers to deliver polished
    player-facing experiences across console, PC, and mobile platforms.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:performance-optimization
    - responsibility:documentation
  requires_skill:
    - target: specialization:game-development
      level: expert
    - target: domain:gaming
      level: expert
    - target: domain:software-engineering
      level: intermediate
