nodeKind: Role
id: role:supply-chain-analyst
attributes:
  displayName: "Supply Chain Analyst"
  isAgentic: false
  automatability: 0.3
  description: |
    Analyzes end-to-end supply chain data to identify inefficiencies, cost reduction
    opportunities, and resilience gaps across sourcing, production, and distribution.
    Builds demand forecasts, tracks supplier performance metrics, and supports
    inventory optimization initiatives. Collaborates with procurement, logistics,
    and operations teams to implement process improvements and contingency plans.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:supply-chain-optimization
    - responsibility:financial-analysis
    - responsibility:metric-definition
    - responsibility:risk-assessment
  requires_skill:
    - target: domain:supply-chain
      level: expert
    - target: domain:logistics
      level: intermediate
    - target: domain:business-intelligence
      level: intermediate
