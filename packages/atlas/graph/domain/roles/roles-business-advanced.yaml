nodeKind: Role
id: role:content-strategist
attributes:
  displayName: "Content Strategist"
  isAgentic: false
  automatability: 0.3
  description: |
    Defines the editorial direction, content architecture, and publishing cadence
    that support brand storytelling and audience acquisition across web, social,
    and product surfaces. Conducts content audits, builds content calendars, and
    collaborates with writers, designers, and SEO specialists to produce high-impact
    content. Measures content performance through engagement and conversion metrics
    to iterate on strategy.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:content-creation
    - responsibility:brand-management
    - responsibility:metric-definition
    - responsibility:customer-journey-mapping
  requires_skill:
