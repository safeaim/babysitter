nodeKind: Role
id: role:procurement-manager
attributes:
  displayName: "Procurement Manager"
  isAgentic: false
  automatability: 0.3
  description: |
    Leads the strategic sourcing and procurement function, developing supplier
    strategies, managing the vendor lifecycle, and negotiating contracts that
    balance cost, quality, and supply security. Establishes procurement policies
    and approval workflows, monitors supplier performance, and ensures compliance
    with regulatory and internal governance requirements. Collaborates with
    finance and legal to manage total cost of ownership and contractual risk.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:procurement
    - responsibility:vendor-evaluation
    - responsibility:contract-negotiation
    - responsibility:supply-chain-optimization
    - responsibility:budget-management
  requires_skill:
    - target: domain:procurement
      level: expert
    - target: domain:supply-chain
      level: intermediate
    - target: domain:legal
      level: novice
