nodeKind: Role
id: role:legal-advisor
attributes:
  displayName: "Legal Advisor"
  isAgentic: false
  automatability: 0.2
  description: |
    Provides proactive legal guidance on commercial, regulatory, and operational
    matters, reviewing contracts, policies, and business practices to identify and
    mitigate legal exposure. Advises on applicable laws and regulations across
    jurisdictions, supports contract drafting and negotiation, and coordinates with
    external counsel on complex or specialized matters. Acts as a trusted partner
    to business teams navigating compliance obligations and risk trade-offs.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:regulatory-compliance
    - responsibility:contract-negotiation
    - responsibility:risk-assessment
    - responsibility:stakeholder-communication
  requires_skill:
    - target: domain:legal
      level: expert
    - target: specialization:technical-documentation
      level: intermediate
