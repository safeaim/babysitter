attributes:
  displayName: "Operations Analyst"
  isAgentic: false
  automatability: 0.3
  description: |
    Examines operational workflows and business processes to uncover bottlenecks,
    redundancies, and improvement opportunities, then models and pilots solutions
    that increase efficiency and reduce cost. Builds dashboards and reports that
    give operational leadership real-time visibility into key performance indicators.
    Partners with cross-functional teams to implement and sustain process changes.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:strategic-planning
