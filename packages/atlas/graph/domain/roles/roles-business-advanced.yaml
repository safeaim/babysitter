nodeKind: Role
id: role:financial-analyst
attributes:
  displayName: "Financial Analyst"
  isAgentic: false
  automatability: 0.3
  description: |
    Models financial performance, evaluates investment opportunities, and produces
    reports that guide capital allocation decisions for business units and senior
    leadership. Maintains financial forecasts, tracks actuals against budget,
    and performs variance analysis to surface actionable insights. Partners with
    accounting, treasury, and strategy teams to support earnings cycles and
    investor communications.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:financial-analysis
    - responsibility:budget-management
    - responsibility:investor-relations
    - responsibility:risk-assessment
  requires_skill:
    - target: domain:finance
      level: expert
    - target: domain:capital-markets
      level: intermediate
    - target: domain:business-intelligence
      level: intermediate
---
nodeKind: Role
id: role:hr-manager
attributes:
  displayName: "HR Manager"
  isAgentic: false
  automatability: 0.2
  description: |
    Oversees the full employee lifecycle from onboarding through offboarding,
    ensuring policies, practices, and benefits programs attract, develop, and
    retain talent across the organization. Manages employee relations cases,
    coordinates performance review cycles, and partners with leadership on
    workforce planning and organizational design. Maintains compliance with
    labor regulations and fosters a healthy, equitable workplace culture.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:talent-acquisition
    - responsibility:training-development
    - responsibility:compliance-monitoring
    - responsibility:stakeholder-communication
  requires_skill:
    - target: domain:human-resources
      level: expert
    - target: domain:legal
      level: novice
---
nodeKind: Role
id: role:talent-recruiter
attributes:
  displayName: "Talent Recruiter"
  isAgentic: false
  automatability: 0.2
  description: |
    Sources, screens, and engages candidates across technical and non-technical
    roles, building diverse pipelines through job boards, referrals, and proactive
    outreach. Partners with hiring managers to define role requirements, calibrate
    assessments, and coordinate structured interviews that deliver equitable,
    data-informed hiring decisions. Tracks funnel metrics and continuously improves
    time-to-fill and candidate experience.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:talent-acquisition
    - responsibility:stakeholder-communication
    - responsibility:metric-definition
  requires_skill:
    - target: domain:human-resources
      level: expert
