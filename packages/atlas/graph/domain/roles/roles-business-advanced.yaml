nodeKind: Role
id: role:strategic-planner
attributes:
  displayName: "Strategic Planner"
  isAgentic: false
  automatability: 0.3
  description: |
    Develops and maintains the organization's long-range strategic plans by
    synthesizing market intelligence, competitive dynamics, and internal capability
    assessments into coherent strategic options. Facilitates strategy development
    processes with senior leadership, translates agreed strategies into roadmaps
    and OKRs, and tracks execution progress against strategic milestones. Produces
    board-level presentations and strategic narratives that align the organization.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:strategic-planning
    - responsibility:market-research
    - responsibility:stakeholder-communication
    - responsibility:investor-relations
    - responsibility:partnership-development
  requires_skill:
    - target: domain:strategy
      level: expert
    - target: domain:finance
      level: intermediate
    - target: domain:business-intelligence
      level: intermediate
