nodeKind: Role
id: role:marketing-strategist
attributes:
  displayName: "Marketing Strategist"
  isAgentic: false
  automatability: 0.3
  description: |
    Develops comprehensive marketing strategies that align brand positioning,
    audience targeting, and channel mix with business growth objectives. Conducts
    market research and competitive analysis to identify opportunities, then
    translates insights into campaign briefs, messaging frameworks, and
    go-to-market plans. Evaluates performance across digital and offline channels
    to continuously refine strategy and improve ROI.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:market-research
    - responsibility:strategic-planning
    - responsibility:brand-management
    - responsibility:metric-definition
  requires_skill:
    - target: domain:marketing
      level: expert
    - target: domain:digital-marketing
      level: expert
    - target: domain:strategy
      level: intermediate
