nodeKind: Role
id: role:partnerships-manager
attributes:
  displayName: "Partnerships Manager"
  isAgentic: false
  automatability: 0.2
  description: |
    Develops and manages strategic relationships with technology partners, resellers,
    and ecosystem integrators that expand market reach and product capabilities.
    Negotiates partnership agreements, defines co-marketing and co-selling programs,
    and tracks the revenue and pipeline contribution of each partnership. Works across
    product, legal, and marketing to onboard partners and keep them engaged.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:stakeholder-communication
    - responsibility:contract-negotiation
    - responsibility:vendor-evaluation
    - responsibility:budget-management
  requires_skill:
    - target: domain:software-engineering
      level: novice
    - target: specialization:technical-documentation
      level: novice
