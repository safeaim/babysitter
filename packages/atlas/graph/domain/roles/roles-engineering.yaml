nodeKind: Role
id: role:backend-engineer
attributes:
  displayName: "Backend Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Designs, builds, and maintains server-side services, APIs, and data pipelines that
    power product features and internal platforms. Works closely with frontend engineers
    and data engineers to define contracts and optimize data flows. Owns reliability,
    performance, and security of the services within their domain, and participates in
    on-call rotations to ensure production health.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:on-call
    - responsibility:performance-optimization
    - responsibility:documentation
  requires_skill:
    - target: domain:software-engineering
      level: expert
    - target: domain:databases
      level: intermediate
    - target: specialization:backend-python-django
      level: intermediate
---
nodeKind: Role
id: role:frontend-engineer
attributes:
  displayName: "Frontend Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Crafts responsive, accessible, and performant user interfaces that translate product
    designs into working browser and web application experiences. Collaborates tightly
    with product designers, UX researchers, and backend engineers to ship cohesive
    features end-to-end. Advocates for web performance, accessibility standards, and
    robust client-side state management across the team.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:performance-optimization
    - responsibility:documentation
  requires_skill:
    - target: domain:web-development
      level: expert
    - target: specialization:frontend-react
      level: expert
    - target: specialization:web-development
      level: intermediate
---
nodeKind: Role
id: role:fullstack-engineer
attributes:
  displayName: "Fullstack Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Operates across both client and server layers to deliver complete, end-to-end
    features independently. Comfortable making architectural decisions at every tier
    of the stack from database schema through REST or GraphQL API to browser UI.
    Often the primary driver in early-stage products or small teams where full
    vertical ownership is essential.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:deployment-management
    - responsibility:documentation
  requires_skill:
    - target: domain:software-engineering
      level: expert
    - target: domain:web-development
      level: expert
    - target: specialization:frontend-react
      level: intermediate
    - target: specialization:backend-python-django
      level: intermediate
