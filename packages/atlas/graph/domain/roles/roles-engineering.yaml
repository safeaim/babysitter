  displayName: "Machine Learning Engineer"
  isAgentic: false
  automatability: 0.7
  description: |
    Develops, trains, and productionizes machine learning models, bridging the gap
    between research prototypes and scalable production systems. Works with data
    scientists to formalize experiments and with platform engineers to deploy models
    reliably. Responsible for model performance monitoring, feature stores, and
    ensuring ML systems meet latency and throughput requirements.
  seniority: senior
