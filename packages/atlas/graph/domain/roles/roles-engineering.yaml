id: role:sre
attributes:
  displayName: "Site Reliability Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Applies software engineering principles to operations problems, owning system
    reliability, scalability, and efficiency at scale. Defines and tracks error
    budgets, leads incident response, and builds automation to reduce toil. Acts
    as a bridge between product engineering and operations to ensure reliability
    is a first-class concern in every architectural decision.
  seniority: senior
