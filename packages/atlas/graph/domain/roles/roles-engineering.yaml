  displayName: "Data Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Designs and operates the data infrastructure — pipelines, warehouses, and
    streaming systems — that move raw data from source systems to analytics and
    product consumers in a reliable, scalable, and governed way. Partners with data
    scientists, analysts, and product teams to understand data needs and model
    datasets appropriately. Owns data quality monitoring and pipeline observability.
  seniority: mid
