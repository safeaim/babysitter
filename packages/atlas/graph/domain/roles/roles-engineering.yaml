id: role:devops-engineer
attributes:
  displayName: "DevOps Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Bridges development and operations by building, automating, and maintaining
    CI/CD pipelines, infrastructure-as-code, and deployment tooling. Works to
    shorten feedback loops between writing code and shipping it safely to production.
    Partners with engineering teams to establish release processes, environment
    parity, and observability baselines that support rapid, reliable delivery.
  seniority: mid
edges:
  holds_responsibility:
