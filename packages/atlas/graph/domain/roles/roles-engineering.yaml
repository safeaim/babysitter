id: role:security-engineer
attributes:
  displayName: "Security Engineer"
  isAgentic: false
  automatability: 0.7
  description: |
    Protects the organization's systems and data by embedding security practices
    throughout the software development lifecycle. Conducts threat modeling, security
    reviews, and penetration tests; builds security automation into CI/CD pipelines;
    and responds to security incidents. Educates engineering teams on secure coding
    practices and drives remediation of identified vulnerabilities.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:security-audit
    - responsibility:access-control
    - responsibility:incident-response
    - responsibility:risk-assessment
    - responsibility:compliance-monitoring
  requires_skill:
