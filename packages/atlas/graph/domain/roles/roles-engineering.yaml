nodeKind: Role
id: role:mobile-engineer
attributes:
  displayName: "Mobile Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Builds native or cross-platform mobile applications for iOS and Android, optimizing
    for performance, battery life, and offline capability within the constraints of
    mobile operating systems. Collaborates with designers to implement pixel-perfect
    UIs and with backend engineers to integrate APIs. Manages app store releases and
    participates in beta testing and crash monitoring workflows.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:deployment-management
    - responsibility:performance-optimization
    - responsibility:documentation
  requires_skill:
    - target: domain:mobile
      level: expert
    - target: specialization:mobile-development
      level: expert
    - target: domain:software-engineering
      level: intermediate
