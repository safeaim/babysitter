nodeKind: Role
id: role:embedded-engineer
attributes:
  displayName: "Embedded Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Develops firmware and low-level software for constrained hardware platforms such
    as microcontrollers, FPGAs, and real-time systems. Works at the boundary of
    hardware and software, requiring deep understanding of memory management, interrupt
    handling, and hardware communication protocols. Collaborates with electrical
    engineers on bring-up, driver development, and hardware-in-the-loop testing.
  seniority: mid
edges:
  holds_responsibility:
    - responsibility:code-review
    - responsibility:test-strategy
    - responsibility:documentation
    - responsibility:risk-assessment
  requires_skill:
    - target: domain:embedded-systems
      level: expert
    - target: specialization:embedded-systems
      level: expert
    - target: domain:systems-programming
      level: expert
    - target: specialization:fpga-programming
      level: intermediate
