nodeKind: Role
id: role:platform-engineer
attributes:
  displayName: "Platform Engineer"
  isAgentic: false
  automatability: 0.8
  description: |
    Builds and maintains the internal developer platform — including self-service
    tooling, shared infrastructure abstractions, and golden-path templates — that
    enables product engineers to ship with velocity and confidence. Focuses on
    reducing cognitive load for consumers by hiding complexity behind well-designed
    APIs and automation while ensuring the platform meets enterprise reliability
    and security standards.
  seniority: senior
edges:
  holds_responsibility:
    - responsibility:deployment-management
    - responsibility:capacity-planning
    - responsibility:knowledge-sharing
    - responsibility:documentation
  requires_skill:
