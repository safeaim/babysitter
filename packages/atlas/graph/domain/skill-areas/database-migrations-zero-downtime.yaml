nodeKind: SkillArea
id: skill-area:database-migrations-zero-downtime
attributes:
  displayName: "Zero-Downtime Database Migrations"
  description: |
    Executing schema changes without downtime: expand/contract patterns,
    online DDL, lock-aware migrations, dual writes, backfill strategies,
    and feature-flagged read-path swaps. Covers Postgres (CONCURRENTLY,
    NOT VALID -> VALIDATE) and MySQL (gh-ost, pt-online-schema-change).
