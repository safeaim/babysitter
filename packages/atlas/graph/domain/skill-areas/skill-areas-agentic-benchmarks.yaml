nodeKind: SkillArea
id: skill-area:deep-web-research
attributes:
  displayName: "Deep Web Research"
  description: |
    Answering hard, long-tail factual questions that require multi-hop
    web search, source triangulation across many pages, and resolution
    of ambiguous or contested facts (as exercised by BrowseComp and
    AssistantBench-style evaluations) — distinct from generic browsing
    in that the bottleneck is research strategy rather than UI grounding.
  domains:
    - specialization:ai-agents-conversational
  expertiseLevels: [intermediate, expert, authoritative]
edges:
  applies_to:
    - target: specialization:ai-agents-conversational
      confidence: primary
---
nodeKind: SkillArea
id: skill-area:multi-app-orchestration
attributes:
  displayName: "Multi-App Orchestration"
  description: |
    Completing tasks that span many distinct applications/APIs — chaining
    actions across email, calendar, files, ticketing, code, and SaaS
    surfaces, threading state between them, and recovering from per-app
    failures (as exercised by AppWorld and TheAgentCompany-style
    evaluations).
  domains:
    - specialization:ai-agents-conversational
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: specialization:ai-agents-conversational
      confidence: primary
