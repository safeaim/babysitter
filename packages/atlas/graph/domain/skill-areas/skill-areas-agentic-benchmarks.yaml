nodeKind: SkillArea
id: skill-area:web-action-grounding
attributes:
  displayName: "Web Action Grounding"
  description: |
    Translating a natural-language web task into the correct concrete
    DOM/UI actions — locating the right element, choosing the right
    interaction (click/type/scroll/select), and verifying the resulting
    page state (as exercised by Mind2Web-2, WorkArena, and WebVoyager-
    style evaluations). Sibling to browser-automation; focus is on
    grounding accuracy rather than driver mechanics.
  domains:
    - specialization:web-development
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: specialization:web-development
      confidence: primary
