nodeKind: SkillArea
id: skill-area:autonomous-coding-engagement
attributes:
  displayName: "Autonomous Coding Engagement"
  description: |
    Taking on a real freelance-style software engagement from a natural-
    language brief — reading the repo, asking/inferring requirements,
    implementing features across multiple files, validating against
    acceptance tests or rubric, and producing a reviewable change set
    (as exercised by SWE-Lancer-style evaluations).
  domains:
    - domain:software-engineering
  expertiseLevels: [intermediate, expert, authoritative]
edges:
  applies_to:
    - target: domain:software-engineering
      confidence: primary
