nodeKind: SkillArea
id: skill-area:visual-pattern-induction
attributes:
  displayName: "Visual Pattern Induction"
  description: |
    Inducing abstract transformation rules from a small number of
    visual input/output grid examples and applying them to held-out
    grids — fluid-intelligence-style reasoning over color/shape/spatial
    primitives, as exercised by the ARC-AGI family of evaluations.
  domains:
    - domain:software-engineering
  expertiseLevels: [intermediate, expert, authoritative]
edges:
  applies_to:
    - target: domain:software-engineering
      confidence: primary
