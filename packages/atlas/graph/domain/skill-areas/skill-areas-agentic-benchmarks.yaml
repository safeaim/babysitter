id: skill-area:code-cybersecurity
attributes:
  displayName: "Code Cybersecurity"
  description: |
    Identifying, exploiting, and remediating security vulnerabilities
    in source code and running systems — static review for common
    classes (injection, auth, deserialization, memory safety),
    capture-the-flag-style exploitation, and patch authoring under
    adversarial assumptions.
  domains:
    - specialization:security-research
  expertiseLevels: [intermediate, expert, authoritative]
edges:
  applies_to:
    - target: specialization:security-research
      confidence: primary
