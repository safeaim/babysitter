nodeKind: SkillArea
id: skill-area:autonomous-research-engineering
attributes:
  displayName: "Autonomous Research Engineering"
  description: |
    Running open-ended ML/AI research experiments end-to-end — reading
    a problem statement, designing experiments, writing/modifying training
    or evaluation code, launching jobs, interpreting metrics, and iterating
    against a held-out scoring function (as exercised by RE-Bench-style
    evaluations).
  domains:
    - specialization:ai-agents-conversational
  requiresLanguages:
    - language:python
  expertiseLevels: [expert, authoritative]
edges:
  applies_to:
    - target: specialization:ai-agents-conversational
      confidence: primary
    - target: specialization:research
      confidence: secondary
    - target: specialization:scientific-discovery
      confidence: secondary
  uses_language:
    - language:python
    - target: language:python
