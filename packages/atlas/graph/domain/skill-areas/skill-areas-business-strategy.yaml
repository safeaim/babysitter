nodeKind: SkillArea
id: skill-area:market-sizing
attributes:
  displayName: "Market Sizing"
  description: |
    Estimating the addressable opportunity for a product or business using TAM, SAM,
    and SOM frameworks alongside bottom-up and top-down modeling techniques. Combines
    industry data, customer segmentation, and pricing assumptions to produce
    defensible opportunity assessments for investors, executives, and product teams.
    Essential for prioritizing where to compete and how to allocate resources.
  domains:
    - domain:strategy
    - domain:venture-capital
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:strategy
      confidence: primary
    - target: domain:venture-capital
      confidence: secondary
