attributes:
  displayName: "Business Model Design"
  description: |
    Designing and stress-testing business models using canvases and frameworks such
    as the Business Model Canvas and value proposition design. Maps customer segments,
    channels, revenue streams, and cost structures to identify sustainable competitive
    advantage. Enables entrepreneurs and strategists to prototype and iterate on how
    an organization creates, delivers, and captures value before committing resources.
