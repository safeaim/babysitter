nodeKind: SkillArea
id: skill-area:change-management-leadership
attributes:
  displayName: "Change Management and Transformation Leadership"
  description: |
    Leading complex organizational change initiatives — digital transformations,
    restructurings, and cultural shifts — using structured change methodologies
    such as Kotter and Prosci ADKAR. Covers stakeholder engagement, communication
    planning, resistance management, capability building, and adoption measurement.
    Ensures that strategic decisions translate into durable behavioral change across
    the organization rather than stalling in implementation.
  domains:
    - domain:strategy
    - domain:human-resources
  expertiseLevels: [intermediate, expert]
