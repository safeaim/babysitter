nodeKind: SkillArea
id: skill-area:growth-strategy
attributes:
  displayName: "Growth Strategy"
  description: |
    Developing scalable plans for organic and inorganic growth — go-to-market
    expansion, geographic entry, channel strategy, and partnership playbooks.
    Synthesizes market sizing, unit economics, and competitive positioning into
    sequenced growth roadmaps that product, sales, and marketing can execute against.
    Includes frameworks for scaling teams, operations, and revenue in parallel.
  domains:
    - domain:strategy
    - domain:business-development
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:strategy
      confidence: primary
    - target: domain:business-development
      confidence: secondary
