attributes:
  displayName: "Competitive Intelligence"
  description: |
    Systematically gathering, synthesizing, and acting on intelligence about
    competitors, market dynamics, and emerging trends. Covers primary and secondary
    research methods, win/loss analysis, battlecard development, and trend forecasting
    to give go-to-market and product teams an actionable view of the competitive
    landscape. Informs positioning, pricing, and feature prioritization decisions.
  domains:
