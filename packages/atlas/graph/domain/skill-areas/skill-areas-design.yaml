attributes:
  displayName: "Interaction Design"
  description: |
    Designing the moment-to-moment behavior of digital interfaces - defining how
    controls respond to user actions, sequencing multi-step flows, and crafting
    feedback states that make intent legible and outcomes predictable. Bridges
    user goals and system capabilities through considered behavioral contracts and
    interaction patterns.
