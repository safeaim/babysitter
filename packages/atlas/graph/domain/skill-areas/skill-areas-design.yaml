nodeKind: SkillArea
id: skill-area:design-critique
attributes:
  displayName: "Design Critique"
  description: |
    Structured evaluation of design work through principled feedback grounded in
    user goals, product strategy, and established design heuristics. Separates
    personal preference from reasoned critique, builds team design vocabulary, and
    creates psychological safety for sharing work in progress. Supports a culture
    of continuous quality improvement across design and engineering.
  domains:
    - domain:web-development
    - specialization:ux-ui-design
  expertiseLevels: [intermediate, expert]
