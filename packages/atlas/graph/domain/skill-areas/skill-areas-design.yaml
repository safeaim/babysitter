id: skill-area:design-systems
attributes:
  displayName: "Design Systems"
  description: |
    Building and maintaining shared visual and interaction languages across product
    surfaces - component libraries, design tokens, documentation, and governance
    processes that keep design and code in sync. Reduces inconsistency and accelerates
    delivery by giving teams a reusable foundation with clear contribution and versioning
    contracts.
