nodeKind: SkillArea
id: skill-area:prototyping
attributes:
  displayName: "Prototyping"
  description: |
    Creating low- to high-fidelity representations of product concepts to explore
    ideas, validate interactions, and communicate intent before full implementation.
    Ranges from paper sketches and wireframes to interactive click-through prototypes
    and coded explorations, enabling rapid feedback loops with stakeholders and users
    at the appropriate level of investment.
  domains:
    - domain:web-development
    - specialization:ux-ui-design
  expertiseLevels: [intermediate, expert]
