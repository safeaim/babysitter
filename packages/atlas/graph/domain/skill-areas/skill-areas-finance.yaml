nodeKind: SkillArea
id: skill-area:valuation-analysis
attributes:
  displayName: "Valuation Analysis"
  description: |
    Estimating the intrinsic and relative value of companies, assets, or securities
    using comparable company analysis, precedent transaction analysis, DCF, and
    LBO modeling. Synthesizes financial statements, industry multiples, and deal
    context into defensible valuation ranges for M&A, fundraising, and strategic
    decisions. Requires judgment about appropriate peer selection, normalization
    adjustments, and the limits of each methodology.
  domains:
    - domain:finance
    - domain:venture-capital
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:finance
      confidence: primary
    - target: domain:venture-capital
      confidence: secondary
