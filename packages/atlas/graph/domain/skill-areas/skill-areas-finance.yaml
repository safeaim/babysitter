attributes:
  displayName: "Financial Modeling"
  description: |
    Building robust financial models to support investment, operational, and strategic
    decisions — discounted cash flow (DCF) analysis, three-statement models, scenario
    and sensitivity analysis, and pro-forma statement construction. Emphasizes model
    architecture best practices: auditability, assumption transparency, and version
    discipline. Used by finance teams, investors, and operators to quantify tradeoffs
    and stress-test business assumptions.
