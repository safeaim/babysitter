nodeKind: SkillArea
id: skill-area:budgeting-forecasting
attributes:
  displayName: "Budgeting and Forecasting"
  description: |
    Constructing operating budgets, rolling forecasts, and long-range financial
    plans that translate strategic priorities into resource allocation decisions.
    Covers driver-based modeling, variance analysis, budget governance, and
    forecast accuracy improvement. Bridges the finance function with business
    unit partners to produce plans that are credible, owned, and updatable as
    conditions change.
  domains:
    - domain:finance
    - domain:operations
  expertiseLevels: [intermediate, expert]
