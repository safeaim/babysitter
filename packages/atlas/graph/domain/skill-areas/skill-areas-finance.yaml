nodeKind: SkillArea
id: skill-area:investment-analysis
attributes:
  displayName: "Investment Analysis"
  description: |
    Evaluating investment opportunities through fundamental research, portfolio
    theory, risk-return assessment, and due diligence frameworks. Covers equity
    and credit analysis, capital allocation decision-making, scenario modeling,
    and investment memo construction. Applied across venture capital, private
    equity, and corporate development contexts to decide where to deploy capital
    and how to monitor it post-investment.
  domains:
    - domain:finance
    - domain:venture-capital
  expertiseLevels: [intermediate, expert]
