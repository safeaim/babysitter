nodeKind: SkillArea
id: skill-area:performance-management
attributes:
  displayName: "Performance Management"
  description: |
    Designing and operating systems for goal-setting, continuous feedback, formal
    reviews, and performance calibration across the organization. Covers OKR and
    MBO frameworks, rating scale design, calibration session facilitation, and
    linking performance outcomes to compensation and development decisions. Creates
    shared standards of excellence while preserving manager judgment and avoiding
    the perverse incentives of poorly designed review processes.
  domains:
    - domain:human-resources
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:human-resources
      confidence: primary
---
nodeKind: SkillArea
id: skill-area:organizational-design
attributes:
  displayName: "Organizational Design"
  description: |
    Structuring organizations to execute strategy effectively — defining reporting
    relationships, spans of control, team topologies, and decision rights. Applies
    principles from Team Topologies, Galbraith's Star Model, and org design
    research to diagnose misalignments between structure and goals. Supports
    leadership through reorganizations, rapid scaling, and post-merger integration
    to minimize coordination costs and maximize team autonomy.
  domains:
    - domain:human-resources
    - domain:strategy
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:human-resources
      confidence: primary
    - target: domain:strategy
      confidence: secondary
