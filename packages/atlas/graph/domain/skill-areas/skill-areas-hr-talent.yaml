attributes:
  displayName: "Learning and Development"
  description: |
    Designing and operating learning programs that build organizational capability
    — training needs analysis, curriculum design, career pathing frameworks, and
    L&D measurement using Kirkpatrick and similar models. Covers LMS administration,
    cohort-based learning, on-the-job learning architecture, and the linkage between
    development investment and retention, engagement, and performance outcomes.
  domains:
