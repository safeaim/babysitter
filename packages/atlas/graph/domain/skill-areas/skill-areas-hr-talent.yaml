nodeKind: SkillArea
id: skill-area:talent-acquisition-strategy
attributes:
  displayName: "Talent Acquisition Strategy"
  description: |
    Designing end-to-end recruiting systems that attract and select high-quality
    candidates at scale — sourcing strategy, employer brand development, structured
    interview design, and offer calibration. Covers ATS configuration, pipeline
    analytics, diversity sourcing practices, and recruiter capacity planning.
    Balances speed-to-hire with signal quality and candidate experience to build
    teams that deliver on organizational goals.
  domains:
    - domain:human-resources
  expertiseLevels: [intermediate, expert]
