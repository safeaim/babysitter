nodeKind: SkillArea
id: skill-area:knowledge-curation
attributes:
  displayName: "Knowledge Curation"
  description: |
    Maintaining, pruning, and updating organizational knowledge bases —
    knowledge lifecycle management (creation, verification, deprecation,
    archival), duplicate detection and merging, contradiction resolution
    across sources, freshness policies and automated staleness detection,
    knowledge ownership assignment, expert verification workflows, and
    quality metrics for knowledge bases (coverage, accuracy, currency).
  domains:
    - specialization:ai-agents-conversational
    - domain:software-engineering
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
