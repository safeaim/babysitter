nodeKind: SkillArea
id: skill-area:embedding-optimization
attributes:
  displayName: "Embedding Optimization"
  description: |
    Choosing, tuning, and evaluating embedding models for knowledge
    retrieval — model selection (OpenAI, Cohere, open-source E5/BGE/GTE),
    dimensionality trade-offs (higher dimensions = better quality but
    more storage/compute), fine-tuning embeddings on domain-specific
    data for improved retrieval relevance, quantization for memory
    efficiency, and benchmarking with MTEB (Massive Text Embedding
    Benchmark) and domain-specific evaluation sets.
  domains:
    - specialization:ai-agents-conversational
    - domain:data-science
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: specialization:ai-agents-conversational
      confidence: primary
    - target: domain:data-science
      confidence: secondary
  uses_tool:
    - tool:pinecone
    - tool:weaviate
    - tool:chromadb
  prerequisite_for_learning:
    - target: skill-area:retrieval-evaluation
      strength: required
---
nodeKind: SkillArea
id: skill-area:retrieval-evaluation
attributes:
  displayName: "Retrieval Evaluation"
  description: |
    Measuring and improving RAG pipeline quality — evaluation metrics
    (faithfulness, answer relevance, context precision, context recall),
    evaluation frameworks (Ragas, DeepEval, TruLens), building golden
    evaluation datasets, A/B testing retrieval configurations, monitoring
    retrieval quality in production, and the distinction between
    component-level evaluation (retriever quality) and end-to-end
    evaluation (final answer quality).
  domains:
    - specialization:ai-agents-conversational
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: specialization:ai-agents-conversational
      confidence: primary
  uses_tool:
    - tool:haystack
