nodeKind: SkillArea
id: skill-area:team-management
attributes:
  displayName: "Team Management"
  description: |
    Leading engineering teams through goal-setting, performance feedback, career
    development, and day-to-day operational support. Involves creating psychological
    safety, sustaining delivery velocity, managing workload, and maintaining clarity
    about roles and expectations so individuals can do their best work within a
    healthy team environment.
  domains:
    - domain:software-engineering
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:software-engineering
      confidence: primary
