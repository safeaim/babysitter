nodeKind: SkillArea
id: skill-area:mentorship
attributes:
  displayName: "Mentorship"
  description: |
    Supporting the growth of engineers and technical contributors through deliberate
    guidance, skill-building feedback, and career conversation. Creates compounding
    organizational capability by transferring tacit knowledge, accelerating onboarding,
    and helping individuals navigate growth opportunities that formal processes alone
    do not surface.
  domains:
    - domain:software-engineering
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:software-engineering
      confidence: primary
