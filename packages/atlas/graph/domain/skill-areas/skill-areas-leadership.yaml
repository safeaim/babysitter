nodeKind: SkillArea
id: skill-area:cross-team-coordination
attributes:
  displayName: "Cross-Team Coordination"
  description: |
    Managing dependencies, communication, and alignment between multiple engineering
    teams or platform consumers - dependency tracking, RFC and RFC-adjacent processes,
    shared on-call coverage, and resolving conflicting priorities across group
    boundaries. Essential for platform organizations where many teams share
    infrastructure and must release or deprecate safely.
  domains:
    - domain:software-engineering
    - domain:platform-engineering
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:software-engineering
      confidence: primary
    - target: domain:platform-engineering
      confidence: secondary
