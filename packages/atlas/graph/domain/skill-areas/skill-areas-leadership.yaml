id: skill-area:hiring-interviewing
attributes:
  displayName: "Hiring and Interviewing"
  description: |
    Designing and running effective engineering hiring processes - job definition,
    structured interview loops, rubric calibration, and inclusive sourcing practices.
    Balances speed, signal quality, and candidate experience while reducing bias
    to build diverse teams capable of executing on the organization's technical
    and cultural goals.
  domains:
    - domain:software-engineering
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:software-engineering
      confidence: primary
