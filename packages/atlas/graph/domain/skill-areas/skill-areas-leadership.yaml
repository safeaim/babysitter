  displayName: "Technical Leadership"
  description: |
    Setting technical direction for teams and systems - architecture ownership,
    standard-setting, cross-team design review, and translating engineering concerns
    into language business stakeholders can act on. Combines deep technical judgment
    with the communication and influence skills needed to align teams around
    coherent long-term approaches.
