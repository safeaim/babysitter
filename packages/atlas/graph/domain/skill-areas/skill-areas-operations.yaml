id: skill-area:change-management-ops
attributes:
  displayName: "Change Management (Operations)"
  description: |
    Governing how changes are introduced into production and shared infrastructure -
    change advisory processes, pre-change risk assessment, deployment windows,
    communication protocols, and rollback readiness. Balances delivery speed with
    operational stability and provides auditability for regulated or high-availability
    environments across DevOps and platform engineering.
  domains:
    - domain:devops
    - domain:platform-engineering
  expertiseLevels: [intermediate, expert]
