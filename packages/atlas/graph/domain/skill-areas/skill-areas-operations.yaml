nodeKind: SkillArea
id: skill-area:capacity-planning-ops
attributes:
  displayName: "Capacity Planning"
  description: |
    Forecasting infrastructure resource needs and ensuring systems can handle
    projected load - demand modeling, headroom analysis, cost-performance tradeoffs,
    and scaling trigger design. Prevents both over-provisioning waste and under-
    provisioning outages by linking traffic growth, release cadence, and cloud
    resource procurement across DevOps and cloud infrastructure.
  domains:
    - domain:devops
    - domain:cloud-infra
  expertiseLevels: [intermediate, expert]
edges:
  applies_to:
    - target: domain:devops
      confidence: primary
    - target: domain:cloud-infra
      confidence: secondary
