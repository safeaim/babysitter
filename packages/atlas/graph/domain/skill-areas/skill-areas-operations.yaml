nodeKind: SkillArea
id: skill-area:vendor-management-ops
attributes:
  displayName: "Vendor Management (Operations)"
  description: |
    Selecting, integrating, and managing third-party services and tooling vendors
    that support engineering and operations - evaluation criteria, contract and SLA
    negotiation, operational dependency tracking, and exit planning. Ensures
    vendor relationships support rather than constrain engineering autonomy and
    system reliability goals.
  domains:
    - domain:software-engineering
  expertiseLevels: [intermediate, expert]
