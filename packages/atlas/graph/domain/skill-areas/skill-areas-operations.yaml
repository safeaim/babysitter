nodeKind: SkillArea
id: skill-area:runbook-authoring
attributes:
  displayName: "Runbook Authoring"
  description: |
    Writing clear, actionable operational runbooks that guide on-call engineers
    through diagnosis and remediation steps for known failure modes. Covers
    procedure structure, alert linkage, decision trees, automation integration,
    and continuous runbook maintenance to reflect current system reality in
    SRE and operations practices.
  domains:
    - domain:devops
    - specialization:sre
  expertiseLevels: [intermediate, expert]
