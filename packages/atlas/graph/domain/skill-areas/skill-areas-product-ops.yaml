attributes:
  displayName: "A/B Testing"
  description: |
    Designing and analyzing controlled experiments to validate product or UX hypotheses
    with real user traffic - variant assignment, statistical power, guardrail metrics,
    and decision frameworks for shipping or reverting changes. Bridges data science
    rigor with rapid product iteration cycles.
