nodeKind: SkillArea
id: skill-area:roadmap-planning
attributes:
  displayName: "Roadmap Planning"
  description: |
    Organizing and sequencing product work across time horizons - balancing
    new capabilities, technical debt, discovery work, and operational health.
    Involves stakeholder communication, dependency mapping, capacity-aware scheduling,
    and maintaining a shared understanding of what is committed versus exploratory.
  domains:
    - domain:software-engineering
  expertiseLevels: [intermediate, expert]
