id: skill-area:product-analytics
attributes:
  displayName: "Product Analytics"
  description: |
    Measuring and understanding how users interact with a product through event
    instrumentation, funnel analysis, retention cohorts, and behavioral segmentation.
    Provides the quantitative foundation for product decisions, OKR tracking, and
    identifying growth or quality opportunities within the data engineering ecosystem.
  domains:
