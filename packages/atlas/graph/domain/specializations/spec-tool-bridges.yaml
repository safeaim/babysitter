# Bridges connecting specializations to tools, frameworks, and libraries.
# Fixes F12: Many specializations had zero edges to Tool/Framework/Library.
# The indexer merges edges from duplicate node IDs, so we re-declare
# each specialization here solely to attach new uses_tool / uses_framework
# / uses_library edges. The record attributes are ignored (original wins).

# ── web-development ──────────────────────────────────────────────────
---
nodeKind: Specialization
id: specialization:web-development
edges:
  uses_framework:
    - framework:react
    - framework:nextjs
    - framework:vue
    - framework:angular
    - framework:svelte
  uses_tool:
    - tool:vite
    - tool:webpack
  uses_library:
    - library:tailwindcss

