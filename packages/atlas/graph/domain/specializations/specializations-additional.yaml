nodeKind: Specialization
id: specialization:observability
attributes:
  displayName: "Observability"
  parentDomainId: domain:observability
  description: |
    Designing, instrumenting, and operating observability systems that provide
    deep insight into distributed application behavior. Covers the three
    pillars — structured logging, distributed tracing (OpenTelemetry, Jaeger),
    and metrics (Prometheus, Datadog) — plus alerting strategies, SLI/SLO
    management, dashboarding, and log aggregation pipelines. Addresses
    observability-driven development, cost-effective telemetry at scale, and
    correlation of signals across service boundaries. Sourced from
    library/specializations/observability/.
edges:
  specializes:
    - domain:observability
---
nodeKind: Specialization
id: specialization:media
attributes:
  displayName: "Media Processing"
  parentDomainId: domain:media-entertainment
  description: |
    Audio, video, and image processing pipelines — encoding/decoding,
    transcoding, streaming protocols (HLS, DASH, WebRTC), and media asset
    management. Covers FFmpeg workflows, real-time media manipulation,
    adaptive bitrate streaming, content delivery via CDNs, and media
    metadata extraction. Includes computer vision pre-processing, speech
    processing, and generative media workflows. Sourced from
    library/specializations/media/.
edges:
  specializes:
    - domain:media-entertainment
