  parentDomainId: domain:software-engineering
  description: |
    Patterns and tools for effective engineering collaboration — code review
    workflows, pair and mob programming, asynchronous communication norms,
    knowledge sharing systems, and collaborative development environments.
    Covers git workflow design, PR conventions, RFC processes, design-doc
    cultures, and internal developer portals that reduce friction in multi-
    team engineering organizations. Sourced from
    library/specializations/collaboration/.
edges:
  specializes:
    - domain:software-engineering
