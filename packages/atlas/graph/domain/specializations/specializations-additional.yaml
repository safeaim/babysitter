nodeKind: Specialization
id: specialization:security-compliance
attributes:
  displayName: "Security & Compliance"
  parentDomainId: domain:cybersecurity
  description: |
    Comprehensive security engineering and compliance automation — covering
    application security (SAST/DAST/SCA), infrastructure hardening, identity
    and access management, and regulatory compliance programs (SOC 2, ISO
    27001, GDPR, HIPAA). Addresses security architecture reviews, threat
    modeling, vulnerability management workflows, and security operations
    center (SOC) practices. Bridges offensive and defensive security with
    governance, risk, and compliance (GRC) requirements. Sourced from
    library/specializations/security-compliance/.
edges:
  specializes:
    - domain:cybersecurity
