attributes:
  displayName: "Data Science & Machine Learning"
  parentDomainId: domain:data-science
  description: |
    End-to-end data science and machine learning workflows — from exploratory
    data analysis and feature engineering through model training, evaluation,
    and deployment. Covers classical ML (scikit-learn, XGBoost), deep learning
    (PyTorch, TensorFlow), NLP, computer vision, and time-series modeling.
    Addresses experiment tracking, reproducibility, model interpretability,
    and the transition from notebook prototypes to production-grade ML
    systems. Sourced from library/specializations/data-science-ml/.
