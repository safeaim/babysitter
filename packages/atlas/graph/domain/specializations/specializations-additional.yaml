nodeKind: Specialization
id: specialization:desktop-development
attributes:
  displayName: "Desktop Development"
  parentDomainId: domain:software-engineering
  description: |
    Building native and cross-platform desktop applications using frameworks
    such as Electron, Tauri, Qt, GTK, WPF, SwiftUI for macOS, and .NET MAUI.
    Covers windowing systems, native OS integration, file-system access,
    system-tray and notification APIs, auto-update mechanisms, and platform-
    specific packaging and distribution (MSI, DMG, AppImage, Snap). Addresses
    performance concerns unique to desktop — GPU compositing, IPC between
    main and renderer processes, and memory management for long-running
    applications. Sourced from library/specializations/desktop-development/.
edges:
  specializes:
    - domain:software-engineering
---
nodeKind: Specialization
id: specialization:product-management
attributes:
  displayName: "Product Management"
  parentDomainId: domain:project-management
  description: |
    Strategic and tactical product management — discovery, prioritization,
    roadmap construction, stakeholder alignment, and metrics-driven iteration.
    Covers frameworks like RICE, ICE, and opportunity-solution trees; user
    research integration; competitive analysis; pricing strategy; and go-to-
    market coordination. Bridges business objectives with engineering
    execution through well-defined requirements, acceptance criteria, and
    continuous product analytics feedback loops. Sourced from
    library/specializations/product-management/.
edges:
  specializes:
    - domain:project-management
