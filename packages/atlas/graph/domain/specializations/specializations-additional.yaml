id: specialization:backend-development
attributes:
  displayName: "Backend Development"
  parentDomainId: domain:backend
  description: |
    General-purpose backend engineering spanning API design, service
    architecture, data persistence, authentication, background processing,
    and operational concerns like logging, monitoring, and deployment.
    Covers language-agnostic backend patterns — request lifecycle, middleware
    chains, connection pooling, rate limiting, and graceful shutdown — that
    apply across frameworks and runtimes. Sourced from
    library/specializations/backend-development/.
