    Service that classifies and challenges automated traffic. Examples:
    Cloudflare Bot Management, DataDome, hCaptcha, Akamai Bot Manager.
edges:
  implemented_by:
    - target: tool:datadome
---
nodeKind: StackPart
id: stack-part:auth-broker
attributes:
