nodeKind: StackProfile
id: stack-profile:mobile-first-stack
attributes:
  displayName: "Mobile-First Stack (React Native/Flutter, Firebase, GraphQL, Expo)"
  description: |
    A mobile-first application stack: React Native or Flutter as the
    cross-platform UI framework, Firebase as the managed backend
    providing authentication, real-time database, cloud functions, and
    push notifications, GraphQL as the API query language for flexible
    client-driven data fetching, and Expo as the development and build
    toolchain for React Native.

    This stack prioritizes mobile development velocity. React Native
    and Flutter both enable single-codebase development for iOS and
    Android. Firebase eliminates the need for a custom backend for
    common mobile patterns (auth, real-time sync, file storage, crash
    reporting). GraphQL reduces over-fetching on bandwidth-constrained
    mobile networks by letting the client specify exactly which fields
    it needs. Expo provides over-the-air updates, managed builds, and
    a rich set of native module wrappers. The combination is popular
    for startups and indie developers shipping consumer mobile apps
    with small teams.
  composes:
    - language:typescript
    - language:dart
    - framework:react
    - framework:flutter
    - language:graphql
    - tool:firebase-auth
edges:
  composed_of:
    - language:typescript
    - language:dart
    - framework:react
    - framework:flutter
    - language:graphql
    - tool:firebase-auth
