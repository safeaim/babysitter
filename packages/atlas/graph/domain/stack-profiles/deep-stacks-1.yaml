nodeKind: StackProfile
id: stack-profile:monorepo-fullstack
attributes:
  displayName: "Monorepo Full-Stack Stack (Turborepo, Next.js, NestJS, Prisma, PostgreSQL)"
  description: |
    A TypeScript-first monorepo architecture for full-stack web applications
    where frontend, backend, and shared libraries live in a single
    repository with unified tooling. Turborepo provides incremental builds,
    remote caching, and task orchestration across packages. Next.js serves
    the frontend with SSR, ISR, and API routes. NestJS provides a structured
    backend framework with dependency injection, guards, and decorators.

    Prisma handles database access with a type-safe ORM, auto-generated
    client, and declarative schema migrations. PostgreSQL is the production
    database. TypeScript spans every package, enabling shared types and
    validation schemas (via Zod) between frontend and backend without code
    duplication. This stack suits product-focused teams of 5-20 engineers
    who want maximal code sharing and a single CI pipeline. The tradeoff
    is monorepo complexity — build caching, dependency hoisting, and CI
    performance require ongoing attention as the repo grows.
