nodeKind: StackProfile
id: stack-profile:stream-processing
attributes:
  displayName: "Stream Processing Stack (Kafka, Flink, Schema Registry, Prometheus)"
  description: |
    A real-time event streaming architecture for continuous data processing
    at scale. Apache Kafka serves as the durable, distributed event log
    while Apache Flink (or Spark Structured Streaming) provides exactly-once
    stream processing with event-time windowing, watermarks, and stateful
    aggregations.

    Confluent Schema Registry enforces Avro or Protobuf contracts between
    producers and consumers, preventing schema drift from breaking
    downstream systems. Prometheus and Grafana monitor consumer lag, pipeline
    throughput, and processing latency. This stack is ideal for fraud
    detection, clickstream analytics, IoT telemetry pipelines, and any
    workload where batch latency is unacceptable. The primary tradeoff is
    operational complexity — managing Kafka clusters, Flink checkpoints,
    and exactly-once semantics requires deep infrastructure expertise.
  composes:
    - language:java
    - language:python
    - language:protobuf
    - tool:prometheus
    - tool:grafana
edges:
  composed_of:
