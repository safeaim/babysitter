id: stack-profile:multi-agent-orchestration
attributes:
  displayName: "Multi-Agent Orchestration Stack (LangGraph, CrewAI, Redis, PostgreSQL, FastAPI)"
  description: |
    An architecture for building systems where multiple AI agents collaborate
    on complex tasks through structured workflows. LangGraph provides
    graph-based agent orchestration with cycles, branching, and human-in-the-loop
    checkpoints. CrewAI enables role-based multi-agent teams with delegation
    and sequential or parallel task execution.

    Redis serves as the shared memory and message-passing layer between
    agents. PostgreSQL stores persistent state, conversation histories, and
    structured outputs. FastAPI exposes the orchestration layer as an async
    HTTP/WebSocket API. Python is the primary language. This stack excels
    at research automation, complex document processing, and multi-step
    decision workflows. The main tradeoff is debugging complexity — tracing
    failures across multiple agent hops requires robust logging and
    observability tooling like LangSmith or Langfuse.
