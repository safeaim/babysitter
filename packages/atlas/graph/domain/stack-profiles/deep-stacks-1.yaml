id: stack-profile:security-operations
attributes:
  displayName: "Security Operations Stack (Trivy, Falco, OPA, Vault, Snyk)"
  description: |
    A defense-in-depth security toolchain for cloud-native environments
    covering vulnerability scanning, runtime threat detection, policy
    enforcement, and secrets management. Trivy scans container images,
    filesystems, and IaC templates for known vulnerabilities and
    misconfigurations. Falco monitors Linux kernel syscalls at runtime to
    detect anomalous behavior — container escapes, unexpected network
    connections, and privilege escalations.

    OPA (Open Policy Agent) enforces admission control policies on
    Kubernetes resources and API requests using Rego rules. Vault manages
    secrets, certificates, and dynamic credentials with automatic rotation.
    Snyk integrates into CI pipelines for dependency vulnerability analysis
    and license compliance. Go and Python are the primary languages for
    custom policy engines and automation scripts. This stack suits security
    teams responsible for container and Kubernetes environments.
  composes:
