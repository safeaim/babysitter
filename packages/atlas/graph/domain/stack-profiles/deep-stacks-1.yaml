id: stack-profile:voice-ai-agent
attributes:
  displayName: "Voice AI Agent Stack (Whisper, TTS, WebSocket, FastAPI, React)"
  description: |
    An end-to-end voice-powered AI agent architecture for building
    conversational interfaces with speech input and output. OpenAI Whisper
    (or whisper.cpp) handles automatic speech recognition, converting audio
    streams to text. A text-to-speech engine synthesizes agent responses
    back to audio. WebSocket connections enable full-duplex, low-latency
    audio streaming between client and server.

    FastAPI serves as the async backend, coordinating ASR, LLM inference,
    and TTS in a streaming pipeline. React powers the frontend with audio
    capture, playback, and visual feedback. Python handles all server-side
    logic including audio preprocessing and LLM integration. This stack
    suits voice assistants, call center copilots, and accessibility-first
    applications. The main tradeoff is latency — the ASR-to-TTS round trip
    must stay under 1-2 seconds for natural conversation flow.
