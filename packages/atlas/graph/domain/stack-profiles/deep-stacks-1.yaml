id: stack-profile:feature-store-mlops
attributes:
  displayName: "Feature Store & MLOps Stack (Feast, MLflow, BentoML, K8s, Prometheus)"
  description: |
    A production MLOps platform centered on feature management and model
    lifecycle governance. Feast provides a feature store that bridges
    offline training (batch features from the warehouse) and online serving
    (low-latency feature lookups via Redis or DynamoDB), ensuring
    train-serve consistency.

    MLflow tracks experiments, registers model versions, and manages the
    promotion pipeline from staging to production. BentoML packages trained
    models into containerized inference services with adaptive batching
    and multi-model serving. Kubernetes orchestrates both training jobs and
    serving deployments with autoscaling. Prometheus monitors inference
    latency, feature freshness, and data drift. Choose this stack when
    your ML team needs reproducible pipelines, governed model promotion,
    and feature reuse across multiple models.
  composes:
