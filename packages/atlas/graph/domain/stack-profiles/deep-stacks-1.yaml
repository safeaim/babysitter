  description: |
    A developer tooling stack for building and operating AI-powered coding
    agents that autonomously navigate codebases, write code, run tests,
    and submit pull requests. Claude Code (or similar agentic coding CLIs)
    provides the core agent loop with tool use, file editing, and terminal
    access. hooks-mux intercepts and orchestrates tool calls for custom
    validation, logging, and policy enforcement.

    Git provides version control with branching strategies for agent-authored
    changes. Docker isolates agent execution environments. TypeScript is
    the primary language for plugin development, hook scripts, and
    orchestration logic. This stack is suited for teams building internal
    developer platforms, CI-integrated code review bots, or autonomous
    maintenance agents. The key tradeoff is trust boundaries — agents need
