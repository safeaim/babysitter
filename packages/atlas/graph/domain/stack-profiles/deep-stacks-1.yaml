nodeKind: StackProfile
id: stack-profile:data-lakehouse
attributes:
  displayName: "Data Lakehouse Stack (Databricks, Spark, Delta Lake, dbt, Airflow)"
  description: |
    A unified analytics platform that combines the flexibility of a data
    lake with the ACID transaction guarantees and performance of a data
    warehouse. Databricks provides the managed Spark runtime and Delta Lake
    table format for schema evolution, time travel, and MERGE operations on
    cloud object storage.

    dbt handles the transformation layer, turning raw ingested tables into
    tested, documented analytical models. Airflow orchestrates the end-to-end
    pipeline from ingestion through transformation to consumption. Python
    serves as the glue language for custom operators, UDFs, and notebooks.
    Choose this stack when you need a single copy of data serving both BI
    dashboards and ML feature engineering, and when your data volumes exceed
    what a traditional warehouse handles cost-effectively.
  composes:
