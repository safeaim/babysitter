id: stack-profile:cicd-platform
attributes:
  displayName: "CI/CD Platform (GitHub Actions + Docker + Kubernetes + Terraform + ArgoCD)"
  description: |
    A continuous integration and delivery platform: GitHub Actions provides
    event-driven CI pipelines triggered by pushes, PRs, and schedules;
    Docker packages applications into portable container images; Kubernetes
    runs workloads in production; Terraform manages cloud infrastructure
    as code; and ArgoCD implements GitOps-based continuous delivery by
    syncing Kubernetes manifests from Git repositories.

    The pipeline flow is: code push triggers GitHub Actions, which runs
    tests, builds a Docker image, pushes it to a container registry, and
    updates a Kubernetes manifest in a GitOps repo. ArgoCD detects the
    manifest change and reconciles the cluster state. Terraform manages
    the underlying cloud resources (VPCs, databases, DNS). Helm templates
    parameterize Kubernetes manifests across environments. This stack is
    the modern standard for teams practicing GitOps. The primary tradeoff
    is the learning curve of Kubernetes and the operational burden of
    maintaining the delivery platform itself.
