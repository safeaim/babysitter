nodeKind: StackProfile
id: stack-profile:graphql-api-platform
attributes:
  displayName: "GraphQL API Platform (Apollo Server + Prisma + PostgreSQL + React + TypeScript)"
  description: |
    A GraphQL-centric API stack: Apollo Server provides the GraphQL
    runtime with schema-first or code-first definition, Prisma generates
    a type-safe database client from a schema file, PostgreSQL serves as
    the relational data store, React with Apollo Client consumes the
    GraphQL API, and TypeScript ensures end-to-end type safety from
    database schema through API resolvers to client queries.

    Apollo Server's plugin system supports caching, tracing, and
    authentication middleware. Prisma's relation mapping and migration
    engine keep the database schema in sync with the application model.
    Apollo Client provides a normalized cache that deduplicates entities
    across queries, reducing redundant network requests. Code generation
    tools (graphql-codegen) produce typed hooks from GraphQL operations.
    This stack excels for applications with complex, deeply nested data
    models where different clients need different views of the same data.
    The primary tradeoff is the N+1 query problem in resolvers, requiring
    DataLoader batching, and the added complexity of a query language
    versus simple REST endpoints.
  composes:
    - library:prisma
    - library:apollo-client
    - framework:react
    - language:typescript
    - language:graphql
    - language:sql
    - library:graphql-tools
    - library:type-graphql
    - library:zod
