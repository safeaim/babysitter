id: stack-profile:content-management-platform
attributes:
  displayName: "Content Management Platform (Strapi/Directus + Next.js + PostgreSQL)"
  description: |
    A headless CMS architecture pairing Strapi or Directus as the content
    management backend with Next.js as the frontend rendering layer,
    PostgreSQL for structured content storage, S3-compatible object storage
    for media assets, and Redis for API response caching and session state.

    This stack decouples content authoring from presentation, enabling the
    same content API to serve web, mobile, and third-party consumers. Strapi
    provides a customizable admin panel with role-based access control and
    webhook-driven publishing workflows. Next.js renders pages via SSR, SSG,
    or ISR depending on freshness requirements. The tradeoff is operational
    complexity versus flexibility: teams gain full control over the frontend
    experience at the cost of maintaining two deployable services instead of
    a monolithic CMS like WordPress. Best suited for marketing sites, blogs,
    documentation portals, and multi-channel content distribution.
