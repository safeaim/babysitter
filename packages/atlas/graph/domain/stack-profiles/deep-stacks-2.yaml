  description: |
    A game server backend stack: Rust or Go provides the high-performance
    server runtime for game state management and authoritative simulation,
    WebSocket connections maintain persistent bidirectional channels between
    clients and server for real-time gameplay, Redis serves as the in-memory
    store for session state, matchmaking queues, and leaderboards, and
