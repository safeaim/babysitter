id: stack-profile:desktop-application
attributes:
  displayName: "Desktop Application (Electron/Tauri + React + SQLite + TypeScript)"
  description: |
    A cross-platform desktop application stack: Electron or Tauri as the
    desktop runtime wrapping a web-based UI, React for the application
    interface, SQLite as the local embedded database, and TypeScript
    throughout for type safety across main and renderer processes.

    Electron bundles Chromium and Node.js, offering full web API
    compatibility at the cost of large binary size (~150MB+) and higher
    memory usage. Tauri uses the system webview and a Rust backend,
    producing much smaller binaries (~10MB) with lower memory overhead
    but requiring Rust knowledge for native functionality. Both support
    auto-updates, system tray integration, native menus, and file system
    access. SQLite provides offline-capable local storage without requiring
    a database server. This stack suits developer tools, productivity apps,
    creative applications, and any software requiring offline capability
    and OS integration. The key tradeoff is Electron's resource overhead
    versus Tauri's narrower browser compatibility.
