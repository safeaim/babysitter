id: stack-profile:healthcare-hipaa-compliant
attributes:
  displayName: "Healthcare / HIPAA Compliant (Node.js + PostgreSQL + Vault + React)"
  description: |
    A HIPAA-compliant application stack for healthcare software: Node.js
    with Express or Fastify as the API layer with strict audit logging,
    PostgreSQL with column-level encryption for protected health information
    (PHI), HashiCorp Vault for secrets management and encryption-as-a-service,
    and React for the clinician-facing or patient-facing UI with role-based
    access controls.

    Every API request is logged with actor identity, resource accessed, and
    timestamp for the audit trail required by HIPAA. Vault provides transit
    encryption so the application never handles raw encryption keys. Database
    connections use TLS, and row-level security in PostgreSQL enforces
    tenant isolation for multi-provider deployments. This stack suits EHR
    integrations, telemedicine platforms, patient portals, and clinical data
    tools. The primary tradeoff is development velocity: HIPAA compliance
    adds mandatory access controls, encryption, audit logging, and breach
    notification procedures that increase both code complexity and
    operational overhead.
