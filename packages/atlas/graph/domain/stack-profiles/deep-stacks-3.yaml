nodeKind: StackProfile
id: stack-profile:grpc-microservice-mesh
attributes:
  displayName: "gRPC Microservice Mesh Stack (Go, gRPC, Kubernetes, PostgreSQL, Prometheus)"
  description: |
    A polyglot microservice architecture using gRPC and Protocol Buffers
    for strongly-typed, high-performance inter-service communication. Go
    is the primary service language for its low overhead and fast compile
    times. Kubernetes orchestrates service deployment, scaling, and
    service discovery. PostgreSQL provides per-service databases following
    the database-per-service pattern. Prometheus and Grafana deliver
    service-level metrics (request rates, error rates, latencies) across
    the mesh. Protobuf schemas serve as the single source of truth for
    API contracts, enabling automated client code generation in any
    language. The tradeoff is significant upfront complexity — teams
    must manage Protobuf schema versioning, gRPC interceptor chains,
    distributed tracing, and Kubernetes networking before shipping their
    first feature.
  composes:
    - language:go
    - language:protobuf
    - library:grpc-js
