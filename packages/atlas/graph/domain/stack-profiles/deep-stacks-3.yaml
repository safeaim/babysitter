id: stack-profile:job-queue-worker-pool
attributes:
  displayName: "Job Queue / Worker Pool Stack (Node.js, BullMQ, Redis, PostgreSQL, Docker)"
  description: |
    A background job processing system using BullMQ for reliable, Redis-backed
    task queues with automatic retries, exponential backoff, rate limiting,
    and priority scheduling. Workers run in separate Node.js processes or
    containers, enabling independent scaling of producers and consumers.
    PostgreSQL stores job results, audit logs, and configuration while
    Redis manages the queue state, delayed jobs, and repeatable schedules.
    Pino provides structured logging for tracing job execution across
    distributed workers. Docker Compose orchestrates the local development
    stack with Redis, PostgreSQL, and multiple worker replicas. This stack
    is ideal for email sending, report generation, data imports, and any
    workload that must be decoupled from the HTTP request cycle. The
    tradeoff is Redis as a single point of failure for queue state.
  composes:
    - language:typescript
