id: stack-profile:chat-messaging-platform
attributes:
  displayName: "Chat / Messaging Platform Stack (React, Socket.io, Redis, PostgreSQL, TypeScript)"
  description: |
    A real-time chat and messaging platform where low-latency message
    delivery is the primary design constraint. React provides the client
    with optimistic UI updates and infinite-scroll message history.
    Socket.io manages persistent WebSocket connections with automatic
    reconnection and room-based routing for channels and direct messages.
    Redis pub/sub enables horizontal scaling across multiple Socket.io
    server instances, while Redis sorted sets power unread counts and
    typing indicators. PostgreSQL stores message history, user profiles,
    and channel metadata. Sharp handles image thumbnails for file
    attachments. The primary tradeoff is connection management at scale —
    each concurrent user holds an open WebSocket, so connection limits,
    heartbeats, and graceful reconnection require careful engineering.
  composes:
