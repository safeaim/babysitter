nodeKind: StackProfile
id: stack-profile:event-sourcing-cqrs
attributes:
  displayName: "Event Sourcing / CQRS Stack (TypeScript, NestJS, PostgreSQL, Redis, Docker)"
  description: |
    An event-sourced architecture implementing Command Query Responsibility
    Segregation (CQRS) where every state change is captured as an immutable
    event in an append-only event store backed by PostgreSQL. NestJS
    provides the application framework with its CQRS module for command
    handlers, event handlers, and sagas. Redis powers the read-side
    projections for fast query performance and caches materialized views.
    NATS or RabbitMQ distributes events to downstream consumers for
    building additional read models or triggering side effects. Docker
    orchestrates the multi-service deployment. This pattern excels for
    domains with complex business rules, audit requirements, and temporal
    queries (what was the state at time T?). The tradeoff is significant
    cognitive overhead — developers must reason about eventual consistency,
    event schema evolution, and projection rebuilds.
  composes:
    - language:typescript
    - framework:nestjs
    - library:prisma
    - library:ioredis
    - tool:nats
    - tool:docker
edges:
