id: stack-profile:high-perf-api-server
attributes:
  displayName: "High-Performance API Server Stack (Go, Chi, PostgreSQL, Redis, Prometheus)"
  description: |
    A low-latency, high-throughput REST API server built on Go and the
    Chi router for its lightweight middleware chain and stdlib-compatible
    handler signatures. PostgreSQL with the pgx driver provides connection
    pooling and prepared-statement caching for sub-millisecond query
    latency. Redis handles response caching, rate limiting, and distributed
    locks. Prometheus and Grafana deliver real-time observability with
    p99 latency histograms and error-rate alerts. Docker enables consistent
    builds and deployment to Kubernetes or bare-metal. This stack excels
    when throughput matters — Go's goroutine scheduler handles tens of
    thousands of concurrent connections with minimal memory overhead. The
    tradeoff is a smaller ecosystem of ready-made libraries compared to
    Node.js or Python, so teams must build more plumbing themselves.
  composes:
