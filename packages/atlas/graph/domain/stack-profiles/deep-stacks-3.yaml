id: stack-profile:multi-tenant-saas-backend
attributes:
  displayName: "Multi-Tenant SaaS Backend Stack (NestJS, Prisma, PostgreSQL, Redis, Stripe, Docker)"
  description: |
    A multi-tenant SaaS backend using NestJS for its modular architecture,
    dependency injection, and built-in support for guards, interceptors,
    and middleware. Prisma provides type-safe database access with tenant
    isolation via row-level security or schema-per-tenant patterns in
    PostgreSQL. Redis handles per-tenant rate limiting, caching, and
    feature flag evaluation. Stripe manages tenant billing, subscription
    tiers, and usage-based metering. Zod validates API payloads at
    runtime. Docker enables consistent deployment across environments.
    This stack is designed for B2B SaaS products where tenant data
    isolation, per-tenant configuration, and usage-based billing are
    first-class concerns. The tradeoff is architectural complexity —
    tenant context must propagate through every layer of the stack, and
    schema migrations must be tested across all tenant configurations.
  composes:
    - framework:nestjs
    - library:prisma
    - library:ioredis
    - tool:stripe
    - tool:docker
    - language:typescript
    - library:zod
