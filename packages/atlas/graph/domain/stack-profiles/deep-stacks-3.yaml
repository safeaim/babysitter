id: stack-profile:serverless-api-multicloud
attributes:
  displayName: "Serverless API Stack (TypeScript, SST, DynamoDB, Lambda, CloudFront)"
  description: |
    A serverless-first API architecture using SST (Serverless Stack) for
    infrastructure-as-code with a developer-friendly local development
    experience. TypeScript provides type-safe Lambda handlers with Zod
    for request validation. The API is fronted by CloudFront for edge
    caching and global distribution. DynamoDB delivers single-digit
    millisecond reads at any scale with a pay-per-request pricing model.
    SST's Live Lambda Dev enables instant feedback during development
    without waiting for CloudFormation deployments. This stack minimizes
    operational overhead — no servers to patch, no capacity planning, and
    costs scale to zero during idle periods. The tradeoff is vendor
    lock-in to AWS primitives and the cold-start latency penalty on
    infrequently-invoked functions, which can be mitigated with
    provisioned concurrency at additional cost.
  composes:
    - language:typescript
    - tool:sst
    - library:zod
    - tool:docker
