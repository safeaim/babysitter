id: stack-profile:realtime-websocket-server
attributes:
  displayName: "Real-Time WebSocket Server Stack (Node.js, Socket.io, Redis, PostgreSQL, TypeScript)"
  description: |
    A dedicated real-time server for pushing live updates to connected
    clients — suitable for collaborative editing, live dashboards, gaming
    lobbies, and notification systems. Socket.io provides the transport
    layer with automatic fallback from WebSocket to long-polling and
    built-in room/namespace management. Redis Adapter enables horizontal
    scaling by syncing events across multiple Socket.io instances via
    pub/sub. PostgreSQL stores persistent state (user sessions, message
    history) while Redis handles ephemeral real-time data (presence,
    typing indicators). Pino provides structured JSON logging for
    debugging connection lifecycle events. The key tradeoff is statefulness —
    WebSocket servers hold long-lived connections, complicating zero-downtime
    deploys and requiring sticky sessions or Redis-backed session migration.
  composes:
    - language:typescript
    - library:socket-io
    - library:ioredis
    - library:prisma
    - library:pino
    - tool:docker
