id: stack-profile:static-site-cdn
attributes:
  displayName: "Static Site + CDN Stack (Astro, Markdown, Cloudflare Workers, TypeScript)"
  description: |
    A content-focused static site architecture using Astro for its
    zero-JavaScript-by-default output and island architecture — only
    interactive components ship client-side JS. Content is authored in
    Markdown or MDX, enabling technical writers and developers to
    contribute via Git-based workflows. Cloudflare Workers provide edge
    functions for dynamic features like form handling, redirects, and
    A/B testing without a traditional server. TypeScript ensures type
    safety across Astro components and worker scripts. Tailwind CSS
    delivers a utility-first styling approach. This stack produces the
    fastest possible page loads for documentation sites, blogs, marketing
    pages, and landing pages. The tradeoff is limited interactivity —
    complex client-side state management requires adding a framework
    island (React, Svelte, Vue) which partially negates the performance
    advantages.
  composes:
    - framework:astro
    - language:typescript
    - tool:cloudflare-workers
    - library:tailwindcss
