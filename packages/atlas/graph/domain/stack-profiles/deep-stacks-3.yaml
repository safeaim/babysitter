id: stack-profile:marketplace-platform
attributes:
  displayName: "Marketplace / Two-Sided Platform Stack (Next.js, Stripe, Elasticsearch, Redis)"
  description: |
    A two-sided marketplace architecture for connecting buyers and sellers,
    hosts and guests, or service providers and consumers. Next.js handles
    server-rendered product pages optimized for SEO and fast page loads.
    Stripe Connect manages multi-party payments, payouts to sellers, and
    platform fees. Elasticsearch powers faceted search and filtering across
    listings, while Redis caches hot listing data and manages shopping carts.
    Prisma with PostgreSQL stores users, listings, orders, and reviews.
    The key tradeoff is payment complexity — Stripe Connect's onboarding
    flows and payout timing require significant integration effort, and
    marketplace trust-and-safety (fraud, disputes, chargebacks) adds an
    ongoing operational burden beyond the initial build.
