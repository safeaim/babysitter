id: stack-profile:headless-cms-ssg
attributes:
  displayName: "Headless CMS + SSG Stack (Strapi, Astro, PostgreSQL, Cloudflare Workers, TypeScript)"
  description: |
    A content management architecture decoupling the authoring experience
    from the presentation layer. Strapi provides a self-hosted headless CMS
    with a visual content-type builder, role-based access control, and a
    REST/GraphQL API. Astro generates static HTML at build time from CMS
    content, producing sub-second page loads. Cloudflare Workers handle
    incremental static regeneration and edge-side personalization. PostgreSQL
    stores CMS content, media metadata, and user accounts. TypeScript
    ensures type safety across Astro components and Strapi customizations.
    This stack is ideal for marketing sites, corporate blogs, documentation
    portals, and any content-heavy site where editors need a friendly UI
    and developers need full control over the frontend. The tradeoff is
    build times — large content catalogs require incremental builds or
    on-demand regeneration to avoid multi-minute deploy cycles.
  composes:
    - framework:strapi
    - framework:astro
    - language:typescript
    - tool:cloudflare-workers
    - library:tailwindcss
