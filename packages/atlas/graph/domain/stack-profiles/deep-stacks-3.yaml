id: stack-profile:social-media-platform
attributes:
  displayName: "Social Media Platform Stack (React, GraphQL, PostgreSQL, Redis, Elasticsearch)"
  description: |
    A social media and content-sharing platform architecture using React
    for the web client, GraphQL (via Yoga or Apollo) for a flexible query
    layer that lets mobile and web clients fetch exactly the data they need,
    and PostgreSQL for core relational data (users, posts, relationships).
    Redis handles feeds, caching, and real-time presence, while Elasticsearch
    powers full-text search over user-generated content. TypeScript provides
    end-to-end type safety across client and server. This stack scales
    horizontally but requires careful denormalization of social-graph queries
    and a robust moderation pipeline. The primary tradeoff is operational
    complexity — feed ranking, content moderation, and abuse prevention
    add significant infrastructure beyond the core data layer.
