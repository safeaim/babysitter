attributes:
  displayName: "Project Management App Stack (React, WebSocket, PostgreSQL, Redis, Docker)"
  description: |
    A collaborative project management application inspired by tools like
    Linear and Asana. React with Zustand provides a responsive, real-time
    UI where changes propagate instantly via WebSocket connections managed
    by Socket.io. PostgreSQL stores the core domain model (projects, tasks,
    sprints, comments) while Redis handles pub/sub for real-time
    collaboration, caching, and rate limiting. TypeScript ensures end-to-end
    type safety from database schema to UI components. Docker Compose
    orchestrates the full local development stack. The tradeoff is that
    real-time synchronization and conflict resolution across concurrent
    editors adds significant complexity — eventual consistency bugs are
