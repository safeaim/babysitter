attributes:
  displayName: "AI Code Review Pipeline (Python, AST Analysis, LLM, GitHub Actions, FastAPI)"
  description: |
    An automated code review pipeline that integrates with GitHub pull
    requests via GitHub Actions, parses diffs and ASTs using Python's ast
    module and tree-sitter, feeds structured code context to LLM APIs for
    review comment generation, and posts actionable feedback directly on PRs.
    FastAPI serves a configuration and analytics API where teams tune review
    rules, view false-positive rates, and manage prompt templates. Redis
    caches recent review results to avoid redundant LLM calls on re-pushes.
    Targeted at platform engineering teams building internal code quality
    tooling. The tradeoff is prompt brittleness — LLM review quality varies
    across languages and codebases, requiring ongoing prompt iteration and
    human calibration of comment thresholds.
