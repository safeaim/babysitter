attributes:
  displayName: "Logistics / Fleet Management Stack (Go, PostGIS, Redis, Kafka, React, Grafana)"
  description: |
    A fleet management and logistics optimization platform built on Go
    microservices that ingest real-time GPS telemetry, store geospatial
    position data in PostgreSQL with PostGIS extensions, and cache active
    vehicle states in Redis for sub-second dashboard updates. Kafka handles
    event streaming for route deviation alerts and delivery confirmation
    workflows. A React frontend with map components provides dispatchers
    with live fleet visualization. Grafana monitors fleet health KPIs like
    utilization rate and idle time. Targeted at logistics companies, delivery
    services, and field-service organizations managing 100+ vehicles. The
    tradeoff is telemetry volume — high-frequency GPS pings generate
    substantial write load, requiring careful partitioning and retention
    policies on the geospatial data layer.
