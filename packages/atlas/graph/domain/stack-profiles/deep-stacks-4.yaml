    shell, which bundles a Rust backend with a web-based React frontend into
    lightweight native binaries for Windows, macOS, and Linux. Rust handles
    system-level operations — file I/O, IPC, and native API access — while
    React with TypeScript renders the UI in a webview. SQLite provides
    embedded local data persistence. Tailwind CSS styles the interface.
