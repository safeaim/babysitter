    utilities, and data management apps where Electron's memory footprint
    is unacceptable. The tradeoff is ecosystem maturity — Tauri's plugin
    ecosystem is younger than Electron's, and some native integrations
    (tray menus, system notifications, auto-update) require more manual
    Rust code than their Electron equivalents.
