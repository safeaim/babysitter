attributes:
  displayName: "Legal Document Automation Stack (Python, NLP, Elasticsearch, FastAPI, React, S3)"
  description: |
    A legal document automation platform that ingests contracts, briefs, and
    regulatory filings, applies NLP models for entity extraction, clause
    classification, and risk scoring, and indexes processed documents in
    Elasticsearch for full-text and semantic search. FastAPI serves the
    extraction and search APIs while React provides a review interface where
    attorneys can accept, reject, or refine model suggestions. Boto3 manages
    document storage in S3. Targeted at corporate legal departments and
    legaltech SaaS companies replacing manual contract review. The tradeoff
    is model accuracy — legal language is domain-specific, and NLP models
    require substantial fine-tuning and ongoing human-in-the-loop correction
    to maintain acceptable precision on clause extraction.
