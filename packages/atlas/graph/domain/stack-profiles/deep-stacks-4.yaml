attributes:
  displayName: "Open Source Library Stack (TypeScript, Vitest, Changesets, GitHub Actions, npm)"
  description: |
    A lean open source library development stack optimized for publishing
    high-quality TypeScript packages to npm. Vitest provides fast unit and
    integration testing with native TypeScript support. Changesets manages
    semantic versioning, changelogs, and coordinated releases across packages.
    GitHub Actions automates CI (lint, test, build) and CD (publish to npm
    on merge to main). tsup bundles ESM and CJS outputs with declaration
    files. Designed for individual maintainers and small teams shipping
    reusable libraries. The tradeoff is maintenance burden — open source
    libraries attract issues, PRs, and support requests that scale
    unpredictably, and the CI/CD pipeline must handle contributor forks
    with varying environment configurations.
