attributes:
  displayName: "Supply Chain Visibility Stack (Go, Kafka, PostgreSQL, Grafana, React, Redis)"
  description: |
    A real-time supply chain visibility platform built on Go microservices that
    ingest shipment events via Kafka, persist normalized tracking data in
    PostgreSQL, and cache hot-path lookups in Redis. Grafana dashboards expose
    KPIs like on-time delivery rate, dwell time, and exception counts to
    operations teams. A React frontend provides interactive map views and
    drill-down into individual shipment timelines. Designed for 3PL providers
    and enterprise shippers who need sub-minute latency on shipment status.
    The tradeoff is data quality — carrier integrations vary wildly in
    reliability and schema, requiring robust normalization and fallback logic.
