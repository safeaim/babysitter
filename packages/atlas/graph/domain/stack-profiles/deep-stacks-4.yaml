id: stack-profile:adtech-real-time-bidding
attributes:
  displayName: "AdTech Real-Time Bidding Stack (Go, Redis, Kafka, ClickHouse, Prometheus)"
  description: |
    A low-latency real-time bidding (RTB) platform where Go services evaluate
    bid requests within strict 100ms SLA windows, consulting Redis for user
    segment lookups and campaign budget caps. Kafka streams win notifications
    and impression events into ClickHouse for columnar analytics on campaign
    performance, spend pacing, and attribution. Prometheus and Grafana monitor
    bid latency percentiles and budget burn rates. Built for demand-side
    platforms and ad exchanges handling millions of bid requests per second.
    The core tradeoff is operational intensity — sub-millisecond tail latency
    requires careful memory management, connection pooling, and geographic
    distribution of bidder instances close to exchange endpoints.
