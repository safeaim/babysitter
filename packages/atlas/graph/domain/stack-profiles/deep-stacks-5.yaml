id: stack-profile:webhook-processing
attributes:
  displayName: "Webhook Processing (Node.js, BullMQ, Redis, PostgreSQL, Docker, TypeScript)"
  description: |
    A webhook ingestion and processing pipeline that receives, validates,
    deduplicates, and reliably processes incoming webhooks from third-party
    services like Stripe, GitHub, and Twilio. BullMQ in Redis provides
    ordered job queues with configurable retry policies, dead-letter queues,
    and concurrency control. PostgreSQL stores webhook payloads and processing
    status for audit trails and replayability. HMAC signature verification
    ensures payload authenticity. Docker containers isolate the ingestion
    endpoint from processing workers for independent scaling. Targeted at
    integration teams building robust event-driven architectures. The
    tradeoff is the complexity of idempotency handling and the operational
    burden of monitoring queue depths across many webhook sources.
  composes:
