id: stack-profile:gitops-deployment
attributes:
  displayName: "GitOps Deployment (ArgoCD, Kubernetes, Helm, GitHub Actions, Kustomize)"
  description: |
    A GitOps-driven continuous deployment pipeline where ArgoCD watches Git
    repositories for declarative Kubernetes manifests and automatically
    reconciles cluster state. Helm charts provide templated packaging for
    microservices while Kustomize handles environment-specific overlays.
    GitHub Actions runs CI builds, image pushes, and manifest generation,
    with ArgoCD handling the CD half. Prometheus monitors deployment health
    and triggers rollback alerts. Ideal for platform teams managing dozens
    of services across multiple clusters. The tradeoff is operational
    complexity in managing Helm chart versions and Kustomize overlay sprawl.
  composes:
