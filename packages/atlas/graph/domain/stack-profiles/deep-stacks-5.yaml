id: stack-profile:visual-regression-testing
attributes:
  displayName: "Visual Regression Testing (Chromatic, Storybook, Playwright, React, TypeScript)"
  description: |
    A visual regression testing pipeline that uses Storybook to isolate UI
    components and Chromatic to capture pixel-perfect snapshots across every
    pull request. Playwright provides supplementary full-page visual
    comparisons for critical user flows that span multiple components. React
    and TypeScript power the component library with strict type safety.
    GitHub Actions triggers visual reviews on every PR, and Chromatic's
    built-in review workflow lets designers approve or reject visual changes
    before merge. Targeted at design-system teams that need to prevent
    accidental UI regressions across hundreds of components. The tradeoff
    is snapshot storage costs and false positives from sub-pixel rendering
    differences across browser versions.
