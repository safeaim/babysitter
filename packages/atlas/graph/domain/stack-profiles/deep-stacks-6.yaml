attributes:
  displayName: "Photo Gallery / DAM (React, Sharp, Boto3, PostgreSQL, Redis, FastAPI)"
  description: |
    A digital asset management system for photographers and creative teams
    to upload, organize, transform, and distribute image assets at scale.
    FastAPI handles asset ingestion with background workers that use Sharp
    for on-the-fly image resizing, format conversion, and thumbnail
    generation. React powers the gallery interface with lazy-loaded grid
    views, lightbox previews, and bulk metadata editing. Boto3 manages
    cloud object storage with lifecycle policies for tiered storage costs.
    PostgreSQL stores asset metadata, tags, collections, and access
    permissions. Redis caches image transformation results and CDN
    invalidation queues. The tradeoff is storage cost management for
    high-resolution originals and the complexity of color profile
    preservation across format conversions.
