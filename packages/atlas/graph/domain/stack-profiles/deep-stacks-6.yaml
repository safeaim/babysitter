attributes:
  displayName: "Government Portal (.NET, Blazor, PostgreSQL, Keycloak, Docker, Azure)"
  description: |
    A citizen-facing government services portal built on .NET with Blazor
    Server for interactive, accessibility-compliant web interfaces that
    meet WCAG 2.1 AA standards. Keycloak provides federated identity
    management supporting government SSO standards and multi-factor
    authentication. PostgreSQL stores citizen records, application forms,
