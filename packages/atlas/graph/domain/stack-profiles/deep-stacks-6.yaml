  displayName: "Online Exam / Assessment (Next.js, PostgreSQL, Redis, Docker, TypeScript)"
  description: |
    A secure online examination platform supporting timed assessments,
    auto-grading, and proctoring integration for educational institutions
    and certification bodies. Next.js delivers the exam interface with
