attributes:
  displayName: "Music Streaming (Rust, Redis, PostgreSQL, Boto3, React, TypeScript)"
  description: |
    A music streaming backend optimized for low-latency audio delivery and
    catalog management. Rust powers the audio serving layer with zero-copy
    byte range responses for adaptive bitrate streaming, achieving
    sub-millisecond response times. PostgreSQL stores the music catalog,
    user playlists, listening history, and royalty accounting records.
    Redis manages session state, playback queues, and real-time listener
    counts for popularity rankings. Boto3 interfaces with cloud object
    storage for the audio file archive with intelligent tiering. React
    delivers the web player with gapless playback, queue management, and
    social sharing. The tradeoff is the complexity of royalty calculation
    accuracy and the cost of maintaining multiple audio quality tiers.
