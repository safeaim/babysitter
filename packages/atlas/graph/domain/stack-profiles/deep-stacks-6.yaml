attributes:
  displayName: "Podcast Network (Next.js, Boto3, PostgreSQL, Stripe, Redis, TypeScript)"
  description: |
    A multi-show podcast network platform where creators manage episodes,
    schedule releases, and track listener analytics across shows. Next.js
    serves the creator dashboard and public-facing podcast pages with
    server-side rendering for SEO-optimized show directories. Boto3
    handles audio file uploads to cloud object storage with presigned URLs
