  description: |
    A scalable document generation service that renders HTML templates into
    pixel-perfect PDF documents for invoices, reports, certificates, and
    regulatory filings. Puppeteer drives headless Chromium instances to
    render complex layouts with CSS grid, web fonts, and SVG charts that
    match print-quality expectations. TypeScript powers the template engine
    with type-safe data binding and Handlebars-based layout composition.
    Boto3 stores generated PDFs in cloud object storage with presigned
    download URLs and configurable retention policies. Redis manages the
    job queue for asynchronous generation requests, deduplication of
    identical renders, and caching of recently generated documents.
    Docker containers provide isolated Chromium sandboxes with memory
    limits to prevent runaway rendering. The tradeoff is Chromium memory
    consumption per concurrent render and ensuring consistent font
    rendering across container environments.
  composes:
    - language:typescript
    - library:puppeteer
    - library:boto3
    - library:ioredis
    - tool:docker
    - library:express
    - library:handlebars
    - library:bullmq
