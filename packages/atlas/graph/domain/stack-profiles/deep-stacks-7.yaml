id: stack-profile:clean-architecture-stack
attributes:
  displayName: "Clean Architecture (Go, Chi, PostgreSQL, Docker, Testify)"
  description: |
    A Go application organized according to Clean Architecture principles,
    with concentric layers enforcing a strict dependency rule: entities at
    the core, use cases orchestrating business logic, and adapters at the
    outer ring handling HTTP (Chi router), database (pgx for PostgreSQL),
    and external service integration. Each layer communicates through
    interfaces, enabling the domain to be tested in complete isolation.
    Testify provides assertion helpers and mocking for comprehensive test
    suites. Docker containers ship the statically-linked Go binary. The
    tradeoff is more packages and interfaces than idiomatic Go typically
    uses, but the separation ensures that business rules remain stable
    even as frameworks and databases change.
