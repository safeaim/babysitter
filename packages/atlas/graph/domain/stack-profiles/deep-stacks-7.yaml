id: stack-profile:erlang-otp-telecom
attributes:
  displayName: "Erlang / OTP Telecom (Erlang, Docker)"
  description: |
    A telecom-grade service built on Erlang/OTP, leveraging the BEAM virtual
    machine's preemptive scheduling, lightweight process model, and built-in
    distribution primitives for fault-tolerant, soft-real-time systems. OTP
    supervision trees provide automatic restart of failed processes, while
    Mnesia delivers a distributed, replicated database tightly integrated
    with the runtime. Cowboy serves as the HTTP/WebSocket server. Erlang's
    hot code loading enables zero-downtime deployments, and its "let it
    crash" philosophy produces systems that self-heal under failure.
    Docker containers package releases built with Rebar3. The tradeoff
    is Erlang's unfamiliar syntax and the BEAM's limited raw throughput
    for CPU-bound work, but for concurrent, distributed, always-on
    services, nothing else comes close.
  composes:
