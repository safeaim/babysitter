nodeKind: StackProfile
id: stack-profile:backend-for-frontend
attributes:
  displayName: "Backend for Frontend — BFF (TypeScript, Express, GraphQL, React, Docker)"
  description: |
    A Backend for Frontend pattern where a thin TypeScript/Express server
    aggregates and reshapes data from multiple downstream microservices into
    a single GraphQL API tailored to the React frontend's exact needs. The
    BFF eliminates over-fetching by composing precisely the data shapes each
    page component requires, using GraphQL resolvers that fan out to REST
    or gRPC backends. Apollo Client on the frontend provides normalized
    caching and optimistic updates. Docker containers deploy the BFF
    alongside the frontend. The tradeoff is an additional service to
    maintain and the risk of the BFF becoming a "god layer" if not
    scoped carefully, but the pattern dramatically improves frontend
    performance and developer experience.
