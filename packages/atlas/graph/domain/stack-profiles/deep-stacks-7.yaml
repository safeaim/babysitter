id: stack-profile:micro-frontend
attributes:
  displayName: "Micro-Frontend (React, Webpack, TypeScript, Docker)"
  description: |
    A frontend architecture decomposing a large web application into
    independently deployable micro-frontends, each owned by a separate team.
    Webpack Module Federation enables runtime composition, allowing shell
    and remote applications to share dependencies and expose components
    without build-time coupling. Each micro-frontend is a React + TypeScript
    application with its own CI/CD pipeline and Docker container. Shared
    design tokens and a component library maintain visual consistency.
    The shell application handles routing and authentication, loading
    remotes on demand. The tradeoff is increased operational complexity,
    bundle size management challenges, and the need for strict interface
    contracts between teams, but the architecture enables true team
    autonomy at scale.
