  displayName: "Saga / Distributed Transaction (Go, Kafka, PostgreSQL, Redis, gRPC, Docker)"
  description: |
    A distributed transaction orchestration system implementing the Saga
    pattern in Go, where long-running business processes spanning multiple
    microservices are coordinated through a sequence of local transactions
    with compensating actions for rollback. Kafka serves as the durable
    event backbone, ensuring exactly-once delivery semantics for saga
    step transitions. Each participant service exposes gRPC endpoints
    for forward and compensating operations, with PostgreSQL storing
    local transaction state. Redis provides distributed locking and
    idempotency keys. Prometheus and Grafana monitor saga completion
    rates and latency. The tradeoff is significant complexity in
    designing compensation logic and handling partial failures, but
    the pattern enables consistent distributed workflows without
    two-phase commit.
