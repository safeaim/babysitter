  description: |
    A data-oriented microservice built with Julia, exposing analytical
    endpoints that leverage Julia's just-in-time compilation and multiple
    dispatch for numerical computing workloads. PostgreSQL stores structured
    datasets, while Julia's native array operations and broadcasting syntax
    make data transformations concise and performant. Python interop through
    PyCall enables reuse of the Python ML ecosystem where Julia packages
    are lacking. Docker containers bundle the Julia sysimage for faster
    startup in production. The tradeoff is Julia's time-to-first-plot
    latency and the overhead of maintaining a polyglot Python/Julia
