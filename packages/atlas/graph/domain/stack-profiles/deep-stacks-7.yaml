    the write side persists events and aggregates in PostgreSQL through
    NestJS command handlers, while a separate read side projects denormalized
    views into Elasticsearch for fast, flexible querying. Kafka transports
    domain events from the write side to read-model projectors, which
    build optimized search indices and materialized views. TypeScript
    ensures type safety across both sides of the CQRS boundary. Docker
    Compose orchestrates PostgreSQL, Kafka, Elasticsearch, and the
    application services for local development. The tradeoff is eventual
    consistency between write and read models and the operational burden
    of running Kafka and Elasticsearch, but the pattern unlocks independent
    scaling and optimization of reads and writes.
