attributes:
  displayName: "Clojure Ring Service (Java, Docker)"
  description: |
    A web service built with Clojure's Ring HTTP abstraction running on the
    JVM, treating HTTP requests and responses as plain immutable data maps.
    Clojure's persistent data structures and REPL-driven development enable
    rapid iteration, while the JVM provides mature garbage collection,
    JIT compilation, and access to the entire Java ecosystem. PostgreSQL
    handles persistence through JDBC, and the service leverages Clojure's
    built-in concurrency primitives (atoms, refs, agents) for thread-safe
    state management. Docker containers package the uberjar for deployment.
    The tradeoff is JVM startup time and the learning curve of Lisp syntax,
    but the interactive development workflow and data-oriented design
    philosophy yield highly maintainable, composable service code.
