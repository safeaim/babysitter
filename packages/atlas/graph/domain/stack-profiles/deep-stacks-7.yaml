id: stack-profile:hexagonal-architecture-stack
attributes:
  displayName: "Hexagonal Architecture — Ports & Adapters (TypeScript, NestJS, Prisma, PostgreSQL, Docker, Vitest)"
  description: |
    A TypeScript application structured around hexagonal architecture (ports
    and adapters), where the domain core is isolated from all infrastructure
    concerns through explicit port interfaces. NestJS modules map cleanly to
    bounded contexts, with Prisma serving as the persistence adapter and
    Express as the HTTP adapter. Vitest runs fast unit tests against the
    domain core without any infrastructure, while integration tests wire
    up real adapters. Docker Compose orchestrates the full stack for local
    development. The tradeoff is significant upfront boilerplate defining
    port interfaces and adapter mappings, but the architecture pays
    dividends in testability, swappable infrastructure, and long-term
    maintainability of complex domain logic.
