nodeKind: StackProfile
id: stack-profile:spring-boot-stack
attributes:
  displayName: "Spring Boot + Java + Hibernate"
  description: |
    The dominant Java web application stack: Spring Boot for opinionated
    auto-configuration, embedded Tomcat, and starter dependency management;
    Hibernate as the JPA provider for ORM; and Java as the primary language
    (Kotlin is a common drop-in alternative on the same runtime).

    Spring Boot's actuator provides production-ready health checks and
    metrics out of the box. Spring Security handles authentication and
    authorisation. Spring Data JPA repositories reduce boilerplate data
    access code. Flyway or Liquibase manage schema migrations. The stack
    is ubiquitous in enterprise Java, financial services, and large
    organisations with existing JVM investments. Deployment targets
    include traditional application servers, Docker, and Kubernetes.
  composes:
    - language:java
    - library:spring-boot
    - library:hibernate
edges:
  composed_of:
    - language:java
    - library:spring-boot
    - library:hibernate
