nodeKind: StackProfile
id: stack-profile:sveltekit-stack
attributes:
  displayName: "SvelteKit + Tailwind + TypeScript"
  description: |
    A modern full-stack web stack: SvelteKit as the meta-framework with
    file-based routing, server-side rendering, and form actions, Tailwind
    CSS for utility-first styling, and TypeScript throughout.

    SvelteKit's load functions run on the server or client depending on
    the route configuration, enabling hybrid SSR/CSR patterns without the
    complexity of separate client and server repos. Prisma or Drizzle ORM
    are common data-access choices. Vite powers the dev server and build.
    The stack emphasises small bundle sizes and minimal runtime overhead,
    making it well-suited for content sites, dashboards, and SaaS
    applications that care about Core Web Vitals. Deployment targets
    include Vercel, Netlify, and Cloudflare Pages via adapters.
  composes:
    - language:typescript
    - framework:sveltekit
edges:
  composed_of:
    - language:typescript
    - framework:sveltekit
    - framework:svelte
