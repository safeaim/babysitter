nodeKind: StackProfile
id: stack-profile:flutter-firebase-stack
attributes:
  displayName: "Flutter + Firebase + Dart"
  description: |
    A cross-platform mobile application stack: Flutter as Google's UI
    toolkit for building natively compiled apps from a single Dart codebase,
    and Firebase as the managed backend providing Firestore (real-time
    NoSQL), Authentication, Cloud Storage, Cloud Functions, and Analytics.

    Flutter's widget tree and hot-reload cycle enable rapid UI iteration
    across iOS, Android, and web from a single codebase. FlutterFire
    packages provide idiomatic Dart bindings to all Firebase services.
    Riverpod or Bloc are popular state management libraries. This stack
    is the dominant choice for indie developers and small teams shipping
    mobile apps quickly without maintaining a separate backend service.
    Firebase's free Spark tier enables low-cost prototyping.
  composes:
    - language:dart
    - framework:flutter
edges:
  composed_of:
    - language:dart
    - framework:flutter
