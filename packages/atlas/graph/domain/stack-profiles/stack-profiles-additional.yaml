nodeKind: StackProfile
id: stack-profile:laravel-vue-stack
attributes:
  displayName: "Laravel + Vue.js + PHP"
  description: |
    A full-stack PHP web application stack: Laravel as the batteries-
    included MVC framework with Eloquent ORM, queues, and a rich CLI;
    Vue.js as the progressive frontend framework for interactive UIs;
    and PHP as the server-side language.

    Inertia.js is a popular glue layer that lets Vue components act as
    Laravel Blade view replacements without building a separate API.
    Laravel Sail provides a Docker-based local development environment.
    Laravel Horizon monitors Redis queue workers. This stack is popular
    for agencies and SaaS businesses that value PHP's widespread hosting
    availability alongside a modern reactive UI. Deployment targets
    include Laravel Forge, Ploi, and Heroku.
  composes:
    - language:php
    - framework:laravel
    - framework:vue
edges:
  composed_of:
    - language:php
    - framework:laravel
    - framework:vue
