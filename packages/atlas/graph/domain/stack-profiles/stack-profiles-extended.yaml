nodeKind: StackProfile
id: stack-profile:rust-actix-postgres
attributes:
  displayName: "Rust + Actix Web + Diesel + PostgreSQL"
  description: |
    A Rust web application stack using Actix Web as the actor-based HTTP
    framework, Diesel as the compile-time verified ORM, and PostgreSQL as
    the primary relational data store.

    Actix Web provides high-throughput request handling with an actor model
    for concurrent processing. Diesel's derive macros generate type-safe
    query builders at compile time, catching schema mismatches before
    runtime. This stack is popular for services where correctness,
    predictable latency, and memory safety are non-negotiable. Deployment
    commonly targets Docker containers or bare metal, with the resulting
    binary being a single static executable.
  composes:
    - language:rust
    - framework:actix-web
    - library:diesel-rs
edges:
  composed_of:
    - language:rust
    - framework:actix-web
    - library:diesel-rs
