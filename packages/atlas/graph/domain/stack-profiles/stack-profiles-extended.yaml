nodeKind: StackProfile
id: stack-profile:kotlin-ktor-exposed
attributes:
  displayName: "Kotlin + Ktor + Exposed + PostgreSQL"
  description: |
    A Kotlin server-side stack: Ktor as the asynchronous web framework
    built on coroutines, Exposed as the lightweight SQL library with both
    DSL and DAO APIs, and PostgreSQL as the data store.

    Ktor's plugin-based architecture keeps the framework lean — you add
    only the features you need (serialization, authentication, sessions,
    WebSockets). Exposed provides type-safe SQL access with a Kotlin DSL
    that reads like native SQL while catching errors at compile time.
    This stack is popular among Android developers extending to backend
    work and teams that prefer Kotlin's null-safety and coroutine
    concurrency model over Java's thread-based approach. Deployment
    targets include Docker, Kubernetes, and GCP Cloud Run.
  composes:
    - language:kotlin
    - library:ktor
    - library:exposed
edges:
  composed_of:
    - language:kotlin
    - library:ktor
    - library:exposed
