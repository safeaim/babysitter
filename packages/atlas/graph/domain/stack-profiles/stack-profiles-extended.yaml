nodeKind: StackProfile
id: stack-profile:rag-stack
attributes:
  displayName: "RAG Application Stack (Python + LangChain + ChromaDB + FastAPI)"
  description: |
    A reference stack for building retrieval-augmented generation
    applications: Python as the primary language, LangChain for LLM
    orchestration and chain composition, ChromaDB as the vector store
    for document embeddings, and FastAPI as the API layer.

    Documents are ingested, chunked, and embedded into ChromaDB. At query
    time, relevant chunks are retrieved via similarity search and assembled
    into a context window for the LLM. LangChain's retrieval chain
    abstractions handle the retrieval-generation pipeline. FastAPI exposes
    the RAG pipeline as a typed REST API with automatic OpenAPI
    documentation. This stack is the most common starting point for
    teams building document Q&A, knowledge base search, and AI-assisted
    research tools. Production deployments often swap ChromaDB for
    Pinecone or Qdrant and add Celery for async document ingestion.
  composes:
    - language:python
    - framework:langchain
    - framework:fastapi
    - tool:chromadb
edges:
  composed_of:
    - language:python
    - framework:langchain
    - framework:fastapi
    - tool:chromadb
