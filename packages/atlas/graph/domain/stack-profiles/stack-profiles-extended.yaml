nodeKind: StackProfile
id: stack-profile:htmx-go-stack
attributes:
  displayName: "Go + HTMX + Templ + SQLite"
  description: |
    A minimalist full-stack web application stack: Go as the server-side
    language, HTMX for declarative AJAX interactions without writing
    JavaScript, Templ for type-safe HTML templating in Go, and SQLite
    as the embedded database.

    This stack embraces hypermedia as the engine of application state —
    the server returns HTML fragments that HTMX swaps into the DOM,
    eliminating the need for a JavaScript framework, JSON APIs, or
    client-side state management. Templ compiles Go templates at build
    time with full type checking. SQLite provides a zero-ops database
    that travels with the binary. The result is a single-binary
    deployment with minimal infrastructure requirements. Popular for
    internal tools, content sites, and applications where operational
    simplicity matters more than horizontal scalability.
  composes:
    - language:go
    - framework:htmx
edges:
  composed_of:
    - language:go
    - framework:htmx
