nodeKind: StackProfile
id: stack-profile:elixir-phoenix-postgres
attributes:
  displayName: "Elixir + Phoenix + Ecto + PostgreSQL"
  description: |
    An Elixir web application stack combining Phoenix as the web framework,
    Ecto as the database wrapper and query generator, and PostgreSQL as the
    relational database. Phoenix Channels provide real-time WebSocket
    communication, and LiveView enables server-rendered interactive UIs.

    The BEAM virtual machine underpins the stack with lightweight processes,
    preemptive scheduling, and fault isolation via OTP supervision trees.
    This combination excels at high-concurrency, low-latency workloads
    like chat, collaboration, and real-time dashboards. Ecto's changeset
    validation and multi-repo support make data access explicit and
    testable. Deployment targets include Fly.io, Gigalixir, and Docker.
  composes:
    - language:elixir
    - framework:phoenix
    - library:ecto
edges:
  composed_of:
    - language:elixir
    - framework:phoenix
    - library:ecto
