nodeKind: StackProfile
id: stack-profile:dotnet-blazor-stack
attributes:
  displayName: ".NET Blazor + Entity Framework + SQL Server"
  description: |
    A .NET full-stack web application stack: Blazor for interactive web UIs
    using C# instead of JavaScript, Entity Framework Core as the ORM, and
    SQL Server (or PostgreSQL) as the database. Blazor Server renders UI
    on the server with SignalR for real-time updates; Blazor WebAssembly
    runs .NET in the browser via WASM.

    This stack targets enterprises with existing .NET investments. Entity
    Framework's migrations, LINQ queries, and change tracking provide a
    productive data access layer. ASP.NET Core Identity handles
    authentication. The stack benefits from Visual Studio tooling, strong
    typing throughout, and the .NET ecosystem for background processing
    (Hangfire), caching, and messaging. Deployment targets include Azure
    App Service, Docker, and IIS.
  composes:
    - language:csharp
    - framework:blazor
    - library:entity-framework
edges:
  composed_of:
    - language:csharp
    - framework:blazor
    - library:entity-framework
