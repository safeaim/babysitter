nodeKind: StackProfile
id: stack-profile:remix-prisma-stack
attributes:
  displayName: "Remix + Prisma + PostgreSQL"
  description: |
    A TypeScript full-stack web application stack: Remix as the web
    framework with nested routes, loaders, and actions for server-side
    data fetching; Prisma as the type-safe ORM; and PostgreSQL as the
    relational database.

    Remix emphasizes progressive enhancement and web standards — forms
    work without JavaScript, loaders replace client-side data fetching,
    and error boundaries provide granular error handling. Prisma's
    schema-first approach generates a fully typed client that pairs
    naturally with TypeScript. This stack is well-suited for content-rich
    applications, dashboards, and SaaS products that need excellent
    initial load performance. Deployment targets include Vercel, Fly.io,
    and Cloudflare Workers.
  composes:
    - language:typescript
    - framework:remix
    - library:prisma
edges:
  composed_of:
    - language:typescript
    - framework:remix
    - library:prisma
