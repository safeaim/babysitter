nodeKind: StackProfile
id: stack-profile:nuxt-supabase-stack
attributes:
  displayName: "Nuxt + Supabase + TypeScript"
  description: |
    A TypeScript full-stack web application stack: Nuxt as the Vue-based
    meta-framework with file-based routing, SSR, and auto-imports;
    Supabase as the open-source Firebase alternative providing PostgreSQL,
    real-time subscriptions, authentication, and edge functions.

    Nuxt's server routes and Supabase's auto-generated REST/GraphQL APIs
    eliminate most boilerplate backend code. Row-level security in
    Supabase enforces authorization at the database layer. This stack
    excels for rapid SaaS development where Vue's reactivity model and
    Supabase's managed infrastructure reduce time to production.
    Deployment targets include Vercel, Netlify, and Cloudflare Pages
    via Nuxt adapters.
  composes:
    - language:typescript
    - framework:nuxt
    - framework:supabase
edges:
  composed_of:
    - language:typescript
    - framework:nuxt
    - framework:supabase
