nodeKind: StackProfile
id: stack-profile:jamstack
attributes:
  displayName: "Jamstack (JavaScript, APIs, Markup)"
  description: |
    An architecture pattern where the frontend is pre-rendered at build
    time as static HTML/CSS/JavaScript and served from a CDN, with
    dynamic functionality provided by JavaScript calling third-party APIs
    and serverless functions. The J-A-M acronym stands for JavaScript,
    APIs, and Markup.

    Frameworks like Next.js, Astro, Gatsby, and Hugo generate the static
    layer. Headless CMS services (Contentful, Sanity, Strapi) provide
    content APIs. Netlify and Vercel popularized the deployment model.
    The architecture excels at content-heavy sites where global CDN
    distribution, security (no server to attack), and low operational
    overhead matter.
  composes:
    - language:javascript
    - language:typescript
    - framework:nextjs
edges:
  composed_of:
    - language:javascript
    - language:typescript
    - framework:nextjs
