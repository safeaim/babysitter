nodeKind: StackProfile
id: stack-profile:lamp-stack
attributes:
  displayName: "LAMP Stack (Linux, Apache, MySQL, PHP)"
  description: |
    The classic web application stack: Linux as the operating system,
    Apache HTTP Server for request handling, MySQL as the relational
    database, and PHP as the server-side scripting language. LAMP
    dominated web hosting from the early 2000s through the 2010s and
    remains widely deployed for WordPress, Drupal, and custom PHP
    applications.

    Variants include LEMP (Nginx replacing Apache) and LAPP (PostgreSQL
    replacing MySQL). Shared hosting providers almost universally support
    LAMP. The stack's maturity means extensive documentation, tooling,
    and a massive installed base, though newer projects increasingly
    favor framework-specific stacks with more opinionated structure.
    Laravel is the dominant modern PHP framework on this stack.
  composes:
    - language:php
    - language:sql
    - framework:laravel
edges:
  composed_of:
    - language:php
    - language:sql
    - framework:laravel
