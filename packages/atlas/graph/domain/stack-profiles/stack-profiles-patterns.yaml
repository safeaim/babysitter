nodeKind: StackProfile
id: stack-profile:data-lake-stack
attributes:
  displayName: "Data Lake Stack (Spark, Object Storage, Delta/Iceberg)"
  description: |
    A modern data lakehouse architecture: Apache Spark as the distributed
    compute engine, cloud object storage (S3, GCS, ADLS) as the storage
    layer, and Delta Lake or Apache Iceberg providing ACID transactions,
    schema evolution, and time travel on top of Parquet files.

    This stack replaces traditional data warehouses for large-scale
    analytics. dbt transforms data within the lakehouse. Apache Airflow
    or Dagster orchestrate ETL pipelines. The lakehouse pattern unifies
    data engineering and data science workloads on a single copy of
    data, avoiding the cost and complexity of maintaining separate lake
    and warehouse systems.
  composes:
    - language:python
    - language:sql
    - framework:spark-java
    - tool:airflow
    - tool:databricks
edges:
  composed_of:
    - language:python
    - language:sql
    - framework:spark-java
    - tool:airflow
    - tool:databricks
