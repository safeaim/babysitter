nodeKind: StackProfile
id: stack-profile:ai-agent-stack
attributes:
  displayName: "AI Agent Stack (LLM, Vector DB, Orchestration, Memory)"
  description: |
    A reference architecture for building AI agent applications: an LLM
    provider (Anthropic, OpenAI) for reasoning, a vector database
    (Pinecone, Chroma, Qdrant) for retrieval, an orchestration framework
    (LangChain, LangGraph, CrewAI) for workflow composition, and a
    memory layer (Zep, Mem0) for persistent context across sessions.

    Supporting layers include an LLM proxy (LiteLLM, Portkey) for
    multi-provider routing and cost control, an observability platform
    (Helicone, LangSmith) for tracing and evaluation, and a UI layer
    (Open WebUI, custom chat frontend) for human interaction. This stack
    is rapidly evolving, with new frameworks and tools emerging monthly.
  composes:
    - language:python
    - language:typescript
    - framework:langchain
edges:
  composed_of:
    - language:python
    - language:typescript
    - framework:langchain
    - tool:chromadb
    - tool:litellm
