nodeKind: StackProfile
id: stack-profile:event-driven-stack
attributes:
  displayName: "Event-Driven Stack (Kafka, Consumers, Schema Registry)"
  description: |
    A distributed event streaming architecture: Apache Kafka (or Redpanda)
    as the central event log, consumer applications processing events in
    real time, and Confluent Schema Registry enforcing Avro, Protobuf,
    or JSON Schema contracts between producers and consumers.

    Kafka Connect provides pre-built source and sink connectors for
    databases, search engines, and cloud services. ksqlDB or Kafka Streams
    enable stream processing without a separate compute cluster. This
    stack is the backbone of event sourcing, CQRS, and real-time data
    pipelines in organizations processing high-volume transactional or
    operational events.
  composes:
    - language:java
    - language:protobuf
    - tool:kubernetes
    - library:grpc-js
    - library:redis
    - tool:rabbitmq
    - tool:docker
edges:
  composed_of:
    - language:java
    - language:protobuf
    - tool:kubernetes
    - library:grpc-js
    - library:redis
    - tool:rabbitmq
    - tool:docker
