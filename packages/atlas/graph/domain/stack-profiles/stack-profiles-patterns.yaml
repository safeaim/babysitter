nodeKind: StackProfile
id: stack-profile:serverless-aws
attributes:
  displayName: "Serverless AWS (Lambda, API Gateway, DynamoDB, S3)"
  description: |
    An AWS-native serverless architecture: Lambda functions handle
    compute, API Gateway provides HTTP routing, DynamoDB serves as the
    NoSQL data store, and S3 holds static assets and object storage.
    EventBridge, SQS, and SNS wire event-driven communication between
    components.

    The Serverless Framework, AWS SAM, or AWS CDK manage infrastructure
    as code. This stack eliminates server provisioning and scales
    automatically per request. Cost is pay-per-invocation, making it
    efficient for spiky or low-traffic workloads. Cold starts and
    vendor lock-in are the primary tradeoffs. Step Functions add
    workflow orchestration for complex multi-step processes.
  composes:
    - language:typescript
    - language:python
edges:
  composed_of:
    - language:typescript
    - language:python
