nodeKind: TestableClaim
id: claim:atlas-build-under-60s
attributes:
  displayName: "Atlas build completes under 60s"
  description: |
    The full atlas build pipeline (generate + index + tsc + copy) completes
    within 60 seconds on standard development hardware.
  testStatus: passing
  testType: e2e
  category: performance
  priority: medium
edges:
  asserts_about:
    - domain:software-engineering
