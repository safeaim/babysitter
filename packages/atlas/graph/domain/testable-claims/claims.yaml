nodeKind: TestableClaim
id: claim:breakpoint-rejection-ok-status
attributes:
  displayName: "Breakpoint rejection uses ok status"
  description: |
    Breakpoint rejections must use --status ok not --status error — when
    a user rejects a breakpoint prompt, the orchestrator posts the
    rejection with status ok (not error), because rejection is a valid
    user decision, not a failure.
  testStatus: passing
  testType: unit
  testCommand: "node -e \"const fs=require('fs'),p=require('path');function walk(d){let r=[];try{for(const e of fs.readdirSync(d,{withFileTypes:true})){const f=p.join(d,e.name);if(e.isDirectory()&&e.name!=='node_modules')r=r.concat(walk(f));else if(e.name.endsWith('.ts'))r.push(f)}}catch{}return r}const files=walk('packages/sdk/src');const content=files.map(f=>fs.readFileSync(f,'utf8')).join('');process.exit(content.match(/approved.*false/)?0:1)\""
  category: behavior
  priority: high
edges:
  asserts_about:
    - domain:software-engineering
