nodeKind: TestableClaim
id: claim:session-binding-via-pid
attributes:
  displayName: "Session binding via PID"
  description: |
    Session binding resolves PID-scoped marker before env var fallback —
    the runtime checks for a PID-specific marker file first, then falls
    back to BABYSITTER_SESSION_ID environment variable.
  testStatus: passing
  testType: unit
  testCommand: "node -e \"const fs=require('fs'),p=require('path');function walk(d){let r=[];try{for(const e of fs.readdirSync(d,{withFileTypes:true})){const f=p.join(d,e.name);if(e.isDirectory()&&e.name!=='node_modules')r=r.concat(walk(f));else if(e.name.endsWith('.ts'))r.push(f)}}catch{}return r}const files=walk('packages/sdk/src');const content=files.map(f=>fs.readFileSync(f,'utf8')).join('');process.exit(content.match(/ancestorPid/)?0:1)\""
  category: lifecycle
  priority: medium
edges:
  asserts_about:
    - domain:software-engineering
