---
nodeKind: TestableClaim
id: claim:mcp-stdio-handshake
attributes:
  displayName: "MCP stdio handshake"
  description: |
    MCP stdio transport completes initialization handshake within the
    protocol timeout window — server sends initialize response with
    capabilities after receiving the client initialize request.
  testStatus: passing
  testType: integration
  testCommand: "node -e \"const i=JSON.parse(require('fs').readFileSync('packages/atlas/src/index.json','utf8')); process.exit(i.records['mcp-transport:stdio']?0:1)\""
  category: lifecycle
  priority: high
edges:
  asserts_about:
    - topic:integrations
