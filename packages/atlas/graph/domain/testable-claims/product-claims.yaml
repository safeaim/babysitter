# Testable claims for agent products — verifies graph data integrity
# Each claim asserts something about the product's graph record/edges
---
nodeKind: TestableClaim
id: claim:aider-has-version
attributes:
  displayName: "Aider has agent version record"
  description: |
    Aider (agent:aider) has a has_version edge pointing to its
    agent-version:aider@current record, confirming the product is
    properly wired in the graph with version metadata.
  testStatus: passing
  testType: unit
  testCommand: "node -e \"const i=JSON.parse(require('fs').readFileSync('packages/atlas/src/index.json','utf8'));process.exit(i.edges.some(e=>e.from==='agent:aider'&&e.kind==='has_version')?0:1)\""
  category: graph-integrity
  priority: medium
edges:
  asserts_about:
    - agent:aider
---
