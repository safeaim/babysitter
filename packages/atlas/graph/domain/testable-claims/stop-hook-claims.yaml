---
nodeKind: TestableClaim
id: claim:stop-hook-claude-interactive-fires
attributes:
  displayName: "Claude Code stop hook fires in interactive mode"
  description: |
    When Claude Code reaches end-of-turn in interactive mode, the hooks-mux
    adapter normalizes the native "Stop" event to canonical phase turn.stop
    and invokes registered handlers with the stop payload.
  testStatus: pending
  testType: integration
  testCommand: "npx vitest run packages/atlas/tests/claims/stop-hook-control.test.ts -t \"claude adapter.*fires turn.stop via interactive\""
  category: hooks
  priority: high
edges:
  asserts_about:
    - agent:claude-code
    - hook-surface:stop
  tests_hook_surface:
    - hook-surface:claude.stop
---
nodeKind: TestableClaim
id: claim:stop-hook-claude-interactive-blocks
attributes:
  displayName: "Claude Code stop hook can block (deny) at end-of-turn"
  description: |
    A hooks-mux handler returning decision: deny at turn.stop propagates the
    deny decision in the output for Claude Code, since the Claude adapter
    supports the blockCapability. This allows hooks to prevent the agent
    from stopping (e.g., to enforce a review step before turn completion).
  testStatus: pending
  testType: integration
  testCommand: "npx vitest run packages/atlas/tests/claims/stop-hook-control.test.ts -t \"claude adapter.*deny decision propagates\""
  category: hooks
  priority: high
edges:
  asserts_about:
    - agent:claude-code
    - hook-surface:stop
  tests_hook_surface:
    - hook-surface:claude.stop
---
