nodeKind: TestableClaim
id: claim:stop-hook-gemini-interactive-degrades
attributes:
  displayName: "Gemini CLI stop hook degrades deny (no block support)"
  description: |
    Gemini CLI's adapter does not support blockCapability, so a handler
    returning deny at turn.stop is degraded — the deny decision is stripped
    from the output. The hook fires but cannot prevent the agent from stopping.
  testStatus: pending
  testType: integration
  testCommand: "npx vitest run packages/atlas/tests/claims/stop-hook-control.test.ts -t \"gemini adapter.*deny decision is degraded\""
  category: hooks
  priority: high
edges:
  asserts_about:
    - agent:gemini-cli
    - hook-surface:stop
