id: tool:portkey-ai
attributes:
  displayName: "Portkey AI"
  kind: other
  description: |
    AI gateway that sits between applications and LLM providers, adding
    caching, automatic retries, fallback routing, load balancing, and
    request/response logging. Supports guardrails, budget limits, and
    A/B testing across model providers. Available as a managed service
    or self-hosted gateway with an OpenAI-compatible API surface.
