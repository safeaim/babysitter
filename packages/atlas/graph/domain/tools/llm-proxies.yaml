id: tool:helicone
attributes:
  displayName: "Helicone"
  kind: other
  description: |
    LLM observability and proxy platform that captures requests, latency,
    cost, and token usage across OpenAI, Anthropic, and other providers.
    Integrates as a one-line proxy URL change. Provides dashboards for
    cost analysis, user tracking, prompt versioning, and rate limiting.
    Open-source core with a managed cloud offering.
