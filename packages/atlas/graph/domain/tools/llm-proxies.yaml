nodeKind: Tool
id: tool:braintrust-proxy
attributes:
  displayName: "Braintrust Proxy"
  kind: other
  description: |
    AI proxy from the Braintrust evaluation platform that adds logging,
    caching, and access control to LLM API calls. Captured requests feed
    directly into Braintrust's evaluation and scoring pipelines, enabling
    a tight loop between production traffic monitoring and offline evals.
    Supports OpenAI-compatible routing to multiple providers.
