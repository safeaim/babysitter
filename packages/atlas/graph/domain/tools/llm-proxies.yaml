id: tool:openrouter
attributes:
  displayName: "OpenRouter"
  kind: other
  description: |
    API gateway service that routes requests to Claude, GPT-4, Llama,
    Mistral, and dozens of other models through a single OpenAI-compatible
    endpoint. Handles billing aggregation, model discovery, and automatic
    fallback routing. Useful for applications that need to switch between
    providers without code changes or for accessing models not available
    through direct API accounts.
