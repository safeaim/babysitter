nodeKind: Tool
id: tool:agentmemory
attributes:
  displayName: "agentmemory"
  homepageUrl: "https://github.com/autonomous-ai/agentmemory"
  kind: other
  description: |
    Cross-agent persistent memory library with benchmarked accuracy and
    a privacy-first processing pipeline. Incoming observations pass through
    SHA-256 content-addressable deduplication, a configurable privacy filter
    that strips secrets, credentials, and PII, then LLM compression that
    extracts structured facts, concepts, and narrative. Memories are vector-
    embedded and dual-indexed with BM25 (keyword) and vector (semantic)
    retrieval. Designed for multi-agent deployments where one agent's
    discoveries should be available to others without duplication or
    information leakage.
edges:
  belongs_to_language:
    - language:python
  tool_used_by:
    - target: skill-area:ai-agent-development
    - target: skill-area:context-management
    - target: skill-area:knowledge-fabric-design
  relates_to_topic:
    - target: topic:memory-to-knowledge-bridge
    - target: topic:auto-memory
    - target: topic:memory-deduplication
    - target: topic:memory-security
  alternative_to:
    - target: tool:memories-sh
      comparison: "AI agent memory — agentmemory has vector search and privacy filtering; memories.sh is plain file key-value"
    - target: tool:mempalace
      comparison: "AI agent memory — agentmemory has privacy filtering; MemPalace has quality scoring"
    - target: tool:cloudflare-agent-memory
      comparison: "AI agent memory — agentmemory is self-hosted; Cloudflare is managed cloud"
    - target: tool:memori-labs
      comparison: "AI agent memory systems"
    - target: tool:vercel-ai-memory
      comparison: "AI agent memory systems"
