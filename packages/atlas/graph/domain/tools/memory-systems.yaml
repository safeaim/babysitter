attributes:
  displayName: "Pinecone"
  kind: other
  description: |
    Managed vector database for AI applications that handles indexing,
    storage, and low-latency similarity search at scale. Provides a
    serverless tier, metadata filtering, namespaces for multi-tenancy,
    and sparse-dense hybrid search. Widely used in production RAG
    systems where operational simplicity and uptime SLAs matter more
    than self-hosting flexibility.
