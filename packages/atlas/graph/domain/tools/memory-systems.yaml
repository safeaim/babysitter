  displayName: "Mem0"
  kind: other
  description: |
    Memory layer for personalized AI experiences that automatically
    extracts, stores, and retrieves relevant memories from conversations.
    Provides user-level, session-level, and agent-level memory with a
    simple add/search API. Supports multiple vector store backends and
    integrates with LangChain, CrewAI, and other agent frameworks to
    give LLM applications persistent context across sessions.
