id: tool:qdrant
attributes:
  displayName: "Qdrant"
  kind: other
  description: |
    Open-source vector similarity search engine written in Rust with a
    focus on performance and filtering. Supports payload-based filtering
    alongside vector search, quantization for memory efficiency, and
    distributed deployment. Provides gRPC and REST APIs with clients
    for Python, TypeScript, Go, and Rust. A strong choice for self-hosted
    vector search where query latency and resource efficiency matter.
