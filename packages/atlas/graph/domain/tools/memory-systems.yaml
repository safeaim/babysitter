id: tool:milvus
attributes:
  displayName: "Milvus"
  kind: other
  description: |
    Open-source vector database designed for billion-scale similarity
    search with GPU-accelerated indexing. Supports multiple index types
    (IVF, HNSW, DiskANN), hybrid scalar-vector queries, and multi-vector
    search. Runs as a distributed system with separate storage and compute
    scaling. Zilliz Cloud offers a managed deployment. Common in
    enterprise AI pipelines requiring high-throughput vector operations.
