nodeKind: Tool
id: tool:memories-sh
attributes:
  displayName: "memories.sh"
  homepageUrl: "https://github.com/nichochar/memories"
  kind: other
  description: |
    Durable state management for coding agents. Provides a shell-based
    interface for agents to persist and retrieve key-value observations
    across sessions. Memories are stored as plain files organized by
    project, making them inspectable and version-controllable. The shell
    interface (source memories.sh) makes it usable from any agent that
    can execute Bash commands, including Claude Code, Aider, and custom
    agent harnesses. Focuses on simplicity over sophistication — no vector
    search, no LLM processing, just reliable key-value persistence.
edges:
  belongs_to_language:
    - language:bash
  tool_used_by:
    - target: skill-area:ai-agent-development
    - target: skill-area:context-management
  relates_to_topic:
    - target: topic:memory-to-knowledge-bridge
    - target: topic:auto-memory
