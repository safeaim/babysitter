attributes:
  displayName: "Weaviate"
  kind: other
  description: |
    AI-native vector search engine that combines vector, keyword, and
    hybrid search with built-in vectorization modules for text, images,
    and multi-modal data. Supports GraphQL and REST APIs, multi-tenancy,
    filtering, and horizontal scaling. Weaviate's generative search
    modules can pipe retrieved context directly into LLM prompts,
    making it a production-grade backend for RAG architectures.
