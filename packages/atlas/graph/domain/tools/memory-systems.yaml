id: tool:chromadb
attributes:
  displayName: "Chroma"
  kind: other
  description: |
    Open-source embedding database purpose-built for AI applications.
    Stores documents with embeddings and metadata, supports filtering,
    and returns nearest-neighbor results. Runs in-memory, as a local
    persistent store, or as a client-server deployment. First-class
    integrations with LangChain, LlamaIndex, and OpenAI make it a
    common default for prototyping RAG pipelines.
