attributes:
  languageApplicability: neutral
  displayName: "Memori Labs"
  homepageUrl: "https://www.memorilabs.com"
  kind: other
  description: |
    Agent-native memory infrastructure that structures memory from agent
    execution traces. Memori Labs automatically extracts structured memory
    entries from agent traces (tool calls, reasoning steps, task outcomes)
    without requiring agents to explicitly write memory. LLM-agnostic REST
    API organizes memories by entity, event, and procedure types. The
    trace-driven extraction model means memory accumulates as a by-product
    of normal agent operation — no dedicated memory management code required
    in the agent itself.
