nodeKind: Tool
id: tool:memories-sh
attributes:
  displayName: "memories.sh"
  homepageUrl: "https://github.com/nichochar/memories"
  kind: other
  description: |
    Local-first durable state layer for coding agents. Implements four
    memory types — session (cleared per run), semantic (memory.md facts),
    episodic (daily interaction logs), and procedural (workflow patterns)
    — stored as plain files under ~/.memories/. Compatible with Cursor,
    Claude Code, GitHub Copilot, Windsurf, Cline, Roo, and Gemini through
    a shared filesystem layout. No cloud dependency, no vector database,
    no LLM processing — just reliable local-first persistence that any
    agent with filesystem access can use. Source as a shell library
    (source memories.sh) or use the memories CLI.
edges:
  belongs_to_language:
    - language:bash
  tool_used_by:
