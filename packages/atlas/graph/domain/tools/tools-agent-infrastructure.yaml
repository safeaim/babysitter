id: tool:vercel-ai-memory
attributes:
  languageApplicability: neutral
  displayName: "Vercel AI SDK Memory"
  homepageUrl: "https://ai-sdk.dev/docs/agents/memory"
  kind: other
  description: |
    Built-in memory system for Vercel AI SDK agent applications. Integrates
    directly into the AI SDK agent loop so agents can read and write memories
    using standard tool-use interfaces. Supports multiple storage backends
    (Vercel KV, Postgres, Upstash Redis) via Vercel storage adapters. Memory
    scoping follows the AI SDK's user/session/agent model. Designed for
    Next.js AI applications where Vercel's managed storage handles persistence
    without additional infrastructure. Reference documentation at
    ai-sdk.dev/docs/agents/memory.
