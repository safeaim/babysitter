nodeKind: Tool
id: tool:mempalace
attributes:
  displayName: "MemPalace"
  kind: other
  description: |
    Best-benchmarked open-source AI memory system. Provides persistent
    memory storage with quality scoring, retrieval ranking, and memory
    consolidation. Agents can store, search, and prune memories with a
    structured API that tracks memory relevance over time. Benchmarked
    against other memory systems for accuracy, recall, and context
    efficiency. Designed for agents that need reliable cross-session
    memory with measurable quality guarantees.
edges:
  tool_used_by:
    - target: skill-area:knowledge-fabric-design
    - target: skill-area:organizational-intelligence
  relates_to_topic:
    - target: topic:organizational-memory
    - target: topic:memory-to-knowledge-bridge
