id: tool:cloudflare-agent-memory
attributes:
  languageApplicability: neutral
  displayName: "Cloudflare Agent Memory"
  homepageUrl: "https://developers.cloudflare.com/agents/api-reference/store/"
  kind: other
  description: |
    Cloudflare's managed persistent memory service for AI agents. Built on
    Durable Objects (strongly consistent state) and Vectorize (vector search),
    it exposes ingest, remember, recall, and forget operations through a REST
    API. Supports team-shared memory profiles so multiple agents or users can
    share a common memory namespace. Runs on Cloudflare's global network with
    no self-hosted infrastructure required. Accessible from Cloudflare Workers
    or any HTTP client, making it a zero-ops memory backend for agent
    applications.
