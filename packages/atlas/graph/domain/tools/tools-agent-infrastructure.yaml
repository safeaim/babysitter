id: tool:agent-message-queue
attributes:
  languageApplicability: neutral
  displayName: "Agent Message Queue"
  homepageUrl: "https://github.com/nichochar/agent-message-queue"
  kind: other
  description: |
    File-based Maildir-style message queue for local agent-to-agent
    communication. Provides a simple filesystem-backed pub/sub mechanism
    where agents drop messages as files and receivers poll directories.
    No external services required — works anywhere with a filesystem.
    Designed for local multi-agent setups where agents need to coordinate
    without shared memory or network services.
