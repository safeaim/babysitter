nodeKind: Tool
id: tool:lunaroute
attributes:
  displayName: "LunaRoute"
  kind: other
  description: |
    High-performance local proxy for AI coding assistants. Sits between
    the coding agent and the LLM API, providing session recording,
    request/response logging, debugging tools, and traffic inspection.
    Enables developers to replay agent sessions, analyze token usage,
    debug prompt construction, and understand agent behavior without
    modifying the agent itself. Runs as a lightweight local process
    with no cloud dependency.
edges:
  tool_used_by:
    - target: skill-area:observability-instrumentation
    - target: skill-area:llm-observability
  relates_to_topic:
    - target: topic:agent-context-management
    - target: topic:proxy-pattern
---
nodeKind: Tool
id: tool:token-optimizer
attributes:
  displayName: "Token Optimizer"
  kind: other
  description: |
    Tool for finding ghost tokens, fixing context quality decay, and
    surviving compaction in AI coding sessions. Analyzes token usage
    patterns to identify wasted context, invisible formatting overhead,
    and degradation caused by repeated compaction cycles. Provides
    actionable recommendations for improving prompt efficiency and
    maintaining context quality over long agent sessions.
edges:
  tool_used_by:
    - target: skill-area:context-management
    - target: skill-area:embedding-optimization
  relates_to_topic:
    - target: topic:semantic-chunking
    - target: topic:knowledge-fabric-architecture
---
nodeKind: Tool
id: tool:graphify
attributes:
  displayName: "Graphify"
  kind: other
  description: |
    Converts code, SQL schemas, documentation, and images into a
    queryable knowledge graph. Parses source artifacts, extracts
    entities and relationships, and builds a graph that agents can
    traverse and query. Supports multiple input formats and produces
    a unified graph representation that captures cross-artifact
    dependencies. Useful for codebase understanding, impact analysis,
    and building navigable knowledge bases from heterogeneous sources.
edges:
  tool_used_by:
    - target: skill-area:knowledge-graph-management
    - target: skill-area:knowledge-fabric-design
  relates_to_topic:
    - target: topic:knowledge-graph-construction
