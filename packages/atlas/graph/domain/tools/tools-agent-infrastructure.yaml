nodeKind: Tool
id: tool:utcp-code-mode
attributes:
  displayName: "UTCP Code Mode"
  kind: other
  description: |
    Universal Tool Calling Protocol library that enables AI agents to
    call MCP and UTCP tools via code execution rather than structured
    tool-use messages. Provides a programmatic interface for discovering,
    invoking, and composing tool calls from within agent code. Useful for
    building agent loops that need dynamic tool selection and chaining
    without relying on the model's native tool-use protocol.
edges:
  tool_used_by:
    - target: skill-area:ai-agent-development
    - target: skill-area:tool-use
  relates_to_topic:
    - target: topic:agent-tool-use
    - target: topic:agent-effect-system
    - target: topic:claude-code-mcp
