  displayName: "Napkin"
  homepageUrl: "https://github.com/nichochar/napkin"
  kind: other
  description: |
    Local-first file-based knowledge system for AI agents. Uses a
    progressively disclosed information architecture where agents start
    with summaries and drill into detail on demand. Knowledge is stored
    as plain files on disk — no database, no server. Designed for agents
    that need structured long-term knowledge without external services,
    with a focus on reducing context window waste through progressive
    disclosure patterns.
