id: tool:private-gpt
attributes:
  displayName: "PrivateGPT"
  kind: other
  description: |
    Fully local, privacy-first document Q&A system that runs entirely
    on your hardware with no data leaving the machine. Ingests documents
    (PDF, DOCX, TXT, Markdown), embeds them locally using open-source
    models, and answers questions using a local LLM. Supports Ollama,
    llama.cpp, and HuggingFace backends. Ideal for air-gapped
    environments, regulated industries, and sensitive document analysis
    where cloud APIs are not permitted.
