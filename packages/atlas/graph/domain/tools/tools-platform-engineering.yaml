nodeKind: Tool
id: tool:onedev
attributes:
  displayName: "OneDev"
  homepageUrl: "https://onedev.io"
  kind: ci
  description: |
    Self-hosted Git server with integrated CI/CD engine, Kanban boards,
    package registry, and code search. Written in Java, runs as a single
    Docker container. CI pipelines are defined in YAML with support for
    matrix builds, caching, and Kubernetes-based agents. Includes code
    review, issue tracking, time tracking, and fine-grained RBAC. A
    lightweight alternative to GitLab for teams that want all-in-one
    Git hosting without the resource overhead.
edges:
  belongs_to_language:
    - language:java
  tool_used_by:
    - target: skill-area:ci-cd
    - target: skill-area:project-planning
  alternative_to:
    - target: tool:drone-ci
      comparison: "Self-hosted CI — OneDev is all-in-one Git+CI; Drone CI is container-native CI only"
    - target: tool:woodpecker
      comparison: "Self-hosted CI — OneDev is all-in-one Git+CI; Woodpecker is container-native CI only"
