---
nodeKind: Tool
id: tool:apl-core
attributes:
  displayName: "APL Core"
  homepageUrl: "https://github.com/linode/apl-core"
  kind: orchestrator
  description: |
    Linode App Platform for Kubernetes Engine (APL Core). A PaaS layer
    built on top of Linode Kubernetes Engine (LKE) that provides
    self-service application deployment, ingress management, certificate
    handling, and observability out of the box. Packages Istio, Knative,
    Keycloak, Harbor, and other CNCF tools into a cohesive developer
    platform with a web UI and GitOps workflows. Designed for teams
    that want Heroku-like simplicity on their own Kubernetes clusters.
edges:
  belongs_to_language:
    - language:go
  tool_used_by:
    - target: skill-area:platform-engineering
    - target: skill-area:deployment-automation
