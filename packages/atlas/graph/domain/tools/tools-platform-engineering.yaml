id: tool:devtron
attributes:
  displayName: "Devtron"
  homepageUrl: "https://devtron.ai"
  kind: orchestrator
  description: |
    Kubernetes-native application management dashboard with built-in
    CI/CD, security scanning, monitoring, and debugging. Provides a
    unified web UI for deploying, managing, and observing workloads
    across multiple clusters. Features include Helm chart management,
    GitOps-based deployments, vulnerability scanning, RBAC, and
    interactive Kubernetes debugging. Targets platform teams that need
    a full-featured internal developer platform without stitching
    together dozens of separate tools.
edges:
