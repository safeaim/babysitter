nodeKind: Tool
id: tool:kubevela
attributes:
  displayName: "KubeVela"
  homepageUrl: "https://kubevela.io"
  kind: orchestrator
  description: |
    Modern application delivery platform based on the Open Application
    Model (OAM). Provides a higher-level abstraction over Kubernetes
    that lets developers describe applications and their operational
    requirements declaratively. Features include multi-cluster delivery,
    canary rollouts, GitOps integration, workflow orchestration, and an
    addon ecosystem for extending platform capabilities. The OAM model
    separates application definition from operational concerns, enabling
    platform teams to encode best practices into reusable components.
edges:
  belongs_to_language:
    - language:go
  tool_used_by:
    - target: skill-area:platform-engineering
    - target: skill-area:deployment-automation
  alternative_to:
