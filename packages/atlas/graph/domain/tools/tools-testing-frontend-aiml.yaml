# Frontend visual-testing tools
nodeKind: Tool
id: tool:chromatic
attributes:
  displayName: "Chromatic"
  kind: other
  description: |
    Cloud-based visual testing and review platform purpose-built for Storybook.
    Captures pixel-perfect snapshots of UI components on each commit, diffs
    them against baselines, and routes change reviews to the right teammates.
    Also publishes Storybook as a shared design-system documentation site.
edges:
  tool_used_by:
    - target: skill-area:frontend-testing
    - target: skill-area:visual-regression-testing
  used_for:
    - skill-area:frontend-testing
---
nodeKind: Tool
id: tool:percy
attributes:
  displayName: "Percy"
  kind: other
  description: |
    Visual testing and review platform by BrowserStack that captures full-page
    and component screenshots across browsers and viewports, then highlights
    pixel-level diffs for team review. Integrates with Selenium, Cypress,
    Playwright, and many CI systems; supports snapshot stabilisation and
    AI-assisted false-positive filtering.
edges:
  tool_used_by:
    - target: skill-area:frontend-testing
    - target: skill-area:visual-regression-testing
  used_for:
    - skill-area:frontend-testing
