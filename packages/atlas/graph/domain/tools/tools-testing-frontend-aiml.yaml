  kind: test-runner
  description: |
    Python-based open-source load testing framework where user behaviour is
    defined as plain Python code. Supports distributed, headless, and
    web-UI-driven test runs with real-time statistics. Highly extensible via
    event hooks; integrates naturally with pytest and CI pipelines.
edges:
  tool_used_by:
    - target: skill-area:performance-testing
  used_for:
