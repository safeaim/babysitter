# AI / ML inference and evaluation tools
nodeKind: Tool
id: tool:vllm
attributes:
  displayName: "vLLM"
  kind: other
  description: |
    High-throughput and memory-efficient LLM inference engine implementing the
    PagedAttention algorithm to maximise GPU KV-cache utilisation. Exposes an
    OpenAI-compatible REST API and supports continuous batching, streaming, and
    tensor parallelism across multiple GPUs. A common production serving
    backend for self-hosted open-source language models.
edges:
  tool_used_by:
    - target: skill-area:model-serving
    - target: skill-area:llm-infrastructure
  used_for:
    - skill-area:model-serving
    - skill-area:ai-evaluation
---
nodeKind: Tool
id: tool:tensorrt
attributes:
  displayName: "TensorRT"
  kind: other
  description: |
    NVIDIA's SDK for high-performance deep-learning inference on GPU. Optimises
    trained models through layer fusion, precision calibration (FP16/INT8),
    and kernel auto-tuning to minimise latency and maximise throughput.
    Integrates with PyTorch via torch-tensorrt, ONNX import, and the Triton
    Inference Server backend ecosystem.
edges:
  tool_used_by:
    - target: skill-area:model-serving
    - target: skill-area:model-optimisation
  used_for:
    - skill-area:model-serving
    - skill-area:ai-evaluation
---
nodeKind: Tool
id: tool:triton-inference
attributes:
  displayName: "Triton Inference Server"
  kind: other
  description: |
    NVIDIA's open-source inference serving platform that hosts models from
    TensorRT, ONNX Runtime, PyTorch, TensorFlow, and vLLM backends behind a
    unified gRPC/HTTP API. Supports dynamic batching, model ensembles,
    concurrent model execution, and Kubernetes-native deployment with Prometheus
    metrics out of the box.
edges:
  tool_used_by:
    - target: skill-area:model-serving
    - target: skill-area:llm-infrastructure
  used_for:
    - skill-area:model-serving
    - skill-area:ai-evaluation
