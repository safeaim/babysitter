nodeKind: Tool
id: tool:wiremock
attributes:
  displayName: "WireMock"
  kind: test-runner
  description: |
    Flexible HTTP service virtualisation and API mocking tool for development
    and testing. Stubs can be defined via JSON mappings, a Java/Kotlin DSL,
    or the REST Admin API. Supports request matching, response templating,
    fault injection, stateful scenarios, and record/playback of real traffic.
