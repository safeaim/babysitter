attributes:
  displayName: "Pact"
  kind: test-runner
  description: |
    Consumer-driven contract testing framework that ensures services can
    communicate without relying on end-to-end integration environments.
    Consumers generate JSON pact files that providers verify independently;
    Pact Broker or PactFlow stores and manages contract evolution across teams.
edges:
