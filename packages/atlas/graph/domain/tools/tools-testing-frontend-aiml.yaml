# AI / ML inference and evaluation tools
nodeKind: Tool
id: tool:vllm
attributes:
  displayName: "vLLM"
  homepageUrl: "https://github.com/vllm-project/vllm"
  kind: other
  description: |
    High-throughput and memory-efficient LLM inference engine implementing the
    PagedAttention algorithm to maximise GPU KV-cache utilisation. Exposes an
    OpenAI-compatible REST API and supports continuous batching, streaming, and
    tensor parallelism across multiple GPUs. A common production serving
    backend for self-hosted open-source language models.
edges:
  belongs_to_language:
    - language:python
  tool_used_by:
    - target: skill-area:model-serving
    - target: skill-area:llm-infrastructure
  used_for:
    - skill-area:model-serving
    - skill-area:ai-evaluation
  alternative_to:
    - target: tool:tensorrt
      comparison: "ML inference — vLLM is LLM-focused with PagedAttention; TensorRT is GPU model optimization"
    - target: tool:triton-inference
      comparison: "ML inference — vLLM is LLM-specific; Triton serves multiple model frameworks"
    - target: tool:onnx-runtime
      comparison: "ML inference — vLLM is LLM-specific GPU; ONNX Runtime is cross-platform multi-model"
