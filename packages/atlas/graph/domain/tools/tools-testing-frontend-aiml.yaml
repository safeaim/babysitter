# Testing tools
nodeKind: Tool
id: tool:k6
attributes:
  displayName: "k6"
  kind: test-runner
  description: |
    Open-source load testing tool built for developer-centric performance
    testing of APIs, microservices, and websites. Scripts are written in
    JavaScript with a clean async API; results are exported to Grafana Cloud,
    Prometheus, and many other backends. Supports threshold assertions,
    scenarios, and distributed cloud execution via Grafana Cloud k6.
edges:
  tool_used_by:
    - target: skill-area:performance-testing
  used_for:
    - skill-area:api-testing
