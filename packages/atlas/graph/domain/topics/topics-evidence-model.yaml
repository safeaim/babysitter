attributes:
  displayName: "Experiment-Driven Development"
  description: |
    Experiment-Driven Development as a cross-cutting topic — treating
    engineering decisions as hypotheses validated through controlled
    experiments with measurable outcomes. Covers A/B testing, feature
    experiments, performance benchmarks as experiments, and using
    hypothesis-outcome loops to reduce uncertainty before committing
    to architectural or product directions.
