id: topic:graph-provenance
attributes:
  displayName: "Graph Provenance"
  description: |
    Graph Provenance as a cross-cutting topic — tracking the origin,
    lineage, and transformation history of nodes and edges in a knowledge
    graph. Covers source attribution, temporal versioning, confidence
    decay, and audit trails that enable consumers to assess data quality
    and trace assertions back to their originating evidence or process.
