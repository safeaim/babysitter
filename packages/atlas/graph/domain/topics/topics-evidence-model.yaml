  displayName: "Evidence-Based Graph"
  description: |
    Evidence-Based Graph as a cross-cutting topic — grounding knowledge graph
    assertions in verifiable evidence through testable claims, provenance
    tracking, and confidence scoring. Ensures graph content reflects
    demonstrated truths rather than untested assumptions, enabling systematic
    quality improvement and trust calibration across the catalog.
