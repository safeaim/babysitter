nodeKind: Topic
id: topic:company-brain
attributes:
  displayName: "Company Brain"
  description: |
    Company Brain as a cross-cutting topic — the centralized organizational
    knowledge layer that captures, organizes, and makes queryable everything
    a company knows. Covers persistent knowledge stores that outlive individual
    agent sessions, cross-agent knowledge sharing, organizational memory
    architecture, and the distinction between per-session context management
    and enterprise-wide knowledge persistence.
