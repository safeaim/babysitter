    - topic:knowledge-freshness
    - topic:knowledge-feedback-loop
---
nodeKind: Topic
id: topic:knowledge-provenance
attributes:
  displayName: "Knowledge Provenance"
  description: |
    Knowledge Provenance as a cross-cutting topic — tracking the source,
    confidence, and staleness of organizational knowledge. Covers attribution
    chains (who said what, when, in what context), confidence scoring for
    inferred vs authoritative knowledge, temporal decay models, conflict
    resolution when sources disagree, and audit trails for knowledge-driven
    decisions.
edges:
  applies_to:
    - domain:software-engineering
---
nodeKind: Topic
id: topic:semantic-chunking
attributes:
  displayName: "Semantic Chunking"
  description: |
    Semantic Chunking as a cross-cutting topic — strategies for splitting
    documents into meaningful units for embedding and retrieval. Covers
    fixed-size chunking, sentence-level splitting, semantic boundary
    detection, hierarchical chunking (parent-child relationships),
    code-aware chunking (function/class boundaries), overlap strategies,
    and the impact of chunk size on retrieval precision and recall.
edges:
  applies_to:
    - domain:software-engineering
    - specialization:ai-agents-conversational
---
nodeKind: Topic
id: topic:multi-source-knowledge-fusion
attributes:
  displayName: "Multi-Source Knowledge Fusion"
  description: |
    Multi-Source Knowledge Fusion as a cross-cutting topic — combining
    knowledge from multiple heterogeneous sources into a coherent view.
    Covers entity resolution across sources, schema alignment, conflict
    detection and resolution, confidence-weighted merging, temporal
    ordering of contradictory facts, and federated retrieval patterns
    that query multiple backends in parallel.
edges:
  applies_to:
    - domain:software-engineering
