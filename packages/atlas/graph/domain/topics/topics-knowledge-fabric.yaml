nodeKind: Topic
id: topic:organizational-memory
attributes:
  displayName: "Organizational Memory"
  description: |
    Organizational Memory as a cross-cutting topic — persistent knowledge
    that spans agent sessions, user interactions, and time. Covers the
    distinction between episodic memory (specific events), semantic memory
    (general knowledge), and procedural memory (how-to knowledge). Addresses
    memory consolidation, forgetting curves, knowledge decay detection,
    and strategies for keeping organizational memory fresh and trustworthy.
edges:
  applies_to:
