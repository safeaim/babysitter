nodeKind: Topic
id: topic:rag-pipeline-design
attributes:
  displayName: "RAG Pipeline Design"
  description: |
    RAG Pipeline Design as a cross-cutting topic — retrieval-augmented
    generation pipeline patterns for grounding LLM responses in organizational
    knowledge. Covers document ingestion, chunking strategies, embedding model
    selection, vector store configuration, retrieval ranking, re-ranking,
    context window assembly, and evaluation of retrieval quality (MRR, nDCG,
    recall@k). Spans both prototyping patterns and production-grade pipelines.
