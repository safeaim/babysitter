id: topic:knowledge-fabric-architecture
attributes:
  displayName: "Knowledge Fabric Architecture"
  description: |
    Knowledge Fabric Architecture as a cross-cutting topic — designing
    systems that weave together disparate knowledge sources into a unified,
    queryable fabric. Covers knowledge source integration patterns, domain
    partitioning, trust and staleness models, update propagation strategies,
    and the infrastructure connecting vector stores, knowledge graphs, and
    document indexes into a coherent organizational intelligence layer.
