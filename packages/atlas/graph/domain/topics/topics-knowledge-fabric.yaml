id: topic:knowledge-graph-construction
attributes:
  displayName: "Knowledge Graph Construction"
  description: |
    Knowledge Graph Construction as a cross-cutting topic — building and
    maintaining structured representations of organizational entities,
    relationships, and facts. Covers entity extraction from unstructured
    text, relation linking, schema design for knowledge graphs, graph
    databases (Neo4j, Amazon Neptune, TigerGraph), ontology alignment,
    and incremental graph updates from streaming knowledge sources.
