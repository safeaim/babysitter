  displayName: "Graph Query Scoping"
  description: |
    Filtering and scoping knowledge graph traversals by domain, role,
    project context, or expertise level. Enables focused exploration
    of large graphs by narrowing the visible subgraph to what's relevant
    for a specific task or persona.
