id: topic:context-aware-retrieval
attributes:
  displayName: "Context-Aware Retrieval"
  description: |
    Using user context — role, project, expertise level, recent activity —
    to rank and filter graph query results. Personalizes knowledge graph
    interactions so different users see different priorities for the same query.
edges:
  applies_to:
    - domain:software-engineering
    - domain:data-science
