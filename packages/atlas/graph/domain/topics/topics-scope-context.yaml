attributes:
  displayName: "Knowledge Graph Navigation"
  description: |
    Patterns for traversing and exploring knowledge graphs effectively —
    breadth-first exploration, neighborhood expansion, path finding between
    concepts, and cluster-based browsing.
edges:
  applies_to:
    - domain:software-engineering
    - domain:databases
