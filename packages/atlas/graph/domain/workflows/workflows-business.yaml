id: workflow:market-analysis
attributes:
  displayName: "Market Analysis"
  description: |
    Quarterly on-demand governance workflow that evaluates market conditions, competitive
    positioning, and emerging customer needs to inform product and go-to-market decisions.
    Marketing strategists and business analysts gather primary and secondary research —
    including customer interviews, analyst reports, and competitive teardowns — and
    synthesize findings into a structured market assessment. Key signals are mapped to
    strategic implications and shared with product, sales, and leadership teams. Outputs
    feed directly into roadmap prioritization and campaign planning cycles, ensuring the
    organization remains responsive to market dynamics.
  workflowKind: governance
  triggerType: on-demand
  typicalCadence: "quarterly"
  complexity: moderate
