nodeKind: Workflow
id: workflow:talent-acquisition-pipeline
attributes:
  displayName: "Talent Acquisition Pipeline"
  description: |
    Event-driven cross-team workflow triggered when an approved headcount opening is
    created. The HR manager and talent recruiter align with the hiring manager to define
    the role profile, calibrate assessment criteria, and select sourcing channels. Candidate
    pipelines are built through job boards, referrals, and proactive outreach. A structured
    interview loop assesses competency and culture fit, with scorecards reviewed by the
    hiring panel. Offers are extended, negotiated, and closed in coordination with
    compensation benchmarks. The workflow concludes with candidate acceptance, and a warm
    handoff to the onboarding process ensures a seamless transition from applicant to
    productive team member.
  workflowKind: onboarding
  triggerType: event-driven
  typicalCadence: "per-opening"
  complexity: moderate
edges:
  involves_role:
    - role:hr-manager
    - role:talent-recruiter
    - role:engineering-manager
    - role:business-analyst
    - role:vp-engineering
  applies_to_domain:
    - domain:human-resources
    - domain:operations
  triggers_responsibility:
    - responsibility:talent-acquisition
    - responsibility:hiring
    - responsibility:stakeholder-communication
    - responsibility:metric-definition
