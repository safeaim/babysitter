id: workflow:brand-campaign-launch
attributes:
  displayName: "Brand Campaign Launch"
  description: |
    On-demand cross-team operational workflow that takes a brand or marketing campaign
    from strategy brief through live execution and post-launch measurement. The marketing
    strategist and creative director align on objectives, audience, messaging, and channel
    mix before briefing the creative team. Brand managers oversee asset production,
    ensuring every deliverable meets identity guidelines. Legal and compliance review
    copy and claims. Launch timelines are coordinated across paid, owned, and earned
    channels. Post-launch, performance data is collected against defined KPIs and a
    retrospective captures learnings to improve future campaign efficiency and impact.
  workflowKind: operational
  triggerType: on-demand
  typicalCadence: "per-campaign"
  complexity: complex
