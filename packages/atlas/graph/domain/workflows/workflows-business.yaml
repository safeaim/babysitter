nodeKind: Workflow
id: workflow:financial-planning
attributes:
  displayName: "Financial Planning"
  description: |
    Annual governance workflow that develops the organization's integrated financial plan
    covering revenue targets, operating budgets, capital expenditures, and headcount for
    the coming fiscal year. Financial analysts build detailed models from business-unit
    inputs, reconciling bottom-up estimates against top-down targets agreed with leadership
    and the board. Scenario analyses stress-test the plan against downside assumptions.
    Approved plans are locked, communicated to budget owners, and tracked monthly through
    variance analysis and reforecasting cycles. The workflow ensures financial discipline,
    investor confidence, and strategic alignment of resource allocation across the business.
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annual"
  complexity: complex
edges:
  involves_role:
    - role:financial-analyst
