nodeKind: Workflow
id: workflow:vendor-onboarding
attributes:
  displayName: "Vendor Onboarding"
  description: |
    Event-driven cross-team operational workflow activated once a vendor has been selected
    and approved through the vendor evaluation process. The procurement manager coordinates
    contract execution with legal, while IT and security teams provision access, configure
    integrations, and validate that the vendor meets data handling and security requirements.
    Business stakeholders complete onboarding documentation and define success metrics for
    the relationship. The vendor is added to the approved vendor register with assigned
    relationship owners. A 30/60/90-day check-in cadence monitors early performance and
    surfaces any compliance or operational issues before they escalate.
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-vendor"
  complexity: moderate
edges:
  involves_role:
    - role:procurement-manager
    - role:legal-advisor
    - role:partnerships-manager
    - role:business-analyst
    - role:engineering-manager
  applies_to_domain:
    - domain:procurement
    - domain:legal
    - domain:operations
  triggers_responsibility:
    - responsibility:procurement
    - responsibility:contract-negotiation
    - responsibility:vendor-evaluation
    - responsibility:compliance-monitoring
    - responsibility:stakeholder-communication
