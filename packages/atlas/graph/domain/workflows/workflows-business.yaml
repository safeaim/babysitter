---
nodeKind: Workflow
id: workflow:strategic-planning
attributes:
  displayName: "Strategic Planning"
  description: |
    Annual cross-team governance workflow that sets the organization's direction for the
    coming one-to-three years. Senior leadership and strategic planners synthesize market
    intelligence, competitive dynamics, and internal capability assessments to define
    strategic priorities and OKRs. Business unit heads submit bottom-up initiatives, which
    are evaluated and ranked against strategic fit, resource requirements, and expected
    return. Approved strategies are translated into multi-year roadmaps, communicated to
    the board, and cascaded across all teams as measurable milestones. Quarterly progress
    reviews track execution health and trigger mid-cycle adjustments when market conditions
    shift materially.
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annual"
  complexity: complex
edges:
  involves_role:
    - role:strategic-planner
    - role:cto
    - role:vp-engineering
    - role:financial-analyst
    - role:business-analyst
    - role:marketing-strategist
  applies_to_domain:
    - domain:strategy
    - domain:finance
    - domain:business-intelligence
  triggers_responsibility:
    - responsibility:strategic-planning
    - responsibility:market-research
    - responsibility:stakeholder-communication
    - responsibility:risk-assessment
