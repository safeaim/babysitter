nodeKind: Workflow
id: workflow:contract-lifecycle
attributes:
  displayName: "Contract Lifecycle"
  description: |
    Event-driven governance workflow managing a commercial contract from initial request
    through execution, performance monitoring, and eventual renewal or termination. The
    legal advisor drafts or reviews the agreement, coordinating redlines with the
    counterparty and escalating non-standard terms to leadership. Risk and compliance
    assessments are completed before signature authority is exercised. Executed contracts
    are stored in the contract management system with key dates flagged for reminders.
    During the contract term, business owners monitor performance obligations and SLAs.
    Renewal or renegotiation is initiated automatically sixty to ninety days before
    expiry, ensuring no lapses in coverage or unintended auto-renewals.
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-contract"
  complexity: moderate
edges:
  involves_role:
    - role:legal-advisor
    - role:procurement-manager
    - role:partnerships-manager
    - role:financial-analyst
    - role:business-analyst
  applies_to_domain:
    - domain:legal
    - domain:procurement
    - domain:operations
  triggers_responsibility:
    - responsibility:contract-negotiation
    - responsibility:regulatory-compliance
    - responsibility:risk-assessment
    - responsibility:compliance-monitoring
    - responsibility:documentation
