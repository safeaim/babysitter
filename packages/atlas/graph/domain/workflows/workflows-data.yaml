nodeKind: Workflow
id: workflow:data-quality-monitoring
attributes:
  displayName: "Data Quality Monitoring"
  description: |
    Continuous single-team workflow that proactively detects and resolves data quality
    issues before they propagate to downstream consumers, dashboards, or ML models.
    Automated data quality checks run after each pipeline execution, evaluating freshness,
    completeness, uniqueness, referential integrity, and distribution drift against defined
    expectations. Failures trigger alerts routed to the owning data engineer's on-call
    rotation. The engineer investigates root causes — upstream source changes, schema
    drift, or pipeline bugs — applies fixes, and documents the incident. Quality metrics
    and SLA compliance are reported weekly to data consumers. The workflow builds trust in
    the data platform and reduces costly downstream errors caused by silent data corruption.
  workflowKind: data
  triggerType: continuous
  typicalCadence: "continuous"
  complexity: moderate
edges:
  involves_role:
    - role:data-engineer
    - role:analytics-engineer
    - role:data-analyst
    - role:bi-developer
  applies_to_domain:
    - domain:data-engineering
    - domain:databases
    - domain:observability
  triggers_responsibility:
    - responsibility:data-quality
    - responsibility:on-call
    - responsibility:metric-definition
    - responsibility:sla-management
