nodeKind: Workflow
id: workflow:data-governance-review
attributes:
  displayName: "Data Governance Review"
  description: |
    Quarterly workflow ensuring that data assets across the organisation are properly
    catalogued, classified, owned, and handled in accordance with privacy regulations and
    internal data policies. Data stewards and the data governance council review the data
    catalog for completeness, assess retention schedules, and verify that PII and sensitive
    data handling controls are enforced. Data quality metrics are reviewed and improvement
    actions assigned. Newly identified data assets are classified and onboarded into the
    governance framework. The review also assesses cross-border data transfer compliance
    and consent management effectiveness. Outcomes are documented and reported to the
    privacy officer and legal team.
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: complex
edges:
  involves_role:
    - role:compliance-officer
    - role:privacy-engineer
    - role:data-engineer
    - role:legal-counsel
    - role:analytics-engineer
  applies_to_domain:
    - domain:data-engineering
    - domain:databases
  triggers_responsibility:
    - responsibility:data-quality
    - responsibility:compliance-monitoring
    - responsibility:risk-assessment
    - responsibility:documentation
