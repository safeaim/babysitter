nodeKind: Workflow
id: workflow:budget-planning
attributes:
  displayName: "Budget Planning"
  description: |
    Annual cross-team workflow for forecasting, allocating, and approving engineering and
    technology budgets for the coming fiscal year. Engineering managers and tech leads
    submit bottom-up resource, tooling, and infrastructure cost projections. The VP of
    Engineering and CTO consolidate requests, align with strategic priorities, and negotiate
    with finance for top-down budget envelopes. Headcount plans, cloud spend forecasts, and
    software licence costs are reviewed against projected revenue growth. Approved budgets
    are communicated to teams, and quarterly budget reviews track actuals versus plan.
    The workflow ensures engineering investment is intentional, transparent, and aligned
    with company objectives.
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annual"
  complexity: complex
edges:
  involves_role:
    - role:vp-engineering
    - role:cto
    - role:engineering-manager
    - role:project-manager
    - role:business-analyst
  applies_to_domain:
    - domain:cloud-infra
    - domain:platform-engineering
  triggers_responsibility:
    - responsibility:budget-management
    - responsibility:stakeholder-communication
    - responsibility:capacity-planning
    - responsibility:risk-assessment
