nodeKind: Workflow
id: workflow:team-formation
attributes:
  displayName: "Team Formation"
  description: |
    Complex cross-team workflow activated during organisational restructuring, new product
    investment, or significant headcount growth that requires forming or reforming engineering
    teams. Engineering leadership defines team topologies aligned with product domains and
    cognitive load principles. Role requirements are mapped to hiring plans or internal
    mobility opportunities. Reporting lines, communication norms, and responsibilities are
    documented. Infrastructure, tooling, and access are provisioned for the new team.
    Kick-off sessions establish team identity, working agreements, and initial backlog.
    The workflow minimises disruption during reorganisations and sets new teams up for
    rapid, autonomous delivery from day one.
  workflowKind: onboarding
  triggerType: on-demand
  typicalCadence: "per-reorg"
  complexity: complex
edges:
  involves_role:
    - role:vp-engineering
    - role:engineering-manager
    - role:cto
    - role:project-manager
    - role:scrum-master
    - role:it-ops-engineer
  applies_to_domain:
    - domain:platform-engineering
    - domain:software-engineering
  triggers_responsibility:
    - responsibility:hiring
    - responsibility:mentoring
    - responsibility:stakeholder-communication
    - responsibility:knowledge-sharing
