nodeKind: Workflow
id: workflow:incident-response
attributes:
  displayName: "Incident Response"
  description: |
    Cross-team workflow activated when a production system experiences an outage, degradation,
    or security breach that impacts users or violates SLAs. An incident commander is declared,
    a war-room channel is opened, and on-call responders are paged from the relevant service
    teams. The commander coordinates parallel streams: triage and diagnosis, customer
    communications, and executive updates. Mitigation actions are applied, rollbacks or
    hotfixes deployed, and the incident is declared resolved once metrics recover. Within
    48-72 hours a blameless post-mortem is drafted, reviewed, and action items assigned to
    prevent recurrence. Outcome is restored service reliability and a learning artifact.
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "on-incident"
  complexity: complex
edges:
  involves_role:
    - role:incident-commander
    - role:sre
    - role:devops-engineer
    - role:backend-engineer
    - role:engineering-manager
    - role:customer-success-manager
  applies_to_domain:
    - domain:observability
    - domain:devops
    - domain:infrastructure
  triggers_responsibility:
    - responsibility:incident-response
    - responsibility:on-call
    - responsibility:stakeholder-communication
    - responsibility:sla-management
    - responsibility:disaster-recovery
---
nodeKind: Workflow
id: workflow:on-call-rotation
attributes:
  displayName: "On-Call Rotation"
  description: |
    Scheduled weekly operational workflow that ensures 24/7 engineering coverage for
    production systems. An on-call schedule is maintained in PagerDuty or equivalent,
    with primary and secondary responders drawn from the team roster. At the start of
    each rotation the incoming on-call engineer reviews open incidents, recent deploys,
    and any known fragile areas. Alerts are tuned periodically to reduce noise and
    prevent alert fatigue. At rotation handoff, the outgoing engineer documents any
    unresolved issues and shares a brief handoff summary. The workflow distributes
    operational burden equitably and keeps response times within SLA thresholds.
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: simple
edges:
  involves_role:
    - role:sre
    - role:backend-engineer
    - role:devops-engineer
    - role:engineering-manager
  applies_to_domain:
    - domain:observability
    - domain:devops
  triggers_responsibility:
    - responsibility:on-call
    - responsibility:sla-management
    - responsibility:knowledge-sharing
