nodeKind: Workflow
id: workflow:capacity-planning
attributes:
  displayName: "Capacity Planning"
  description: |
    Quarterly cross-team workflow for forecasting infrastructure resource needs and ensuring
    sufficient capacity is provisioned ahead of anticipated growth or peak traffic events.
    Platform engineers and SREs analyse historical usage trends, projected product growth,
    and upcoming campaigns or launches. Resource gap analyses are translated into provisioning
    requests or cloud scaling policies. Cost implications are reviewed with finance or
    engineering leadership, and approved capacity changes are scheduled. The workflow prevents
    both costly over-provisioning and performance degradations from under-provisioning,
    directly supporting uptime and cost-efficiency objectives.
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: complex
edges:
  involves_role:
    - role:sre
    - role:platform-engineer
    - role:devops-engineer
    - role:engineering-manager
    - role:vp-engineering
  applies_to_domain:
    - domain:cloud-infra
    - domain:infrastructure
    - domain:observability
  triggers_responsibility:
    - responsibility:capacity-planning
    - responsibility:budget-management
    - responsibility:risk-assessment
