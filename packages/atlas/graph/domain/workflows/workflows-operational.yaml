nodeKind: Workflow
id: workflow:change-management
attributes:
  displayName: "Change Management"
  description: |
    Structured on-demand workflow governing how planned changes to production systems
    are proposed, assessed, approved, and executed with minimal risk. An engineer or
    team submits a change request describing scope, rollback plan, risk rating, and
    required maintenance window. A change advisory board or designated approver reviews
    the request and either approves, defers, or rejects it. Approved changes are
    communicated to affected stakeholders, executed during the scheduled window, and
    verified post-execution. Emergency changes follow an expedited path with post-hoc
    documentation. The workflow prevents uncoordinated changes from causing outages or
    compliance failures.
  workflowKind: operational
  triggerType: on-demand
  typicalCadence: "per-change"
  complexity: moderate
edges:
  involves_role:
    - role:change-manager
    - role:devops-engineer
    - role:platform-engineer
    - role:engineering-manager
    - role:compliance-officer
  applies_to_domain:
    - domain:devops
    - domain:infrastructure
  triggers_responsibility:
    - responsibility:change-approval
    - responsibility:risk-assessment
    - responsibility:stakeholder-communication
    - responsibility:deployment-management
---
nodeKind: Workflow
id: workflow:post-mortem-review
attributes:
  displayName: "Post-Mortem Review"
  description: |
    Blameless retrospective workflow conducted after a significant incident or production
    failure, typically within 48-72 hours of resolution. The incident commander or a
    designated facilitator assembles a timeline of events from logs, chat history, and
    monitoring data. Participants from all involved teams collaboratively identify contributing
    factors, gaps in detection or response, and systemic weaknesses. A written post-mortem
    document is produced capturing the timeline, root causes, impact, and concrete action
    items with owners and due dates. The document is shared broadly to drive organisational
    learning. Action items are tracked in the team backlog until resolved.
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "post-incident"
  complexity: moderate
edges:
  involves_role:
    - role:incident-commander
    - role:sre
    - role:engineering-manager
    - role:devops-engineer
    - role:backend-engineer
  applies_to_domain:
    - domain:observability
    - domain:devops
  triggers_responsibility:
    - responsibility:incident-response
    - responsibility:documentation
    - responsibility:knowledge-sharing
    - responsibility:risk-assessment
