nodeKind: Workflow
id: workflow:user-feedback-loop
attributes:
  displayName: "User Feedback Loop"
  description: |
    Continuous single-team operational workflow that systematically collects, triages,
    and routes user feedback from in-product surveys, support tickets, app store reviews,
    social listening, and customer interviews into actionable product insights. Product
    analysts tag and categorize incoming feedback against a structured taxonomy each week.
    Recurring themes are surfaced to product managers in a weekly digest, with verbatim
    highlights attached to relevant backlog items. High-signal feedback triggers rapid
    follow-up interviews coordinated by UX researchers to deepen understanding. The
    workflow closes the loop with customers by communicating when reported issues are
    resolved or requested features are shipped, driving higher response rates and
    reinforcing a customer-centric product culture.
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "weekly"
  complexity: moderate
edges:
  involves_role:
    - role:product-manager
    - role:product-analyst
    - role:ux-researcher
    - role:customer-success-manager
  applies_to_domain:
    - domain:customer-experience
    - domain:customer-relations
    - domain:software-engineering
  triggers_responsibility:
    - responsibility:user-research
    - responsibility:metric-definition
    - responsibility:customer-journey-mapping
    - responsibility:stakeholder-communication
    - responsibility:backlog-grooming
