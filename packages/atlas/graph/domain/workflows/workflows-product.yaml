---
nodeKind: Workflow
id: workflow:product-discovery
attributes:
  displayName: "Product Discovery"
  description: |
    On-demand cross-team development workflow that validates whether a proposed product
    initiative is worth building before significant engineering investment is committed.
    Product managers and UX researchers conduct customer interviews, review usage data,
    and map the problem space to uncover genuine user needs and business opportunities.
    Product designers rapidly prototype solution concepts and run usability tests to
    surface critical design assumptions. Findings are synthesized into an opportunity
    brief that includes a problem statement, target personas, solution hypotheses, and
    a risk assessment. The brief is reviewed by product and engineering leadership, and
    a go/no-go decision determines whether the initiative proceeds to roadmap planning
    and detailed specification, or is parked pending further evidence.
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-initiative"
  complexity: complex
edges:
  involves_role:
    - role:product-manager
    - role:ux-researcher
    - role:product-designer
    - role:engineering-manager
    - role:business-analyst
    - role:growth-pm
  applies_to_domain:
    - domain:software-engineering
    - domain:customer-experience
    - domain:business-intelligence
  triggers_responsibility:
    - responsibility:user-research
    - responsibility:market-research
    - responsibility:strategic-planning
    - responsibility:backlog-grooming
    - responsibility:stakeholder-communication
