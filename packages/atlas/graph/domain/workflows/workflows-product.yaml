nodeKind: Workflow
id: workflow:competitive-analysis
attributes:
  displayName: "Competitive Analysis"
  description: |
    Quarterly cross-team governance workflow that maintains a structured, current view
    of the competitive landscape to inform product strategy, positioning, and sales
    enablement. Marketing strategists and product managers identify relevant competitors
    and track changes in their feature sets, pricing, messaging, and market traction.
    Customer-facing teams contribute win/loss insights collected from deals and support
    interactions. Findings are synthesized into a competitive intelligence brief covering
    key battlecards, strategic gaps, and opportunities for differentiation. The brief is
    shared with product, sales, and leadership, and directly influences roadmap priorities,
    positioning updates, and go-to-market adjustments for the coming quarter.
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: moderate
edges:
  involves_role:
    - role:marketing-strategist
    - role:product-manager
    - role:business-analyst
    - role:strategic-planner
    - role:account-executive
  applies_to_domain:
    - domain:strategy
    - domain:marketing
    - domain:business-intelligence
  triggers_responsibility:
    - responsibility:market-research
    - responsibility:strategic-planning
    - responsibility:metric-definition
    - responsibility:documentation
    - responsibility:stakeholder-communication
