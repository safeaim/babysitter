nodeKind: Workflow
id: workflow:pricing-strategy-review
attributes:
  displayName: "Pricing Strategy Review"
  description: |
    Semi-annual cross-team governance workflow that evaluates and updates the
    organization's pricing model, packaging tiers, and discount policies to ensure
    alignment with market conditions, competitive positioning, cost structures, and
    revenue objectives. Financial analysts model the revenue and margin implications of
    candidate pricing changes across customer segments. Product managers assess fit with
    product value delivery and roadmap direction. Marketing strategists evaluate
    competitive price perception and buyer sensitivity through research. Legal reviews
    contractual and regulatory implications of any changes. Approved pricing changes are
    communicated to sales and customer success with updated collateral, and their impact
    on pipeline conversion and net revenue retention is tracked in the quarter following
    implementation.
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annual"
  complexity: complex
edges:
  involves_role:
    - role:product-manager
    - role:financial-analyst
    - role:marketing-strategist
    - role:strategic-planner
    - role:legal-advisor
    - role:account-executive
  applies_to_domain:
    - domain:strategy
    - domain:finance
    - domain:revenue-operations
  triggers_responsibility:
    - responsibility:financial-analysis
    - responsibility:market-research
    - responsibility:strategic-planning
    - responsibility:stakeholder-communication
    - responsibility:metric-definition
