nodeKind: Workflow
id: workflow:release-management
attributes:
  displayName: "Release Management"
  description: |
    Cross-team coordination workflow that governs the planning, preparation, execution,
    and post-release monitoring of a scheduled software release. Begins with a release
    planning meeting where the release manager, engineering leads, and product managers
    align on scope, cut-off dates, and go/no-go criteria. A release branch is cut, final
    smoke tests and regression suites run in staging, and the release notes are drafted.
    On release day the release manager coordinates deployment across environments, monitors
    error rates and key metrics, and communicates status to stakeholders. Post-release a
    brief retrospective captures what went well and what to improve next cycle.
  workflowKind: release
  triggerType: scheduled
  typicalCadence: "per-release-cycle"
  complexity: complex
edges:
  involves_role:
    - role:release-manager
    - role:engineering-manager
    - role:devops-engineer
    - role:qa-engineer
    - role:product-manager
    - role:tech-lead
  applies_to_domain:
    - domain:devops
    - domain:software-engineering
  triggers_responsibility:
    - responsibility:release-coordination
    - responsibility:deployment-management
    - responsibility:stakeholder-communication
    - responsibility:documentation
---
nodeKind: Workflow
id: workflow:hotfix-deployment
attributes:
  displayName: "Hotfix Deployment"
  description: |
    Expedited workflow triggered by a critical production incident requiring an immediate
    code fix outside the normal release cycle. The on-call engineer diagnoses the root
    cause, develops a minimal targeted patch on a hotfix branch, and fast-tracks review
    with an abbreviated two-engineer sign-off. Automated tests must still pass. The patch
    is deployed to production through the standard pipeline but with priority scheduling.
    Monitoring is heightened for 30-60 minutes post-deploy, and a follow-up ticket is
    created to address any shortcuts taken. A post-mortem is scheduled if impact was
    significant.
  workflowKind: release
  triggerType: event-driven
  typicalCadence: "on-incident"
  complexity: moderate
edges:
  involves_role:
    - role:sre
    - role:devops-engineer
    - role:backend-engineer
    - role:tech-lead
    - role:incident-commander
  applies_to_domain:
    - domain:devops
    - domain:software-engineering
  triggers_responsibility:
    - responsibility:deployment-management
    - responsibility:incident-response
    - responsibility:on-call
---
nodeKind: Workflow
id: workflow:feature-flag-rollout
attributes:
  displayName: "Feature Flag Rollout"
  description: |
    On-demand workflow for safely releasing a new feature to a controlled percentage of
    users before a full rollout. The feature owner configures a flag in the feature-flag
    management system, sets an initial audience (e.g., internal users or 1% of traffic),
    and monitors product and error metrics. The rollout percentage is incrementally
    increased as confidence grows, with predefined thresholds that trigger automatic or
    manual rollback if error rates spike. Once 100% rollout is stable, the flag is
    retired and the conditional code cleaned up. Reduces blast radius of new features
    and decouples deployment from release.
  workflowKind: release
  triggerType: on-demand
  typicalCadence: "per-feature"
  complexity: moderate
edges:
  involves_role:
    - role:backend-engineer
    - role:product-manager
    - role:devops-engineer
    - role:sre
  applies_to_domain:
    - domain:devops
    - domain:software-engineering
    - domain:observability
  triggers_responsibility:
    - responsibility:deployment-management
    - responsibility:risk-assessment
    - responsibility:metric-definition
