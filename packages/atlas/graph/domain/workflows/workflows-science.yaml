nodeKind: Workflow
id: workflow:peer-review-cycle
attributes:
  displayName: "Peer Review Cycle"
  description: |
    Event-driven cross-team governance workflow initiated when a research manuscript or
    technical report is submitted for external publication or internal validation. The
    corresponding author prepares the submission package — manuscript, supplementary
    data, and reproducibility artifacts — and targets an appropriate venue. The journal
    or conference assigns independent peer reviewers who assess scientific rigor,
    novelty, and presentation quality. Authors address reviewer comments through one or
    more revision rounds, coordinating internally with collaborators and statistical
    reviewers. Upon acceptance, the research engineer and lab technician ensure all data
    and code are archived in a citable repository. The workflow upholds the integrity of
    published science and ensures findings meet community standards before dissemination.
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-publication"
  complexity: moderate
edges:
  involves_role:
    - role:research-engineer
