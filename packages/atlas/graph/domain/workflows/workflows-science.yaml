nodeKind: Workflow
id: workflow:lab-safety-audit
attributes:
  displayName: "Lab Safety Audit"
  description: |
    Annual single-team security workflow that assesses laboratory environments against
    applicable safety regulations, institutional policies, and best practices covering
    chemical handling, biological containment, radiation safety, and emergency
    preparedness. A designated safety officer leads the inspection, reviewing chemical
    inventories, waste disposal logs, equipment calibration records, and personnel
    training certificates. Findings are classified by severity and entered into a
    corrective action register with responsible owners and remediation deadlines.
    High-severity findings trigger immediate corrective measures before the lab resumes
    full operations. A final audit report is submitted to institutional safety committees
    and retained as evidence for regulatory inspections and insurance compliance.
  workflowKind: security
  triggerType: scheduled
  typicalCadence: "annual"
  complexity: moderate
edges:
  involves_role:
    - role:lab-technician
