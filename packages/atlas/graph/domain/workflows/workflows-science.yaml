nodeKind: Workflow
id: workflow:research-grant-lifecycle
attributes:
  displayName: "Research Grant Lifecycle"
  description: |
    Annual cross-team governance workflow covering the full arc of external research
    funding from opportunity identification through award management and final reporting.
    Research engineers and computational scientists identify relevant funding calls and
    assess strategic fit. A proposal team drafts the scientific narrative, budget
    justification, and compliance documentation against funder requirements. Legal and
    finance review the submission before it is submitted to the funding agency. If
    awarded, a project management cadence tracks milestones, expenditures, and deliverables
    against the grant agreement. Progress reports are prepared at mandated intervals, and
    a final close-out report is submitted with all required financial and scientific
    documentation to satisfy grant obligations and maintain eligibility for future funding.
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annual"
  complexity: complex
edges:
  involves_role:
    - role:research-engineer
    - role:computational-scientist
