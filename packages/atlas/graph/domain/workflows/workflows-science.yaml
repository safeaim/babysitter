nodeKind: Workflow
id: workflow:experiment-design
attributes:
  displayName: "Experiment Design"
  description: |
    On-demand development workflow that takes a scientific hypothesis through the full
    design process before any wet-lab or computational work begins. Research engineers
    and computational scientists formulate the research question, conduct a literature
    review to situate the study, and select the methodology — whether observational,
    interventional, or in-silico. Statistical power calculations determine sample sizes
    and analysis plans are pre-registered to prevent outcome bias. Experimental protocols
    are documented in lab notebooks and reviewed by a domain expert for feasibility and
    safety. The resulting design package is approved before resource allocation and
    execution begin, ensuring scientific rigor and reproducibility from the outset.
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-experiment"
  complexity: complex
