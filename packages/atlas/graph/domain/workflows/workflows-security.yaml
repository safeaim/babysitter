nodeKind: Workflow
id: workflow:vulnerability-management
attributes:
  displayName: "Vulnerability Management"
  description: |
    Continuous security workflow that identifies, assesses, prioritises, and remediates
    vulnerabilities across the organisation's software, infrastructure, and dependencies.
    Automated scanning tools run continuously against code repositories, container images,
    and cloud environments, feeding findings into a centralised vulnerability tracker.
    Security engineers triage new findings by CVSS score and exploitability, assign
    remediation owners, and track SLA compliance. Critical and high-severity findings
    trigger an expedited remediation path with engineering escalation. Monthly metrics
    on mean-time-to-remediate and open CVE counts are reported to leadership. The workflow
    maintains a continuously shrinking attack surface.
  workflowKind: security
  triggerType: continuous
  typicalCadence: "continuous"
  complexity: complex
edges:
  involves_role:
    - role:security-engineer
    - role:devops-engineer
    - role:platform-engineer
    - role:backend-engineer
    - role:compliance-officer
  applies_to_domain:
    - domain:cybersecurity
    - domain:devops
    - domain:cloud-infra
  triggers_responsibility:
    - responsibility:security-audit
    - responsibility:risk-assessment
    - responsibility:compliance-monitoring
