nodeKind: AsyncJob
id: async-job:gemini-batch-prediction
attributes:
  displayName: "Vertex AI Batch Prediction"
  kind: batch-api
  statusModel: polling
  description: |
    Google Vertex AI batch-prediction job for Gemini family models. Submit a
    GCS-hosted JSONL input; poll the operation until done.
edges: {}
