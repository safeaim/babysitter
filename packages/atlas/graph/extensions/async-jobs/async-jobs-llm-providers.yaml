nodeKind: AsyncJob
id: async-job:replicate-prediction
attributes:
  displayName: "Replicate prediction"
  kind: background-task
  statusModel: webhook
  description: |
    Replicate's prediction primitive — submit a model run, optionally register
    a webhook for completion. Used for image / audio / video generation models
    where inference time is seconds-to-minutes.
edges: {}
