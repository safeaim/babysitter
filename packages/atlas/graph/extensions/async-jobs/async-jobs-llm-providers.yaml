nodeKind: AsyncJob
id: async-job:openai-batch-api
attributes:
  displayName: "OpenAI Batch API"
  kind: batch-api
  statusModel: polling
  description: |
    OpenAI's Batch API — submit a JSONL of completion / embedding requests,
    poll the batch object until status transitions to `completed`. 24-hour
    SLA, ~50% discount versus synchronous calls.
edges: {}
