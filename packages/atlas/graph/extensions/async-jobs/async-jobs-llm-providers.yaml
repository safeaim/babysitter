nodeKind: AsyncJob
id: async-job:anthropic-message-batches
attributes:
  displayName: "Anthropic Message Batches"
  kind: batch-api
  statusModel: polling
  description: |
    Anthropic's Message Batches API — submit a list of Messages requests,
    poll batch status. Batches process within 24 hours; 50% discount on input
    and output tokens.
edges: {}
