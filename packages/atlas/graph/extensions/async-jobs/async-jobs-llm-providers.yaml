nodeKind: AsyncJob
id: async-job:openai-streaming-response
attributes:
  displayName: "OpenAI Responses streaming"
  kind: streaming-completion
  statusModel: sse
  description: |
    OpenAI Responses API in streaming mode — server emits SSE events
    (`response.created`, `response.output_text.delta`, `response.completed`).
    Modeled as AsyncJob for symmetry with batch primitives even though the
    callback shape is in-band SSE rather than out-of-band webhook.
edges: {}
