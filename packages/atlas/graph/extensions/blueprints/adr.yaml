    when architecture-touching paths change (nudge only, never blocking).
  installMd: "@plugins/a5c/marketplace/plugins/adr/install.md"
  configureMd: "@plugins/a5c/marketplace/plugins/adr/configure.md"
  uninstallMd: "@plugins/a5c/marketplace/plugins/adr/uninstall.md"
  latestVersion: "1.0.0"
  versions: ["1.0.0"]
  tags: [adr, architecture, documentation, decisions, log4brains, adr-tools]
  author: "a5c-ai"
  packagePath: "plugins/adr"
  marketplaceUrl: https://github.com/a5c-ai/babysitter
  scope: project
  domains:
    - topic:architecture-decisions
    - domain:software-engineering
  requiresLanguages: []
  requiresFrameworks: []
  targetSurface:
