  routePath: null
  refreshCadence: poll
  dataSourceEndpointIds:
    - api-endpoint:get-state
  runtimeSnapshotSourceId: runtime-snapshot:example-clean
  readOnly: true
  loadBearing: false
edges:
  reads_endpoint:
    - target: api-endpoint:get-state
  derives_from:
    - target: runtime-snapshot:example-clean
