  signalKind: env-any
  key: openclaw
  matchMode: any
  confidence: medium
  scope: host-detection
  signals:
    - OPENCLAW_SESSION
    - OPENCLAW_RUN_ID
  argvMatches:
    - openclaw
  consumer: agent-comm-mux
  metadataFields:
    - { key: session_id, envVars: [OPENCLAW_SESSION] }
    - { key: run_id,     envVars: [OPENCLAW_RUN_ID] }
edges:
  applies_to:
    - target: agent:openclaw
