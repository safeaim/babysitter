  description: Set to 1 to force-disable extended thinking regardless of model support or settings.
  name: CLAUDE_CODE_DISABLE_THINKING
  category: thinking
  valueType: bool
edges:
  affects:
  - target: agent-runtime-impl:claude-code.runtime@1.x
