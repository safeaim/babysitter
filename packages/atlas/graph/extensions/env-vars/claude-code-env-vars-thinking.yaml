nodeKind: EnvVar
id: env-var:claude-code-disable-adaptive-thinking
attributes:
  displayName: CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING
  description: Set to 1 to disable adaptive reasoning on Opus 4.6 and Sonnet 4.6 (no effect on Opus 4.7).
  name: CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING
  category: thinking
  valueType: bool
edges:
  affects:
  - target: agent-runtime-impl:claude-code.runtime@1.x
---
nodeKind: EnvVar
