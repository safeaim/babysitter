nodeKind: EnvVar
id: env-var:anthropic-api-key
attributes:
  displayName: ANTHROPIC_API_KEY
  description: Primary auth credential for the Anthropic API.
  name: ANTHROPIC_API_KEY
  category: auth
  valueType: string
edges:
  affects:
  - target: agent-runtime-impl:claude-code.runtime@1.x
---
nodeKind: EnvVar
id: env-var:claude-code-use-bedrock
attributes:
  displayName: CLAUDE_CODE_USE_BEDROCK
  description: When set to 1, route model calls through AWS Bedrock instead of the Anthropic API.
  name: CLAUDE_CODE_USE_BEDROCK
  category: bedrock
  valueType: bool
  defaultValue: "0"
  featureGate: true
edges:
  affects:
  - target: agent-runtime-impl:claude-code.runtime@1.x
---
nodeKind: EnvVar
id: env-var:claude-code-use-vertex
attributes:
  displayName: CLAUDE_CODE_USE_VERTEX
  description: When set to 1, route model calls through Google Vertex AI.
  name: CLAUDE_CODE_USE_VERTEX
  category: vertex
  valueType: bool
  defaultValue: "0"
  featureGate: true
edges:
  affects:
  - target: agent-runtime-impl:claude-code.runtime@1.x
---
nodeKind: EnvVar
id: env-var:claude-code-experimental-agent-teams
attributes:
  displayName: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
  description: Experimental gate enabling the agent-teams feature (team-create, send-message tools).
  name: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
  category: subagents
  valueType: bool
  defaultValue: "0"
  featureGate: true
  introducedInVersion: ">=2.1.32"
edges:
  affects:
  - target: agent-runtime-impl:claude-code.runtime@1.x
