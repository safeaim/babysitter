nodeKind: ExtensionInterface
id: extension-interface:secrets
attributes:
  interfaceVersion: "1.0.0"
  description: Secrets
  displayName: "Secrets"
  concern: "How secrets are sourced, redacted, and scoped within an agent run."
  surface: |
    `resolve(name, scope)` returns a secret reference; `redact(text)`
    removes known secret values from outgoing text. Implementations
    integrate with vaults (1Password, Vault, KMS) or env-based stores.
  builtInDefault: |
    Reads `process.env` directly with no redaction. Plaintext only.
  notableImpls: []
edges: {}
