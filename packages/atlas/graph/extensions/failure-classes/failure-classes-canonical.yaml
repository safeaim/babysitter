nodeKind: FailureClass
id: failure-class:workspace
attributes:
  displayName: "workspace"
  scope: workspace
  defaultRecoveryStrategyId: recovery-strategy:skip-tick
  description: "Workspace materialization or cwd resolution failure."
  neverCrashesOrchestrator: true
---
nodeKind: FailureClass
id: failure-class:agent-session
attributes:
