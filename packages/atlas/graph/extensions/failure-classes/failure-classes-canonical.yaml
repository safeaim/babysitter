  scope: agent-session
  defaultRecoveryStrategyId: recovery-strategy:retry-backoff
  description: "Agent subprocess errors: timeouts, port exit, turn failures."
  neverCrashesOrchestrator: true
---
nodeKind: FailureClass
id: failure-class:tracker
attributes:
  displayName: "tracker"
  scope: tracker
  defaultRecoveryStrategyId: recovery-strategy:skip-tick
  description: "Issue tracker fetch / write failures."
  neverCrashesOrchestrator: true
---
nodeKind: FailureClass
id: failure-class:observability
attributes:
  displayName: "observability"
  scope: observability
