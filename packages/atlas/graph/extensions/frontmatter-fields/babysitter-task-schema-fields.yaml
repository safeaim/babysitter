nodeKind: FrontmatterField
id: frontmatter-field:task-schema-id
attributes:
  displayName: "defineTask: id"
  name: id
  valueType: string
  required: "yes"
  appliesTo: task-schema
  description: |
    Stable task identifier (kebab-case dotted-namespace recommended).
    Required when the spec uses `id`; mutually exclusive with `name`.
    Source: packages/sdk/src/tasks/defineTask.ts (DefineTaskObjectSpec.id).
