  appliesTo: skill
  description: Short prose triggering description used by the model to decide invocation.
---
nodeKind: FrontmatterField
id: frontmatter-field:skill-when-to-use
attributes:
  displayName: "Skill frontmatter: when_to_use"
  name: when_to_use
  valueType: string
  required: "recommended"
  appliesTo: skill
  description: Auxiliary trigger guidance (richer than `description`).
---
nodeKind: FrontmatterField
id: frontmatter-field:skill-argument-hint
