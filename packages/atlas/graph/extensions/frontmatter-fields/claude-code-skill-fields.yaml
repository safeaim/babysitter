nodeKind: FrontmatterField
id: frontmatter-field:skill-name
attributes:
  displayName: "Skill frontmatter: name"
  name: name
  valueType: string
  required: "yes"
  appliesTo: skill
  description: Skill identifier (kebab-case). Required.
---
nodeKind: FrontmatterField
id: frontmatter-field:skill-description
attributes:
  displayName: "Skill frontmatter: description"
  name: description
  valueType: string
