attributes:
  displayName: "amux-triggers action step 6: Install plugins (legacy)"
  order: 6
  stepName: "Install plugins (legacy)"
  shell: bash
  conditional: "${{ inputs.plugins != '' }}"
  envVars:
    - "ACTION_ROOT=${{ github.action_path }}"
    - "INPUT_ADAPTER=${{ inputs.adapter || inputs.harness }}"
    - "INPUT_PLUGINS=${{ inputs.plugins }}"
  runScript: |
    set -euo pipefail
    REPO_ROOT=$(cd "$ACTION_ROOT/../.." && pwd)
    while IFS= read -r plugin; do
      [ -z "$plugin" ] && continue
      node "$REPO_ROOT/packages/agent-mux/cli/dist/index.js" plugin install "$INPUT_ADAPTER" "$plugin"
    done <<< "$INPUT_PLUGINS"
