nodeKind: MCPPrompt
id: mcp-prompt:plan-tasks
attributes:
  displayName: "plan_tasks"
  name: "plan_tasks"
  arguments:
    - { name: "goal", description: "High-level goal", required: true }
    - { name: "constraints", description: "Hard constraints", required: false }
  description: |
    Prompt template exposed by planner-style MCP servers; returns a structured
    plan-of-tasks the host agent can execute.
edges: {}
