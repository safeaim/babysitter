nodeKind: MCPPrompt
id: mcp-prompt:explain-diff
attributes:
  displayName: "explain_diff"
  name: "explain_diff"
  arguments:
    - { name: "diff", description: "Unified diff text", required: true }
    - { name: "audience", description: "reviewer | maintainer | newcomer", required: false }
  description: |
    Prompt template exposed by source-control MCP servers (e.g. github, gitea).
    Wraps the diff with audience-specific framing.
edges: {}
