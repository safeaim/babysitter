nodeKind: MCPPrompt
id: mcp-prompt:summarize-thread
attributes:
  displayName: "summarize_thread"
  name: "summarize_thread"
  arguments:
    - { name: "thread_id", description: "Conversation thread id", required: true }
    - { name: "max_words", description: "Target summary length", required: false }
  description: |
    Server-supplied prompt template that asks the model to summarize a chat
    thread into a short brief. Common in chat-platform MCP servers.
edges: {}
