nodeKind: OperationalTrigger
id: operational-trigger:amux-triggers-action
attributes:
  displayName: Agent Mux — reusable GitHub Action composite
  triggerKind: vcs-event
  effect: 'Composite action at packages/triggers/action.yml. Supports all harnesses

    (claude, codex, pi, gemini, copilot, cursor, opencode, hermes) with providers

    (foundry, google, anthropic, bedrock, openai). Steps: setup-node →

    optional a5c GitHub App token exchange → npm ci + build agent-mux +

    build @a5c-ai/triggers → optional `amux install <harness>` →

    optional babysitter plugin install → optional legacy plugin install → enrich →

    evaluate (exit-code 78 means skip) → if matched: pre-run, amux launch

    <harness> [<provider>] [--model M] [--prompt P] [--max-turns N]

    [--with-proxy-if-needed] [--yolo] [args-json|args], post-run.

    Outputs: matched, event, exit-code.

    '
  idempotent: false
  invokerSurface: vcs-event
  dispatchModel: reusable-action
  payloadShape: NormalizedTriggerEvent
  queryDsl: key-colon-value
  cliEntrypoint: 'uses: ./packages/triggers'
  enrichmentSources:
  - workflow-event-payload
  - github-rest-api
  - local-git-show
  - git-diff-unified
  sideEffects:
  - Outputs matched=true|false on the step (action.yml:67)
  - Outputs event=<path-to-enriched-json> (action.yml:70)
  - Outputs exit-code=<amux exit code> (action.yml:73)
  - May install agent-mux harness + plugins side-effectfully before evaluation (action.yml:103-129)
  - Sets AMUX_TRIGGER_EVENT_PATH env var for pre-run, amux, post-run steps
  sourceCitation: 'packages/triggers/action.yml (full composite action; inputs

    1-65, outputs 66-75, steps 77-232).

    '
  exitCodeSemantics:
  - "0:matched-and-amux-success:trigger matched and amux exited 0 (action.yml:215)"
  - "78:skip:trigger query did not match (action.yml:165 swallows 78 from evaluate)"
  - "non-zero:amux-failure:propagated from amux exit (action.yml:217-220)"
edges:
