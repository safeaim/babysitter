nodeKind: OperationalTrigger
id: operational-trigger:amux-triggers-gitlab
attributes:
  displayName: amux-triggers — GitLab backend
  triggerKind: webhook-event
  effect: 'Normalizes a GitLab webhook payload (merge_request / push / note)

    using object_kind / object_attributes shape, into the same

    NormalizedTriggerEvent envelope. No GitLab REST enrichment;

    relies on workflow-event-payload + local-git fallback.

    '
  idempotent: true
  invokerSurface: webhook
  backend: gitlab
  eventTaxonomy:
  - merge_request
  - push
  - note
  - issue
  dispatchModel: normalize-and-evaluate
  payloadShape: NormalizedTriggerEvent
  queryDsl: key-colon-value
  cliEntrypoint: amux-triggers
  enrichmentSources:
  - workflow-event-payload
  - local-git-show
  - git-diff-unified
  sourceCitation: 'packages/triggers/src/backends/gitlab.ts:4 (normalizeGitlab),

    packages/triggers/src/enrich.ts:99 (enrichEvent — non-github branch

    skips API enrichment).

    '
  exitCodeSemantics:
  - "0:matched:trigger query matched"
  - "78:skip:trigger query did not match (cli.ts:65)"
  - "1:error:unhandled exception"
edges:
  implemented_by:
  - target: package:a5c-ai-triggers
  has_payload_schema:
  - target: shared-context-spec:normalized-trigger-event
  parsed_by_grammar:
  - target: grammar:amux-triggers-query-dsl
