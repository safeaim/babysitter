nodeKind: OperationalTrigger
id: operational-trigger:amux-triggers-github
attributes:
  displayName: amux-triggers — GitHub backend
  triggerKind: webhook-event
  effect: 'Normalizes a GitHub Actions event payload (issue / pull_request /

    issue_comment / push) into NormalizedTriggerEvent, enriches changed

    files via `pulls/:n/files` or `commits/:sha`, optionally pulls

    unified diffs via `git show`, then evaluates a TriggerQuery and

    exits 0 (matched) / 78 (skip) / non-zero (error).

    '
  idempotent: true
  invokerSurface: webhook
  backend: github
  eventTaxonomy:
  - issue_comment
  - issues
  - pull_request
  - pull_request_review
  - pull_request_review_comment
  - push
  - workflow_dispatch
  dispatchModel: normalize-and-evaluate
  payloadShape: NormalizedTriggerEvent
  queryDsl: key-colon-value
  cliEntrypoint: amux-triggers
  enrichmentSources:
  - workflow-event-payload
  - github-rest-api
  - local-git-show
  - git-diff-unified
  sideEffects:
  - Sets GITHUB_OUTPUT matched=true|false (action.yml:170)
  - Writes enriched event JSON to RUNNER_TEMP/agent-mux-event.json
  - Writes evaluation result JSON to RUNNER_TEMP/agent-mux-trigger.json
  - On match runs pre-run, then `amux <command>`, then post-run (action.yml:174-232)
  sourceCitation: 'packages/triggers/src/backends/github.ts:4 (normalizeGithub),

    packages/triggers/src/enrich.ts:61 (enrichGithubFromApi),

    packages/triggers/action.yml:131-172 (Evaluate trigger step).

    '
  exitCodeSemantics:
  - "0:matched:trigger query matched, downstream pipeline runs (cli.ts:65)"
  - "78:skip:trigger query did not match; action.yml:165 treats 78 as soft-skip"
  - "1:error:invalid args / unhandled exception"
edges:
  implemented_by:
  - target: package:a5c-ai-triggers
  has_payload_schema:
  - target: shared-context-spec:normalized-trigger-event
  calls_endpoint:
  - target: api-endpoint:github-pulls-files
  - target: api-endpoint:github-commits-by-sha
  parsed_by_grammar:
  - target: grammar:amux-triggers-query-dsl
