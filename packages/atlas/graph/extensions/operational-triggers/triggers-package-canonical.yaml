  sourceCitation: 'packages/triggers/src/backends/generic-webhook.ts:4

    (normalizeGeneric); packages/triggers/src/enrich.ts:9

    (detectBackend default ''github'' fallback path).

    '
  exitCodeSemantics:
  - "0:matched:trigger query matched"
  - "78:skip:trigger query did not match"
  - "1:error:unhandled exception"
