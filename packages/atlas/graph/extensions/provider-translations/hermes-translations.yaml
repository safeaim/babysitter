nodeKind: ProviderTranslation
id: provider-translation:hermes:foundry
attributes:
  harness: hermes
  provider: foundry
  proxyRequired: false
  envMapping:
    - envVar: AZURE_API_KEY
      source: auth.apiKey
      condition: present
    - envVar: AZURE_OPENAI_API_KEY
      source: auth.apiKey
      condition: present
  suppressNonAnthropicKey: true
  args: []
  notes: >
    Hermes has a built-in azure-foundry provider. Pass AZURE_API_KEY
    and use --provider azure-foundry CLI flag. No proxy needed.
---
