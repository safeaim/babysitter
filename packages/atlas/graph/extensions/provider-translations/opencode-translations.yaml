nodeKind: ProviderTranslation
id: provider-translation:opencode:anthropic
attributes:
  harness: opencode
  provider: anthropic
  proxyRequired: false
  nativeSdk: "@ai-sdk/anthropic"
  envMapping:
    - envVar: ANTHROPIC_API_KEY
      source: auth.apiKey
      condition: present
  args: []
  conditionalLogic: opencode-config-generation
  notes: >
    OpenCode with Anthropic provider. Uses @ai-sdk/anthropic npm package.
    Generates OPENCODE_CONFIG_CONTENT JSON dynamically with provider/model config.
edges:
  translates_for:
    - target: agent:opencode
  uses_provider:
    - target: provider:anthropic
