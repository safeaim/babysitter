nodeKind: ToolDescriptor
id: tool-descriptor:cloudflare.list-workers
attributes:
  schema: '{}'
  displayName: "Cloudflare: List Workers"
  description: List Cloudflare Worker scripts in the account.
  inputSchema:
    type: object
    properties:
      account_id: { type: string }
  outputSchema:
    type: object
    properties:
      workers: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-cloudflare
