nodeKind: ToolDescriptor
id: tool-descriptor:codex.mcp.codex
attributes:
  schema: '{}'
  displayName: 'Codex MCP: Start Conversation'
  description: |-
    MCP tool exposed by `codex mcp-server` to start a Codex conversation from another agent or host. Accepts configuration parameters matching the Codex Config struct.
  inputSchema:
    type: object
    required:
      - prompt
    properties:
      approval-policy:
        description: 'Approval policy for shell commands generated by the model: `untrusted`, `on-failure`, `on-request`, `never`.'
        type: string
        enum:
          - untrusted
          - on-failure
          - on-request
          - never
      base-instructions:
        description: The set of instructions to use instead of the default ones.
        type: string
      compact-prompt:
        description: Prompt used when compacting the conversation.
        type: string
      config:
        description: Individual config settings that will override what is in CODEX_HOME/config.toml.
        type: object
        additionalProperties: true
      cwd:
        description: Working directory for the session. If relative, it is resolved against the server process's current working directory.
        type: string
      developer-instructions:
        description: Developer instructions that should be injected as a developer role message.
        type: string
      model:
        description: Optional override for the model name.
        type: string
      profile:
        description: Configuration profile from config.toml to specify default options.
        type: string
      prompt:
        description: The initial user prompt to start the Codex conversation.
        type: string
      sandbox:
        description: 'Sandbox mode: `read-only`, `workspace-write`, or `danger-full-access`.'
        type: string
        enum:
          - read-only
          - workspace-write
          - danger-full-access
  outputSchema:
    type: object
    required:
      - threadId
      - content
    properties:
      threadId:
        type: string
      content:
        type: string
  mode: normal
  streamable: true
  timeoutMs: 120000
edges:
  contained_in_plugin:
    - target: tool-server:codex-mcp-server
---
nodeKind: ToolDescriptor
id: tool-descriptor:codex.mcp.codex-reply
attributes:
  schema: '{}'
  displayName: 'Codex MCP: Continue Conversation'
  description: |-
    MCP tool exposed by `codex mcp-server` to continue an existing Codex conversation by thread id and prompt.
  inputSchema:
    type: object
    required:
      - prompt
    properties:
      conversationId:
        description: Deprecated alias for threadId retained by the Codex MCP tool.
        type: string
      prompt:
        description: The next user prompt to continue the Codex conversation.
        type: string
      threadId:
        description: The thread id for this Codex session.
        type: string
  outputSchema:
    type: object
    required:
      - threadId
      - content
    properties:
      threadId:
        type: string
      content:
        type: string
  mode: normal
  streamable: true
  timeoutMs: 120000
edges:
  contained_in_plugin:
    - target: tool-server:codex-mcp-server
