nodeKind: ToolDescriptor
id: tool-descriptor:everything.echo
attributes:
  schema: '{}'
  displayName: "Everything: Echo"
  description: Echo back the input message. Used to test tool invocation.
  inputSchema:
    type: object
    required: [message]
    properties:
      message: { type: string }
  outputSchema:
    type: object
    properties:
      message: { type: string }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-everything
---
nodeKind: ToolDescriptor
id: tool-descriptor:everything.add
attributes:
  schema: '{}'
  displayName: "Everything: Add"
  description: Add two numbers and return the sum.
  inputSchema:
    type: object
    required: [a, b]
    properties:
      a: { type: number }
      b: { type: number }
  outputSchema:
    type: object
    properties:
      sum: { type: number }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-everything
---
