nodeKind: ToolDescriptor
id: tool-descriptor:github.create-issue
attributes:
  schema: '{}'
  displayName: "GitHub: Create Issue"
  description: |
    Create a new issue in a GitHub repository.
  inputSchema:
    type: object
    required: [owner, repo, title]
    properties:
      owner: { type: string }
      repo: { type: string }
      title: { type: string }
      body: { type: string }
      labels: { type: array, items: { type: string } }
      assignees: { type: array, items: { type: string } }
  outputSchema:
    type: object
    properties:
      number: { type: integer }
      url: { type: string }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-github
---
nodeKind: ToolDescriptor
id: tool-descriptor:github.list-issues
attributes:
  schema: '{}'
  displayName: "GitHub: List Issues"
  description: List issues for a repository, with state and label filters.
  inputSchema:
    type: object
    required: [owner, repo]
    properties:
      owner: { type: string }
      repo: { type: string }
      state: { type: string, enum: [open, closed, all] }
      labels: { type: array, items: { type: string } }
  outputSchema:
    type: object
    properties:
      issues: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-github
---
