  outputSchema:
    type: object
    properties:
      routes: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-google-maps
---
nodeKind: ToolDescriptor
id: tool-descriptor:maps.distance-matrix
attributes:
  schema: '{}'
  displayName: "Maps: Distance Matrix"
  description: Return travel-time/distance for origin/destination pairs.
  inputSchema:
    type: object
    required: [origins, destinations]
    properties:
      origins: { type: array, items: { type: string } }
      destinations: { type: array, items: { type: string } }
      mode: { type: string }
  outputSchema:
    type: object
    properties:
      matrix: { type: object }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-google-maps
