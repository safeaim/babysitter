nodeKind: ToolDescriptor
id: tool-descriptor:maps.geocode
attributes:
  schema: '{}'
  displayName: "Maps: Geocode"
  description: Convert a street address to coordinates.
  inputSchema:
    type: object
    required: [address]
    properties:
      address: { type: string }
  outputSchema:
    type: object
    properties:
      lat: { type: number }
      lng: { type: number }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-google-maps
---
nodeKind: ToolDescriptor
id: tool-descriptor:maps.reverse-geocode
attributes:
  schema: '{}'
  displayName: "Maps: Reverse Geocode"
  description: Convert coordinates to a postal address.
  inputSchema:
    type: object
    required: [latitude, longitude]
    properties:
      latitude: { type: number }
      longitude: { type: number }
  outputSchema:
    type: object
    properties:
      address: { type: string }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-google-maps
---
nodeKind: ToolDescriptor
id: tool-descriptor:maps.search-places
attributes:
  schema: '{}'
  displayName: "Maps: Search Places"
  description: Text search for places matching a query.
  inputSchema:
    type: object
    required: [query]
    properties:
      query: { type: string }
      location: { type: object }
      radius: { type: number }
  outputSchema:
    type: object
    properties:
      places: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-google-maps
---
nodeKind: ToolDescriptor
id: tool-descriptor:maps.place-details
