    properties:
      place: { type: object }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-google-maps
---
nodeKind: ToolDescriptor
id: tool-descriptor:maps.directions
attributes:
  schema: '{}'
  displayName: "Maps: Directions"
  description: Return turn-by-turn directions between origin and destination.
  inputSchema:
    type: object
    required: [origin, destination]
    properties:
      origin: { type: string }
      destination: { type: string }
