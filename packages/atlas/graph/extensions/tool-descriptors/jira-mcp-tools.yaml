nodeKind: ToolDescriptor
id: tool-descriptor:jira.search
attributes:
  schema: '{}'
  displayName: "Jira: Search Issues (JQL)"
  description: Search Jira issues using JQL.
  inputSchema:
    type: object
    required: [jql]
    properties:
      jql: { type: string }
      fields: { type: array, items: { type: string } }
      limit: { type: integer }
  outputSchema:
    type: object
    properties:
      issues: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-jira
---
nodeKind: ToolDescriptor
id: tool-descriptor:jira.get-issue
attributes:
  schema: '{}'
  displayName: "Jira: Get Issue"
  description: Fetch a Jira issue by key (e.g. PROJ-123).
  inputSchema:
    type: object
    required: [issue_key]
    properties:
      issue_key: { type: string }
      fields: { type: array, items: { type: string } }
  outputSchema:
    type: object
    properties:
      issue: { type: object }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-jira
---
nodeKind: ToolDescriptor
id: tool-descriptor:jira.create-issue
attributes:
  schema: '{}'
  displayName: "Jira: Create Issue"
  description: Create a new Jira issue in a project.
  inputSchema:
    type: object
    required: [project_key, summary, issue_type]
    properties:
      project_key: { type: string }
      summary: { type: string }
      issue_type: { type: string }
      description: { type: string }
      assignee: { type: string }
      labels: { type: array, items: { type: string } }
  outputSchema:
    type: object
    properties:
      issue_key: { type: string }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-jira
---
nodeKind: ToolDescriptor
