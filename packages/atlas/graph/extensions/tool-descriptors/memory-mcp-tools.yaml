    type: object
    required: [entityNames]
    properties:
      entityNames: { type: array, items: { type: string } }
  outputSchema:
    type: object
    properties:
      ok: { type: boolean }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-memory
---
