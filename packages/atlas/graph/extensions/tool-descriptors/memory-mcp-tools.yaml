nodeKind: ToolDescriptor
id: tool-descriptor:memory.create-entities
attributes:
  schema: '{}'
  displayName: "Memory: Create Entities"
  description: Add entities (nodes) to the knowledge graph.
  inputSchema:
    type: object
    required: [entities]
    properties:
      entities: { type: array }
  outputSchema:
    type: object
    properties:
      entities: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-memory
---
nodeKind: ToolDescriptor
id: tool-descriptor:memory.create-relations
attributes:
  schema: '{}'
  displayName: "Memory: Create Relations"
  description: Add directed relations between entities.
  inputSchema:
    type: object
    required: [relations]
    properties:
      relations: { type: array }
  outputSchema:
    type: object
    properties:
      relations: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-memory
---
nodeKind: ToolDescriptor
id: tool-descriptor:memory.add-observations
attributes:
  schema: '{}'
