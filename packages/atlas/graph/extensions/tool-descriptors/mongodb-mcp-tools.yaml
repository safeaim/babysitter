nodeKind: ToolDescriptor
id: tool-descriptor:mongo.list-databases
attributes:
  schema: '{}'
  displayName: "MongoDB: List Databases"
  description: List all databases on the connected MongoDB cluster.
  inputSchema:
    type: object
    properties: {}
  outputSchema:
    type: object
    properties:
      databases: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-mongodb
---
nodeKind: ToolDescriptor
id: tool-descriptor:mongo.list-collections
attributes:
  schema: '{}'
  displayName: "MongoDB: List Collections"
  description: List collections in a database.
  inputSchema:
    type: object
    required: [database]
    properties:
      database: { type: string }
  outputSchema:
    type: object
    properties:
      collections: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-mongodb
