nodeKind: ToolDescriptor
id: tool-descriptor:puppeteer.navigate
attributes:
  schema: '{}'
  displayName: "Puppeteer: Navigate"
  description: Navigate the browser to a URL.
  inputSchema:
    type: object
    required: [url]
    properties:
      url: { type: string }
  outputSchema:
    type: object
    properties:
      ok: { type: boolean }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-puppeteer
---
nodeKind: ToolDescriptor
id: tool-descriptor:puppeteer.screenshot
attributes:
  schema: '{}'
  displayName: "Puppeteer: Screenshot"
  description: Capture a PNG screenshot of the page or a CSS-selected element.
  inputSchema:
    type: object
    required: [name]
    properties:
      name: { type: string }
      selector: { type: string }
      width: { type: integer }
      height: { type: integer }
  outputSchema:
    type: object
    properties:
      image: { type: string }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-puppeteer
---
