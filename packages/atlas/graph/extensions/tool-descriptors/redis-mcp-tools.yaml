nodeKind: ToolDescriptor
id: tool-descriptor:redis.hset
attributes:
  schema: '{}'
  displayName: "Redis: HSET"
  description: Set a hash field value.
  inputSchema:
    type: object
    required: [key, field, value]
    properties:
      key: { type: string }
