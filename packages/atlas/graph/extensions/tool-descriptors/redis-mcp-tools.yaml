nodeKind: ToolDescriptor
id: tool-descriptor:redis.lpush
attributes:
  schema: '{}'
  displayName: "Redis: LPUSH"
  description: Prepend one or more values to a list.
  inputSchema:
    type: object
    required: [key, value]
