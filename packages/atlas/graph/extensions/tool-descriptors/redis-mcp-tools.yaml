nodeKind: ToolDescriptor
id: tool-descriptor:redis.get
attributes:
  schema: '{}'
  displayName: "Redis: GET"
  description: Get the value of a string key.
  inputSchema:
    type: object
    required: [key]
    properties:
      key: { type: string }
  outputSchema:
    type: object
    properties:
      value: { type: string }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-redis
---
nodeKind: ToolDescriptor
id: tool-descriptor:redis.set
attributes:
  schema: '{}'
  displayName: "Redis: SET"
  description: Set a string key to a value, optionally with TTL.
  inputSchema:
    type: object
    required: [key, value]
    properties:
      key: { type: string }
      value: { type: string }
      ex: { type: integer }
  outputSchema:
    type: object
    properties:
      ok: { type: boolean }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-redis
---
nodeKind: ToolDescriptor
id: tool-descriptor:redis.delete
attributes:
  schema: '{}'
  displayName: "Redis: DEL"
  description: Delete one or more keys.
  inputSchema:
    type: object
    required: [key]
    properties:
      key: { type: string }
  outputSchema:
    type: object
    properties:
      deleted: { type: integer }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-redis
---
nodeKind: ToolDescriptor
id: tool-descriptor:redis.list-keys
attributes:
  schema: '{}'
  displayName: "Redis: List Keys (SCAN)"
  description: Iterate keys matching a pattern using SCAN.
  inputSchema:
    type: object
    properties:
      pattern: { type: string }
      count: { type: integer }
  outputSchema:
    type: object
    properties:
      keys: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-redis
---
nodeKind: ToolDescriptor
id: tool-descriptor:redis.hget
attributes:
  schema: '{}'
