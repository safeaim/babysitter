nodeKind: ToolDescriptor
id: tool-descriptor:slack.list-channels
attributes:
  schema: '{}'
  displayName: "Slack: List Channels"
  description: List public channels in the workspace.
  inputSchema:
    type: object
    properties:
      limit: { type: integer }
      cursor: { type: string }
  outputSchema:
    type: object
    properties:
      channels: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:slack-mcp
---
nodeKind: ToolDescriptor
id: tool-descriptor:slack.post-message
attributes:
  schema: '{}'
  displayName: "Slack: Post Message"
  description: Post a message to a channel.
