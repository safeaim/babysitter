nodeKind: ToolDescriptor
id: tool-descriptor:sqlite.read-query
attributes:
  schema: '{}'
  displayName: "SQLite: Read Query"
  description: Execute a SELECT query.
  inputSchema:
    type: object
    required: [query]
    properties:
      query: { type: string }
  outputSchema:
    type: object
    properties:
      rows: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:sqlite-mcp
