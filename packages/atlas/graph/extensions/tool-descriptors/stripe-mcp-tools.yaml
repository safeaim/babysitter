nodeKind: ToolDescriptor
id: tool-descriptor:stripe.list-customers
attributes:
  schema: '{}'
  displayName: "Stripe: List Customers"
  description: List customers in the Stripe account.
  inputSchema:
    type: object
    properties:
      limit: { type: integer }
      email: { type: string }
  outputSchema:
    type: object
    properties:
      customers: { type: array }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-stripe
---
nodeKind: ToolDescriptor
id: tool-descriptor:stripe.create-customer
attributes:
  schema: '{}'
  displayName: "Stripe: Create Customer"
