  inputSchema:
    type: object
    properties:
      email: { type: string }
      name: { type: string }
  outputSchema:
    type: object
    properties:
      id: { type: string }
  mode: normal
  streamable: false
  timeoutMs: 30000
edges:
  contained_in_plugin:
    - target: tool-server:mcp-stripe
---
