nodeKind: ToolDescriptor
id: tool-descriptor:supabase.get-logs
attributes:
  schema: '{}'
  displayName: "Supabase: Get Logs"
  description: Fetch logs for a Supabase project service (db, api, edge-functions, auth, storage, realtime).
