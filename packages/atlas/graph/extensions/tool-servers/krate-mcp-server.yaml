id: tool-descriptor:krate.krate-list-resources
attributes:
  displayName: "Krate: krate_list_resources"
  category: krate-mcp
  vendor: a5c.ai
  mode: mcp-tool
  description: List resources of a given kind
  schema: |-
    {
      "type": "object",
      "properties": {
        "kind": {
          "type": "string"
        }
      },
      "required": [
        "kind"
      ]
    }
  inputSchema:
    type: object
