nodeKind: ToolDescriptor
id: tool-descriptor:krate.krate-dispatch-agent
attributes:
  displayName: "Krate: krate_dispatch_agent"
  category: krate-mcp
  vendor: a5c.ai
  mode: mcp-tool
  description: Dispatch an agent run
  schema: |-
    {
      "type": "object",
      "properties": {
        "agentDefinition": {
          "type": "string"
        },
        "definitionRef": {
          "type": "string"
        },
        "stackRef": {
          "type": "string"
        },
        "agentStack": {
          "type": "string"
        },
        "input": {
          "type": "object"
        }
      },
      "anyOf": [
        { "required": ["agentDefinition"] },
        { "required": ["definitionRef"] },
        { "required": ["stackRef"] },
        { "required": ["agentStack"] }
      ]
    }
  inputSchema:
    type: object
    properties:
      agentDefinition:
        type: string
      definitionRef:
        type: string
      stackRef:
        type: string
      agentStack:
        type: string
      input:
        type: object
    anyOf:
      - required:
          - agentDefinition
      - required:
          - definitionRef
      - required:
          - stackRef
      - required:
          - agentStack
  streamable: false
  timeoutMs: 30000
edges: {}
