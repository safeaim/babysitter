nodeKind: ToolServer
id: tool-server:krate-mcp-server
attributes:
  displayName: Krate MCP Server
  description: MCP stdio server exported by @a5c-ai/krate-cli. It exposes Krate resource CRUD, snapshots, search, agent
    stack/dispatch, secret grants, external sync/conflict, and audit query tools for agent clients.
  protocol: mcp-stdio
  provenance: built-in
  category: devtools
  maintainer: a5c.ai
  repoUrl: https://github.com/a5c-ai/babysitter/tree/staging/packages/krate/cli
  installCommand: npm install && npm test --workspace=@a5c-ai/krate-cli
  npmPackage: "@a5c-ai/krate-cli"
  tools:
    - tool-descriptor:krate.krate-list-resources
    - tool-descriptor:krate.krate-get-resource
    - tool-descriptor:krate.krate-apply-resource
    - tool-descriptor:krate.krate-delete-resource
    - tool-descriptor:krate.krate-snapshot
    - tool-descriptor:krate.krate-search
    - tool-descriptor:krate.krate-list-stacks
    - tool-descriptor:krate.krate-dispatch-agent
    - tool-descriptor:krate.krate-list-secrets
    - tool-descriptor:krate.krate-create-secret
    - tool-descriptor:krate.krate-create-stack
    - tool-descriptor:krate.krate-sync-external
    - tool-descriptor:krate.krate-resolve-conflict
    - tool-descriptor:krate.krate-audit-query
edges:
  integrates_with:
    - target: platform-service:krate-agent-dispatch
    - target: platform-service:krate-external-backends
    - target: platform-service:krate-company-brain
    - target: platform-service:krate-policy
  lib_applies_to_domain:
    - target: domain:platform-engineering
    - target: domain:devops
  contains_tool_descriptor:
    - target: tool-descriptor:krate.krate-list-resources
    - target: tool-descriptor:krate.krate-get-resource
    - target: tool-descriptor:krate.krate-apply-resource
    - target: tool-descriptor:krate.krate-delete-resource
    - target: tool-descriptor:krate.krate-snapshot
    - target: tool-descriptor:krate.krate-search
    - target: tool-descriptor:krate.krate-list-stacks
    - target: tool-descriptor:krate.krate-dispatch-agent
    - target: tool-descriptor:krate.krate-list-secrets
    - target: tool-descriptor:krate.krate-create-secret
    - target: tool-descriptor:krate.krate-create-stack
    - target: tool-descriptor:krate.krate-sync-external
    - target: tool-descriptor:krate.krate-resolve-conflict
    - target: tool-descriptor:krate.krate-audit-query
  exposes_prompt:
    - target: mcp-prompt:krate.krate-workspace-setup
    - target: mcp-prompt:krate.krate-stack-config
    - target: mcp-prompt:krate.krate-troubleshoot
  exposes_resource:
    - target: mcp-resource:krate.snapshot
    - target: mcp-resource:krate.stacks
---
