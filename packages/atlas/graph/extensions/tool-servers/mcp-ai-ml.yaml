nodeKind: ToolServer
id: tool-server:mcp-anthropic
attributes:
  displayName: Anthropic MCP Server
  description: |
    MCP server providing direct integration with Claude and Anthropic models.
    Enables AI agents to invoke Claude for sub-tasks, configure system prompts,
    manage model parameters, and leverage advanced reasoning capabilities.
  protocol: mcp
  category: ai
  repoUrl: https://github.com/anthropics/anthropic-mcp-server
  maintainer: Anthropic
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: provider:anthropic
  lib_applies_to_domain:
  - target: domain:machine-learning
  - target: domain:software-engineering
---

