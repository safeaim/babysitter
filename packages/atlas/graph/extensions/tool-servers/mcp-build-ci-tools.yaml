---
# MCP servers for build, CI, and developer tools already in the graph

nodeKind: ToolServer
id: tool-server:mcp-helm
attributes:
  displayName: Helm MCP Server
  description: |
    MCP server providing access to Helm Kubernetes package management.
    Enables AI agents to list, install, upgrade, and rollback Helm releases,
    inspect chart values and manifests, and manage repositories.
  protocol: mcp
  category: devtools
  repoUrl: https://github.com/helm/helm-mcp-server
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:helm
  lib_applies_to_domain:
  - target: domain:devops
  - target: domain:cloud-infra
---

