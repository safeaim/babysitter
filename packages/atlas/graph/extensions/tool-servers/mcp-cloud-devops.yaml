nodeKind: ToolServer
id: tool-server:mcp-terraform
attributes:
  displayName: Terraform MCP Server
  description: |
    MCP server providing access to HashiCorp Terraform and Terraform Cloud.
    Enables AI agents to manage workspaces, trigger plan and apply runs,
    inspect state, estimate costs, and browse the Terraform registry.
  protocol: mcp
  category: cloud
  repoUrl: https://github.com/hashicorp/terraform-mcp-server
  maintainer: HashiCorp
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:terraform
  lib_applies_to_domain:
  - target: domain:devops
  - target: domain:cloud-infra
---

