---
# MCP servers for AWS, GCP, and Azure platform services

nodeKind: ToolServer
id: tool-server:mcp-aws-lambda
attributes:
  displayName: AWS Lambda MCP Server
  description: |
    MCP server providing access to AWS Lambda functions.
    Enables AI agents to list, invoke, and inspect Lambda functions,
    retrieve logs, manage function configurations, and monitor invocations.
  protocol: mcp
  category: cloud
  repoUrl: https://github.com/awslabs/mcp-server-aws-lambda
  maintainer: AWS Labs
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: platform-service:aws-lambda
  - target: platform:aws
  lib_applies_to_domain:
  - target: domain:cloud-infra
  - target: domain:devops
---

