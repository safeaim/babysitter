nodeKind: ToolServer
id: tool-server:mcp-intercom
attributes:
  displayName: Intercom MCP Server
  description: |
    MCP server providing access to the Intercom customer platform.
    Enables AI agents to manage conversations, query contacts and
    companies, access help center articles, and handle support tickets.
  protocol: mcp
  category: communication
  repoUrl: https://github.com/raoulbia-ai/mcp-server-for-intercom
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  supports_work:
    - target: role:support-engineer
      confidence: high
      evidence: "Intercom conversations, contacts, and help center articles support support engineering workflows."
    - target: responsibility:triage-incoming-issues
      confidence: high
      evidence: "Customer conversations and bot handoffs are direct triage inputs."
  integrates_with:
  - target: tool:intercom
  lib_applies_to_domain:
  - target: domain:customer-experience
  - target: domain:customer-relations
