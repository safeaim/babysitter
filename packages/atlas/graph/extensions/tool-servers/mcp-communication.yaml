nodeKind: ToolServer
id: tool-server:mcp-discord
attributes:
  displayName: Discord MCP Server
  description: |
    MCP server providing access to the Discord platform.
    Enables AI agents to read and post messages, manage channels,
    handle reactions, and work with file attachments via the Discord API.
  protocol: mcp
  category: communication
  repoUrl: https://github.com/v-3/discordmcp
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:discord
  lib_applies_to_domain:
  - target: domain:community
  - target: domain:software-engineering
---

