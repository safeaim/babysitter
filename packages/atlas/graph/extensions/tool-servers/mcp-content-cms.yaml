nodeKind: ToolServer
id: tool-server:mcp-wordpress
attributes:
  displayName: WordPress MCP Server
  description: |
    MCP server providing access to WordPress sites via the REST API.
    Enables AI agents to create and edit posts, manage pages, handle
    media uploads, and configure site settings.
  protocol: mcp
  category: cms
  repoUrl: https://github.com/developer-jeong/wordpress-mcp-server
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:wordpress
  - target: stack-part:cms
  lib_applies_to_domain:
  - target: domain:web-development
  - target: domain:content-operations
---

