nodeKind: ToolServer
id: tool-server:mcp-mysql
attributes:
  displayName: MySQL MCP Server
  description: |
    MCP server providing access to MySQL databases.
    Enables AI agents to inspect schemas, list tables, and execute
    read-only or read-write SQL queries against MySQL instances.
  protocol: mcp
  category: database
  repoUrl: https://github.com/benborla/mcp-server-mysql
  npmPackage: "@benborla29/mcp-server-mysql"
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: stack-part:managed-mysql
  - target: stack-part:relational-database
  lib_applies_to_domain:
  - target: domain:databases
---

