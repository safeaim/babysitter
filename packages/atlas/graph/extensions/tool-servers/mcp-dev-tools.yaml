nodeKind: ToolServer
id: tool-server:mcp-playwright
attributes:
  displayName: Playwright MCP Server
  description: |
    Official MCP server for Playwright browser automation by Microsoft.
    Enables AI agents to interact with web pages through structured
    accessibility snapshots, navigate, click, fill forms, and extract
    content without requiring vision models.
  protocol: mcp
  category: devtools
  repoUrl: https://github.com/microsoft/playwright-mcp
  npmPackage: "@playwright/mcp"
  maintainer: Microsoft
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:playwright
  lib_applies_to_domain:
  - target: domain:qa-testing
  - target: domain:web-development
---

