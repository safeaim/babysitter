  repoUrl: https://github.com/gts360/django-mcp-server
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
  - mcp-transport:streamable-http
edges:
  integrates_with:
  - target: framework:django
  lib_applies_to_domain:
  - target: domain:backend
  - target: domain:web-development
---

