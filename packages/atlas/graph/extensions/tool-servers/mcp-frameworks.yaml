nodeKind: ToolServer
id: tool-server:mcp-next-devtools
attributes:
  displayName: Next.js DevTools MCP Server
  description: |
    Official MCP server for Next.js development maintained by Vercel.
    Connects AI coding agents to your Next.js dev server to retrieve build errors,
    runtime errors, page metadata, and server action details in real time.
  protocol: mcp
  category: devtools
  repoUrl: https://github.com/vercel/next-devtools-mcp
  npmPackage: "next-devtools-mcp"
  maintainer: Vercel
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: framework:nextjs
  lib_applies_to_domain:
  - target: domain:web-development
  - target: domain:frontend
---

nodeKind: ToolServer
id: tool-server:mcp-django
attributes:
  displayName: Django MCP Server
  description: |
    MCP server that exposes Django application internals to AI assistants.
