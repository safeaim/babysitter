---
# MCP servers for IaC and platform engineering tools

nodeKind: ToolServer
id: tool-server:mcp-terraform-cloud
attributes:
  displayName: Terraform Cloud MCP Server
  description: |
    MCP server integrating AI assistants with the Terraform Cloud API.
    Enables agents to manage workspaces, trigger plan and apply runs,
    inspect state, and query the organization through natural language.
  protocol: mcp
  category: cloud
  repoUrl: https://github.com/severity1/terraform-cloud-mcp
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:terraform-cloud
  lib_applies_to_domain:
  - target: domain:devops
---

