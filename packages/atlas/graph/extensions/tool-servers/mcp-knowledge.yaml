---
# Knowledge Platform MCP Servers
# MCP servers for enterprise knowledge search, RAG, and document Q&A

nodeKind: ToolServer
id: tool-server:mcp-glean
attributes:
  displayName: Glean MCP Server
  description: |
    MCP server providing access to the Glean enterprise search platform.
    Enables AI agents to search across all connected company tools,
    retrieve answers with citations, and access organizational knowledge
    indexed by Glean.
  protocol: mcp
  category: knowledge
  repoUrl: https://github.com/nicepkg/glean-mcp
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:glean
  lib_applies_to_domain:
  - target: domain:software-engineering
---

nodeKind: ToolServer
id: tool-server:mcp-haystack
attributes:
  displayName: Haystack MCP Server
  description: |
    MCP server exposing deepset Haystack pipelines as tools for AI agents.
    Enables agents to run RAG queries, semantic search, and document
    retrieval through pre-configured Haystack pipelines. Supports custom
    pipeline components and multiple retriever backends.
  protocol: mcp
  category: knowledge
  repoUrl: https://github.com/deepset-ai/haystack-mcp
  maintainer: deepset
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:haystack
  lib_applies_to_domain:
  - target: domain:software-engineering
  - target: domain:data-science
---

