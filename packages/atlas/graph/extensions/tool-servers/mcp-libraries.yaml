nodeKind: ToolServer
id: tool-server:mcp-pino
attributes:
  displayName: Pino MCP Server
  description: |
    MCP server for Pino structured logs; exposes log ingestion and
    querying for Node.js services using the Pino logging library.
  protocol: mcp
  category: observability
  repoUrl: https://github.com/pinojs/pino
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: library:pino
  lib_applies_to_domain:
