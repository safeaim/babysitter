nodeKind: ToolServer
id: tool-server:mcp-datadog
attributes:
  displayName: Datadog MCP Server
  description: |
    MCP server providing access to the Datadog observability platform.
    Enables AI agents to query metrics, search logs, inspect traces,
    manage monitors and dashboards, and coordinate incident response.
  protocol: mcp
  category: monitoring
  repoUrl: https://github.com/DataDog/datadog-mcp-server
  maintainer: Datadog
  mcpTransports:
  - mcp-transport:stdio
edges:
  supports_work:
    - target: role:incident-commander
      confidence: high
      evidence: "Metrics, logs, traces, monitors, and dashboards support incident command."
    - target: responsibility:incident-command
      confidence: high
      evidence: "Observability telemetry is a primary incident-command input."
    - target: workflow:incident-response
      confidence: high
      evidence: "Datadog telemetry supports incident detection, diagnosis, and response."
  integrates_with:
  - target: tool:datadog
  - target: stack-part:metrics
  - target: stack-part:logging
  lib_applies_to_domain:
  - target: domain:observability
  - target: domain:devops
---

