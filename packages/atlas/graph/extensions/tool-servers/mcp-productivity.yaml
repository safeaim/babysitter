nodeKind: ToolServer
id: tool-server:mcp-asana
attributes:
  displayName: Asana MCP Server
  description: |
    MCP server providing access to Asana project management.
    Enables AI agents to create and update tasks, manage projects
    and sections, assign work, and query workspaces.
  protocol: mcp
  category: productivity
  repoUrl: https://github.com/rohanb10/asana-mcp
  maintainer: Community
  mcpTransports:
  - mcp-transport:stdio
edges:
  supports_work:
    - target: role:engineering-manager
      confidence: medium
      evidence: "Task/project metadata supports team planning and execution review."
    - target: responsibility:triage-incoming-issues
      confidence: medium
      evidence: "Task intake queues can represent issue triage and assignment workflows."
  integrates_with:
  - target: tool:asana
  - target: issue-tracker:asana
  lib_applies_to_domain:
  - target: domain:project-management
  - target: domain:software-engineering
---

