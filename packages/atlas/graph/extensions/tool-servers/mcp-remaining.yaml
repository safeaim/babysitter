nodeKind: ToolServer
id: tool-server:mcp-kafka
attributes:
  displayName: Kafka MCP Server
  description: |
    MCP server for Apache Kafka stream processing and topic management.
    Enables AI agents to produce and consume messages, inspect topics
    and consumer groups, manage offsets, and monitor Kafka cluster
    state via the Confluent MCP integration.
  protocol: mcp
  category: devtools
  repoUrl: https://github.com/confluentinc/mcp-confluent
  maintainer: Confluent
  mcpTransports:
    - mcp-transport:stdio
edges:
  integrates_with:
    - target: skill-area:kafka-stream-processing
  lib_applies_to_domain:
    - target: domain:data-engineering
    - target: domain:backend
