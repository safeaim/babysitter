---
# MCP servers for .NET, Gradle, Maven, Neovim, RabbitMQ, NATS, and Kafka

nodeKind: ToolServer
id: tool-server:mcp-dotnet
attributes:
  displayName: .NET MCP Server
  description: |
    Community MCP server for .NET and C# development tooling.
    Enables AI agents to build, run, test, and manage .NET projects,
    inspect NuGet packages, and execute dotnet CLI commands programmatically.
  protocol: mcp
  category: devtools
  repoUrl: https://github.com/ktzsolt/dotnet-mcp-server
  maintainer: Community
  mcpTransports:
    - mcp-transport:stdio
edges:
  integrates_with:
    - target: tool:dotnet-cli
  lib_applies_to_domain:
    - target: domain:backend
    - target: domain:software-engineering
---
