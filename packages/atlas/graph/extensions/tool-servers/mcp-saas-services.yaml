---
# SaaS Services MCP Servers
# Only includes MCP servers with verified GitHub repos or npm packages

nodeKind: ToolServer
id: tool-server:mcp-hubspot
attributes:
  displayName: HubSpot MCP Server
  description: |
    MCP server providing access to the HubSpot CRM platform.
    Enables AI agents to manage contacts, companies, deals, and tickets,
    search CRM records, and automate marketing and sales workflows.
  protocol: mcp
  category: crm
  repoUrl: https://github.com/HubSpot/hubspot-mcp-server
  maintainer: HubSpot
  mcpTransports:
  - mcp-transport:stdio
edges:
  supports_work:
    - target: role:marketing-manager
      confidence: medium
      evidence: "HubSpot MCP access to CRM and marketing data supports campaign and revenue workflows."
    - target: role:account-executive
      confidence: medium
      evidence: "CRM records support account management through an agent tool server."
  integrates_with:
  - target: tool:hubspot
  lib_applies_to_domain:
  - target: domain:sales
  - target: domain:software-engineering
