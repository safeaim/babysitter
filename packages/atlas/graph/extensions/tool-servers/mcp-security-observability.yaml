nodeKind: ToolServer
id: tool-server:mcp-trivy
attributes:
  displayName: Trivy MCP Server
  description: |
    MCP server providing access to Trivy security scanning capabilities.
    Enables AI agents to scan containers, filesystems, Git repositories, Kubernetes
    clusters, and IaC files for vulnerabilities, misconfigurations, and secrets.
  protocol: mcp
  category: security
  repoUrl: https://github.com/aquasecurity/trivy-mcp
  maintainer: Aqua Security
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:trivy
  lib_applies_to_domain:
  - target: domain:cybersecurity
  - target: domain:devops
---
