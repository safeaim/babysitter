nodeKind: ToolServer
id: tool-server:mcp-opentelemetry
attributes:
  displayName: OpenTelemetry MCP Server
  description: |
    Unified MCP server by Traceloop for querying OpenTelemetry traces across multiple backends
    including Jaeger, Grafana Tempo, and Traceloop. Enables AI agents to analyze distributed
    traces for automated debugging, root cause analysis, and LLM observability workflows.
  protocol: mcp
  category: observability
  repoUrl: https://github.com/traceloop/opentelemetry-mcp-server
  maintainer: Traceloop
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: tool:opentelemetry
  - target: tool:jaeger
  - target: tool:tempo
  - target: stack-part:tracing
  lib_applies_to_domain:
  - target: domain:observability
  - target: domain:devops
