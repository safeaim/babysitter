nodeKind: ToolServer
id: tool-server:mcp-1password
attributes:
  displayName: 1Password MCP Server
  description: |
    MCP server providing access to 1Password secret management.
    Enables AI agents to retrieve secrets, list vaults, and resolve
    credential references without exposing raw secret values in context.
  protocol: mcp
  category: security
  repoUrl: https://github.com/1Password/mcp-server
  maintainer: 1Password
  mcpTransports:
  - mcp-transport:stdio
edges:
  integrates_with:
  - target: stack-part:secrets-manager
  lib_applies_to_domain:
  - target: domain:cybersecurity
  - target: domain:devops
---

nodeKind: ToolServer
id: tool-server:mcp-vault
attributes:
  displayName: HashiCorp Vault MCP Server
  description: |
    MCP server providing access to HashiCorp Vault secret management.
    Enables AI agents to read secrets, list secret engines, manage
