nodeKind: Tool
id: tool:saperly
attributes:
  languageApplicability: neutral
  displayName: "Saperly"
  homepageUrl: "https://saperly.com"
  kind: other
  description: |
    Cloud telephony platform that provides AI agents with phone numbers
    and telephony capabilities. Offers APIs and an MCP server for
    programmatic voice calls, SMS messaging, phone verification, and
    inbound call routing. Designed for integrating telephony into
    AI agent workflows — enabling agents to make calls, send texts,
    and handle phone-based interactions as part of automated processes.
