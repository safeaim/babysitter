nodeKind: ToolServer
id: tool-server:mcp-e2b
attributes:
  displayName: E2B MCP Server
  description: |
    MCP server for running code in secure E2B sandboxes. Added as a concrete tool-server companion
    for the Ora-discovered E2B agent-sandbox product.
  protocol: mcp-stdio
  provenance: custom
  category: devtools
  maintainer: E2B
  repoUrl: https://github.com/e2b-dev/mcp-server
  sourceRef: source-ref:e2b-mcp-server
  mcpTransports:
    - mcp-transport:stdio
  ora:
    discoveredFor: ["MCP server for repository code review pull request analysis"]
    domain: e2b.dev
    score: 69
    grade: C
edges:
  integrates_with:
    - target: tool:e2b
  sourced_from:
    - target: source-ref:e2b-mcp-server
    - target: source-ref:ora-discover-api
  supports_work:
    - target: role:test-writer
      confidence: high
      evidence: "Sandbox execution supports reproducible test and code-validation workflows."
    - target: workflow:test-automation-pipeline
      confidence: high
      evidence: "E2B provides isolated code execution for agent-driven validation loops."
