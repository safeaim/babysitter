nodeKind: ToolServer
id: tool-server:postgres-mcp
attributes:
  displayName: "Postgres MCP (read-only)"
  description: "MCP server providing read-only programmatic access to PostgreSQL databases. Enables AI agents to query tables, list schemas, and describe table structures. Supports stdio transport."
  protocol: mcp
  category: database
  repoUrl: https://github.com/modelcontextprotocol/servers/tree/main/src/postgres
  npmPackage: "@modelcontextprotocol/server-postgres"
  maintainer: Anthropic
  mcpTransports:
    - mcp-transport:stdio
  tools:
    - tool-descriptor:postgres.query
    - tool-descriptor:postgres.list-tables
    - tool-descriptor:postgres.describe-table
  sourceRef: source-ref:mcp-servers-registry
edges:
  contains_tool_descriptor:
  - target: tool-descriptor:postgres.query
  - target: tool-descriptor:postgres.list-tables
  - target: tool-descriptor:postgres.describe-table
  implements:
    - target: extension-interface:sandbox
  requires_capability:
    - target: capability:supports-mcp
      level: required
  sourced_from:
    - target: source-ref:mcp-servers-registry
  integrates_with:
    - target: tool:psql
    - target: library:prisma
    - target: library:knex
    - target: library:kysely
  lib_applies_to_domain:
    - target: domain:databases
