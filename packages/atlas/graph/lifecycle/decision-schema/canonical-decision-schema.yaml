---
nodeKind: BreakpointStrategy
id: breakpoint-strategy:single-question
attributes:
  displayName: "Single Question"
  strategyKind: single-question
  description: |
    The decision asks one yes/no or short-answer question with no
    branching. Simplest shape; default for `kind=approval` checkpoints.
  defaultTimeoutSec: 3600
edges: {}
---
nodeKind: BreakpointStrategy
id: breakpoint-strategy:multiple-choice
attributes:
  displayName: "Multiple Choice"
  strategyKind: multiple-choice
  description: |
    The decision presents the responder with a fixed set of choices
    (typically 2-5). Each choice can carry an attached payload that the
    agent will use after resolution.
  defaultTimeoutSec: 3600
edges: {}
---
nodeKind: BreakpointStrategy
id: breakpoint-strategy:free-form-edit
attributes:
  displayName: "Free-form Edit"
  strategyKind: free-form-edit
  description: |
    The responder can edit a structured payload (e.g. the proposed plan,
    a Markdown patch, a JSON document) and return the edited form. Used
    by `kind=edit` checkpoints (plan-edit, etc.).
  defaultTimeoutSec: 7200
edges: {}
---
nodeKind: BreakpointStrategy
id: breakpoint-strategy:multi-step-decision
attributes:
  displayName: "Multi-step Decision"
  strategyKind: multi-step-decision
  description: |
    The decision is staged over multiple turns of responder input —
    e.g. choose category, then refine specifics, then confirm. Used for
    risk-tier decisions where blanket approval is too coarse.
  defaultTimeoutSec: 14400
edges: {}
---
nodeKind: BreakpointStrategy
id: breakpoint-strategy:binary-approval
attributes:
  displayName: "Binary Approval"
  strategyKind: binary-approval
  description: |
    Approve or deny only — no edit, no rationale required. Default for
    high-frequency `kind=approval` checkpoints (dangerous-tool-approval,
    cost-escalation).
  defaultTimeoutSec: 1800
edges: {}
