---
nodeKind: DecisionMemory
id: decision-memory:plan-edit-amendments-pattern
attributes:
  displayName: "Plan-edit amendment pattern"
  lesson: |
    When a tech-lead amends a plan via the plan-edit checkpoint, the
    amendments most often address (a) ordering of integration tests
    relative to schema changes, and (b) inserting safety checks before
    destructive steps. Future plan-generation can pre-emptively include
    these patterns.
  applicabilityTags:
    - "plan-approval"
    - "schema-change"
    - "integration-tests"
  recordedAt: "2026-04-29T15:00:00Z"
  recordedBy: role:tech-lead
edges: {}
---
nodeKind: DecisionMemory
id: decision-memory:cost-escalation-latency-pattern
attributes:
  displayName: "Cost-escalation latency lesson"
  lesson: |
    Cost-escalation checkpoints routed via email backend regularly
    incur 2-4 hour response latency. For runs paused mid-execution,
    consider routing to slack backend with email as fallback after
    a 30-minute timeout.
  applicabilityTags:
    - "cost-escalation"
    - "responder-routing"
    - "latency"
  recordedAt: "2026-04-30T10:00:00Z"
  recordedBy: role:engineering-manager
edges: {}
