nodeKind: SessionSemantics
id: session-semantics:copilot-cli
attributes:
  sessionSemanticsId: session-semantics:copilot-cli
  agentId: agent:copilot-cli
  versionRange: ">=0.0.0"
  sessionDirStrategy: ".a5c/runs"
  sessionIdSources:
    - COPILOT_SESSION_ID
    - COPILOT_CLI_SESSION
    - GH_COPILOT_SESSION
  resumeSemantics: Copilot surfaces session IDs from CLI and GitHub session variables.
  stateFilePatterns:
    - ".a5c/runs/**"
  pidMarkerPolicy: env-or-run-dir
  metadataFields:
    - { key: session_id, envVars: [COPILOT_CLI_SESSION, GH_COPILOT_SESSION] }
edges:
  applies_to_version:
    - target: agentVersion:copilot:ge-0-0-0
  references_path:
    - target: path:a5c-runs-dir
