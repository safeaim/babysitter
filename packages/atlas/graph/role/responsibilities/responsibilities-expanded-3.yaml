nodeKind: Responsibility
id: responsibility:drug-safety-monitoring
attributes:
  displayName: "Drug safety monitoring"
  cadence: continuous
  description: |
    Track post-market drug safety data — adverse event collection,
    signal detection and evaluation, periodic safety update reports,
