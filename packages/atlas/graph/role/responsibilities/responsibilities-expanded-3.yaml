nodeKind: Responsibility
id: responsibility:clinical-data-integrity
attributes:
  displayName: "Clinical data integrity"
  cadence: continuous
  description: |
    Ensure clinical data accuracy, completeness, and consistency across
    electronic health records, clinical trial databases, and patient
    registries. Enforce data validation rules, audit trails, and
    regulatory standards (GCP, 21 CFR Part 11).
edges:
  held_by:
    - target: role:clinical-data-scientist
    - target: role:epidemiologist
    - target: role:bioinformatician
