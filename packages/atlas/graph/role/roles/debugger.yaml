    - target: skill-area:tool-use
    - target: skill-area:profiling-cpu
    - target: skill-area:profiling-memory
    - target: skill-area:multi-turn-tool-use
  requires_capability:
    - target: capability:supports-tool-use
    - target: capability:supports-text-streaming
  applies_to:
    - target: domain:software-engineering
