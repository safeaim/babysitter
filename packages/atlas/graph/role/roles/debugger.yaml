nodeKind: Role
id: role:debugger
attributes:
  displayName: "Debugger"
  isAgentic: true
  requiredCapabilities:
    - capability:supports-tool-use
    - capability:supports-text-streaming
  requiredDomains:
    - domain:software-engineering
  description: |
    Agent that systematically reproduces, isolates, and proposes minimal
    fixes for software defects. Inspects logs, query plans, and stack
    traces; favours small, evidence-based hypotheses over speculative
    rewrites.
