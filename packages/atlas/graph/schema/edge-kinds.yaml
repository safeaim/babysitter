  inverse: bundled_into
- id: edge:supports-interaction-primitive
  name: supports_interaction_primitive
  origin: universal
  description: an AgentUIImpl / AgentPlatformImpl supports a given user-facing interaction primitive (slash command, command palette entry, model picker, deep-link, etc.) (Platform source added catalog pass 85)
  source:
  - AgentUIImpl
  - AgentPlatformImpl
  target:
  - InteractionPrimitive
  cardinality: N:N
  attributes:
  - name: mechanism
    type: enum<tool-call,slash-command,keybinding,ui-control,mcp-tool,native-api,deep-link,voice-command>
    required: true
    notes: 'How the agent UI exposes this interaction primitive to the user. `tool-call` means

      the primitive is invoked via a model-emitted tool call (e.g. claude-code''s AskUserQuestion).

      `slash-command` is a `/cmd` typed by user. `keybinding` is a keyboard shortcut.

      `ui-control` is a button/menu/widget. `mcp-tool` means the primitive is exposed via

      an MCP tool. `native-api` is platform-native (e.g. an iOS share-sheet). `deep-link`

      is URL-based invocation. `voice-command` for voice surfaces.

      '
  - name: toolCallName
    type: string
    required: false
    notes: When mechanism=tool-call or mcp-tool, the canonical name of the tool (e.g. `AskUserQuestion`, `TodoWrite`).
  - name: invocationToken
    type: string
    required: false
    notes: When mechanism=slash-command|keybinding|deep-link, the literal trigger (e.g. `/clear`, `Ctrl+L`, `cursor://chat/new`).
  inverse: supported_by_agent_ui
