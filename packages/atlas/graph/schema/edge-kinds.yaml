# All EdgeKinds (single file; edges span clusters).
# Loaded by tools/validator/validate.py via the manifest in schema/ontology-schema.yaml.

edgeKinds:
- id: edge:composed-of
  name: composed_of
  origin: universal
  description: an agent product/version is composed of stack-layer implementations; a stack profile is composed of languages/frameworks/tools (alias of composes for ergonomics)
  source:
  - AgentProduct
  - AgentVersion
  - StackProfile
  target:
  - AgentCoreImpl
  - AgentRuntimeImpl
  - AgentPlatformImpl
  - AgentGovernanceImpl
  - AgentUIImpl
  - KnowledgeFabricImpl
  - Language
  - Framework
  - Tool
  cardinality: 1:N
  attributes:
  - name: role
    type: enum<core,runtime,platform,ui,knowledge-fabric,governance>
  inverse: composes
- id: edge:composes
  name: composes
  origin: universal
  description: inverse of composed_of
  source:
  - AgentCoreImpl
  - AgentRuntimeImpl
  - AgentPlatformImpl
  - AgentGovernanceImpl
  - AgentUIImpl
  - KnowledgeFabricImpl
  - Language
  - Framework
  - Tool
  target:
  - AgentProduct
  - AgentVersion
  - StackProfile
  cardinality: N:1
  attributes:
  - name: role
    type: enum<core,runtime,platform,ui,knowledge-fabric,governance>
  inverse: composed_of
- id: edge:bundled-with
  name: bundled_with
  origin: universal
  description: a product, platform, or UI layer ships bundled with a presentation surface (and vice-versa for the inverse direction observed in examples)
  source:
