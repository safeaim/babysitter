- id: edge:supports
  name: supports
  origin: universal
  description: a versioned entity supports a capability (with level, version-range, optional notes and evidence)
  source:
  - AgentVersion
  - ModelVersion
  - AgentRuntimeImpl
  - AgentPlatformImpl
  - AgentGovernanceImpl
  - AgentCoreImpl
  - AgentProduct
  - ToolServer
  - Plugin
  - Provider
  - ProviderVersion
  - TransportRuntime
  target:
  - Capability
  cardinality: N:N
  attributes:
  - name: versionRange
    type: versionRange
    required: true
    notes: Semver range over which the support claim holds.
  - name: level
    type: enum<full,partial,experimental,unsupported,degraded,none>
    required: true
    notes: Support level. Reified-edge migration (catalog pass 9c) widened the enum to include 'unsupported', 'degraded', and 'none' (legacy synonym for unsupported, retained for parity with pre-existing supports edges).
  - name: notes
    type: markdown
    required: false
    notes: Caveats, partial-support details, or known degradations.
  - name: evidenceSourceIds
    type: list<ref<EvidenceSource>>
    required: false
    notes: Direct evidence references (the simple bifurcation path; mint a Claim only when the fact is disputed/time-banded/superseded — see ../schema/evidence-model.md).
  inverse: supported_by
