  - name: supportedTransportProtocols
    type: list<ref<ModelTransportProtocol>>
    required: true
  - name: parallelToolCallHandling
    type: enum<native,sequentialized,unsupported,delegated-to-remote,not-supported>
    required: true
    evidence: vendor-doc-or-better
  - name: streamingFidelity
    type: enum<text-only,text-and-tool-args,full,partial>
    required: true
    evidence: vendor-doc-or-better
  - name: thinkingChannelHandling
    type: enum<passthrough,summarized,dropped,model-dependent,delegated-to-remote,not-supported>
    required: true
    evidence: vendor-doc-or-better
  # catalog pass 86 — `messageTypesEmitted` and `resultMessageSubtypes` promoted to
  # `ProtocolMessage` NodeKind via `emits_message_type` edge.
  # catalog pass 86 — `effortLevelsSupported` promoted to `EffortLevel` NodeKind via
  # `supports_effort_level` edge.
  # catalog pass 86 — `permissionModes` removed from AgentCoreImpl (the runtime
  # operates in modes, not the core).
  # catalog pass 86 — `hooksFiredFromCore` promoted to `fires_hook` edge.
  - name: loopBudgetKnobs
    type: list<enum<max_turns,max_budget_usd>>
    required: false
    notes: catalog pass 85 — Per-run budget knobs the core honors before forcing termination (Claude Code agent-loop doc). Kept flat per catalog pass 86 Fix 8.
  - name: compactionTrigger
    type: enum<auto-on-budget,manual,both>
    required: false
    notes: catalog pass 85 — How compaction is triggered relative to the loop (Claude Code agent-loop doc).
  - name: streamingBlocks
    type: list<enum<text,thinking,tool_use>>
    required: false
    notes: catalog pass 85 — Streaming content-block kinds the core forwards while assembling a turn (Claude Code agent-loop doc).
  - name: effortLevelDelegation
    type: enum<native,passthrough-to-harness,none>
    required: false
    notes: catalog pass 89 — How a core expresses effort-level support. `native` = core natively understands effort tiers (Claude Code, Claude Agent SDK). `passthrough-to-harness` = core dispatches to a bridged harness that owns effort (a5c). `none` = no effort dimension exposed.
  - name: notes
    type: markdown
    required: false
  incomingEdges:
  - composed_of
  outgoingEdges:
  - composes
  - realizes
  - depends_on
  - speaks
  invariants:
  - composes carries role=core
  - supportedTransportProtocols non-empty
  examples: []
- id: node:agent-runtime-impl
  name: AgentRuntimeImpl
  origin: derived
  originContext: catalog pass 3/catalog pass 22 — synthesized from observations across multiple agent products (Claude Code, Codex, Cursor, Gemini-CLI). Tier model is a5c-coined but the underlying concept is cross-vendor.
  prefix: agent-runtime-impl
  cluster: 3-agent-stack
  purpose: concrete runtime+tools+hook-sockets impl
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: agentVersionId
    type: ref<AgentVersion>
    required: true
  - name: packageRef
    type: ref<SourceRef|ProcessDescriptor>
    required: true
  - name: builtInTools
    type: list<ref<ToolDescriptor>>
    required: true
  - name: toolRegistryDiscovery
    type: enum<static-bundled,dynamic-config,dynamic-extension-loaded,not-applicable>
    required: true
    evidence: vendor-doc-or-better
  - name: hookSockets
    type: list<ref<HookSurface>>
    required: true
  - name: internalSessionStateLocation
    type: string
    required: true
    evidence: vendor-doc-or-better
  - name: sessionFileFormat
    type: enum<jsonl,sqlite,json,jsonl-tree,delegated-to-remote,jsonl-with-sqlite-index,event-sourced-jsonl>
    required: true
    evidence: vendor-doc-or-better
  - name: sessionFilePathConvention
    type: string
    required: true
    evidence: vendor-doc-or-better
  - name: approvalGatingPrimitive
    type: enum<per-call,per-tool-class,session-default,none,delegated-to-remote,server-managed,policy-engine>
    required: true
    evidence: vendor-doc-or-better
  - name: subprocessSandboxStrategy
    type: enum<none,wrapped-shell,container,sandboxed-syscall,platform-deferred,invocation-mode,native-sandbox,process-isolation>
    required: true
    evidence: vendor-doc-or-better
  - name: runtimeIdentity
    type: enum<per-instance-keypair,platform-attested,none,delegated-to-remote,api-key,github-token,host-process>
    required: true
  - name: supportedMCPTransports
    type: list<ref<MCPTransport>>
    required: true
  - name: supportsStreaming
    type: bool
    required: true
    evidence: vendor-doc-or-better
  - name: supportedAgentControlVerbs
    type: list<enum<interrupt,abort,cancel,pause,resume,yield,checkpoint>>
    required: false
    notes: Agent-control verbs supported by this runtime (D2, planner 2026-05-01). Enum extension rather than NodeKind — uniform shape across instances.
  - name: ioSurfaceKinds
    type: list<enum<filesystem,clipboard,browser-dom,desktop-a11y-tree,mobile-a11y-tree,terminal-shell,voice,camera,microphone>>
    required: false
    notes: Protocol-level I/O surfaces the runtime can drive (D6 demoted from NodeKind to enum-extension, planner 2026-05-01). Distinct from Presentation which captures the shell experience.
  - name: agentMemoryKinds
    type: list<enum<conversation-buffer,summarized-history,vector-recall,knowledge-graph,prompt-cache,tool-state>>
    required: false
    notes: Memory mechanisms the runtime supports (D9 demoted from NodeKind to enum-extension, planner 2026-05-01; mirrors A.3 Modality collapse precedent).
  - name: subagentDispatchMechanism
    type: enum<task-tool,handoff,sub_agents-array,agent-as-tool,none,subprocess-task>
    required: false
    notes: 'How this runtime dispatches subagents. `task-tool` = Anthropic Claude Code Task tool (docs.anthropic.com/en/docs/claude-code/sub-agents). `handoff` = OpenAI Agents SDK handoff primitive (openai.github.io/openai-agents-python). `sub_agents-array` = Google ADK `sub_agents=[...]` declarative composition (google.github.io/adk-docs). `agent-as-tool` = OpenAI `agent.as_tool()` pattern (peer agent invoked as a tool). `none` = runtime has no subagent dispatch primitive. `subprocess-task` = OS-level subprocess with its own workdir + journal (e.g. babysitter ctx.task). (Optional during introduction; Phase-2 backfill flips to required + evidence: vendor-doc-or-better.)'
  - name: subagentChildSessionPolicy
    type: enum<none,ephemeral-child-session,persistent-child-session,inline-no-child-session>
    required: false
    notes: |
      How subagent dispatch handles child sessions. `none` = runtime has no
      subagent dispatch. `inline-no-child-session` = subagent runs inline in
      parent's session (e.g. tool-call style). `ephemeral-child-session` =
      subagent gets a fresh child session that ends when subagent returns
      (e.g. claude-code's Task tool). `persistent-child-session` = child
      session survives across multiple subagent invocations (e.g. babysitter
      running long-lived agent subprocesses).
  - name: subagentToolScopePolicy
    type: enum<inherit-parent,explicit-allowlist,fresh-defaults,none>
    required: false
    notes: |
      Whether subagents inherit the parent's tool permissions (`inherit-parent`),
      require an explicit allowlist (`explicit-allowlist`), get fresh defaults
      independent of parent (`fresh-defaults`), or n/a (`none`).
  - name: userInputRequiredPolicy
    type: enum<fail-run,surface-to-operator,satisfy-via-operator,auto-resolve,satisfy-via-channel,breakpoint-mediated>
    required: false
    notes: catalog pass 18 / Symphony §10.5 — UserInputRequiredPolicy enum. Distinct from approvalGatingPrimitive (which is approval-time policy).
  - name: secretHandlingPolicy
    type: enum<env-passthrough,env-allowlist,secret-broker,no-secrets,explicit-injection>
    required: false
    notes: catalog pass 18 / SecretHandlingPolicy enum. Informational only — NOT Trust Chain. Aligns with Sandbox.secretAccessScope but operates at the runtime layer, not the sandbox layer.
  - name: tokenAccountingSemantics
    type: enum<absolute,delta,mixed-prefer-absolute>
    required: false
    notes: catalog pass 18 / Symphony §13.5 — TokenAccountingSemantics enum (prevents double-counting across token totals).
  # catalog pass 86 — `permissionModesAvailable` promoted to PermissionMode NodeKind
  # via `operates_in_permission_mode` edge.
  - name: deepLinkSchemesRegistered
    type: list<string>
    required: false
    notes: catalog pass 85 — URL schemes the runtime registers OS-level handlers for (Claude Code deep-links doc).
  - name: pluginDiscoverySource
    type: list<enum<marketplaceManifest,localPath,remoteUrl,gitRepo>>
    required: false
    notes: catalog pass 85 — Sources the runtime can discover plugins from (Claude Code discover-plugins doc).
  # catalog pass 86 — `pluginInstallScopes` promoted to PluginInstallScope NodeKind
  # via `installs_plugins_in_scope` edge.
  - name: subagentToolInheritance
    type: enum<inherit-all,allowlist,denylist>
    required: false
    notes: catalog pass 85 — How subagent tool inheritance is expressed by the runtime (Claude Code sub-agents doc).
  # catalog pass 86 — `skillDiscoveryScopes` promoted to SkillDiscoveryScope NodeKind
  # via `discovers_skills_in_scope` edge.
  - name: skillScopePrecedence
    type: list<enum<enterprise,personal,project,plugin,additional-directory>>
    required: false
    notes: catalog pass 85 — Ordered precedence for resolving skill name collisions across scopes (Claude Code skills doc).
  - name: liveChangeDetection
    type: bool
    required: false
    notes: catalog pass 85 — Whether the runtime hot-reloads skill/subagent/plugin changes mid-session (Claude Code skills/sub-agents doc).
  - name: disableSkillShellExecutionSupported
    type: bool
    required: false
    notes: catalog pass 85 — Whether the runtime honors a kill-switch disabling skill shell execution (Claude Code skills doc).
  # catalog pass 86 — `mcpConfigScopes` promoted to MCPConfigScope NodeKind via
  # `uses_mcp_scope` edge.
  - name: urlHandlerRegistrationLocations
    type: map<string,string>
    required: false
    notes: catalog pass 85 — Per-platform (mac/linux/windows) registration paths for URL-scheme handlers (Claude Code deep-links doc).
  - name: outputGuardMechanism
    type: enum<task-output-schema,structured-output-passthrough,none>
    required: false
    notes: catalog pass 89 — How this runtime enforces output-schema constraints. `task-output-schema` = per-task SDK-enforced outputSchema (babysitter SDK defineTask). `structured-output-passthrough` = delegates to provider's structured-output capability (Claude Code). `none` = no output-shape enforcement.
  - name: notes
    type: markdown
    required: false
  incomingEdges:
  - composed_of
  - receives_signals_from
  - ingests_from
  outgoingEdges:
  - composes
  - realizes
  - exposes
  - bundles
  - connects
  - speaks
  - enforces_invariant
  - has_launch_contract
  - emits_signals_to
  - exports_to
  - emits_journal_event
  invariants:
  - composes carries role=runtime
  examples: []
