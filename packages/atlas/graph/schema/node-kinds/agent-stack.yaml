- id: node:agent-ui-impl
  name: AgentUIImpl
  origin: derived
  originContext: catalog pass 3/catalog pass 22 — synthesized from observations across multiple agent products (Claude Code, Codex, Cursor, Gemini-CLI). Tier model is a5c-coined but the underlying concept is cross-vendor.
  prefix: agent-ui-impl
  cluster: 3-agent-stack
  purpose: |
    User-facing UI layer of an agent product (TUI, CLI, web shell, IDE extension).
    Owns presentations bundled with the product and the interaction primitives
    the user has access to (slash commands, command palette, model picker, prompt
    input, etc.). Distinct from AgentPlatformImpl (extensibility surfaces) and
    AgentRuntimeImpl (runtime environment).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: agentVersionId
    type: ref<AgentVersion>
    required: true
  - name: packageRef
    type: ref<SourceRef|ProcessDescriptor>
    required: true
  - name: uiKind
    type: enum<tui-only,cli-only,tui-and-cli,web,ide-extension,mobile-app,multi-surface,headless>
    required: true
    notes: |
      High-level shape of the UI layer. `headless` = no UI (e.g. SDK/library or pure
      process orchestrator like babysitter); the agent is consumed programmatically
      only.
  - name: presentationsBundled
    type: list<ref<Presentation>>
    required: false
  - name: keybindingsConfigPath
    type: list<string>
    required: false
  - name: themeSupport
    type: enum<none,light-dark,full-customizable>
    required: false
    notes: Theme support at the UI layer (mirrors Presentation.themeSupport for the bundled UI).
  - name: accessibilitySupport
    type: enum<none,basic,wcag-aa,wcag-aaa>
    required: false
  - name: notes
    type: markdown
    required: false
  incomingEdges:
  - composed_of
  outgoingEdges:
  - bundled_with
  - supports_interaction_primitive
  invariants:
  - 'id starts with agent-ui-impl:'
  - if uiKind != headless then presentationsBundled non-empty
  examples: []
