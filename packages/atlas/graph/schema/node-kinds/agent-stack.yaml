# NodeKinds for cluster 3-agent-stack.
# Loaded by tools/validator/validate.py via the manifest in ../ontology-schema.yaml.
# DO NOT add backward-compat shims — catalog pass 37 policy.

nodeKinds:
- id: node:agent-product
  name: AgentProduct
  origin: derived
  originContext: catalog pass 3/catalog pass 22 — synthesized from observations across multiple agent products (Claude Code, Codex, Cursor, Gemini-CLI). Tier model is a5c-coined but the underlying concept is cross-vendor.
  prefix: agent
  cluster: 3-agent-stack
  purpose: productized agent (Claude Code, Codex, ...) — the umbrella
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: vendor
    type: string
    required: true
  - name: homepageUrl
    type: url
    required: true
    evidence: vendor-doc-or-better
  - name: primarySurface
    type: enum<cli,ide-extension,web,sdk,tui>
    required: true
  - name: supportTier
    type: enum<catalog-backed,adapter-only,none>
    required: true
  - name: productKind
    type: enum<full-cli-agent,ide-extension-agent,web-agent,sdk,app-server,headless-runtime,transport-bridge,multi-surface-suite>
    required: true
    notes: |
      What kind of product this is. Distinct from `primarySurface` (which says
      where users primarily interact). `full-cli-agent` = chat-loop CLI/TUI agent
      with full 4-layer stack (core/runtime/platform/ui). `sdk` = programmatic
      library exposing core+runtime, consumer provides platform/UI. `app-server` =
      server providing core+runtime+platform (no UI; consumer is another client
      like Symphony). `transport-bridge` = headless adapter relaying to a remote
      agent (e.g. agent-mux-remote). `headless-runtime` = process orchestrator
      without chat-loop (e.g. babysitter).
  - name: stackScope
    type: enum<full,core-runtime-platform,core-runtime,core-only>
    required: true
    notes: |
      Which agent-stack layers are included in this product. Drives the expected
      `composed_of` arity on AgentVersions of this product:
        `full` = core + runtime + platform + ui (4 entries)
        `core-runtime-platform` = core + runtime + platform (3 entries; no UI)
        `core-runtime` = core + runtime (2 entries; SDK products)
        `core-only` = core (1 entry; rare)
  - name: description
    type: markdown
    required: true
  incomingEdges:
  - composes
  - accepts_plugin
  - bundled_into
  outgoingEdges:
  - has_version
  - composed_of
  - bundled_with
  - defines_automation_rule
  invariants:
  - id starts with agent: null
  - has_version count >= 1
  - composed_of must include at least one core, runtime, platform role
  examples: []
- id: node:agent-version
  name: AgentVersion
  origin: universal
  prefix: agent-version
  cluster: 3-agent-stack
  purpose: a version of an AgentProduct
  attributes:
  - name: id
    type: id
    required: true
  - name: agentProductId
    type: ref<AgentProduct>
    required: true
  - name: versionRange
    type: versionRange
    required: true
    evidence: vendor-doc-or-better
  - name: releasedAt
    type: iso-date
    required: true
  - name: eolAt
    type: iso-date
    required: false
  - name: cliCommand
    type: string
    required: true
    evidence: vendor-doc-or-better
  - name: installMethods
    type: list<ref<InstallMethod>>
    required: true
  - name: minSchemaVersion
    type: semver
    required: false
  - name: notes
    type: markdown
    required: false
  - name: packageName
    type: string
    required: false
  - name: status
    type: string
    required: false
  - name: supportedOutputFormats
    type: list<enum<json-mode,strict-json-schema,grammar-constrained,regex-constrained,structured-call,xml,free-text,code-fence>>
    required: false
    notes: Structured-output / format-coercion mechanisms supported by this AgentVersion (D3 demoted from NodeKind to enum-extension, planner 2026-05-01; matches A.3 Modality / A.5 Hook collapse precedent).
  incomingEdges:
  - supported_by
  - version_of
  - invoked_by_workflow
  - applied_by
  - governs_template
  - has_memory
  - uses_vector_store
  - provides_cost_for
  - compliance_for
  - context_bundle_used_by
  - paired_to
  outgoingEdges:
  - version_of
  - supports
  - emits_hook
  - realizes
  - sourced_from
  - installed_via
  - versioned_via
  - complies_with
  - uses_context_bundle
  - priced_by
  - has_device_pair
  invariants:
  - agentProductId resolves
  - eolAt >= releasedAt (when present)
  - installMethods non-empty
  examples: []
