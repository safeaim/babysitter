# NodeKinds for cluster 13-catalog-meta.
# Loaded by tools/validator/validate.py via the manifest in ../ontology-schema.yaml.
# Current-only graph contract; no schema-evolution history is modeled here.

nodeKinds:
- id: node:claim
  name: Claim
  origin: universal
  prefix: claim
  cluster: 13-catalog-meta
  purpose: a claim of fact about an entity attribute
  attributes:
  - name: id
    type: id
    required: true
  - name: claimId
    type: string
    required: false
    notes: Stable claim id; legacy cross-walk.
  - name: subjectId
    type: ref<NodeKind>
    required: true
  - name: subjectKind
    type: string
    required: true
    notes: NodeKind name of the subject.
  - name: attribute
    type: string
    required: true
  - name: value
    type: any
    required: true
  - name: statement
    type: markdown
    required: true
    notes: Natural-language form of the claim.
  - name: evidenceSourceIds
    type: list<ref<EvidenceSource>>
    required: true
  - name: evidenceIds
    type: list<string>
    required: false
    notes: Legacy alias for evidenceSourceIds.
  - name: confidence
    type: enum<high
    medium: null
    low: null
    unverified>: null
    required: true
  - name: provenanceKind
    type: enum<vendor-doc
    repo-inspection: null
    community: null
    benchmark: null
    observation>: null
    required: true
  - name: evidenceStrength
    type: enum<strong
    adequate: null
    weak>: null
    required: true
  - name: status
    type: enum<open
    accepted: null
    challenged: null
    superseded>: null
    required: true
  - name: unresolvedGaps
    type: list<markdown>
    required: false
  - name: claimedAt
    type: iso-timestamp
    required: true
  - name: claimedBy
    type: string
    required: true
    notes: Opaque principal identifier (e.g. 'a5c-ai-catalog'). Was ref<Authority> before Trust Chain was de-scoped from Phase 1 ontology.
  - name: expiresAt
    type: iso-timestamp
    required: false
  - name: supersededBy
    type: ref<Claim>
    required: false
  - name: note
    type: markdown
    required: false
  - name: claimKind
    type: enum<assertion,conformance,evaluation,provenance>
    required: false
    notes: catalog pass 19 (planner 2026-05-01) — claim discriminator. Seeded with conformance (formerly proposed as standalone ConformanceClaim NodeKind, demoted per reviewer collapse). Required-target lifted to optional pending example backfill.
  incomingEdges:
  - produced_evidence_for
  - attested_by
  outgoingEdges:
  - evidenced_by
  - claims
  - conforms_to
  invariants:
  - evidenceSourceIds non-empty (V-2.1)
  - supersededBy points to newer claim with same subject+attribute (V-2.7)
  - subjectKind matches subjectId's NodeKind
  examples: []
- id: node:claim-test
  name: ClaimTest
  origin: a5c
  prefix: claim-test
  cluster: 13-catalog-meta
  purpose: an automated, mock-driven test that validates or invalidates a Claim about external system behavior
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: claimId
    type: ref<Claim>
    required: true
  - name: filePath
    type: string
    required: true
    notes: Path to the test source file under graph/tests/claims/.
  - name: framework
    type: enum<node-test,pytest,playwright,bash>
    required: true
  - name: fixturesPath
    type: string
    required: false
    notes: Path to fixture directory if the test loads cassettes.
  - name: cadence
    type: enum<on-commit,daily,weekly,on-demand>
    required: true
  - name: lastRunAt
    type: iso-timestamp
    required: false
  - name: lastResult
    type: enum<pass,fail,error,skipped,never-run>
    required: false
  - name: lastDurationMs
    type: int
    required: false
  - name: testabilityKind
    type: enum<path-convention,api-shape,cli-flag,env-var,header-shape,version-regex,fixture-roundtrip>
    required: true
    notes: Coarse taxonomy of what the test asserts.
  incomingEdges:
  - tested_by
  outgoingEdges:
  - tests_claim
  - produced_test_run
  - scheduled_by_ci
  invariants:
  - claimId resolves to a real Claim record
  - filePath ends with .test.cjs (framework=node-test) or .test.py (framework=pytest)
  examples: []
- id: node:claim-test-run
  name: ClaimTestRun
  origin: a5c
  prefix: claim-test-run
  cluster: 13-catalog-meta
  purpose: a single execution of a ClaimTest, recorded for trend analysis
  attributes:
  - name: id
    type: id
    required: true
  - name: claimTestId
    type: ref<ClaimTest>
    required: true
  - name: runAt
    type: iso-timestamp
    required: true
  - name: result
    type: enum<pass,fail,error,skipped>
    required: true
  - name: durationMs
    type: int
    required: true
  - name: output
    type: markdown
    required: false
    notes: Truncated TAP output or stack trace; max 4KB.
  - name: ciRunUrl
    type: string
    required: false
  incomingEdges:
  - produced_test_run
  outgoingEdges:
  - test_run_of
  invariants:
  - claimTestId resolves to a real ClaimTest record
  examples: []
- id: node:evidence-source
  name: EvidenceSource
  origin: universal
  prefix: evidence
  cluster: 13-catalog-meta
  purpose: source backing a claim
  attributes:
  - name: id
    type: id
    required: true
  - name: evidenceId
    type: string
    required: false
    notes: Vendor-stable id (e.g. doc page slug).
  - name: kindLabel
    type: enum<web
    file: null
    package: null
    observation: null
    attestation>: null
    required: true
  - name: trustLevel
    type: ref<TrustLevel>
    required: true
  - name: sourcePathOrUrl
    type: string
    required: false
    notes: Unified source pointer; legacy cross-walk.
  - name: sourceUrl
    type: url
    required: false
    conditional: kindLabel==web
  - name: filePath
    type: string
    required: false
    conditional: kindLabel==file
  - name: packageId
    type: string
    required: false
    conditional: kindLabel==package
  - name: locator
    type: string
    required: false
    notes: Fragment / page / heading / section anchor within the source.
  - name: capturedAt
    type: iso-timestamp
    required: false
    notes: Alias of observedAt for legacy cross-walk.
  - name: observedAt
    type: iso-timestamp
    required: true
  - name: observedBy
    type: string
    required: true
    notes: Opaque principal identifier. Was ref<Authority> before Trust Chain was de-scoped from Phase 1 ontology.
  - name: reachabilityCheck
    type: map<string
    any>: null
    required: false
  - name: reviewOwner
    type: string
    required: false
    notes: Opaque principal identifier. Was ref<Authority> before Trust Chain was de-scoped from Phase 1 ontology.
  - name: reviewedAt
    type: iso-timestamp
    required: false
  - name: freshnessWindowDays
    type: int
    required: false
  - name: excerpt
    type: markdown
    required: false
  - name: displayName
    type: string
    required: false
  incomingEdges:
  - evidenced_by
  outgoingEdges:
  - produced_evidence_for
  - at_trust_level
  invariants:
  - kindLabel-specific required attribute set
  - web sources have reachabilityCheck.status=ok within freshness (V-2.5)
  examples: []
- id: node:evidence-policy
  name: EvidencePolicy
  origin: universal
  prefix: policy
  cluster: 13-catalog-meta
  purpose: which claims need evidence, freshness windows, reviewer rules
  attributes:
  - name: id
    type: id
    required: true
  - name: minimumTrustLevel
    type: ref<TrustLevel>
    required: true
  - name: freshnessWindowDays
    type: int
    required: true
  - name: requiresAttestation
    type: bool
    required: false
  - name: reviewOwnerPattern
    type: string
    required: false
  - name: vendorBackedSelector
    type: string
    required: false
  - name: appliesTo
    type: list<string>
    required: true
  - name: description
    type: markdown
    required: false
  - name: displayName
    type: string
    required: false
  incomingEdges: []
  outgoingEdges: []
  invariants:
  - appliesTo non-empty
  examples: []
- id: node:source-ref
  name: SourceRef
  origin: universal
  prefix: source-ref
  cluster: 13-catalog-meta
  purpose: repo+ref+path pointer to source-of-truth for an artifact
  attributes:
  - name: id
    type: id
    required: true
  - name: repoUrl
    type: url
    required: true
    evidence: vendor-doc-or-better
  - name: ref
    type: string
    required: true
    evidence: vendor-doc-or-better
  - name: path
    type: string
    required: true
  - name: packageManager
    type: enum<npm
    pip: null
    cargo: null
    go-mod: null
    nix: null
    gem: null
    none>: null
    required: false
  - name: packageName
    type: string
    required: false
  - name: version
    type: string
    required: false
  - name: description
    type: markdown
    required: true
  - name: displayName
    type: string
    required: false
  - name: downloadUrl
    type: url
    required: false
  - name: homepageUrl
    type: url
    required: false
  - name: kind
    type: string
    required: false
  - name: marketplaceUrl
    type: url
    required: false
  - name: notes
    type: markdown
    required: false
  incomingEdges:
  - sourced_from
  outgoingEdges: []
  invariants:
  - id starts with source-ref: null
  - repoUrl is HTTP(S)
  examples: []
- id: node:scope-boundary
  name: ScopeBoundary
  origin: universal
  prefix: scope-boundary
  cluster: 13-catalog-meta
  purpose: inScope/outOfScope declaration with optional evidence
  attributes:
  - name: id
    type: id
    required: true
  - name: subjectId
    type: ref<NodeKind>
    required: true
  - name: inScope
    type: markdown
    required: true
  - name: outOfScope
    type: markdown
    required: true
  - name: outOfScopeReasonIds
    type: list<ref<OutOfScopeReason>>
    required: true
  - name: evidenceSourceIds
    type: list<ref<EvidenceSource>>
    required: false
  - name: notes
    type: markdown
    required: false
  incomingEdges:
  - in_scope
  - out_of_scope
  outgoingEdges:
  - out_of_scope_reason
  invariants:
  - inScope and outOfScope must not overlap (V-9.1)
  - outOfScope non-empty implies >=1 out_of_scope_reason (V-9.2)
  examples: []
- id: node:out-of-scope-reason
  name: OutOfScopeReason
  origin: universal
  prefix: out-of-scope-reason
  cluster: 13-catalog-meta
  purpose: structured reason for out-of-scope
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: reasonKind
    type: enum<volatile-data
    runtime-only: null
    not-design-artifact: null
    implementation-detail: null
    future-phase: null
    governance-deferred>: null
    required: true
  - name: description
    type: markdown
    required: true
  incomingEdges:
  - out_of_scope_reason
  outgoingEdges: []
  isolatedAllowed: true
  invariants:
  - reasonKind enum fixed (V-9.3)
  examples: []
- id: node:open-question
  name: OpenQuestion
  origin: universal
  prefix: open-question
  cluster: 13-catalog-meta
  purpose: named TBD with owner
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: owner
    type: string
    required: true
    notes: Opaque principal identifier. Was ref<Authority> before Trust Chain was de-scoped from Phase 1 ontology.
  - name: raisedAt
    type: iso-timestamp
    required: true
  - name: affectedEntities
    type: list<ref<NodeKind>>
    required: true
  - name: status
    type: enum<open
    answered: null
    deferred: null
    obsolete>: null
    required: true
  - name: resolution
    type: markdown
    required: false
  incomingEdges:
  - raised_question
  outgoingEdges: []
  invariants:
  - affectedEntities non-empty
  - status != open implies resolution is set
  examples: []
- id: node:gap
  name: Gap
  origin: a5c
  prefix: gap
  cluster: 13-catalog-meta
  purpose: tracked debt-loop finding (level 1-7); first-class graph entity so gap state is queryable
  attributes:
  - name: id
    type: id
    required: true
  - name: title
    type: string
    required: true
  - name: level
    type: int
    required: true
  - name: priority
    type: enum<P0
    P1: null
    P2: null
    P3>: null
    required: true
  - name: discoveredAt
    type: iso-timestamp
    required: true
  - name: source
    type: markdown
    required: true
  - name: currentState
    type: markdown
    required: true
  - name: desiredState
    type: markdown
    required: true
  - name: propagationStatus
    type: map<string
    enum<not-started: null
    in-progress: null
    done: null
    not-applicable>>: null
    required: true
  - name: owner
    type: string
    required: false
    notes: Opaque principal identifier. Was ref<Authority> before Trust Chain was de-scoped from Phase 1 ontology.
  - name: evidenceLinks
    type: list<ref<EvidenceSource>>
    required: false
  - name: status
    type: enum<open
    in-progress: null
    closed: null
    deferred>: null
    required: true
  - name: closedAt
    type: iso-timestamp
    required: false
  - name: notes
    type: markdown
    required: false
  - name: propagationChain
    type: list<map<string
    any>>: null
    required: false
  - name: markdownRef
    type: string
    required: true
  incomingEdges: []
  outgoingEdges:
  - affects
  - blocks
  - raised_question
  invariants:
  - level in 1..7
  - status = closed implies closedAt is set
  - status = closed implies every applicable propagationStatus entry is done or not-applicable
  - markdownRef points at wiki/process/gaps/GAP-<level>-<priority>-<slug>.md
  examples: []
- id: node:deployment-target
  name: DeploymentTarget
  origin: universal
  prefix: deployment-target
  cluster: 13-catalog-meta
  purpose: 'A named Kubernetes-cluster (or local minikube) target that the

    babysitter cloud package can deploy the kanban / gateway / babysitter-

    agent components to. Reifies the union of TargetConfig variants

    (`minikube` | `existing` | `eks` | `aks` | `gke`) declared in

    packages/cloud/src/types.ts so cluster fleets, cost reports, and

    multi-tenant deployment plans become queryable as graph data.

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: targetType
    type: enum<minikube,existing,eks,aks,gke>
    required: true
    evidence: vendor-doc-or-better
  - name: environment
    type: enum<minikube,staging,prod,custom>
    required: true
  - name: kubeContext
    type: string
    required: false
    notes: Required when targetType = existing. The kubectl context to use.
  - name: namespace
    type: string
    required: false
  - name: cloudRegion
    type: string
    required: false
    notes: Required when targetType in {eks, gke}. Vendor-specific region.
  - name: cloudProjectId
    type: string
    required: false
    notes: Required when targetType = gke.
  - name: cloudSubscriptionId
    type: string
    required: false
    notes: Required when targetType = aks.
  - name: cloudResourceGroup
    type: string
    required: false
    notes: Required when targetType = aks.
  - name: clusterName
    type: string
    required: false
    notes: Required when targetType in {eks, aks, gke}.
  - name: minikubeProfile
    type: string
    required: false
    notes: Optional minikube profile name.
  - name: ingressHostnames
    type: list<string>
    required: false
  - name: ingressTls
    type: bool
    required: false
  - name: ingressClassName
    type: string
    required: false
  - name: authMode
    type: enum<local-dev,bootstrap-admin>
    required: false
  - name: storageClassName
    type: string
    required: false
  - name: autoApplyTerraform
    type: bool
    required: false
  - name: autoApplyKubernetes
    type: bool
    required: false
  - name: description
    type: markdown
    required: false
  incomingEdges: []
  outgoingEdges: []
  invariants:
  - id starts with deployment-target: null
  - targetType = existing implies kubeContext is present
  - targetType = eks implies cloudRegion AND clusterName are present
  - targetType = aks implies cloudSubscriptionId AND cloudResourceGroup AND clusterName are present
  - targetType = gke implies cloudProjectId AND cloudRegion AND clusterName are present
  examples:
  - graph/catalog-meta/deployment-targets/minikube-local.yaml
  - graph/catalog-meta/deployment-targets/eks-prod.yaml
- id: node:path-descriptor
  name: PathDescriptor
  origin: universal
  prefix: path
  cluster: 13-catalog-meta
  purpose: 'Typed pointer to a runtime filesystem path (run dir, session dir, MCP

    config, plugin scope dir, vendor auth path, plugin artifact location).

    Distinct from SourceRef which points at source-of-truth in a repo.

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: pathId
    type: string
    required: true
  - name: displayName
    type: string
    required: false
  - name: path
    type: string
    required: true
  - name: pathPattern
    type: string
    required: false
  - name: pathKind
    type: enum<session-state-dir
    source-of-truth-dir: null
    api-surface: null
    ontology-source: null
    repo-path: null
    manifest: null
    container-image: null
    run-dir: null
    plugin-scope: null
    mcp-config: null
    vendor-auth: null
    settings-file: null
    other>: null
    required: true
  - name: ownerKind
    type: string
    required: true
  - name: ownerId
    type: id
    required: true
  - name: platform
    type: enum<cross-platform
    repo: null
    linux: null
    macos: null
    windows: null
    container>: null
    required: true
  - name: scope
    type: enum<user
    project: null
    session: null
    run: null
    system>: null
    required: false
  - name: evaluationContext
    type: enum<project
    user: null
    system>: null
    required: false
  - name: expansion
    type: enum<literal
    home: null
    env-var: null
    hash-suffix>: null
    required: false
  - name: notes
    type: markdown
    required: false
  incomingEdges:
  - references_path
  outgoingEdges:
  - path_for
  invariants:
  - ownerKind is a known NodeKind and ownerId resolves
  - pathKind=container-image implies path is a valid OCI image reference
  examples: []
- id: node:package-surface
  name: PackageSurface
  origin: universal
  prefix: package
  cluster: 13-catalog-meta
  purpose: workspace package tracking — module type, surface kinds, source-of-truth role, publish target
