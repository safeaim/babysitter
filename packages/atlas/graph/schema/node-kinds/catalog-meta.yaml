  - surfaceKinds non-empty
  examples: []
- id: node:ci-surface
  name: CiSurface
  origin: universal
  prefix: ci
  cluster: 13-catalog-meta
  purpose: CI/CD spec for a PackageSurface — scripts, publish strategy, release channels, validation, artifact expectations
  attributes:
  - name: id
    type: id
    required: true
  - name: ciId
    type: string
    required: true
