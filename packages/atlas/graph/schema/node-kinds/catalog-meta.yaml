- id: node:shared-context-spec
  name: SharedContextSpec
  origin: a5c
  prefix: shared-context-spec
  cluster: 13-catalog-meta
  purpose: 'Stub. The shape of an a5c shared-context fabric record, attached as a

    structured `Claim` on the reliability-interface. Recorded as a

    NodeKind so the schema mapping referenced from coverage-checklist row

    "Shared Context fabric" resolves.

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: false
  - name: contextKind
    type: string
    required: false
  - name: producerIface
    type: string
    required: false
  - name: consumerIfaces
    type: list<string>
    required: false
  - name: fieldSchema
    type: list<string>
    required: false
    notes: |
      Catalog pass 95 — `<name>:<type>:<required>:<description>` quadruples for
      every field of the shared context payload. Lifted from a TypeScript
      interface (e.g. `NormalizedTriggerEvent`) so the codegen can emit
      the interface definition + JSON-Schema from the graph alone.
  - name: typescriptInterface
    type: string
    required: false
    notes: |
      Catalog pass 95 — name of the canonical TypeScript interface this
      shared-context spec materializes (e.g. `NormalizedTriggerEvent`,
      `TriggerChange`).
  - name: sourceCitation
    type: string
    required: false
  incomingEdges:
  - has_payload_schema
  outgoingEdges: []
  invariants:
  - 'STUB: deferred to Phase 2 (extension-interfaces track).'
  examples: []
- id: node:run-journal-event
  name: RunJournalEvent
  origin: a5c
  originContext: Babysitter SDK
  prefix: run-journal-event
  cluster: 13-catalog-meta
  purpose: 'The enum of run journal event names emitted by the babysitter runtime

    and persisted to the per-run journal directory (`<runDir>/journal/`).

    Each event is a sequenced + ULID-tagged + sha256-checksummed JSON file

    ({type, recordedAt, data, checksum}). Sourced from

    packages/sdk/src/storage/journal.ts (appendEvent, JournalEvent) and

    packages/sdk/src/runtime tests; the canonical event taxonomy is

    drawn from observed eventType literals across the runtime.

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: eventName
    type: string
    required: true
    evidence: vendor-doc-or-better
    notes: Event-type literal as written to the journal payload's `type` field.
  - name: category
    type: enum<run-lifecycle,effect-lifecycle,iteration,hook,cost,custom>
    required: true
    notes: Coarse category for grouping events in the observer dashboard.
  - name: emittedByPhase
    type: string
    required: false
    notes: Phase id during which the event is typically emitted.
  - name: terminal
    type: bool
    required: false
    notes: True for events that represent a terminal Run state (RUN_COMPLETED, RUN_FAILED).
  - name: payloadShape
    type: json
    required: false
    notes: 'JSON Schema describing the typed `data` payload field. # TODO: backfill from runtime contract tests.'
  - name: description
    type: markdown
    required: false
  incomingEdges: []
  outgoingEdges: []
  invariants:
  - id starts with run-journal-event: null
