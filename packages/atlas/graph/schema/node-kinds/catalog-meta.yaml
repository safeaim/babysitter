    required: true
  - name: workspacePath
    type: string
    required: true
  - name: moduleType
    type: enum<typescript
    commonjs: null
    esm: null
    nextjs: null
    python: null
    rust: null
    go: null
    other>: null
    required: true
  - name: surfaceKinds
    type: list<string>
    required: true
  - name: sourceOfTruthRole
    type: enum<graph-source-of-truth
    wrapper-over-graph: null
    ontology-input: null
    application: null
    external>: null
    required: true
  - name: publishedTo
    type: enum<npm
    pypi: null
    crates: null
    none>: null
    required: false
  - name: versionPolicy
    type: enum<semver
    date: null
    hash>: null
    required: false
  incomingEdges:
  - validated_by_ci
  outgoingEdges:
  - references_path
  - validated_by_ci
  - exposes_subcommand
  invariants:
