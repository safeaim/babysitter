- id: node:discovery-signal
  name: DiscoverySignal
  origin: universal
  prefix: discovery-signal
  cluster: 13-catalog-meta
  purpose: 'Host-detection signal — env var, binary on PATH, file presence, registry

    key, argv match, exit code, or a combination — used by agent-mux to detect

    whether a particular agent harness is the active host (or installed on the

    machine). Sourced from the legacy agent-catalog ontology

    (packages/agent-catalog/graph/schema/ontology-schema.yaml :: DiscoverySignal)

    and packages/agent-mux/core/src/host-detection.ts.

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: signalId
    type: string
    required: true
    notes: Stable signal id; typically equals id.
  - name: signalKind
    type: enum<env-var
    env-any: null
    binary-on-path: null
    file-presence: null
    registry-key: null
    argv-match: null
    exit-code: null
    combination>: null
    required: true
    evidence: vendor-doc-or-better
    notes: v6 supports both legacy 'env-var' and the imported 'env-any' value (env-any = at least one of a list of env vars is set).
  - name: key
    type: string
    required: true
    notes: Lookup key for this signal — e.g. agent slug, env-var name, binary basename.
  - name: matchMode
    type: enum<exact
    substring: null
    regex: null
    semver-range: null
    contains-array: null
    any: null
    all: null
    all-present-with-absences>: null
    required: true
    notes: 'all-present-with-absences = all of `signals` present AND all of `absentSignals` absent (used by hooks-mux ordered-rule detector for the codex-without-claude-env case).'
  - name: confidence
    type: enum<low
    medium: null
    high>: null
    required: true
  - name: scope
    type: enum<user
    system: null
    shell: null
    process: null
    host-detection: null
    hooks-mux>: null
    required: true
    notes: v6 retains the legacy lexical scopes plus 'host-detection' (agent-mux/core/src/host-detection.ts) and 'hooks-mux' (hooks-mux/core/src/discovery/detector.ts ordered-rule auto-detection).
  - name: signals
    type: list<string>
    required: true
    notes: Concrete probes the signal evaluates (env var names, binary names, file paths, argv tokens).
  - name: absentSignals
    type: list<string>
    required: false
    notes: Env-var names whose ABSENCE is required for the rule to match. Used by hooks-mux ordered-rule detector (e.g. codex-without-claude-env disambiguates from claude when OPENAI_API_KEY is set but CLAUDE_PLUGIN_ROOT/CLAUDE_ENV_FILE are not). Consumed by `HooksMuxDetectionRule.absentSignals` in packages/agent-catalog/src/models.ts and packages/hooks-mux/core/src/discovery/detector.ts.
  - name: argvMatches
    type: list<string>
    required: false
    notes: Argv tokens this signal matches when scope = host-detection. Optional in v6 (legacy schema marked required but several imported signals omit it).
  - name: consumer
    type: string
    required: false
    notes: Subsystem that consumes the signal (e.g. agent-comm-mux).
  - name: metadataFields
    type: list<map<string
    any>>: null
    required: false
    notes: 'Per-signal metadata extraction recipe: { key, envVars: [...] }.'
  - name: notes
    type: markdown
    required: false
  incomingEdges: []
  outgoingEdges:
  - detects
  - signals_via
  - applies_to
  invariants:
  - id starts with discovery-signal: null
  - signals non-empty
  - scope=host-detection implies at least one of (signals, argvMatches) is non-empty
  examples:
  - graph/extensions/discovery-signals/claude-code-host-env.yaml
  - graph/extensions/discovery-signals/codex-host-env.yaml
  - graph/extensions/discovery-signals/copilot-cli-host-env.yaml
  - graph/extensions/discovery-signals/cursor-host-env.yaml
  - graph/extensions/discovery-signals/gemini-cli-host-env.yaml
  - graph/extensions/discovery-signals/hermes-host-env.yaml
  - graph/extensions/discovery-signals/omp-host-env.yaml
  - graph/extensions/discovery-signals/openclaw-host-env.yaml
  - graph/extensions/discovery-signals/opencode-host-env.yaml
  - graph/extensions/discovery-signals/pi-host-env.yaml
