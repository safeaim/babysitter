    type: list<string>
    required: true
  - name: validationCommands
    type: list<string>
    required: true
  - name: artifactExpectations
    type: list<string>
    required: false
  - name: triggerEvents
    type: list<enum<push
    pr: null
    tag: null
    schedule>>: null
    required: false
  - name: requiredApprovals
    type: int
