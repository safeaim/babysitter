  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: kind
    type: enum<stdio
    streamable-http: null
    sse: null
    websocket>: null
    required: true
  - name: specUrl
    type: url
    required: true
    evidence: vendor-doc-or-better
  - name: specVersion
    type: string
    required: true
    evidence: vendor-doc-or-better
  - name: specRevisions
    type: list<string>
    required: true
    evidence: vendor-doc-or-better
  - name: currentSpecRevision
    type: string
    required: true
    evidence: vendor-doc-or-better
  - name: streaming
    type: enum<none,partial,full>
    required: true
    evidence: vendor-doc-or-better
  - name: status
    type: enum<live,deprecated,community,draft>
    required: true
    evidence: vendor-doc-or-better
  - name: connectionLifecycle
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'Connection lifecycle: handshake, `initialize` request → `initialize` response → `notifications/initialized`, ready, and shutdown semantics for this transport.'
  - name: capabilityNegotiation
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Shape of the `initialize` request and response — `protocolVersion`, `clientInfo`/`serverInfo`, the exchanged `capabilities` object — as carried over this transport.
  - name: notificationModel
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: How JSON-RPC notifications and server-pushed events are delivered on this transport (channel, ordering, delivery guarantees).
  - name: reconnectPolicy
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Reconnect / session-resumption semantics. For Streamable HTTP this includes the `Mcp-Session-Id` header and SSE `Last-Event-ID` resumption.
  - name: authentication
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Authentication model on this transport (none for stdio; bearer tokens / OAuth Resource Server flow per the 2025-06-18 spec for HTTP-based transports).
  - name: streamingFraming
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'Wire framing details: SSE `event:`/`data:` delimiters, JSON-RPC message-id discipline, content-length / newline-delimited framing on stdio.'
