# NodeKinds for cluster 2-compute-path.
# Loaded by tools/validator/validate.py via the manifest in ../ontology-schema.yaml.
# DO NOT add backward-compat shims — catalog pass 37 policy.

nodeKinds:
- id: node:model-family
  name: ModelFamily
  origin: universal
  prefix: model-family
  cluster: 2-compute-path
  purpose: a family of models
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: vendor
    type: string
    required: true
  - name: homepageUrl
    type: url
    required: true
    evidence: vendor-doc-or-better
  incomingEdges: []
  outgoingEdges:
  - has_version
  invariants:
  - id starts with model-family: null
  examples: []
- id: node:model-version
  name: ModelVersion
  origin: universal
  prefix: model
  cluster: 2-compute-path
  purpose: a specific versioned model
  attributes:
  - name: id
    type: id
    required: true
  - name: modelFamilyId
    type: ref<ModelFamily>
    required: true
  - name: versionRange
    type: versionRange
    required: true
    evidence: vendor-doc-or-better
  - name: kind
    type: enum<chat,reasoning,embedding,vision,audio,multimodal,code-completion,classification>
    required: true
    evidence: vendor-doc-or-better
    notes: Coarse functional class. Distinguishes embedding-only / vision-only / classification variants from chat models so queries like 'find all embedding models' are first-class.
  - name: contextWindowTokens
    type: tokens
    required: true
    evidence: vendor-doc-or-better
  - name: costPerMTokInput
    type: cost-per-million-tokens
    required: true
    evidence: vendor-doc-or-better
    notes: USD per 1,000,000 input tokens. Renamed from costPer1kInputTokens (closes GAP-L1-P0 claude-models-pricing-and-lineup; the type is per-million, the previous name lied).
  - name: costPerMTokOutput
    type: cost-per-million-tokens
    required: true
    evidence: vendor-doc-or-better
    notes: USD per 1,000,000 output tokens.
  - name: supportsExtendedThinking
    type: bool
    required: true
    evidence: vendor-doc-or-better
    notes: Anthropic 'extended thinking' (visible reasoning budget). Replaces conflated `supportsThinking` boolean (closes GAP-L1-P1 adaptive-thinking-vs-extended-thinking; partial — full split awaits Phase 2).
  - name: supportsAdaptiveThinking
    type: bool
    required: false
    evidence: vendor-doc-or-better
    notes: Opus-4.7-style adaptive thinking mode (model decides when to think). Distinct from extended thinking.
  - name: thinkingEffortLevels
    type: list<enum<low
    medium: null
    high: null
    max>>: null
    required: false
    evidence: vendor-doc-or-better
  - name: supportsThinkingBudgetTokens
    type: bool
    required: true
    evidence: vendor-doc-or-better
  - name: modalities
    type: list<enum<text,image,audio,video,embedding,tool-output>>
    required: true
    evidence: vendor-doc-or-better
    notes: Collapsed from former Modality NodeKind (remodel 2026-04-29). Values are bare enum strings, not refs.
  - name: modalityDirections
    type: list<object>
    required: false
    evidence: vendor-doc-or-better
    notes: 'D8 (planner 2026-05-01) — refines `modalities` with direction. Each entry: { kind: text|image|audio|video|embedding|tool-output, direction: input|output|bidirectional }. Lighter-touch than splitting Modality enum; resolves multimodal-output coverage gap (TTS / image-gen / audio-gen).'
  - name: lifecycleStatus
    type: enum<preview,ga,deprecated,eol>
    required: true
    evidence: vendor-doc-or-better
    notes: Current vendor-published lifecycle status. Replaces ad-hoc inference from deprecationDate/eolDate.
  - name: lifecycleStatusChangedAt
    type: iso-date
    required: false
    notes: Date of the most recent lifecycleStatus transition (traceability).
  - name: knowledgeCutoffDate
    type: iso-date
    required: false
    evidence: vendor-doc-or-better
    notes: Vendor-published training-data knowledge cutoff.
  - name: safetyTier
    type: string
    required: false
    evidence: vendor-doc-or-better
    notes: Vendor-specific safety tier (Anthropic ASL-x, OpenAI safety category, etc.). Free-form because vendor taxonomies diverge.
  - name: modelCardUrl
    type: url
    required: false
    evidence: vendor-doc-or-better
  - name: supportsFineTuning
    type: bool
    required: false
    evidence: vendor-doc-or-better
  - name: fineTuningKind
    type: enum<full,lora,adapter,none>
    required: false
    evidence: vendor-doc-or-better
    notes: Kind of fine-tuning surface. Required when supportsFineTuning is true.
  - name: releaseDate
    type: iso-date
    required: true
  - name: deprecationDate
    type: iso-date
    required: false
  - name: eolDate
    type: iso-date
    required: false
  - name: regions
    type: list<string>
    required: true
  - name: supportsThinking
    type: bool
    required: false
  incomingEdges:
  - has_version
  - serves
  - provides_cost_for
  outgoingEdges:
  - version_of
  - served_by
  - speaks
  - priced_by
  invariants:
  - supportsThinkingBudgetTokens=true requires supportsExtendedThinking=true
  - thinkingEffortLevels (when set) requires supportsExtendedThinking=true
  - supportsAdaptiveThinking=true and supportsExtendedThinking=true MAY both be true (adaptive is independent of extended)
  - eolDate >= deprecationDate >= releaseDate (when present)
  - lifecycleStatus=deprecated requires deprecationDate to be set
  - lifecycleStatus=eol requires eolDate to be set
  - fineTuningKind in {full,lora,adapter} requires supportsFineTuning=true
  - per-model capability bindings (parallel-tool-calls, prompt-caching, batch-api, etc.) bind via the `supports` edge (catalog pass 9c remodel), not as boolean attributes
  examples: []
- id: node:provider
  name: Provider
  origin: universal
  prefix: provider
  cluster: 2-compute-path
  purpose: entity serving inference for one or more model versions
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: versionRange
    type: versionRange
    required: true
  - name: authMethods
    type: list<enum<api-key,oauth,browser-login,service-account,iam,device-code,workload-identity,gcp-adc>>
    required: true
    evidence: vendor-doc-or-better
  - name: authMethodNotes
    type: markdown
    required: false
    notes: Non-obvious auth requirements (e.g. Bedrock IAM permissions; Vertex ADC + project enablement).
  - name: endpoints
    type: map<string
    url>: null
    required: true
    evidence: vendor-doc-or-better
  - name: pricing
    type: markdown
    required: false
  - name: pricingTiers
    type: list<map>
    required: false
    evidence: vendor-doc-or-better
    notes: 'Each entry: { name, rateLimit, priceMultiplier, description? }. Captures free / pro / enterprise / batch / interactive / priority tiers. priceMultiplier is relative to base per-model price.'
  - name: rateLimitSignalingProtocol
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: How the provider communicates rate-limit state (headers, status codes, Retry-After semantics, error envelope shape).
  - name: dataResidencyOptions
    type: list<string>
    required: false
    evidence: vendor-doc-or-better
    notes: Region/jurisdiction strings the provider exposes for data-residency compliance. Distinct from `regions` (where the API is reachable).
  - name: vendorFeatures
    type: list<ref<Capability>>
    required: false
    notes: 'Vendor-specific features beyond the wire-protocol baseline (prompt-caching, batch-api, files-api, bedrock-guardrails, vertex-reasoning-engine). Richer per-version claims live on the `supports` edge (catalog pass 9c remodel: was on CapabilitySupport).'
  - name: slaTier
    type: string
    required: false
    evidence: vendor-doc-or-better
    notes: Vendor-published SLA tier. Free-form because vendor SLAs are not standardized.
  - name: regions
    type: list<string>
    required: true
  - name: vendor
    type: string
    required: false
  incomingEdges:
  - served_by
  - provides_cost_for
  - version_of
  outgoingEdges:
  - serves
  invariants:
  - endpoints non-empty
  - reachable from at least one ModelVersion via served_by
  - pricingTiers entries MUST have unique `name` within the provider
  - vendorFeatures refs MUST resolve to a Capability whose appliesToNodeKinds includes Provider or ModelVersion
  examples: []
- id: node:provider-version
  name: ProviderVersion
  origin: universal
  prefix: provider-version
  cluster: 2-compute-path
  purpose: 'a versioned release of a model provider''s API (e.g. anthropic API v1,

    openai chat-completions API). Lets capability-supports be pinned to a

    provider version range rather than just the provider entity.

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: providerId
    type: ref<Provider>
    required: true
  - name: versionRange
    type: string
    required: true
    notes: Semver range
  - name: releasedAt
    type: iso-date
    required: false
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - supports
  - version_of
  outgoingEdges:
  - version_of_provider
  invariants:
  - id starts with provider-version: null
  - versionRange must be a valid semver range
  examples: []
- id: node:model-transport-protocol
  name: ModelTransportProtocol
  origin: standard
  prefix: model-transport
  cluster: 2-compute-path
  purpose: an LLM wire protocol (Anthropic Messages, OpenAI Responses, Gemini, ...)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: vendor
    type: string
    required: true
  - name: specUrl
    type: url
    required: true
    evidence: vendor-doc-or-better
  - name: usageEnvelope
    type: enum<anthropic-usage,openai-usage,gemini-usage-metadata,bedrock-usage,none>
    required: false
    evidence: vendor-doc-or-better
    notes: Per-protocol cost/usage envelope shape. Anthropic Messages emits `usage{input_tokens,output_tokens,cache_creation_input_tokens,cache_read_input_tokens}`; OpenAI Responses/ChatCompletions emits `usage{prompt_tokens,completion_tokens,total_tokens,reasoning_tokens?}`; Gemini emits `usageMetadata{promptTokenCount,candidatesTokenCount,totalTokenCount}`; Bedrock emits `usage{inputTokens,outputTokens,totalTokens}`. Resolves OQ oq:cost-usage-envelope as gap-of-record — no cross-vendor standard exists.
  - name: thinkingChannel
    type: enum<content-block,item,part,none>
    required: false
    evidence: vendor-doc-or-better
    notes: Per-protocol thinking/reasoning channel surface. Anthropic Messages = `content-block` (type=`thinking`); OpenAI Responses = `item` (type=`reasoning`); Gemini = `part` (thought=true). Resolves OQ oq:thinking-channel-mapping as gap-of-record (extends OQ oq:thinking-streaming-envelopes).
  - name: streamingFraming
    type: enum<sse,jsonl,grpc-stream,custom,aws-event-stream>
    required: false
    evidence: vendor-doc-or-better
    notes: Wire-level streaming framing. Anthropic/OpenAI = sse; Gemini = sse; Bedrock Converse = grpc-stream/sse hybrid; OpenAI-compat local = sse/jsonl.
  - name: requestBodyShape
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Canonical request body structure on the wire (top-level fields, required vs. optional).
  - name: responseBodyShape
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Canonical non-streaming response body structure on the wire.
  - name: streamingEventTypes
    type: list<string>
    required: false
    evidence: vendor-doc-or-better
    notes: 'Ordered list of event types observed on a streamed response. Anthropic Messages: message_start, content_block_start, content_block_delta, content_block_stop, message_delta, message_stop. OpenAI Responses: response.created, response.output_text.delta, response.output_text.done, response.completed (plus item-level events). Gemini: streamed `GenerateContentResponse` chunks carrying delta parts.'
  - name: toolCallWireFormat
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'Concrete shape of a tool/function call on the wire. Anthropic: `tool_use` content block with `id, name, input`. OpenAI Responses: `function_call` item with `call_id, name, arguments` (JSON string). OpenAI ChatCompletions: assistant message `tool_calls[]` with `id, type=function, function{name, arguments}`. Gemini: `functionCall` part with `name, args`.'
  - name: toolResultWireFormat
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'Concrete shape of a tool/function result on the wire. Anthropic: `tool_result` content block with `tool_use_id, content`. OpenAI Responses: `function_call_output` item with `call_id, output`. OpenAI ChatCompletions: message with `role: tool, tool_call_id, content`. Gemini: `functionResponse` part with `name, response`.'
  - name: errorEnvelope
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Concrete error response body shape (HTTP status + envelope field names + error type/code surface).
  - name: cacheControlWireFormat
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'On-the-wire mechanism for prompt caching. Anthropic: per-block `cache_control: {type: "ephemeral", ttl?}`. OpenAI: implicit automatic caching plus optional `prompt_cache_key`. Gemini: server-side `cachedContent` resource referenced by name.'
  - name: rateLimitSignaling
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'Headers / body fields used to signal rate-limit state. Anthropic: `anthropic-ratelimit-requests-*`, `anthropic-ratelimit-tokens-*`, `retry-after`. OpenAI: `x-ratelimit-remaining-requests`, `x-ratelimit-remaining-tokens`, `x-ratelimit-reset-*`, `retry-after`. Gemini: HTTP 429 plus `retry-after`.'
  - name: reasoningWireFormat
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'Wire shape carrying reasoning / extended-thinking output, including any signature or redaction fields. Anthropic: `thinking` content block with optional `signature`, plus `redacted_thinking` variant. OpenAI Responses: `reasoning` item carrying summary text. Gemini: `thoughts`/thought-marked parts.'
  - name: authHeaderFormat
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'Authentication header shape for first-party endpoints. Anthropic: `x-api-key: <key>`. OpenAI: `Authorization: Bearer <key>`. Gemini: `x-goog-api-key: <key>` (Vertex uses `Authorization: Bearer <oauth-token>`).'
  - name: versioningHeader
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: 'How protocol version is negotiated. Anthropic: mandatory `anthropic-version: 2023-06-01` plus `anthropic-beta` opt-ins. OpenAI: no general API version header; specific betas use `OpenAI-Beta: <feature>=v<n>`. Gemini: path-versioned (`/v1`, `/v1beta`).'
  - name: aliasOf
    type: id
    required: false
  - name: cacheControl
    type: string
    required: false
  - name: currentSpecVersion
    type: string
    required: false
  - name: firstSpecVersion
    type: string
    required: false
  - name: notes
    type: markdown
    required: false
  - name: status
    type: string
    required: false
  - name: toolUseSchema
    type: code
    required: false
  - name: streamEventKinds
    type: list<enum<content-delta,tool-input-delta,thinking-delta,citation-delta,message-stop,error-event,ping>>
    required: false
    notes: Canonical stream-event kinds emitted on a streamed response (D7, planner 2026-05-01). Enum-typed companion to the free-form `streamingEventTypes` list — used for cross-protocol comparison.
  incomingEdges:
  - speaks
  - bridges
  outgoingEdges: []
  invariants: []
  examples: []
- id: node:mcp-transport
  name: MCPTransport
  origin: standard
  originDate: 2024-11-05
