- id: node:api-error-class
  name: APIErrorClass
  origin: derived
  originContext: |
    catalog pass 54 / claude-code services/api/errors.ts (APIConnectionError,
    APIConnectionTimeoutError, APIError, APIUserAbortError, FallbackTriggeredError;
    classifyAPIError + getAssistantMessageFromError branches at L523/560/573/etc).
    Distinguishes wire-level connection errors from authoritative HTTP errors,
    user-aborts, and synthetic fallback-triggered errors emitted after
    MAX_529_RETRIES. Distinct from ErrorCategory (the normalized retry/severity
    label) — APIErrorClass is the SDK-thrown class hierarchy.
  prefix: api-error-class
  cluster: 2-compute-path
  purpose: |
    A canonical SDK-thrown error class (APIConnectionError,
    APIConnectionTimeoutError, APIError, APIUserAbortError,
    FallbackTriggeredError, CannotRetryError) with its HTTP status / cause
    fingerprint and recovery posture. Maps to one or more ErrorCategory
    entries; transports use it to decide retry, fallback, auth-cache clear,
    or keep-alive teardown.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: className
    type: string
    required: true
    notes: SDK class name (claude-code APIError, APIConnectionError, APIConnectionTimeoutError, APIUserAbortError, FallbackTriggeredError, CannotRetryError).
  - name: layer
    type: enum<connection,timeout,http-status,abort,synthetic-fallback,sdk-misuse>
    required: true
  - name: httpStatus
    type: int
    required: false
    notes: Status code when layer=http-status (e.g. 401, 413, 429, 500, 529).
  - name: causeFingerprint
    type: list<string>
    required: false
    notes: claude-code extractConnectionErrorDetails — ECONNRESET, EPIPE, ENOTFOUND, ETIMEDOUT etc.
  - name: triggersAuthCacheClear
    type: bool
    required: false
    notes: claude-code 401 → clearApiKeyHelperCache; OAuth 401 → handleOAuth401Error; Bedrock/Vertex auth → clear creds.
  - name: triggersKeepAliveTeardown
    type: bool
    required: false
    notes: claude-code disableKeepAlive() called on ECONNRESET/EPIPE.
  - name: triggersFallbackModel
    type: bool
    required: false
    notes: claude-code FallbackTriggeredError after MAX_529_RETRIES.
  - name: userVisibleMessage
    type: markdown
    required: false
    notes: claude-code constants like REPEATED_529_ERROR_MESSAGE, INVALID_API_KEY_ERROR_MESSAGE, OAUTH_ORG_NOT_ALLOWED_ERROR_MESSAGE.
  - name: mappedErrorCategoryIds
    type: list<ref<ErrorCategory>>
    required: false
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - emits_api_error
  outgoingEdges:
  - mapped_to_error_category
  invariants:
  - id starts with api-error-class:
  - layer=http-status implies httpStatus is set
  examples:
  - graph/compute/api-error-classes/claude-code-api-connection-timeout.yaml
  - graph/compute/api-error-classes/claude-code-fallback-triggered.yaml
  - graph/compute/api-error-classes/claude-code-api-user-abort.yaml
- id: node:transport-client
  name: TransportClient
  origin: derived
  originContext: |
    catalog pass 54 / claude-code services/api/client.ts + services/api/claude.ts
    (createBetaClient, persistent connection pool, idle/response timeouts,
    keep-alive policy, OAuth refresh on 401, AWS/GCP/Anthropic-direct
    credential precedence) + pi-mono coding-agent agent-session-runtime.ts
    AgentSessionRuntime client wiring. Distinct from RetryPolicy (which only
    declares retry curves) and Provider (which is the vendor) — TransportClient
    is the live HTTP/streaming client + its timeout/keep-alive/auth-refresh
    posture.
  prefix: transport-client
  cluster: 2-compute-path
  purpose: |
    A configured transport client targeting a Provider/ProviderVersion with
    declarative timeouts, keep-alive policy, retry-policy binding, OAuth/auth
    refresh hooks, mock-mode injection, and credential precedence. Captures
    real ops nuances: per-stream idle vs response vs total timeouts,
    persistent connection pool sizing, ECONNRESET teardown, mock rate-limit
    injection (testing).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: providerId
    type: ref<Provider>
    required: true
  - name: providerVersionId
    type: ref<ProviderVersion>
    required: false
  - name: idleTimeoutMs
    type: int
    required: false
    notes: Per-chunk idle timeout for streaming responses (claude-code first-token + per-chunk).
  - name: responseTimeoutMs
    type: int
    required: false
    notes: End-to-end response timeout (non-streaming).
  - name: totalTimeoutMs
    type: int
    required: false
  - name: firstTokenTimeoutMs
    type: int
    required: false
    notes: claude-code firstTokenDate.ts TTFT-based stall detector.
  - name: keepAliveEnabled
    type: bool
    required: false
  - name: keepAliveTeardownOnCodes
    type: list<string>
    required: false
    notes: claude-code disableKeepAlive on ECONNRESET, EPIPE.
  - name: persistentPoolSize
    type: int
    required: false
  - name: retryPolicyId
    type: ref<RetryPolicy>
    required: false
  - name: tokenBudgetId
    type: ref<TokenBudget>
    required: false
  - name: oauthRefreshOn401
    type: bool
    required: false
    notes: claude-code handleOAuth401Error refreshes OAuth tokens before retry.
  - name: clearAuthCacheOn401
    type: bool
    required: false
    notes: claude-code clearApiKeyHelperCache called for non-OAuth 401.
  - name: credentialPrecedence
    type: list<enum<env-var,oauth,bedrock-iam,vertex-adc,api-key-helper,settings,keychain>>
    required: false
    notes: claude-code auth resolution order (getAnthropicApiKeyWithSource, getClaudeAIOAuthTokens, Bedrock IAM, Vertex ADC).
  - name: mockModeEnabled
    type: bool
    required: false
    notes: claude-code services/rateLimitMocking — /mock-limits command injects synthetic rate-limit headers for testing.
  - name: dumpsPrompts
    type: bool
    required: false
    notes: claude-code services/api/dumpPrompts.ts — when CLAUDE_CODE_DUMP_PROMPTS is set, every request body is written to disk.
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - uses_transport_client
  outgoingEdges:
  - client_targets_provider
  - client_uses_retry_policy
  - client_uses_token_budget
  invariants:
  - id starts with transport-client:
  examples:
  - graph/compute/transport-clients/claude-code-anthropic-direct.yaml
  - graph/compute/transport-clients/claude-code-bedrock.yaml
- id: node:capacity-cascade-signal
  name: CapacityCascadeSignal
  origin: derived
  originContext: |
    catalog pass 54 / claude-code services/api/withRetry.ts REPEATED_529_ERROR_MESSAGE +
    FOREGROUND_529_RETRY_SOURCES + FastMode cooldown + handleFastModeOverageRejection.
    Signals that the upstream is in a capacity-cascade state — retries should
    bail (background sources), trigger fallback model (foreground after
    MAX_529_RETRIES), or enter fast-mode cooldown. Distinct from ErrorCategory
    (a single error type) — CapacityCascadeSignal is the cross-call observation
    that gates retry/fallback decisions.
  prefix: capacity-cascade-signal
  cluster: 2-compute-path
  purpose: |
    A cross-call observation about provider capacity state — repeated 529s,
    fast-mode rejection (anthropic-ratelimit-unified-overage-disabled-reason),
    permanent overage rejection — that drives whether retries continue,
    fallback model fires, or fast mode is disabled session-wide.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: signalKind
    type: enum<repeated-overload-529,fast-mode-cooldown,fast-mode-permanent-rejection,background-bail,foreground-fallback-trigger>
    required: true
  - name: thresholdAttempts
    type: int
    required: false
    notes: claude-code MAX_529_RETRIES=3 for foreground-fallback-trigger.
  - name: cooldownMs
    type: int
    required: false
    notes: claude-code MIN_COOLDOWN_MS=600000, DEFAULT_FAST_MODE_FALLBACK_HOLD_MS=1800000 (30min).
  - name: triggerHeader
    type: string
    required: false
    notes: claude-code anthropic-ratelimit-unified-overage-disabled-reason header for permanent rejection.
  - name: actionOnSignal
    type: enum<bail,trigger-fallback,disable-fast-mode-session,enter-cooldown,emit-telemetry>
    required: true
  - name: telemetryEvent
    type: string
    required: false
    notes: claude-code tengu_api_529_background_dropped emitted when background-bail fires.
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - emits_cascade_signal
  outgoingEdges: []
  invariants:
  - id starts with capacity-cascade-signal:
  examples:
  - graph/compute/capacity-cascade-signals/claude-code-repeated-529.yaml
  - graph/compute/capacity-cascade-signals/claude-code-fast-mode-cooldown.yaml
- id: node:transcript-ingress-endpoint
  name: TranscriptIngressEndpoint
  origin: derived
  originContext: |
    catalog pass 54 / claude-code services/api/sessionIngress.ts
    (appendSessionLogImpl, lastUuidMap, sequentialAppendBySession, MAX_RETRIES,
    BASE_DELAY_MS, Last-Uuid header, 409 stale-state recovery). The session
    transcript is streamed to a per-session ingress URL that uses Last-Uuid
    chaining for ordering, sequential per-session writes, and 409 stale-UUID
    recovery semantics.
  prefix: transcript-ingress
  cluster: 2-compute-path
  purpose: |
    A remote transcript-ingress endpoint that receives streamed session
    entries with Last-Uuid chaining, per-session sequential writes, retryable
    transient failures, and 409 stale-state recovery (server returns
    x-last-uuid; client adopts and retries).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: endpointUrl
    type: url
    required: true
  - name: ingressMethod
    type: enum<PUT,POST>
    required: false
    notes: claude-code uses axios.put for append.
  - name: lastUuidHeader
    type: string
    required: false
    notes: claude-code Last-Uuid request header carries the previously stored uuid for chain validation.
  - name: serverLastUuidHeader
    type: string
    required: false
    notes: claude-code x-last-uuid response header — used to recover from 409 stale-state when the entry was stored despite the client thinking it failed.
  - name: maxRetries
    type: int
    required: false
    notes: claude-code MAX_RETRIES=10.
  - name: baseDelayMs
    type: int
    required: false
    notes: claude-code BASE_DELAY_MS=500.
  - name: failsImmediatelyOn
    type: list<int>
    required: false
    notes: claude-code fails immediately on 401 (auth).
  - name: sequentialPerSession
    type: bool
    required: false
    notes: claude-code getOrCreateSequentialAppend wraps appends in a per-session sequential() to prevent concurrent writes.
  - name: authMethod
    type: enum<oauth,api-key,bearer>
    required: false
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - persists_transcript_to
  outgoingEdges: []
  invariants:
  - id starts with transcript-ingress:
  examples:
  - graph/compute/transcript-ingress-endpoints/claude-code-claude-ai-ingress.yaml
