- id: node:agent-host-transport
  name: AgentHostTransport
  origin: standard
  prefix: agent-host-transport
  cluster: 2-compute-path
  purpose: how a host talks to an agent process (stdio, http, ws, ...)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: kind
    type: enum<stdio
    http: null
    websocket>: null
    required: true
  - name: specUrl
    type: url
    required: false
    evidence: vendor-doc-or-better
  - name: inboundMessageFormat
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Concrete format the host uses to deliver work to the agent (e.g. JSON object on stdin per turn, HTTP request body shape, framed JSONL).
  - name: outboundMessageFormat
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: Concrete format the agent emits back to the host (e.g. line-delimited JSON / JSONL events on stdout, HTTP response body, WebSocket frames).
  - name: signalForwarding
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: How the host signals interrupt/cancel/shutdown to the agent process (POSIX signals on stdio; cancel RPC / abort message on http/ws; close-frame on ws).
  - name: ptySemantics
    type: markdown
    required: false
    evidence: vendor-doc-or-better
    notes: When `stdio+pty` is used vs. plain stdio — terminal semantics preserved (raw mode, ANSI, resize), and which agents require it. Only meaningful for kind=stdio-pty (or stdio entries describing PTY-aware behavior).
  - name: supportedAgentControlVerbs
    type: list<enum<interrupt,abort,cancel,pause,resume,yield,checkpoint>>
    required: false
    notes: Agent-control verbs the host transport supports (D2, planner 2026-05-01). Enum extension rather than NodeKind — uniform shape.
  - name: streamEventKinds
    type: list<enum<content-delta,tool-input-delta,thinking-delta,citation-delta,message-stop,error-event,ping,session-started,startup-failed,turn-completed,turn-failed,turn-cancelled,turn-ended-with-error,turn-input-required,approval-auto-approved,unsupported-tool-call,notification,other-message,malformed>>
    required: false
    notes: Stream-event kinds the transport emits. catalog pass 18 extends with the Symphony §10.4 AgentEventTaxonomy values (session-started ... malformed) on top of the catalog pass 17 D7 baseline.
  - name: rateLimitObservation
    type: map<string
    any>: null
    required: false
    notes: 'catalog pass 18 attribute block (capturedAt, vendor, primaryLimit{used,max,resetAt}, secondaryLimit, rawPayloadRef). Reviewer collapse 2026-05-01: replaces the dropped RateLimitPayload NodeKind — captured snapshot is ephemeral runtime data, not a catalog entity.'
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - exposes
  outgoingEdges: []
  invariants: []
  examples: []
- id: node:transport-proxy
  name: TransportProxy
  origin: standard
