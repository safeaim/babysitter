- id: node:tool-dispatch-policy
  name: ToolDispatchPolicy
  origin: derived
  originContext: |
    catalog pass 54 / claude-code Tool.ts (Tool.isConcurrencySafe, isReadOnly,
    isDestructive, interruptBehavior cancel|block, isOpenWorld, shouldDefer,
    alwaysLoad) + tools.ts dispatch loop that batches concurrency-safe reads
    and serializes writes. ToolDispatchPolicy summarizes the runtime
    parallelism / cancellation posture for a ToolDescriptor in one place.
  prefix: tool-dispatch-policy
  cluster: 7-extensions
  purpose: |
    Per-tool dispatch posture — concurrency safety, interrupt behavior on
    new user message, deferred-loading via ToolSearch, alwaysLoad pin,
    open-world flag, max-result-size before disk persist. Captures the
    nuances tools.ts uses to parallelize reads, serialize writes, and decide
    cancellation when the user types mid-call.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: toolDescriptorId
    type: ref<ToolDescriptor>
    required: false
    notes: Optional — examples may omit when the underlying ToolDescriptor entry has not yet been imported into the catalog.
  - name: isConcurrencySafe
    type: bool
    required: false
    notes: claude-code Tool.isConcurrencySafe — when true, multiple invocations may run in parallel with peers.
  - name: isReadOnly
    type: bool
    required: false
  - name: isDestructive
    type: bool
    required: false
    notes: claude-code isDestructive — set only for irreversible operations (delete, overwrite, send).
  - name: interruptBehavior
    type: enum<cancel,block>
    required: false
    notes: claude-code Tool.interruptBehavior — cancel = drop result if user submits mid-call; block = keep running.
  - name: isOpenWorld
    type: bool
    required: false
    notes: claude-code isOpenWorld — tool may interact with arbitrary external systems.
  - name: shouldDefer
    type: bool
    required: false
    notes: claude-code shouldDefer — tool ships with defer_loading:true and requires a ToolSearch round-trip before invocation.
  - name: alwaysLoad
    type: bool
    required: false
    notes: claude-code alwaysLoad — tool schema appears on turn 1 even when ToolSearch is enabled.
  - name: maxResultSizeChars
    type: int
    required: false
    notes: claude-code maxResultSizeChars — when exceeded, result is persisted to disk and the model receives a preview path.
  - name: requiresUserInteraction
    type: bool
    required: false
    notes: claude-code requiresUserInteraction — must run on the main thread (e.g. AskUserQuestion).
  - name: requiresPermissionGate
    type: bool
    required: false
    notes: claude-code requireCanUseTool — every invocation runs through canUseTool even if hooks auto-approve.
  - name: parentDispatchPattern
    type: enum<parallel-reads-serial-writes,strict-serial,fan-out,sandbox>
    required: false
    notes: How a parent dispatch loop treats this tool relative to peers — typically parallel-reads-serial-writes.
  incomingEdges:
  - has_dispatch_policy
  outgoingEdges:
  - dispatch_policy_for_tool
  invariants:
  - id starts with tool-dispatch-policy:
  examples:
  - graph/extensions/tool-dispatch-policies/claude-code-file-read.yaml
  - graph/extensions/tool-dispatch-policies/claude-code-file-edit.yaml
  - graph/extensions/tool-dispatch-policies/claude-code-bash.yaml
