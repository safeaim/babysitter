- id: node:github-action-step
  name: GithubActionStep
  origin: a5c
  originContext: |
    Catalog pass 95 — the seven steps in `packages/triggers-mux/action.yml` (composite GitHub
    Action) carry per-step name, shell, run-script, conditional `if:`, env-var
    bag, and ordering. The existing `WorkflowDefinition` NodeKind models
    repo-versioned WORKFLOW.md (Symphony §5 issue-tracker binding) — an
    ontology-distinct surface from a CI composite-action step. Tight new
    NodeKind so codegen can re-emit `runs:.steps[]` block from the graph.
  prefix: github-action-step
  cluster: 4-surfacing-path
  purpose: |
    a single ordered step inside a composite GitHub Action's `runs.steps`
    list, with name, shell, run-script, conditional, env-var bag, and
    `uses:` reference for prebuilt actions.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: order
    type: int
    required: true
    notes: 1-based step ordinal in the composite-action `runs.steps[]` list.
  - name: stepName
    type: string
    required: true
    notes: Verbatim `name:` field from action.yml.
  - name: shell
    type: enum<bash,pwsh,sh,python,node,none>
    required: false
    notes: Verbatim `shell:` field. `none` when the step is a `uses:` invocation.
  - name: usesRef
    type: string
    required: false
    notes: When the step delegates to a prebuilt action, the `uses:` reference (e.g. `actions/setup-node@v4`).
  - name: runScript
    type: markdown
    required: false
    notes: Verbatim `run:` block (multi-line bash/pwsh/etc. body).
  - name: conditional
    type: string
    required: false
    notes: Verbatim `if:` expression.
  - name: envVars
    type: list<string>
    required: false
    notes: |
      `<NAME>=<source-expression>` strings copied verbatim from the step's
      `env:` block. Source-expression preserves the GitHub-Actions template
      (e.g. `${{ inputs.harness }}`) so the codegen can emit the exact YAML.
  - name: continueOnError
    type: bool
    required: false
  - name: workingDirectory
    type: string
    required: false
  - name: stepId
    type: string
    required: false
    notes: The `id:` field on the step (used by downstream `${{ steps.<id>.outputs.* }}` references).
  - name: sourceCitation
    type: string
    required: false
  ontologyRationale: |
    A composite GitHub Action step is a tight, ordered, scriptable surface with
    a fixed schema (name/uses/run/shell/env/if/id/working-directory/continue-on-error).
    Modeling each step as a record lets codegen reconstruct the
    `runs.steps[]` block byte-for-byte from the graph; demoting to a
    string list discards the per-step env bag and conditional. Distinct
    from `WorkflowDefinition` (WORKFLOW.md) and `WorkflowStep` (none exists).
  incomingEdges:
  - executes_step
  outgoingEdges:
  - executed_by_trigger
  invariants:
  - id starts with github-action-step:
  examples: []
- id: node:grammar
  name: Grammar
  origin: a5c
  originContext: |
    Catalog pass 95 — the trigger query DSL implemented by
    `packages/triggers-mux/src/query.ts` has a small but real production-rule
    grammar (compact-key-value, JSON-object, expression-clause, glob,
    contains-operator, equals-operator). For codegen of a parser the
    productions need to be enumerated rather than collapsed into a
    single `queryDsl` enum tag. Cross-cutting NodeKind: any DSL-parser
    rebuild (not just amux-triggers) can reuse this shape.
  prefix: grammar
  cluster: 13-catalog-meta
  purpose: |
    a record of a domain-specific-language grammar with productions,
    supported operators, lexical tokens, and surface syntax variants.
    Sized so a parser can be regenerated from the graph alone.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: dslName
    type: string
    required: true
  - name: surfaceVariants
    type: list<string>
    required: false
    notes: Compact representations the parser auto-detects (e.g. `compact-key-value`, `json-object`, `expression-clause`).
  - name: productions
    type: list<string>
    required: true
    notes: |
      Each entry is a single grammar production, normally in BNF-ish
      `<lhs> ::= <rhs>` form, copied verbatim from the parser source so
      the codegen can re-emit the parser. Order is significant for
      precedence.
  - name: tokens
    type: list<string>
    required: false
    notes: Lexical tokens / terminals (e.g. `IDENT`, `STRING`, `COLON`, `AMP_AMP`, `TILDE`, `EQ_EQ`).
  - name: operators
    type: list<string>
    required: false
    notes: "Operator literals with arity hint (e.g. `~ : binary contains`, `== : binary equals`, `&& : binary clause-and`)."
  - name: globSyntax
    type: string
    required: false
    notes: Path-glob micro-language (e.g. `**=any`, `*=non-slash`, `?=single`).
  - name: parserEntrypoint
    type: string
    required: false
    notes: Function name + file path implementing the parser (e.g. `parseQuery (packages/triggers-mux/src/query.ts:75)`).
  - name: sourceCitation
    type: string
    required: false
  ontologyRationale: |
    DSL grammars are first-class codegen artifacts: a string-typed
    `queryDsl` attribute on OperationalTrigger only categorizes; it
    cannot drive parser regeneration. A tight Grammar NodeKind keeps
    productions as ordered list and is reusable by any future
    DSL-bearing trigger / tool / config surface.
  incomingEdges:
  - parsed_by_grammar
  outgoingEdges: []
  invariants:
  - id starts with grammar:
  - productions non-empty
  examples: []
