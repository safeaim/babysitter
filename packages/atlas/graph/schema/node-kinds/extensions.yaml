    required: true
    notes: |
      Catalog pass 18 introduced the operator-issued lifecycle set. Catalog pass 94
      (Catalog pass 94) extended the enum to cover `webhook-event` and `vcs-event` — the
      VCS / generic-webhook normalization triggers exposed by
      `@a5c-ai/triggers-mux` (packages/triggers-mux/src/types.ts:1, TriggerBackend
      union: github | gitlab | bitbucket | generic-webhook).
  - name: effect
    type: string
    required: false
    notes: Human-readable description of what firing the trigger does.
  - name: idempotent
    type: bool
    required: false
  - name: sideEffects
    type: list<string>
    required: false
  - name: invokerSurface
    type: enum<api-endpoint,signal,cron,hook,webhook,vcs-event>
    required: false
    notes: |
      `webhook` and `vcs-event` added Catalog pass 94 to capture the
      `@a5c-ai/triggers-mux` invocation surfaces (HTTP webhook payload arriving
      via GitHub Actions / generic webhook receiver, normalized into a
      single event shape).
  - name: backend
    type: enum<github,gitlab,bitbucket,generic-webhook>
    required: false
    notes: |
      Catalog pass 94 — TriggerBackend union from packages/triggers-mux/src/types.ts:1.
      Identifies which VCS / webhook payload taxonomy this trigger
      normalizes against.
  - name: eventTaxonomy
    type: list<string>
    required: false
    notes: |
      Catalog pass 94 — illustrative list of canonical `eventName` values the
      backend is known to handle (e.g. `issue_comment`, `pull_request`,
      `push`, `merge_request`, `pullrequest:created`). Open-ended; the
      normalizer accepts arbitrary strings via env / payload fallback
      (packages/triggers-mux/src/enrich.ts:99).
  - name: dispatchModel
    type: enum<normalize-and-evaluate,direct-cli,reusable-action>
    required: false
    notes: |
      Catalog pass 94 — captures how the trigger is fired:
      `normalize-and-evaluate` (CLI: enrich → evaluate → exit-code 0 or 78,
      packages/triggers-mux/src/cli.ts:50), `direct-cli` (manual amux-triggers
      invocation), `reusable-action` (GitHub Action composite at
      packages/triggers-mux/action.yml).
  - name: payloadShape
    type: string
    required: false
    notes: |
      Catalog pass 94 — TypeScript interface name in
      packages/triggers-mux/src/types.ts that defines the normalized payload
      this trigger emits. Always `NormalizedTriggerEvent` for the four
      backend triggers (types.ts:11).
  - name: queryDsl
    type: enum<key-colon-value,json-object,expression-clause,none>
    required: false
    notes: |
      Catalog pass 94 — the trigger query DSL accepted by
      `parseQuery` (packages/triggers-mux/src/query.ts:75). `key-colon-value`
      = `event:issue_comment text:@develop-this`; `json-object` = JSON
      `TriggerQuery`; `expression-clause` = `text ~ '@x' && event == 'pull_request'`.
  - name: cliEntrypoint
    type: string
    required: false
    notes: |
      Catalog pass 94 — bin entry that fires the trigger
      (packages/triggers-mux/package.json:28 — `amux-triggers` →
      `./dist/cli.js`).
  - name: enrichmentSources
    type: list<enum<workflow-event-payload,github-rest-api,local-git-show,git-diff-unified>>
    required: false
    notes: |
      Catalog pass 94 — channels the enricher draws from
      (packages/triggers-mux/src/enrich.ts: readPayload, enrichGithubFromApi,
      enrichWithLocalGit, enrichDiffsWithLocalGit).
  - name: sourceCitation
    type: string
    required: false
    notes: |
      Catalog pass 94 — verbatim file:line citation into
      `packages/triggers-mux/` for traceability of every value above.
  - name: exitCodeSemantics
    type: list<string>
    required: false
    notes: |
      Catalog pass 95 — `<code>:<symbol>:<meaning>` triples for the trigger's
      process-exit contract. For amux-triggers (packages/triggers-mux/src/cli.ts:65):
      `0:matched:trigger query matched, downstream pipeline runs`,
      `78:skip:trigger query did not match (action.yml:165 treats 78 as soft-skip)`,
      `1:error:invalid args / unhandled exception`.
