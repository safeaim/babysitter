- id: node:env-var
  name: EnvVar
  origin: universal
  originContext: |
    catalog pass 83 / Anthropic docs https://code.claude.com/docs/en/env-vars — Claude Code
    documents ~110 environment variables across 25 functional categories (auth,
    model selection, headers, thinking, output, network/timeout, TLS, shell, memory,
    file ops, git, plugins, background tasks, interactive, UI, IDE, remote/cloud,
    Bedrock/Vertex/Foundry, telemetry, debug, prompt, subagents, SDK, tmux, etc.).
  prefix: env-var
  cluster: 7-extensions
  purpose: |
    A named environment variable that affects an AgentRuntimeImpl's behavior.
    Distinct ontology category because env-vars carry default values, parse semantics
    (bool/int/path/enum), category groupings, and feature-gating gates — modeling
    them as freeform attributes on AgentRuntimeImpl loses the cross-cutting structure.
    The 110+ Claude Code env-vars are systematically queryable via this NodeKind.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: name
    type: string
    required: true
    notes: The literal env-var name (e.g. `ANTHROPIC_API_KEY`, `CLAUDE_CODE_USE_BEDROCK`).
  - name: category
    type: enum<auth,model-selection,headers,thinking,output,network-timeout,tls,shell,memory,file-ops,git,plugins,background-tasks,interactive,ui,ide,remote-cloud,bedrock,vertex,foundry,telemetry,debug,prompt,subagents,sdk,tmux,other>
    required: true
  - name: valueType
    type: enum<bool,int,string,path,url,enum,json>
    required: false
  - name: defaultValue
    type: string
    required: false
  - name: featureGate
    type: bool
    required: false
    notes: True when the variable acts as an experimental/beta gate (e.g. `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1`).
  - name: introducedInVersion
    type: string
    required: false
  ontologyRationale: ~110 documented env-vars with structured categories, defaults, and feature-gate semantics warrant first-class modeling rather than a freeform string list on AgentRuntimeImpl. Lets the catalog answer "which env-vars gate which capabilities?" and "which Bedrock/Vertex configuration knobs exist?" via standard graph queries.
  incomingEdges:
  - has_env_var
  outgoingEdges:
  - affects
  - sourced_from
  invariants:
  - id starts with env-var:
  examples: []
- id: node:protocol-message
  name: ProtocolMessage
  origin: derived
  originContext: |
    catalog pass 86 — promoted from catalog pass 85 flat-list attributes `messageTypesEmitted` and
    `resultMessageSubtypes` on AgentCoreImpl. The Claude Code agent-loop SDK
    documents a 5-variant SDKMessage union (System/Assistant/User/StreamEvent/
    Result) with ResultMessage further subtyped into 5 outcomes
    (success / error_max_turns / error_max_budget_usd / error_during_execution /
    error_max_structured_output_retries). Promoting to a NodeKind captures
    direction, terminality, error-category, and per-message payload schema in
    addition to the bare type name.
  prefix: protocol-message
  cluster: 7-extensions
  purpose: |
    A typed message variant exchanged between an agent core and its host (or
    between core/runtime/user). Carries direction, terminality, and (for
    terminal error variants) error-category metadata.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: messageType
    type: enum<SystemMessage,AssistantMessage,UserMessage,StreamEvent,ResultMessage,Content,Part,Candidate,GenerateContentResponse>
    required: true
    notes: |
      Current catalog includes Gemini generateContent envelope types`r`n      (Content, Part, Candidate, GenerateContentResponse) plus vendor`r`n      stream/message variants used by Cohere, Mistral, and Ollama provider`r`n      records. Provider-level protocol taxonomies can be modeled directly`r`n      through emits_message_type edges even when no full AgentCoreImpl exists.
  - name: subtype
    type: enum<success,error_max_turns,error_max_budget_usd,error_during_execution,error_max_structured_output_retries,none,text,inlineData,functionCall,functionResponse,fileData,executableCode,codeExecutionResult>
    required: false
    notes: |
      Only populated for ResultMessage variants and Gemini Part variants;
      `none` for non-Result / non-Part types. Current catalog includes Gemini Part
      kinds (text / inlineData / functionCall / functionResponse /
      fileData / executableCode / codeExecutionResult).
  - name: direction
    type: enum<runtime-to-core,core-to-runtime,core-to-user,user-to-core>
    required: false
  - name: terminal
    type: bool
    required: false
    notes: True for ResultMessage variants — closes the loop iteration.
  - name: errorCategory
    type: enum<budget,turns,execution,structured-output,none>
    required: false
  - name: payloadSchema
    type: object
    required: false
    notes: Free-form per-doc payload sketch.
  - name: description
    type: markdown
    required: false
  ontologyRationale: |
    Cross-cutting concept — message taxonomy is shared across all SDK loops
    (Claude Code core, Claude Agent SDK core, future SDK loops). Promoting
    captures direction/terminal/error-category structure that a flat string
    list cannot express.
  incomingEdges:
  - emits_message_type
  outgoingEdges: []
  invariants:
  - id starts with protocol-message:
  - terminal=true implies messageType=ResultMessage
  examples: []
- id: node:effort-level
  name: EffortLevel
  origin: derived
  originContext: |
    catalog pass 86 — promoted from catalog pass 85 `effortLevelsSupported` flat list on
    AgentCoreImpl. Effort levels (low/medium/high/xhigh/max) are a cross-cutting
    knob exposed by the agent loop and gated per ModelVersion (e.g. only some
    model versions accept `xhigh`). Skill frontmatter `effort` field also
    references this taxonomy. Promoting to NodeKind enables 2-D Model x Effort
    queries.
  prefix: effort-level
  cluster: 7-extensions
  purpose: |
    A reasoning-effort tier the core can request from the model. Cross-cuts
    AgentCoreImpl (which understands all levels), ModelVersion (which exposes
    a subset), and Skill (whose frontmatter may pin a level).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: name
    type: enum<low,medium,high,xhigh,max,minimal>
    required: true
    notes: "catalog pass 87 added `minimal` for OpenAI gpt-5 / Codex `reasoning_effort: minimal` tier (docs.openai.com Responses API)."
  - name: relativeReasoningCost
    type: int
    required: false
    notes: Ordinal cost rank — 1 (low) … 5 (max).
  - name: description
    type: markdown
    required: false
  ontologyRationale: |
    Per-model availability is genuinely 2-D (Model x Effort) — a flat list on
    a single layer cannot express the cross-product. EffortLevel as a NodeKind
    lets ModelVersion, AgentCoreImpl, and Skill all reference the same canonical
    levels via edges.
  incomingEdges:
  - supports_effort_level
  outgoingEdges: []
  invariants:
  - id starts with effort-level:
  examples: []
- id: node:frontmatter-field
  name: FrontmatterField
  origin: derived
  originContext: |
    catalog pass 86 — promoted from catalog pass 85 `skillFrontmatterFieldsSupported` flat list on
    AgentPlatformImpl. Skill (and Subagent) frontmatter fields each carry
    valueType, required-status, defaultValue, and applicability semantics that
    a string list discards. Promoting lets the catalog query "which platforms
    support `paths` glob frontmatter?" or "which fields are required vs
    recommended?".
  prefix: frontmatter-field
  cluster: 7-extensions
  purpose: |
    A YAML-frontmatter field a platform's Skill / Subagent loader recognizes,
    with type, required-status, default, and applicability metadata.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: name
    type: string
    required: true
    notes: The frontmatter key (e.g. `description`, `model`, `paths`).
  - name: valueType
    type: enum<string,bool,enum,list,object,glob,int>
    required: true
  - name: required
    type: enum<yes,no,recommended>
    required: false
  - name: defaultValue
    type: string
    required: false
  - name: appliesTo
    type: enum<skill,subagent,plugin,github-action-input,github-action-output,cursor-rule,task-schema>
    required: true
    notes: |
      Catalog pass 95 widened to include `github-action-input` /
      `github-action-output` so composite GitHub Action `action.yml` inputs
      and outputs (which carry the same valueType / required / default /
      description metadata payload as skill frontmatter) can be modeled
      as FrontmatterField rather than as opaque string attributes on the
      OperationalTrigger record. Source: packages/triggers-mux/action.yml
      (16 inputs + 3 outputs).
      catalog pass 99 widened further to include `cursor-rule` (for `.mdc`
      Cursor rule frontmatter — `description` / `globs` / `alwaysApply`)
      and `task-schema` (for babysitter `defineTask` programmatic task-
      definition fields, ontologically the same per-field metadata
      payload — name/type/required/default/description — as markdown
      frontmatter even though the carrier is a TS object literal).
  - name: description
    type: markdown
    required: false
  ontologyRationale: |
    Frontmatter fields are a structured schema in their own right (~15 Skill +
    ~5 Subagent fields per the Claude Code docs). A string list discards
    valueType / required / default / appliesTo. NodeKind promotion is justified
    by the per-field metadata payload.
  incomingEdges:
  - defines_frontmatter_field
  - frontmatter_field_defined_by
  outgoingEdges:
  - frontmatter_field_defined_by
  invariants:
  - id starts with frontmatter-field:
  examples: []
