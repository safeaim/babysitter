# NodeKinds for cluster 7-extensions.
# Loaded by tools/validator/validate.py via the manifest in ../ontology-schema.yaml.
# DO NOT add backward-compat shims — catalog pass 37 policy.

nodeKinds:
- id: node:plugin
  name: Plugin
  origin: universal
  prefix: plugin
  cluster: 7-extensions
  purpose: universal plugin (union of skills/MCP/hooks/lsp/monitors/bin)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: manifestPath
    type: string
    required: false
  - name: provenance
    type: enum<built-in,custom,mixed>
    required: false
    default: custom
    notes: Generalized from Subagent.provenance (remodel 2026-04-29). built-in = vendor-shipped plugin; custom = user-installed; mixed = vendor ships defaults the user can override.
  - name: version
    type: semver
    required: false
    notes: Current canonical version of this Plugin (remodel 2026-04-29 — change B). Single-version-at-a-time pattern; see ../schema/meta-schema.md §Version-tracking pattern.
  - name: releasedAt
    type: iso-date
    required: false
    notes: Release date of the current version.
  - name: supersededBy
    type: ref<Plugin>
    required: false
    notes: When this Plugin has been deprecated in favor of another Plugin entity, point to the replacement.
  - name: homepageUrl
    type: url
    required: false
  - name: installFormats
    type: list<string>
    required: false
  - name: vendor
    type: string
    required: false
  - name: nativeFormat
    type: enum<claude-plugin,cursor-extension,codex-extension,gemini-extension,opencode-acp,gh-copilot-plugin,omp-plugin,openclaw-plugin,pi-plugin,a5c-plugin,babysitter-plugin,none>
    required: false
    notes: 'Host-specific plugin format this Plugin builds for. Mirrors AgentPlatformImpl.nativeExtensionFormat. Only set when portability=native or hybrid (catalog pass 21 hygiene 2026-05-01: collapsed NativeExtension NodeKind into this enum).'
  - name: portability
    type: enum<portable,native,hybrid>
    required: false
    notes: 'How this Plugin is delivered. `portable` = single source compiled to many products via extension-mux; `native` = built directly for one host''s plugin format; `hybrid` = ships portable source plus pre-compiled native artifacts (catalog pass 21 hygiene 2026-05-01: collapsed PortableExtension NodeKind into this enum).'
  incomingEdges: []
  outgoingEdges:
  - installs_into
  - contains_skill
  - contains_subagent
  - contains_tool_server
  - contains_tool_descriptor
  - contains_lsp_server
  - contains_monitor
  - contains_bin
  - ships_settings
  - applies_to
  - requires_capability
  - implements
  - sourced_from
  - compiles_to
  invariants:
  - every installs_into edge declares installMethod (V-11.1)
  - portability=native or hybrid implies nativeFormat is set
  examples: []
- id: node:lsp-server
  name: LSPServer
  origin: universal
  originContext: Anthropic Claude Code plugin reference
  prefix: lsp-server
  cluster: 7-extensions
  purpose: a Language Server Protocol server bundled in a plugin (Claude Code .lsp.json)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: manifestPath
    type: string
    required: true
  - name: command
    type: string
    required: true
  - name: args
    type: list<string>
    required: false
  - name: languages
    type: list<ref<Language>>
    required: true
  - name: frameworks
    type: list<ref<Framework>>
    required: false
  - name: transport
    type: enum<stdio,tcp,websocket,ipc>
    required: true
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - contains_lsp_server
  outgoingEdges:
