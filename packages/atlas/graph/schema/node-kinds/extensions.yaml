- id: node:journal-event
  name: JournalEvent
  origin: derived
  originContext: |
    Promoted from orchestration-event modeling gaps into a dedicated JournalEvent NodeKind.
    Babysitter SDK runtime↔harness journal events (RUN_CREATED/COMPLETED/FAILED,
    EFFECT_REQUESTED/RESOLVED/CANCELLED/PROGRESS, COST_TRACKED, STOP_HOOK_INVOKED,
    COMPRESSION_APPLIED) are orchestration-layer events distinct from
    `ProtocolMessage` (which is core↔model). Cited from
    packages/sdk/src/runtime/replay/effectIndex.ts:13 (the SupportedEventType
    union) and packages/sdk/src/storage/types.ts (JournalEvent shape).
  prefix: journal-event
  cluster: 7-extensions
  purpose: |
    A typed orchestration-level event recorded on the run journal between an
    agent runtime and its harness. Distinct from ProtocolMessage (LLM
    core↔model boundary): JournalEvents cross the runtime↔platform boundary,
    are append-only, sequenced, and include terminal lifecycle events
    (RUN_COMPLETED / RUN_FAILED).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: eventName
    type: string
    required: true
    notes: Canonical event-type string as it appears on the journal (e.g. RUN_CREATED, EFFECT_REQUESTED).
  - name: kind
    type: enum<request,response,state-change,error,breakpoint,completion>
    required: true
  - name: direction
    type: enum<runtime-to-platform,platform-to-runtime,internal>
    required: true
  - name: payloadSchema
    type: object
    required: false
    notes: Free-form per-doc payload sketch.
  - name: terminal
    type: bool
    required: false
    notes: True for RUN_COMPLETED / RUN_FAILED — closes the run journal.
  - name: triggerCondition
    type: string
    required: false
  - name: sourceCitation
    type: string
    required: false
    notes: babysitter SDK file path or doc reference grounding the event.
  - name: description
    type: markdown
    required: false
  ontologyRationale: |
    Cross-cutting orchestration-layer concept. Distinct from ProtocolMessage
    (core↔model) by direction semantics, lifecycle (terminal completion
    events), and boundary (runtime↔platform). catalog pass 89 schema-author decision
    against widening ProtocolMessage enum: the two NodeKinds answer different
    queries (debugger replay vs LLM transport).
  incomingEdges:
  - emits_journal_event
  outgoingEdges: []
  invariants:
  - id starts with journal-event:
  - terminal=true implies kind=completion or kind=error
  examples: []



