- id: node:tool-descriptor
  name: ToolDescriptor
  origin: universal
  prefix: tool-descriptor
  clusters:
  - 7-extensions
  - 5-communication-primitives
  purpose: a callable tool with schema
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: schema
    type: code
    required: true
    annotations:
    - json-schema
  - name: category
    type: string
    required: false
  - name: description
    type: markdown
    required: false
  - name: inputSchema
    type: any
    required: false
  - name: mode
    type: string
    required: false
  - name: outputSchema
    type: any
    required: false
  - name: streamable
    type: bool
    required: false
  - name: timeoutMs
    type: int
    required: false
  - name: vendor
    type: string
    required: false
  - name: callShape
    type: enum<openai-function,anthropic-tool-use,gemini-function-call,json-action,react-action,code-action>
    required: false
    notes: Tool-call shape advertised by this descriptor (D-bonus.toolCallShape, planner 2026-05-01). Captures function-call / tool-use shape variation across vendors.
  - name: requiresPermissionGate
    type: bool
    required: false
    notes: catalog pass 53 / claude-code CanUseToolFn — if true, each invocation runs through a permission hook before execution.
  - name: supportsCancellation
    type: bool
    required: false
    notes: catalog pass 53 — true if the tool honors AbortSignal mid-call (claude-code createAbortController / ToolUseContext.abortController).
  - name: abortPropagation
    type: enum<immediate,cooperative,delayed,none>
    required: false
    notes: catalog pass 53 — how the tool propagates abort to subprocesses or remote calls. immediate=signal honored synchronously; cooperative=checks at safe points; delayed=runs to completion then drops result; none=no abort support.
  - name: errorBehavior
    type: enum<retryable,fatal,user-handled,returns-tool-error>
    required: false
    notes: catalog pass 53 — distinguishes a thrown error (retryable/fatal) from a structured tool_error result the model is expected to handle (returns-tool-error, e.g. claude-code BashTool stderr).
  - name: isSynthetic
    type: bool
    required: false
    notes: catalog pass 53 / claude-code SYNTHETIC_OUTPUT_TOOL_NAME — synthetic tools are inserted by the runtime to wrap untoolable model output (e.g. structured final-output tool); they are not invoked by the model directly.
  incomingEdges:
  - invoking_tool
  - dispatched_via_tool
  - contains_tool_descriptor
  outgoingEdges:
  - requires_capability
  - assesses_policy
  - triggers_child_session
  - dispatches_subagent
  - tool_descriptor_contained_in_plugin
  invariants: []
  examples: []
