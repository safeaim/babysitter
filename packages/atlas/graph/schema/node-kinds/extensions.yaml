- id: node:agent-team
  name: AgentTeam
  origin: universal
  originContext: |
    catalog pass 82 / Anthropic docs https://docs.claude.com/en/docs/claude-code/agent-teams
    (experimental — flag CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1, requires
    Claude Code v2.1.32+). A team groups one team-lead session with N
    teammate Claude Code instances that coordinate via shared task list +
    mailbox.
  prefix: agent-team
  cluster: 7-extensions
  purpose: |
    A coordinated group of Claude Code instances — one team-lead (the main
    session) and N teammates running as separate CC processes — sharing
    a task list and mailbox. Distinct from Subagent (a per-session
    dispatchable worker); a team persists across multiple turns and exposes
    direct teammate-to-teammate messaging via the SendMessage tool.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: displayMode
    type: enum<in-process,tmux,auto>
    required: false
    notes: How teammate sessions are surfaced to the lead. in-process = Shift+Down cycles; tmux = split panes; auto = pick by environment.
  - name: experimental
    type: bool
    required: false
    default: true
  - name: storageLocation
    type: string
    required: false
    notes: Filesystem path template for team config + tasks (e.g. ~/.claude/teams/{team-name}/config.json).
  - name: requiresVersion
    type: string
    required: false
    notes: Minimum Claude Code version required (e.g. '>=2.1.32').
  - name: members
    type: list<string>
    required: false
    notes: Subagent ids that act as teammates in this team (free-form for now; member_of_team edges are authoritative).
  incomingEdges:
  - has_team
  - team_of
  outgoingEdges:
  - has_member
  - requires_capability
  - sourced_from
  invariants:
  - id starts with agent-team:
  ontologyRationale: An AgentTeam is a multi-process orchestration unit with persistent shared state (task list + mailbox) across many sessions — structurally distinct from a single dispatchable Subagent. Where a Subagent is invoked once per dispatch (transient), a team persists across turns and exposes peer-to-peer messaging via SendMessage. Could not be modeled as a SessionModel attribute (session models describe per-session persistence, not multi-session coordination). catalog pass 83 keeps the NodeKind on these grounds.
  examples: []
- id: node:plugin-marketplace
