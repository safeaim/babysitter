- id: node:skill
  name: Skill
  origin: universal
  prefix: skill
  cluster: 7-extensions
  purpose: |
    Directory-of-markdown content shape — a procedural workflow described in
    SKILL.md plus optional supporting files. Distinct from `Subagent` (which
    is a dispatchable worker). A Skill is the "how to do X" markdown content;
    a Subagent that loads/uses a Skill is the "who runs that workflow"
    entity. The same workflow can be packaged as a Skill that's loaded by
    multiple Subagents.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: kind
    type: enum<anthropic-api-skill,claude-code-skill,portable-skill>
    required: false
  - name: invocationMode
    type: enum<model-invoked,user-invoked,both>
    required: false
  - name: disableModelInvocation
    type: bool
    required: false
  - name: entrypoint
    type: string
    required: false
  - name: argumentsToken
    type: string
    required: false
  - name: provenance
    type: enum<built-in,custom,mixed>
    required: false
    default: custom
    notes: Generalized from Subagent.provenance (remodel 2026-04-29). built-in = vendor-shipped (e.g. Claude Code's bundled `init`/`compact` skills). custom = user-installed. mixed = vendor ships defaults the user can override.
  - name: version
    type: semver
    required: false
    notes: Current canonical version of this Skill (remodel 2026-04-29 — change B). Single-version-at-a-time pattern; see ../schema/meta-schema.md §Version-tracking pattern.
  - name: releasedAt
    type: iso-date
    required: false
    notes: Release date of the current version.
  - name: supersededBy
    type: ref<Skill>
    required: false
    notes: When this Skill has been deprecated in favor of another Skill, point to the replacement.
  - name: domains
    type: any
    required: false
  - name: keyword
    type: any
    required: false
  - name: requiresFrameworks
    type: list<id>
    required: false
  - name: requiresLanguages
    type: list<id>
    required: false
  - name: roles
    type: list<id>
    required: false
  - name: sourceRef
    type: ref<SourceRef>
    required: false
  - name: frontmatterFields
    type: list<string>
    required: false
    notes: catalog pass 83 — recognized SKILL.md YAML frontmatter keys (when_to_use, argument-hint, arguments, disable-model-invocation, user-invocable, allowed-tools, model, effort, context, agent, hooks, paths, shell).
  - name: argumentsMode
    type: enum<positional,named,$ARGUMENTS-substitution,none>
    required: false
    notes: catalog pass 83 — how command-style skills accept arguments. $ARGUMENTS-substitution means the entire arg blob is interpolated as `$ARGUMENTS`; positional means `$1`, `$2`, ... interpolation.
  - name: substitutionVariables
    type: list<string>
    required: false
    notes: catalog pass 83 — string-substitution placeholders supported in the SKILL.md body (e.g. `$ARGUMENTS`, `$1`, `$2`, `${CLAUDE_PROJECT_DIR}`).
  - name: dynamicContextSyntax
    type: list<string>
    required: false
    notes: catalog pass 83 — dynamic-context-injection syntax patterns ("!`<cmd>`" for inline shell, "```!" fenced block).
  - name: shellExecutionPolicy
    type: enum<allow,deny,allowlist,prompt>
    required: false
    notes: catalog pass 83 — policy governing skill-embedded shell snippets (skills docs `shell:` frontmatter).
  - name: allowedTools
    type: list<string>
    required: false
    notes: catalog pass 83 — `allowed-tools:` frontmatter, restricting which tools the skill may use.
  - name: pathsGlob
    type: list<string>
    required: false
    notes: catalog pass 83 — `paths:` frontmatter glob list scoping the skill to specific repo paths.
  - name: model
    type: string
    required: false
    notes: catalog pass 83 — optional `model:` frontmatter override (e.g. claude-sonnet-4.7).
  - name: effort
    type: enum<low,medium,high>
    required: false
    notes: catalog pass 83 — `effort:` frontmatter governing model thinking budget.
  - name: argumentHint
    type: string
    required: false
    notes: catalog pass 83 — `argument-hint:` frontmatter — human-readable usage hint shown in slash-command UI.
  - name: scopePrecedence
    type: enum<project-over-user,user-over-project,plugin-over-both>
    required: false
    notes: catalog pass 83 — Claude Code skill resolution precedence (project-level overrides user-level by default).
  incomingEdges:
  - contains_skill
  - requires_skill
  - runs_skill
  outgoingEdges:
  - requires_capability
  - applies_to
  - implements
  - sourced_from
  - uses_template
  - executed_in_child_session
  - skill_contained_in_plugin
  invariants: []
  examples: []
- id: node:subagent
  name: Subagent
  origin: universal
  originDate: 2025-09-01
  originContext: Anthropic Claude Code Subagents docs
  prefix: subagent
  clusters:
  - 7-extensions
  - 3-agent-stack
  purpose: 'A specialized worker / persona that an agent runtime can dispatch alongside

    its primary loop. Canonical term follows Anthropic Claude Code ("subagent",

    one word; docs.anthropic.com/en/docs/claude-code/sub-agents). The same

    NodeKind covers two provenance variants — vendor-shipped built-ins (Claude

    Code''s general-purpose / Explore / Plan; OpenAI built-in handoff patterns)

    and user-installable custom definitions (Claude Code `.claude/agents/<name>.md`,

    parallel to a Skill''s SKILL.md). Distinguished via the `provenance`

    attribute. The dispatch *mechanism* a runtime uses to invoke a subagent is

    recorded on `AgentRuntimeImpl.subagentDispatchMechanism` (task-tool /

    handoff / sub_agents-array / agent-as-tool / none); the *definition format*

    a platform loads custom subagents from is recorded on

    `AgentPlatformImpl.subagentDefinitionFormat`.

    A Subagent is a DISPATCHABLE WORKER (an entity invoked via a runtime''s
    dispatch mechanism). Distinct from `Skill`, which is a PROCEDURAL ARTIFACT
    (directory-of-markdown that describes a workflow). A Subagent CAN RUN a
    Skill in a ChildSession — see `runs_skill` edge.

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: dispatchPattern
    type: enum<task-tool,handoff,sub-agents-array,agent-as-tool,slash-command,subprocess-task,custom>
    required: false
    notes: |
      The dispatch pattern this specific subagent uses (per-subagent override of
      the AgentRuntimeImpl.subagentDispatchMechanism default). Most subagents
      inherit the runtime's default; explicit value here only when the subagent
      uses a different mechanism (e.g. claude-code's general-purpose uses
      `task-tool`, while a slash-command-invoked persona might use
      `slash-command`).
  - name: provenance
    type: enum<built-in,custom,mixed>
    required: true
    default: custom
    notes: 'built-in = vendor-shipped (e.g. Claude Code''s bundled general-purpose / Explore / Plan; OpenAI built-in handoff patterns). custom = user-installable definition (e.g. Claude Code `.claude/agents/<name>.md`, parallel to a Skill''s SKILL.md). mixed = vendor ships defaults that the user can override. Phase-2 backfill will add evidence: vendor-doc-or-better when provenance != custom.'
  - name: subjectId
    type: id
    required: false
    notes: 'When provenance=built-in: ref<AgentVersion> | ref<AgentProduct> the subagent ships with. When provenance=custom: typically unset (defined by a user in their project/user dir).'
  - name: version
    type: semver
    required: false
    notes: Current canonical version of this Subagent (remodel 2026-04-29 — change B). Single-version-at-a-time pattern; see ../schema/meta-schema.md §Version-tracking pattern.
  - name: releasedAt
    type: iso-date
    required: false
    notes: Release date of the current version.
  - name: supersededBy
    type: ref<Subagent>
    required: false
    notes: When this Subagent has been deprecated in favor of another Subagent, point to the replacement.
  - name: disallowedTools
    type: list<string>
    required: false
  - name: roleId
    type: id
    required: false
  - name: systemPrompt
    type: markdown
    required: false
  - name: tools
    type: list<string>
    required: false
  - name: triggers
    type: any
    required: false
  - name: agentType
    type: enum<general-purpose,explore,plan,custom>
    required: false
    notes: catalog pass 83 — Claude Code distinguishes built-in Explore/Plan/general-purpose subagents from custom ones (sub-agents docs).
  - name: dispatchTool
    type: enum<Task,task-create,send-message,custom>
    required: false
    notes: catalog pass 83 — the specific tool that invokes this subagent (Task for canonical subagents, task-create for CC interactive task list, send-message for agent-team teammates).
  - name: contextIsolation
    type: enum<isolated,shared,inherits-parent>
    required: false
    notes: catalog pass 83 — sub-agents docs note that subagents run with isolated context windows by default; some delegated patterns share or inherit.
  - name: parallelExecutable
    type: bool
    required: false
    notes: catalog pass 83 — whether multiple instances can run concurrently from the same dispatch (ClaudeCode general-purpose supports parallel Task calls).
  - name: returnValueShape
    type: enum<text,structured,tool-result-list,none>
    required: false
    notes: catalog pass 83 — subagent return-value semantics; Claude Code subagents return a final text message back to the parent.
  - name: frontmatterFields
    type: list<string>
    required: false
    notes: catalog pass 83 — for custom subagents loaded from `.claude/agents/<name>.md`, the recognized YAML frontmatter keys (e.g. name, description, tools, model, color).
  - name: toolAllowlist
    type: list<string>
    required: false
    notes: catalog pass 83 — explicit tool allowlist (frontmatter `tools:`) restricting which tools this subagent may invoke. Distinct from `disallowedTools` (denylist).
  - name: preloadedSkills
    type: list<string>
    required: false
    notes: catalog pass 83 — Skill ids preloaded into this subagent's context on dispatch.
  - name: teammateRole
    type: enum<lead,member,solo>
    required: false
    notes: "catalog pass 83 — when this subagent participates in an AgentTeam: lead drives the shared task list, member is a teammate worker, solo means not team-affiliated."
  - name: teamMemberStorage
    type: string
    required: false
    notes: catalog pass 83 — filesystem path template for team-member working state (e.g. `~/.claude/teams/{team}/members/{name}/`).
  - name: planApprovalRequired
    type: bool
    required: false
    notes: catalog pass 83 — whether risky teammate actions require lead-approval gating (agent-teams docs).
  incomingEdges:
  - contains_subagent
  - dispatches_subagent
  outgoingEdges:
  - roles_played_by
  - applies_to
  - implements
  - sourced_from
  - uses_template
  - dispatched_to_child_session
  - dispatched_via_tool
  - subagent_contained_in_plugin
  invariants:
  - provenance=built-in implies subjectId is set and resolves to an AgentVersion or AgentProduct
  examples: []
