# NodeKinds for cluster 6-lifecycle.
# Loaded by tools/validator/validate.py via the manifest in ../ontology-schema.yaml.
# DO NOT add backward-compat shims — catalog pass 37 policy.

nodeKinds:
- id: node:run
  name: Run
  origin: universal
  prefix: run
  cluster: 6-lifecycle
  purpose: |
    Bounded orchestration unit (event-sourced; journaled). A Run is the
    top-level container. ONE Run may have MULTIPLE RunAttempts — each
    retry is a new RunAttempt. The Run's status reflects the latest
    attempt's status. Distinct from RunAttempt (per-attempt persisted
    record with retry/backoff metadata) and LiveSession (the in-flight
    observable while an attempt is executing).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: startedAt
    type: iso-timestamp
    required: true
  - name: endedAt
    type: iso-timestamp
    required: false
  - name: status
    type: enum<running
    completed: null
    failed: null
    aborted>: null
    required: true
  - name: completionProof
    type: string
    required: false
  - name: createdAt
    type: iso-timestamp
    required: false
  - name: currentStateId
    type: id
    required: false
  - name: processId
    type: string
    required: false
  - name: runDir
    type: string
    required: false
  incomingEdges:
  - attests_to
  - triggers_run
  - compliance_for
  - scopes_runs
  - attempt_of
  outgoingEdges:
  - spans
  - uses_async_job
  - has_preflight
  - performs_reconciliation
  - issues_resume_token
  - triggered_by
  - complies_with
  - records_usage
  - uses_context_bundle
  - scoped_to_tenant
  - has_attempt
  invariants: []
  examples: []
- id: node:invocation
  name: Invocation
  origin: universal
  prefix: invocation
  cluster: 6-lifecycle
  purpose: bounded agent execution (one process spawn or equivalent)
  attributes:
  - name: id
    type: id
    required: true
  - name: agentVersionId
    type: ref<AgentVersion>
    required: true
  - name: startedAt
    type: iso-timestamp
    required: true
  - name: endedAt
    type: iso-timestamp
    required: false
  - name: status
    type: enum<running
    completed: null
    failed: null
    aborted>: null
    required: true
  - name: currentStateId
    type: id
    required: false
  - name: exitCode
    type: int
    required: false
  - name: runId
    type: id
    required: false
  - name: sessionId
    type: id
    required: false
  incomingEdges:
  - spans
  - attests_to
  outgoingEdges:
  - runs_via
  - executes_in
  - records_usage
  invariants: []
  examples: []
- id: node:session
  name: Session
  origin: universal
  prefix: session
  cluster: 6-lifecycle
  purpose: |
    Durable persisted conversational state — transcript and supporting
    artifacts an agent can resume from. Distinct from LiveSession (the
    ephemeral in-flight observable that shadows a Session while a
    RunAttempt is executing).
  attributes:
  - name: id
    type: id
    required: true
  - name: workspaceId
    type: ref<Workspace>
    required: false
  - name: createdAt
    type: iso-timestamp
    required: true
  - name: lastActivityAt
    type: iso-timestamp
    required: true
  - name: agentVersionId
    type: id
    required: false
  - name: currentStateId
    type: id
    required: false
  - name: filePath
    type: string
    required: false
  - name: forkPoint
    type: any
    required: false
  - name: format
    type: string
    required: false
  - name: parentSessionId
    type: id
    required: false
  incomingEdges:
  - scopes_runs
  - projects_session
  - shadows_session
  outgoingEdges:
  - scoped_to_tenant
  - has_flow_projection
  - recorded_attention
  - has_child_session
  - has_live_session_shadow
  invariants: []
  examples: []
- id: node:child-session
  name: ChildSession
  origin: universal
  prefix: child-session
  cluster: 6-lifecycle
  purpose: |
    A session spawned as a child of another session for subagent/tool dispatch.
    Distinct from Session (parent runtime context). Records parent linkage,
    dispatched subagent (if any), tool invocation that triggered the spawn,
    return-to address for the result, and lifecycle timestamps.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: false
  - name: parentSessionId
    type: ref<Session>
    required: true
  - name: spawnTrigger
    type: enum<subagent-dispatch,tool-call,manual,scheduled-task>
    required: true
  - name: subagentId
    type: ref<Subagent>
    required: false
    notes: When spawnTrigger=subagent-dispatch, the dispatched subagent.
  - name: invokingToolId
    type: ref<ToolDescriptor>
    required: false
    notes: When spawnTrigger=tool-call or subagent-dispatch-via-tool, the ToolDescriptor that triggered the spawn (e.g. claude-code's Task tool).
  - name: lifecyclePolicy
    type: enum<ephemeral,persistent,cached>
    required: true
    notes: ephemeral=ends when subagent returns, persistent=survives parent run, cached=reused for similar tasks.
  - name: startedAt
    type: iso-timestamp
    required: false
  - name: endedAt
    type: iso-timestamp
    required: false
  - name: status
    type: enum<running,completed,failed,cancelled>
    required: false
  - name: returnedTo
    type: string
    required: false
    notes: Where the child session's result flows back (e.g. parent session's ToolResult).
  incomingEdges:
  - has_child_session
  - dispatched_to_child_session
  - executed_in_child_session
  - triggers_child_session
  outgoingEdges:
  - parent_session
  - runs_subagent
  - runs_skill
  - invoking_tool
  invariants:
  - id starts with child-session:
  - if spawnTrigger=subagent-dispatch then subagentId required
  examples:
  - graph/lifecycle/child-sessions/canonical-child-sessions.yaml
- id: node:phase
  name: Phase
  origin: universal
  prefix: phase
  cluster: 6-lifecycle
  purpose: a named state in a phase machine
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: order
    type: int
    required: true
  - name: description
    type: markdown
    required: false
  - name: phaseMachineId
    type: id
    required: false
  incomingEdges:
  - has_phase
  outgoingEdges:
  - phase_in
  - exposes_intervention_point
  - has_transition
  invariants: []
  examples: []
- id: node:phase-transition
  name: PhaseTransition
  origin: universal
  prefix: phase-transition
  cluster: 6-lifecycle
  purpose: transition between two phases (gateable)
  attributes:
  - name: id
    type: id
    required: true
  - name: fromPhaseId
    type: ref<Phase>
    required: true
  - name: toPhaseId
    type: ref<Phase>
    required: true
  - name: gate
    type: string
    required: false
  - name: event
    type: string
    required: false
  - name: stopMessage
    type: string
    required: false
  incomingEdges:
  - transition_of
  outgoingEdges: []
  invariants: []
  examples: []
- id: node:effect
  name: Effect
  origin: a5c
  originContext: Babysitter SDK
  prefix: effect
  cluster: 6-lifecycle
  purpose: unit of external work in a Run (a5c-flavored)
  attributes:
  - name: id
    type: id
    required: true
  - name: runId
    type: ref<Run>
    required: true
  - name: kind
    type: string
    required: true
  - name: status
    type: enum<pending
    running: null
    completed: null
    failed>: null
    required: true
  - name: currentStateId
    type: id
    required: false
  - name: invocationId
    type: id
    required: false
  - name: request
    type: any
    required: false
  - name: requestedAt
    type: iso-timestamp
    required: false
  - name: resolvedAt
    type: iso-timestamp
    required: false
  - name: result
    type: any
    required: false
  incomingEdges:
  - emitted_by_span
  outgoingEdges: []
  invariants: []
  examples: []
- id: node:lifecycle-state
  name: LifecycleState
  origin: universal
  prefix: lifecycle-state
  cluster: 6-lifecycle
  purpose: a state in a state machine
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: terminal_state
    type: bool
    required: true
  incomingEdges:
  - transitions_to
  outgoingEdges:
  - transitions_to
  - belongs_to_machine
  invariants:
  - exactly one belongs_to_machine edge (V-10.1)
  - non-terminal states have at least one transitions_to (V-10.3)
  examples: []
- id: node:state-machine
  name: StateMachine
  origin: universal
  prefix: state-machine
  cluster: 6-lifecycle
  purpose: a named state machine over a NodeKind
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: governsNodeKindId
    type: ref<NodeKind>
    required: true
  - name: targetNodeKind
    type: string
    required: false
    notes: PascalCase NodeKind name this machine governs (Run, Invocation, Session, Effect, Phase). Mirrors governsNodeKindId in human-readable form.
  - name: description
    type: markdown
    required: false
  - name: states
    type: list<map<id,displayName,terminal,description,entryActions,exitActions>>
    required: false
    notes: Inline state declarations (remodel 2026-04-29 — change J). Preferred form for trivial machines; for machines whose states need their own files (rich metadata, many edges), use separate LifecycleState NodeKind entries instead.
  - name: transitions
    type: list<map<from,to,event,gate>>
    required: false
    notes: Inline transitions between states (remodel 2026-04-29 — change J). `from` and `to` are state ids (slug or fully-qualified lifecycle-state:<machine>.<state>).
  incomingEdges:
  - belongs_to_machine
  - phase_in
  outgoingEdges:
  - state_machine_for
  - has_phase
  invariants:
  - has at least one terminal state (V-10.2) — checked via inline states[].terminal or via separate LifecycleState entries
  examples: []
- id: node:phase-machine
  name: PhaseMachine
  origin: a5c
  prefix: phase-machine
  cluster: 6-lifecycle
  purpose: 'a finite-state machine over Phase nodes declared by a reliability-interface

    impl; distinct from StateMachine which is general over any NodeKind

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: phases
    type: list<ref<Phase>>
    required: true
    notes: ≥2 entries; mirrors has_phase / composed_of edges.
  - name: transitions
    type: list<ref<PhaseTransition>>
    required: false
    notes: Ordered list of PhaseTransitions defining the legal moves between phases. Optional when transitions are inferred from PhaseTransition nodes' fromPhaseId/toPhaseId edges.
  - name: initialPhase
    type: ref<Phase>
    required: true
    notes: Renamed from initialPhaseId for examples-parity.
  - name: terminalPhases
    type: list<ref<Phase>>
    required: true
    notes: ≥1 entry; renamed from terminalPhaseIds for examples-parity.
  - name: declaredBy
    type: ref<Plugin>
    required: false
    notes: Which reliability-interface impl declared this machine (Plugin or ExtensionInterface ref). Optional for catalog-default machines like default-process.
  - name: arbitrationPolicy
    type: enum<most-restrictive-wins
    first-impl-wins: null
    declared-precedence>: null
    required: false
    notes: How to combine phase machines when multiple reliability-interface impls declare overlapping ones.
  incomingEdges:
  - state_machine_for
  outgoingEdges:
  - has_phase
  - transitions_via
  - declared_by
  - composed_of
  invariants:
  - phases list MUST contain ≥2 entries
  - terminalPhases MUST contain ≥1 entry and every entry MUST appear in phases
  - initialPhase MUST appear in phases
  examples:
  - graph/lifecycle/phase-machines/default-process.yaml
- id: node:automation-rule
  name: AutomationRule
  origin: a5c
  prefix: automation-rule
  cluster: 6-lifecycle
  purpose: 'A reactor rule that, on a trigger (timer cron expression or webhook

    delivery), creates a canonical kanban issue from a fixed task template

    and routes it onto a target board. AutomationRule sits between an

    external signal (clock or HTTP delivery) and a `Run` / kanban issue:

    it does NOT mutate the board directly — it always emits a canonical

    issue which is then projected onto a derived board. Sourced from

    packages/agent-mux/core/src/automation.ts (AutomationRule,

    TimerAutomationTrigger, WebhookAutomationTrigger).

    '
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
    notes: AutomationRule.name in the source.
  - name: triggerType
    type: enum<timer
    webhook>: null
    required: true
    evidence: vendor-doc-or-better
  - name: cron
    type: string
    required: false
    notes: Required when triggerType = timer. RFC-style cron expression.
  - name: timezone
    type: string
    required: false
    notes: IANA timezone for cron evaluation.
  - name: webhookPort
    type: int
    required: false
    notes: Required when triggerType = webhook.
  - name: webhookPath
    type: string
    required: false
  - name: webhookMethod
    type: enum<POST>
    required: false
  - name: webhookAuthType
    type: enum<none
    bearer>: null
    required: false
  - name: sourceEvent
    type: string
    required: false
    notes: Optional external event identifier (e.g., GitHub event name).
  - name: lifecycleState
    type: enum<draft
    active: null
    paused: null
    disabled: null
    archived>: null
    required: true
  - name: targetProjectId
    type: string
    required: true
    notes: Canonical project the rule files issues into.
  - name: targetBoardProjectId
    type: string
    required: true
    notes: Derived kanban board the issue projects onto.
  - name: taskTemplateTitle
    type: string
    required: true
    notes: AutomationTaskTemplate.title — drives created issue title.
  - name: taskTemplatePriority
    type: enum<critical,high,medium,low>
    required: false
  - name: taskTemplateStatus
    type: enum<backlog
    ready>: null
    required: false
  - name: routingAction
    type: enum<canonical-issue-create,shared-board-derive>
    required: true
    notes: 'Always combines the two: rule emits a canonical issue, derived board projects it.'
  - name: sourceKind
    type: enum<manual,config-file,api,external-system>
    required: true
  - name: createdAt
    type: iso-date
    required: true
  - name: lastTriggeredAt
    type: iso-date
    required: false
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - automation_rule_defined_by
  outgoingEdges:
  - emits_canonical_issue
  invariants:
  - id starts with automation-rule: null
  - triggerType = timer implies cron is present
  - triggerType = webhook implies webhookPort is present
  - lifecycleState in {draft,active,paused,disabled,archived}
  - routingAction MUST always include canonical-issue-create + shared-board-derive (rule never mutates board directly)
  examples:
  - graph/lifecycle/automation-rules/nightly-triage-timer.yaml
  - graph/lifecycle/automation-rules/github-issue-webhook.yaml
- id: node:session-semantics
  name: SessionSemantics
  origin: universal
  prefix: session-semantics
  cluster: 6-lifecycle
  purpose: per-agent session behavior — dir strategy, id sources, resume/fork/prune semantics, concurrency model
  attributes:
  - name: id
    type: id
    required: true
  - name: sessionSemanticsId
    type: string
    required: true
  - name: agentId
    type: id
    required: true
    notes: ref<AgentProduct> | ref<AgentVersion>
  - name: versionRange
    type: versionRange
    required: true
    evidence: vendor-doc-or-better
  - name: sessionDirStrategy
    type: string
    required: true
    evidence: vendor-doc-or-better
  - name: sessionIdSources
    type: list<string>
    required: true
    evidence: vendor-doc-or-better
  - name: resumeSemantics
    type: markdown
    required: true
  - name: forkSemantics
    type: markdown
    required: false
  - name: pruneSemantics
    type: markdown
    required: false
  - name: concurrencyModel
    type: enum<single-writer
    multi-reader: null
    multi-writer: null
    unspecified>: null
    required: false
  - name: multiTenantPolicy
    type: enum<isolated
    shared: null
    unspecified>: null
    required: false
  - name: stateFilePatterns
    type: list<string>
    required: false
  - name: pidMarkerPolicy
    type: enum<env-or-run-dir
    run-dir-only: null
    none>: null
    required: false
  - name: metadataFields
    type: list<map<string
    any>>: null
    required: false
  incomingEdges:
  - supersedes
  outgoingEdges:
  - applies_to_version
  - references_path
  - supersedes
  invariants:
  - agentId resolves
  - sessionIdSources non-empty
  examples: []
- id: node:lifecycle-semantics
  name: LifecycleSemantics
  origin: universal
  prefix: lifecycle-semantics
  cluster: 6-lifecycle
  purpose: per-agent runtime lifecycle — hook mode, stop-hook mode, background tasks, checkpoints, plugin context
  attributes:
  - name: id
    type: id
    required: true
  - name: lifecycleSemanticsId
    type: string
    required: true
  - name: agentId
    type: id
    required: true
    notes: ref<AgentProduct> | ref<AgentVersion>
  - name: versionRange
    type: versionRange
    required: true
    evidence: vendor-doc-or-better
  - name: runtimeHookMode
    type: enum<native-shell-hooks
    native-shell-hooks-with-windows-support: null
    native-hooks-with-extension-manifest: null
    opt-in: null
    unsupported-in-fallback: null
    none>: null
    required: true
    evidence: vendor-doc-or-better
  - name: stopHookMode
    type: enum<blocking-stop-hook
    advisory-stop-hook: null
    after-agent-hook: null
    session-end-hook: null
    unsupported-in-fallback: null
    none>: null
    required: true
    evidence: vendor-doc-or-better
  - name: backgroundTaskMode
    type: enum<supported
    unsupported-documented: null
    unknown: null
    native: null
    polled: null
    none>: null
    required: true
    evidence: vendor-doc-or-better
  - name: checkpointMode
    type: enum<auto
    manual: null
    documented: null
    unspecified: null
    none>: null
    required: true
    evidence: vendor-doc-or-better
  - name: pluginContextMode
    type: string
    required: false
  - name: streamingResume
    type: enum<supported
    degraded: null
    none>: null
    required: false
  - name: platformNuances
    type: list<string>
    required: false
  incomingEdges:
  - supersedes
  outgoingEdges:
  - applies_to_version
  - references_path
  - supersedes
  invariants:
  - agentId resolves
  - runtimeHookMode=unsupported-in-fallback implies all HookMappings for this agent carry requiresRuntimeHooks=false or supportLevel=unsupported
  examples: []
- id: node:run-attempt
  name: RunAttempt
  origin: derived
  originContext: catalog pass 18 / Symphony §4.1.5 + §8.4 — attempt-numbered Run sub-entity
  prefix: run-attempt
  cluster: 6-lifecycle
  purpose: |
    A single attempt within a Run. Carries retry-backoff metadata and
    per-attempt status. Distinct from Run (which spans all attempts)
    and LiveSession (which is the in-flight observable while THIS
    attempt is executing). The owning Run is reached via the
    `attempt_of` edge (catalog pass 49 — replaces the prior FK-by-attribute
    `runId`).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: false
  - name: error
    type: string
    required: false
    notes: Convenience freeform error summary (alias of errorMessage).
  - name: attemptNumber
    type: int
    required: true
    constraint: '>= 1'
  - name: startedAt
    type: iso-timestamp
    required: true
  - name: endedAt
    type: iso-timestamp
    required: false
  - name: status
    type: enum<running,completed,failed,aborted,retrying>
    required: true
  - name: errorCategoryId
    type: ref<ErrorCategory>
    required: false
    notes: Normalized error category when status in {failed,aborted,retrying}.
  - name: errorMessage
    type: string
    required: false
    notes: Free-form fallback when no ErrorCategory mapping exists.
  - name: workspacePath
    type: string
    required: false
  - name: issueId
    type: ref<Issue>
    required: false
  - name: issueIdentifier
    type: string
    required: false
    notes: Tracker-native identifier (e.g. PROJ-123) for cross-system display.
  - name: backoffStrategy
    type: enum<none,linear,exponential,exponential-jitter,constant>
    required: false
    notes: RetryBackoffStrategy enum (Symphony §8.4).
  - name: baseDelayMs
    type: int
    required: false
  - name: capDelayMs
    type: int
    required: false
  - name: dueAtMs
    type: int
    required: false
    notes: Wall-clock target (ms epoch) for the next retry tick when status=retrying.
  incomingEdges:
  - has_attempt
  - dispatched_as_run_attempt
  outgoingEdges:
  - uses_workspace
  - for_issue
  - has_live_session
  - records_usage
  - uses_context_bundle
  - attempt_of
  - dispatch_origin
  invariants:
  - id starts with run-attempt: null
  - attemptNumber >= 1
  examples: []
- id: node:live-session
  name: LiveSession
  origin: derived
  originContext: catalog pass 18 / Symphony §4.1.6 — in-flight observable distinct from durable Session
  prefix: live-session
  cluster: 6-lifecycle
  purpose: |
    Ephemeral in-flight observable while a RunAttempt is currently
    executing. Holds running token totals, last stream event, the
    agent-subprocess PID, and shadows the durable Session via the
    `shadows_session` edge (catalog pass 49 — replaces the prior FK-by-attribute
    `sessionId`). Disappears when the RunAttempt ends. Distinct from
    Session (durable) and RunAttempt (the persisted record).
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: false
  - name: threadId
    type: string
    required: false
  - name: turnId
    type: string
    required: false
  - name: sessionIdComposition
    type: string
    required: false
    notes: How the live session id is composed (e.g. '${threadId}-${turnId}').
  - name: agentSubprocessPid
    type: int
    required: false
  - name: startedAt
    type: iso-timestamp
    required: true
  - name: lastEventAt
    type: iso-timestamp
    required: false
  - name: lastEvent
    type: string
    required: false
    notes: Most recent stream-event kind observed (member of AgentHostTransport.streamEventKinds enum).
  - name: lastMessage
    type: string
    required: false
  - name: turnCount
    type: int
    required: false
  - name: lastTurnLifecycle
    type: enum<in-progress,success,failure,cancelled,timeout>
    required: false
    notes: TurnLifecycle enum (Symphony §7.2; user-pinned values 2026-05-01).
  - name: inputTokens
    type: int
    required: false
  - name: outputTokens
    type: int
    required: false
  - name: totalTokens
    type: int
    required: false
  - name: tokenAccountingMode
    type: enum<absolute,delta,mixed-prefer-absolute>
    required: false
    notes: TokenAccountingSemantics enum (Symphony §13.5).
  incomingEdges:
  - has_live_session
  - has_live_session_shadow
  outgoingEdges:
  - driven_by_run_attempt
  - shadows_session
  invariants:
  - id starts with live-session: null
  examples: []
- id: node:orchestrator-state
  name: OrchestratorState
  origin: derived
  originContext: catalog pass 18 / Symphony §4.1.8 OrchestratorRuntimeState
  prefix: orchestrator-state
  cluster: 6-lifecycle
  purpose: orchestration control-plane state (poll/concurrency, claimed-issue set, codex totals, last reconcile)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: false
  - name: codexTotals
    type: map<string
    any>: null
    required: false
    notes: Inline aggregate totals block (alias for the codexTotals* breakdowns).
  - name: lastRateLimitObservation
    type: map<string
    any>: null
    required: false
    notes: Inline rate-limit observation block (capturedAt, vendor, primaryLimit, secondaryLimit, rawPayloadRef).
  - name: pollIntervalMs
    type: int
