- id: node:permission-mode
  name: PermissionMode
  origin: derived
  originContext: |
    catalog pass 54 / claude-code types/permissions.ts PermissionMode enum + Tool.ts
    ToolPermissionContext (mode, additionalWorkingDirectories,
    alwaysAllow/Deny/AskRules, isBypassPermissionsModeAvailable, prePlanMode).
