  invariants:
  - id starts with worktree-session:
  examples:
  - graph/lifecycle/worktree-sessions/claude-code-mid-session.yaml
- id: node:agent-control-mode
  name: AgentControlMode
  origin: derived
  originContext: |
    catalog pass 54 / claude-code coordinator/coordinatorMode.ts (isCoordinatorMode,
    matchSessionMode, getCoordinatorSystemPrompt) + Tool.ts ToolUseContext.agentId
    (subagent vs main thread) + ASYNC_AGENT_ALLOWED_TOOLS set. Coordinator mode
    flips the env var CLAUDE_CODE_COORDINATOR_MODE=1 and switches the system
    prompt + worker tool inventory; resumed sessions call matchSessionMode to
    re-align the env var with the stored mode. Distinct from PermissionMode
    (which gates tools) — AgentControlMode shapes the system prompt and
    dispatch posture.
  prefix: agent-control-mode
  cluster: 6-lifecycle
  purpose: |
    Top-level agent posture mode (coordinator/normal/bare/remote/non-interactive)
    that determines the system prompt template, tool inventory, subagent
    dispatch policy, and which auto-features (auto-memory, auto-dream, prompt
    suggestion) run. Persisted on the Session and re-applied on resume.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: mode
    type: enum<normal,coordinator,bare-simple,remote-ccr,non-interactive-print,kairos-channels>
    required: true
    notes: claude-code distinguishes via CLAUDE_CODE_COORDINATOR_MODE / CLAUDE_CODE_SIMPLE / CLAUDE_CODE_REMOTE / KAIROS feature gate / getIsNonInteractiveSession().
  - name: envVar
    type: string
    required: false
    notes: Source env var (e.g. CLAUDE_CODE_COORDINATOR_MODE=1, CLAUDE_CODE_SIMPLE=1, CLAUDE_CODE_REMOTE=1).
  - name: featureGate
    type: string
    required: false
    notes: Feature flag controlling availability (claude-code feature(COORDINATOR_MODE), feature(KAIROS)).
  - name: persistedOnSession
    type: bool
    required: false
    notes: claude-code matchSessionMode reads/writes session.mode and reconciles env var on resume.
  - name: workerToolInventory
    type: list<string>
    required: false
    notes: Tools made available to dispatched workers (claude-code ASYNC_AGENT_ALLOWED_TOOLS minus INTERNAL_WORKER_TOOLS).
  - name: disablesFeatures
    type: list<enum<auto-memory,auto-dream,prompt-suggestion,extract-memories,nested-memory,plan-mode,worktree-mode>>
    required: false
    notes: claude-code bare/remote modes disable auto-memory + extract; coordinator hides plan-mode etc.
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - operates_in_control_mode
  outgoingEdges: []
  invariants:
  - id starts with agent-control-mode:
  examples:
  - graph/lifecycle/agent-control-modes/claude-code-coordinator.yaml
  - graph/lifecycle/agent-control-modes/claude-code-bare-simple.yaml
- id: node:consolidation-lock
  name: ConsolidationLock
  origin: derived
  originContext: |
    catalog pass 54 / claude-code services/autoDream/autoDream.ts +
    services/autoDream/consolidationLock.ts (readLastConsolidatedAt,
    listSessionsTouchedSince, tryAcquireConsolidationLock,
    rollbackConsolidationLock). Time gate (minHours), session-count gate
    (minSessions), mtime-based lock so concurrent processes cant double-fire
    consolidation. Failure rolls back the mtime so the next non-force turn
    re-attempts.
  prefix: consolidation-lock
  cluster: 6-lifecycle
  purpose: |
    Cross-process lock for memory-consolidation runs (autoDream, /dream,
    extract-memories) keyed by an mtime-on-disk file plus throttle cadence
    (time-since-last + session-count). Records gate values, current state,
    and last-fired timestamp.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: lockKind
    type: enum<auto-dream,extract-memories,team-sync,manual-dream>
    required: true
  - name: lockFilePath
    type: string
    required: false
    notes: Path to the lock-file whose mtime is the throttle marker (typically under memdir).
  - name: minHoursBetweenRuns
    type: int
    required: false
    notes: claude-code DEFAULTS.minHours=24.
  - name: minSessionsBetweenRuns
    type: int
    required: false
    notes: claude-code DEFAULTS.minSessions=5.
  - name: scanThrottleMs
    type: int
    required: false
    notes: claude-code SESSION_SCAN_INTERVAL_MS=10*60*1000 — session-gate scan throttle when time-gate already passed.
  - name: lastConsolidatedAt
    type: iso-timestamp
    required: false
  - name: rollbackOnFailure
    type: bool
    required: false
    notes: claude-code rollbackConsolidationLock(priorMtime) restores mtime so the gate re-opens on next turn.
  - name: bypassUnderForce
    type: bool
    required: false
    notes: claude-code isForced() bypasses time/session gates but not the lock.
  - name: description
    type: markdown
    required: false
  incomingEdges:
  - guarded_by_consolidation_lock
  outgoingEdges: []
  invariants:
  - id starts with consolidation-lock:
  examples:
  - graph/lifecycle/consolidation-locks/claude-code-auto-dream.yaml

