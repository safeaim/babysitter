    notes: Cap for overloaded (529) errors specifically (claude-code MAX_529_RETRIES=3).
  - name: baseDelayMs
    type: int
    required: false
    notes: Base delay before first retry (claude-code BASE_DELAY_MS=500).
  - name: maxDelayMs
    type: int
    required: false
    notes: Cap on per-attempt computed delay (default 32000ms in claude-code; 5min/6h in persistent mode).
