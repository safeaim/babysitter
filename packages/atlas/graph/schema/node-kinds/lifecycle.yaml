    destination:session}); ExitPlanMode restores prePlanMode. Distinct from
    RunAttempt.status (lifecycle) and AgentControlMode (coordinator vs normal).
  prefix: permission-mode
  cluster: 6-lifecycle
  purpose: |
    A named permission mode controlling which tools can run without prompting
    and how denials are handled — default (prompt-on-write), plan (read-only +
    interview), accept-edits (auto-allow writes), bypass-permissions
    (skip-everything), auto (classifier-driven). Modes can be entered from
    tool calls, settings, CLI flags, or restored from session state. Carries
    its rule book (alwaysAllow/Deny/Ask) and additional working dirs.
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: mode
    type: enum<default,plan,accept-edits,bypass-permissions,auto,dont-ask,untrusted,on-failure,on-request,never>
    required: true
    notes: claude-code PermissionMode enum plus vendor-specific approval policies. plan = read-only exploration; auto = classifier decides per-call; dont-ask normalizes Anthropic agent-loop `dontAsk`; Codex CLI approval policies are `untrusted`, `on-failure`, `on-request`, and `never`.
  - name: isReadOnly
    type: bool
    required: false
    notes: True when mode is plan — write/edit tools are disabled.
  - name: requiresUserConsent
    type: bool
    required: false
    notes: True when entering this mode requires a user-side approval dialog (plan mode entry, bypass-permissions enable).
  - name: enteredVia
    type: enum<tool-call,cli-flag,settings-default,session-resume,env-var,model-initiated>
    required: false
    notes: claude-code EnterPlanModeTool sets mode=plan via tool-call with destination=session; bypass-permissions can be cli-flag (--dangerously-skip-permissions).
  - name: prePlanMode
    type: enum<default,accept-edits,bypass-permissions,auto>
    required: false
    notes: claude-code ToolPermissionContext.prePlanMode — stores the mode to restore on ExitPlanMode (only meaningful when mode=plan and entry was model-initiated).
  - name: shouldAvoidPermissionPrompts
    type: bool
    required: false
    notes: claude-code ToolPermissionContext.shouldAvoidPermissionPrompts — true for background agents that cannot show UI; permission prompts auto-deny.
  - name: awaitAutomatedChecksBeforeDialog
    type: bool
    required: false
    notes: claude-code ToolPermissionContext.awaitAutomatedChecksBeforeDialog — coordinator workers wait for classifier+hooks before showing a dialog.
  - name: classifierActive
    type: bool
    required: false
    notes: True when mode=auto and the auto-classifier is actively gating tool calls (claude-code prepareContextForPlanMode side effect for users with defaultMode=auto).
  - name: description
    type: markdown
    required: false
