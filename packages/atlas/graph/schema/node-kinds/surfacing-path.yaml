# NodeKinds for cluster 4-surfacing-path.
# Loaded by tools/validator/validate.py via the manifest in ../ontology-schema.yaml.
# DO NOT add backward-compat shims — catalog pass 37 policy.

nodeKinds:
- id: node:workspace
  name: Workspace
  origin: universal
  prefix: workspace
  cluster: 4-surfacing-path
  purpose: project context with sessions+repos
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: rootPath
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  - name: materialization
    type: enum<worktree,symlink,clone,copy,virtual>
    required: false
    evidence: vendor-doc-or-better
    notes: How the workspace projects onto the filesystem. `worktree`=git-worktree (default for git repos); `symlink`=path alias; `clone`=independent full git clone; `copy`=non-git filesystem snapshot (for non-git workspaces); `virtual`=overlay/FUSE/in-memory projection. `clone`/`copy`/`virtual` resolve OQ oq:workspace-materialization-extensions.
  - name: storageBackend
    type: enum<local-fs,nfs,s3-mounted,container-volume,tmpfs,ide-managed>
    required: false
    evidence: vendor-doc-or-better
    notes: Where the workspace bytes physically live. `local-fs`=ordinary disk on the host; `nfs`=network filesystem (incl. SMB); `s3-mounted`=object-store fronted by FUSE/goofys/etc.; `container-volume`=docker/podman volume; `tmpfs`=RAM-backed (ephemeral); `ide-managed`=IDE controls the underlying store (e.g. JetBrains Gateway, GitHub Codespaces remote root).
  - name: encryptionAtRest
    type: enum<none,os-keystore,hardware-encrypted,per-file-encrypted>
    required: false
    evidence: vendor-doc-or-better
    notes: Encryption posture of the workspace bytes at rest. `none`=plaintext on disk; `os-keystore`=OS-managed full-disk / FileVault / BitLocker / LUKS; `hardware-encrypted`=SED / TPM-bound volume; `per-file-encrypted`=fscrypt / EFS / per-file envelope.
  - name: indexingState
    type: enum<not-indexed,indexing,indexed,partial>
    required: false
    notes: 'For IDE-managed workspaces: the indexing state of the project (symbol index, language servers, embeddings).'
  - name: gitHooksInstalled
    type: list<string>
    required: false
    notes: List of hook names installed in `.git/hooks/` (e.g. `pre-commit`, `pre-push`, `commit-msg`). Empty list means no agent-installed hooks.
  - name: agentArtifactsScope
    type: enum<inside-workspace,sibling-dir,xdg-state,none>
    required: false
    notes: Where agent artifacts (history, scratch files, plan files) live relative to the workspace. `inside-workspace`=under the workspace root (e.g. `.claude/`, `.codex/`); `sibling-dir`=adjacent directory; `xdg-state`=`$XDG_STATE_HOME` or platform equivalent; `none`=no persistent agent artifacts.
  - name: multiTenantPolicy
    type: enum<single-user,multi-user-rw,multi-user-readonly>
    required: false
    notes: 'For shared workspaces: `single-user`=one human owner; `multi-user-rw`=multiple agents/humans may write concurrently; `multi-user-readonly`=multiple may read, single writer.'
  - name: filesystemSafetyInvariants
    type: list<enum<workspace-confined-writes,no-cross-workspace-traversal,no-symlink-escape,tmp-dir-isolated,git-hooks-sandboxed>>
    required: false
    notes: catalog pass 18 / FilesystemSafetyInvariant enum. Informational safety descriptor — NOT Trust Chain. Captures the symphony §15-equivalent invariants without introducing trust evidence.
  incomingEdges:
  - uses_workspace
  - used_by_run_attempt
  - owns_workspace
  - groups_workspace
  outgoingEdges:
  - materializes_as
  - runs_via
  - versioned_via
  - workspace_owned_by
  - workspace_in_project
  invariants: []
  examples: []
- id: node:worktree
  name: Worktree
  origin: universal
  prefix: worktree
  cluster: 4-surfacing-path
  purpose: git-worktree per-branch isolation
  attributes:
  - name: id
    type: id
    required: true
  - name: workspaceId
    type: ref<Workspace>
    required: true
  - name: path
    type: string
    required: true
  - name: branch
    type: string
    required: true
  incomingEdges:
  - materializes_as
  outgoingEdges: []
  invariants: []
  examples: []
- id: node:execution
  name: Execution
  origin: universal
  prefix: execution
  cluster: 4-surfacing-path
  purpose: where/how work runs (local/docker/ssh/k8s/cloud/direct)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: kind
    type: enum<local
    docker: null
    ssh: null
    kubernetes: null
    cloud: null
    direct>: null
    required: true
  - name: description
    type: markdown
    required: true
  - name: processLifecycleModel
    type: enum<unix-pgroup,windows-job-object,docker-stop,k8s-grace,ssh-tty,direct>
    required: false
    evidence: vendor-doc-or-better
    notes: Per-mode process-lifecycle model. Unix uses process-groups + signal-set; Windows uses Job Objects; Docker translates SIGTERM through the entrypoint's PID-1; k8s honours `terminationGracePeriodSeconds`; ssh inherits TTY semantics. Resolves OQ oq:platform-process-lifecycle (recorded as gap-of-record — no cross-OS standard exists).
  - name: signalPropagation
    type: enum<best-effort,reliable,degraded,unsupported>
    required: false
    evidence: vendor-doc-or-better
    notes: Signal-propagation reliability across the spawn boundary. Local/docker = reliable for SIGTERM/SIGKILL; ssh = best-effort (TTY-dependent); k8s = reliable for SIGTERM with race against grace-period; cloud = degraded (provider-dependent). Resolves OQ oq:cross-platform-signal-propagation as gap-of-record.
  - name: resourceLimits
    type: map<string,string>
    required: false
    evidence: vendor-doc-or-better
    notes: 'Resource budget for the execution. Conventional keys: `cpu` (e.g. `2`, `500m`), `memoryMb` (int as string), `timeoutMs`, `networkAllowed` (`true`/`false`), `diskQuota` (e.g. `10Gi`). Empty/absent means inherit from host.'
  - name: isolation
    type: enum<none,namespace,container,vm,wasm-sandbox>
    required: false
    evidence: vendor-doc-or-better
    notes: Mechanism that separates this execution from the host. `none`=share host process tree; `namespace`=Linux namespaces (pid/net/mount); `container`=full container runtime; `vm`=hypervisor-backed VM (firecracker/kata/qemu); `wasm-sandbox`=wasm host.
  - name: networkPolicy
    type: enum<unrestricted,egress-allowlist,egress-denylist,air-gapped>
    required: false
    evidence: vendor-doc-or-better
    notes: Network egress posture for the execution. Distinct from `Sandbox.networkPolicy` (which is the policy primitive); this records the *actual* posture of this execution mode.
  - name: fsAccess
    type: enum<unrestricted,workspace-only,read-only,overlay-fs>
    required: false
    evidence: vendor-doc-or-better
    notes: Filesystem access posture. `unrestricted`=full host fs; `workspace-only`=bind-mount of workspace root only; `read-only`=mounted ro; `overlay-fs`=writes go to a copy-on-write upper layer (changes discardable).
  - name: gpuAccess
    type: enum<none,shared,exclusive,passthrough>
    required: false
    notes: GPU exposure to the execution. `none`=no GPU; `shared`=time-sliced (MPS, MIG share); `exclusive`=dedicated device; `passthrough`=PCI-passthrough into a VM.
  - name: sandboxImpl
    type: enum<agentsh,docker,firecracker,gvisor,kata,wasm-time,qemu,none>
    required: false
    evidence: vendor-doc-or-better
    notes: Concrete tool that enforces the sandbox for this execution. `agentsh`=agent-mux per-task wrapper; `docker`=docker/podman; `firecracker`=AWS micro-VM; `gvisor`=user-space kernel; `kata`=kata-containers; `wasm-time`=wasmtime; `qemu`=full QEMU. `none`=relies solely on host.
  incomingEdges:
  - runs_via
  outgoingEdges:
  - sandboxed_by
  invariants: []
  examples: []
- id: node:sandbox
  name: Sandbox
  origin: universal
  prefix: sandbox
  cluster: 4-surfacing-path
  purpose: what work is allowed to do (policy primitive)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: filesystemPolicy
    type: enum<read-only
    read-write: null
    sandboxed: null
    confined>: null
    required: true
  - name: networkPolicy
    type: enum<none
    egress-only: null
    full: null
    allowlist>: null
    required: true
  - name: description
    type: markdown
    required: true
  - name: fsAllowList
    type: list<string>
    required: false
    notes: Glob/path patterns of filesystem locations the sandbox is permitted to read/write. Empty list (combined with `fsDenyList`) means fall back to `filesystemPolicy`.
  - name: fsDenyList
    type: list<string>
    required: false
    notes: Glob/path patterns of filesystem locations the sandbox MUST NOT touch (takes precedence over allow-list).
  - name: netAllowList
    type: list<string>
    required: false
    notes: Allow-list of network destinations (URLs, domains, IPs, CIDRs). Used when `networkPolicy=allowlist`.
  - name: netDenyList
    type: list<string>
    required: false
    notes: Deny-list of network destinations (URLs, domains, IPs, CIDRs). Takes precedence over `netAllowList`.
  - name: execAllowedBinaries
    type: list<string>
    required: false
    notes: Allow-list of binaries the sandboxed process may exec. Empty means inherit from host PATH.
  - name: execDeniedBinaries
    type: list<string>
    required: false
    notes: Deny-list of binaries (e.g. `sudo`, `curl`) the sandboxed process MUST NOT exec.
  - name: envVarScope
    type: enum<inherit-all,inherit-allowlist,scrub-all-set-by-config>
    required: false
    notes: Environment variable strategy. `inherit-all`=parent env passed through; `inherit-allowlist`=only declared vars passed; `scrub-all-set-by-config`=clean env, populated solely from sandbox config.
  - name: secretAccessScope
    type: enum<none,named,all>
    required: false
    notes: Secret-store access posture. `none`=no access to host secret stores; `named`=specific named secrets only; `all`=full access (rare, dangerous).
  - name: auditLogPolicy
    type: enum<none,structured-jsonl,otel-traced>
    required: false
    notes: How sandbox-policy decisions are recorded. `none`=no audit; `structured-jsonl`=append-only JSONL log of policy events; `otel-traced`=OpenTelemetry spans/events.
  - name: policyEvaluationPoint
    type: enum<pre-call,continuous,post-call-attestation>
    required: false
    notes: When the policy is evaluated. `pre-call`=before the gated action runs (default); `continuous`=enforced kernel-side throughout (e.g. seccomp, eBPF); `post-call-attestation`=action runs, then attested/audited.
  incomingEdges:
  - sandboxed_by
  outgoingEdges: []
  invariants: []
  examples: []
