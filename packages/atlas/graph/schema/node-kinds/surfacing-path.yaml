- id: node:interaction-primitive
  name: InteractionPrimitive
  origin: universal
  prefix: interaction-primitive
  cluster: 4-surfacing-path
  purpose: a concrete primitive (slash-command, @-mention, fork, voice, drag-drop, status-line, share-session, ...)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: kind
    type: enum<slash-command,at-mention,fork,resume,thread,reaction,voice,telemetry,multimodal-input,collaborative,prompt-ui,keybinding,editor-ui,cli,deep-link,cli-subcommand,tui-command,mock-scenario>
    required: false
    notes: Primitive kind. Existing surface stub examples use `surface` (slash-command|prompt-ui|keybinding|editor-ui|cli); kind is the canonical taxonomy. When both are present, `kind` wins. `deep-link` (catalog pass 83) covers URL-scheme handlers like `claude-cli://open` and `vscode://anthropic.claude-code/open` — folded in from the demoted DeepLinkHandler NodeKind. `cli-subcommand` (catalog pass 95) covers CLI subcommand verbs exposed under a single bin (e.g. `amux-triggers enrich|evaluate|--help`); reuses the existing `flags` / `argSchema` attribute slots. `tui-command` (catalog pass 97c) covers in-process TUI command primitives (command-palette, prompt-input, model-picker) that have distinct interactive behaviors beyond pure presentation. `mock-scenario` (catalog pass 97c) covers behavioral mock scenarios in @a5c-ai/agent-mux-harness-mock that drive deterministic mock-process / http-mock / websocket-mock fixtures.
  - name: urlScheme
    type: string
    required: false
    notes: For kind=deep-link — URI scheme prefix (e.g. `claude-cli://`, `vscode://anthropic.claude-code/`).
  - name: pathPattern
    type: string
    required: false
    notes: For kind=deep-link — accepted URL path (e.g. `open`).
  - name: urlParams
    type: list<string>
    required: false
    notes: For kind=deep-link — accepted query parameters (e.g. `q`, `cwd`, `repo`).
  - name: registrationLocation
    type: map<string,string>
    required: false
    notes: For kind=deep-link — per-platform handler-registration path (macOS / linux / windows / all).
  - name: disableSetting
    type: string
    required: false
    notes: For kind=deep-link — settings.json key that opts out of registration (e.g. `disableDeepLinkRegistration`).
  - name: requiresVersionRange
    type: string
    required: false
    notes: Minimum agent version required for this primitive (e.g. `>=2.1.91`).
  - name: surface
    type: enum<slash-command,prompt-ui,keybinding,editor-ui,cli,voice,status-line,multimodal-input,collaborative>
    required: false
    notes: |
      Concrete UI surface where the primitive is perceived/rendered to the user
      (NOT how it's invoked — that's `supports_interaction_primitive.mechanism`).
      Examples: a TodoWrite primitive renders as `editor-ui` (the rendered todo
      list); a slash-command renders as `slash-command`; an Ask-User-Question
      renders as `prompt-ui` (the question shown to the user).
  - name: category
    type: ref<InteractionPrimitiveCategory>
    required: false
    notes: Editorial grouping. The 12-category taxonomy (approval, collaborative, configuration, content-input, context, control, human-in-loop, lifecycle, multimodal, navigation, telemetry, voice) is recorded as `InteractionPrimitiveCategory` enum-nodes; bind via this attribute.
  - name: keyboardShortcut
    type: string
    required: false
    evidence: vendor-doc-or-better
    notes: Default keyboard shortcut, OS-conditional notation allowed (e.g. `Cmd+K / Ctrl+K`). Absent = no default keybinding.
  - name: availableInModes
    type: list<enum<chat,plan,composer,edit>>
    required: false
    notes: Subset of UI modes where the primitive is reachable. Empty/absent = available in all modes.
  - name: requiresPermission
    type: bool
    required: false
    notes: Whether invoking the primitive triggers a permission prompt or capability gate (e.g. mic access for voice, screen-share for follow-agent).
  - name: parentBin
    type: string
    required: false
    notes: For kind=cli-subcommand — the parent CLI bin the verb is invoked under (e.g. `amux-triggers`).
  - name: subcommandVerb
    type: string
    required: false
    notes: For kind=cli-subcommand — the verb literal (e.g. `enrich`, `evaluate`, `help`).
  - name: flags
    type: list<string>
    required: false
    notes: |
      For kind=cli-subcommand — flag entries as `<flag>:<arity>:<purpose>` (e.g.
      `--backend:1:select trigger backend`, `--include-diff:0:flip include-diff toggle`,
      `--output:1:write JSON to file`).
  - name: subcommandExitCodes
    type: list<string>
    required: false
    notes: For kind=cli-subcommand — `<code>:<symbol>:<meaning>` triples specific to this subcommand.
  - name: description
    type: markdown
    required: true
  incomingEdges:
  - supported_by_agent_ui
  - exposes_subcommand
  outgoingEdges:
  - requires_capability
  - in_category
  invariants: []
  examples: []
