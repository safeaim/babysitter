- id: node:interaction-primitive-category
  name: InteractionPrimitiveCategory
  origin: universal
  prefix: interaction-primitive-category
  cluster: 4-surfacing-path
  purpose: |
    editorial grouping for InteractionPrimitives across 12 values:
    `control` — issue commands/transitions (slash-clear, command-palette);
    `navigation` — move between views/sessions (model-picker, session-list);
    `context` — add/manage conversation context (paste-image);
    `approval` — accept/reject an agent-proposed action (tool-approval-prompt);
    `voice` — voice I/O;
    `telemetry` — observability/metrics (transcript-export);
    `multimodal` — non-text I/O;
    `collaborative` — multi-user/sharing;
    `configuration` — change agent settings (slash-model, slash-mode);
    `content-input` — primary content authoring (prompt-input, file-attachment);
    `human-in-loop` — agent asks user a question (ask-user-question, plan-review);
    `lifecycle` — session/run lifecycle (resume-session, fork-session).
  attributes:
  - name: id
    type: id
    required: true
  - name: value
    type: enum<approval,collaborative,configuration,content-input,context,control,human-in-loop,lifecycle,multimodal,navigation,telemetry,voice>
    required: true
  - name: displayName
    type: string
    required: true
  - name: description
    type: markdown
    required: true
  incomingEdges:
  - in_category
  outgoingEdges: []
  isolatedAllowed: true
  invariants: []
  examples: []
- id: node:presentation
  name: Presentation
  origin: universal
  prefix: presentation
  cluster: 4-surfacing-path
  purpose: a concrete app shell (TUI, IDE, web, mobile, CI)
  attributes:
  - name: id
    type: id
    required: true
  - name: displayName
    type: string
    required: true
  - name: kind
    type: enum<tui,cli,ide-extension,web,mobile,tv,watch,ci,desktop,headless>
    required: true
  - name: description
    type: markdown
    required: true
  - name: renderingTechnology
    type: enum<vt100,vte,terminal-emulator,electron,webview,native-cocoa,native-win32,flutter,react-native,next-js,jetbrains-platform,vs-code-extension>
    required: false
    evidence: vendor-doc-or-better
    notes: Concrete rendering substrate. `vt100`/`vte`/`terminal-emulator`=text shell variants; `electron`=Chromium+Node desktop shell; `webview`=embedded browser view; `native-cocoa`/`native-win32`=OS-native UI toolkits; `flutter`/`react-native`=cross-platform UI; `next-js`=server-rendered web; `jetbrains-platform`=IntelliJ Platform plugin host; `vs-code-extension`=VS Code extension API host.
  - name: themeSupport
    type: enum<none,light-dark,full-customizable>
    required: false
    evidence: vendor-doc-or-better
    notes: Theme support. `none`=fixed appearance; `light-dark`=two-mode toggle (often follows OS); `full-customizable`=user/extension-supplied themes.
  - name: accessibilitySupport
    type: enum<none,basic,wcag-aa,wcag-aaa>
    required: false
    evidence: vendor-doc-or-better
    notes: Accessibility posture. `none`=no a11y affordances; `basic`=screen-reader friendly text output; `wcag-aa`/`wcag-aaa`=conforms to the WCAG level claimed by vendor.
  - name: offlineMode
    type: enum<no,partial,full>
    required: false
    notes: Whether the surface itself functions without network. `no`=requires network; `partial`=local UI works but core agent calls require network; `full`=fully usable offline (e.g. local model fallback).
  - name: platforms
    type: list<enum<darwin,linux,win32,web,ios,android>>
    required: false
    evidence: vendor-doc-or-better
    notes: OS / runtime platforms the presentation ships for.
  - name: bundleSize
    type: string
    required: false
    notes: Approx install / download footprint as a human-readable string (e.g. `~12 MB`, `~250 MB`). Free-form; replace with a structured numeric type once vendors publish stable figures.
  - name: updateChannel
    type: enum<auto,manual,extension-store,build-from-source>
    required: false
    evidence: vendor-doc-or-better
    notes: How the presentation receives updates. `auto`=in-app auto-update; `manual`=user runs npm/brew/installer; `extension-store`=marketplace/extension-host pushes updates; `build-from-source`=user compiles.
  - name: accessibilityShortcuts
    type: list<string>
    required: false
    notes: List of accessibility-related keyboard shortcuts the surface advertises (e.g. `Ctrl+Alt+H` open help, `Tab` focus rotation).
  incomingEdges:
  - bundled_with
  outgoingEdges: []
  invariants: []
  examples: []
