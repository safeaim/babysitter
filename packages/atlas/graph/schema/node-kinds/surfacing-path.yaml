    type: enum<server-rendered-html,client-app,tui-panel,ansi-text,json-only>
    required: true
    notes: DashboardFormat enum. tui-panel/ansi-text/json-only absorb the collapsed HumanReadableStatusSurface kinds.
  - name: routePath
    type: string
    required: false
  - name: refreshCadence
    type: enum<live-sse,poll,on-demand>
    required: false
  - name: refreshMode
    type: enum<poll,on-event,manual>
    required: false
    notes: Finer-grained refresh model used by tui-panel/ansi-text variants (absorbed from HumanReadableStatusSurface.refreshMode).
  - name: dataSource
    type: enum<orchestrator-state,run-journal,live-sessions,api-endpoint,runtime-snapshot>
    required: false
    notes: Coarse data-source descriptor; reads_endpoint / derives_from edges carry the precise binding.
  - name: loadBearing
    type: bool
    required: false
    notes: false captures the HumanReadableStatusSurface 'neverLoadBearing' invariant (status display, not control surface).
  - name: readOnly
    type: bool
    required: false
  - name: dataSourceEndpointIds
    type: list<ref<APIEndpoint>>
    required: false
    notes: Inline list of endpoint refs (reads_endpoint edges remain the primary data-plane binding).
  - name: runtimeSnapshotSourceId
    type: ref<RuntimeSnapshot>
    required: false
    notes: Inline ref to the RuntimeSnapshot used for catalog provenance (derives_from edge remains primary).
  incomingEdges: []
  outgoingEdges:
  - reads_endpoint
  - derives_from
  invariants:
  - id starts with dashboard: null
  examples: []
