nodeKind: SecretHandlingPolicy
id: secret-handling:no-secrets-in-prompts
attributes:
  displayName: "No secrets in agent prompts"
  rule: "Tracker credentials, vendor API keys, and SSH keys MUST NOT appear in prompt template body or front-matter."
  scope: workflow-config
  enforcement: workflow-linter
  rationale: "Prompt body is logged in run journals; secrets must come from environment only."
---
nodeKind: SecretHandlingPolicy
id: secret-handling:explicit-injection
attributes:
  displayName: "Explicit injection only"
  rule: "Secrets are injected into agent subprocess via env vars listed in LaunchContract.advertisedSecrets only; no implicit forwarding."
  scope: agent-session
  enforcement: launch-contract
  rationale: "Audit trail of which secrets each agent run had access to."
---
nodeKind: SecretHandlingPolicy
id: secret-handling:redact-in-logs
attributes:
  displayName: "Redact secret values in logs"
  rule: "Run journal sinks MUST redact known secret env-var values before persistence."
  scope: observability
  enforcement: journal-writer
  rationale: "Defense in depth — even if a secret leaks into output, logs do not retain it."
