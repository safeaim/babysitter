id: definition:ccpm.canonical
attributes:
  authoredAt: "2026-04-28T00:00:00Z"
  termId: term:ccpm
  text: |
    Spec-driven development methodology adapted from
    https://github.com/automazeio/ccpm. Enforces "every line of code
    must trace back to a specification" via five strict phases with
    zero shortcuts. Source: library/methodologies/ccpm/README.md.
  status: canonical
