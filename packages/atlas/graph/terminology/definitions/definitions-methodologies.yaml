---
nodeKind: Definition
id: definition:behavior-driven-development.canonical
attributes:
  authoredAt: "2026-04-28T00:00:00Z"
  termId: term:behavior-driven-development
  text: |
    Behavior-Driven Development (BDD), also known as Specification by
    Example, is a collaborative approach that captures requirements as
    concrete examples illustrating how the system should behave in
    specific scenarios. These examples become executable specifications
    that serve as both documentation and automated tests. Source:
    library/methodologies/bdd-specification-by-example/README.md.
  status: canonical
edges:
  defines:
    - term:behavior-driven-development
---
nodeKind: Definition
id: definition:acceptance-test-driven-development.canonical
attributes:
  authoredAt: "2026-04-28T00:00:00Z"
  termId: term:acceptance-test-driven-development
  text: |
    Acceptance Test-Driven Development with TDD — a combined approach
    that uses acceptance tests (ATDD) at the feature level to drive
    unit-level test-driven development (TDD), ensuring both external
    quality (building the right thing) and internal quality (building
    it right). Source: library/methodologies/atdd-tdd/README.md.
  status: canonical
edges:
  defines:
    - term:acceptance-test-driven-development
