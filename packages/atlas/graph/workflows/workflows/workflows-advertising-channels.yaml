  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Optimizes Google Shopping and Performance Max campaigns through product feed
    management — maintaining Merchant Center compliance, enriching product titles
    and descriptions with high-intent keywords, configuring custom labels for bid
    segmentation by margin tier and sell-through velocity, diagnosing feed
    disapprovals and policy violations, structuring campaign architecture by
    product category and ROAS target, and implementing supplemental feeds for
    promotional pricing. Produces feed health scorecards, shopping campaign
    restructuring plans, and product-level ROAS analyses. Excludes product
    catalog management and pricing strategy.
