  displayName: "YouTube Video Ad Campaign"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-campaign"
  complexity: cross-team
  description: |
    Manages YouTube video advertising campaigns end-to-end — producing video ad
    creatives in skippable, non-skippable, and bumper formats, configuring
    audience targeting via custom intent and affinity segments, optimizing
    cost-per-view bids against brand lift benchmarks, monitoring view-through
    rates and earned actions, conducting A/B tests on thumbnails and CTAs, and
    measuring brand lift through Google's survey methodology. Produces creative
    performance reports, audience refinement recommendations, and CPV
    optimization plans. Excludes organic YouTube channel management.
