attributes:
  displayName: "Paid Search Campaign Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Optimizes paid search campaigns across Google and Bing ads — reviewing
    keyword bid adjustments, quality score trends, negative keyword lists,
    ad copy performance, match-type distribution, and budget pacing against
    ROAS targets. Produces bid strategy adjustments and keyword
    expansion/pruning recommendations. Excludes new campaign creation and
    landing page design.
