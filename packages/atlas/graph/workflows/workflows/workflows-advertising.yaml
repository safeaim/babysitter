nodeKind: Workflow
id: workflow:display-retargeting-optimization
attributes:
  displayName: "Display Retargeting Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: single-team
  description: |
    Optimizes retargeting campaign performance — reviewing audience segment
    recency windows, frequency capping thresholds, creative variant fatigue,
    cross-device attribution accuracy, and suppression list hygiene.
    Evaluates diminishing returns by audience tier and adjusts bid
    multipliers accordingly. Produces audience refresh recommendations and
    frequency cap adjustments. Excludes first-party data strategy and pixel
    implementation.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
