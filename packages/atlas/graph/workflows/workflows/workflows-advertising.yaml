id: workflow:social-media-ad-performance-review
attributes:
  displayName: "Social Media Ad Performance Review"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Evaluates paid social campaign performance across Meta, TikTok, and
    LinkedIn — analyzing creative fatigue signals, audience overlap,
    cost-per-action trends, placement optimization, and platform-specific
    algorithm shifts. Identifies underperforming creatives for rotation and
    high-potential audiences for budget reallocation. Produces performance
    dashboard updates and creative refresh recommendations. Excludes organic
    social content planning.
