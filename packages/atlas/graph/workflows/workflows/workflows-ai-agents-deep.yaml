---
nodeKind: Workflow
id: workflow:rag-pipeline-evaluation
attributes:
  displayName: "RAG Pipeline Evaluation"
  workflowKind: data
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Evaluates retrieval-augmented generation pipeline quality end-to-end —
    measuring retrieval precision@k and recall@k against ground-truth relevance
    judgments, scoring generation faithfulness and hallucination rates via LLM
    judges, benchmarking chunking and embedding strategies, profiling latency
    across retrieval and generation stages, and running regression suites before
    promoting pipeline changes. Excludes RAG architecture design and embedding
    model training.
edges:
  involves_role:
    - target: role:ml-engineer
    - target: role:ai-champion
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:retrieval-augmented-generation
    - target: skill-area:eval-driven-development
    - target: skill-area:prompt-engineering
  applies_to_domain:
    - target: domain:ml-ops
    - target: domain:data-science
  triggers_responsibility:
    - target: responsibility:ai-tooling-evaluation
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:ai-enablement
    - target: org-unit:ml-team
    - target: org-unit:research-engineering
