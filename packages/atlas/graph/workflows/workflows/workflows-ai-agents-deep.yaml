nodeKind: Workflow
id: workflow:multi-agent-orchestration-review
attributes:
  displayName: "Multi-Agent Orchestration Review"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-deployment"
  complexity: cross-team
  description: |
    Reviews multi-agent system architectures before production deployment —
    auditing agent role definitions, inter-agent communication protocols, state
    graph correctness, tool-use permission boundaries, escalation and
    human-in-the-loop gates, cost-per-invocation budgets, and failure-mode
    handling across LangGraph/CrewAI/AutoGen-style orchestrations. Validates
    that agent loops terminate and outputs converge. Excludes individual agent
    prompt engineering.
edges:
  involves_role:
    - target: role:ai-champion
    - target: role:staff-engineer
    - target: role:ml-engineer
  requires_skill_area:
    - target: skill-area:agentic-loops
    - target: skill-area:tool-use
    - target: skill-area:context-management
  applies_to_domain:
    - target: domain:ml-ops
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:ai-safety-guardrails
  performed_by_org_unit:
    - target: org-unit:ai-enablement
    - target: org-unit:architecture-guild
    - target: org-unit:ml-team
