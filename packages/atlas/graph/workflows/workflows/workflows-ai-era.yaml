nodeKind: Workflow
id: workflow:llm-cost-optimization
attributes:
  displayName: "LLM Cost Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Reviews and optimises spend across LLM API providers — analysing per-model
    token consumption, identifying prompt-length bloat, evaluating cache-hit
    rates, testing cheaper model substitutions for low-criticality tasks,
    auditing retry and fallback policies that inflate costs, and projecting
    budget burn-rate against forecasts. Produces a cost breakdown dashboard
    and actionable savings plan. Excludes model fine-tuning work.
edges:
  involves_role:
    - target: role:ml-engineer
    - target: role:cost-tracker
    - target: role:staff-engineer
  requires_skill_area:
    - target: skill-area:prompt-engineering
    - target: skill-area:context-management
  applies_to_domain:
    - target: domain:ml-ops
    - target: domain:platform-engineering
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:ml-platform-team
    - target: org-unit:infra-engineering
