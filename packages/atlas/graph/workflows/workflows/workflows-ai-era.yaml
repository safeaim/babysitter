nodeKind: Workflow
id: workflow:synthetic-data-generation-pipeline
attributes:
  displayName: "Synthetic Data Generation Pipeline"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-milestone"
  complexity: cross-team
  description: |
    Designs and executes pipelines that produce synthetic training, evaluation,
    or test datasets — defining schema constraints and statistical
    distributions, configuring generative models or rule-based generators,
    validating that synthetic outputs match real-data characteristics without
    leaking PII, running bias and fairness audits, and versioning artifacts in
    a data registry. Produces validated synthetic datasets and a data-card.
    Excludes model training itself.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:ml-engineer
    - target: role:data-engineer
  requires_skill_area:
    - target: skill-area:python-implementation
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:data-science
    - target: domain:ml-ops
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:ai-safety-guardrails
  performed_by_org_unit:
    - target: org-unit:ml-platform-team
    - target: org-unit:data-platform-team
---
nodeKind: Workflow
id: workflow:ai-model-license-compliance
attributes:
  displayName: "AI Model License Compliance"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Audits the licensing posture of all AI/ML models consumed or distributed by
    the organisation — cataloguing model provenance, verifying that open-weight
    license terms (e.g., Llama Community License, Apache-2.0, RAIL) permit the
    intended commercial use, checking for attribution and redistribution
    obligations, flagging models with unclear or viral clauses, and ensuring
    training-data provenance claims are documented. Produces a license
    compliance matrix and risk register. Excludes license negotiation.
edges:
  involves_role:
    - target: role:license-auditor
    - target: role:ai-champion
    - target: role:security-reviewer
  requires_skill_area:
    - target: skill-area:eval-driven-development
  applies_to_domain:
    - target: domain:ml-ops
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:dependency-audit
    - target: responsibility:ai-agent-adoption-strategy
  performed_by_org_unit:
    - target: org-unit:ai-enablement
    - target: org-unit:legal-team
