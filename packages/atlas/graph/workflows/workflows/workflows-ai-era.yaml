---
nodeKind: Workflow
id: workflow:ai-pair-programming-governance
attributes:
  displayName: "AI Pair-Programming Governance"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Evaluates the organisational posture around AI-assisted coding — reviewing
    which copilot tools are approved, auditing suggestion-acceptance rates vs
    defect introduction, verifying prompt-injection guardrails, checking that
    generated code passes the same review gates as human code, and ensuring
    intellectual-property attribution policies are followed. Produces a
    governance compliance scorecard and policy-gap remediation list. Excludes
    tool procurement negotiation.
edges:
  involves_role:
    - target: role:ai-champion
    - target: role:engineering-manager
    - target: role:security-reviewer
  requires_skill_area:
    - target: skill-area:prompt-engineering
    - target: skill-area:eval-driven-development
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:ml-ops
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:ai-agent-usage-review
    - target: responsibility:ai-safety-guardrails
  performed_by_org_unit:
    - target: org-unit:ai-enablement
    - target: org-unit:engineering-productivity
