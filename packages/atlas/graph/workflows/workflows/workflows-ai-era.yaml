nodeKind: Workflow
id: workflow:copilot-usage-review
attributes:
  displayName: "Copilot Usage Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Analyses seat-level and team-level usage metrics for AI coding assistants —
    measuring active-user ratios, lines-accepted vs lines-suggested, language
    and repository breakdown, identifying under-utilised seats, correlating
    copilot adoption with velocity and defect-rate changes, and benchmarking
    against industry baselines. Produces a usage report with license
    optimisation and enablement recommendations. Excludes tool-selection
    decisions.
edges:
  involves_role:
    - target: role:ai-champion
    - target: role:engineering-manager
    - target: role:cost-tracker
  requires_skill_area:
    - target: skill-area:prompt-engineering
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:ml-ops
  triggers_responsibility:
    - target: responsibility:ai-agent-usage-review
    - target: responsibility:cost-optimization
  performed_by_org_unit:
    - target: org-unit:ai-enablement
    - target: org-unit:engineering-productivity
