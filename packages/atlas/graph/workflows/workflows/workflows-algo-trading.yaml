id: workflow:market-making-parameter-tuning
attributes:
  displayName: "Market-Making Parameter Tuning"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: complex
  description: |
    Calibrates market-making strategy parameters for optimal risk-adjusted
    profitability — adjusting bid-ask spread widths based on realized
    volatility and inventory costs, tuning inventory position limits and
    skew functions, optimizing quoting speed and cancel-to-fill ratios,
    configuring adverse selection filters against toxic order flow, and
    setting per-symbol and aggregate risk thresholds. Produces parameter
    configuration updates and performance attribution showing spread
    capture versus inventory management costs. Excludes new instrument
    onboarding and exchange connectivity work.
