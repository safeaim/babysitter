id: workflow:hft-latency-profiling
attributes:
  displayName: "HFT Latency Profiling"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: complex
  description: |
    Performs microsecond-level latency analysis of the full order path in
    high-frequency trading systems — profiling network hop timings from
    co-location cage to exchange matching engine, measuring kernel-bypass
    and FPGA gating delays, analyzing tick-to-trade latency distributions
    across percentiles, identifying jitter sources in NIC timestamping and
    serialization, and benchmarking against competitive latency targets.
    Produces latency heat-maps, bottleneck reports, and hardware/software
    optimization recommendations. Excludes trading strategy logic and
    alpha signal research.
edges:
