---
nodeKind: Workflow
id: workflow:algorithm-benchmarking
attributes:
  displayName: "Algorithm Benchmarking"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-implementation"
  complexity: single-team
  description: |
    Benchmarks competing algorithm implementations against standardized
    datasets and hardware — measuring time complexity, space usage, cache
    behavior, and scalability curves; producing comparison reports with
    statistical significance analysis. Excludes algorithm design.
