nodeKind: Workflow
id: workflow:api-design-review
attributes:
  displayName: "API Design Review"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-api-change"
  complexity: single-team
  description: |
    Reviews proposed API surface changes against organizational design
    guidelines — checking naming conventions, pagination patterns, error
    formats, backward compatibility, and OpenAPI spec correctness before
    implementation begins. Excludes implementation and testing.
edges:
  involves_role:
    - target: role:staff-engineer
    - target: role:code-reviewer
    - target: role:tech-lead
