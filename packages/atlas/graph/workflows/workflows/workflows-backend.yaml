---
nodeKind: Workflow
id: workflow:microservice-decomposition
attributes:
  displayName: "Microservice Decomposition"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-initiative"
  complexity: cross-team
  description: |
    Analyzes a monolithic service to identify bounded contexts and extract
    them into independent microservices — modeling domain boundaries,
    defining API contracts, planning data ownership splits, and executing
    phased extraction with traffic mirroring. Excludes ongoing microservice
    maintenance.
edges:
  involves_role:
    - target: role:principal-engineer
    - target: role:staff-engineer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:monolith-vs-microservices
    - target: skill-area:monorepo-extraction
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:platform-engineering
  triggers_responsibility:
    - target: responsibility:approve-architecture
    - target: responsibility:write-rfc-documents
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:architecture-guild
