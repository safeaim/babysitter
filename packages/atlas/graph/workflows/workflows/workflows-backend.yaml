nodeKind: Workflow
id: workflow:event-driven-architecture-review
attributes:
  displayName: "Event-Driven Architecture Review"
  workflowKind: governance
  triggerType: on-demand
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews the event-driven architecture landscape — auditing event
    schemas, verifying consumer group lag, validating dead-letter queue
    handling, assessing event ordering guarantees, and ensuring schema
    registry governance. Excludes individual event handler development.
edges:
  involves_role:
    - target: role:staff-engineer
    - target: role:principal-engineer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:kafka-stream-processing
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:platform-engineering
  triggers_responsibility:
    - target: responsibility:run-architecture-review
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:architecture-guild
    - target: org-unit:engineering
