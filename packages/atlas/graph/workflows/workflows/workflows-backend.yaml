nodeKind: Workflow
id: workflow:backend-performance-profiling
attributes:
  displayName: "Backend Performance Profiling"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-regression"
  complexity: single-team
  description: |
    Investigates backend performance regressions — capturing flame graphs,
    tracing slow requests, profiling memory allocations, analyzing database
    query plans, and producing actionable optimization recommendations.
    Excludes frontend performance work.
edges:
  involves_role:
    - target: role:performance-profiler
    - target: role:debugger
    - target: role:implementer
  requires_skill_area:
