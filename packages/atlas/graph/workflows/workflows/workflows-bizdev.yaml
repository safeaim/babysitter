nodeKind: Workflow
id: workflow:strategic-alliance-performance-review
attributes:
  displayName: "Strategic Alliance Performance Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews performance of strategic alliance partnerships against agreed
    KPIs -- analyzing joint revenue attribution and revenue-share accuracy,
    evaluating joint roadmap delivery milestones, assessing co-marketing
    campaign ROI and lead quality, benchmarking alliance-sourced pipeline
    against direct channels, reviewing escalated support issues affecting the
    partner relationship, and identifying opportunities for deepening or
    restructuring the alliance. Produces quarterly alliance performance report
    and joint steering committee agenda. Excludes alliance contract
    renegotiation.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:business-development
    - target: domain:revenue-operations
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:cost-optimization
  performed_by_org_unit:
    - target: org-unit:bizdev-team
    - target: org-unit:partnerships-team
    - target: org-unit:revenue-operations-team
