nodeKind: Workflow
id: workflow:market-expansion-assessment
attributes:
  displayName: "Market Expansion Assessment"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Evaluates new market entry opportunities for geographic or vertical
    expansion -- analyzing total addressable market sizing and growth
    trajectories, mapping regulatory and compliance landscapes for target
    markets, assessing localization requirements including language, payments,
    and data residency, evaluating competitive intensity and incumbent
    positioning, modeling go-to-market cost structures and break-even
    timelines, identifying required local partnerships and distribution
    channels, and stress-testing expansion assumptions against scenario-based
    financial projections. Produces market expansion feasibility report and
    go/no-go recommendation. Excludes market entry execution.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:explorer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:business-development
    - target: domain:strategy
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:capacity-planning
    - target: responsibility:vendor-evaluation
  performed_by_org_unit:
    - target: org-unit:bizdev-team
    - target: org-unit:strategy-team
    - target: org-unit:finance-team
