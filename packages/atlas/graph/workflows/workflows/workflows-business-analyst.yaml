nodeKind: Workflow
id: workflow:business-case-development
attributes:
  displayName: "Business Case Development"
  workflowKind: governance
  triggerType: on-demand
  typicalCadence: "per-initiative"
  complexity: cross-team
  description: |
    Develops business cases for strategic initiatives and investment
    decisions -- conducting market sizing and competitive landscape
    analysis, building cost-benefit models with sensitivity analysis
    across optimistic, base, and pessimistic scenarios, calculating ROI,
    NPV, IRR, and payback period for proposed investments, identifying
    and quantifying risks with probability-weighted impact adjustments,
    gathering stakeholder input on strategic alignment and organizational
    readiness, and preparing executive-ready pitch decks with
    recommendation and alternatives analysis. Produces business case
    document, financial model, and stakeholder presentation. Excludes
    execution planning and budget allocation.
edges:
  involves_role:
    - target: role:business-analyst
    - target: role:data-analyst
    - target: role:planner
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:strategy
    - target: domain:finance
    - target: domain:project-management
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:write-rfc-documents
  performed_by_org_unit:
    - target: org-unit:strategy-team
    - target: org-unit:finance-team
---
nodeKind: Workflow
id: workflow:user-story-refinement-session
attributes:
  displayName: "User Story Refinement Session"
  workflowKind: development
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Refines backlog items into implementation-ready user stories --
    reviewing upcoming stories for clarity and completeness with the
    development team, defining acceptance criteria using Given-When-Then
    or equivalent structured formats, decomposing epics into
    appropriately sized stories that can be completed within a sprint,
    identifying technical dependencies, integration points, and
    prerequisite work, conducting estimation using story points or
    t-shirt sizing with the team, and flagging stories that require
    design spikes, architecture decisions, or stakeholder clarification.
    Produces refined user stories with acceptance criteria, estimates, and
    dependency map. Excludes sprint planning and task assignment.
edges:
  involves_role:
    - target: role:business-analyst
    - target: role:tech-lead
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:code-review-practice
  applies_to_domain:
    - target: domain:project-management
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:write-rfc-documents
    - target: responsibility:triage-incoming-issues
  performed_by_org_unit:
    - target: org-unit:product-team
    - target: org-unit:engineering
