---
nodeKind: Workflow
id: workflow:legacy-codebase-assessment
attributes:
  displayName: "Legacy Codebase Assessment"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-initiative"
  complexity: cross-team
  description: |
    Systematic evaluation of a legacy codebase to assess technical debt,
    identify modernization candidates, map dependency graphs, and produce
    a scored migration readiness report. Excludes the actual migration
    execution.
edges:
  involves_role:
    - target: role:principal-engineer
    - target: role:staff-engineer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:strangler-fig-pattern
    - target: skill-area:domain-driven-design
    - target: skill-area:c4-modeling
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:platform-engineering
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:adr-curation
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:architecture-guild
