nodeKind: Workflow
id: workflow:discord-community-management
attributes:
  displayName: "Discord Community Management"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Manages the Discord community server operations and engagement — designing
    and maintaining channel and category structure aligned with community
    topics and user journey stages, configuring bot automations for onboarding
    flows, role assignment, FAQ responses, and moderation actions, managing
    role hierarchies that reflect community contribution levels and access
    permissions, running engagement programs including weekly challenges, voice
    hangouts, and themed discussion threads, monitoring server health metrics
    including daily active users, message volume by channel, and voice
    participation rates, coordinating community champion and moderator
    volunteer programs with recognition rewards, managing integration with
    external tools for ticket creation, announcement syndication, and
    analytics, and reviewing server settings for security and anti-raid
    protections. Produces Discord engagement dashboards, channel activity
    reports, and bot effectiveness metrics. Excludes community strategy and
    cross-platform management.
