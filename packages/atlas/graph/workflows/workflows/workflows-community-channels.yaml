nodeKind: Workflow
id: workflow:community-gamification-design
attributes:
  displayName: "Community Gamification Design"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Designs and iterates on community gamification systems that drive
    meaningful engagement — defining badge and achievement taxonomies aligned
    with desired community behaviors including helping others, creating
    content, reporting bugs, and attending events, implementing tiered level
    systems with progression mechanics that reward sustained contribution over
    one-time activity, designing time-limited challenges and seasonal events
    that create urgency and community bonding moments, building leaderboard
    systems with multiple dimensions to avoid winner-take-all dynamics and
    encourage diverse participation, defining reward mechanics including
    digital recognition, physical swag, feature access, and exclusive event
    invitations, analyzing gamification system health through participation
    rates, completion percentages, and engagement lift measurements,
    identifying gaming or exploitation patterns and adjusting rules to maintain
    system integrity, and correlating gamification participation with long-term
    community retention and contribution depth. Produces gamification system
    health reports, engagement lift analyses, and reward economics dashboards.
    Excludes platform development and community strategy.
edges:
  involves_role:
    - target: role:devrel
    - target: role:product-designer
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:community-management
    - target: skill-area:data-analytics
  applies_to_domain:
    - target: domain:community
    - target: domain:digital-marketing
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:performance-budget-tracking
  performed_by_org_unit:
    - target: org-unit:community-team
    - target: org-unit:developer-relations-team
    - target: org-unit:design-team
