nodeKind: Workflow
id: workflow:community-feedback-to-product-loop
attributes:
  displayName: "Community Feedback to Product Loop"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Operates the structured feedback loop from community channels to product
    decisions — aggregating feature requests and pain points surfaced across
    forum posts, Discord discussions, GitHub issues, and social mentions into a
    unified feedback taxonomy, implementing community voting mechanisms that
    surface high-demand features with transparent priority signals, analyzing
    feedback volume and sentiment trends by product area to identify emerging
    unmet needs, coordinating bi-weekly feedback synthesis reviews with product
    managers where community signal informs backlog prioritization,
    communicating roadmap influence back to the community through public
    roadmap updates and shipped-feature attribution, tracking the percentage of
    shipped features that originated from community feedback, managing
    expectation setting when community requests conflict with product strategy,
    and maintaining a public feature request tracker with status updates.
    Produces community feedback digests, roadmap influence reports, and
    closed-loop communication metrics. Excludes product specification and
    development execution.
edges:
  involves_role:
    - target: role:devrel
    - target: role:product-designer
    - target: role:data-analyst
  requires_skill_area:
    - target: skill-area:community-management
    - target: skill-area:data-analytics
  applies_to_domain:
    - target: domain:community
    - target: domain:customer-experience
  triggers_responsibility:
    - target: responsibility:triage-incoming-issues
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:developer-relations-team
    - target: org-unit:product-team
    - target: org-unit:community-team
