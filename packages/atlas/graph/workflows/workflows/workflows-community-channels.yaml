attributes:
  displayName: "Developer Advocacy Content Pipeline"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Manages the end-to-end content production pipeline for developer
    advocacy — maintaining an editorial calendar of blog posts, conference
    talks, video tutorials, live streams, and code sample repositories aligned
    with product launches and community interest signals, coordinating content
    ideation through developer feedback analysis, trending topic monitoring,
    and search demand research, managing the writing and review workflow from
    outline through technical review through publication, producing demo
    applications and code samples that showcase real-world use cases with
    maintained, runnable repositories, coordinating conference CFP submissions
    and talk preparation including slide design and rehearsal scheduling,
    repurposing long-form content into social media threads, short videos, and
    community discussion starters, tracking content performance across views,
    engagement, and downstream developer activation, and maintaining a content
    inventory with refresh cadences for evergreen pieces. Produces content
    calendar dashboards, performance attribution reports, and pipeline velocity
    metrics. Excludes product documentation and marketing campaign content.
