id: workflow:hackathon-organization
attributes:
  displayName: "Hackathon Organization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Plans and executes community hackathons from concept through winner
    announcement — designing hackathon themes aligned with product capabilities
    and community interest areas, defining judging criteria with weighted
    rubrics covering innovation, technical execution, and practical
    applicability, sourcing and coordinating sponsors including prize
    allocation and brand visibility commitments, managing registration flows
    with team formation support and skill-matching for solo participants,
    preparing starter kits including API documentation, boilerplate code, and
    sandbox environments, coordinating day-of logistics including kickoff
    presentations, mentor office hours, and submission deadlines, running
    judging processes with diverse panels and structured evaluation workflows,
    producing post-event content showcasing winning projects with participant
    testimonials, and tracking hackathon outcomes including projects that
    evolve into integrations or community tools. Produces hackathon planning
    timelines, participant engagement reports, and post-event impact analyses.
    Excludes ongoing developer program management.
