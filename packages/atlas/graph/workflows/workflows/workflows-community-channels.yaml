  displayName: "Open Source Community Stewardship"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Stewards open source project community health and contributor
    engagement — designing contributor onboarding pathways from first issue to
    merged PR including good-first-issue curation and mentorship pairing,
    managing issue triage workflows with labeling conventions, priority
    assignments, and staleness policies, coordinating release communication
    including changelogs, migration guides, and deprecation notices across
    GitHub, blog, and social channels, reviewing and responding to RFCs and
    feature proposals from external contributors, maintaining contribution
    guidelines, code of conduct, and governance documentation, tracking
    contributor funnel metrics from star/fork through issue comment through PR
    submission, recognizing top contributors through release notes mentions and
    contributor spotlight programs, and managing the relationship between open
    source community needs and commercial product roadmap. Produces contributor
    funnel analytics, release communication plans, and community governance
    health reports. Excludes core development and commercial licensing
    decisions.
