attributes:
  displayName: "Forum Community Management"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Manages the community forum platform operations and quality — organizing
    category and tag taxonomies that enable discoverability and reduce
    duplicate posts, configuring moderation queues with automated spam
    detection and new-user post approval workflows, implementing reputation
    systems that reward quality contributions through trust levels and
    privileges, managing the unanswered question queue with staff response SLAs
    and community expert pings, tracking thread resolution rates and
    time-to-answer metrics by category, promoting high-quality posts to
    knowledge base articles or featured content, coordinating community expert
    programs where power users earn recognition for helping others, analyzing
    search patterns to identify content gaps where users seek but cannot find
    answers, and maintaining SEO optimization for forum content indexing and
    external discoverability. Produces forum health dashboards, unanswered
    question reports, and reputation system analytics. Excludes platform
    development and migration.
