id: workflow:user-group-chapter-management
attributes:
  displayName: "User Group Chapter Management"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Coordinates the network of local user group chapters and meetup
    programs — establishing chapter launch criteria including minimum local
    community size, volunteer leader identification, and regional market
    relevance, recruiting and onboarding chapter leaders with structured
    playbooks covering event planning, speaker sourcing, and community building
    best practices, coordinating meetup scheduling across chapters to avoid
    conflicts and enable cross-chapter speaker sharing, providing chapter
    leaders with swag budgets, venue sponsorship frameworks, and content
    packages, managing a speaker bureau that connects internal experts and
    community champions with chapter events, tracking chapter health metrics
    including attendance trends, new member acquisition, and leader engagement
    levels, facilitating cross-chapter knowledge sharing through leader
    community channels and quarterly syncs, and identifying underperforming
    chapters for intervention or graceful sunset. Produces chapter network
    dashboards, leader engagement reports, and geographic coverage analyses.
    Excludes individual event logistics and conference organization.
edges:
  involves_role:
