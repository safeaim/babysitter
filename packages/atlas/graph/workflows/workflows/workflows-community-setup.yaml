nodeKind: Workflow
id: workflow:community-ambassador-program-setup
attributes:
  displayName: "Community Ambassador Program Setup"
  workflowKind: onboarding
  triggerType: on-demand
  typicalCadence: "per-milestone"
  complexity: cross-team
  description: |
    Designs and launches a community ambassador or champions program -- defining
    ambassador selection criteria based on contribution history, expertise
    areas, and community standing, creating tiered program structure with clear
    expectations, benefits, and advancement paths, designing the application
    and nomination process with evaluation rubrics, building onboarding
    curriculum covering product knowledge, community values, and ambassador
    responsibilities, establishing reward and recognition systems including
    swag, early access, conference sponsorship, and public acknowledgment,
    creating communication channels and collaboration spaces for the ambassador
    cohort, defining activity tracking metrics and minimum participation
    thresholds, and building reporting dashboards to measure ambassador program
    impact on community growth and engagement. Produces program charter,
    selection criteria document, onboarding curriculum, and impact measurement
    framework. Excludes ambassador recruitment outreach.
edges:
  involves_role:
    - target: role:devrel
    - target: role:planner
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:community
    - target: domain:digital-marketing
  triggers_responsibility:
    - target: responsibility:onboard-new-engineer
    - target: responsibility:ai-knowledge-sharing
  performed_by_org_unit:
    - target: org-unit:community-team
    - target: org-unit:developer-relations-team
    - target: org-unit:devrel
