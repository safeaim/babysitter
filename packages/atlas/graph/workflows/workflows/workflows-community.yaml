nodeKind: Workflow
id: workflow:community-moderation-cycle
attributes:
  displayName: "Community Moderation Cycle"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Operates the ongoing moderation workflow across community platforms --
    reviewing flagged content against community guidelines with consistent
    enforcement criteria, processing reported posts through severity-tiered
    response protocols (warning, edit, removal, ban), managing appeal workflows
    with documented decision rationale and escalation to community leadership,
    monitoring automated moderation tool effectiveness including spam filters,
    toxicity detectors, and link scanners, tracking moderation action volumes
    and response times by platform and content type, identifying emerging policy
    gaps where existing guidelines do not clearly address new behavior patterns,
    coordinating with legal on content that raises intellectual property or
    liability concerns, and maintaining moderation decision logs for
    transparency reporting. Produces daily moderation queue summary, weekly
    enforcement statistics, and quarterly policy gap analysis. Excludes
    guideline authoring.
edges:
  involves_role:
    - target: role:devrel
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:prompt-engineering
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:community
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:triage-incoming-issues
    - target: responsibility:respond-incidents
  performed_by_org_unit:
    - target: org-unit:community-team
    - target: org-unit:developer-relations-team
