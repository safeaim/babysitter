nodeKind: Workflow
id: workflow:community-event-planning
attributes:
  displayName: "Community Event Planning"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Plans and coordinates community events across virtual and in-person formats
    -- identifying event opportunities aligned with community interests through
    topic polling and engagement signal analysis, defining event formats
    (meetups, hackathons, AMAs, workshops, conference talks) matched to
    community maturity and size, coordinating speaker sourcing from internal
    experts and community champions, managing event logistics including platform
    setup, registration, promotion timelines, and day-of facilitation, creating
    pre-event content and post-event recaps to maximize reach beyond live
    attendees, tracking registration-to-attendance conversion and post-event
    engagement lift, evaluating event ROI through attendee surveys, community
    growth attribution, and content consumption metrics, and maintaining an
    annual event calendar synchronized with product launches and industry
    conferences. Produces event planning briefs, post-event reports, and annual
    event calendar. Excludes venue procurement.
edges:
  involves_role:
    - target: role:devrel
    - target: role:planner
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:community
    - target: domain:digital-marketing
  triggers_responsibility:
