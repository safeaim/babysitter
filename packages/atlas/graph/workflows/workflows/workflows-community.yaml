---
nodeKind: Workflow
id: workflow:community-health-metrics-review
attributes:
  displayName: "Community Health Metrics Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Reviews community platform health and engagement metrics to guide community
    strategy -- analyzing monthly active users, daily active users, and
    lurker-to-contributor ratios across community channels (forum, Discord,
    Slack, GitHub Discussions), measuring response time distributions for
    community questions and comparing staff vs peer responses, tracking
    sentiment trends through automated and manual content analysis, evaluating
    content creation rates (posts, replies, code samples, tutorials) by member
    cohort, assessing new member activation rates from registration through
    first meaningful contribution, reviewing community-sourced bug reports and
    feature requests that translated into product changes, and benchmarking
    community health indicators against comparable developer communities.
    Produces monthly community health dashboard, engagement trend analysis, and
    strategic recommendation brief. Excludes community platform development.
edges:
  involves_role:
    - target: role:devrel
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:community
    - target: domain:digital-marketing
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:retro-facilitation
  performed_by_org_unit:
    - target: org-unit:community-team
    - target: org-unit:developer-relations-team
