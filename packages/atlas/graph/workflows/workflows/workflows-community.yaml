nodeKind: Workflow
id: workflow:developer-community-content-cycle
attributes:
  displayName: "Developer Community Content Cycle"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Manages the creation and distribution of developer-focused community
    content -- identifying high-demand topics through community question
    analysis, search analytics, and trending technology signals, coordinating
    content creation across tutorials, blog posts, code samples, video
    walkthroughs, and newsletter editions, managing community contributor
    submissions through editorial review and technical accuracy validation,
    scheduling content publication across channels (blog, documentation, social,
    newsletter, community forum) with appropriate cross-promotion, tracking
    content performance through views, engagement, share rates, and downstream
    community activity, maintaining a content backlog prioritized by community
    impact and strategic alignment, repurposing high-performing content into
    derivative formats, and curating community-generated content for
    amplification. Produces editorial calendar, content performance dashboard,
    and contributor acknowledgment reports. Excludes product documentation
    maintenance.
edges:
  involves_role:
    - target: role:devrel
    - target: role:technical-writer
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:community
    - target: domain:digital-marketing
  triggers_responsibility:
