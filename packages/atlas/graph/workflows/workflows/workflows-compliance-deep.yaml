nodeKind: Workflow
id: workflow:data-retention-review
attributes:
  displayName: "Data Retention Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Audits data retention policies across storage systems — verifying TTL
    enforcement, identifying data exceeding retention periods, validating
    archival pipelines, and ensuring deletion jobs complete within compliance
    windows. Excludes initial retention policy authoring.
edges:
  involves_role:
    - target: role:database-administrator
    - target: role:security-reviewer
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:postgres-tuning
  applies_to_domain:
    - target: domain:databases
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:security-review
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
