id: workflow:gdpr-data-subject-request
attributes:
  displayName: "GDPR Data Subject Request"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-request"
  complexity: cross-team
  description: |
    Processes data subject access, rectification, and deletion requests under
    GDPR — intake verification, data inventory lookup across systems,
    coordinated deletion or export, audit trail generation, and response
    within regulatory timelines. Excludes ongoing data governance policy
    design.
