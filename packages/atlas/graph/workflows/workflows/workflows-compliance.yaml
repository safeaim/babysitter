nodeKind: Workflow
id: workflow:privacy-impact-assessment
attributes:
  displayName: "Privacy Impact Assessment"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-feature"
  complexity: cross-team
  description: |
    Evaluates new features and data processing changes for privacy implications —
    data flow mapping, consent mechanism review, retention policy validation,
    and regulatory compliance verification. Excludes ongoing data governance.
edges:
