nodeKind: Workflow
id: workflow:access-control-audit
attributes:
  displayName: "Access Control Audit"
  workflowKind: security
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews and validates access permissions across systems — IAM policies,
    RBAC roles, service account privileges, and data access grants — removing
    stale access and enforcing least-privilege principles. Excludes initial access provisioning.
edges:
  involves_role:
    - target: role:security-reviewer
    - target: role:platform-engineer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:k8s-rbac
    - target: skill-area:oauth-flows
  applies_to_domain:
    - target: domain:security
    - target: domain:cybersecurity
  triggers_responsibility:
    - target: responsibility:security-review
    - target: responsibility:threat-modeling
  performed_by_org_unit:
    - target: org-unit:security-team
    - target: org-unit:application-security-team
