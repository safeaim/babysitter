nodeKind: Workflow
id: workflow:product-risk-analysis
attributes:
  displayName: "Product Risk Analysis"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Analyzes product liability, safety, and regulatory risk before major
    releases -- reviewing product changes against applicable safety
    standards and regulatory requirements, assessing product liability
    exposure from feature changes that could affect user safety or data
    integrity, evaluating accessibility and compliance impacts of UX
    changes, conducting failure mode and effects analysis for critical
    product functions, reviewing terms-of-service and privacy policy
    alignment with new capabilities, and documenting risk acceptance
    decisions with appropriate sign-off. Produces product risk
    assessment, FMEA worksheet, and regulatory compliance checklist.
    Excludes product development and legal contract drafting.
edges:
  involves_role:
    - target: role:business-analyst
    - target: role:operational-risk-analyst
    - target: role:security-reviewer
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:threat-modeling
  applies_to_domain:
    - target: domain:operations
    - target: domain:legal
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:security-review
  performed_by_org_unit:
    - target: org-unit:product-team
    - target: org-unit:legal-team
