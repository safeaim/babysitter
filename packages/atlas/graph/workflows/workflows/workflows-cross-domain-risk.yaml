nodeKind: Workflow
id: workflow:supply-chain-risk-monitoring
attributes:
  displayName: "Supply Chain Risk Monitoring"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Monitors supply chain disruption risks and activates contingency
    plans -- tracking supplier health indicators including financial
    stability, geopolitical exposure, and natural disaster proximity,
    monitoring lead-time variability and order-fulfillment rates against
    contracted SLAs, evaluating concentration risk across tier-1 and
    tier-2 suppliers, detecting early-warning signals from news feeds,
    trade-compliance databases, and logistics tracking systems, triggering
    contingency activation protocols when disruption probability exceeds
    thresholds, and coordinating alternate sourcing or buffer-stock
    drawdown decisions. Produces supply chain risk dashboard, disruption
    alerts, and contingency activation recommendations. Excludes
    procurement execution and contract renegotiation.
edges:
  involves_role:
    - target: role:operational-risk-analyst
    - target: role:data-analyst
    - target: role:planner
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:supply-chain
    - target: domain:logistics
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:vendor-evaluation
  performed_by_org_unit:
    - target: org-unit:procurement-team
    - target: org-unit:operations-team
