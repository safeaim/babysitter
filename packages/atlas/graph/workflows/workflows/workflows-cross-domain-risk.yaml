---
nodeKind: Workflow
id: workflow:project-risk-assessment
attributes:
  displayName: "Project Risk Assessment"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    Identifies and plans mitigation for project-level risks -- conducting
    structured risk identification workshops with project stakeholders
    using techniques like pre-mortem analysis and SWOT, scoring risks on
    likelihood and impact dimensions to populate the project risk
    register, categorizing risks as schedule, scope, resource, technical,
    or external, assigning risk owners and defining mitigation strategies
    (avoid, transfer, mitigate, accept), establishing risk monitoring
    triggers and escalation criteria, and reviewing risk register
    evolution at project milestone gates. Produces project risk register,
    mitigation plan, and risk monitoring dashboard. Excludes enterprise
    risk aggregation and portfolio-level risk assessment.
edges:
  involves_role:
    - target: role:operational-risk-analyst
    - target: role:business-analyst
    - target: role:planner
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:project-management
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:write-rfc-documents
  performed_by_org_unit:
    - target: org-unit:operations-team
    - target: org-unit:risk-management-team
