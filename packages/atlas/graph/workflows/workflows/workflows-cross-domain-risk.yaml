nodeKind: Workflow
id: workflow:climate-risk-physical-assessment
attributes:
  displayName: "Climate Risk Physical Assessment"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annually"
  complexity: cross-team
  description: |
    Assesses physical climate risk exposure across organizational assets
    and operations -- mapping asset locations against climate hazard
    projections for flooding, extreme heat, wildfire, storm surge, and
    water stress under RCP/SSP scenarios, quantifying financial exposure
    through asset damage, business interruption, and insurance cost
    models, evaluating supply chain vulnerability to climate-driven
    disruption in key sourcing regions, assessing workforce exposure to
    extreme heat and air quality risks, benchmarking adaptation readiness
    against TCFD and ISSB disclosure requirements, and prioritizing
    adaptation investments by risk-reduction effectiveness. Produces
    physical climate risk assessment, asset exposure heat maps, and
    adaptation investment recommendations. Excludes transition risk
    analysis and carbon accounting.
edges:
  involves_role:
    - target: role:operational-risk-analyst
    - target: role:data-scientist
    - target: role:business-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:sustainability-esg
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:esg-sustainability-team
    - target: org-unit:risk-management-team
