id: workflow:ai-powered-product-feature-review
attributes:
  displayName: "AI-Powered Product Feature Review"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Reviews AI-powered product features before release for quality,
    safety, and user experience -- evaluating model accuracy and latency
    on production-representative evaluation sets, reviewing prompt
    engineering and guardrail effectiveness against adversarial inputs,
    assessing user interface design for appropriate trust calibration and
    error communication, auditing data pipeline integrity from feature
    store to model serving, reviewing A/B test design and statistical
    methodology for measuring feature impact, evaluating PII handling
    and data retention in model inference logs, and stress-testing
    fallback behavior when model services degrade. Produces AI feature
    readiness report, safety evaluation summary, and user experience
    assessment. Excludes model training and UI implementation.
edges:
  involves_role:
    - target: role:ml-engineer
    - target: role:product-owner
    - target: role:security-reviewer
  requires_skill_area:
