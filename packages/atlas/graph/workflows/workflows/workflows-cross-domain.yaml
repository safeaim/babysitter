id: workflow:organization-wide-toolchain-audit
attributes:
  displayName: "Organization-Wide Toolchain Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Audits the engineering toolchain across the organization for
    redundancy, cost, security, and effectiveness -- inventorying all
    developer tools, SaaS subscriptions, and internal platforms with
    ownership and cost attribution, identifying overlapping tools serving
    the same function across different teams, evaluating license
    utilization rates against contract commitments, auditing tool
    security posture including SSO integration, API key management, and
    data residency compliance, reviewing tool deprecation and migration
    plans for end-of-life products, assessing observability and
    monitoring tool coverage gaps, and surveying developer satisfaction
    and adoption metrics for each toolchain category. Produces toolchain
    inventory, consolidation opportunity analysis, cost optimization
    recommendations, and security compliance report. Excludes tool
    procurement and migration execution.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:security-reviewer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:container-security
    - target: skill-area:identity-security
  applies_to_domain:
    - target: domain:platform-engineering
    - target: domain:devops
    - target: domain:security
    - target: domain:observability
  triggers_responsibility:
