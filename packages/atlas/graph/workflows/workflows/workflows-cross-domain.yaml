nodeKind: Workflow
id: workflow:full-stack-system-reliability-review
attributes:
  displayName: "Full-Stack System Reliability Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews end-to-end system reliability across the full technology
    stack -- analyzing frontend error rates, API latency percentiles,
    and database query performance together as correlated signals,
    evaluating SLO attainment across web, API, and data tiers, reviewing
    cloud infrastructure capacity headroom and auto-scaling policy
    effectiveness, auditing observability coverage for blind spots in
    tracing, logging, and metrics pipelines, assessing CI/CD pipeline
    reliability and deployment success rates, stress-testing failover
    procedures across availability zones, and correlating incident
    frequency with recent change velocity. Produces cross-stack
    reliability scorecard, SLO attainment report, and prioritized
    hardening backlog. Excludes feature development.
edges:
  involves_role:
    - target: role:staff-engineer
    - target: role:platform-engineer
    - target: role:incident-commander
  requires_skill_area:
    - target: skill-area:sli-slo-management
    - target: skill-area:observability-pipeline
    - target: skill-area:chaos-engineering
  applies_to_domain:
    - target: domain:web-development
    - target: domain:databases
    - target: domain:cloud-infra
    - target: domain:observability
    - target: domain:devops
  triggers_responsibility:
    - target: responsibility:slo-definition
    - target: responsibility:capacity-planning
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:infra-engineering
    - target: org-unit:incident-response-team
