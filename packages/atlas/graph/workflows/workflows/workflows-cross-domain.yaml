id: workflow:enterprise-data-platform-health-check
attributes:
  displayName: "Enterprise Data Platform Health Check"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Assesses the health of the enterprise data platform across
    ingestion, storage, processing, and serving layers -- evaluating
    ETL/ELT pipeline freshness and failure rates, auditing data
    warehouse query performance and cost trends, reviewing ML feature
    store consistency and staleness metrics, assessing data catalog
    coverage and metadata accuracy, analyzing data quality rule pass
    rates across critical business entities, evaluating observability of
    data pipelines including lineage completeness and anomaly detection
    coverage, and benchmarking platform SLAs against consumer
    satisfaction surveys. Produces data platform health scorecard, cost
    efficiency analysis, and improvement roadmap. Excludes new pipeline
    development.
