id: workflow:developer-productivity-index-review
attributes:
  displayName: "Developer Productivity Index Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews developer productivity metrics across the engineering
    organization -- analyzing DORA metrics (deployment frequency, lead
    time, change failure rate, MTTR) by team and service, evaluating
    developer experience survey results covering toolchain satisfaction,
    cognitive load, and flow-state frequency, reviewing build and CI
    pipeline wait times and flakiness rates, assessing internal developer
    platform adoption and self-service success rates, measuring code
    review cycle time and feedback quality indicators, evaluating
    observability tool usage patterns and mean-time-to-debug trends, and
    benchmarking productivity metrics against industry cohorts. Produces
    developer productivity index report, toolchain friction analysis, and
    improvement initiative recommendations. Excludes tooling
    implementation.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:platform-engineer
    - target: role:staff-engineer
  requires_skill_area:
