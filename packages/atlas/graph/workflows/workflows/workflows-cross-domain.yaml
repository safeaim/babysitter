id: workflow:end-to-end-customer-journey-audit
attributes:
  displayName: "End-to-End Customer Journey Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Audits the complete customer journey from acquisition to retention --
    mapping touchpoint performance across marketing campaigns,
    website/app conversion funnels, sales engagement sequences,
    onboarding flows, and post-purchase support interactions, analyzing
    drop-off rates and friction points at each journey stage, evaluating
    cross-channel attribution model accuracy, reviewing NPS and CSAT
    trends correlated with journey stage and customer segment, assessing
    personalization engine effectiveness across touchpoints, auditing
    data handoff integrity between marketing, sales, and customer
    success systems, and modeling customer lifetime value by acquisition
    cohort. Produces customer journey health map, friction point
    inventory, and cross-functional improvement priorities. Excludes
    campaign or feature development.
