nodeKind: Workflow
id: workflow:technical-debt-portfolio-review
attributes:
  displayName: "Technical Debt Portfolio Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews and prioritizes the organization-wide technical debt
    portfolio -- inventorying debt items from static analysis findings,
    deprecated dependency usage, and architecture deviation records,
    quantifying debt impact through incident correlation, developer
    velocity drag, and security exposure metrics, classifying debt by
    type (code, architecture, infrastructure, data, test) and ownership,
    evaluating debt interest rate by measuring how each item compounds
    maintenance costs over time, reviewing debt payment progress against
    quarterly reduction targets, assessing the ratio of debt-reducing
    work to feature work across teams, and modeling paydown scenarios
    with estimated velocity improvement projections. Produces technical
    debt inventory, impact-prioritized paydown roadmap, and quarterly
    progress report. Excludes debt remediation implementation.
edges:
  involves_role:
    - target: role:staff-engineer
    - target: role:engineering-manager
    - target: role:principal-engineer
  requires_skill_area:
    - target: skill-area:dead-code-elimination
    - target: skill-area:dependency-upgrade-strategies
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:databases
    - target: domain:web-development
    - target: domain:devops
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:cost-optimization
    - target: responsibility:dx-tooling-maintenance
  performed_by_org_unit:
    - target: org-unit:architecture-guild
    - target: org-unit:engineering
    - target: org-unit:engineering-productivity
