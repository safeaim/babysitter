id: workflow:product-launch-readiness
attributes:
  displayName: "Product Launch Readiness"
  workflowKind: release
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Evaluates cross-functional readiness for a product launch across
    engineering, marketing, and security -- validating web and mobile
    feature completeness against launch criteria, reviewing marketing
    campaign asset readiness and channel activation schedules, assessing
    customer support team training completion and knowledge base
    coverage, auditing security posture including penetration test
    findings and vulnerability remediation status, evaluating load test
    results against expected launch traffic projections, verifying
    analytics instrumentation for launch KPI measurement, and conducting
    go/no-go checklist review with all stakeholder teams. Produces
    launch readiness scorecard, risk register, and go/no-go
    recommendation. Excludes feature development and campaign execution.
edges:
  involves_role:
    - target: role:product-owner
    - target: role:staff-engineer
    - target: role:engineering-manager
  requires_skill_area:
