nodeKind: Workflow
id: workflow:multi-cloud-migration-assessment
attributes:
  displayName: "Multi-Cloud Migration Assessment"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-milestone"
  complexity: cross-team
  description: |
    Assesses workload readiness and risk for multi-cloud migration --
    inventorying application dependencies and cloud-service bindings for
    portability analysis, evaluating network architecture requirements
    including inter-cloud connectivity, latency budgets, and data egress
    costs, reviewing security posture translation across cloud provider
    IAM models and encryption key management, assessing database
    migration complexity including schema compatibility and data transfer
    volume estimation, benchmarking target cloud service equivalents for
    compute, storage, and managed services, modeling total cost of
    ownership under multi-cloud vs single-cloud scenarios, and mapping
    regulatory data residency constraints to target deployment regions.
    Produces migration readiness scorecard, workload placement matrix,
    and risk-prioritized migration wave plan. Excludes migration
    execution.
edges:
  involves_role:
    - target: role:cloud-architect
    - target: role:staff-engineer
    - target: role:platform-engineer
  requires_skill_area:
    - target: skill-area:terraform-infrastructure
    - target: skill-area:network-security
    - target: skill-area:containerization
  applies_to_domain:
    - target: domain:cloud-infra
    - target: domain:networking
    - target: domain:security
    - target: domain:devops
    - target: domain:databases
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:capacity-planning
    - target: responsibility:cost-optimization
  performed_by_org_unit:
    - target: org-unit:infra-engineering
    - target: org-unit:engineering
    - target: org-unit:security-team
