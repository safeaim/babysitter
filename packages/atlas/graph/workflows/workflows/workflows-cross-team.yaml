---
nodeKind: Workflow
id: workflow:post-incident-review
attributes:
  displayName: "Post-Incident Review"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-incident"
  complexity: cross-team
  description: |
    Conducts blameless post-incident reviews spanning all involved teams —
    timeline reconstruction, root-cause analysis, action item assignment,
    systemic pattern identification, and remediation tracking. Excludes real-time incident response.
edges:
  involves_role:
    - target: role:incident-commander
    - target: role:engineering-manager
    - target: role:staff-engineer
    - target: role:principal-engineer
  requires_skill_area:
    - target: skill-area:incident-response
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:observability
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:postmortem-writeup
    - target: responsibility:retro-facilitation
    - target: responsibility:run-architecture-review
  performed_by_org_unit:
    - target: org-unit:incident-response-team
    - target: org-unit:engineering
    - target: org-unit:product-team
