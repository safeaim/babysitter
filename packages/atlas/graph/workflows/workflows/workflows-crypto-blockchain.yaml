---
nodeKind: Workflow
id: workflow:key-ceremony
attributes:
  displayName: "Key Ceremony"
  workflowKind: security
  triggerType: scheduled
  typicalCadence: "annual"
  complexity: cross-team
  description: |
    Executes a formal cryptographic key generation or rotation ceremony —
    preparing the secure environment, gathering authorized key custodians,
    generating key material with auditable entropy, splitting or escrowing
    secrets, and recording the ceremony log. Excludes day-to-day secret
    rotation.
edges:
  involves_role:
    - target: role:security-reviewer
    - target: role:principal-engineer
    - target: role:platform-engineer
  requires_skill_area:
    - target: skill-area:secrets-rotation
  applies_to_domain:
    - target: domain:cybersecurity
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:secret-rotation-cadence
    - target: responsibility:security-review
  performed_by_org_unit:
    - target: org-unit:security-team
    - target: org-unit:platform-team
---
nodeKind: Workflow
id: workflow:smart-contract-audit
attributes:
  displayName: "Smart Contract Audit"
  workflowKind: security
  triggerType: on-demand
  typicalCadence: "per-deployment"
  complexity: single-team
  description: |
    Audits smart contract code for correctness, security vulnerabilities,
    gas optimization, and compliance — running static analysis, fuzzing,
    formal verification checks, and producing a findings report with
    severity ratings. Excludes contract development.
edges:
  involves_role:
    - target: role:security-reviewer
    - target: role:code-reviewer
  requires_skill_area:
    - target: skill-area:typescript-generic-programming
  applies_to_domain:
    - target: domain:cybersecurity
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:security-review
    - target: responsibility:run-security-scans
  performed_by_org_unit:
    - target: org-unit:security-team
    - target: org-unit:application-security-team
---
nodeKind: Workflow
id: workflow:cryptographic-library-upgrade
attributes:
  displayName: "Cryptographic Library Upgrade"
  workflowKind: security
  triggerType: event-driven
  typicalCadence: "per-advisory"
  complexity: cross-team
  description: |
    Coordinates the upgrade of cryptographic libraries across services
    after vulnerability disclosure or algorithm deprecation — inventorying
    usage, testing compatibility, scheduling coordinated rollout, and
    verifying no regressions in TLS handshakes or signature validation.
    Excludes general dependency upgrades.
edges:
  involves_role:
    - target: role:security-reviewer
    - target: role:dependency-updater
    - target: role:platform-engineer
  requires_skill_area:
    - target: skill-area:secrets-rotation
    - target: skill-area:oauth-flows
  applies_to_domain:
    - target: domain:cybersecurity
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:dependency-audit
    - target: responsibility:upgrade-dependencies-weekly
  performed_by_org_unit:
    - target: org-unit:security-team
    - target: org-unit:engineering
