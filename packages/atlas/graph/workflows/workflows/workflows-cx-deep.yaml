nodeKind: Workflow
id: workflow:customer-segmentation-review
attributes:
  displayName: "Customer Segmentation Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews and refreshes customer segmentation models to ensure they accurately
    represent behavioral and value-based groupings -- re-running clustering
    algorithms on updated usage, engagement, and revenue data, validating
    segment stability by comparing current assignments against prior period
    segments, assessing segment actionability by measuring whether
    differentiated strategies produce statistically different outcomes across
    segments, reviewing persona documentation for alignment with quantitative
    segment profiles, evaluating segment-specific churn and expansion rates to
    validate predictive power, testing new segmentation dimensions (product
    usage patterns, support interaction frequency, feature adoption velocity)
    for incremental explanatory value, and reconciling segment definitions
    across marketing, sales, and customer success teams. Produces segmentation
    refresh report, persona alignment assessment, and segment performance
    comparison. Excludes campaign design.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:data-quality
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:customer-relations
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:cost-optimization
  performed_by_org_unit:
    - target: org-unit:customer-success
    - target: org-unit:support-team
