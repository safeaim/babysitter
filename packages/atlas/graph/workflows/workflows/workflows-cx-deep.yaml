nodeKind: Workflow
id: workflow:voice-of-customer-synthesis
attributes:
  displayName: "Voice of Customer Synthesis"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Aggregates and synthesizes customer feedback from all channels into
    actionable insights -- ingesting data from NPS surveys, CSAT responses,
    support ticket sentiment, social media mentions, app store reviews, sales
    call transcripts, and community forum posts, applying topic modeling and
    sentiment analysis to extract recurring themes, scoring theme urgency by
    frequency, sentiment intensity, and customer-tier weighting, deduplicating
    themes against known product backlog items, mapping feedback themes to
    product areas and journey stages, tracking theme trend trajectories over
    time to distinguish persistent issues from transient spikes, and packaging
    insights into structured briefs for product, engineering, and leadership
    audiences. Produces monthly VoC report, theme trend dashboard, and
    product-area feedback digest. Excludes product roadmap decisions.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:product-designer
    - target: role:planner
  requires_skill_area:
    - target: skill-area:prompt-engineering
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:customer-relations
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:triage-incoming-issues
  performed_by_org_unit:
    - target: org-unit:customer-success
    - target: org-unit:support-team
