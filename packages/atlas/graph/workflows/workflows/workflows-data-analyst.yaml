nodeKind: Workflow
id: workflow:dashboard-development-cycle
attributes:
  displayName: "Dashboard Development Cycle"
  workflowKind: data
  triggerType: on-demand
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    Develops data dashboards from requirements through stakeholder
    acceptance -- gathering dashboard requirements including target
    audience, key questions, and decision contexts, designing data models
    and semantic layers that support required aggregations and
    drill-downs, selecting visualization types that effectively
    communicate each metric, building interactive dashboard prototypes
    and conducting usability reviews with stakeholders, implementing data
    refresh pipelines and access controls, validating metric accuracy
    against source-of-truth systems, and documenting dashboard usage
    guidance and metric definitions. Produces dashboard, data model
    documentation, and metric glossary. Excludes data infrastructure
    provisioning and ETL pipeline development.
edges:
  involves_role:
    - target: role:data-analyst
    - target: role:data-scientist
    - target: role:product-designer
  requires_skill_area:
