nodeKind: Workflow
id: workflow:data-quality-investigation
attributes:
  displayName: "Data Quality Investigation"
  workflowKind: data
  triggerType: event-driven
  typicalCadence: "per-incident"
  complexity: cross-team
  description: |
    Investigates data quality anomalies and drives remediation --
    triaging data quality alerts from automated monitoring or stakeholder
    reports, profiling affected datasets to characterize anomaly scope
    and impact, tracing root cause through data lineage from source
    systems through transformation layers, assessing downstream impact on
    reports, dashboards, and business decisions, implementing corrective
    data fixes and validating against expected values, recommending
    preventive controls including schema validation, freshness checks,
    and distribution monitoring, and communicating impact assessment and
    remediation timeline to affected stakeholders. Produces root-cause
    analysis, impact assessment, and prevention recommendations. Excludes
    data pipeline refactoring and monitoring tool configuration.
edges:
  involves_role:
    - target: role:data-analyst
    - target: role:data-engineer
    - target: role:business-analyst
  requires_skill_area:
    - target: skill-area:data-quality
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:data-engineering
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:postmortem-writeup
  performed_by_org_unit:
    - target: org-unit:data-platform-team
    - target: org-unit:data-governance-team
---
nodeKind: Workflow
id: workflow:metrics-definition-alignment
attributes:
  displayName: "Metrics Definition Alignment"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Aligns business metric definitions across the organization --
    inventorying metrics in use across teams and identifying naming
    collisions and calculation discrepancies, facilitating
    cross-functional workshops to agree on canonical metric definitions,
    documenting metric specifications including business logic, data
    sources, grain, and refresh cadence, establishing a governed metrics
    catalog with ownership and change-control processes, validating that
    BI tools and dashboards reference the canonical definitions
    consistently, and auditing metric implementations against
    specifications to detect drift. Produces canonical metrics catalog,
    metric specification documents, and audit findings. Excludes metric
    implementation in BI tools and data model changes.
edges:
  involves_role:
    - target: role:data-analyst
    - target: role:business-analyst
    - target: role:planner
  requires_skill_area:
    - target: skill-area:data-quality
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:business-intelligence
    - target: domain:knowledge-management
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:adr-curation
  performed_by_org_unit:
    - target: org-unit:data-governance-team
    - target: org-unit:analytics-team
