---
nodeKind: Workflow
id: workflow:ad-hoc-analysis-request-cycle
attributes:
  displayName: "Ad-Hoc Analysis Request Cycle"
  workflowKind: data
  triggerType: on-demand
  typicalCadence: "per-request"
  complexity: single-team
  description: |
    Manages the end-to-end lifecycle of ad-hoc data analysis requests --
    receiving and triaging incoming analysis requests from stakeholders,
    scoping effort and clarifying business questions and success criteria,
    identifying data sources and assessing data availability and quality,
    performing exploratory data analysis and statistical testing,
    synthesizing findings into actionable insights with visualizations,
    delivering results through presentations or self-service notebooks,
    and conducting follow-up sessions to validate interpretation and
    identify next steps. Produces analysis deliverable, insight summary,
    and follow-up action items. Excludes recurring report automation and
    dashboard development.
edges:
  involves_role:
    - target: role:data-analyst
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:postgres-tuning
  applies_to_domain:
    - target: domain:business-intelligence
    - target: domain:data-science
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:slo-definition
  performed_by_org_unit:
    - target: org-unit:analytics-team
    - target: org-unit:business-intelligence-team
