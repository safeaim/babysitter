---
nodeKind: Workflow
id: workflow:data-mesh-domain-ownership-review
attributes:
  displayName: "Data Mesh Domain Ownership Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews and refines domain ownership boundaries in a data mesh architecture —
    auditing each domain's data product catalog for completeness and
    discoverability, verifying that domain teams have clear ownership of their
    analytical and operational data products, evaluating cross-domain data
    contract adherence and SLA compliance, identifying orphaned datasets without
    an accountable domain owner, assessing the federated governance layer for
    policy consistency across domains, and recommending boundary adjustments when
    organizational or product changes shift data ownership. Produces domain
    ownership maps, data product maturity scorecards, and governance policy
    compliance reports. Excludes data platform infrastructure changes.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:principal-engineer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:data-governance
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:data-engineering
    - target: domain:data-science
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:run-architecture-review
  performed_by_org_unit:
    - target: org-unit:data-governance-team
    - target: org-unit:data-platform-team
