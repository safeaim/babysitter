nodeKind: Workflow
id: workflow:data-warehouse-schema-governance
attributes:
  displayName: "Data Warehouse Schema Governance"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Governs schema changes to the shared data warehouse — requiring schema change
    proposals with impact analysis before DDL execution, validating naming
    conventions and type standards against the warehouse style guide, running
    backward-compatibility checks to ensure existing dashboards and downstream
    consumers remain functional, coordinating migration windows with dependent
    teams, maintaining a schema changelog with version tags, and enforcing
    column-level documentation requirements for discoverability. Produces schema
    change review records, compatibility test results, and warehouse schema
    documentation updates. Excludes ETL pipeline modifications.
edges:
  involves_role:
    - target: role:database-administrator
    - target: role:data-scientist
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:data-warehouse-modeling
    - target: skill-area:database-migrations-zero-downtime
  applies_to_domain:
    - target: domain:data-engineering
    - target: domain:databases
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:data-governance-team
    - target: org-unit:database-team
