nodeKind: Workflow
id: workflow:data-access-request-workflow
attributes:
  displayName: "Data Access Request Workflow"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Manages and audits data access grants across the organization — processing
    access requests through a structured intake form capturing business
    justification, data classification level, and intended use, routing approvals
    to data stewards and security reviewers based on sensitivity tier,
    provisioning access through role-based grants with automatic expiration
    dates, logging all grant and revoke events for compliance audit trails,
    conducting periodic access recertification campaigns to remove stale
    permissions, and generating compliance reports for SOC 2 and GDPR data
    access controls. Produces access request audit logs, recertification campaign
    results, and compliance posture reports. Excludes data classification
    tagging.
edges:
  involves_role:
    - target: role:security-reviewer
    - target: role:database-administrator
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:data-governance
    - target: skill-area:k8s-rbac
  applies_to_domain:
    - target: domain:data-engineering
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:security-review
  performed_by_org_unit:
    - target: org-unit:data-governance-team
    - target: org-unit:security-team
