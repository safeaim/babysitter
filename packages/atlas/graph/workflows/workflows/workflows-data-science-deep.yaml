nodeKind: Workflow
id: workflow:dataset-versioning-governance
attributes:
  displayName: "Dataset Versioning Governance"
  workflowKind: governance
  triggerType: continuous
  typicalCadence: "continuous"
  complexity: cross-team
  description: |
    Governs the versioning lifecycle of ML training and evaluation datasets —
    enforcing DVC or LakeFS versioning policies, validating that dataset
    lineage metadata tracks transformations and source provenance, auditing
    storage deduplication, managing access controls per dataset sensitivity
    tier, and ensuring reproducibility by linking model artifacts to exact
    dataset versions. Excludes dataset creation and labeling.
edges:
  involves_role:
    - target: role:ml-engineer
    - target: role:data-scientist
    - target: role:platform-engineer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:ml-fine-tuning
  applies_to_domain:
    - target: domain:data-science
    - target: domain:ml-ops
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:ml-platform-team
    - target: org-unit:data-platform-team
