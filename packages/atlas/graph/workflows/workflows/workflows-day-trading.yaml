nodeKind: Workflow
id: workflow:pre-market-preparation-routine
attributes:
  displayName: "Pre-Market Preparation Routine"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: simple
  description: |
    Executes systematic pre-market preparation before each trading
    session — scanning the trading universe for overnight earnings, M&A
    announcements, and macro data releases, reviewing pre-market price
    action and volume for gap analysis, checking economic calendar events
    and central bank communications, setting key support/resistance levels
    and price alerts on watchlist instruments, reviewing overnight
    developments in correlated markets (Asia/Europe session), and
    confirming system readiness (connectivity, buying power, margin).
    Produces daily preparation checklists, watchlist with annotated
    levels, and risk exposure summaries. Excludes trade execution and
    position management.
edges:
  involves_role:
    - target: role:portfolio-manager
    - target: role:research-analyst
  requires_skill_area:
