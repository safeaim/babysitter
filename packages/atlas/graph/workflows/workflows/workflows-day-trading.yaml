---
nodeKind: Workflow
id: workflow:day-trading-journal-review
attributes:
  displayName: "Day Trading Journal Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: simple
  description: |
    Reviews discretionary trading journal entries for performance
    improvement — analyzing trade entries and exits against documented
    setup criteria, evaluating position sizing discipline relative to
    account risk rules, reviewing psychological state annotations (FOMO,
    revenge trading, overconfidence) against outcome data, comparing
    planned versus actual risk-reward ratios, and identifying recurring
    pattern violations or setup-type performance divergences. Produces
    weekly review summaries with pattern recognition insights, rule
    violation counts, and setup-specific win-rate statistics. Excludes
    strategy development and market analysis.
edges:
  involves_role:
    - target: role:quantitative-analyst
    - target: role:portfolio-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:capital-markets
    - target: domain:algorithmic-trading
  triggers_responsibility:
    - target: responsibility:risk-reporting
  performed_by_org_unit:
    - target: org-unit:trading-desk
