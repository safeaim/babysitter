nodeKind: Workflow
id: workflow:trading-performance-attribution
attributes:
  displayName: "Trading Performance Attribution"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: moderate
  description: |
    Analyzes trading performance across multiple dimensions — calculating
    win-rate, profit factor, and average risk-reward ratios by strategy
    type, decomposing returns into timing, selection, and sizing
    components, computing max drawdown duration and recovery statistics,
    measuring risk-adjusted returns (Sharpe, Sortino, Calmar) across
    rolling windows, comparing realized performance against benchmark
    indices and peer strategies, and identifying performance clustering by
    market regime, time-of-day, and instrument type. Produces performance
    attribution reports, equity curve analysis, and strategy comparison
    matrices. Excludes strategy modification and trade execution.
edges:
  involves_role:
    - target: role:quantitative-analyst
    - target: role:portfolio-manager
    - target: role:risk-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:capital-markets
    - target: domain:quantitative-finance
    - target: domain:portfolio-management
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:portfolio-rebalancing
  performed_by_org_unit:
    - target: org-unit:portfolio-management-team
    - target: org-unit:trading-desk
