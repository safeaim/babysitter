id: workflow:embedded-ota-rollback-testing
attributes:
  displayName: "Embedded OTA Rollback Testing"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: single-team
  description: |
    Tests over-the-air firmware update and rollback mechanisms for embedded
    devices -- validating OTA package signing and integrity verification on
    target hardware, simulating network interruptions at each download stage
    to confirm resume-capability, testing atomic update application with
    automatic rollback on boot-failure detection, verifying A/B partition
    switching under power-loss scenarios, measuring update-time budgets
    against field-deployment constraints, validating rollback preserves user
    configuration and calibration data, testing fleet-wide staged-rollout
    gating with canary device cohorts, and confirming telemetry reporting of
    update success and failure states. Produces OTA rollback test report and
    firmware-update certification record. Excludes OTA server infrastructure
    design.
edges:
  involves_role:
    - target: role:staff-engineer
    - target: role:implementer
  requires_skill_area:
    - target: skill-area:firmware-development
    - target: skill-area:bootloader-design
  applies_to_domain:
