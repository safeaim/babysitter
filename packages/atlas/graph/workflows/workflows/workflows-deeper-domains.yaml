id: workflow:ci-cd-pipeline-migration
attributes:
  displayName: "CI/CD Pipeline Migration"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    Migrates CI/CD pipelines between platforms or architectures -- auditing
    current pipeline configurations, build scripts, and artifact registries
    to produce a complete migration inventory, mapping source-platform
    primitives to target-platform equivalents, redesigning pipeline stages to
    leverage target-platform native capabilities, implementing parallel-run
    validation where both old and new pipelines execute simultaneously,
    migrating secrets and environment variables with rotation, validating
    artifact-signing and provenance chains in the new system, conducting team
    training on the target platform, and executing a phased cutover with
    rollback readiness. Produces migration plan, parallel-run validation
    report, and cutover runbook. Excludes pipeline feature development.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:staff-engineer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:gitops
    - target: skill-area:containerization
  applies_to_domain:
    - target: domain:devops
    - target: domain:software-engineering
  triggers_responsibility:
