id: workflow:open-source-security-disclosure
attributes:
  displayName: "Open Source Security Disclosure"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-vulnerability"
  complexity: cross-team
  description: |
    Manages responsible security-vulnerability disclosure for open-source
    projects the organization maintains -- receiving and triaging inbound
    vulnerability reports through the security-contact channel, reproducing
    and severity-scoring reported vulnerabilities using CVSS, developing
    patches in private forks with minimal information leakage, coordinating
    disclosure timelines with reporters and downstream distributors,
    preparing security advisories with CVE-ID assignment, releasing patched
    versions with coordinated announcement across mailing lists and GitHub
    advisories, and conducting retrospective analysis to identify systemic
    vulnerability patterns. Produces security advisory, patched release, and
    vulnerability retrospective. Excludes ongoing security scanning.
edges:
