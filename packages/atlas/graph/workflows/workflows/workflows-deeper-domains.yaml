nodeKind: Workflow
id: workflow:api-rate-limiting-tuning
attributes:
  displayName: "API Rate Limiting Tuning"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "monthly"
  complexity: single-team
  description: |
    Tunes API rate-limiting configurations to balance abuse prevention with
    legitimate traffic needs -- analyzing request-rate distributions across
    API consumers to identify percentile thresholds, reviewing 429-response
    incidence and correlating with customer-impact tickets, evaluating
    burst-allowance and sliding-window parameters against traffic-spike
    patterns, load-testing proposed rate-limit changes in staging with
    synthetic client profiles, configuring per-endpoint and per-tier
    differentiated limits, updating rate-limit response headers and developer
    documentation, and monitoring post-deployment metrics for false-positive
    throttling. Produces rate-limit configuration change record and impact
    analysis. Excludes API architecture redesign.
edges:
  involves_role:
    - target: role:staff-engineer
    - target: role:platform-engineer
  requires_skill_area:
    - target: skill-area:rate-limiting
    - target: skill-area:web-performance
  applies_to_domain:
    - target: domain:web-development
    - target: domain:platform-engineering
  triggers_responsibility:
    - target: responsibility:performance-budget-tracking
    - target: responsibility:slo-definition
  performed_by_org_unit:
    - target: org-unit:platform-team
    - target: org-unit:engineering
