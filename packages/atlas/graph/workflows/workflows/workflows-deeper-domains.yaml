id: workflow:game-localization-pipeline
attributes:
  displayName: "Game Localization Pipeline"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Manages the end-to-end game localization pipeline for multi-language
    releases -- extracting translatable strings from game scripts, UI
    elements, and in-game item databases, routing content to translation
    teams with context screenshots and character-limit annotations, managing
    localization-kit handoffs for voice-over recording sessions, integrating
    translated assets back into the build pipeline with automated
    string-length and encoding validation, conducting linguistic QA
    playthroughs in each target locale, verifying text-rendering for CJK and
    RTL scripts, and coordinating localization-complete milestones with
    release scheduling. Produces localized build artifacts and linguistic QA
    sign-off reports. Excludes culturalization and market-specific content
    adaptation.
