attributes:
  displayName: "Network Topology Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews network topology design and configuration for performance,
    resilience, and security alignment -- auditing VLAN segmentation and
    subnet allocation against zero-trust architecture principles, evaluating
    BGP peering and route-propagation configurations for redundancy,
    analyzing traffic-flow patterns against link-capacity utilization
    thresholds, reviewing firewall rule-sets for overly permissive entries
    and stale rules, validating DNS architecture and failover configurations,
    assessing load-balancer health-check accuracy and failover timing, and
    modeling topology changes needed for planned capacity growth. Produces
    network topology assessment report and configuration remediation list.
    Excludes hardware procurement.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:cloud-architect
