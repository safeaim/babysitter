  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Optimizes Kubernetes cluster costs while maintaining workload performance
    guarantees -- analyzing pod resource-request vs actual-usage ratios to
    identify over-provisioned deployments, evaluating node-pool sizing and
    instance-type selection against workload profiles, assessing spot and
    preemptible instance suitability for fault-tolerant workloads, reviewing
    namespace resource-quota utilization and adjusting limits, modeling
    cluster-autoscaler configuration tuning for scale-down aggressiveness,
    evaluating multi-tenancy bin-packing efficiency, and benchmarking
    per-namespace cost attribution against team budgets. Produces K8s cost
    optimization report with resource-adjustment recommendations. Excludes
    cluster architecture migration.
