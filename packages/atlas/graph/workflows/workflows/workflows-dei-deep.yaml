nodeKind: Workflow
id: workflow:employee-resource-group-impact-review
attributes:
  displayName: "Employee Resource Group Impact Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Evaluates the effectiveness and organizational impact of employee
    resource groups -- analyzing ERG membership growth and engagement trends,
    reviewing event attendance and programming quality surveys, measuring ERG
    influence on hiring-pipeline diversity and retention metrics for
    represented populations, assessing budget utilization against approved
    allocations, gathering executive-sponsor feedback on strategic alignment,
    benchmarking ERG maturity against industry best-practice frameworks, and
    identifying resource or structural changes needed to increase impact.
    Produces ERG impact assessment report and resource allocation
    recommendations. Excludes ERG formation or dissolution decisions.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:dei-inclusion
    - target: domain:human-resources
  triggers_responsibility:
    - target: responsibility:retro-facilitation
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:dei-team
    - target: org-unit:hr-team
