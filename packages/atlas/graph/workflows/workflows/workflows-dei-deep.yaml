---
nodeKind: Workflow
id: workflow:pay-equity-analysis
attributes:
  displayName: "Pay Equity Analysis"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annually"
  complexity: cross-team
  description: |
    Conducts statistical pay-equity analysis across the workforce --
    extracting compensation data segmented by gender, ethnicity, role level,
    tenure, geography, and performance rating, running multivariate
    regression models to isolate unexplained pay gaps after controlling for
    legitimate factors, identifying roles and demographic intersections with
    statistically significant disparities, benchmarking internal pay ratios
    against industry surveys, modeling remediation cost scenarios for closing
    identified gaps, and preparing executive summary with recommended
    adjustments. Produces pay equity analysis report and remediation cost
    model. Excludes individual compensation change execution.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:engineering-manager
    - target: role:planner
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:dei-inclusion
    - target: domain:human-resources
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:cost-optimization
  performed_by_org_unit:
    - target: org-unit:dei-team
    - target: org-unit:hr-team
    - target: org-unit:finance-team
