nodeKind: Workflow
id: workflow:accessibility-standards-compliance
attributes:
  displayName: "Accessibility Standards Compliance"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Audits digital products against WCAG 2.2 AA and Section 508
    accessibility standards -- running automated accessibility scanners
    across web and mobile surfaces, conducting manual keyboard-navigation
    and screen-reader testing on critical user flows, reviewing
    color-contrast ratios and focus-indicator visibility, assessing
    multimedia content for captioning and audio-description compliance,
    evaluating assistive-technology compatibility matrices, and tracking
    remediation progress against VPAT commitments. Produces accessibility
    audit scorecard and remediation backlog. Excludes assistive-technology
    procurement.
edges:
  involves_role:
    - target: role:product-designer
    - target: role:staff-engineer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:accessibility-first-design
    - target: skill-area:accessibility-testing
  applies_to_domain:
    - target: domain:dei-inclusion
    - target: domain:web-development
    - target: domain:mobile
  triggers_responsibility:
    - target: responsibility:review-prs-merge-decisions
    - target: responsibility:write-user-docs
  performed_by_org_unit:
    - target: org-unit:dei-team
    - target: org-unit:design-team
    - target: org-unit:frontend-team
