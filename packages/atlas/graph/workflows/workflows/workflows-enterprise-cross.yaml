nodeKind: Workflow
id: workflow:board-reporting-cycle
attributes:
  displayName: "Board Reporting Cycle"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Prepares and delivers quarterly board-of-directors reporting packages --
    collecting financial results, operating metrics, and strategic initiative
    progress from each department, consolidating narrative and data into
    standardized board-deck format, conducting pre-read review cycles with
    executive team for accuracy and messaging alignment, preparing management
    commentary on variances and forward outlook, coordinating logistics for
    board meeting scheduling and materials distribution, and tracking action
    items from prior board meetings to closure. Produces board reporting
    package and meeting minutes with action tracker. Excludes board
    governance and director recruitment.
