nodeKind: Workflow
id: workflow:organizational-restructuring
attributes:
  displayName: "Organizational Restructuring"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Plans and executes organizational restructuring initiatives -- assessing
    current organizational design against strategic objectives, modeling
    reporting-line changes and span-of-control impacts, identifying affected
    roles and designing transition support programs, coordinating legal and
    HR review of workforce-adjustment compliance, developing communication
    plans with sequenced messaging for different stakeholder groups, updating
    organizational charts and system-of-record hierarchies, managing
    knowledge transfer between departing and receiving teams, and tracking
    restructuring completion against timeline commitments. Produces
    restructuring plan and transition timeline. Excludes individual
    performance management.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
  requires_skill_area:
    - target: skill-area:adr-writing
  applies_to_domain:
