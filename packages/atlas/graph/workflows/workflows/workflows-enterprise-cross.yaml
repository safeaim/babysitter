nodeKind: Workflow
id: workflow:employee-exit-process
attributes:
  displayName: "Employee Exit Process"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-employee"
  complexity: cross-team
  description: |
    Manages the end-to-end employee offboarding process -- initiating
    separation workflows in HR systems, scheduling exit interviews and
    compiling feedback themes, coordinating knowledge-transfer sessions for
    critical responsibilities, revoking system access and credentials across
    all platforms within security SLAs, recovering company equipment and
    processing asset returns, calculating final compensation and benefits
    continuation, generating compliance documentation for regulatory
    requirements, and updating organizational charts and distribution lists.
    Produces exit checklist completion record and aggregated exit-interview
    insights. Excludes retention intervention.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:security-reviewer
    - target: role:planner
  requires_skill_area:
    - target: skill-area:identity-security
  applies_to_domain:
