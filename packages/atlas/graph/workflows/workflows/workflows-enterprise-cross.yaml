nodeKind: Workflow
id: workflow:annual-strategic-planning
attributes:
  displayName: "Annual Strategic Planning"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annually"
  complexity: cross-team
  description: |
    Orchestrates the organization-wide annual strategic planning cycle --
    facilitating executive strategy sessions to define multi-year vision and
    annual priorities, cascading OKR drafts from executive themes to
    department-level objectives, running competitive landscape and
    market-opportunity analyses, aligning headcount and budget requests to
    strategic bets, conducting cross-functional dependency mapping and
    trade-off negotiations, stress-testing plans against scenario-based
    financial models, and consolidating the final strategic plan for board
    approval. Produces annual strategic plan document and departmental OKR
    cascade. Excludes quarterly OKR check-ins.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
    - target: role:principal-engineer
  requires_skill_area:
    - target: skill-area:adr-writing
    - target: skill-area:c4-modeling
  applies_to_domain:
    - target: domain:operations
    - target: domain:finance
    - target: domain:project-management
  triggers_responsibility:
    - target: responsibility:capacity-planning
    - target: responsibility:cost-optimization
  performed_by_org_unit:
    - target: org-unit:operations-team
    - target: org-unit:finance-team
    - target: org-unit:engineering
