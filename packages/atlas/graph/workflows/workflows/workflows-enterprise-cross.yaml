nodeKind: Workflow
id: workflow:corporate-communications-review
attributes:
  displayName: "Corporate Communications Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews and aligns corporate communications strategy across internal and
    external channels -- auditing messaging consistency across press
    releases, blog posts, social media, and internal all-hands content,
    evaluating brand-voice adherence and tone guidelines, reviewing
    crisis-communication playbook currency, assessing analyst and media
    relations effectiveness through sentiment tracking, validating executive
    thought-leadership pipeline and speaking engagements, and benchmarking
    communication metrics against industry peers. Produces communications
    effectiveness report and editorial calendar updates. Excludes day-to-day
    content production.
