id: workflow:merger-integration-playbook
attributes:
  displayName: "Merger Integration Playbook"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-acquisition"
  complexity: cross-team
  description: |
    Manages post-merger integration execution across all functional
    workstreams -- standing up an integration management office with
    workstream leads, conducting Day-1 readiness assessments for IT, HR,
    finance, and operations, executing system-consolidation plans for
    overlapping tools and platforms, harmonizing compensation and benefits
    structures, migrating customer accounts and contracts to unified systems,
    aligning engineering practices and CI/CD pipelines, tracking synergy
    realization against deal-model targets, and managing cultural integration
    communication campaigns. Produces integration milestone tracker and
    synergy realization dashboard. Excludes deal negotiation and due
    diligence.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:principal-engineer
    - target: role:planner
  requires_skill_area:
