nodeKind: Workflow
id: workflow:product-market-fit-assessment
attributes:
  displayName: "Product-Market Fit Assessment"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Systematically assesses product-market fit indicators across quantitative and
    qualitative dimensions — tracking Sean Ellis survey scores (percentage who
    would be very disappointed without the product), measuring natural organic
    growth rate and viral coefficient, analyzing revenue retention cohorts and
    expansion revenue trends, monitoring support ticket volume relative to user
    growth as a quality proxy, evaluating competitive win/loss ratios from sales
    data, and correlating NPS segments with feature usage patterns to identify
    the core value driver. Produces PMF scorecard dashboards, cohort retention
    analyses, and strategic recommendation memos for the leadership team.
    Excludes go-to-market strategy execution.
edges:
  involves_role:
    - target: role:cto
    - target: role:data-scientist
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:entrepreneurship
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:retro-facilitation
  performed_by_org_unit:
    - target: org-unit:product-team
    - target: org-unit:analytics-team
