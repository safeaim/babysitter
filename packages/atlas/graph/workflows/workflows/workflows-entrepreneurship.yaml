---
nodeKind: Workflow
id: workflow:startup-mvp-validation
attributes:
  displayName: "Startup MVP Validation"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-milestone"
  complexity: cross-team
  description: |
    Validates a minimum viable product against market signals and early user
    feedback — defining success metrics and kill criteria before launch,
    instrumenting the MVP with analytics to capture usage funnels and feature
    engagement, conducting structured user interviews with problem-solution fit
    questionnaires, analyzing activation and retention cohorts against
    pre-defined thresholds, A/B testing core value proposition variants,
    synthesizing quantitative metrics with qualitative feedback into a
    pivot-or-persevere recommendation, and documenting learnings for investor
    communication. Produces validation scorecards, user interview synthesis
    reports, and cohort analysis dashboards. Excludes product development
    execution.
edges:
  involves_role:
    - target: role:cto
    - target: role:fullstack-engineer
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:api-design
  applies_to_domain:
    - target: domain:entrepreneurship
    - target: domain:customer-experience
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:run-architecture-review
  performed_by_org_unit:
    - target: org-unit:product-team
    - target: org-unit:growth-team
