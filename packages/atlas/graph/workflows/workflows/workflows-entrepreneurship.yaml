nodeKind: Workflow
id: workflow:fundraising-due-diligence-preparation
attributes:
  displayName: "Fundraising Due Diligence Preparation"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-milestone"
  complexity: cross-team
  description: |
    Prepares technical and operational materials for investor due diligence —
    assembling architecture documentation showing system design, scalability
    posture, and tech debt inventory, compiling engineering velocity metrics
    (cycle time, deployment frequency, MTTR), preparing security and compliance
    documentation (SOC 2 readiness, penetration test summaries, data handling
    policies), documenting intellectual property provenance and open-source
    license compliance, creating financial-model backing data for infrastructure
    cost projections, and packaging team composition and hiring plan materials.
    Produces due diligence data room, technical architecture summaries, and
    engineering metrics packages. Excludes financial modeling and legal document
    review.
edges:
  involves_role:
    - target: role:cto
    - target: role:vp-engineering
    - target: role:license-auditor
  requires_skill_area:
    - target: skill-area:c4-modeling
    - target: skill-area:supply-chain-security
  applies_to_domain:
    - target: domain:entrepreneurship
    - target: domain:venture-capital
  triggers_responsibility:
    - target: responsibility:run-architecture-review
    - target: responsibility:dependency-audit
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:investor-relations
