nodeKind: Workflow
id: workflow:climate-risk-scenario-analysis
attributes:
  displayName: "Climate Risk Scenario Analysis"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annually"
  complexity: cross-team
  description: |
    Models organizational exposure to physical and transition climate risks
    under IPCC and NGFS scenarios -- mapping physical-risk exposure for
    facilities and supply-chain nodes against flood, heat-stress, and
    wildfire projections, assessing transition-risk impacts from carbon
    pricing, stranded-asset write-downs, and demand shifts under 1.5C and 2C
    pathways, stress-testing financial projections against scenario-specific
    assumptions, evaluating adaptation and resilience investment options, and
    preparing TCFD-aligned climate scenario disclosures. Produces climate
    risk scenario report and adaptation investment recommendations. Excludes
    insurance procurement.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-warehouse-modeling
  applies_to_domain:
    - target: domain:sustainability-esg
    - target: domain:finance
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:esg-sustainability-team
    - target: org-unit:finance-team
    - target: org-unit:risk-management-team
