nodeKind: Workflow
id: workflow:sustainability-supply-chain-audit
attributes:
  displayName: "Sustainability Supply Chain Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Audits supply-chain partners against sustainability and
    responsible-sourcing criteria -- reviewing supplier environmental
    certifications and labor practice disclosures, validating
    conflict-mineral and deforestation-free sourcing claims, assessing water
    and waste management practices at key facilities, evaluating supplier ESG
    risk scores against procurement thresholds, conducting virtual or on-site
    sustainability audits for high-risk suppliers, and documenting corrective
    action plans for non-conformances. Produces supplier sustainability
    scorecard and audit findings report. Excludes contract re-negotiation.
edges:
  involves_role:
    - target: role:planner
    - target: role:security-reviewer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:data-quality
  applies_to_domain:
