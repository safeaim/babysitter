nodeKind: Workflow
id: workflow:scope3-emissions-tracking
attributes:
  displayName: "Scope 3 Emissions Tracking"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Tracks and reports Scope 3 greenhouse-gas emissions across the value
    chain -- collecting activity data from suppliers, business travel systems,
    employee commuting surveys, purchased goods lifecycle assessments, and
    downstream product-use estimates, mapping each source to GHG Protocol
    categories, applying region-specific emission factors, reconciling
    bottom-up calculations against spend-based proxies, identifying
    high-impact reduction levers, and producing Scope 3 inventory disclosures
    aligned with TCFD and CDP frameworks. Produces Scope 3 emissions
    inventory report and reduction opportunity matrix. Excludes Scope 1 and 2
    direct-emissions accounting.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:sustainability-esg
    - target: domain:operations
    - target: domain:supply-chain
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:vendor-evaluation
  performed_by_org_unit:
    - target: org-unit:esg-sustainability-team
    - target: org-unit:operations-team
    - target: org-unit:procurement-team
