nodeKind: Workflow
id: workflow:green-it-infrastructure-review
attributes:
  displayName: "Green IT Infrastructure Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Reviews IT infrastructure for energy efficiency and carbon footprint
    reduction opportunities -- benchmarking cloud workload power-usage
    effectiveness against provider sustainability dashboards, analyzing
    server utilization to identify right-sizing and consolidation candidates,
    evaluating hardware lifecycle for e-waste minimization and
    circular-economy compliance, assessing renewable-energy procurement for
    data center regions, reviewing cooling and power-distribution efficiency
    in on-premises facilities, and modeling carbon impact of architecture
    migration scenarios. Produces green IT assessment report and efficiency
    improvement roadmap. Excludes procurement execution.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:cloud-architect
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:terraform-infrastructure
    - target: skill-area:containerization
  applies_to_domain:
