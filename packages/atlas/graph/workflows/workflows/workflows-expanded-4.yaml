id: workflow:BIM-coordination-workflow
attributes:
  displayName: "BIM Coordination Workflow"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Coordinating federated BIM models across architectural, structural, and
    MEP disciplines -- merging discipline models, running automated clash
    detection, triaging clashes by severity, assigning resolution owners,
    tracking resolution status, and publishing updated federated models.
    Produces clash reports, resolution logs, and model coordination
    snapshots. Excludes initial design authoring.
edges:
  involves_role:
    - target: role:BIM-coordinator
    - target: role:MEP-engineer
    - target: role:structural-analyst
  applies_to_domain:
