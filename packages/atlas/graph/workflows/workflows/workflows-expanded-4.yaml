id: workflow:energy-audit
attributes:
  displayName: "Energy Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annual"
  complexity: standard
  description: |
    Comprehensive assessment of energy consumption across facilities or
    systems -- gathering utility data, conducting site walkthroughs,
    analyzing equipment efficiency, benchmarking against standards (ASHRAE
    Level I/II/III), identifying energy conservation measures, and
    producing cost-benefit analyses for recommended improvements. Produces
    audit reports with prioritized recommendations and ROI projections.
edges:
  involves_role:
    - target: role:energy-analyst
    - target: role:MEP-engineer
  applies_to_domain:
    - target: domain:energy
    - target: domain:smart-buildings
  triggers_responsibility:
