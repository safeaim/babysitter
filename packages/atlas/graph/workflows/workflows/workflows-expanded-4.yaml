nodeKind: Workflow
id: workflow:building-permit-process
attributes:
  displayName: "Building Permit Process"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    End-to-end building permit lifecycle -- assembling construction documents,
    submitting permit applications to the authority having jurisdiction,
    responding to plan review comments, coordinating revisions with design
    teams, tracking approval status across multiple departments (zoning,
    fire, structural, accessibility), and securing the permit-to-build.
    Produces permit application packages, comment response logs, and
    approval certificates. Excludes actual construction work.
edges:
  involves_role:
    - target: role:construction-project-manager
    - target: role:building-inspector
    - target: role:BIM-coordinator
  applies_to_domain:
    - target: domain:construction
    - target: domain:residential-construction
  triggers_responsibility:
    - target: responsibility:building-code-compliance
    - target: responsibility:fire-safety-compliance
  performed_by_org_unit:
    - target: org-unit:facilities-team
    - target: org-unit:compliance-team
