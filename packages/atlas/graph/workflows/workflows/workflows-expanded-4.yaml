id: workflow:construction-inspection
attributes:
  displayName: "Construction Inspection"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-milestone"
  complexity: standard
  description: |
    Inspecting construction work at defined milestones -- verifying
    foundation, framing, mechanical, electrical, and plumbing work against
    approved plans and building codes. Documenting inspection findings,
    issuing correction notices for non-conforming work, scheduling
    re-inspections, and approving work for progression. Produces inspection
    reports and compliance sign-off records.
edges:
  involves_role:
    - target: role:building-inspector
    - target: role:site-supervisor
