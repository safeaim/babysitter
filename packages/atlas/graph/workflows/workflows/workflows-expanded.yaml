id: workflow:api-deprecation
attributes:
  displayName: "API Deprecation"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-version"
  complexity: moderate
  description: |
    Manages the deprecation lifecycle for API versions or endpoints --
    analyzing consumer usage patterns, communicating deprecation timelines,
    providing migration guides and tooling, monitoring adoption of
    replacement APIs, enforcing sunset deadlines with grace periods,
    and removing deprecated code. Produces deprecation notice, migration
    guide, and usage analytics dashboard. Excludes new API design.
edges:
  involves_role:
    - target: role:api-engineer
    - target: role:developer-advocate
    - target: role:product-manager
  requires_skill_area:
    - target: skill-area:api-design
    - target: skill-area:breaking-change-management
    - target: skill-area:deprecation-policy
  applies_to_domain:
    - target: domain:api-development
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:api-design-governance
    - target: responsibility:documentation
