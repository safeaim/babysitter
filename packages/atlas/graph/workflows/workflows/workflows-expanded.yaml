---
nodeKind: Workflow
id: workflow:post-mortem
attributes:
  displayName: "Post-Mortem Review"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-incident"
  complexity: moderate
  description: |
    Conducts a blameless post-mortem after a significant incident --
    gathering timeline of events, identifying contributing factors and
    root causes, documenting impact and detection/recovery metrics,
    deriving action items with owners and deadlines, and publishing
    the post-mortem document for organizational learning. Produces
    post-mortem report, action items tracker, and knowledge base entry.
    Excludes ongoing action-item execution.
edges:
  involves_role:
    - target: role:incident-commander
    - target: role:sre
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:incident-response
    - target: skill-area:runbook-writing
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:site-reliability
  triggers_responsibility:
    - target: responsibility:incident-response-coordination
    - target: responsibility:knowledge-sharing
