nodeKind: Workflow
id: workflow:blue-green-deployment
attributes:
  displayName: "Blue-Green Deployment"
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: moderate
  description: |
    Executes a blue-green deployment strategy -- provisioning an identical
    production environment (green), deploying the new version, running
    smoke tests and health checks, switching traffic at the load balancer,
    monitoring error rates during the transition, and maintaining the
    previous environment (blue) for instant rollback. Produces deployment
    log and switchover checklist. Excludes canary percentage rollouts.
edges:
  involves_role:
    - target: role:devops-engineer
    - target: role:sre
    - target: role:release-engineer
  requires_skill_area:
    - target: skill-area:blue-green-deployment
    - target: skill-area:deployment-automation
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:devops
    - target: domain:infrastructure
  triggers_responsibility:
    - target: responsibility:deployment-management
    - target: responsibility:platform-reliability
