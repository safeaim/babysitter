nodeKind: Workflow
id: workflow:penetration-testing
attributes:
  displayName: "Penetration Testing Engagement"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Plans and executes penetration testing engagements -- scoping target
    systems and attack surfaces, conducting reconnaissance and
    vulnerability exploitation, testing authentication and authorization
    boundaries, assessing data exfiltration risks, documenting findings
    with severity ratings, and coordinating remediation with engineering
    teams. Produces pen-test report and remediation priority list.
    Excludes ongoing vulnerability scanning.
edges:
  involves_role:
    - target: role:security-engineer
    - target: role:chief-security-officer
    - target: role:backend-engineer
  requires_skill_area:
    - target: skill-area:vulnerability-scanning
    - target: skill-area:threat-modeling
    - target: skill-area:application-security
  applies_to_domain:
    - target: domain:security
    - target: domain:cybersecurity
  triggers_responsibility:
    - target: responsibility:security-audit
    - target: responsibility:risk-assessment
