nodeKind: Workflow
id: workflow:disaster-recovery-drill
attributes:
  displayName: "Disaster Recovery Drill"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Simulates disaster scenarios to validate recovery procedures --
    triggering controlled failovers, testing backup restoration,
    validating data integrity after recovery, measuring RTO and RPO
    against targets, documenting gaps in runbooks, and updating
    disaster recovery plans. Produces drill report, gap analysis,
    and updated DR runbook. Excludes actual incident response.
edges:
  involves_role:
    - target: role:sre
    - target: role:infrastructure-engineer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:chaos-engineering
    - target: skill-area:runbook-writing
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:infrastructure
    - target: domain:site-reliability
  triggers_responsibility:
    - target: responsibility:disaster-recovery
    - target: responsibility:platform-reliability
