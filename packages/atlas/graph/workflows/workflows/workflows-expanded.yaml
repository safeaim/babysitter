nodeKind: Workflow
id: workflow:cost-optimization
attributes:
  displayName: "Cloud Cost Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: moderate
  description: |
    Reviews and optimizes cloud infrastructure spending -- analyzing
    resource utilization, identifying idle or over-provisioned instances,
    evaluating reserved instance and savings plan coverage, reviewing
    data transfer costs, assessing spot instance opportunities, and
    implementing right-sizing recommendations. Produces cost optimization
    report and projected savings forecast. Excludes architectural
    re-design for cost.
edges:
  involves_role:
    - target: role:devops-engineer
    - target: role:infrastructure-engineer
    - target: role:platform-engineer
  requires_skill_area:
    - target: skill-area:cloud-infrastructure
    - target: skill-area:terraform-infrastructure
  applies_to_domain:
    - target: domain:cloud-infra
    - target: domain:infrastructure
  triggers_responsibility:
    - target: responsibility:cost-optimization-cloud
    - target: responsibility:capacity-planning
