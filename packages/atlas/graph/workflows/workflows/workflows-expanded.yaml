attributes:
  displayName: "Localization Workflow"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: moderate
  description: |
    Manages the end-to-end localization process for new features --
    extracting translatable strings, sending to translation vendors or
    internal teams, reviewing translations for context accuracy,
    integrating translated assets, testing locale-specific rendering
    and formatting, and validating RTL layouts where applicable.
    Produces localized builds and translation quality report.
    Excludes original content authoring.
edges:
