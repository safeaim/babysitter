nodeKind: Workflow
id: workflow:data-migration
attributes:
  displayName: "Data Migration"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    Plans and executes data migration between systems -- profiling source
    data quality and schema, designing target schema mapping and
    transformation rules, building and testing ETL pipelines, executing
    dry-run migrations with validation checksums, coordinating cutover
    windows with stakeholders, and verifying data integrity post-migration.
    Produces migration runbook, validation report, and rollback plan.
    Excludes ongoing data sync.
edges:
  involves_role:
    - target: role:data-engineer
    - target: role:data-architect
    - target: role:backend-engineer
  requires_skill_area:
    - target: skill-area:etl-pipelines
    - target: skill-area:schema-evolution
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:data-engineering
    - target: domain:databases
  triggers_responsibility:
    - target: responsibility:data-pipeline-reliability
    - target: responsibility:data-quality
