nodeKind: Workflow
id: workflow:workplace-safety-audit
attributes:
  displayName: "Workplace Safety Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Audits workplace safety compliance across all facilities -- inspecting
    fire-suppression systems, emergency exits, and evacuation route signage,
    reviewing electrical and ergonomic hazard reports, validating first-aid
    supply inventories and AED maintenance records, assessing compliance with
    OSHA or local occupational health regulations, reviewing incident and
    near-miss logs for trend analysis, evaluating employee safety training
    completion rates, and testing emergency notification system
    functionality. Produces safety audit report with findings and corrective
    action plan. Excludes building code certification.
edges:
  involves_role:
    - target: role:security-reviewer
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:threat-modeling
  applies_to_domain:
    - target: domain:operations
    - target: domain:legal
  triggers_responsibility:
    - target: responsibility:security-review
    - target: responsibility:incident-command
  performed_by_org_unit:
    - target: org-unit:facilities-team
    - target: org-unit:hr-team
    - target: org-unit:compliance-team
