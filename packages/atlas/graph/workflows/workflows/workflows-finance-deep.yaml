nodeKind: Workflow
id: workflow:tax-compliance-review
attributes:
  displayName: "Tax Compliance Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews tax compliance obligations across all applicable jurisdictions --
    validating corporate income tax provision calculations and effective tax
    rate reconciliations, reviewing sales and use tax nexus determinations and
    collection accuracy, assessing transfer pricing documentation for
    intercompany transactions against arm's-length standards, evaluating R&D
    tax credit qualification and supporting documentation, monitoring
    regulatory changes that may affect tax positions or filing obligations,
    coordinating with external tax advisors on specialized filings and audit
    responses, and tracking tax calendar deadlines to prevent late-filing
    penalties. Produces tax compliance status report and filing calendar.
    Excludes tax strategy optimization.
edges:
  involves_role:
    - target: role:planner
    - target: role:license-auditor
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
