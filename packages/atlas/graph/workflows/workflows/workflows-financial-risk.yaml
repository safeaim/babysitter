nodeKind: Workflow
id: workflow:model-risk-management-review
attributes:
  displayName: "Model Risk Management Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews model risk across the organization per SR 11-7 / SS1/23
    supervisory guidance -- maintaining the model inventory with tiering
    by materiality, conducting independent validation of pricing, risk,
    and credit models against benchmark outputs and conceptual soundness
    criteria, tracking validation findings through remediation to closure,
    assessing model limitations and compensating controls, reviewing model
    performance monitoring backtests for degradation, and preparing model
    risk reports for the model risk committee. Produces model inventory
    updates, validation findings log, and remediation tracking dashboard.
    Excludes model development and production deployment.
edges:
  involves_role:
    - target: role:risk-analyst
    - target: role:quantitative-analyst
    - target: role:compliance-officer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:ml-fine-tuning
  applies_to_domain:
    - target: domain:financial-risk-management
    - target: domain:quantitative-finance
    - target: domain:regulatory-finance
  triggers_responsibility:
    - target: responsibility:model-validation
    - target: responsibility:backtesting-validation
  performed_by_org_unit:
    - target: org-unit:market-risk-team
    - target: org-unit:quant-research
---
nodeKind: Workflow
id: workflow:stress-testing-scenario-design
attributes:
  displayName: "Stress Testing Scenario Design"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Designs and calibrates stress-testing scenarios for regulatory and
    internal risk management -- constructing macroeconomic stress
    narratives incorporating GDP, interest rate, credit spread, and equity
    shock paths, designing reverse stress tests that identify scenarios
    capable of breaching capital or liquidity thresholds, translating
    macro narratives into granular risk-factor shocks for portfolio-level
    impact assessment, incorporating historical crisis analogs and
    emerging risk themes, preparing CCAR/DFAST and ICAAP scenario
    submissions, and reviewing scenario severity against peer benchmarks.
    Produces scenario specification documents, reverse stress test
    results, and regulatory submission packages. Excludes scenario
    execution and capital adequacy calculation.
edges:
  involves_role:
    - target: role:risk-analyst
    - target: role:quantitative-analyst
    - target: role:portfolio-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:mathematical-reasoning
  applies_to_domain:
    - target: domain:financial-risk-management
    - target: domain:capital-markets
    - target: domain:regulatory-finance
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:model-validation
  performed_by_org_unit:
    - target: org-unit:market-risk-team
    - target: org-unit:portfolio-management-team
