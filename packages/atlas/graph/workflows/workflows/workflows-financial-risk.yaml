---
nodeKind: Workflow
id: workflow:market-risk-daily-report
attributes:
  displayName: "Market Risk Daily Report"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Produces the daily market risk report -- calculating Value-at-Risk
    across portfolios using historical simulation and Monte Carlo methods,
    computing Greeks exposures (delta, gamma, vega, theta) for derivatives
    books, running overnight stress tests against predefined and ad-hoc
    scenarios, monitoring position and P&L limit utilization against risk
    appetite thresholds, flagging limit breaches for immediate escalation,
    and reconciling end-of-day risk figures with front-office marks.
    Delivers risk dashboard, limit utilization summary, and stress-test
    exception report. Excludes risk model calibration and new scenario
    design.
edges:
  involves_role:
    - target: role:risk-analyst
    - target: role:quantitative-analyst
    - target: role:compliance-officer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:financial-risk-management
    - target: domain:capital-markets
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:model-validation
  performed_by_org_unit:
    - target: org-unit:market-risk-team
    - target: org-unit:trading-desk
