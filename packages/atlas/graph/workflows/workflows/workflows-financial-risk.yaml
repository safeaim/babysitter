nodeKind: Workflow
id: workflow:credit-risk-assessment
attributes:
  displayName: "Credit Risk Assessment"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-counterparty"
  complexity: cross-team
  description: |
    Assesses counterparty credit risk for new and existing exposures --
    scoring counterparty creditworthiness using internal rating models and
    external agency ratings, calculating current and potential future
    exposure across OTC derivatives and lending facilities, reviewing
    collateral adequacy and margin call thresholds, evaluating netting
    agreement enforceability across jurisdictions, stress-testing credit
    exposures under adverse macroeconomic scenarios, and recommending
    credit limit adjustments or risk mitigation actions such as CDS
    hedging. Produces credit risk assessment report with exposure summary
    and limit recommendations. Excludes trade execution and collateral
    operations.
edges:
  involves_role:
    - target: role:risk-analyst
    - target: role:compliance-officer
    - target: role:data-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:financial-risk-management
    - target: domain:capital-markets
    - target: domain:regulatory-finance
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:regulatory-reporting
  performed_by_org_unit:
    - target: org-unit:market-risk-team
    - target: org-unit:compliance-team
