nodeKind: Workflow
id: workflow:liquidity-risk-monitoring
attributes:
  displayName: "Liquidity Risk Monitoring"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Monitors organizational liquidity risk posture -- forecasting cash
    inflows and outflows across time horizons from overnight to 12-month,
    identifying funding gaps and concentration risks in liability maturity
    profiles, calculating Liquidity Coverage Ratio and Net Stable Funding
    Ratio for regulatory compliance, stress-testing liquidity under
    market-wide and idiosyncratic scenarios, monitoring intraday liquidity
    usage against central bank requirements, and evaluating contingency
    funding plan activation triggers. Produces liquidity dashboard,
    LCR/NSFR reports, and early-warning alerts. Excludes treasury
    execution and funding decisions.
edges:
  involves_role:
    - target: role:risk-analyst
    - target: role:compliance-officer
    - target: role:data-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
