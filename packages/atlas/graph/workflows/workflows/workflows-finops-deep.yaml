nodeKind: Workflow
id: workflow:finops-monthly-business-review
attributes:
  displayName: "FinOps Monthly Business Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Conducts the monthly FinOps business review bringing together cost data,
    anomalies, forecasts, and action tracking -- compiling total cloud spend
    with month-over-month and year-over-year comparisons across all cloud
    providers and SaaS platforms, reviewing cost anomaly detections from the
    prior period with root-cause attributions and resolution status, comparing
    actual spend against budget forecasts with variance explanations by business
    unit, presenting cost-per-unit economics (cost per customer, cost per
    transaction, cost per API call) with trend analysis, reviewing progress on
    active cost optimization initiatives with realized savings tracking,
    assessing forecast accuracy and updating projections based on planned
    product launches and infrastructure changes, escalating teams with
    persistent budget overruns for remediation planning, and setting
    optimization targets for the coming period. Produces monthly FinOps report,
    forecast update, optimization initiative tracker, and executive cost
    summary. Excludes budget setting.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:cloud-architect
    - target: role:planner
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:finops
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:finops-team
    - target: org-unit:engineering
    - target: org-unit:operations-team
