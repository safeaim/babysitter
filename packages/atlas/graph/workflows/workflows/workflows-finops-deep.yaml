nodeKind: Workflow
id: workflow:reserved-instance-optimization
attributes:
  displayName: "Reserved Instance Optimization"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Optimizes reserved instance and savings plan coverage to minimize cloud
    compute costs -- analyzing current RI and savings plan portfolio utilization
    rates against commitment terms, identifying underutilized reservations
    eligible for marketplace resale or modification, modeling optimal commitment
    levels using historical usage patterns and growth projections, evaluating
    coverage gaps where on-demand spend exceeds reserved capacity thresholds,
    comparing pricing across commitment types (standard RI, convertible RI,
    compute savings plans, instance savings plans) for each workload profile,
    assessing the impact of architectural changes (containerization, serverless
    migration) on reservation strategy, reviewing expiring commitments and
    recommending renewal or replacement strategies, and tracking realized
    savings against projected savings from prior optimization cycles. Produces
    RI utilization report, savings plan coverage analysis, purchase
    recommendations, and realized-savings tracking. Excludes commitment
    purchases.
edges:
  involves_role:
    - target: role:cloud-architect
    - target: role:platform-engineer
    - target: role:planner
  requires_skill_area:
    - target: skill-area:terraform-infrastructure
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:finops
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:finops-team
    - target: org-unit:platform-team
