---
nodeKind: Workflow
id: workflow:fpga-bitstream-deployment
attributes:
  displayName: "FPGA Bitstream Deployment"
  workflowKind: release
  triggerType: on-demand
  typicalCadence: "per-release"
  complexity: single-team
  description: |
    Builds, verifies, and deploys FPGA bitstreams to target hardware —
    synthesizing HDL, running place-and-route, performing timing closure
    analysis, validating against simulation, and flashing production
    boards with rollback provisions. Excludes HDL design work.
edges:
  involves_role:
    - target: role:implementer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:editor-fluency
  applies_to_domain:
    - target: domain:embedded-systems
  triggers_responsibility:
    - target: responsibility:approve-deploys
    - target: responsibility:release-coordination
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:research-engineering
---
nodeKind: Workflow
id: workflow:hardware-design-review
attributes:
  displayName: "Hardware Design Review"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-milestone"
  complexity: cross-team
  description: |
    Structured peer review of hardware design artifacts (schematics, HDL,
    PCB layouts) — verifying signal integrity, checking design rule
    compliance, reviewing power budgets, and producing formal approval
    or revision requests. Excludes software code review.
edges:
  involves_role:
    - target: role:principal-engineer
    - target: role:staff-engineer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:c4-modeling
  applies_to_domain:
    - target: domain:embedded-systems
  triggers_responsibility:
    - target: responsibility:approve-architecture
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:research-engineering
