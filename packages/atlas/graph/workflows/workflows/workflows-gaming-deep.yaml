nodeKind: Workflow
id: workflow:game-asset-pipeline-optimization
attributes:
  displayName: "Game Asset Pipeline Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: single-team
  description: |
    Profiles and optimizes the game asset build pipeline — measuring texture
    compression throughput, shader compilation times, mesh LOD generation
    efficiency, audio transcoding parallelism, and incremental cook cache hit
    rates. Identifies bottlenecks, tunes worker concurrency, and tracks
    asset-pipeline duration trends against build-time budgets. Excludes asset
    creation and art direction.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:performance-profiler
    - target: role:implementer
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:gitops
  applies_to_domain:
    - target: domain:gaming
    - target: domain:devops
  triggers_responsibility:
    - target: responsibility:performance-budget-tracking
    - target: responsibility:dx-tooling-maintenance
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:engineering-productivity
