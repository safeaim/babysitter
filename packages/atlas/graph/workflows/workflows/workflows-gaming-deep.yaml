nodeKind: Workflow
id: workflow:multiplayer-netcode-testing
attributes:
  displayName: "Multiplayer Netcode Testing"
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Validates multiplayer networking correctness under adverse conditions —
    running deterministic simulation replay tests, verifying rollback/prediction
    consistency, stress-testing with synthetic latency and packet-loss profiles,
    measuring desync rates across client/server and peer-to-peer topologies, and
    certifying netcode against target tick-rate budgets. Excludes netcode
    architecture design.
edges:
  involves_role:
    - target: role:test-writer
    - target: role:performance-profiler
    - target: role:implementer
  requires_skill_area:
    - target: skill-area:chaos-engineering
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:gaming
    - target: domain:networking
  triggers_responsibility:
    - target: responsibility:triage-incoming-issues
    - target: responsibility:performance-budget-tracking
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:quality-engineering
