id: workflow:game-analytics-instrumentation
attributes:
  displayName: "Game Analytics Instrumentation"
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-milestone"
  complexity: cross-team
  description: |
    Governs the instrumentation of game telemetry events — defining event
    taxonomies, validating schema compliance, verifying funnel-critical events
    fire correctly on all platforms, auditing event volume and sampling rates,
    and ensuring analytics pipelines ingest data within latency SLAs. Excludes
    analytics dashboard creation and data analysis.
edges:
