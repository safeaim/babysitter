---
nodeKind: Workflow
id: workflow:anti-cheat-system-audit
attributes:
  displayName: "Anti-Cheat System Audit"
  workflowKind: security
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Audits the anti-cheat detection pipeline for coverage, evasion gaps, and
    false-positive rates — reviewing kernel-level integrity checks,
    replay-analysis heuristics, machine-learning cheat classifiers, ban-appeal
    accuracy, and third-party anti-cheat SDK update status. Produces a
    prioritized remediation backlog. Excludes cheat-detection algorithm
    development.
edges:
  involves_role:
    - target: role:security-reviewer
    - target: role:ml-engineer
    - target: role:staff-engineer
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:ml-fine-tuning
  applies_to_domain:
    - target: domain:gaming
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:run-security-scans
    - target: responsibility:threat-modeling
  performed_by_org_unit:
    - target: org-unit:security-team
    - target: org-unit:engineering
