attributes:
  displayName: "Game Economy Balancing Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Reviews the in-game economy health — auditing currency source/sink ratios,
    monitoring inflation indicators, analyzing player spending funnels,
    validating drop-rate tables, and comparing live telemetry against designer
    intent for virtual currencies, loot systems, and marketplace pricing.
    Excludes game design decisions and content creation.
