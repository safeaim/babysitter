---
nodeKind: Workflow
id: workflow:gpu-kernel-benchmarking
attributes:
  displayName: "GPU Kernel Benchmarking"
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-optimization"
  complexity: single-team
  description: |
    Benchmarks GPU compute kernels across hardware targets — measuring
    throughput, latency, memory bandwidth, and occupancy; comparing
    against baseline; profiling hotspots; and publishing results to
    a performance dashboard. Excludes kernel development.
