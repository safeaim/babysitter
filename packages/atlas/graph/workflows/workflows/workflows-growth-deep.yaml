---
nodeKind: Workflow
id: workflow:product-led-growth-metrics-review
attributes:
  displayName: "Product-Led Growth Metrics Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Reviews product-led growth funnel metrics across the full user lifecycle
    -- analyzing activation rates by cohort to identify onboarding friction
    points, evaluating retention curves (D1, D7, D30) against benchmarks and
    prior-period performance, measuring expansion revenue from upsells and seat
    additions triggered by in-product upgrade prompts, tracking referral loop
    metrics including viral coefficient and time-to-invite, segmenting usage
    patterns to identify power users and at-risk accounts for targeted
    intervention, and correlating feature adoption with conversion and
    retention outcomes. Produces PLG metrics dashboard and growth lever
    prioritization. Excludes feature development.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:product-designer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:digital-marketing
    - target: domain:revenue-operations
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:performance-budget-tracking
  performed_by_org_unit:
    - target: org-unit:growth-team
    - target: org-unit:product-team
