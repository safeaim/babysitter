nodeKind: Workflow
id: workflow:referral-program-performance-review
attributes:
  displayName: "Referral Program Performance Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Reviews referral program performance and integrity -- analyzing referral
    volume trends by channel and referrer segment, evaluating referred-user
    conversion rates and quality metrics (retention, LTV) compared to organic
    acquisition, monitoring fraud indicators including self-referrals,
    disposable email patterns, and suspicious reward-claiming behavior,
    assessing reward economics and cost-per-acquisition against other growth
    channels, tracking referral link attribution accuracy across devices and
    sessions, and identifying top-performing referrers for VIP recognition and
    amplification opportunities. Produces referral program performance report
    and fraud detection summary. Excludes program redesign.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:security-reviewer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:digital-marketing
    - target: domain:revenue-operations
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:security-review
  performed_by_org_unit:
    - target: org-unit:growth-team
    - target: org-unit:marketing-team
