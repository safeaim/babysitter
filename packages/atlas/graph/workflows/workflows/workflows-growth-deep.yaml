nodeKind: Workflow
id: workflow:landing-page-optimization-cycle
attributes:
  displayName: "Landing Page Optimization Cycle"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Runs continuous optimization cycles on key landing pages -- analyzing
    page-level conversion rates segmented by traffic source, device type, and
    geographic region, reviewing A/B and multivariate test results for headline
    copy, hero imagery, CTA button placement, and form field configurations,
    evaluating page load performance metrics (LCP, CLS, FID) and their
    correlation with bounce rates, auditing mobile responsiveness and
    cross-browser rendering issues, benchmarking page performance against
    competitor landing experiences, and prioritizing the next round of
    experiments based on estimated lift and implementation effort. Produces
    optimization cycle report and experiment queue. Excludes page design and
    development.
edges:
  involves_role:
    - target: role:product-designer
    - target: role:data-scientist
    - target: role:planner
  requires_skill_area:
    - target: skill-area:core-web-vitals
    - target: skill-area:eval-driven-development
  applies_to_domain:
    - target: domain:digital-marketing
    - target: domain:customer-experience
  triggers_responsibility:
    - target: responsibility:performance-budget-tracking
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:growth-team
    - target: org-unit:marketing-team
    - target: org-unit:engineering
