nodeKind: Workflow
id: workflow:growth-experiment-review
attributes:
  displayName: "Growth Experiment Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Reviews active and completed growth experiments — evaluating statistical
    significance of test results, analyzing unexpected side effects on
    adjacent metrics, deciding ship/iterate/kill for each experiment,
    validating measurement methodology, and reprioritizing the experiment
    queue based on learnings. Produces experiment decision log and updated
    roadmap. Excludes experiment design and implementation.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:product-designer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:eval-driven-development
  applies_to_domain:
    - target: domain:digital-marketing
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:growth-team
    - target: org-unit:product-team
    - target: org-unit:engineering
