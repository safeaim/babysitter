nodeKind: Workflow
id: workflow:conversion-funnel-optimization
attributes:
  displayName: "Conversion Funnel Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Analyzes and optimizes conversion funnels across acquisition
    channels — identifying drop-off points through behavioral analytics,
    reviewing A/B test results, evaluating page load performance impact on
    conversions, mapping user journey friction points, and prioritizing
    experiments for the next optimization sprint. Produces funnel performance
    report and experiment backlog. Excludes experiment implementation.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:product-designer
    - target: role:planner
  requires_skill_area:
