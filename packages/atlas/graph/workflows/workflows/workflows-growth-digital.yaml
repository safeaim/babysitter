---
nodeKind: Workflow
id: workflow:seo-content-audit
attributes:
  displayName: "SEO Content Audit"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: single-team
  description: |
    Audits website and content assets for search engine optimization
    health — analyzing keyword ranking positions, reviewing technical SEO
    issues like crawlability and structured data, evaluating content freshness
    and topical authority gaps, assessing backlink profile quality, and
    benchmarking against competitor visibility. Produces prioritized
    optimization recommendations. Excludes content creation and link building.
edges:
  involves_role:
    - target: role:technical-writer
    - target: role:data-scientist
    - target: role:planner
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:digital-marketing
    - target: domain:marketing
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:write-user-docs
  performed_by_org_unit:
    - target: org-unit:marketing-team
    - target: org-unit:growth-team
