nodeKind: Workflow
id: workflow:referral-program-design
attributes:
  displayName: "Referral Program Design"
  workflowKind: setup
  triggerType: event-driven
  typicalCadence: "per-initiative"
  complexity: cross-team
  description: |
    Designs a referral program from concept through launch readiness --
    defining referral mechanics including single-sided versus double-sided
    incentive structures, modeling reward economics with cost-per-acquisition
    targets and breakeven analysis, designing fraud prevention controls for
    self-referrals, account farming, and reward abuse, specifying referral link
    tracking and attribution logic across web, mobile, and email channels,
    creating the referral user experience with share flows, reward dashboards,
    and notification sequences, planning integration with payment and billing
    systems for automated reward fulfillment, and developing launch
    communication plans including in-app prompts, email campaigns, and
    help-center documentation. Produces referral program specification, fraud
    prevention rules, and launch playbook. Excludes ongoing program
    management.
edges:
  involves_role:
    - target: role:product-designer
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:digital-marketing
    - target: domain:revenue-operations
  triggers_responsibility:
    - target: responsibility:security-review
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:growth-team
    - target: org-unit:product-team
    - target: org-unit:engineering
