nodeKind: Workflow
id: workflow:succession-planning-review
attributes:
  displayName: "Succession Planning Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Reviews succession readiness for critical leadership and specialist roles
    -- identifying mission-critical positions where vacancy would significantly
    impact operations, assessing internal talent pipeline against readiness
    dimensions (skills, experience, aspiration), mapping potential successors
    into readiness categories (ready-now, ready-in-1-year, ready-in-2-years)
    with gap analysis, reviewing individual development plan progress for
    high-potential successors, evaluating external talent market conditions for
    roles with thin internal benches, conducting calibration sessions with
    senior leadership to validate assessments and resolve competing succession
    claims, and updating the succession planning dashboard with risk scores and
    development investment recommendations. Produces succession readiness
    report and development plan updates. Excludes individual talent
    acquisition.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
    - target: role:staff-engineer
  requires_skill_area:
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:human-resources
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:capacity-planning
    - target: responsibility:retro-facilitation
  performed_by_org_unit:
    - target: org-unit:hr-team
    - target: org-unit:engineering
