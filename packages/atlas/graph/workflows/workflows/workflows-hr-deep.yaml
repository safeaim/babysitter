nodeKind: Workflow
id: workflow:workplace-diversity-metrics-review
attributes:
  displayName: "Workplace Diversity Metrics Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews workplace diversity and inclusion metrics for organizational
    accountability -- analyzing representation data across gender, ethnicity,
    age, and disability dimensions at each organizational level, computing pay
    equity ratios controlling for role, level, tenure, and geography,
    evaluating retention and promotion rates by demographic cohort to identify
    systemic disparities, benchmarking diversity metrics against industry and
    peer-company data, reviewing hiring funnel conversion rates by demographic
    to identify pipeline leakage points, tracking progress against published
    diversity goals and commitments, and preparing data for regulatory
    reporting requirements such as EEO-1 filings. Produces diversity metrics
    dashboard and equity analysis report. Excludes DEI program design.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
