---
nodeKind: Workflow
id: workflow:employee-engagement-pulse-check
attributes:
  displayName: "Employee Engagement Pulse Check"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Conducts rapid pulse surveys to track employee engagement between full
    culture surveys -- designing concise pulse instruments (5-10 questions)
    targeting specific engagement dimensions such as manager effectiveness,
    workload balance, and career development satisfaction, distributing surveys
    through HRIS-integrated channels with anonymity guarantees, analyzing
    response rates and engagement scores by team, location, and tenure segment,
    computing eNPS (employee Net Promoter Score) trends and benchmarking
    against industry norms, identifying teams with significant score declines
    for targeted intervention, tracking action item completion from prior pulse
    cycles, and escalating persistent low-engagement areas to HR leadership.
    Produces pulse survey dashboard and action-tracking report. Excludes
    intervention design.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:human-resources
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:retro-facilitation
  performed_by_org_unit:
    - target: org-unit:hr-team
    - target: org-unit:business-intelligence-team
