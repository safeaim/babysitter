---
nodeKind: Workflow
id: workflow:chaos-game-day
attributes:
  displayName: "Chaos Game Day"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Plans and executes structured chaos engineering exercises — defining
    failure scenarios, injecting faults into production or staging, observing
    system behavior, validating auto-healing mechanisms, and documenting
    findings for remediation. Excludes individual chaos experiment automation.
