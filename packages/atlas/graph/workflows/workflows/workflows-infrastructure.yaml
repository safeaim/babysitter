nodeKind: Workflow
id: workflow:cdn-cache-invalidation
attributes:
  displayName: "CDN Cache Invalidation"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-deployment"
  complexity: single-team
  description: |
    Coordinates cache purge operations across CDN edge nodes after deployments
    or content updates — selective path invalidation, cache-warming strategies,
    origin-shield validation, and propagation verification. Excludes CDN
    provider selection.
edges:
