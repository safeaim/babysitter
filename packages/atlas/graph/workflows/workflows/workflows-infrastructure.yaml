---
nodeKind: Workflow
id: workflow:certificate-rotation
attributes:
  displayName: "Certificate Rotation"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Rotates TLS certificates across load balancers, service meshes, and internal
    PKI — tracking expiry dates, automating renewal via ACME or internal CA,
    validating chain-of-trust, and coordinating zero-downtime rollover across
    environments. Excludes initial certificate provisioning.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:security-reviewer
    - target: role:cloud-architect
  requires_skill_area:
    - target: skill-area:secrets-rotation
    - target: skill-area:service-mesh-config
  applies_to_domain:
    - target: domain:infrastructure
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:run-security-scans
    - target: responsibility:runbook-authoring
  performed_by_org_unit:
    - target: org-unit:platform-team
    - target: org-unit:security-team
