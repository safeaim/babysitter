id: workflow:cloud-cost-anomaly-detection
attributes:
  displayName: "Cloud Cost Anomaly Detection"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Monitors cloud spend for unexpected spikes and anomalous patterns —
    configuring cost alerts, investigating billing anomalies, attributing
    spend to teams, and triggering remediation for runaway resources. Excludes
    long-term cost optimization strategy.
