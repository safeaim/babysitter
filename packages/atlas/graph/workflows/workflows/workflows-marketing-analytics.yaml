nodeKind: Workflow
id: workflow:cohort-retention-analysis
attributes:
  displayName: "Cohort Retention Analysis"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Conducts systematic cohort-based retention analysis for marketing-acquired
    users — building weekly and monthly retention curves segmented by acquisition
    channel, campaign, and user attributes, identifying inflection points where
    retention diverges between cohorts, isolating retention drivers through
    feature-usage correlation analysis, defining intervention triggers for
    at-risk cohorts, measuring the impact of retention marketing campaigns on
    curve shape, and comparing organic vs paid cohort long-term value. Produces
    cohort retention dashboards, driver analysis reports, and intervention
    trigger recommendations. Excludes product feature development and customer
    success operations.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:data-analyst
