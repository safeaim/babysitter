nodeKind: Workflow
id: workflow:customer-acquisition-cost-review
attributes:
  displayName: "Customer Acquisition Cost Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Reviews customer acquisition cost metrics across channels and segments —
    calculating blended and channel-specific CAC with full cost loading,
    analyzing payback period trends by cohort and acquisition source, computing
    LTV-to-CAC ratios segmented by plan tier and company size, identifying
    channels approaching unsustainable CAC thresholds, benchmarking against
    industry standards, and flagging CAC inflation trends requiring strategic
    intervention. Produces CAC trend reports, channel unit economics analyses,
    and payback period forecasts. Excludes pricing strategy changes and product
    investment decisions.
