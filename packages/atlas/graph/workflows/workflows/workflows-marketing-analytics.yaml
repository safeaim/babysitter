nodeKind: Workflow
id: workflow:campaign-post-mortem-analysis
attributes:
  displayName: "Campaign Post-Mortem Analysis"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-campaign"
  complexity: cross-team
  description: |
    Conducts structured post-campaign debriefs to extract learnings and improve
    future execution — gathering performance data across all activated channels,
    comparing actual results against pre-campaign success criteria and
    benchmarks, identifying what worked and what underperformed with root-cause
    analysis, documenting creative and targeting insights for the organizational
    knowledge base, updating campaign templates and playbooks based on learnings,
    and presenting findings with actionable recommendations to stakeholders.
    Produces campaign post-mortem reports, updated playbook entries, and
    benchmark recalibration recommendations. Excludes ongoing campaign
    optimization and new campaign planning.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-analyst
    - target: role:business-analyst
  requires_skill_area:
