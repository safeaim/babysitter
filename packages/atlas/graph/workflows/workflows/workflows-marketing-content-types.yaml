id: workflow:newsletter-growth-management
attributes:
  displayName: "Newsletter Growth Management"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Grows and optimizes email newsletter programs — acquiring subscribers
    through lead magnets and content upgrades, segmenting audiences by
    engagement level and interest signals, A/B testing subject lines and send
    times, monitoring deliverability metrics including inbox placement and domain
    reputation, managing list hygiene through re-engagement campaigns and sunset
    policies, and exploring monetization through sponsored sections or premium
    tiers. Produces subscriber growth reports, engagement trend analyses, and
    deliverability health scorecards. Excludes transactional email and marketing
    automation sequences.
