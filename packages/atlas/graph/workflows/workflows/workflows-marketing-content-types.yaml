id: workflow:video-content-production-cycle
attributes:
  displayName: "Video Content Production Cycle"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Manages the script-to-publish pipeline for marketing video content —
    developing video concepts aligned with content strategy, writing and
    reviewing scripts, coordinating filming or screen-capture sessions, managing
    post-production editing and motion graphics, optimizing videos for
    platform-specific requirements across YouTube, social, and webinar formats,
    adding captions and metadata for discoverability, and scheduling publication
    with promotional support. Produces video content briefs, production
    timelines, and post-publish performance analyses. Excludes paid video
    advertising and live streaming.
