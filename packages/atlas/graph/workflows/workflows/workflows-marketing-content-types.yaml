  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Manages the end-to-end production of branded podcast episodes — planning
    episode topics and guest lineups, preparing interview guides and talking
    points, coordinating recording sessions, managing audio editing and sound
    design, writing show notes and episode descriptions with SEO keywords,
    distributing across podcast platforms, promoting episodes through owned
    channels, and analyzing listener engagement metrics like completion rate and
    subscriber growth. Produces episode production checklists, distribution
    confirmations, and listener analytics dashboards. Excludes podcast
    advertising sales and sponsorship management.
