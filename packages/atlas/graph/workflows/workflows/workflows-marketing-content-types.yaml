attributes:
  displayName: "Webinar Production Cycle"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Orchestrates webinar events from topic selection through post-event
    follow-up — identifying high-value topics through audience research and
    sales feedback, securing speakers and managing rehearsals, building
    registration landing pages and email promotion sequences, managing day-of
    production logistics including Q&A moderation, segmenting attendees by
    engagement level for follow-up nurture tracks, repurposing recordings into
    blog posts and social clips, and measuring pipeline influence attribution.
    Produces event briefs, registration reports, and post-webinar ROI analyses.
    Excludes in-person events and paid conference sponsorships.
