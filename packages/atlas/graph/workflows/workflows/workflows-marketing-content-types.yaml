attributes:
  displayName: "User-Generated Content Program"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Manages programs that collect, curate, and amplify user-generated content —
    designing UGC campaigns with clear participation incentives and brand
    guidelines, monitoring submissions across social platforms and review sites,
    managing rights acquisition and licensing workflows, curating high-quality
    content for marketing reuse across ads and organic channels, building creator
    community relationships, and measuring UGC impact on conversion rates and
    brand sentiment. Produces UGC collection reports, rights management logs, and
    content performance comparisons of UGC vs brand-produced assets. Excludes
    influencer contracts and paid partnerships.
