id: workflow:product-marketing-launch
attributes:
  displayName: "Product Marketing Launch"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Orchestrates the product marketing dimension of a launch — developing
    positioning and messaging frameworks, creating competitive battlecards,
    building demo scripts and sales enablement decks, coordinating analyst
    briefings, authoring launch blog posts and press materials, and arming
    customer-facing teams with talk tracks. Produces a launch readiness
    package. Excludes engineering release coordination and product roadmap
    decisions.
