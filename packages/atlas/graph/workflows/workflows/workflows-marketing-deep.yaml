id: workflow:influencer-partnership-management
attributes:
  displayName: "Influencer Partnership Management"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Manages the influencer marketing lifecycle — identifying potential
    partners based on audience alignment and engagement quality, conducting
    outreach and negotiation, coordinating content deliverables and approval
    workflows, tracking campaign performance through unique codes and UTM
    links, and measuring ROI against comparable paid channels. Produces
    partnership performance reports and renewal recommendations. Excludes
    legal contract drafting.
