---
nodeKind: Workflow
id: workflow:email-marketing-campaign-cycle
attributes:
  displayName: "Email Marketing Campaign Cycle"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Manages the recurring email marketing execution cycle — building
    audience segments from behavioral and CRM data, designing A/B test
    variants for subject lines and content, monitoring deliverability
    health indicators like bounce rates and spam complaints, analyzing
    open/click/conversion metrics by segment, and refining send-time
    optimization. Produces campaign performance reports and segment
    refinement recommendations. Excludes marketing automation platform
    administration.
edges:
  involves_role:
    - target: role:technical-writer
    - target: role:data-scientist
    - target: role:planner
  requires_skill_area:
