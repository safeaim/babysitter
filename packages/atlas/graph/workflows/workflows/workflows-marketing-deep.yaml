attributes:
  displayName: "Event Marketing Coordination"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Coordinates marketing presence at conferences, webinars, and sponsored
    events — managing booth logistics, speaker submission pipelines,
    attendee pre-event nurture sequences, on-site lead capture workflows,
    real-time social amplification, and post-event follow-up cadences.
    Produces event ROI analysis including cost-per-lead and pipeline
    influence attribution. Excludes long-term event strategy and
    sponsorship contract negotiation.
