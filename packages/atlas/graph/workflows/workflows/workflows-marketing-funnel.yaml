nodeKind: Workflow
id: workflow:account-based-marketing-cycle
attributes:
  displayName: "Account-Based Marketing Cycle"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Orchestrates account-based marketing programs targeting high-value accounts —
    selecting target accounts based on ICP fit scores and intent signals,
    personalizing content and messaging by account and buying committee role,
    coordinating multi-touch orchestration across ads, email, direct mail, and
    sales outreach, measuring account engagement scores and buying stage
    progression, and aligning marketing and sales on account prioritization and
    coverage strategy. Produces account tier lists, engagement heatmaps, and
    pipeline influence reports by account. Excludes broad demand generation and
    inbound marketing.
edges:
  involves_role:
    - target: role:planner
    - target: role:business-analyst
    - target: role:data-analyst
  requires_skill_area:
    - target: skill-area:marketing-automation
    - target: skill-area:market-research
  applies_to_domain:
