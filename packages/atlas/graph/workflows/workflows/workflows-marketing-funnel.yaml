nodeKind: Workflow
id: workflow:lead-nurture-sequence-optimization
attributes:
  displayName: "Lead Nurture Sequence Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Optimizes mid-funnel email nurture sequences for lead conversion — mapping
    content to buyer journey stages and pain points, testing email cadence and
    spacing, reviewing lead scoring threshold effectiveness, analyzing sequence
    drop-off points and engagement decay, personalizing content paths by segment
    and behavioral signals, and coordinating marketing-to-sales handoff timing
    based on intent signals. Produces sequence performance dashboards, scoring
    model adjustment recommendations, and content gap analyses by funnel stage.
    Excludes initial lead capture and sales outreach sequences.
edges:
  involves_role:
    - target: role:planner
