nodeKind: Workflow
id: workflow:partner-co-marketing-campaign
attributes:
  displayName: "Partner Co-Marketing Campaign"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Plans and executes joint marketing campaigns with technology and channel
    partners — identifying co-marketing opportunities aligned with mutual
    audience overlap, managing MDF budget allocation and reimbursement workflows,
    developing co-branded content assets and landing pages, coordinating joint
    webinars and events, managing lead sharing agreements and attribution splits,
    and measuring partner-sourced pipeline contribution. Produces partner
    campaign briefs, MDF utilization reports, and co-marketing ROI analyses.
    Excludes partner recruitment and contract negotiation.
edges:
  involves_role:
    - target: role:planner
    - target: role:business-analyst
