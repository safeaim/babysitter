nodeKind: Workflow
id: workflow:demand-generation-campaign
attributes:
  displayName: "Demand Generation Campaign"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-campaign"
  complexity: cross-team
  description: |
    Plans and executes top-of-funnel demand generation campaigns — creating
    awareness-stage content assets like guides, reports, and toolkits, designing
    gated content strategies with progressive profiling forms, orchestrating
    multi-channel distribution across paid, organic, and partner channels,
    managing lead magnet delivery and follow-up automation, qualifying
    marketing-qualified leads against ICP criteria, and measuring
    campaign-sourced pipeline contribution. Produces campaign briefs, lead
    quality analyses, and pipeline attribution reports. Excludes mid-funnel
    nurture sequences and sales qualification.
edges:
  involves_role:
    - target: role:planner
    - target: role:technical-writer
    - target: role:data-analyst
