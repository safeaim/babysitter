id: workflow:customer-marketing-campaign
attributes:
  displayName: "Customer Marketing Campaign"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Designs and executes post-acquisition marketing campaigns targeting existing
    customers — identifying cross-sell and upsell opportunities from product
    usage data, launching feature adoption campaigns for underutilized
    capabilities, building expansion revenue programs through upgrade incentives,
    creating customer advocacy programs that generate case studies and referrals,
    and measuring net revenue retention impact per campaign. Produces customer
    segment engagement reports, expansion pipeline attribution, and feature
    adoption lift analyses. Excludes customer support and success operations.
edges:
  involves_role:
    - target: role:planner
