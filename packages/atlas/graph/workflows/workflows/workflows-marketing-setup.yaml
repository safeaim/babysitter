nodeKind: Workflow
id: workflow:marketing-analytics-stack-setup
attributes:
  displayName: "Marketing Analytics Stack Setup"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    Establishes the marketing measurement infrastructure — designing UTM
    taxonomy and naming conventions, configuring analytics dashboards for
    channel and campaign performance, building attribution models
    (first-touch, multi-touch, data-driven), setting up data pipelines
    from ad platforms and CRM into a unified reporting layer, and defining
    KPI thresholds and alerting rules. Produces documented analytics
    architecture with validated data flows. Excludes ongoing reporting
    and optimization.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:staff-engineer
    - target: role:planner
