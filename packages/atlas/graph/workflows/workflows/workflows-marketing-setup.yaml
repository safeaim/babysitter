nodeKind: Workflow
id: workflow:brand-identity-refresh
attributes:
  displayName: "Brand Identity Refresh"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "annual"
  complexity: cross-team
  description: |
    Executes a brand identity update — revising visual identity elements
    (logo, color palette, typography), updating brand guidelines and voice
    documentation, refreshing digital and print asset templates,
    coordinating rollout across web properties, marketing materials, and
    product UI, and training teams on new guidelines. Produces updated
    brand book and asset library. Excludes strategic brand repositioning
    decisions.
edges:
  involves_role:
    - target: role:product-designer
    - target: role:planner
    - target: role:technical-writer
  applies_to_domain:
    - target: domain:marketing
    - target: domain:public-relations
  triggers_responsibility:
    - target: responsibility:write-user-docs
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:marketing-team
    - target: org-unit:design-team
    - target: org-unit:content-team
