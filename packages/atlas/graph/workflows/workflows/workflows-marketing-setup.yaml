---
nodeKind: Workflow
id: workflow:marketing-automation-platform-setup
attributes:
  displayName: "Marketing Automation Platform Setup"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    Configures and operationalizes a marketing automation platform —
    defining lead scoring models based on demographic and behavioral
    signals, building nurture flow templates, establishing list hygiene
    and suppression rules, integrating CRM bi-directional sync, setting
    up email authentication (SPF/DKIM/DMARC), and creating reporting
    dashboards. Produces a configured MAP with documented scoring rules
    and flow logic. Excludes ongoing campaign execution.
edges:
  involves_role:
    - target: role:staff-engineer
    - target: role:data-scientist
    - target: role:planner
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:marketing
    - target: domain:digital-marketing
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:marketing-team
    - target: org-unit:analytics-team
