nodeKind: Workflow
id: workflow:marketing-budget-allocation-review
attributes:
  displayName: "Marketing Budget Allocation Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Reviews and optimizes marketing budget allocation across channels and
    programs — comparing channel ROI and incrementality test results, evaluating
    diminishing returns curves by spend level, running scenario analyses for
    budget reallocation, assessing new channel investment opportunities against
    portfolio risk, reconciling planned vs actual spend with variance
    explanations, and aligning budget shifts with pipeline generation targets and
    seasonal demand patterns. Produces budget reallocation recommendations,
    channel efficiency reports, and spend-to-pipeline forecasts. Excludes annual
    budget planning and finance approvals.
edges:
  involves_role:
    - target: role:planner
    - target: role:business-analyst
    - target: role:data-analyst
  requires_skill_area:
    - target: skill-area:data-analytics
    - target: skill-area:market-research
  applies_to_domain:
