nodeKind: Workflow
id: workflow:conversion-rate-experimentation
attributes:
  displayName: "Conversion Rate Experimentation"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Manages systematic conversion rate optimization through structured
    experimentation — designing multivariate tests for landing pages, forms, and
    checkout flows, calculating required sample sizes for statistical
    significance, implementing experiment tracking and goal configuration,
    analyzing test results with proper segmentation and regression controls,
    documenting winning patterns into a CRO playbook, and prioritizing the
    experiment queue using ICE or PIE scoring frameworks. Produces experiment
    design documents, statistical analysis reports, and CRO playbook updates.
    Excludes traffic acquisition and UX redesign projects.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:product-designer
    - target: role:planner
  requires_skill_area:
