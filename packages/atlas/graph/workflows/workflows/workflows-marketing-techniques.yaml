nodeKind: Workflow
id: workflow:seo-technical-audit
attributes:
  displayName: "SEO Technical Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Conducts deep technical SEO audits beyond content optimization — diagnosing
    crawlability issues through log file analysis, validating structured data
    markup against schema.org specifications, measuring Core Web Vitals
    performance and identifying render-blocking resources, auditing hreflang
    implementations for international SEO, evaluating JavaScript rendering
    impacts on indexation, reviewing canonical tag correctness and redirect chain
    efficiency, and benchmarking site architecture depth against crawl budget
    constraints. Produces technical SEO audit reports, prioritized fix backlogs,
    and Core Web Vitals improvement plans. Excludes content writing and link
    building outreach.
edges:
  involves_role:
    - target: role:data-analyst
    - target: role:planner
    - target: role:technical-writer
