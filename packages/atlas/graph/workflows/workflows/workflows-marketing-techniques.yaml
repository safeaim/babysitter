id: workflow:personalization-engine-optimization
attributes:
  displayName: "Personalization Engine Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: cross-team
  description: |
    Optimizes dynamic personalization across marketing touchpoints — configuring
    recommendation algorithms for content and product suggestions, testing
    personalization rules by segment and behavioral trigger, measuring lift from
    personalized vs generic experiences, tuning real-time decisioning engines
    based on conversion data, managing fallback strategies for insufficient
    signal scenarios, and auditing personalization coverage across channels.
    Produces personalization coverage reports, A/B test result summaries, and
    algorithm tuning recommendations. Excludes personalization platform
    implementation and data pipeline engineering.
