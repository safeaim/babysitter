---
nodeKind: Workflow
id: workflow:campaign-launch
attributes:
  displayName: "Campaign Launch"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-campaign"
  complexity: cross-team
  description: |
    Orchestrates the end-to-end launch of a marketing campaign — coordinating
    creative asset delivery, channel activation, audience targeting validation,
    budget allocation, legal sign-off, and go-live timing across email, paid,
    social, and content channels. Produces a launch checklist and post-launch
    monitoring plan. Excludes long-term performance optimization.
edges:
  involves_role:
    - target: role:planner
    - target: role:product-designer
    - target: role:engineering-manager
  requires_skill_area:
