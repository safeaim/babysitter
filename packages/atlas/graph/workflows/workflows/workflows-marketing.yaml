nodeKind: Workflow
id: workflow:brand-audit
attributes:
  displayName: "Brand Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Evaluates brand consistency across all customer touchpoints — reviewing
    visual identity adherence, messaging alignment, tone-of-voice compliance,
    competitive positioning, and brand perception metrics from surveys and
    social listening. Produces a brand health scorecard and remediation
    recommendations. Excludes creative redesign work.
edges:
  involves_role:
    - target: role:product-designer
    - target: role:planner
    - target: role:technical-writer
  applies_to_domain:
    - target: domain:marketing
    - target: domain:public-relations
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:write-user-docs
  performed_by_org_unit:
    - target: org-unit:marketing-team
    - target: org-unit:product-team
