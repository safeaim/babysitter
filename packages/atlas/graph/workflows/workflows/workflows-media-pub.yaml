---
nodeKind: Workflow
id: workflow:editorial-workflow-management
attributes:
  displayName: "Editorial Workflow Management"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Manages the editorial production pipeline -- tracking content from pitch
    approval through assignment, drafting, copy editing, fact-checking,
    legal review, and publication, coordinating multimedia asset production
    with editorial timelines, managing contributor contracts and payment
    triggers, enforcing editorial style guide compliance, and sequencing
    content across print, digital, and social channels. Produces editorial
    calendars, production status dashboards, and post-publication
    performance attribution reports. Excludes content strategy and audience
    development.
edges:
  involves_role:
    - target: role:planner
    - target: role:technical-writer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:context-management
  applies_to_domain:
    - target: domain:media-publishing
    - target: domain:content-operations
  triggers_responsibility:
    - target: responsibility:release-coordination
    - target: responsibility:write-user-docs
  performed_by_org_unit:
    - target: org-unit:content-team
    - target: org-unit:product-team
---
nodeKind: Workflow
id: workflow:content-distribution-optimization
attributes:
  displayName: "Content Distribution Optimization"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Optimizes content distribution across channels -- analyzing audience
    engagement patterns by platform, time-of-day, and content format, A/B
    testing headline and thumbnail variants, managing syndication partner
    feeds and paywall metering rules, optimizing SEO metadata and structured
    data markup, coordinating push notification and email newsletter send
    schedules, and modeling subscription conversion funnels from content
    touchpoints. Produces distribution performance dashboards, channel
    attribution reports, and audience growth forecasts. Excludes content
    creation.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:ml-engineer
    - target: role:planner
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:retrieval-augmented-generation
  applies_to_domain:
    - target: domain:media-publishing
    - target: domain:digital-marketing
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:slo-definition
  performed_by_org_unit:
    - target: org-unit:growth-team
    - target: org-unit:analytics-team
