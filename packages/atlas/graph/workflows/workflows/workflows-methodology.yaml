---
nodeKind: Workflow
id: workflow:sprint-planning-ceremony
attributes:
  displayName: "Sprint Planning Ceremony"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "bi-weekly"
  complexity: single-team
  description: |
    Facilitates the sprint planning ceremony — reviewing backlog priorities,
    estimating story points, negotiating sprint scope with product, assigning
    ownership, identifying dependencies, and publishing the sprint commitment.
    Excludes daily standups and sprint execution.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:tech-lead
    - target: role:planner
  requires_skill_area:
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:retro-facilitation
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:product-team
