id: workflow:event-storming-session
attributes:
  displayName: "Event Storming Session"
  workflowKind: governance
  triggerType: on-demand
  typicalCadence: "per-initiative"
  complexity: cross-team
  description: |
    Facilitates a collaborative event storming workshop — mapping domain
    events, identifying aggregates and bounded contexts, discovering commands
    and policies, resolving hotspots, and producing a shared domain model
    that informs architecture decisions. Excludes implementation.
edges:
  involves_role:
