attributes:
  displayName: "Spec Review Cycle"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-spec"
  complexity: single-team
  description: |
    Manages the review lifecycle of a technical specification — circulating
    the draft, collecting structured feedback, facilitating review meetings,
    tracking revisions, resolving open questions, and recording the final
    approval decision. Excludes spec authoring.
