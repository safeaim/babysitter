nodeKind: Workflow
id: workflow:tdd-kata-session
attributes:
  displayName: "TDD Kata Session"
  workflowKind: development
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Conducts a time-boxed test-driven development practice session —
    selecting a coding kata, pairing participants, enforcing red-green-refactor
    discipline, reviewing solutions, and extracting TDD technique improvements
    for the team. Excludes production code writing.
edges:
  involves_role:
    - target: role:test-writer
    - target: role:implementer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:react-testing
  applies_to_domain:
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:code-review-coverage
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:quality-engineering
