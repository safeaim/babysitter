---
nodeKind: Workflow
id: workflow:monolith-extraction-planning
attributes:
  displayName: "Monolith Extraction Planning"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-initiative"
  complexity: cross-team
  description: |
    Plans the extraction of modules from a monolithic codebase — mapping
    dependency graphs, identifying seam points, sizing extraction effort per
    module, defining API boundaries for extracted services, sequencing
    extraction order based on risk and business value, and producing a phased
    migration plan. Excludes the actual extraction execution.
