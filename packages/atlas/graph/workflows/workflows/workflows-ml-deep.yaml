nodeKind: Workflow
id: workflow:model-card-maintenance
attributes:
  displayName: "Model Card Maintenance"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-model"
  complexity: single-team
  description: |
    Creates and updates model cards documenting model purpose, training data,
    evaluation metrics, known limitations, fairness assessments, and intended
    use. Ensures cards are reviewed before model deployment and kept current
    through the model lifecycle. Excludes model training.
edges:
  involves_role:
