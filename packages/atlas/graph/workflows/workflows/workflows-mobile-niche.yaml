---
nodeKind: Workflow
id: workflow:push-notification-delivery-audit
attributes:
  displayName: "Push Notification Delivery Audit"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Audits push notification delivery pipelines across iOS (APNs) and Android
    (FCM) — measuring delivery rates, analyzing token hygiene (stale/invalid
    tokens), verifying payload formatting, checking opt-in rates by segment,
    reviewing throttling and priority configurations, and surfacing silent-push
    failures. Excludes notification content strategy.
edges:
  involves_role:
    - target: role:implementer
    - target: role:qa-lead
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:push-notifications
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:mobile
    - target: domain:observability
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:triage-incoming-issues
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:quality-engineering
---
nodeKind: Workflow
id: workflow:mobile-deep-link-validation
attributes:
  displayName: "Mobile Deep Link Validation"
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: single-team
  description: |
    Validates deep link and universal link configurations across iOS and
    Android — testing URI scheme routing, verifying Apple App Site Association
    and Android App Links intent filters, checking deferred deep link
    attribution, validating fallback behavior for uninstalled apps, and
    confirming link previews render correctly. Excludes deep link analytics.
edges:
  involves_role:
    - target: role:test-writer
    - target: role:implementer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:deep-linking
    - target: skill-area:e2e-testing
  applies_to_domain:
    - target: domain:mobile
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:flaky-test-quarantine
    - target: responsibility:release-coordination
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:quality-engineering
