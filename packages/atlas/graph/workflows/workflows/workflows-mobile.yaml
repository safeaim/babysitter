nodeKind: Workflow
id: workflow:mobile-device-compatibility-testing
attributes:
  displayName: "Mobile Device Compatibility Testing"
  workflowKind: development
  triggerType: scheduled
  typicalCadence: "per-release"
  complexity: single-team
  description: |
    Validates app behavior across a matrix of physical and virtual devices,
    OS versions, and screen sizes — maintaining the device lab, executing
    compatibility suites, and triaging device-specific failures. Excludes performance profiling.
edges:
  involves_role:
    - target: role:test-writer
    - target: role:debugger
  requires_skill_area:
    - target: skill-area:react-testing
    - target: skill-area:chaos-engineering
  applies_to_domain:
    - target: domain:mobile
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:triage-incoming-issues
    - target: responsibility:flaky-test-quarantine
  performed_by_org_unit:
    - target: org-unit:quality-engineering
