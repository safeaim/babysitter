---
nodeKind: Workflow
id: workflow:grant-lifecycle-management
attributes:
  displayName: "Grant Lifecycle Management"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-grant"
  complexity: cross-team
  description: |
    Manages the grant lifecycle from prospect identification through
    closeout -- screening funding opportunities against organizational
    mission alignment and eligibility criteria, coordinating proposal
    development with program and finance teams, tracking submission
    deadlines and funder communication, managing award acceptance and
    sub-award agreements, monitoring grant expenditures against approved
    budgets and allowable cost categories, and preparing interim and final
    financial and narrative reports. Produces grant pipeline dashboards,
    budget-versus-actual reports, and funder compliance documentation.
    Excludes program design.
edges:
  involves_role:
    - target: role:planner
    - target: role:engineering-manager
    - target: role:technical-writer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:nonprofit
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:write-user-docs
  performed_by_org_unit:
    - target: org-unit:finance-team
    - target: org-unit:partnerships-team
---
nodeKind: Workflow
id: workflow:impact-measurement-review
attributes:
  displayName: "Impact Measurement Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews program impact measurement and outcomes -- defining
    theory-of-change logic models with measurable indicators, collecting
    beneficiary outcome data through surveys and administrative records,
    applying quasi-experimental methods to estimate counterfactual outcomes,
    validating data collection instruments for reliability and cultural
    appropriateness, and synthesizing findings against SDG (Sustainable
    Development Goals) alignment frameworks. Produces impact evaluation
    reports, outcome dashboards, and evidence briefs for donors and board
    governance. Excludes program delivery decisions.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:technical-writer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:eval-driven-development
  applies_to_domain:
    - target: domain:nonprofit
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:write-user-docs
  performed_by_org_unit:
    - target: org-unit:analytics-team
    - target: org-unit:partnerships-team
