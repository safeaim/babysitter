nodeKind: Workflow
id: workflow:slo-burn-rate-review
attributes:
  displayName: "SLO Burn Rate Review"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Reviews SLO error budget consumption rates across services — identifying
    services burning budget too fast, correlating burn-rate spikes with
    deployments or incidents, and triggering reliability-focused work when
    budgets approach exhaustion. Excludes SLO definition changes.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:staff-engineer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:sli-slo-management
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:observability
    - target: domain:platform-engineering
  triggers_responsibility:
    - target: responsibility:slo-definition
    - target: responsibility:respond-incidents
  performed_by_org_unit:
    - target: org-unit:platform-team
    - target: org-unit:engineering
