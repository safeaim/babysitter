---
nodeKind: Workflow
id: workflow:alert-tuning
attributes:
  displayName: "Alert Tuning"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: single-team
  description: |
    Reviews and optimizes alerting rules to reduce noise — analyzing
    alert-to-incident conversion rates, suppressing flapping alerts, tuning
    thresholds based on historical data, consolidating duplicate alerts, and
    adjusting routing policies. Excludes initial alert creation.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:staff-engineer
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:sli-slo-management
  applies_to_domain:
    - target: domain:observability
    - target: domain:devops
  triggers_responsibility:
    - target: responsibility:slo-definition
    - target: responsibility:on-call-rotation
  performed_by_org_unit:
    - target: org-unit:platform-team
    - target: org-unit:incident-response-team
