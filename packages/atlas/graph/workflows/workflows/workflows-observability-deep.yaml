nodeKind: Workflow
id: workflow:log-retention-policy
attributes:
  displayName: "Log Retention Policy"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews and enforces log retention configurations — auditing log volume
    growth, validating retention periods against compliance requirements,
    optimizing storage tiers, implementing log sampling strategies, and
    ensuring audit logs meet minimum retention mandates. Excludes log pipeline
    architecture.
edges:
  involves_role:
    - target: role:platform-engineer
    - target: role:security-reviewer
    - target: role:cloud-architect
  requires_skill_area:
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:observability
    - target: domain:security
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:security-review
  performed_by_org_unit:
    - target: org-unit:platform-team
    - target: org-unit:security-team
