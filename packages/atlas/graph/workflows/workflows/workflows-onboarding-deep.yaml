nodeKind: Workflow
id: workflow:role-transition-onboarding
attributes:
  displayName: "Role Transition Onboarding"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Onboards engineers through internal role transitions such as IC-to-manager,
    team switches, or specialization changes — mapping skill gaps between the
    prior and new role expectations, creating a 30-60-90-day transition plan with
    explicit deliverables at each checkpoint, arranging shadow sessions with
    experienced peers in the target role, scheduling stakeholder introduction
    meetings, establishing interim support structures (buddy system, skip-level
    check-ins), and conducting a transition retrospective at the 90-day mark.
    Produces transition plans, shadow session logs, and 90-day retrospective
    summaries. Excludes promotion decisions.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:cto
    - target: role:staff-engineer
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:tutorial-design
  applies_to_domain:
