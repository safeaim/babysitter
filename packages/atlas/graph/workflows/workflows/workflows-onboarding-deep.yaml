---
nodeKind: Workflow
id: workflow:team-rotation-program
attributes:
  displayName: "Team Rotation Program"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Manages structured team rotations for new hires during their first year —
    defining rotation schedules across 2-4 teams based on the engineer's growth
    goals and organizational needs, coordinating with receiving team leads on
    meaningful project scopes sized for rotation duration, setting explicit
    learning objectives for each rotation leg, facilitating mid-rotation
    check-ins between the rotator and both home and host managers, and capturing
    rotation feedback to refine the program. Produces rotation calendars,
    learning objective tracking sheets, and program effectiveness surveys.
    Excludes permanent team assignment decisions.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:vp-engineering
    - target: role:explorer
  requires_skill_area:
    - target: skill-area:tutorial-design
    - target: skill-area:domain-driven-design
  applies_to_domain:
