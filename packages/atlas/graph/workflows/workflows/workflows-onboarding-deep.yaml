nodeKind: Workflow
id: workflow:mentorship-pairing-cycle
attributes:
  displayName: "Mentorship Pairing Cycle"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Matches mentors with mentees and tracks mentorship progress across the
    engineering organization — collecting mentor availability and expertise
    profiles, gathering mentee development goals and preferred learning styles,
    running compatibility matching based on skill gaps, seniority delta, and team
    diversity, scheduling kickoff meetings with structured goal-setting templates,
    conducting monthly check-ins to assess relationship health and goal progress,
    and running end-of-cycle retrospectives to measure outcomes against
    objectives. Produces pairing rosters, mentorship goal trackers, and cycle
    retrospective reports. Excludes performance review integration.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:staff-engineer
    - target: role:principal-engineer
  requires_skill_area:
