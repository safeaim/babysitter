nodeKind: Workflow
id: workflow:codebase-orientation-walkthrough
attributes:
  displayName: "Codebase Orientation Walkthrough"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: single-team
  description: |
    Delivers a structured deep-dive into the codebase architecture for newly
    onboarded engineers — walking through the repository layout and module
    boundaries, explaining the build system and CI pipeline from first
    principles, demonstrating local development environment setup with smoke
    tests, reviewing key architectural decisions and their ADR documentation,
    tracing a representative request end-to-end through the system layers, and
    pairing on a small starter task that touches each layer. Produces onboarding
    checklists with completion timestamps, architecture map annotations, and
    new-hire feedback for documentation improvement. Excludes role-specific
    training.
edges:
  involves_role:
    - target: role:tech-lead
    - target: role:explorer
    - target: role:fullstack-engineer
  requires_skill_area:
    - target: skill-area:c4-modeling
    - target: skill-area:docs-as-code
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:knowledge-management
  triggers_responsibility:
    - target: responsibility:onboard-new-engineer
    - target: responsibility:adr-curation
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:engineering-productivity
