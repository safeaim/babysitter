nodeKind: Workflow
id: workflow:first-production-deploy-milestone
attributes:
  displayName: "First Production Deploy Milestone"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: single-team
  description: |
    Guides a new engineer through their first production deployment end-to-end —
    selecting an appropriately scoped task (bug fix or small feature) from the
    team backlog, pairing on implementation with emphasis on testing and
    observability conventions, walking through the code review process with
    constructive mentoring, demonstrating the deployment pipeline stages
    (staging, canary, production), supervising the actual production rollout with
    rollback readiness, and celebrating the milestone to reinforce psychological
    safety. Produces deploy checklists, first-deploy retrospective notes, and
    onboarding velocity metrics. Excludes ongoing deployment responsibilities.
edges:
  involves_role:
    - target: role:tech-lead
    - target: role:fullstack-engineer
    - target: role:code-reviewer
  requires_skill_area:
    - target: skill-area:canary-rollouts
    - target: skill-area:code-review-practice
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:devops
  triggers_responsibility:
    - target: responsibility:onboard-new-engineer
    - target: responsibility:release-coordination
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:release-engineering
