---
nodeKind: Workflow
id: workflow:oss-contribution-review
attributes:
  displayName: "Open Source Contribution Review"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-contribution"
  complexity: single-team
  description: |
    Reviews employee contributions to external open-source projects — IP
    clearance, license compatibility check, sensitive code scanning, and
    approval workflow. Excludes internal open-source project management.
edges:
