nodeKind: Workflow
id: workflow:risk-appetite-framework-review
attributes:
  displayName: "Risk Appetite Framework Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "annually"
  complexity: cross-team
  description: |
    Reviews and realigns the organizational risk appetite framework with
    strategic objectives -- evaluating whether risk appetite statements
    remain consistent with current business strategy and market
    conditions, assessing risk tolerance thresholds and limit structures
    for adequacy, reviewing risk capacity constraints including capital,
    liquidity, and reputational buffers, mapping risk appetite cascading
    from board-level statements to business-unit-level limits, validating
    that KRIs and escalation triggers align with stated appetite, and
    benchmarking risk appetite calibration against industry peers.
    Produces updated risk appetite statement, tolerance threshold
    recommendations, and board-level risk appetite report. Excludes
    strategic planning and capital allocation.
edges:
  involves_role:
    - target: role:operational-risk-analyst
    - target: role:risk-analyst
    - target: role:planner
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:operations
    - target: domain:strategy
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:risk-management-team
    - target: org-unit:strategy-team
