---
nodeKind: Workflow
id: workflow:operational-risk-event-analysis
attributes:
  displayName: "Operational Risk Event Analysis"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Analyzes operational risk loss events across the organization --
    capturing loss event details including root cause categorization per
    Basel II taxonomy, quantifying direct and indirect financial impacts,
    conducting causal analysis to identify process breakdowns and control
    failures, mapping events to the risk and control self-assessment
    inventory, determining whether existing controls were absent,
    inadequate, or circumvented, and recommending remediation actions with
    risk-owner assignments and target completion dates. Produces loss
    event report, root-cause analysis, and control gap remediation plan.
    Excludes control redesign and implementation.
edges:
  involves_role:
    - target: role:operational-risk-analyst
    - target: role:compliance-officer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:operations
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:risk-management-team
    - target: org-unit:operations-team
