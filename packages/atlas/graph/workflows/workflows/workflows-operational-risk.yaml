nodeKind: Workflow
id: workflow:key-risk-indicator-monitoring
attributes:
  displayName: "Key Risk Indicator Monitoring"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Monitors key risk indicators across operational, financial, and
    compliance risk categories -- maintaining KRI dashboards with
    real-time threshold tracking, analyzing threshold breaches against
    amber and red escalation triggers, identifying trend patterns that
    signal emerging risk concentrations, correlating KRI movements with
    operational loss events and near-misses, generating automated alerts
    for risk owners when indicators breach tolerances, and producing
    monthly KRI trend reports for the risk committee. Delivers KRI
    dashboard, breach notifications, and trend analysis report. Excludes
    KRI definition and threshold calibration.
edges:
  involves_role:
    - target: role:operational-risk-analyst
    - target: role:data-analyst
    - target: role:planner
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:operations
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:risk-management-team
    - target: org-unit:business-intelligence-team
