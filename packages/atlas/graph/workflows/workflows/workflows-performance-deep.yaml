nodeKind: Workflow
id: workflow:database-connection-pool-tuning
attributes:
  displayName: "Database Connection Pool Tuning"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-regression"
  complexity: single-team
  description: |
    Analyzes and optimizes database connection pool configurations -- profiling
    connection checkout latency, identifying pool exhaustion events, measuring
    connection idle timeout effectiveness, evaluating pool size against
    concurrent query load, analyzing connection leak patterns via stack trace
    attribution, testing pool warm-up strategies, validating
    PgBouncer/ProxySQL intermediate pooler settings, and recommending pool
    parameter changes with load-test validation. Excludes query optimization
    and schema migration.
edges:
  involves_role:
    - target: role:database-administrator
    - target: role:performance-profiler
    - target: role:backend-engineer
  requires_skill_area:
    - target: skill-area:postgres-tuning
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:databases
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:performance-budget-tracking
    - target: responsibility:slo-definition
  performed_by_org_unit:
    - target: org-unit:database-team
    - target: org-unit:engineering
