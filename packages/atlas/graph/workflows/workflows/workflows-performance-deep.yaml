nodeKind: Workflow
id: workflow:memory-leak-investigation
attributes:
  displayName: "Memory Leak Investigation"
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-issue"
  complexity: single-team
  description: |
    Systematically diagnoses and resolves memory leaks in production or staging
    services -- capturing heap snapshots over time, analyzing object retention
    graphs, identifying leaked allocations by class and call site, correlating
    memory growth with traffic patterns or specific endpoints, profiling native
    memory via tools like jemalloc or valgrind, differentiating true leaks from
    excessive caching, producing a root-cause report with fix recommendations,
    and verifying the fix stabilizes RSS under sustained load. Excludes
    preventive memory budgeting.
edges:
  involves_role:
    - target: role:performance-profiler
    - target: role:debugger
    - target: role:implementer
  requires_skill_area:
    - target: skill-area:profiling-memory
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:devops
  triggers_responsibility:
    - target: responsibility:performance-budget-tracking
    - target: responsibility:respond-incidents
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:engineering-productivity
