---
nodeKind: Workflow
id: workflow:latency-profiling-deep-dive
attributes:
  displayName: "Latency Profiling Deep Dive"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-issue"
  complexity: single-team
  description: |
    Investigates end-to-end request latency anomalies through systematic
    profiling -- capturing distributed traces, analyzing per-service latency
    contributions, identifying slow database queries via explain plans, profiling
    serialization/deserialization overhead, measuring network round-trip times
    between services, correlating latency spikes with GC pauses or thread
    contention, generating flame graphs for critical code paths, and producing
    targeted optimization recommendations with expected latency improvements.
    Excludes load testing and performance budgeting.
edges:
  involves_role:
    - target: role:performance-profiler
    - target: role:debugger
    - target: role:backend-engineer
  requires_skill_area:
    - target: skill-area:profiling-cpu
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:observability
  triggers_responsibility:
    - target: responsibility:performance-budget-tracking
    - target: responsibility:triage-incoming-issues
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:engineering-productivity
