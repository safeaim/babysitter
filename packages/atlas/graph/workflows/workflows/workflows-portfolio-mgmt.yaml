nodeKind: Workflow
id: workflow:investment-thesis-review
attributes:
  displayName: "Investment Thesis Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Periodically reviews investment theses against realized outcomes —
    comparing original thesis assumptions (earnings growth, sector
    rotation, macro regime) against actual market developments, measuring
    thesis-attributed P&L contribution, evaluating conviction-weighted
    position sizing against realized Sharpe ratios, reviewing thesis
    expiration timelines and catalyst calendars, and deciding whether to
    maintain, modify, or retire active theses. Produces thesis scorecard
    reports with hit-rate analysis and lessons-learned documentation.
    Excludes new thesis origination and trade execution.
edges:
  involves_role:
    - target: role:portfolio-manager
    - target: role:research-analyst
    - target: role:risk-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:portfolio-management
    - target: domain:capital-markets
  triggers_responsibility:
    - target: responsibility:research-publication
    - target: responsibility:portfolio-rebalancing
  performed_by_org_unit:
    - target: org-unit:portfolio-management-team
    - target: org-unit:quant-research
