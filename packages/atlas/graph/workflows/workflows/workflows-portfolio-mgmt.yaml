nodeKind: Workflow
id: workflow:asset-allocation-strategy-review
attributes:
  displayName: "Asset Allocation Strategy Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews strategic and tactical asset allocation against policy
    benchmarks — evaluating long-term capital market assumptions (expected
    returns, volatilities, correlations) for staleness, comparing realized
    allocation drift against strategic targets, assessing tactical tilts
    against macro regime indicators, reviewing benchmark appropriateness
    and peer-group comparison, and stress-testing allocation under tail
    scenarios. Produces allocation review memos with recommended
    adjustments, benchmark comparison tables, and efficient frontier
    analysis. Excludes individual security selection and execution.
edges:
  involves_role:
    - target: role:portfolio-manager
    - target: role:risk-analyst
    - target: role:research-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
