---
nodeKind: Workflow
id: workflow:portfolio-rebalancing-cycle
attributes:
  displayName: "Portfolio Rebalancing Cycle"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly-to-monthly"
  complexity: cross-team
  description: |
    Executes periodic portfolio rebalancing — measuring portfolio drift
    against target weights and risk factor exposures, generating optimized
    trade lists using mean-variance or risk-parity optimization with
    transaction cost penalties, pre-trade compliance checks against
    mandate constraints (sector limits, position concentration, ESG
    screens), coordinating execution timing across markets and time zones,
    and reconciling post-trade portfolio state against target. Produces
    rebalancing trade blotters, pre/post compliance reports, and
    implementation shortfall analysis. Excludes investment thesis
    formation and benchmark selection.
edges:
  involves_role:
    - target: role:portfolio-manager
    - target: role:quantitative-analyst
    - target: role:trading-systems-engineer
    - target: role:compliance-officer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:portfolio-management
    - target: domain:trading-operations
  triggers_responsibility:
    - target: responsibility:portfolio-rebalancing
    - target: responsibility:trading-system-reliability
  performed_by_org_unit:
    - target: org-unit:portfolio-management-team
    - target: org-unit:trading-desk
