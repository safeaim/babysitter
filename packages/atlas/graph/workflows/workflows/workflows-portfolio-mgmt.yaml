nodeKind: Workflow
id: workflow:portfolio-risk-attribution
attributes:
  displayName: "Portfolio Risk Attribution"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Decomposes portfolio profit-and-loss into factor, sector, and
    idiosyncratic contributions — running multi-factor risk model
    attribution (Barra, Axioma) to isolate systematic versus
    stock-specific returns, performing sector and geography
    allocation/selection analysis, calculating marginal contribution to
    risk for each position, stress-testing portfolio under historical and
    hypothetical scenarios, and generating risk budget utilization reports
    against allocated risk capital. Produces daily P&L attribution
    reports, risk factor exposure summaries, and risk limit utilization
    dashboards. Excludes trading execution and factor model construction.
edges:
  involves_role:
    - target: role:risk-analyst
    - target: role:portfolio-manager
    - target: role:quantitative-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:portfolio-management
    - target: domain:financial-risk-management
    - target: domain:quantitative-finance
  triggers_responsibility:
    - target: responsibility:risk-reporting
    - target: responsibility:portfolio-rebalancing
  performed_by_org_unit:
    - target: org-unit:market-risk-team
    - target: org-unit:portfolio-management-team
