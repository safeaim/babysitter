nodeKind: Workflow
id: workflow:media-coverage-analysis
attributes:
  displayName: "Media Coverage Analysis"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: single-team
  description: |
    Analyzes media coverage and public narrative about the
    organization — tracking mention volume and sentiment trends, evaluating
    message penetration from recent announcements, benchmarking
    share-of-voice against competitors, identifying emerging narrative
    themes, and assessing journalist relationship health. Produces media
    intelligence report and PR strategy adjustments. Excludes media outreach
    execution.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:technical-writer
    - target: role:planner
  requires_skill_area:
