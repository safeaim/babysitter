nodeKind: Workflow
id: workflow:knowledge-base-audit
attributes:
  displayName: "Knowledge Base Audit"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Audits the organizational knowledge base for quality and
    completeness — identifying outdated articles, detecting conflicting
    information across documents, analyzing search analytics for content
    gaps, reviewing article ownership and maintenance assignments, and
    evaluating taxonomy and tagging consistency. Produces audit findings with
    remediation assignments and archival recommendations. Excludes content
    rewriting.
edges:
  involves_role:
    - target: role:technical-writer
    - target: role:planner
    - target: role:engineering-manager
  applies_to_domain:
    - target: domain:knowledge-management
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:write-user-docs
    - target: responsibility:adr-curation
  performed_by_org_unit:
    - target: org-unit:product-team
    - target: org-unit:engineering
    - target: org-unit:operations-team
