---
nodeKind: Workflow
id: workflow:crisis-communication-drill
attributes:
  displayName: "Crisis Communication Drill"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Simulates a public-facing crisis scenario to test communication
    readiness — exercising spokesperson preparation, validating message
    approval chains, testing media response time, rehearsing social media
    monitoring and response protocols, and evaluating internal/external
    communication coordination. Produces drill performance assessment and
    communication playbook updates. Excludes actual crisis management.
edges:
  involves_role:
    - target: role:incident-commander
    - target: role:engineering-manager
    - target: role:technical-writer
  applies_to_domain:
    - target: domain:public-relations
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:incident-command
    - target: responsibility:respond-incidents
  performed_by_org_unit:
    - target: org-unit:marketing-team
    - target: org-unit:operations-team
    - target: org-unit:engineering
