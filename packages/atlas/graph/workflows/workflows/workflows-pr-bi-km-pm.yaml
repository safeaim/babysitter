nodeKind: Workflow
id: workflow:data-storytelling-workshop
attributes:
  displayName: "Data Storytelling Workshop"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Facilitates collaborative sessions to transform raw data insights into
    compelling business narratives — reviewing recent analytics findings,
    workshopping visualization approaches, practicing executive presentation
    techniques, critiquing draft data stories for clarity and impact, and
    building a shared library of storytelling patterns. Produces refined data
    narratives and presentation templates. Excludes data analysis itself.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:technical-writer
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
