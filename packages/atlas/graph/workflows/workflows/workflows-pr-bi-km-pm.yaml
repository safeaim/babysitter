nodeKind: Workflow
id: workflow:lessons-learned-capture
attributes:
  displayName: "Lessons Learned Capture"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-project"
  complexity: cross-team
  description: |
    Facilitates structured retrospectives at project completion or major
    milestones — gathering participant feedback, identifying what worked well
    and what failed, extracting reusable process improvements, documenting
    decision rationale for future reference, and routing actionable
    improvements to process owners. Produces lessons-learned document and
    process improvement tickets. Excludes process change implementation.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
    - target: role:staff-engineer
  applies_to_domain:
    - target: domain:knowledge-management
    - target: domain:project-management
  triggers_responsibility:
    - target: responsibility:retro-facilitation
    - target: responsibility:postmortem-writeup
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:product-team
    - target: org-unit:operations-team
