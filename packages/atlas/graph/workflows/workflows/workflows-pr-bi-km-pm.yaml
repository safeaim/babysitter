nodeKind: Workflow
id: workflow:project-portfolio-rebalancing
attributes:
  displayName: "Project Portfolio Rebalancing"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Rebalances the active project portfolio against strategic priorities and
    resource constraints — evaluating project health scores, assessing
    resource utilization and conflicts, analyzing portfolio risk
    concentration, recommending project acceleration, deprioritization, or
    cancellation, and reallocating budget and headcount across initiatives.
    Produces updated portfolio allocation and resource assignment plan.
    Excludes individual project execution decisions.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
    - target: role:staff-engineer
  applies_to_domain:
    - target: domain:project-management
    - target: domain:operations
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:capacity-planning
    - target: responsibility:cost-optimization
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:operations-team
    - target: org-unit:engineering
    - target: org-unit:product-team
