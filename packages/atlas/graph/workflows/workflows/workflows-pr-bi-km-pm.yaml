id: workflow:kpi-dashboard-review
attributes:
  displayName: "KPI Dashboard Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Reviews organizational KPI dashboards for accuracy and
    actionability — validating data freshness and pipeline integrity,
    assessing metric definition consistency, identifying misleading
    visualizations, evaluating dashboard coverage against strategic
    objectives, and recommending new metrics or retirement of stale ones.
    Produces dashboard health assessment and metric governance updates.
    Excludes dashboard implementation.
edges:
