nodeKind: Workflow
id: workflow:supplier-diversity-review
attributes:
  displayName: "Supplier Diversity Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews supplier diversity metrics and program effectiveness against
    organizational goals -- auditing diverse supplier certification status and
    validity across the vendor portfolio (MBE, WBE, SDVOB, HUBZone, LGBTBE
    classifications), measuring diverse spend as a percentage of total
    addressable procurement spend by category, evaluating the pipeline of
    diverse supplier candidates under consideration for upcoming procurement
    opportunities, assessing barriers to diverse supplier participation in
    procurement processes, reviewing second-tier diversity reporting from prime
    suppliers, tracking progress against annual diversity spend targets with
    variance analysis, benchmarking diversity metrics against industry peers and
    public commitment levels, and identifying procurement categories with
    untapped diverse supplier markets. Produces quarterly diversity dashboard,
    certification status report, gap analysis, and action plan for
    underperforming categories. Excludes supplier sourcing execution.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:data-quality
    - target: skill-area:data-governance
  applies_to_domain:
    - target: domain:procurement
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:vendor-evaluation
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:procurement-team
    - target: org-unit:operations-team
