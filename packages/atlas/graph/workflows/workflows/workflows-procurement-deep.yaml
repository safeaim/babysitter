nodeKind: Workflow
id: workflow:procurement-spend-analysis
attributes:
  displayName: "Procurement Spend Analysis"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Analyzes organizational procurement spend to identify optimization
    opportunities and policy compliance -- categorizing spend data by vendor,
    commodity code, business unit, and contract status to build a comprehensive
    spend cube, identifying maverick buying where purchases bypass preferred
    vendors or contract terms, detecting spend fragmentation across multiple
    vendors for the same commodity category, evaluating volume consolidation
    opportunities and projected savings from strategic sourcing, tracking
    contract coverage ratio to identify categories with significant off-contract
    spend, analyzing price variance within categories to surface negotiation
    opportunities, reviewing purchase order compliance against approval
    thresholds and delegation of authority policies, and assessing total cost of
    ownership for high-spend categories including hidden costs. Produces
    quarterly spend analysis report, consolidation opportunity matrix, maverick
    buying report, and savings pipeline forecast. Excludes sourcing execution.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:data-quality
    - target: skill-area:data-governance
  applies_to_domain:
    - target: domain:procurement
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:procurement-team
    - target: org-unit:operations-team
