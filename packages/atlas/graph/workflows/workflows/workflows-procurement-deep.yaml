---
nodeKind: Workflow
id: workflow:contract-renewal-negotiation
attributes:
  displayName: "Contract Renewal Negotiation"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Manages the vendor contract renewal process from preparation through
    execution -- triggering renewal preparation workflows at appropriate lead
    times based on contract value and complexity, compiling usage analytics and
    satisfaction data for the incumbent vendor's performance assessment,
    benchmarking current pricing against market alternatives and
    peer-negotiated rates, identifying renegotiation leverage points including
    unused entitlements, service level shortfalls, and competitive alternatives,
    drafting renewal term proposals covering pricing, SLA improvements, scope
    adjustments, and exit clause refinements, coordinating cross-functional
    input from technical stakeholders on feature requirements and integration
    dependencies, managing negotiation rounds with documentation of concession
    tracking and approval checkpoints, and conducting post-renewal
    retrospective on negotiation effectiveness. Produces renewal preparation
    brief, competitive benchmarking analysis, negotiation tracker, and executed
    contract summary. Excludes legal contract review.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
    - target: role:staff-engineer
  requires_skill_area:
    - target: skill-area:data-quality
    - target: skill-area:api-design
  applies_to_domain:
    - target: domain:procurement
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:vendor-evaluation
    - target: responsibility:cost-optimization
  performed_by_org_unit:
    - target: org-unit:procurement-team
    - target: org-unit:operations-team
