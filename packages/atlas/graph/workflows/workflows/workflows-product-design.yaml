nodeKind: Workflow
id: workflow:user-research-session
attributes:
  displayName: "User Research Session"
  workflowKind: development
  triggerType: event-driven
  typicalCadence: "per-feature"
  complexity: cross-team
  description: |
    Plans and conducts user research sessions — participant recruitment,
    script preparation, session facilitation, note synthesis, insight
    extraction, and findings distribution to product and engineering teams.
    Excludes long-term research strategy.
