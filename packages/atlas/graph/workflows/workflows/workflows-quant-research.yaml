nodeKind: Workflow
id: workflow:signal-decay-monitoring
attributes:
  displayName: "Signal Decay Monitoring"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: moderate
  description: |
    Monitors live trading signal degradation and triggers re-research when
    performance deteriorates — tracking rolling information coefficient and
    information ratio against historical baselines, detecting structural
    breaks in signal-return relationships using CUSUM and regime-change
    models, monitoring factor crowding indicators and capacity erosion,
    alerting when drawdown or hit-rate metrics breach predefined
    thresholds, and maintaining signal health dashboards with
    traffic-light status. Produces decay alert notifications and
    re-research prioritization queues. Excludes signal construction and
    strategy modification.
edges:
  involves_role:
    - target: role:quantitative-analyst
    - target: role:risk-analyst
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:quantitative-finance
    - target: domain:algorithmic-trading
  triggers_responsibility:
    - target: responsibility:model-validation
    - target: responsibility:risk-reporting
  performed_by_org_unit:
    - target: org-unit:quant-research
    - target: org-unit:market-risk-team
