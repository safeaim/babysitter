nodeKind: Workflow
id: workflow:research-notebook-reproducibility
attributes:
  displayName: "Research Notebook Reproducibility"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-publication"
  complexity: moderate
  description: |
    Ensures Jupyter and Quarto research notebooks reproduce results
    end-to-end — validating that all cells execute in sequence without
    manual intervention, pinning dependency versions and data snapshot
    timestamps, verifying numerical outputs match documented results
    within tolerance, checking random seed determinism across runs, and
    archiving reproducible notebook bundles with frozen data slices.
    Produces reproducibility attestation reports and identifies cells
    requiring manual data access or external API calls. Excludes original
    research content creation.
edges:
  involves_role:
    - target: role:quantitative-analyst
    - target: role:research-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:quantitative-finance
    - target: domain:data-science
  triggers_responsibility:
    - target: responsibility:research-publication
  performed_by_org_unit:
    - target: org-unit:quant-research
