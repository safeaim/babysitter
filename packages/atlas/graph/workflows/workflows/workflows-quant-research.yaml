nodeKind: Workflow
id: workflow:alternative-data-evaluation
attributes:
  displayName: "Alternative Data Evaluation"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-dataset-evaluation"
  complexity: cross-team
  description: |
    Evaluates new alternative data sources for investable alpha signal —
    assessing data vendor delivery reliability and coverage, profiling
    data quality (missing values, staleness, survivorship bias), performing
    point-in-time correctness validation to prevent look-ahead bias,
    running univariate predictive tests against forward returns, estimating
    incremental information content versus existing factor library, and
    analyzing regulatory/compliance implications of data usage. Produces
    data evaluation scorecards with signal strength metrics, cost-benefit
    analysis, and integration recommendations. Excludes vendor contract
    negotiation and data infrastructure provisioning.
edges:
  involves_role:
    - target: role:quantitative-analyst
    - target: role:research-analyst
    - target: role:data-engineer
    - target: role:compliance-officer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:quantitative-finance
    - target: domain:market-data
    - target: domain:data-engineering
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:research-publication
  performed_by_org_unit:
    - target: org-unit:quant-research
    - target: org-unit:trading-compliance
