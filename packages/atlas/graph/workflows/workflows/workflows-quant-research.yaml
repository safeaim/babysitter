---
nodeKind: Workflow
id: workflow:alpha-factor-research-cycle
attributes:
  displayName: "Alpha Factor Research Cycle"
  workflowKind: development
  triggerType: on-demand
  typicalCadence: "per-research-cycle"
  complexity: complex
  description: |
    Manages the end-to-end alpha factor discovery process — generating
    candidate factors from fundamental, technical, and alternative data
    sources, running single-sort quintile analysis with proper
    neutralization, evaluating multi-factor combination using
    orthogonalization and risk-model residualization, analyzing factor
    decay profiles and half-lives, testing factor crowding via turnover
    correlation analysis, and estimating factor capacity constraints.
    Produces factor tearsheets with IC/IR time-series, factor exposure
    summaries, and production readiness assessments. Excludes portfolio
    optimization and execution.
edges:
  involves_role:
    - target: role:quantitative-analyst
    - target: role:research-analyst
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:ml-fine-tuning
  applies_to_domain:
    - target: domain:quantitative-finance
    - target: domain:capital-markets
  triggers_responsibility:
    - target: responsibility:research-publication
    - target: responsibility:model-validation
  performed_by_org_unit:
    - target: org-unit:quant-research
