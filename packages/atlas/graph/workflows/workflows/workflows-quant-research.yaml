nodeKind: Workflow
id: workflow:quant-model-peer-review
attributes:
  displayName: "Quant Model Peer Review"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-model-submission"
  complexity: cross-team
  description: |
    Conducts rigorous peer review of quantitative models before production
    deployment — performing code review for implementation correctness and
    computational efficiency, verifying mathematical derivations and
    statistical methodology (hypothesis testing, multiple comparison
    corrections), auditing data pipeline integrity and point-in-time
    correctness, reviewing parameter sensitivity analysis and stress test
    results, and assessing model risk including regime-dependence and tail
    behaviour. Produces review verdicts with required changes, conditional
    approvals, or rejection rationale. Excludes model ideation and
    research direction setting.
edges:
  involves_role:
    - target: role:quantitative-analyst
    - target: role:research-analyst
    - target: role:risk-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:eval-driven-development
  applies_to_domain:
    - target: domain:quantitative-finance
    - target: domain:financial-risk-management
  triggers_responsibility:
    - target: responsibility:model-validation
    - target: responsibility:code-review-coverage
  performed_by_org_unit:
    - target: org-unit:quant-research
    - target: org-unit:market-risk-team
