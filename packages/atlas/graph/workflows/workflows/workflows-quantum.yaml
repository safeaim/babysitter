nodeKind: Workflow
id: workflow:error-correction-validation
attributes:
  displayName: "Error Correction Validation"
  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Validates quantum error correction implementations against
    theoretical thresholds -- simulating surface code decoders under
    realistic noise models, measuring logical error rates as a function
    of code distance, verifying syndrome extraction circuit correctness,
    benchmarking decoder latency against qubit coherence times, and
    confirming that pseudo-threshold estimates match published results.
    Excludes QEC code design.
edges:
  involves_role:
    - target: role:principal-engineer
    - target: role:data-scientist
    - target: role:test-writer
