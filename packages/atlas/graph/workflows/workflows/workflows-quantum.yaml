nodeKind: Workflow
id: workflow:quantum-hardware-calibration
attributes:
  displayName: "Quantum Hardware Calibration"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: single-team
  description: |
    Calibrates quantum hardware systems for optimal gate fidelity --
    running randomized benchmarking sequences, tuning qubit frequencies
    to minimize crosstalk, optimizing pulse shapes via DRAG calibration,
    measuring T1/T2 coherence times, characterizing readout assignment
    errors, updating the device calibration database, and gating system
    availability on minimum fidelity thresholds. Excludes hardware
    maintenance and cryogenic operations.
edges:
