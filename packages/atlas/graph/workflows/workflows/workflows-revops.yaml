nodeKind: Workflow
id: workflow:revenue-forecasting-model-calibration
attributes:
  displayName: "Revenue Forecasting Model Calibration"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Calibrates revenue forecasting models for improved accuracy —
    back-testing predicted vs actual outcomes by segment and time period,
    adjusting pipeline stage-weighting factors based on recent close-rate
    trends, validating win-rate assumptions across deal sizes and sales
    motions, incorporating macroeconomic and seasonality signals, and
    reconciling bottom-up rep forecasts with top-down model predictions.
    Produces model accuracy report and updated weighting parameters.
    Excludes financial planning and budgeting.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:eval-driven-development
  applies_to_domain:
    - target: domain:revenue-operations
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:revenue-operations-team
    - target: org-unit:analytics-team
    - target: org-unit:finance-team
