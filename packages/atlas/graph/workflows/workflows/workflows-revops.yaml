---
nodeKind: Workflow
id: workflow:lead-to-revenue-funnel-analysis
attributes:
  displayName: "Lead-to-Revenue Funnel Analysis"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Analyzes the full lead-to-revenue funnel across marketing, sales
    development, and sales — measuring stage conversion rates
    (MQL-to-SQL, SQL-to-opportunity, opportunity-to-close), identifying
    bottleneck stages with degrading velocity, segmenting performance by
    source/channel/segment, and benchmarking against historical cohorts.
    Produces funnel health report with specific stage-level improvement
    recommendations. Excludes individual campaign optimization and
    deal-level interventions.
edges:
  involves_role:
    - target: role:data-scientist
    - target: role:planner
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:revenue-operations
    - target: domain:marketing
    - target: domain:sales
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:revenue-operations-team
    - target: org-unit:marketing-team
    - target: org-unit:sales-team
