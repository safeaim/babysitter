nodeKind: Workflow
id: workflow:gtm-motion-alignment-review
attributes:
  displayName: "GTM Motion Alignment Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Reviews alignment across marketing, sales, and customer success
    go-to-market motions — auditing lead handoff SLA compliance and
    response times, evaluating MQL definition consistency with sales
    acceptance criteria, reviewing inter-team feedback loop health,
    assessing shared KPI alignment, and identifying process gaps causing
    lead leakage or customer experience friction. Produces alignment
    scorecard and process improvement action items. Excludes
    organizational restructuring.
edges:
  involves_role:
