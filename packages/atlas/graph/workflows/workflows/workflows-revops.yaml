nodeKind: Workflow
id: workflow:pricing-strategy-review
attributes:
  displayName: "Pricing Strategy Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews and refines pricing strategy — analyzing price sensitivity
    through win/loss data and discount distribution patterns, benchmarking
    against competitive pricing intelligence, evaluating packaging and
    tier structure effectiveness, modeling revenue impact of proposed
    pricing changes, and reviewing A/B pricing experiment results where
    applicable. Produces pricing adjustment recommendations with revenue
    impact projections. Excludes contract-level pricing negotiation.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:revenue-operations
    - target: domain:strategy
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:revenue-operations-team
    - target: org-unit:strategy-team
    - target: org-unit:product-team
