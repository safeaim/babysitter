---
nodeKind: Workflow
id: workflow:outbound-prospecting-cadence
attributes:
  displayName: "Outbound Prospecting Cadence"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: single-team
  description: |
    Manages the outbound sales development motion — building targeted
    prospect lists from ICP criteria, crafting personalized multi-channel
    sequences (email, LinkedIn, phone), tracking open/reply/meeting-booked
    rates by sequence variant, A/B testing messaging and cadence timing,
    and analyzing response patterns to refine personas. Produces sequence
    performance reports and prospect pipeline handoff metrics. Excludes
    deal negotiation and closing.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
  applies_to_domain:
    - target: domain:sales
    - target: domain:digital-marketing
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:performance-budget-tracking
  performed_by_org_unit:
    - target: org-unit:sales-team
---
nodeKind: Workflow
id: workflow:sales-forecast-review
attributes:
  displayName: "Sales Forecast Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Inspects forecast accuracy and pipeline integrity — reviewing commit
    vs best-case vs pipeline categories, analyzing historical close-rate
    deviation by rep and segment, identifying coverage gaps against
    quarterly targets, stress-testing upside scenarios, and reconciling
    CRM pipeline data with rep-submitted forecasts. Produces forecast
    confidence report with gap-closing action plans. Excludes individual
    deal strategy and territory rebalancing.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:data-scientist
    - target: role:planner
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:sales
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:sales-team
    - target: org-unit:revenue-operations-team
