nodeKind: Workflow
id: workflow:customer-renewal-management
attributes:
  displayName: "Customer Renewal Management"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Manages the customer renewal pipeline — monitoring upcoming renewals
    by cohort, scoring churn risk based on product usage and engagement
    signals, identifying upsell and expansion opportunities, coordinating
    renewal pricing with deal desk, and tracking renewal execution against
    targets. Produces renewal forecast updates and at-risk account
    intervention plans. Excludes new business acquisition and customer
    success program design.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
