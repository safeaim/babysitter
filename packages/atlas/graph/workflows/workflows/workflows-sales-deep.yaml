nodeKind: Workflow
id: workflow:enterprise-deal-negotiation
attributes:
  displayName: "Enterprise Deal Negotiation"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-opportunity"
  complexity: cross-team
  description: |
    Manages complex enterprise deal cycles from proposal through close —
    coordinating technical validation and proof-of-concept, assembling
    deal desk pricing with discount approval workflows, navigating legal
    redline cycles, managing procurement requirements (security
    questionnaires, vendor onboarding), and orchestrating executive
    sponsor engagement. Produces deal approval packages and negotiation
    outcome documentation. Excludes post-sale implementation and
    onboarding.
edges:
  involves_role:
    - target: role:planner
    - target: role:engineering-manager
    - target: role:staff-engineer
  applies_to_domain:
    - target: domain:sales
    - target: domain:legal
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:vendor-evaluation
  performed_by_org_unit:
    - target: org-unit:sales-team
    - target: org-unit:legal-team
    - target: org-unit:finance-team
