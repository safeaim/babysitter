id: workflow:partner-channel-sales-review
attributes:
  displayName: "Partner Channel Sales Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Reviews partner and channel sales performance — analyzing
    partner-sourced pipeline by tier and region, evaluating deal
    registration compliance, reviewing co-sell motion effectiveness,
    tracking partner enablement completion rates, and identifying
    high-potential partners for investment escalation. Produces partner
    scorecard updates and co-marketing recommendations. Excludes partner
    onboarding and contract negotiation.
