id: workflow:sales-proposal-management
attributes:
  displayName: "Sales Proposal Management"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-opportunity"
  complexity: cross-team
  description: |
    Manages the end-to-end proposal creation and approval workflow —
    assembling proposal documents from modular templates matched to deal size
    and product configuration, routing pricing exceptions through deal desk
    approval chains with SLA-bound response times, coordinating legal review
    of custom terms and contract modifications, managing e-signature workflows
    with tracking and reminder automation, versioning proposals through
    negotiation rounds with change-tracking, ensuring brand and messaging
    compliance across all customer-facing materials, and archiving signed
    agreements with metadata for renewal tracking. Produces proposal cycle-time
    analytics, approval bottleneck reports, and win/loss correlation with
    proposal attributes. Excludes pricing strategy and contract template
    design.
