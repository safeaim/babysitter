nodeKind: Workflow
id: workflow:inside-sales-cadence-optimization
attributes:
  displayName: "Inside Sales Cadence Optimization"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Optimizes SDR/BDR outbound sequencing and engagement tactics — designing
    multi-touch cadence structures with optimal spacing between email, phone,
    and LinkedIn touchpoints, analyzing call-block scheduling to maximize
    connect rates by time zone and persona, A/B testing email template subject
    lines and body copy against reply-rate benchmarks, monitoring sequence step
    drop-off rates to identify friction points, calibrating daily activity
    quotas against pipeline generation targets, and reviewing voicemail scripts
    and objection-handling frameworks. Produces cadence performance dashboards,
    template effectiveness rankings, and activity-to-pipeline conversion
    reports. Excludes deal qualification and closing.
