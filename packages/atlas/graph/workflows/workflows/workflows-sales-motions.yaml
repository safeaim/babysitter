attributes:
  displayName: "Demo and Trial Conversion Management"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Manages the demo-to-close and trial-to-paid conversion pipeline —
    scheduling and preparing personalized product demonstrations aligned with
    prospect use cases, activating trial environments with pre-configured
    sample data and guided onboarding flows, tracking feature adoption and
    engagement depth during trial periods, triggering sales outreach at
    critical engagement milestones or drop-off signals, analyzing
    demo-attended-to-opportunity conversion rates by persona and use case,
    coordinating technical resources for complex custom demo environments, and
    measuring time-to-value metrics for trial users. Produces trial health
    dashboards, demo effectiveness reports, and conversion funnel analytics.
    Excludes product development and pricing decisions.
