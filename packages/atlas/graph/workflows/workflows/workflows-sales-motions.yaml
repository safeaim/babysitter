attributes:
  displayName: "Field Sales Territory Optimization"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Optimizes field sales rep geographic coverage and account assignment —
    performing geo-spatial analysis of account density versus rep locations,
    modeling travel time and cost optimization across territory clusters,
    rebalancing account loads based on revenue potential and complexity scoring,
    aligning territory boundaries with vertical specialization and industry
    expertise, analyzing white-space opportunities in under-penetrated
    geographies, coordinating with marketing on regional event coverage, and
    recommending territory splits or merges based on growth trajectories.
    Produces territory heat maps, travel optimization reports, and account
    reassignment recommendations. Excludes quota setting and compensation
    design.
