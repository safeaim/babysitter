id: workflow:upsell-cross-sell-motion
attributes:
  displayName: "Upsell and Cross-Sell Motion"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Identifies and executes expansion revenue opportunities within the
    existing customer base — monitoring product usage signals that indicate
    readiness for tier upgrades or additional modules, analyzing customer
    health scores and engagement patterns to determine optimal expansion
    timing, generating personalized product recommendations based on current
    usage gaps and peer benchmarks, coordinating between customer success and
    sales on expansion handoff protocols, building ROI narratives using
    customer-specific value metrics, tracking expansion pipeline separately
    from new-logo pipeline with dedicated stage definitions, and measuring net
    revenue retention contribution by expansion motion type. Produces expansion
    signal dashboards, recommendation engine accuracy reports, and NRR
    attribution analytics. Excludes new customer acquisition.
