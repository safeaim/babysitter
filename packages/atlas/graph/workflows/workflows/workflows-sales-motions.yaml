id: workflow:sales-tech-stack-optimization
attributes:
  displayName: "Sales Tech Stack Optimization"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Audits and optimizes the sales technology ecosystem — inventorying all
    sales tools across CRM, engagement, intelligence, and enablement
    categories, measuring adoption rates and feature utilization depth per
    tool, evaluating integration health between tools including data sync
    latency and field mapping accuracy, identifying redundant capabilities
    across overlapping tools, benchmarking tool spend against industry norms by
    company stage, assessing rep satisfaction and workflow friction points
    through structured surveys, reviewing vendor roadmaps for alignment with
    evolving sales process needs, and recommending consolidation, replacement,
    or new tool introduction. Produces tech stack audit reports, integration
    health dashboards, ROI-per-tool analyses, and consolidation
    recommendations. Excludes CRM data migration and tool implementation
    projects.
edges:
