nodeKind: Workflow
id: workflow:competitive-displacement-playbook
attributes:
  displayName: "Competitive Displacement Playbook"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Develops and executes competitive displacement campaigns targeting accounts
    on competitor platforms — maintaining competitive intelligence on feature
    gaps, pricing vulnerabilities, and customer dissatisfaction signals,
    creating battle cards with objection-handling frameworks for each major
    competitor, designing switch-campaign messaging that addresses migration
    anxiety and total cost of ownership, coordinating technical migration
    support including data portability assessments and parallel-run planning,
    building ROI calculators calibrated to competitive switching scenarios,
    tracking displacement campaign pipeline separately with competitor-specific
    win/loss analysis, and feeding field intelligence back into product roadmap
    prioritization. Produces competitive battle card updates, displacement
    campaign performance reports, and migration playbook documentation.
    Excludes product development and pricing changes.
edges:
  involves_role:
    - target: role:planner
    - target: role:technical-writer
    - target: role:product-designer
  requires_skill_area:
    - target: skill-area:sales-methodology
    - target: skill-area:market-research
  applies_to_domain:
    - target: domain:sales
    - target: domain:digital-marketing
  triggers_responsibility:
    - target: responsibility:vendor-evaluation
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:sales-team
    - target: org-unit:marketing-team
