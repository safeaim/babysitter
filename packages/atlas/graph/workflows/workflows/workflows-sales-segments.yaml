nodeKind: Workflow
id: workflow:smb-self-serve-funnel
attributes:
  displayName: "SMB Self-Serve Funnel"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Manages the product-led growth funnel for SMB customers — optimizing
    free-to-paid conversion through in-product upgrade prompts triggered by
    usage limits and feature gates, designing automated onboarding sequences
    that guide users to activation milestones without human touch, monitoring
    cohort-based conversion rates from signup through first paid month,
    implementing behavioral scoring to identify high-intent free users for
    light-touch sales outreach, A/B testing pricing page layouts and plan
    packaging, managing self-serve billing flows including plan upgrades,
    downgrades, and cancellation deflection, and analyzing churn patterns in
    the first 90 days to identify friction points. Produces PLG funnel
    dashboards, cohort conversion analyses, and automated touchpoint
    effectiveness reports. Excludes enterprise sales motions and custom
    pricing.
edges:
  involves_role:
    - target: role:data-analyst
    - target: role:product-designer
    - target: role:planner
  requires_skill_area:
