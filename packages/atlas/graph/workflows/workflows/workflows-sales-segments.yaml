nodeKind: Workflow
id: workflow:strategic-account-expansion
attributes:
  displayName: "Strategic Account Expansion"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Plans and executes multi-year expansion strategies for top-tier strategic
    accounts — conducting comprehensive account mapping to identify all
    business units, subsidiaries, and potential buying centers, building
    executive alignment through QBR cadences and executive sponsor pairing,
    developing value engineering frameworks that quantify realized ROI and
    project forward expansion value, identifying new use cases and departments
    for land-and-expand through usage analytics and organizational change
    signals, coordinating multi-product roadmap presentations aligned to
    account strategic initiatives, managing white-space analysis to track
    penetration percentage versus total addressable spend, and planning joint
    innovation partnerships that create switching cost depth. Produces
    strategic account plans, executive engagement trackers, and multi-year
    revenue projection models. Excludes initial deal closing and tactical
    support.
