nodeKind: Workflow
id: workflow:hpc-job-scheduling-review
attributes:
  displayName: "HPC Job Scheduling Review"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: single-team
  description: |
    Reviews HPC cluster utilization and job queue health — rebalancing
    priority queues, identifying stalled jobs, optimizing resource
    allocation, and updating fair-share policies. Excludes hardware procurement.
