---
nodeKind: Workflow
id: workflow:competitive-intelligence-briefing
attributes:
  displayName: "Competitive Intelligence Briefing"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Produces structured competitive intelligence briefings for leadership --
    monitoring competitor product launches, pricing changes, and partnership
    announcements through automated alert feeds, analyzing competitor
    positioning shifts via website and messaging audits, comparing
    feature-by-feature capabilities against the organization's product,
    tracking competitor hiring patterns and engineering blog signals for
    technology-direction indicators, synthesizing win/loss interview data for
    competitive deal dynamics, and distributing actionable competitive
    battlecards to sales and product teams. Produces monthly competitive
    intelligence digest and updated battlecard library. Excludes strategic
    response planning.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:explorer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:strategy
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:vendor-evaluation
  performed_by_org_unit:
    - target: org-unit:strategy-team
    - target: org-unit:product-team
