nodeKind: Workflow
id: workflow:market-research-synthesis
attributes:
  displayName: "Market Research Synthesis"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Synthesizes market research inputs into actionable strategic insights --
    aggregating findings from industry analyst reports, primary customer
    interviews, and third-party market data, identifying macro trend signals
    and emerging technology disruption vectors, segmenting market data by
    geography, vertical, and company size, correlating customer feedback themes
    with market opportunity sizing, validating or challenging internal
    assumptions about market positioning with external evidence, and packaging
    synthesized findings into executive-ready insight briefs with strategic
    implications. Produces quarterly market intelligence report and trend
    radar. Excludes primary research execution.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:explorer
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:strategy
    - target: domain:business-intelligence
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:strategy-team
    - target: org-unit:product-team
