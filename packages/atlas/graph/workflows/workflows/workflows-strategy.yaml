nodeKind: Workflow
id: workflow:strategic-initiative-progress-review
attributes:
  displayName: "Strategic Initiative Progress Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Reviews progress of active strategic initiatives against planned
    milestones -- tracking OKR completion percentages and confidence levels
    across all strategic bets, evaluating resource allocation actuals versus
    plan by initiative, identifying cross-team dependency blockers requiring
    executive escalation, reviewing leading indicators and early-warning
    metrics for at-risk initiatives, facilitating trade-off discussions when
    initiatives compete for constrained resources, and updating initiative
    status dashboards for board and leadership visibility. Produces initiative
    progress report and escalation recommendations. Excludes annual planning
    and OKR-setting.
edges:
  involves_role:
    - target: role:planner
    - target: role:engineering-manager
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:adr-writing
  applies_to_domain:
