nodeKind: Workflow
id: workflow:business-model-canvas-review
attributes:
  displayName: "Business Model Canvas Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Conducts a structured review of the organization's business model canvas
    -- reassessing the core value proposition against evolving customer needs
    and competitive alternatives, evaluating channel strategy effectiveness and
    distribution economics, reviewing customer segment definitions and
    willingness-to-pay data, analyzing cost structure evolution and unit
    economics trends, stress-testing revenue model assumptions against market
    feedback, identifying new revenue streams or adjacency opportunities, and
    benchmarking the business model against emerging industry patterns and
    disruptive entrants. Produces updated business model canvas and strategic
    pivot recommendations. Excludes operational execution of model changes.
edges:
  involves_role:
    - target: role:planner
    - target: role:data-scientist
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:strategy
    - target: domain:entrepreneurship
    - target: domain:finance
  triggers_responsibility:
    - target: responsibility:cost-optimization
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:strategy-team
    - target: org-unit:finance-team
