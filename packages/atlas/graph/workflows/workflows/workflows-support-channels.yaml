nodeKind: Workflow
id: workflow:video-support-session-management
attributes:
  displayName: "Video Support Session Management"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Manages video and screen-sharing support sessions for complex technical
    issues — defining criteria for when issues warrant video escalation versus
    text-based resolution, scheduling video sessions with calendar integration
    and customer timezone awareness, preparing agents with ticket context and
    diagnostic pre-work before sessions, implementing screen-sharing protocols
    with customer consent and security boundaries, recording sessions with
    customer permission for knowledge capture and training purposes, extracting
    resolution steps from recordings into structured knowledge base articles,
    tracking video session outcomes including resolution rates, customer
    satisfaction, and average duration, and identifying patterns in
    video-escalated issues that could be prevented through documentation or
    product improvements. Produces video session utilization reports, knowledge
    capture metrics, and escalation pattern analyses. Excludes agent hiring and
    video platform procurement.
