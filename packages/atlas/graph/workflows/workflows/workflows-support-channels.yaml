nodeKind: Workflow
id: workflow:social-media-support-monitoring
attributes:
  displayName: "Social Media Support Monitoring"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Monitors and responds to customer support needs surfacing through social
    media channels — scanning brand mentions, tags, and relevant keywords
    across Twitter/X, LinkedIn, Facebook, and review platforms using social
    listening tools, classifying mentions by sentiment and intent to
    distinguish support requests from general commentary, routing
    support-worthy mentions to trained agents with social response expertise,
    managing public response SLAs with escalation paths for viral negative
    posts, transitioning complex issues from public threads to private DM
    conversations while maintaining audit trails, coordinating with marketing
    on brand voice consistency in public support responses, tracking social
    support volume trends and response effectiveness metrics, and identifying
    recurring product issues surfacing through social channels before they
    appear in ticket queues. Produces social support volume dashboards,
    sentiment trend reports, and public response SLA compliance metrics.
    Excludes social media marketing and community management.
edges:
  involves_role:
    - target: role:planner
    - target: role:devrel
    - target: role:data-analyst
  requires_skill_area:
