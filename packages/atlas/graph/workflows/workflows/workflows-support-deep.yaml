---
nodeKind: Workflow
id: workflow:sla-breach-response
attributes:
  displayName: "SLA Breach Response"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Responds to SLA threshold breaches in real time — detecting when ticket
    response or resolution times approach or exceed contractual SLA commitments,
    automatically escalating to service owners and on-call engineers, notifying
    account managers for customer-facing impact assessment, triggering war-room
    assembly for critical-tier breaches, tracking remediation steps until SLA
    compliance is restored, and generating breach post-analysis reports with
    root-cause attribution. Produces SLA breach alerts, escalation audit trails,
    and monthly SLA compliance dashboards. Excludes SLA contract negotiation.
edges:
  involves_role:
    - target: role:bug-triager
    - target: role:incident-commander
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:sli-slo-management
    - target: skill-area:incident-response
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:incident-command
    - target: responsibility:slo-definition
  performed_by_org_unit:
    - target: org-unit:support-team
    - target: org-unit:incident-response-team
---
nodeKind: Workflow
id: workflow:customer-feedback-triage
attributes:
  displayName: "Customer Feedback Triage"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Systematically routes inbound customer feedback to appropriate product and
    engineering teams — ingesting feedback from support tickets, NPS surveys,
    in-app widgets, and social channels, classifying submissions by theme (bug,
    feature request, UX friction, praise), scoring severity by customer tier and
    frequency of mention, deduplicating against existing backlog items, assigning
    ownership to the relevant product area, and closing the loop with customers
    when their feedback drives a shipped change. Produces feedback digest reports,
    theme trend analyses, and customer-closed-loop metrics. Excludes product
    roadmap prioritization.
edges:
  involves_role:
    - target: role:bug-triager
    - target: role:product-designer
    - target: role:engineering-manager
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:domain-driven-design
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:triage-incoming-issues
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:support-team
    - target: org-unit:product-team
