nodeKind: Workflow
id: workflow:support-tooling-review
attributes:
  displayName: "Support Tooling Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Periodically reviews the support technology stack and identifies automation
    opportunities — auditing ticket routing accuracy and auto-classification
    performance, benchmarking chatbot deflection rates against industry baselines,
    evaluating new AI-assisted support tools for triage and response suggestion,
    analyzing agent productivity metrics across tooling surfaces, assessing
    integration gaps between ticketing, CRM, and engineering systems, and
    producing a prioritized investment roadmap for support tooling improvements.
    Produces tooling audit reports, automation opportunity scorecards, and vendor
    comparison matrices. Excludes tool procurement execution.
edges:
  involves_role:
    - target: role:vp-engineering
    - target: role:platform-engineer
    - target: role:ai-champion
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:prompt-engineering
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:platform-engineering
  triggers_responsibility:
    - target: responsibility:vendor-evaluation
    - target: responsibility:ai-tooling-evaluation
  performed_by_org_unit:
    - target: org-unit:support-team
    - target: org-unit:engineering-productivity
