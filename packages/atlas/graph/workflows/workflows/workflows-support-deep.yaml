nodeKind: Workflow
id: workflow:tier2-escalation-management
attributes:
  displayName: "Tier-2 Escalation Management"
  workflowKind: operational
  triggerType: event-driven
  typicalCadence: "per-event"
  complexity: cross-team
  description: |
    Manages the escalation of support cases from L1 generalist agents to L2/L3
    specialist engineers — defining escalation criteria based on issue complexity,
    customer tier, and time-in-queue thresholds, packaging diagnostic context
    (logs, reproduction steps, environment details) into structured escalation
    handoff documents, routing to the appropriate specialist queue by technology
    domain, tracking escalation-to-resolution time, and feeding resolution
    patterns back to L1 as knowledge base updates. Produces escalation handoff
    packets, specialist utilization reports, and deflection-opportunity analyses.
    Excludes L1 ticket handling.
edges:
  involves_role:
    - target: role:bug-triager
    - target: role:debugger
    - target: role:fullstack-engineer
  requires_skill_area:
    - target: skill-area:incident-response
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:triage-incoming-issues
    - target: responsibility:runbook-authoring
  performed_by_org_unit:
    - target: org-unit:support-team
    - target: org-unit:engineering
