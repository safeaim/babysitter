nodeKind: Workflow
id: workflow:support-quality-assurance-review
attributes:
  displayName: "Support Quality Assurance Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "weekly"
  complexity: cross-team
  description: |
    Evaluates support interaction quality through structured ticket sampling and
    agent performance analysis -- selecting statistically representative ticket
    samples stratified by channel, issue type, and agent, scoring interactions
    against quality rubrics covering accuracy, empathy, completeness, and
    adherence to process, correlating quality scores with CSAT survey responses
    to validate rubric effectiveness, identifying coaching opportunities and
    high-performer patterns, tracking quality trends by team, tier, and product
    area, benchmarking first-contact resolution rates and handle times against
    quality-adjusted baselines, and surfacing systemic knowledge gaps that drive
    repeat contacts. Produces weekly QA scorecard, agent coaching
    recommendations, and quality trend reports. Excludes agent disciplinary
    actions.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:data-scientist
    - target: role:planner
  requires_skill_area:
    - target: skill-area:data-quality
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:retro-facilitation
  performed_by_org_unit:
    - target: org-unit:support-team
    - target: org-unit:customer-success
