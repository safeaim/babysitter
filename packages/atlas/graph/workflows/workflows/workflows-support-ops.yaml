nodeKind: Workflow
id: workflow:self-service-portal-content-review
attributes:
  displayName: "Self-Service Portal Content Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Evaluates the effectiveness of help center and self-service portal content
    in deflecting support tickets -- analyzing search analytics to identify top
    queries with zero results or low click-through, measuring article
    effectiveness through resolution-confirmation signals and subsequent ticket
    creation rates, auditing article accuracy against current product behavior
    and release notes, reviewing content coverage gaps by mapping ticket
    categories to existing knowledge base articles, assessing content freshness
    by tracking articles not updated since their referenced feature changed,
    evaluating navigation and taxonomy effectiveness through user journey
    analytics, and benchmarking self-service resolution rates against industry
    standards. Produces content effectiveness scorecard, gap analysis report,
    and content refresh priority queue. Excludes article authoring.
edges:
  involves_role:
    - target: role:technical-writer
    - target: role:product-designer
    - target: role:data-scientist
  requires_skill_area:
    - target: skill-area:domain-driven-design
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:customer-experience
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:write-user-docs
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:support-team
    - target: org-unit:customer-success
