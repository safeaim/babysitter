---
nodeKind: Workflow
id: workflow:network-capacity-planning
attributes:
  displayName: "Network Capacity Planning"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Plans network infrastructure capacity to meet projected demand --
    analyzing traffic growth trends by cell site, fiber ring, and backhaul
    segment, modeling subscriber-growth scenarios against spectrum efficiency
    limits, identifying congestion bottlenecks through busy-hour utilization
    analysis, generating capital-expenditure proposals for capacity
    augmentation, and validating expansion plans against regulatory
    spectrum-holding constraints. Produces capacity heatmaps, investment
    priority rankings, and spectrum utilization reports. Excludes network
    architecture redesign.
edges:
  involves_role:
    - target: role:cloud-architect
    - target: role:data-scientist
    - target: role:planner
  requires_skill_area:
    - target: skill-area:observability-pipeline
    - target: skill-area:sli-slo-management
  applies_to_domain:
    - target: domain:telecommunications
    - target: domain:networking
  triggers_responsibility:
    - target: responsibility:capacity-planning
    - target: responsibility:review-architecture-changes
  performed_by_org_unit:
    - target: org-unit:platform-team
    - target: org-unit:operations-team
---
nodeKind: Workflow
id: workflow:spectrum-allocation-review
attributes:
  displayName: "Spectrum Allocation Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews the allocation and utilization of radio-frequency spectrum
    holdings -- auditing licensed band usage against regulatory
    minimum-utilization requirements, analyzing interference reports from
    adjacent-channel operators, evaluating dynamic spectrum sharing
    efficiency between 4G and 5G layers, modeling refarming scenarios for
    legacy bands, and preparing regulatory renewal documentation. Produces
    spectrum utilization scorecards, interference incident logs, and
    refarming impact analyses. Excludes spectrum auction bidding strategy.
edges:
  involves_role:
    - target: role:principal-engineer
    - target: role:planner
    - target: role:security-reviewer
  requires_skill_area:
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:telecommunications
    - target: domain:infrastructure
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:regulatory-filing
  performed_by_org_unit:
    - target: org-unit:engineering
    - target: org-unit:compliance-team
