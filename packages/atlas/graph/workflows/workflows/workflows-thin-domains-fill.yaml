  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Reviews fleet environmental compliance against IMO regulations and
    port state requirements -- auditing MARPOL Annex VI SOx and NOx
    emission records against Emission Control Area transit logs,
    verifying ballast water management system treatment records and BWM
    Convention compliance, reviewing Oil Record Book and Garbage Record
    Book entries for completeness and accuracy, assessing Carbon
    Intensity Indicator (CII) ratings and EEXI compliance status for
    each vessel, evaluating scrubber washwater discharge monitoring data
    against MEPC guidelines, auditing fuel oil changeover procedures for
    SECA zone compliance, and tracking SEEMP (Ship Energy Efficiency
    Management Plan) implementation effectiveness. Produces fleet
    environmental compliance report, CII improvement roadmap, and
    regulatory risk matrix. Excludes vessel retrofitting.
