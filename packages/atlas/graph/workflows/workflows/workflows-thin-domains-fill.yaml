    adequacy -- reviewing loss development triangle selections and trend
    assumptions, testing Generalized Linear Model and gradient-boosted
    model implementations against independent replications, evaluating
    model discrimination and calibration metrics on holdout datasets,
    assessing parameter stability across re-estimation windows, auditing
    exposure base accuracy and premium-to-loss linkage, stress-testing
    reserve adequacy under adverse scenario assumptions, reviewing ASOP
    (Actuarial Standard of Practice) compliance in documentation, and
    benchmarking model outputs against industry loss benchmarks. Produces
    model validation report, backtesting results, and remediation
    recommendations. Excludes model development and rate filing.
