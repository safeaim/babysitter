  workflowKind: governance
  triggerType: event-driven
  typicalCadence: "per-release"
  complexity: cross-team
  description: |
    Validates genomic data processing pipelines end-to-end -- verifying
    FASTQ quality filtering against Phred score thresholds, checking
    alignment accuracy against reference genome assemblies
    (GRCh38/T2T-CHM13), benchmarking variant calling sensitivity and
    specificity on truth-set datasets (e.g., Genome in a Bottle),
    auditing annotation databases for currency and completeness, testing
    pipeline reproducibility across compute environments and software
    versions, and confirming output formats meet VCF specification and
    downstream analysis requirements. Produces validation report with
    concordance metrics and pipeline certification status. Excludes
    pipeline development and wet-lab sample preparation.
