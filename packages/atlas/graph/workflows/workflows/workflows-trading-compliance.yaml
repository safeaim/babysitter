nodeKind: Workflow
id: workflow:best-execution-review
attributes:
  displayName: "Best Execution Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "monthly"
  complexity: cross-team
  description: |
    Analyzes execution quality against MiFID II and Reg NMS
    best-execution benchmarks — measuring implementation shortfall versus
    arrival price, VWAP, and TWAP benchmarks, evaluating venue selection
    and smart order routing effectiveness, analyzing broker algorithm
    performance with per-broker scorecards, reviewing execution costs
    across explicit (commissions, exchange fees) and implicit (spread,
    market impact) components, assessing order handling and routing
    practices for conflicts of interest, and preparing best-execution
    policy compliance documentation. Produces best-execution review
    reports, broker ranking tables, and regulatory compliance
    attestations. Excludes execution algorithm development and order
    routing infrastructure changes.
edges:
  involves_role:
    - target: role:compliance-officer
    - target: role:trading-systems-engineer
    - target: role:quantitative-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
  applies_to_domain:
    - target: domain:regulatory-finance
    - target: domain:trading-operations
    - target: domain:capital-markets
  triggers_responsibility:
    - target: responsibility:regulatory-reporting
  performed_by_org_unit:
    - target: org-unit:trading-compliance
    - target: org-unit:trading-desk
