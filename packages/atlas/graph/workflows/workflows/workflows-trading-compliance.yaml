nodeKind: Workflow
id: workflow:trading-surveillance-review
attributes:
  displayName: "Trading Surveillance Review"
  workflowKind: governance
  triggerType: continuous
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Monitors trading activity for market abuse and regulatory
    violations — running surveillance algorithms to detect insider trading
    patterns (trading ahead of material non-public information),
    identifying potential market manipulation (layering, spoofing, wash
    trades, marking the close), monitoring for front-running of client
    orders, reviewing cross-market alert correlations, investigating
    flagged alerts with trade reconstruction and communication review, and
    escalating confirmed suspicious activity to compliance leadership for
    SAR filing. Produces surveillance alert dashboards, investigation case
    files, and regulatory examination-ready audit logs. Excludes
    regulatory policy creation and enforcement action proceedings.
edges:
  involves_role:
    - target: role:compliance-officer
    - target: role:risk-analyst
    - target: role:security-risk-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:regulatory-finance
    - target: domain:capital-markets
    - target: domain:trading-operations
  triggers_responsibility:
    - target: responsibility:regulatory-reporting
    - target: responsibility:risk-reporting
  performed_by_org_unit:
    - target: org-unit:trading-compliance
    - target: org-unit:market-risk-team
