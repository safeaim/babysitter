nodeKind: Workflow
id: workflow:market-data-feed-validation
attributes:
  displayName: "Market Data Feed Validation"
  workflowKind: operational
  triggerType: continuous
  typicalCadence: "daily"
  complexity: moderate
  description: |
    Validates market data feed integrity across all consumed data
    sources — detecting data gaps and sequence number discontinuities in
    real-time tick feeds, identifying stale prices through last-update
    timestamp monitoring, performing cross-vendor price comparison to
    detect outliers and erroneous prints, validating reference data
    (symbol mapping, lot sizes, tick sizes) against exchange master files,
    and monitoring feed latency distributions against SLA thresholds.
    Produces data quality dashboards, vendor comparison scorecards, and
    stale-price alert reports. Excludes data vendor selection and contract
    management.
edges:
  involves_role:
    - target: role:trading-systems-engineer
    - target: role:data-engineer
  requires_skill_area:
    - target: skill-area:kafka-stream-processing
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:market-data
    - target: domain:trading-operations
    - target: domain:data-engineering
  triggers_responsibility:
    - target: responsibility:data-quality-monitoring
    - target: responsibility:trading-system-reliability
  performed_by_org_unit:
    - target: org-unit:trading-desk
    - target: org-unit:quant-research
