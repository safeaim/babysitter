nodeKind: Workflow
id: workflow:trading-system-failover-drill
attributes:
  displayName: "Trading System Failover Drill"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Tests disaster recovery and business continuity for trading
    infrastructure — executing planned failover of order management
    systems and execution management systems to secondary data centers,
    validating market data feed reconnection and gap-fill procedures,
    testing FIX session re-establishment with broker and exchange
    gateways, verifying position and order state recovery from persistent
    stores, measuring recovery time objectives against regulatory and
    business requirements, and conducting tabletop exercises for extended
    outage scenarios. Produces DR test reports with RTO/RPO measurements,
    gap findings, and remediation action items. Excludes production
    trading activity and strategy deployment.
edges:
  involves_role:
    - target: role:trading-systems-engineer
    - target: role:platform-engineer
    - target: role:risk-analyst
  requires_skill_area:
    - target: skill-area:chaos-engineering
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:trading-operations
    - target: domain:capital-markets
  triggers_responsibility:
    - target: responsibility:trading-system-reliability
    - target: responsibility:respond-incidents
  performed_by_org_unit:
    - target: org-unit:trading-desk
    - target: org-unit:market-risk-team
