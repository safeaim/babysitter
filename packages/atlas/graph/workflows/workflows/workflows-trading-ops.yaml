---
nodeKind: Workflow
id: workflow:trade-reconciliation-cycle
attributes:
  displayName: "Trade Reconciliation Cycle"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "daily"
  complexity: cross-team
  description: |
    Matches trade records across order management system, broker
    confirmations, clearing house statements, and custodian records —
    performing automated three-way reconciliation of trade date,
    settlement date, quantity, and price fields, identifying and
    categorizing breaks (price, quantity, commission, counterparty
    mismatches), escalating unresolved breaks by aging bucket and
    materiality threshold, and tracking break resolution rates against SLA
    targets. Produces daily reconciliation dashboards, open break aging
    reports, and resolution audit trails. Excludes trade booking and
    settlement instruction generation.
edges:
  involves_role:
    - target: role:trading-systems-engineer
    - target: role:operational-risk-analyst
  requires_skill_area:
    - target: skill-area:python-data-pipelines
    - target: skill-area:observability-pipeline
  applies_to_domain:
    - target: domain:trading-operations
    - target: domain:capital-markets
  triggers_responsibility:
    - target: responsibility:trading-system-reliability
    - target: responsibility:data-quality-monitoring
  performed_by_org_unit:
    - target: org-unit:trading-desk
