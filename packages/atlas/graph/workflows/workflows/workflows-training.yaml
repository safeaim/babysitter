---
nodeKind: Workflow
id: workflow:certification-program-management
attributes:
  displayName: "Certification Program Management"
  workflowKind: operational
  triggerType: scheduled
  typicalCadence: "quarterly"
  complexity: cross-team
  description: |
    Manages professional certification programs for the engineering workforce
    -- maintaining a catalog of approved certifications mapped to career
    levels and specializations, tracking individual certification status and
    renewal timelines, coordinating exam scheduling and study-group
    formation, managing certification reimbursement budgets and approval
    workflows, analyzing certification coverage gaps against team capability
    requirements, reporting certification attainment trends by team and
    domain, and evaluating new certification programs for catalog inclusion.
    Produces certification coverage dashboard and budget utilization report.
    Excludes external training vendor selection.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
  requires_skill_area:
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:human-resources
    - target: domain:software-engineering
  triggers_responsibility:
    - target: responsibility:onboard-new-engineer
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:training-team
    - target: org-unit:hr-team
    - target: org-unit:engineering
---
nodeKind: Workflow
id: workflow:leadership-development-review
attributes:
  displayName: "Leadership Development Review"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Reviews the effectiveness and pipeline health of leadership development
    programs -- assessing high-potential identification accuracy against
    subsequent promotion and performance outcomes, evaluating program
    completion rates and participant satisfaction scores, measuring
    behavioral change through 360-degree feedback delta analysis, reviewing
    succession-plan bench-strength for critical leadership roles, analyzing
    diversity representation in leadership pipeline at each stage,
    benchmarking program investment per participant against industry norms,
    and identifying program design adjustments for emerging leadership
    competency needs. Produces leadership development effectiveness report
    and succession-bench update. Excludes individual coaching.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:planner
  requires_skill_area:
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:human-resources
    - target: domain:operations
  triggers_responsibility:
    - target: responsibility:retro-facilitation
    - target: responsibility:capacity-planning
  performed_by_org_unit:
    - target: org-unit:training-team
    - target: org-unit:hr-team
