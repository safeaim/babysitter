nodeKind: Workflow
id: workflow:technical-skills-gap-analysis
attributes:
  displayName: "Technical Skills Gap Analysis"
  workflowKind: governance
  triggerType: scheduled
  typicalCadence: "semi-annually"
  complexity: cross-team
  description: |
    Analyzes technical skills gaps across engineering teams relative to
    strategic technology needs -- surveying current skill inventories through
    self-assessment and manager calibration, mapping required skills against
    technology roadmap and architecture evolution plans, identifying critical
    skill shortages by team and domain, modeling build-vs-hire-vs-outsource
    options for gap remediation, designing targeted upskilling programs with
    measurable competency milestones, prioritizing training investments by
    business-impact weighted gap severity, and tracking skill-acquisition
    progress against quarterly targets. Produces skills gap heat map and
    remediation investment plan. Excludes individual performance reviews.
edges:
  involves_role:
    - target: role:engineering-manager
    - target: role:tech-lead
    - target: role:planner
  requires_skill_area:
    - target: skill-area:data-quality
  applies_to_domain:
    - target: domain:software-engineering
    - target: domain:human-resources
  triggers_responsibility:
    - target: responsibility:capacity-planning
    - target: responsibility:onboard-new-engineer
  performed_by_org_unit:
    - target: org-unit:training-team
    - target: org-unit:engineering
    - target: org-unit:hr-team
