---
nodeKind: Workflow
id: workflow:heuristic-evaluation-audit
attributes:
  displayName: "Heuristic Evaluation Audit"
  workflowKind: governance
  triggerType: on-demand
  typicalCadence: "per-feature"
  complexity: single-team
  description: |
    Conducts expert heuristic evaluations of user interfaces against Nielsen's
    usability heuristics and domain-specific guidelines — reviewing visibility
    of system status, error prevention, consistency, recognition over recall,
    and aesthetic minimalism. Produces severity-rated findings with remediation
    recommendations. Excludes usability testing with end users.
edges:
  involves_role:
    - target: role:product-designer
    - target: role:frontend-engineer
    - target: role:tech-lead
  requires_skill_area:
    - target: skill-area:design-systems
    - target: skill-area:accessibility-first-design
  applies_to_domain:
    - target: domain:web-development
  triggers_responsibility:
    - target: responsibility:review-architecture-changes
    - target: responsibility:code-review-coverage
  performed_by_org_unit:
    - target: org-unit:frontend-team
    - target: org-unit:product-team
