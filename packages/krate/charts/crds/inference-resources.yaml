apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kratemodelroutes.krate.a5c.ai
spec:
  group: krate.a5c.ai
  scope: Namespaced
  names:
    plural: kratemodelroutes
    singular: kratemodelroute
    kind: KrateModelRoute
    shortNames:
    - kmr
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Model
      type: string
      jsonPath: .spec.modelName
    - name: Type
      type: string
      jsonPath: .spec.routeType
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            required:
            - organizationRef
            - modelName
            - routeType
            properties:
              organizationRef:
                type: string
              modelName:
                type: string
                description: Logical model name that agents request
              routeType:
                type: string
                enum:
                - internal
                - external
              internal:
                type: object
                description: KServe internal routing configuration
                properties:
                  inferenceServiceRef:
                    type: string
                  protocol:
                    type: string
              external:
                type: object
                description: Cloud LLM external routing configuration
                properties:
                  provider:
                    type: string
                  endpoint:
                    type: string
                  model:
                    type: string
                  authSecretRef:
                    type: string
              priority:
                type: integer
                default: 100
              enabled:
                type: boolean
                default: true
              rateLimits:
                type: object
                properties:
                  requestsPerMinute:
                    type: integer
                  tokensPerMinute:
                    type: integer
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              phase:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              resolvedEndpoint:
                type: string
