{{- if .Values.apiService.enabled -}}
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.krate.a5c.ai
  labels:
    {{- include "krate.labels" . | nindent 4 }}
spec:
  group: krate.a5c.ai
  version: v1alpha1
  groupPriorityMinimum: 1000
  versionPriority: 15
  insecureSkipTLSVerify: true
  service:
    namespace: {{ .Release.Namespace }}
    name: {{ include "krate.fullname" . }}-api
    port: {{ .Values.api.service.port }}
{{- end }}
