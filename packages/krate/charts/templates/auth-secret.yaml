{{- $auth := .Values.auth | default dict -}}
{{- $github := $auth.github | default dict -}}
{{- $sso := $auth.sso | default dict -}}
{{- $githubEnabled := not (eq (toString $github.enabled) "false") -}}
{{- $ssoEnabled := eq (toString $sso.enabled) "true" -}}
{{- $renderGithub := and $githubEnabled (not $github.existingSecret) -}}
{{- $renderSso := and $ssoEnabled (not $sso.existingSecret) -}}
{{- if or $renderGithub $renderSso }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "krate.fullname" . }}-auth
  labels:
    {{- include "krate.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $renderGithub }}
  github-client-id: {{ default "" $github.clientId | quote }}
  github-client-secret: {{ default "" $github.clientSecret | quote }}
  {{- end }}
  {{- if $renderSso }}
  sso-client-id: {{ default "" $sso.clientId | quote }}
  sso-client-secret: {{ default "" $sso.clientSecret | quote }}
  {{- end }}
{{- end }}
