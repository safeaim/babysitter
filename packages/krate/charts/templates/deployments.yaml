apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krate.fullname" . }}-webhook-worker
  labels:
    {{- include "krate.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-worker
spec:
  replicas: {{ .Values.webhookWorker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: webhook-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: webhook-worker
    spec:
      serviceAccountName: {{ include "krate.fullname" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webhook-worker
          image: {{ include "krate.controllerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "bin/krate-server.mjs"]
          args: ["--mode=webhook-worker"]
          env:
            - name: KRATE_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: KRATE_GITEA_HTTP_URL
              value: {{ default (printf "http://%s-gitea-http.%s.svc.cluster.local:%v/krate" (include "krate.fullname" .) .Release.Namespace (.Values.gitea.service.httpPort | int)) .Values.gitea.httpUrl | quote }}
            - name: KRATE_AUTH_COOKIE_NAME
              value: {{ .Values.auth.session.cookieName | quote }}
          {{- with .Values.webhookWorker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3080
            initialDelaySeconds: 3
            periodSeconds: 5