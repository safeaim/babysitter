{{- $jwtSecretName := printf "%s-jitsi-jwt" (include "krate.fullname" .) -}}
{{- $webhookSecretName := printf "%s-jitsi-webhook" (include "krate.fullname" .) -}}
{{- $jwtAppSecret := ternary .Values.jitsi.external.jwtAppSecret .Values.jitsi.prosody.auth.jwt.appSecret .Values.jitsi.external.enabled -}}
{{- $jwtAppId := ternary .Values.jitsi.external.jwtAppId .Values.jitsi.prosody.auth.jwt.appId .Values.jitsi.external.enabled -}}
{{- $jwtExistingSecret := ternary .Values.jitsi.external.existingSecret .Values.jitsi.prosody.auth.jwt.existingSecret .Values.jitsi.external.enabled -}}
{{- if and (or .Values.jitsi.install .Values.jitsi.external.enabled) (not $jwtExistingSecret) $jwtAppSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $jwtSecretName }}
  labels:
    app.kubernetes.io/name: {{ include "krate.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: jitsi
type: Opaque
stringData:
  appId: {{ $jwtAppId | quote }}
  appSecret: {{ $jwtAppSecret | quote }}
  issuer: {{ .Values.jitsi.prosody.auth.jwt.issuer | quote }}
  audience: {{ .Values.jitsi.prosody.auth.jwt.audience | quote }}
{{- end }}
{{- if and (or .Values.jitsi.install .Values.jitsi.external.enabled) (not .Values.jitsi.krate.webhookExistingSecret) .Values.jitsi.krate.webhookSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $webhookSecretName }}
  labels:
    app.kubernetes.io/name: {{ include "krate.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: jitsi
type: Opaque
stringData:
  webhookSecret: {{ .Values.jitsi.krate.webhookSecret | quote }}
{{- end }}
