# Copilot CLI Webhook Dispatch — bridged-interactive mode
#
# Handles custom repository_dispatch events using GitHub Copilot CLI
# in bridged-interactive mode (PTY internally, structured output externally).

name: Copilot Webhook Handler

on:
  repository_dispatch:
    types: [agent-task]

permissions:
  contents: write
  pull-requests: write

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: a5c-ai/babysitter/packages/triggers@main
        with:
          harness: copilot
          provider: foundry
          model: gpt-5.5
          interaction-mode: bridged-interactive
          prompt: ${{ github.event.client_payload.prompt || 'No prompt provided' }}
          max-turns: '15'
          trigger-query: |
            event: repository_dispatch
            action: agent-task
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
