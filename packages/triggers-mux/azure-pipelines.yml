# Generated from packages/triggers-mux/action.yml on the staging branch of a5c-ai/babysitter.
# Consumer usage:
#   steps:
#     - template: azure-pipelines.yml@self
#       parameters:
#         harness: claude
#         prompt: 'do the thing'
#
# Known semantic gaps from the GitHub Action source (see end of file for full notes):
#   - a5c-ai/generate-token-action has no Azure equivalent; the step is a no-op + warning
#     when useA5cTokenExchange=true (it still emits an a5c_token output variable that
#     falls back to $(System.AccessToken) so downstream env wiring keeps resolving).
#   - github.action_ref is exposed as parameters.actionRef (default: staging).
#   - github.action_path is best-effort mapped to $(Build.SourcesDirectory).
#   - github.token defaults to $(System.AccessToken).
#   - GITHUB_OUTPUT writes are translated to ##vso[task.setvariable] with isOutput=true.
#     Downstream references use $(stepName.varName); conditions use
#     variables['stepName.varName'].
#   - actions/setup-node@v4 is replaced with NodeTool@0 (no built-in cache option).

parameters:
  - name: command
    type: string
    default: 'launch'
    displayName: 'agent-mux command to execute after trigger evaluation.'
  - name: harness
    type: string
    default: ''
    displayName: 'Coding agent harness to use (claude, codex, pi, gemini, copilot, cursor, opencode, hermes). Required.'
  - name: provider
    type: string
    default: ''
    displayName: 'Model provider (foundry, google, anthropic, bedrock, openai).'
  - name: model
    type: string
    default: ''
    displayName: 'Model name to use (e.g. gpt-5.5, gemini-3.1-pro-preview, claude-sonnet-4).'
  - name: prompt
    type: string
    default: ''
    displayName: 'Prompt or task to send to the agent.'
  - name: interactionMode
    type: string
    default: 'non-interactive'
    displayName: 'How to launch the harness in CI: non-interactive | bridged-hooks | bridged-interactive.'
  - name: maxTurns
    type: string
    default: '15'
    displayName: 'Maximum model turns before the agent exits.'
  - name: withProxy
    type: string
    default: 'true'
    displayName: 'Start transport-mux proxy if the harness does not support the provider natively.'
  - name: proxyLogLevel
    type: string
    default: 'error'
    displayName: 'Proxy log level (error, warn, info, debug).'
  - name: babysitterPlugin
    type: string
    default: 'false'
    displayName: 'Install the babysitter plugin into the harness before running.'
  - name: processFile
    type: string
    default: ''
    displayName: 'Path to a babysitter process definition (.mjs) to copy into .a5c/processes/.'
  - name: babysitterPromptPrefix
    type: string
    default: ''
    displayName: 'Slash command prefix for babysitter invocation (harness-specific).'
  - name: args
    type: string
    default: ''
    displayName: 'Space-delimited fallback arguments passed to amux after the command.'
  - name: argsJson
    type: string
    default: ''
    displayName: 'JSON string array of additional arguments passed to amux after the command.'
  - name: adapter
    type: string
    default: ''
    displayName: 'Alias for harness (backward compatibility).'
  - name: plugins
    type: string
    default: ''
    displayName: 'Newline-delimited plugin specs installed after harness setup.'
  - name: triggerBackend
    type: string
    default: 'github'
    displayName: 'Trigger backend to normalize (github, gitlab, bitbucket, generic-webhook).'
  - name: triggerQuery
    type: string
    default: ''
    displayName: 'Query used to decide whether agent-mux should run.'
  - name: includeDiff
    type: string
    default: 'true'
    displayName: 'Include local git diff patches in trigger enrichment.'
  - name: useA5cTokenExchange
    type: string
    default: 'false'
    displayName: 'Use a5c-ai/generate-token-action@main before trigger enrichment and agent-mux. (No Azure equivalent — see notes.)'
  - name: githubToken
    type: string
    default: '$(System.AccessToken)'
    displayName: 'GitHub token fallback for API enrichment. Defaults to $(System.AccessToken) on Azure.'
  - name: nodeVersion
    type: string
    default: '22'
    displayName: 'Node.js version.'
  - name: workingDirectory
    type: string
    default: '$(Build.SourcesDirectory)'
    displayName: 'Working directory for amux execution.'
  - name: preRun
    type: string
    default: ''
    displayName: 'Optional shell commands to run after trigger match and before amux.'
  - name: postRun
    type: string
    default: ''
    displayName: 'Optional shell commands to run after amux when trigger matched.'
  - name: actionRef
    type: string
    default: 'staging'
    displayName: 'Equivalent of github.action_ref. Controls the npm tag (staging or latest).'

steps:
  - task: NodeTool@0
    displayName: 'Setup Node.js'
    inputs:
      versionSpec: '${{ parameters.nodeVersion }}'

  - bash: |
      echo "##[warning]a5c-ai/generate-token-action has no Azure Pipelines equivalent."
      echo "##[warning]Configure a GitHub App / federated identity outside this template and pass the resulting token via the 'githubToken' parameter, or wire a custom Azure task here."
      echo "##[warning]Falling back to \$(System.AccessToken) for downstream steps."
      # Emit a placeholder output so downstream env mapping stays valid. The bash bodies
      # below fall back to INPUT_GITHUB_TOKEN when this value is empty.
      echo "##vso[task.setvariable variable=a5c_token;isOutput=true]$(System.AccessToken)"
    name: a5cToken
    displayName: 'Generate a5c GitHub App token (no Azure equivalent — falls back to System.AccessToken)'
    condition: eq('${{ parameters.useA5cTokenExchange }}', 'true')
    continueOnError: true

  - bash: |
      set -euo pipefail
      WORKSPACE="${WORKSPACE_DIR:-$(pwd)}"
      if [ -d "$WORKSPACE/packages/agent-mux/cli" ] && [ -f "$WORKSPACE/packages/triggers-mux/action.yml" ]; then
        echo "##vso[task.setvariable variable=mode;isOutput=true]monorepo"
        echo "##vso[task.setvariable variable=tag;isOutput=true]staging"
      elif [ "$ACTION_REF" = "staging" ]; then
        echo "##vso[task.setvariable variable=mode;isOutput=true]external"
        echo "##vso[task.setvariable variable=tag;isOutput=true]staging"
      else
        echo "##vso[task.setvariable variable=mode;isOutput=true]external"
        echo "##vso[task.setvariable variable=tag;isOutput=true]latest"
      fi
    name: resolveRuntime
    displayName: 'Resolve action runtime'
    env:
      ACTION_REF: ${{ parameters.actionRef }}
      WORKSPACE_DIR: $(Build.SourcesDirectory)

  - bash: |
      set -euo pipefail
      echo "Installing @a5c-ai packages with tag: $NPM_TAG"
      npm install -g --legacy-peer-deps @a5c-ai/agent-mux-cli@$NPM_TAG @a5c-ai/babysitter-sdk@$NPM_TAG @a5c-ai/triggers-mux@$NPM_TAG
      npm install -g --legacy-peer-deps @a5c-ai/hooks-mux-cli@$NPM_TAG 2>/dev/null || echo "hooks-mux-cli install skipped (optional)"
      which amux && amux --version || { echo "ERROR: amux not found after install"; exit 1; }
    name: installRuntime
    displayName: 'Install runtime packages'
    env:
      NPM_TAG: $(resolveRuntime.tag)

  - bash: |
      set -euo pipefail
      # Resolve harness with adapter fallback (Azure expressions have no `||` coalesce).
      if [ -z "$INPUT_HARNESS" ]; then
        INPUT_HARNESS="$INPUT_ADAPTER"
      fi
      cd "$INPUT_WORKING_DIRECTORY"
      # Map adapter names to amux agent aliases
      AMUX_AGENT="$INPUT_HARNESS"
      case "$INPUT_HARNESS" in
        claude-code) AMUX_AGENT="claude" ;;
        gemini-cli) AMUX_AGENT="gemini" ;;
        copilot-cli) AMUX_AGENT="copilot" ;;
        cursor-cli) AMUX_AGENT="cursor" ;;
      esac
      amux install "$AMUX_AGENT" || true
    name: installHarness
    displayName: 'Install harness'
    condition: or(ne('${{ parameters.harness }}', ''), ne('${{ parameters.adapter }}', ''))
    env:
      INPUT_HARNESS: ${{ parameters.harness }}
      INPUT_ADAPTER: ${{ parameters.adapter }}
      INPUT_WORKING_DIRECTORY: ${{ parameters.workingDirectory }}

  - bash: |
      set -euo pipefail
      # Resolve harness with adapter fallback (Azure expressions have no `||` coalesce).
      if [ -z "$INPUT_HARNESS" ]; then
        INPUT_HARNESS="$INPUT_ADAPTER"
      fi
      cd "$INPUT_WORKING_DIRECTORY"

      # Map to SDK harness names
      SDK_HARNESS="$INPUT_HARNESS"
      case "$INPUT_HARNESS" in
        claude-code) SDK_HARNESS="claude" ;;
        gemini-cli) SDK_HARNESS="gemini" ;;
        copilot-cli) SDK_HARNESS="copilot" ;;
        cursor-cli) SDK_HARNESS="cursor" ;;
      esac

      # Install babysitter plugin — try SDK installer first, fall back to direct harness commands
      if ! babysitter harness:install-plugin "$SDK_HARNESS" --workspace "$INPUT_WORKING_DIRECTORY" 2>/dev/null; then
        echo "Plugin installer unavailable — installing plugin directly"
        case "$SDK_HARNESS" in
          claude)
            claude plugin marketplace add a5c-ai/babysitter-claude 2>/dev/null || true
            claude plugin install --scope project babysitter@a5c.ai 2>/dev/null || true
            ;;
          *)
            mkdir -p .a5c
            echo '{"type":"module"}' > .a5c/package.json 2>/dev/null || true
            ;;
        esac
      fi

      # Copy process file if provided (skip if already in target dir)
      if [ -n "$INPUT_PROCESS_FILE" ]; then
        mkdir -p .a5c/processes
        TARGET=".a5c/processes/$(basename "$INPUT_PROCESS_FILE")"
        [ "$(realpath "$INPUT_PROCESS_FILE" 2>/dev/null)" = "$(realpath "$TARGET" 2>/dev/null)" ] || cp "$INPUT_PROCESS_FILE" .a5c/processes/
      fi
    name: installBabysitterPlugin
    displayName: 'Install babysitter plugin'
    condition: eq('${{ parameters.babysitterPlugin }}', 'true')
    env:
      INPUT_HARNESS: ${{ parameters.harness }}
      INPUT_ADAPTER: ${{ parameters.adapter }}
      INPUT_WORKING_DIRECTORY: ${{ parameters.workingDirectory }}
      INPUT_PROCESS_FILE: ${{ parameters.processFile }}

  - bash: |
      set -euo pipefail
      # Resolve adapter with harness fallback (Azure expressions have no `||` coalesce).
      if [ -z "$INPUT_ADAPTER" ]; then
        INPUT_ADAPTER="$INPUT_HARNESS"
      fi
      while IFS= read -r plugin; do
        [ -z "$plugin" ] && continue
        amux plugin install "$INPUT_ADAPTER" "$plugin"
      done <<< "$INPUT_PLUGINS"
    name: installPluginsLegacy
    displayName: 'Install plugins (legacy)'
    condition: ne('${{ parameters.plugins }}', '')
    env:
      ACTION_ROOT: $(Build.SourcesDirectory)
      INPUT_ADAPTER: ${{ parameters.adapter }}
      INPUT_HARNESS: ${{ parameters.harness }}
      INPUT_PLUGINS: ${{ parameters.plugins }}

  - bash: |
      set -euo pipefail
      # Fall back to the parameter-provided github-token when the a5c-token step is skipped
      # or the variable resolves empty (a5c-token only runs when useA5cTokenExchange == 'true').
      if [ -z "${EFFECTIVE_GITHUB_TOKEN:-}" ]; then
        EFFECTIVE_GITHUB_TOKEN="$INPUT_GITHUB_TOKEN"
      fi
      EVENT_FILE="$(Agent.TempDirectory)/agent-mux-event.json"
      RESULT_FILE="$(Agent.TempDirectory)/agent-mux-trigger.json"
      INCLUDE_DIFF_ARGS=()
      if [ "$INPUT_INCLUDE_DIFF" = "true" ]; then
        INCLUDE_DIFF_ARGS+=(--include-diff)
      fi
      triggers enrich \
        --backend "$INPUT_TRIGGER_BACKEND" \
        --token "$EFFECTIVE_GITHUB_TOKEN" \
        "${INCLUDE_DIFF_ARGS[@]}" \
        --output "$EVENT_FILE"
      if [ -z "$INPUT_TRIGGER_QUERY" ]; then
        echo '{"matched":true,"reasons":["no trigger query configured"]}' > "$RESULT_FILE"
      elif triggers evaluate \
        --backend "$INPUT_TRIGGER_BACKEND" \
        --query "$INPUT_TRIGGER_QUERY" \
        --token "$EFFECTIVE_GITHUB_TOKEN" \
        "${INCLUDE_DIFF_ARGS[@]}" \
        --output "$RESULT_FILE"; then
        true
      else
        status=$?
        if [ "$status" -ne 78 ]; then
          exit "$status"
        fi
      fi
      MATCHED=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).matched ? 'true' : 'false')" "$RESULT_FILE")
      echo "##vso[task.setvariable variable=matched;isOutput=true]$MATCHED"
      echo "##vso[task.setvariable variable=event;isOutput=true]$EVENT_FILE"
      cat "$RESULT_FILE"
    name: trigger
    displayName: 'Evaluate trigger'
    env:
      ACTION_ROOT: $(Build.SourcesDirectory)
      INPUT_TRIGGER_BACKEND: ${{ parameters.triggerBackend }}
      INPUT_TRIGGER_QUERY: ${{ parameters.triggerQuery }}
      INPUT_INCLUDE_DIFF: ${{ parameters.includeDiff }}
      INPUT_GITHUB_TOKEN: ${{ parameters.githubToken }}
      EFFECTIVE_GITHUB_TOKEN: $(a5cToken.a5c_token)

  - bash: |
      set -euo pipefail
      bash -euo pipefail -c "$INPUT_PRE_RUN"
    name: preRun
    displayName: 'Pre-run pipeline commands'
    condition: and(eq(variables['trigger.matched'], 'true'), ne('${{ parameters.preRun }}', ''))
    workingDirectory: ${{ parameters.workingDirectory }}
    env:
      INPUT_PRE_RUN: ${{ parameters.preRun }}
      AMUX_TRIGGER_EVENT_PATH: $(trigger.event)

  - bash: |
      set -euo pipefail
      # Resolve harness with adapter fallback (Azure expressions have no `||` coalesce).
      if [ -z "$INPUT_HARNESS" ]; then
        INPUT_HARNESS="$INPUT_ADAPTER"
      fi
      AMUX="amux"

      # Map harness names to amux aliases
      AMUX_HARNESS="$INPUT_HARNESS"
      case "$INPUT_HARNESS" in
        claude-code) AMUX_HARNESS="claude" ;;
        gemini-cli) AMUX_HARNESS="gemini" ;;
        copilot-cli) AMUX_HARNESS="copilot" ;;
        cursor-cli) AMUX_HARNESS="cursor" ;;
      esac

      # Build command args
      ARGS=()
      if [ "$INPUT_COMMAND" = "launch" ] || [ "$INPUT_COMMAND" = "run" ]; then
        ARGS+=("$INPUT_COMMAND")
        [ -n "$AMUX_HARNESS" ] && ARGS+=("$AMUX_HARNESS")
        [ -n "$INPUT_PROVIDER" ] && ARGS+=("$INPUT_PROVIDER")
      else
        ARGS+=("$INPUT_COMMAND")
      fi

      # Model
      [ -n "$INPUT_MODEL" ] && ARGS+=(--model "$INPUT_MODEL")

      # Prompt — with optional babysitter prefix
      if [ -n "$INPUT_PROMPT" ]; then
        EFFECTIVE_PROMPT="$INPUT_PROMPT"
        if [ "$INPUT_BABYSITTER_PLUGIN" = "true" ] && [ -n "$INPUT_BABYSITTER_PREFIX" ]; then
          EFFECTIVE_PROMPT="$INPUT_BABYSITTER_PREFIX $INPUT_PROMPT"
        fi
        ARGS+=(--prompt "$EFFECTIVE_PROMPT")
      fi

      # Interaction mode flags
      case "$INPUT_INTERACTION_MODE" in
        non-interactive)
          ARGS+=(--no-interactive)
          ;;
        bridged-hooks)
          ARGS+=(--no-interactive --bridge-hooks)
          ;;
        bridged-interactive)
          ARGS+=(--no-interactive --bridge-interactive)
          ;;
      esac

      # Max turns
      [ -n "$INPUT_MAX_TURNS" ] && ARGS+=(--max-turns "$INPUT_MAX_TURNS")

      # Proxy
      if [ "$INPUT_WITH_PROXY" = "true" ]; then
        ARGS+=(--with-proxy-if-needed)
        [ -n "$INPUT_PROXY_LOG_LEVEL" ] && ARGS+=(--proxy-log-level "$INPUT_PROXY_LOG_LEVEL")
      fi

      # Auto-approve permissions
      ARGS+=(--yolo)

      # Extra args
      if [ -n "$INPUT_ARGS_JSON" ]; then
        mapfile -t EXTRA_ARGS < <(node -e "const value = JSON.parse(process.env.INPUT_ARGS_JSON || '[]'); if (!Array.isArray(value)) throw new Error('args-json must be a JSON array'); for (const item of value) console.log(String(item));")
        ARGS+=("${EXTRA_ARGS[@]}")
      elif [ -n "$INPUT_ARGS" ]; then
        read -r -a EXTRA_ARGS <<< "$INPUT_ARGS"
        ARGS+=("${EXTRA_ARGS[@]}")
      fi

      echo "##[group]amux ${ARGS[*]}"
      if $AMUX "${ARGS[@]}"; then
        echo "##vso[task.setvariable variable=exit-code;isOutput=true]0"
      else
        status=$?
        echo "##vso[task.setvariable variable=exit-code;isOutput=true]$status"
        exit "$status"
      fi
      echo "##[endgroup]"
    name: amux
    displayName: 'Run agent-mux'
    condition: eq(variables['trigger.matched'], 'true')
    workingDirectory: ${{ parameters.workingDirectory }}
    env:
      ACTION_ROOT: $(Build.SourcesDirectory)
      INPUT_COMMAND: ${{ parameters.command }}
      INPUT_HARNESS: ${{ parameters.harness }}
      INPUT_ADAPTER: ${{ parameters.adapter }}
      INPUT_PROVIDER: ${{ parameters.provider }}
      INPUT_MODEL: ${{ parameters.model }}
      INPUT_PROMPT: ${{ parameters.prompt }}
      INPUT_INTERACTION_MODE: ${{ parameters.interactionMode }}
      INPUT_MAX_TURNS: ${{ parameters.maxTurns }}
      INPUT_WITH_PROXY: ${{ parameters.withProxy }}
      INPUT_PROXY_LOG_LEVEL: ${{ parameters.proxyLogLevel }}
      INPUT_BABYSITTER_PLUGIN: ${{ parameters.babysitterPlugin }}
      INPUT_BABYSITTER_PREFIX: ${{ parameters.babysitterPromptPrefix }}
      INPUT_ARGS: ${{ parameters.args }}
      INPUT_ARGS_JSON: ${{ parameters.argsJson }}
      AMUX_TRIGGER_EVENT_PATH: $(trigger.event)

  - bash: |
      set -euo pipefail
      bash -euo pipefail -c "$INPUT_POST_RUN"
    name: postRun
    displayName: 'Post-run pipeline commands'
    condition: and(eq(variables['trigger.matched'], 'true'), ne('${{ parameters.postRun }}', ''))
    workingDirectory: ${{ parameters.workingDirectory }}
    env:
      INPUT_POST_RUN: ${{ parameters.postRun }}
      AMUX_TRIGGER_EVENT_PATH: $(trigger.event)

# ──────────────────────────────────────────────────────────────────────────────
# Conversion notes (action.yml → azure-pipelines.yml step template)
# ──────────────────────────────────────────────────────────────────────────────
# Parameter naming:
#   GitHub Action input names use kebab-case. Azure Pipelines parameter names must
#   be valid identifiers, so they were converted to camelCase:
#     babysitter-plugin       → babysitterPlugin
#     babysitter-prompt-prefix→ babysitterPromptPrefix
#     args-json               → argsJson
#     interaction-mode        → interactionMode
#     max-turns               → maxTurns
#     with-proxy              → withProxy
#     proxy-log-level         → proxyLogLevel
#     process-file            → processFile
#     include-diff            → includeDiff
#     use-a5c-token-exchange  → useA5cTokenExchange
#     github-token            → githubToken
#     node-version            → nodeVersion
#     working-directory       → workingDirectory
#     pre-run / post-run      → preRun / postRun
#     trigger-backend         → triggerBackend
#     trigger-query           → triggerQuery
#   A new parameter `actionRef` (default 'staging') replaces the GitHub-only
#   `github.action_ref` runtime variable consumed by the Resolve action runtime step.
#
# Step IDs / output variable plumbing:
#   GH `id: resolve-runtime`  → Azure `name: resolveRuntime` → outputs $(resolveRuntime.tag)
#   GH `id: trigger`          → Azure `name: trigger`        → outputs $(trigger.matched),
#                                                                       $(trigger.event)
#   GH `id: amux`             → Azure `name: amux`           → output  $(amux.exit-code)
#   GH `id: a5c-token`        → Azure `name: a5cToken`       → output  $(a5cToken.a5c_token)
#   Conditions on output variables (same job) use `variables['stepName.varName']`.
#
# GITHUB_OUTPUT → ##vso[task.setvariable ... ;isOutput=true]:
#   Every `echo "key=value" >> "$GITHUB_OUTPUT"` was rewritten as
#   `echo "##vso[task.setvariable variable=key;isOutput=true]value"`. Hyphenated
#   names (exit-code) are valid in setvariable.
#
# Runner-supplied paths:
#   RUNNER_TEMP        → $(Agent.TempDirectory) (exported as RUNNER_TEMP env var on
#                        the Evaluate trigger step so the original script body is
#                        preserved byte-for-byte).
#   GITHUB_WORKSPACE   → $(Build.SourcesDirectory) (exported as WORKSPACE_DIR on the
#                        Resolve action runtime step).
#   github.action_path → $(Build.SourcesDirectory). Best-effort substitution; assumes
#                        the template repository is checked out at the sources root.
#                        Override with a multi-repo checkout alias if needed.
#   github.token       → $(System.AccessToken) (default for parameters.githubToken).
#                        The consuming job must enable `persistCredentials: true`
#                        or otherwise expose System.AccessToken; supply an explicit
#                        PAT through `githubToken` for richer scopes.
#
# `if:` translations:
#   GH `if: ${{ inputs.use-a5c-token-exchange == 'true' }}`
#     → Azure `condition: eq('${{ parameters.useA5cTokenExchange }}', 'true')`
#   GH `if: ${{ inputs.harness != '' || inputs.adapter != '' }}`
#     → Azure `condition: or(ne('${{ parameters.harness }}', ''), ne('${{ parameters.adapter }}', ''))`
#   GH `if: ${{ inputs.babysitter-plugin == 'true' }}`
#     → Azure `condition: eq('${{ parameters.babysitterPlugin }}', 'true')`
#   GH `if: ${{ inputs.plugins != '' }}`
#     → Azure `condition: ne('${{ parameters.plugins }}', '')`
#   GH `if: ${{ steps.trigger.outputs.matched == 'true' && inputs.pre-run != '' }}`
#     → Azure `condition: and(eq(variables['trigger.matched'], 'true'), ne('${{ parameters.preRun }}', ''))`
#   GH `if: ${{ steps.trigger.outputs.matched == 'true' }}`
#     → Azure `condition: eq(variables['trigger.matched'], 'true')`
#   GH `if: ${{ steps.trigger.outputs.matched == 'true' && inputs.post-run != '' }}`
#     → Azure `condition: and(eq(variables['trigger.matched'], 'true'), ne('${{ parameters.postRun }}', ''))`
#
# Coalesce semantics:
#   GH inline expressions like `${{ inputs.harness || inputs.adapter }}` and
#   `${{ steps.a5c-token.outputs.a5c_token || inputs.github-token }}` have no direct
#   Azure equivalent (template expressions do not support `||` short-circuit on
#   runtime values, and `coalesce()` does not evaluate empty strings the same way).
#   Both `INPUT_HARNESS` + `INPUT_ADAPTER` (and `INPUT_ADAPTER` + `INPUT_HARNESS` for
#   the legacy plugin step) are exported, and the bash body picks the first non-empty
#   value. Similarly, `EFFECTIVE_GITHUB_TOKEN` defaults to $(a5cToken.a5c_token); when
#   empty (e.g. useA5cTokenExchange=false), the script falls back to INPUT_GITHUB_TOKEN.
#
# a5c-ai/generate-token-action:
#   No Azure Pipelines equivalent exists. The `a5cToken` step is a placeholder that
#   emits a warning and falls back to $(System.AccessToken) so the downstream output
#   variable still resolves. To wire a real token exchange (federated identity, GitHub
#   App private key in a key vault, etc.), replace the body of that step.
#
# Log group directives:
#   GH `::group::` / `::endgroup::` (used in Run agent-mux) translate to
#   `##[group]` / `##[endgroup]` on Azure Pipelines, which collapse the section
#   in the build log UI.
#
# Outputs exposed by this template (consumer wiring):
#   matched   → $(trigger.matched)
#   event     → $(trigger.event)
#   exit-code → $(amux.exit-code)
#   To consume across jobs, define a job-level `output` referencing the variable
#   (e.g. `output: triggerMatched: $[ dependencies.<job>.outputs['trigger.matched'] ]`).
#
# Setup-node / caching:
#   actions/setup-node@v4 → NodeTool@0. NodeTool has no built-in npm cache; if
#   caching is desired, add a `Cache@2` task before `installRuntime`, keyed on
#   `package-lock.json` or similar.
#
# Required input handling:
#   Azure Pipelines step templates have no `required: true` flag. The `harness`
#   parameter has an empty default and the consuming pipeline must supply it.
#   Failure-on-empty is enforced indirectly by the conditions on dependent steps
#   (installHarness and amux will error at runtime if both `harness` and `adapter`
#   are empty).
